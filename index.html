        // ============================================
        // л©”мқё кІҢмһ„ м»ҙнҸ¬л„ҢнҠё
        // ============================================

        // мҶҗнҢЁ мғҒн•ң вҖ” мҡ”н•ң м§ҖмӢң(2026-04-22): 3мһҘ вҶ’ 5мһҘмңјлЎң мҰқк°Җ.
        // мҶҗнҢЁ ліҙм¶© лЎңм§ҒВ·мҙҲкё° л“ңлЎңмҡ°В·HandCards к·ёлҰ¬л“ңк°Җ лӘЁл‘җ мқҙ мғҒмҲҳ кё°мӨҖмңјлЎң лҸҷмһ‘н•ңлӢӨ.
        const HAND_SIZE = 5;

        function Game() {
            // мғҒнғң кҙҖлҰ¬
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(6);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            // D-54: мӮ¬л§қ мӮ¬мң  вҖ” GameEndModalмқҙ к°җм„ұ л¬ёкө¬В·к°Җмқҙл“ңлҘј м„ нғқн•ҳлҠ” нӮӨ.
            const [deathReason, setDeathReason] = useState(null);
            const [message, setMessage] = useState('лҲҲмқ„ лңЁмһҗ лӮҜм„  мҲІмқҙ нҺјміҗмЎҢлӢӨ.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            // D-27 HUD лҰ¬лүҙм–ј: лҚұ/л¬ҙлҚӨ лӘ©лЎқ лӘЁлӢ¬ н‘ңмӢң н”Ңлһҳк·ё.
            const [showDeckList, setShowDeckList] = useState(false);
            const [showGraveyardList, setShowGraveyardList] = useState(false);
            // D-53: мқёкІҢмһ„ [н”Ңл Ҳмқҙл°©лІ•] лӘЁлӢ¬.
            const [showHelp, setShowHelp] = useState(false);
            const [eventTile, setEventTile] = useState(null);
            // м „нҲ¬ мһ„мӢң м№ҙл“ң(м•„мқҙн…ң мӮ¬мҡ©мңјлЎң мғқм„ұ) вҖ” м „нҲ¬ м§„мһ… мӢң combat лҚұм—җ лі‘н•©, мӮ¬мҡ© нӣ„ мҶҢл©ё.
            // кө¬мЎ°: [{ id:'throw', count:N }, ...]
            const [combatExtraCards, setCombatExtraCards] = useState([]);
            // D-23 "м№ҙл“ңлЎң м•„мқҙн…ң мӮ¬мҡ©" н”„л Ҳмһ„мӣҢнҒ¬ вҖ” лҢҖкё° мӨ‘ consume мҡ”мІӯ.
            // кө¬мЎ°: { card, consume, filter, titleText, emptyText } | null
            // лӘЁлӢ¬ нҷңм„ұ нҢҗм •лҸ„ мқҙ stateмқҳ truthyлЎң нҶөмқј.
            const [pendingConsume, setPendingConsume] = useState(null);
            // D-28 нҡҚл“қ нҶ мҠӨнҠё вҖ” нҳ„мһ¬ л…ём¶ң мӨ‘мқё нҶ мҠӨнҠё 1к°ңл§Ң мң м§Җ.
            // кө¬мЎ°: { id: number, entries: [{ name, count, grade? }] } | null
            const [lootToast, setLootToast] = useState(null);
            // D-52: н’ҚмЎұн•ң л•…(кө¬ мўӢмқҖ кіі) л“ұ нғҖмқј мқҙлІӨнҠёлҠ” нҶ мҠӨнҠёлЎң м•ҲлӮҙ.
            const [tileEventToast, setTileEventToast] = useState(null);
            // D-42 (2026-04-23 мҡ”н•ң м§ҖмӢң): ліҙмҠӨ мң„м№ҳ к°ҖмӢңм„ұмқҖ "м§Җнҳ• revealed"мҷҖ л¶„лҰ¬.
            // - listen 1м№ё л¶„кё°м—җм„ңл§Ң bossVisible=true лЎң set (к·ё мҲңк°„ ліҙмҠӨ м•„мқҙмҪҳ л…ём¶ң)
            // - н”Ңл Ҳмқҙм–ҙк°Җ мқҙлҸҷн•ҳл©ҙ мҰүмӢң false (м§Җнҳ• revealedлҠ” мң м§Җ)
            // кіөнҸ¬ мӣҗм№ҷ: "н•ң лІҲ ліё ліҙмҠӨ мң„м№ҳ"к°Җ м•„лӢҲлқј "л°©кёҲ к·Җкё°мҡёмқё мң„м№ҳ"л§Ң мӢ лў° к°ҖлҠҘ.
            const [bossVisible, setBossVisible] = useState(false);
            const mapRef = useRef(null);

            // нҶ мҠӨнҠё л°ңмӮ¬ вҖ” entriesлҠ” л¬¶мқҢ н‘ңмӢң лҢҖмғҒ.
            // idлҠ” м»ҙнҸ¬л„ҢнҠёк°Җ phase нғҖмқҙлЁёлҘј мһ¬мӢңмһ‘н•ҳкё° мң„н•ң key м—ӯн• .
            const showLootToast = (entries) => {
                if (!entries || entries.length === 0) return;
                setLootToast({ id: Date.now() + Math.random(), entries });
            };

            // нғҖмқј мқҙлІӨнҠё нҶ мҠӨнҠё л°ңмӮ¬ вҖ” emoji/title/message/color мӮ¬м–‘.
            const showTileEventToast = (payload) => {
                if (!payload) return;
                setTileEventToast({ id: Date.now() + Math.random(), ...payload });
            };

            // кІҢмһ„ мҙҲкё°нҷ”
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(7);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighborsлҘј мӮ¬мҡ©н•ҳм—¬ л¬јлҰ¬м ҒмңјлЎң мқём ‘н•ң лӘЁл“  нғҖмқјмқ„ discoveredлЎң м„Өм •
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                
                // м№ҙл“ң лҚ°мқҙн„°лҠ” кө¬кёҖ мӢңнҠё 'лІ мқҙмҠӨнғҗн—ҳм№ҙл“ң' нғӯмқҙ SSOT.
                // data/data.jsмқҳ TTD_DATA.BASE_CARDSлҘј мқҪм–ҙ лҹ°нғҖмһ„ н•„л“ң(time кё°ліёк°’ 1)л§Ң лҚ§л¶ҷмқёлӢӨ.
                // мӢңнҠё к°ұмӢ  мӢң: мӢңнҠё мҲҳм • вҶ’ `make data` мӢӨн–ү вҶ’ мғҲлЎңкі м№Ё.
                //
                // D-23: consume/extra_effect м»¬лҹјмқҖ мӢңнҠё н—ӨлҚ”м—җ мЎҙмһ¬. к°’ м—Ҷмңјл©ҙ л№Ҳ л¬ёмһҗм—ҙ.
                // лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ мӢңм—җл§Ң м•„лһҳ else нҸҙл°ұ(м•Ҳм „л§қ)мқҙ мӮ¬мҡ©лҗңлӢӨ.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0
                    ? sheetBaseCards.map(c => ({
                          id: c.id,
                          name: c.name,
                          count: Number(c.count) || 0,
                          effect: c.effect || '',
                          detection: Number(c.detection) || 0,
                          time: Number(c.time) || 1,
                          consume: c.consume || '',
                          extra_effect: c.extra_effect || ''
                      }))
                    : [
                          // нҸҙл°ұ(лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ мӢң) вҖ” мӢңнҠёк°Җ SSOTмқҙлҜҖлЎң м •мғҒ кІҪлЎңм—җм„  мӮ¬мҡ© м•Ҳ лҗЁ.
                          { id: 'search', name: 'л’Өм ёліҙкё°', count: 5, effect: 'м•„мқҙн…ң нҡҚл“қ', detection: 5, time: 1 },
                          { id: 'listen', name: 'к·Җ кё°мҡёмқҙкё°', count: 2, effect: 'лӘ¬мҠӨн„° к°җм§Җ', detection: -5, time: 1 },
                          { id: 'find_food', name: 'мқҢмӢқ м°ҫкё°', count: 1, effect: 'мқҢмӢқ нҡҚл“қ', detection: 5, time: 1 },
                          { id: 'hide', name: 'мҲЁкё°', count: 1, effect: 'мқҖмӢ ', detection: -15, time: 1 },
                          { id: 'rest', name: 'нңҙмӢқ', count: 1, effect: 'мІҙл Ҙ/л°°кі н”” мҶҢнҸӯ нҡҢліө, мҶҢмқҢ мөңмҶҢ', detection: -13, time: 1,
                            consume: 'category:мқҢмӢқ;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                const inv = new InventorySystem(6, 5);
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                newBoss.position = bossPos;
                setBoss(newBoss);
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // кІҢмһ„ мҳӨлІ„/мҠ№лҰ¬ мІҙнҒ¬
            // D-54: мӮ¬мң  кө¬л¶„ вҖ” мІҙл Ҙмқҙ лЁјм Җ 0мқҙл©ҙ 'health', л°°кі н”” лЁјм Җл©ҙ 'starvation'.
            useEffect(() => {
                if (health <= 0) {
                    setGameOver(true);
                    setDeathReason('health');
                    setMessage('мғқлӘ…л Ҙмқҙ лӢӨн–ҲлӢӨ...');
                } else if (hunger <= 0) {
                    setGameOver(true);
                    setDeathReason('starvation');
                    setMessage('л°°кі н””мқ„ мқҙкё°м§Җ лӘ»н–ҲлӢӨ...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('нғҲм¶ңм—җ м„ұкіөн–ҲлӢӨ!');
                }
            }, [currentTile, tiles]);

            // м•„мқҙн…ң мӮ¬мҡ© вҖ” мқёлІӨнҶ лҰ¬ м •ліҙм°Ҫм—җм„ң 'мӮ¬мҡ©' лІ„нҠјмқ„ лҲ„лҘј л•Ң нҳём¶ң.
            // EffectParserк°Җ нҢҢмӢұн•ң Notion 'мӮ¬мҡ© нҡЁкіј' DSLмқ„ лҹ°нғҖмһ„м—җ м Ғмҡ©н•ҳкі ,
            // мҶҢл№„нҳ•(consumed) нҢҗм •мқҖ effectParserк°Җ лӮҙл ӨмӨҖ к°’мқ„ к·ёлҢҖлЎң л”°лҘёлӢӨ.
            //
            // spawn_card:throw лҠ” 'м „нҲ¬ м№ҙл“ң лҚұм—җ лҚҳм§Җкё° м№ҙл“ң м¶”к°Җ'лЎң н•ҙм„қн•ңлӢӨ.
            // кё°нҡҚ к·јкұ°(мҡ”н•ң м§ҖмӢң): "м „нҲ¬лӘЁл“ңмӢңм—җ л“ұмһҘн•ҳлҠ” м№ҙл“ңм—җ м¶”к°ҖлҗңлӢӨ".
            // мӮ¬мҡ© мӢңм җм—җ м№ҙл“ңк°Җ мғқм„ұлҗҳм–ҙ мһ„мӢң н’Җ(combatExtraCards)м—җ мҢ“мқҙкі ,
            // лӢӨмқҢ м „нҲ¬ мӢңмһ‘ л•Ң кё°ліё лҚұкіј лі‘н•©лҗҳл©°, к·ё м „нҲ¬ лӮҙм—җм„ң м№ҙл“ңлҘј м“°л©ҙ мҶҢл©ён•ңлӢӨ.
            // (мҳҒкө¬ м¶”к°Җк°Җ м•„лӢҢ к·јкұ°: нҳ„мһ¬ м•„мқҙн…ңмқҙ мқјнҡҢмҡ© нҢҗм •мқҙ м•„лӢҲм–ҙлҸ„ мһ¬нғҗмғү/лЁём§Җ к°ҖлҠҘ мһ¬лЈҢмқҙлҜҖлЎң
            //  лҚұм—җ мҳҒкө¬ нҺёмһ…мӢңнӮӨл©ҙ л°ёлҹ°мҠӨк°Җ мүҪкІҢ л¬ҙл„Ҳм§Җкі , мҡ”н•ң л§җ "м „нҲ¬ мў…лЈҢ мӢң мҶҢл©ё"мқҙ мһҗм—°мҠӨлҹ¬мӣҖ.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || item.name));
                const parsed = (notionItem && notionItem.effect) || null;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('мқҙ м•„мқҙн…ңмқҖ м•„м§Ғ мӮ¬мҡ©н•  мҲҳ м—ҶлӢӨ.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        if (name === 'hunger') setHunger(val);
                        else if (name === 'health') setHealth(val);
                    },
                    addThrowCard: (cardId) => {
                        // к°ҷмқҖ cardIdлҘј м—¬лҹ¬ лІҲ мҚЁм„ң м—¬лҹ¬ мһҘмқ„ мҢ“мқ„ мҲҳлҸ„ мһҲмқҢ.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
                            return next;
                        });
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ. (${label})`);
                }
                return result;
            };

            // D-23: "м№ҙл“ңлЎң м•„мқҙн…ң мӮ¬мҡ©" н”„л Ҳмһ„мӣҢнҒ¬мқҳ кіөнҶө м§„мһ…м җ.
            // м№ҙл“ңк°Җ м•„мқҙн…ңмқ„ мҶҢл№„н•ҙм•ј н•ҳлҠ” кІҪмҡ°(consume мҠӨнҺҷ ліҙмң ) мқҙ н•ЁмҲҳк°Җ лӘЁлӢ¬мқ„ лқ„мҡ°кі ,
            // мң м Җк°Җ м•„мқҙн…ңмқ„ кі лҘё л’Ө нҷ•м •лҗҳл©ҙ finalizeCardUseлЎң мӢӨм ң нҡЁкіјлҘј м Ғмҡ©н•ңлӢӨ.
            // м№ҙл“ң мһҗмІҙ(мҶҗнҢЁ вҶ’ л¬ҙлҚӨ, мӢңк°„В·л°ңк°Ғ мҰқк°Җ)лҠ” м„ кІ° мЎ°кұҙ нҶөкіј нӣ„м—җл§Ң мҶҢлӘЁ.
            //
            // consume нҢҢмӢұмқҖ effectParser.parseCardConsumeм—җ мң„мһ„. н•„н„°лҠ” matchesConsumeFilter.
            // consume нҶөкіј м•„мқҙн…ңмқҙ 0к°ңл©ҙ "м“ё мҲҳ м—ҶлӢӨ" л©”мӢңм§ҖлЎң мЎ°мҡ©нһҲ мў…лЈҢ(м№ҙл“ңлҸ„ лҜёмҶҢлӘЁ).
            const finalizeCardUse = (card, extraMsg) => {
                // мҶҗнҢЁ вҶ’ л¬ҙлҚӨ, мӢңк°„В·л°ңк°Ғ мІҳлҰ¬.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ. (мӢңк°„ +${card.time}) `;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume м№ҙл“ң вҶ’ м•„мқҙн…ң м„ нғқ лӘЁлӢ¬ мҳӨн”Ҳ.
            // н•„н„° нҶөкіј м•„мқҙн…ңмқҙ м—Ҷмңјл©ҙ мЎ°мҡ©нһҲ мҠӨнӮө(м№ҙл“ң лҜёмҶҢлӘЁ).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('м•„мқҙн…ң мӮ¬мҡ© н”„л Ҳмһ„мӣҢнҒ¬к°Җ лЎңл“ңлҗҳм§Җ м•Ҡм•ҳлӢӨ.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {
                    setMessage('мқҙ м№ҙл“ңлҠ” м•„мқҙн…ңмқ„ мҶҢл№„н•ҳм§Җ м•ҠлҠ”лӢӨ.');
                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                const hasAny = (inventory?.items || []).some(invItem => {
                    const def = InventorySystem.ITEMS[invItem.type] || {};
                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                if (!hasAny) {
                    setMessage(`${card.name}: м§ҖкёҲ м“ё мҲҳ мһҲлҠ” м•„мқҙн…ңмқҙ м—ҶлӢӨ.`);
                    return;
                }
                // D-36: нңҙмӢқ л“ұ scaleмқҙ кұёлҰ° м№ҙл“ңлҠ” лӘЁлӢ¬мқҙ "нҡЁкіј мҰқнҸӯ"мқ„ мӢңк°Ғм ҒмңјлЎң к°•мЎ°н•ҙм•ј н•Ё.
                // scales(мҳҲ: {recover: 2})лҘј к·ёлҢҖлЎң л„ҳкІЁ лӘЁлӢ¬мқҙ м•„мқҙн…ң нҡЁкіјлҘј лҜёлҰ¬ліҙкё°лЎң мҠӨмјҖмқј.
                // м№ҙл“ң мқҙлҰ„/нҡЁкіј н…ҚмҠӨнҠёлҠ” м№ҙл“ңлі„ м•ҲлӮҙ л¬ёкө¬мқҳ кё°ліёк°’мңјлЎң мӮ¬мҡ©.
                const hintText = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `${card.name}мңјлЎң мқён•ҙ мқҢмӢқмқҳ нҡЁкіјк°Җ ${consume.scales.recover}л°°к°Җ лҗ©лӢҲлӢӨ`
                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    hintText,
                    titleText: card.name + ' вҖ” мӮ¬мҡ©н•  м•„мқҙн…ң',
                    emptyText: 'м“ё л§Ңн•ң м•„мқҙн…ңмқҙ м—ҶлӢӨ.'
                });
            };

            // consume лӘЁлӢ¬м—җм„ң м•„мқҙн…ң н•ҳлӮҳ м„ нғқ вҶ’ мӢӨм ң нҡЁкіј м Ғмҡ©.
            // 1) м•„мқҙн…ңмқҳ нҢҢмӢұлҗң effectлҘј scaleEffectлЎң ліҖнҳ• (мҳҲ: нҡҢліө x2)
            // 2) applyItemEffectлЎң мҠӨнғҜ/м№ҙл“ң м•Ўм…ҳ л””мҠӨнҢЁм№ҳ
            // 3) м•„мқҙн…ң 1к°ң мқёлІӨм—җм„ң м ңкұ° (мқјнҡҢмҡ©В·л№„мқјнҡҢмҡ© л¬ҙкҙҖ: м№ҙл“ңк°Җ мҶҢл№„н•ҳлҠ” л§ҘлқҪ)
            // 4) м№ҙл“ң ліёмІҙ мҶҢлӘЁ + мӢңк°„/л°ңк°Ғ л°ҳмҳҒ
            const resolveConsumeChoice = (invItem) => {
                if (!pendingConsume) return;
                const Parser = window.EffectParser;
                const { card, consume } = pendingConsume;

                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || invItem.name));
                const parsedEffect = (notionItem && notionItem.effect) || null;

                let appliedMsg = '';
                if (parsedEffect && parsedEffect.usable && Parser) {
                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {});
                    Parser.applyItemEffect(scaled, {
                        getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                        setStat: (name, val) => {
                            if (name === 'hunger') setHunger(val);
                            else if (name === 'health') setHealth(val);
                        },
                        addThrowCard: (cardId) => {
                            setCombatExtraCards(prev => {
                                const next = [...prev];
                                const idx = next.findIndex(c => c.id === cardId);
                                if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                                else next.push({ id: cardId, count: 1 });
                                return next;
                            });
                        },
                        setMessage
                    });
                    appliedMsg = `${def.name || invItem.name}мқ„(лҘј) мҶҢлӘЁн•ҳкі  ${Parser.describeEffect(scaled)}.`;
                } else {
                    appliedMsg = `${def.name || invItem.name}мқ„(лҘј) мҶҢлӘЁн–Ҳм§Җл§Ң лі„ нҡЁкіјлҠ” м—Ҷм—ҲлӢӨ.`;
                }

                // м•„мқҙн…ң 1к°ң мҶҢл№„
                if (inventory) {
                    inventory.removeItem(invItem);
                    inventory.items = inventory.items.filter(i => i.id !== invItem.id);
                }

                setPendingConsume(null);
                finalizeCardUse(card, appliedMsg);
            };

            const cancelConsume = () => {
                setPendingConsume(null);
            };

            // м№ҙл“ң мӮ¬мҡ©
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('мӢңк°„мқҙ л¶ҖмЎұн•©лӢҲлӢӨ!');
                    return;
                }

                // D-23: consume мҠӨнҺҷмқҙ мһҲлҠ” м№ҙл“ңлҠ” лӘЁлӢ¬мқ„ лқ„мҡ°кі  м„ нғқ нӣ„ нҡЁкіј м Ғмҡ©.
                // м№ҙл“ң ліёмІҙ мҶҢлӘЁВ·мӢңк°„В·л°ңк°ҒмқҖ finalizeCardUseм—җм„ңл§Ң л°ңмғқ.
                if (card.consume) {
                    openConsumeForCard(card);
                    return;
                }

                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);

                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);

                let msg = `${card.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ. (мӢңк°„ +${card.time}) `;

                if (card.id === 'search') {
                    // D-28(2026-04-22, мҡ”н•ң м§ҖмӢң): л’Өм ёліҙкё°лҠ” 3мҠ¬лЎҜ лҸ…лҰҪ м¶”мІЁ(100/20/20).
                    // мҠ¬лЎҜ нҷ•лҘ /к°ңмҲҳ мһҗмІҙлҠ” л№„кіөк°ң. кІ°кіјл§Ң л©”мӢңм§Җ+нҶ мҠӨнҠёлЎң л…ём¶ң.
                    // м—¬лҹ¬ к°ң нҡҚл“қ мӢң к°ҷмқҖ м•„мқҙн…ңмқҖ к°ңмҲҳ лҲ„м Ғ, л¬¶мқҢ нҶ мҠӨнҠё 1к°ң.
                    //
                    // D-34: нғҖмқј type === 'good'мқҙл©ҙ мҠ¬лЎҜ нҷ•лҘ мқҙ мғҒн–Ҙ(100/80/80).
                    // D-35: к°ҷмқҖ нғҖмқј л°ҳліөВ·ліөк·Җ л’Өм ёліҙкё°м—җлҠ” нҺҳл„җнӢ° кіұмҲҳк°Җ л¶ҷлҠ”лӢӨ
                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLootк°Җ
                    //       tile к°қмІҙлҘј л°ӣм•„ м•Ҳм—җм„ң мІҳлҰ¬н•ңлӢӨ.
                    const tile = tiles[currentTile];
                    const currentRegion = tile?.region;
                    if (currentRegion) {
                        const drops = rollSearchLoot(currentRegion, tile);
                        // к°ҷмқҖ м•„мқҙн…ң к°ңмҲҳ лҲ„м Ғ (нҶ мҠӨнҠё/л©”мӢңм§Җ к°ҖлҸ…м„ұ)
                        const counter = new Map(); // item -> count
                        let overflow = 0; // к°Җл°© нҸ¬нҷ”лЎң лӘ» лӢҙмқҖ мҲҳ
                        drops.forEach(({ item }) => {
                            const added = inventory.addItem(item);
                            if (added) {
                                counter.set(item, (counter.get(item) || 0) + 1);
                            } else {
                                overflow += 1;
                            }
                        });

                        if (counter.size > 0) {
                            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                            const entries = [];
                            const nameParts = [];
                            counter.forEach((count, item) => {
                                const def = InventorySystem.ITEMS[item] || {};
                                const displayName = def.name || item;
                                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === displayName);
                                const grade = notionItem && notionItem['м•„мқҙн…ң л“ұкёү'];
                                entries.push({ name: displayName, count, grade });
                                nameParts.push(count > 1 ? `${displayName} Г—${count}` : displayName);
                            });
                            msg += `[${currentRegion}] ${nameParts.join(', ')}мқ„(лҘј) л°ңкІ¬н–ҲлӢӨ.`;
                            if (overflow > 0) msg += ` (к°Җл°©мқҙ к°Җл“қ м°Ё ${overflow}к°ңлҠ” л‘җкі  мҷ”лӢӨ.)`;
                            showLootToast(entries);
                        } else if (overflow > 0) {
                            msg += `[${currentRegion}] м“ё л§Ңн•ң кұё м°ҫм•ҳм§Җл§Ң к°Җл°©мқҙ к°Җл“қ м°Ё л“Өкі  мҳӨм§Җ лӘ»н–ҲлӢӨ.`;
                        } else {
                            msg += `[${currentRegion}] мқҙ к·јмІҳм—җлҠ” м“ёл§Ңн•ң кІҢ м—ҶлӢӨ.`;
                        }

                        // D-35: мқҙ нғҖмқјмқҳ л’Өм ёліҙкё° м№ҙмҡҙн„° мҰқк°Җ.
                        // м¶”мІЁмқҙ лҒқлӮң л’Өм—җ мҳ¬л Өм•ј "мІ« мӮ¬мҡ©мқҖ mult=1" к·ңм•Ҫмқҙ м§Җмјңм§„лӢӨ.
                        setTiles(prev => prev.map(t =>
                            t.id === currentTile
                                ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                : t
                        ));
                    } else {
                        // м•Ҳм „л§қ: region м—ҶлҠ” нғҖмқј(кө¬лІ„м „ м„ёмқҙлёҢ л“ұ)мқҖ л Ҳкұ°мӢң лҸҷмһ‘
                        inventory.addItem('material_low');
                        msg += `мһ¬лЈҢлҘј л°ңкІ¬н–ҲлӢӨ.`;
                    }
                } else if (card.id === 'find_food') {
                    // 'мқҢмӢқ м°ҫкё°' м№ҙл“ң вҖ” food м№ҙн…Ңкі лҰ¬ к°•м ң л“ңлЎӯ(мҡ”н•ң м§ҖмӢң 2026-04-22).
                    // 'food' лҸ…лҰҪ м•„мқҙн…ңмқҖ м ңкұ°лҗҗмңјлҜҖлЎң, м§Җм—ӯмқҳ мқҢмӢқмһ¬лЈҢ н’Җм—җм„ң м§Ғм ‘ м¶”мІЁ.
                    // м§Җм—ӯм—җ food н’Җмқҙ л№„м–ҙмһҲмңјл©ҙ(мӢңлғҮл¬ј л“ұ) нҸҙл°ұ л©”мӢңм§Җ.
                    //
                    // D-40 (2026-04-23 мҡ”н•ң м§ҖмӢң): searchмҷҖ лҸҷмқјн•ҳкІҢ LootToast л…ём¶ң.
                    // лӢЁмқј м•„мқҙн…ңмқҙлқј entries л°°м—ҙм—җ мӣҗмҶҢ 1к°ң. к°Җл°©мқҙ м°¬ кІҪмҡ°(added=false)лҠ”
                    // нҶ мҠӨнҠё мғқлһө(кё°мЎҙ search л¶„кё°мҷҖ лҸҷмқјн•ң к·ңм№ҷ: мӢӨм ң нҡҚл“қн•ң кІғл§Ң).
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item } = rollTileDrop(currentRegion, { forceCategory: 'food' });
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            if (added) {
                                msg += `[${currentRegion}] ${def?.name || item}мқ„(лҘј) м°ҫм•„лғҲлӢӨ.`;
                                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                const displayName = def?.name || item;
                                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === displayName);
                                const grade = notionItem && notionItem['м•„мқҙн…ң л“ұкёү'];
                                showLootToast([{ name: displayName, count: 1, grade }]);
                            } else {
                                msg += `[${currentRegion}] ${def?.name || item}мқ„(лҘј) м°ҫм•ҳм§Җл§Ң к°Җл°©мқҙ к°Җл“қ м°јлӢӨ.`;
                            }
                        } else {
                            msg += `[${currentRegion}] лЁ№мқ„ л§Ңн•ң кұҙ ліҙмқҙм§Җ м•ҠлҠ”лӢӨ.`;
                        }
                    } else {
                        msg += 'лЁ№мқ„ л§Ңн•ң кұҙ ліҙмқҙм§Җ м•ҠлҠ”лӢӨ.';
                    }
                } else if (card.id === 'listen') {
                    // D-31 (2026-04-22 ліҙк°•):
                    //   listen м№ҙл“ңмқҳ кё°ліё нҡЁкіјлҠ” "мқём ‘ нғҖмқј revealed" вҖ” кұ°лҰ¬мҷҖ л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ мӢӨн–ү.
                    //   к·ё мң„м—җ кұ°лҰ¬лі„ мІӯк°Ғ л©”мӢңм§Җ(ліҙмҠӨмҷҖмқҳ BFS кұ°лҰ¬)к°Җ мӨ‘мІ©лҗңлӢӨ.
                    //   1м№ё  вҶ’ ліҙмҠӨ мң„м№ҳ л…ём¶ң + мқём ‘ revealed
                    //   2м№ё  вҶ’ "мҲЁмү¬лҠ” мҶҢлҰ¬к°Җ кҪӨ к°Җк№Ңмқҙ..." + мқём ‘ revealed
                    //   3м№ё  вҶ’ "л°ңкұёмқҢ мҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§„л“Ҝ..." + мқём ‘ revealed
                    //   вүҘ4м№ё вҶ’ "л°ңкұёмқҢ мҶҢлҰ¬к°Җ м•„мЈј л©ҖлҰ¬м„ң..." + мқём ‘ revealed
                    // (м§Ғм „ лІ„м „м—җм„ң 2м№ё мқҙмғҒмқј л•Ң revealedлҘј лҒҠм—ҲмңјлӮҳ, мқҙлҠ” listenмқҳ н•өмӢ¬ кё°лҠҘмқ„
                    //  м ңкұ°н•ң нҡҢк·ҖмҳҖмқҢ. мҡ”н•ң QA 2026-04-22 м§ҖмӢңлЎң ліөкө¬.)
                    const bossPos = boss.getPosition();
                    const bossDist = boss.calculateDistance(currentTile, bossPos);

                    // мқём ‘ нғҖмқј revealed вҖ” кұ°лҰ¬ л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ мӢӨн–үлҗҳлҠ” listenмқҳ кё°ліё нҡЁкіј.
                    const newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    setTiles(newTiles);

                    // D-49 (2026-04-23 мҡ”н•ң м§ҖмӢң): D-48м—җм„ң вҡ пёҸВ·м§Ғм„Өм Ғ л¬ёкө¬лЎң л°”кҝЁлҚҳ
                    // listen л©”мӢңм§Җ мӣҗліө. к°„м ‘м ҒВ·м„ңмӮ¬м Ғ нҶӨмқҙ кІҢмһ„ л¶„мң„кё°м—җ лҚ” л§һлҠ”лӢӨлҠ” нҢҗлӢЁ.
                    // ліҙмҠӨ кІҪкі лҠ” мӢңк°Ғ мӢ нҳё(нғҖмқј мғүВ·нҺ„мҠӨВ·лқјлІЁ мҡ°м„ мҲңмң„, D-48м—җм„ң кІ©мғҒ)лЎң м¶©л¶„.
                    if (bossDist === 1) {
                        // D-42: ліҙмҠӨ мң„м№ҳ л…ём¶ңмқҖ мқҙ мҲңк°„л§Ң. мқҙлҸҷ мӢң moveToм—җм„ң лӢӨмӢң falseлЎң.
                        setBossVisible(true);
                        msg += `к°ҖмҒң мҲЁмҶҢлҰ¬к°Җ л°”лЎң кіҒм—җм„ң л“Өл ӨмҳЁлӢӨ. ліҙмҠӨлҠ” нғҖмқј #${bossPos}м—җ мһҲлӢӨ.`;
                    } else if (bossDist === 2) {
                        msg += 'мҲЁмү¬лҠ” мҶҢлҰ¬к°Җ кҪӨ к°Җк№Ңмқҙ л“ӨлҰ¬лҠ” л“Ҝ н•ҳм—¬ мҶҢлҰ„мқҙ лҸӢлҠ”лӢӨ.';
                    } else if (bossDist === 3) {
                        msg += 'л°ңкұёмқҢ мҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§„л“Ҝ н•ҳлӢӨ.';
                    } else {
                        msg += 'л°ңкұёмқҢ мҶҢлҰ¬к°Җ м•„мЈј л©ҖлҰ¬м„ң л“ӨлҰ°лӢӨ, лӢ№л¶„к°„мқҖ м•ҲмӢ¬н•ҙлҸ„ лҗ  кІғ к°ҷлӢӨ.';
                    }
                } else if (card.id === 'hide') {
                    msg += 'мЎ°мҡ©нһҲ лӘёмқ„ мҲЁкІјлӢӨ.';
                }
                
                setMessage(msg);
            };

            // нғҖмқј мқҙлҸҷ
            const moveTo = (targetId) => {
                if (!tiles[currentTile].connections.includes(targetId)) {
                    setMessage('к·ёкіімңјлЎңлҠ” к°Ҳ мҲҳ м—ҶмҠөлӢҲлӢӨ!');
                    return;
                }

                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                setHunger(hunger - 1);
                setTime(0);

                // D-42: мқҙлҸҷн•ҳлҠ” мҲңк°„ ліҙмҠӨ мң„м№ҳ лӢӨмӢң м•Ҳк°ң мҶҚмңјлЎң.
                // м§Җнҳ• revealedлҠ” к·ёлҢҖлЎң л‘җкі  ліҙмҠӨ м•„мқҙмҪҳл§Ң мҲЁкёҙлӢӨ.
                // (кіөнҸ¬ мӣҗм№ҷ: н•ң лІҲ ліё мң„м№ҳлҘј кі„мҶҚ мӢ лў°н•ҳм§Җ лӘ»н•ҳлҸ„лЎқ.)
                setBossVisible(false);

                // мқҙлҸҷл§ҲлӢӨ л°ңк°ҒлҘ  +5% (мҡ”н•ң м§ҖмӢң 2026-04-22).
                // м№ҙл“ңмқҳ detection к°ҖмӨ‘м№ҳмҷҖ лі„к°ңлЎң, лӢЁмҲң мқҙлҸҷ мһҗмІҙк°Җ ліҙмҠӨм—җкІҢ л“ңлҹ¬лӮҳлҠ” кё°ліё мң„н—ҳ.
                // мғҒн•ң 100. detection stateлҠ” мқҙнӣ„ chaseMode м „нҷҳ нҢҗм •(>=80)м—җ к·ёлҢҖлЎң м“°мһ„.
                const movedDetection = Math.min(100, detection + 5);
                setDetection(movedDetection);
                
                // getHexNeighborsлҘј мӮ¬мҡ©н•ҳм—¬ л¬јлҰ¬м ҒмңјлЎң мқём ‘н•ң лӘЁл“  нғҖмқјмқ„ discoveredлЎң м„Өм •
                const mapGen = new MapGenerator(7);
                const positions = mapGen.generateHexPositions();
                const targetNeighbors = mapGen.getHexNeighbors(targetId, positions);
                
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        // лҸ„м°©н•ң нғҖмқјмқҖ мҰүмӢң лӘЁл“  м •ліҙ кіөк°ң
                        return { ...t, visited: true, discovered: true, revealed: true };
                    }
                    // D-35: н”Ңл Ҳмқҙм–ҙк°Җ м§Ғм „ нғҖмқјмқ„ 'л– лӮ¬лӢӨ'лҠ” мӮ¬мӢӨ кё°лЎқ.
                    // мқҙнӣ„ лҸҢм•„мҳӨлҚ”лқјлҸ„ trueлЎң мң м§Җлҗҳм–ҙ л°ҳліө нҺҳл„җнӢ°мқҳ мҙҲкё° 0.5 кіұмҲҳк°Җ м Ғмҡ©лҗңлӢӨ.
                    if (t.id === currentTile) {
                        return {
                            ...t,
                            hasBeenLeft: true,
                            // к°ҷмқҖ мҶҚм„ұмқҳ мқём ‘ нғҖмқјлҸ„ discovered мң м§Җ
                            discovered: targetNeighbors.includes(t.id) ? true : t.discovered
                        };
                    }
                    // мғҲлЎңмҡҙ мң„м№ҳмқҳ л¬јлҰ¬м Ғ мқём ‘ нғҖмқјл“Өмқ„ discoveredлЎң м„Өм •
                    if (targetNeighbors.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                
                // мҶҗнҢЁ ліҙм¶©
                let newHand = [...hand];
                let newDeck = [...deck];
                let newGraveyard = [...graveyard];
                
                while (newHand.length < HAND_SIZE && newDeck.length > 0) {
                    newHand.push(newDeck.shift());
                }

                if (newHand.length < HAND_SIZE && newGraveyard.length > 0) {
                    newDeck = shuffleDeck(newGraveyard);
                    newGraveyard = [];
                    while (newHand.length < HAND_SIZE && newDeck.length > 0) {
                        newHand.push(newDeck.shift());
                    }
                }
                
                setHand(newHand);
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                
                // ліҙмҠӨ мқҙлҸҷ лЎңм§Ғ
                let newBossPos = boss.position;
                if (newMoveCount % 2 === 0 && !boss.chaseMode) {
                    const bossConnections = newTiles[boss.position].connections;
                    if (bossConnections.length > 0) {
                        newBossPos = bossConnections[Math.floor(Math.random() * bossConnections.length)];
                        boss.position = newBossPos;
                    }
                }
                
                if (movedDetection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }

                if (boss.chaseMode) {
                    boss.onPlayerMove(targetId, movedDetection);
                    newBossPos = boss.position;
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';
                
                if (encounter) {
                    setGameOver(true);
                    setDeathReason('boss');
                    msg = 'ліҙмҠӨ лӘ¬мҠӨн„°мҷҖ мЎ°мҡ°н–ҲлӢӨ! кІҢмһ„ мҳӨлІ„...';
                } else if (tile.type === 'normal') {
                    msg = 'нҸүлІ”н•ң мҲІкёёмқҙлӢӨ.';
                } else if (tile.type === 'good') {
                    // D-52 (2026-04-23 мҡ”н•ң м§ҖмӢң): 'мўӢмқҖ кіі' вҶ’ 'н’ҚмЎұн•ң л•…'мңјлЎң мқҳлҜё мһ¬м •мқҳ.
                    // нҢқм—… лӘЁлӢ¬ вҶ’ нҶ мҠӨнҠё м•ҢлҰјмңјлЎң м „нҷҳ(нқҗлҰ„ лҒҠк№Җ мҷ„нҷ”).
                    msg = 'н’ҚмЎұн•ң л•…мқ„ л°ңкІ¬н–ҲлӢӨ!';
                    showTileEventToast({
                        emoji: 'рҹҢҫ',
                        title: 'н’ҚмЎұн•ң л•…',
                        message: 'мһҗмӣҗкіј лЁ№кұ°лҰ¬к°Җ н’Қл¶Җн•ң кіімқҙлӢӨ.',
                        color: '#FFC107'
                    });
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `н•Ём •! мғқлӘ…л Ҙ -${damage}`;
                    // мқҙлІӨнҠё лӘЁлӢ¬ н‘ңмӢң (лҚ°лҜём§Җ м •ліҙ нҸ¬н•Ё)
                    setEventTile({ ...tile, damage });
                } else if (tile.type === 'exit') {
                    msg = 'нғҲм¶ңкө¬лӢӨ!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [вҡ пёҸ ліҙмҠӨ м¶”кІ©мӨ‘!]`;
                }
                
                setMessage(msg);
            };

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>кІҢмһ„ лЎңл”© мӨ‘...</div>;
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    <div className="ui-panel">
                        <StatPanel 
                            health={health}
                            hunger={hunger}
                            time={time}
                            maxTime={maxTime}
                            boss={boss}
                            detection={detection}
                            message={message}
                        />
                        
                        {/* D-27 HUD лҰ¬лүҙм–ј вҶ’ D-28 мһ¬л°°м№ҳ (мҡ”н•ң м§ҖмӢң 2026-04-22):
                            - к°Җл°© лІ„нҠјмқҖ мўҢмёЎ кі м •.
                            - лҚұ/л¬ҙлҚӨ лІ„нҠјмқҖ 'мҶҗнҢЁ N/5' м№ҙмҡҙн„° мӘҪ(мҡ°мёЎ лҒқ)мңјлЎң л¬¶лҠ”лӢӨ.
                              к·јкұ°: "м№ҙл“ң мһҗмӣҗ кҙҖлҰ¬ UIлҠ” н•ң кіім—җ"лқјлҠ” мҡ”н•ң мқҳлҸ„. мҶҗнҢЁВ·лҚұВ·л¬ҙлҚӨмқҖ
                              к°ҷмқҖ м№ҙл“ң мһҗмӣҗмқҙлҜҖлЎң мӢңм„ мқҙ л¶„лҰ¬лҗҳм§Җ м•ҠлҸ„лЎқ л¬¶мқҢ.
                            - мҶҗнҢЁлҠ” н•ҳлӢЁм—җ н•ӯмғҒ н‘ңмӢңлҗҳлҜҖлЎң мҲ«мһҗл§Ң к°„кІ°нһҲ. */}
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', alignItems: 'center' }}>
                            <button onClick={() => setShowInventory(!showInventory)}>
                                {showInventory ? 'к°Җл°© лӢ«кё°' : 'к°Җл°© м—ҙкё°'}
                            </button>
                            {/* D-53: к°ҖмҡҙлҚ° м •л ¬мқҖ м–‘мӘҪ marginLeft/Right auto. мўҢ(к°Җл°©)мҷҖ мҡ°(лҚұ/л¬ҙлҚӨ) мӮ¬мқҙ л“ұл¶„. */}
                            <button
                                onClick={() => setShowHelp(true)}
                                style={{ marginLeft: 'auto', marginRight: 'auto' }}
                            >
                                н”Ңл Ҳмқҙл°©лІ•
                            </button>
                            <div style={{
                                display: 'flex',
                                gap: '6px',
                                alignItems: 'center'
                            }}>
                                <div style={{ fontSize: '12px', color: '#aaa' }}>
                                    мҶҗнҢЁ {hand.length}/{HAND_SIZE}
                                </div>
                                <button onClick={() => setShowDeckList(true)}>
                                    лҚұ {deck.length}
                                </button>
                                <button onClick={() => setShowGraveyardList(true)}>
                                    л¬ҙлҚӨ {graveyard.length}
                                </button>
                            </div>
                        </div>

                        <HandCards 
                            hand={hand}
                            gameOver={gameOver}
                            victory={victory}
                            useCard={useCard}
                        />
                    </div>

                    <GameMap
                        tiles={tiles}
                        currentTile={currentTile}
                        boss={boss}
                        bossVisible={bossVisible}
                        gameOver={gameOver}
                        victory={victory}
                        moveTo={moveTo}
                        lootToast={lootToast}
                        onLootToastDone={() => setLootToast(null)}
                        tileEventToast={tileEventToast}
                        onTileEventToastDone={() => setTileEventToast(null)}
                    />

                    {eventTile && (
                        <TileEventModal 
                            tile={eventTile} 
                            onClose={() => setEventTile(null)} 
                        />
                    )}

                    {showInventory && inventory && (
                        <InventoryModal
                            inventory={inventory}
                            selectedItem={selectedInventoryItem}
                            setSelectedItem={setSelectedInventoryItem}
                            closeInventory={() => setShowInventory(false)}
                            onUseItem={handleUseItem}
                            onFlashMessage={setMessage}
                        />
                    )}

                    {showHelp && (
                        <HelpModal onClose={() => setShowHelp(false)} />
                    )}

                    {showDeckList && (
                        <CardListModal
                            title="лӮЁмқҖ лҚұ"
                            cards={deck}
                            emptyText="лҚұмқҙ л№„м—ҲлӢӨ. л¬ҙлҚӨмқҙ м…”н”Ңлҗ  м°ЁлЎҖлӢӨ."
                            onClose={() => setShowDeckList(false)}
                        />
                    )}

                    {showGraveyardList && (
                        <CardListModal
                            title="л¬ҙлҚӨ"
                            cards={graveyard}
                            emptyText="м•„м§Ғ мӮ¬мҡ©н•ң м№ҙл“ңк°Җ м—ҶлӢӨ."
                            onClose={() => setShowGraveyardList(false)}
                        />
                    )}

                    {pendingConsume && inventory && (
                        <CardItemConsumeModal
                            inventory={inventory}
                            filter={pendingConsume.filter}
                            scales={pendingConsume.scales}
                            hintText={pendingConsume.hintText}
                            titleText={pendingConsume.titleText}
                            emptyText={pendingConsume.emptyText}
                            onSelect={resolveConsumeChoice}
                            onClose={cancelConsume}
                        />
                    )}

                    {/* D-42 (2026-04-23): мөңмғҒмң„ LootToast м ңкұ°.
                        мқҙлҜё GameMap лӮҙл¶Җм—җм„ң л ҢлҚ”лҗҳлҜҖлЎң мӨ‘ліө л§ҲмҡҙнҠёмҳҖмқҢ.
                        л§ө м»Ён…Ңмқҙл„Ҳ кё°мӨҖ top:12px н•ҳлӮҳл§Ң мң м§Җ. */}

                    <GameEndModal gameOver={gameOver} victory={victory} deathReason={deathReason} />
                </div>
            );
        }

        ReactDOM.render(<Game />, document.getElementById('root'));

        // D-41 (2026-04-23 мҡ”н•ң м§ҖмӢң): кІҢмһ„ мҳҒм—ӯ лӮҙл¶Җмқҳ contextmenu(мҡ°нҒҙлҰӯ/лЎұн”„л ҲмҠӨ)
        // кё°ліё лҸҷмһ‘ м°ЁлӢЁ. CSS user-select:noneл§ҢмңјлЎңлҠ” iOS Safari лЎұн”„л ҲмҠӨ ліөмӮ¬ л©”лүҙк°Җ
        // лңЁлҠ” кІҪмҡ°к°Җ мһҲм–ҙ JS л ҲлІЁм—җм„ңлҸ„ л§үлҠ”лӢӨ.
        // input/textarea/contentEditableмқҖ м ңмҷё вҖ” н…ҚмҠӨнҠё м„ нғқВ·л¶ҷм—¬л„Јкё° м»Ён…ҚмҠӨнҠёк°Җ н•„мҡ”.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
