<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 타임투다이노</title>
    
    <!-- 스타일 -->
    <link rel="stylesheet" href="gameStyles.css">
    
    <!-- 외부 라이브러리 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 데이터 번들 (시트 + Notion 아이템 SSOT 스냅샷, scripts/fetch_data.py로 재생성) -->
    <script src="data/data.js"></script>

    <!-- 게임 모듈 -->
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script src="dropTable.js"></script>
    <script src="effectParser.js"></script>
    <script src="combatDeck.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // D-61 (2026-04-24, 12차 세션): 맵 크기 단일 진실의 원천.
        //   7x7 → 11x11 (1.5배 상향). MapGenerator 모든 호출부가 이 상수를 사용.
        //   mapGenerator.js 내부는 gridSize 인자로 받아 자동 스케일(빈슬롯/특수타일/보스거리).
        const MAP_SIZE = 11;

        // ============================================
        // React 컴포넌트들
        // ============================================

        // 상단 스탯 패널 컴포넌트
        //
        // D-27 HUD 리뉴얼 (요한 지시 2026-04-22):
        // - 생명력/배고움은 게이지(바) — 발각률 바 스타일 답습, 게임 다크톤 유지.
        // - 배고픔 <= 3일 때 노란색(#d4b84a, 채도 낮춤)으로 경고.
        // - 시간은 숫자가 아닌 '시계 아이콘'. maxTime만큼 표시하고 소모된 만큼 어둡게.
        // - 시간 전부 소모(time >= maxTime) 시 숫자/아이콘 모두 빨강으로 경고.
        // - 게임 다크 분위기와 조화를 위해 빨강/노랑 채도는 낮게 유지.
        //
        // D-37 HUD 2줄 압축 (요한 지시 2026-04-22, 7차 세션):
        // - 상단 HUD 세로 길이를 줄여 모바일에서 맵 가시 영역 확보.
        // - 1줄: [생명력 게이지][배고픔 게이지][시간 시계]  (3개 한 줄)
        // - 2줄: [보스 순찰/추격][발각률 바]             (2개 한 줄, 발각 바는 flex-grow)
        // - 라벨 제거, 아이콘만 표시. 숫자 폰트 크기 축소.
        // - 게이지 높이 12 → 10, 발각 바 20 → 14.
        // - 기존 stat-box padding 축소 필요 시 인라인으로만 오버라이드(전역 .stat-box는 다른 곳에서 재사용).
        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            const MAX_HEALTH = 8;
            const MAX_HUNGER = 12;
            const healthPct = Math.max(0, Math.min(100, (health / MAX_HEALTH) * 100));
            const hungerPct = Math.max(0, Math.min(100, (hunger / MAX_HUNGER) * 100));

            // 채도 낮춘 경고색 (다크톤 조화). 기본은 기존 팔레트 유지.
            const healthColor = health <= 0
                ? '#8a2b3a'
                : health <= 2 ? '#c04a5e' : '#b24656';
            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // 컴팩트 stat-box 스타일 — 2줄 HUD에서 높이를 낮추기 위해 padding 축소.
            const compactBox = { padding: '5px 7px' };

            return (
                <div>
                    {/* 1줄: 생명력 · 배고픔 · 시간 (3개 한 줄) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>
                        <StatGauge
                            icon="❤️"
                            value={health}
                            max={MAX_HEALTH}
                            pct={healthPct}
                            color={healthColor}
                            valueColor="#eee"
                            flex={1}
                            warning={health <= 2}
                        />
                        <StatGauge
                            icon="🍖"
                            value={hunger}
                            max={MAX_HUNGER}
                            pct={hungerPct}
                            color={hungerColor}
                            valueColor={hungerLow ? '#d4b84a' : '#eee'}
                            flex={1}
                            warning={hunger <= 3}
                        />
                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): 남은 회수 표시로 반전.
                                    - 밝은 아이콘 = 아직 쓸 수 있는 회수, 어두운 아이콘 = 소모됨.
                                    - 시작 3/3 → 전부 소모 시 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // i가 작을수록 먼저 소모됨. 남은 개수는 (maxTime - time).
                                    const remaining = i < (maxTime - time);
                                    return (
                                        <span
                                            key={i}
                                            style={{
                                                fontSize: '14px',
                                                lineHeight: 1,
                                                opacity: remaining ? 1 : 0.25,
                                                filter: timeEmpty
                                                    ? 'grayscale(1) brightness(0.9)'
                                                    : remaining ? 'none' : 'grayscale(1) brightness(0.7)',
                                                color: timeEmpty ? '#c04a5e' : undefined,
                                                transition: 'all 0.2s'
                                            }}
                                        >
                                            🕰️
                                        </span>
                                    );
                                })}
                            </div>
                            <span style={{
                                fontSize: '11px',
                                fontWeight: '600',
                                color: timeTextColor,
                            }}>
                                {maxTime - time}/{maxTime}
                            </span>
                        </div>
                    </div>

                    {/* 2줄: 보스 상태 · 발각률 바 (발각 바가 남은 폭 차지) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',
                                fontSize: '12px',
                                fontWeight: '600',
                                flexShrink: 0,
                                color: boss?.chaseMode ? '#e94560' : '#eee'
                            }}
                            title={boss?.chaseMode ? '추격 중' : '순찰 중'}
                        >
                            {boss?.chaseMode ? '🔴 추격' : '🟢 순찰'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>🚨</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',
                                position: 'relative'
                            }}>
                                <div style={{
                                    width: `${detection}%`,
                                    height: '100%',
                                    background: detectionColor,
                                    transition: 'all 0.3s'
                                }} />
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '10px',
                                    fontWeight: '600',
                                    color: '#fff',
                                    textShadow: '0 0 2px rgba(0,0,0,0.6)'
                                }}>
                                    {detection}%
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px', padding: '6px 8px' }}>
                        {message}
                    </div>
                </div>
            );
        }

        // 스탯 게이지 — 발각률 바와 동일 구조. 아이콘 + 게이지 + 숫자.
        // D-37: 라벨 제거·컴팩트 padding. `flex` prop으로 외부에서 너비 배분 제어.
        // D-55 (2026-04-24 요한 지시): `warning` prop true면 채움 부분에만 빨간 점멸.
        //   StatPanel이 health<=2 / hunger<=3 에서 주입. 라벨/숫자/아이콘은 정상.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex, warning }) {
            return (
                <div className={`stat-box ${warning ? 'stat-warning' : ''}`} style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                        <span style={{ fontSize: '13px', lineHeight: 1 }}>{icon}</span>
                        <div style={{
                            flex: 1,
                            background: '#0f3460',
                            height: '10px',
                            borderRadius: '5px',
                            overflow: 'hidden',
                            minWidth: 0
                        }}>
                            <div
                                className={warning ? 'gauge-warning' : undefined}
                                style={{
                                    width: `${pct}%`,
                                    height: '100%',
                                    background: color,
                                    transition: 'all 0.3s'
                                }}
                            />
                        </div>
                        <span style={{
                            fontSize: '11px',
                            fontWeight: '600',
                            color: valueColor,
                            minWidth: '28px',
                            textAlign: 'right',
                            flexShrink: 0
                        }}>
                            {value}/{max}
                        </span>
                    </div>
                </div>
            );
        }

        // 손패 카드 컴포넌트
        // 손패 상한 5장(HAND_SIZE) — 5열 그리드로 한 줄에 표시한다.
        // 한 줄에 모든 카드가 들어가야 상단 UI가 스크롤 없이 유지됨(기획 원칙: 하단 맵 스크롤만 허용).
        // 좁은 폭에서는 폰트/패딩이 이미 10~13px이라 5열도 안정.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            // D-48: 타일 이동마다 hand이 전부 교체되므로 각 카드 uid가 새 값.
            //   새로 마운트된 카드에 card-draw 클래스 + stagger delay로 순차 페이드인.
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map((card, i) => (
                        <div
                            key={card.uid}
                            className="card card-draw"
                            style={{ animationDelay: `${i * 60}ms` }}
                            onClick={() => useCard(card)}
                        >
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                발각 {card.detection > 0 ? '+' : ''}{card.detection}% · ⏰{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 지역 한글 라벨 (기획상 region은 이미 한글이라 매핑 불필요하지만,
        // 추후 영어 코드로 바꿀 여지가 있어 맵을 둔다. 일치하면 그대로 노출).
        const REGION_LABEL = {
            '숲': '숲', '덤불': '덤불', '평원': '평원', '시냇물': '시냇물', '동굴': '동굴',
            forest: '숲', thicket: '덤불', plain: '평원', stream: '시냇물', cave: '동굴'
        };

        // 육각형 타일 컴포넌트
        //
        // D-42 (2026-04-23 요한 지시): 보스 아이콘 노출 조건이 "tile.revealed"에서
        // "bossVisible"로 분리됨. 지형 revealed와 무관하게 bossVisible=true 일 때만
        // 보스가 있는 타일에 🦖 아이콘이 뜬다. 이동하면 setBossVisible(false).
        //
        // D-50 (2026-04-23 요한 지시): 플레이어·보스를 타일 배경/라벨로 섞어
        // 표현하던 방식을 폐기하고 SVG 오버레이 "말"(piece)로 분리. 타일은
        // 지형 속성만 표현. 말 렌더링은 GameMap에서 HexTile 위에 SVG text로 수행.
        //
        // D-46/D-48: 사냥감 오버레이.
        //   - prey 아이콘: visited 타일 + preys에 이 tileId 있을 때. (보스가 있으면 보스 우선)
        //   - 흔적(👣 우상단): preyTraceTiles.has(tile.id) — visited 무관 (청각 단서).
        //   - D-48: 발자국 방향 화살표 제거 — 흔적(👣)만으로 단서 제공.
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, moveHistory, bossMoveHistory, showPathView }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            const preyOnTile = (preys || []).find(p => p.tileId === tile.id);
            const showPrey = tile.visited && preyOnTile && !isBoss;
            const preyEmoji = showPrey ? (PREY_EMOJI[preyOnTile.preyType] || '❓') : null;
            const hasTrace = preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tile.id);
            // D-78: 사체 타일. visited && carcassTiles.has(tile.id)면 🦴 오버레이.
            //   listen으로 감지된 인접 사체는 carcassTraceTiles에 들어가 trace 위치에 🦴 표시(visited 무관).
            const hasCarcass = carcassTiles && carcassTiles.has && carcassTiles.has(tile.id);
            const hasCarcassTrace = carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tile.id);

            // D-53: [맵 보기] 모드에서 미방문 타일은 반투명 회색 윤곽만 공개.
            // 지역 이름/마커/prey/흔적은 숨긴다(스포일러 방지 — 방문 안 한 곳은 지형만 감).
            const pathUnvisited = showPathView && !tile.visited;
            // D-80 (2026-04-24 요한 지시): listen 실루엣 — 정보가 밝혀진 타일에
            // 인접하여 길이 연결된 그 다음 1칸 타일을 맵보기와 동일한 dim 색상으로 노출.
            // 길찾기 난이도 하향 목적. 게임 중에도 이동은 가능(canMove면 클릭 허용).
            const silhouetteOnly = !showPathView && tile.silhouette && !tile.revealed && !tile.visited;
            const dimmed = pathUnvisited || silhouetteOnly;

            // 길이 없는 타일 (connections 없음) 판별
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                return '#2d3561';
            };

            const getTileLabel = () => {
                if (!isRevealed) return '?';
                // D-50: 말이 올라온 타일은 중앙 라벨 숨김 — 말 아이콘이 그 자리를 차지.
                // 타일 속성은 배경색으로 계속 보이므로 지형 정보 손실 없음.
                if (isCurrent || isBoss) return '';
                if (tile.type === 'exit') return '탈출구';
                if (showPrey) return preyEmoji;
                // D-78: visited 사체 타일 — 🦴 중앙 아이콘.
                if (tile.visited && hasCarcass) return '🦴';
                if (tile.type === 'good') return '🌾';
                if (tile.type === 'trap') return '⚠️';
                return '';
            };

            // 지역 이름 오버레이.
            // D-51 (2026-04-23 요한 지시): revealed(귀기울이기 등)도 지형 이름 노출.
            // 이전(D-27~): visited만 표시. 이제 listen으로 주변 지형 파악이 가능해짐.
            // 방문(visited)과 정찰(revealed only) 구분:
            // - visited: 초록 동그란 마커 + 지형 이름, 타일 밝음(opacity 1)
            // - revealed only: 지형 이름만 (마커 없음), 타일 약간 어두움(opacity 0.7)
            // - 미공개: 아무것도 없음, 타일 매우 어두움(opacity 0.55)
            const regionLabel = !dimmed && (tile.visited || tile.revealed) && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;
            const tileOpacity = dimmed ? 0.22 : (tile.visited ? 1 : tile.revealed ? 0.7 : 0.55);
            const tileFill = dimmed ? '#444' : getTileColor(tile);
            const tileStroke = dimmed ? '#555' : (canMove ? '#4CAF50' : '#0f3460');
            const tileStrokeWidth = dimmed ? '1' : (canMove ? '3' : '2');

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile${dimmed ? ' path-unvisited' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={tileFill}
                        stroke={tileStroke}
                        strokeWidth={tileStrokeWidth}
                        opacity={tileOpacity}
                        onClick={() => !gameOver && !victory && !pathUnvisited && canMove && moveTo(tile.id)}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            {tile.visited && (
                                <circle cx={x - 22} cy={y - 36} r="3" fill="#4CAF50" />
                            )}
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    {!dimmed && (
                        <text
                            x={x}
                            y={y + 5}
                            textAnchor="middle"
                            fill={isRevealed ? '#fff' : '#666'}
                            fontSize={isRevealed ? '14' : '24'}
                            fontWeight={isRevealed ? '700' : 'bold'}
                        >
                            {getTileLabel()}
                        </text>
                    )}
                    {/* D-46: 흔적(우상단 👣) — visited 무관, listen 청각 단서.
                        D-47: 어두운 타일에서도 확실히 보이도록 크기·대비 상향.
                        D-78: 사체 trace는 👣 대신 🦴로. 일반 prey trace와 동시에 있으면
                        사체가 우선(보스 포식이 끝난 "확정 단서"라 더 구체적). */}
                    {!dimmed && (hasTrace || hasCarcassTrace) && (
                        <text
                            x={x + 20}
                            y={y - 18}
                            textAnchor="middle"
                            fontSize="22"
                            pointerEvents="none"
                            stroke="#0a1020"
                            strokeWidth="3"
                            paintOrder="stroke"
                        >
                            {hasCarcassTrace ? '🦴' : '👣'}
                        </text>
                    )}
                    {/* 맵 보기 모드 — 플레이어가 방문한 순서 번호. 첫 방문 기준(indexOf). */}
                    {showPathView && moveHistory && (() => {
                        const pathIdx = moveHistory.indexOf(tile.id);
                        if (pathIdx < 0) return null;
                        return (
                            <g pointerEvents="none">
                                <circle cx={x - 28} cy={y - 2} r="11" fill="#d4b84a" stroke="#000" strokeWidth="0.8" />
                                <text
                                    x={x - 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#1a1a2e"
                                    fontSize="12"
                                    fontWeight="800"
                                >
                                    {pathIdx + 1}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-53: 맵 보기 모드 — 보스 이동 경로. 빨간 동그라미 + B{idx+1} 라벨. */}
                    {showPathView && bossMoveHistory && (() => {
                        const bIdx = bossMoveHistory.indexOf(tile.id);
                        if (bIdx < 0) return null;
                        return (
                            <g className="boss-path-dot" pointerEvents="none">
                                <circle cx={x + 28} cy={y - 2} r="12" fill="#e94560" stroke="#1a1a2e" strokeWidth="1" />
                                <text
                                    x={x + 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#fff"
                                    fontSize="10"
                                    fontWeight="800"
                                >
                                    {`B${bIdx + 1}`}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-70 (2026-04-24 요한 지시): 실패 시 탈출구 위치 공개.
                        showPathView 모드에서 tile.type==='exit'이면 항상 🚪 마커 노출.
                        유저가 '저기가 탈출구였구나' 복기 가능. */}
                    {showPathView && tile.type === 'exit' && (
                        <g className="exit-marker" pointerEvents="none">
                            <circle cx={x - 28} cy={y - 2} r="14" fill="#2196F3" stroke="#1a1a2e" strokeWidth="1.5" opacity="0.95" />
                            <text
                                x={x - 28}
                                y={y + 4}
                                textAnchor="middle"
                                fontSize="14"
                            >
                                🚪
                            </text>
                        </g>
                    )}
                </g>
            );
        }

        // 게임 맵 컴포넌트
        //
        // D-46 (2026-04-22 요한 지시): LootToast를 .map-container(스크롤 영역)
        // 밖으로 빼고 .map-area 래퍼의 형제로 둔다. 이전(D-39)에는 맵 안에 넣어
        // "맵에서 획득" 공간감을 살렸지만, 모바일에서 맵을 스크롤하면 absolute
        // 자식이 콘텐츠와 함께 밀려 시야에서 사라지는 문제가 있었음.
        // .map-area는 HUD 바로 아래 영역이라, 토스트는 스크롤과 무관하게
        // 그 상단에 고정으로 뜨고 HUD/카드와도 겹치지 않는다.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, lootToast, onLootToastDone, tileEventToast, onTileEventToastDone, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, moveHistory, bossMoveHistory, showPathView }) {
            // D-53: [맵 보기] 모드에서는 방문/발견 여부와 무관하게 모든 비어있지 않은 타일 공개.
            // 미방문 타일은 HexTile 내부에서 반투명 회색으로 그린다.
            const visibleTiles = showPathView
                ? tiles.filter(t => !t.isEmpty)
                : tiles.filter(t => t.visited || t.discovered || t.revealed);
            const containerRef = React.useRef(null);

            // D-54: 플레이 그리드 주변에 넉넉한 빈 패딩을 두어 스크롤해도 "끝"이
            // 안 보이게 한다. SVG 총 크기는 mapGenerator가 PADDING_HEXES 반영해 산출.
            const mapExtent = React.useMemo(() => {
                const gen = new MapGenerator(MAP_SIZE);
                return gen.getMapExtent();
            }, []);

            // D-47 (2026-04-22 요한 지시): 게임 시작 시 현재 위치 타일이 스크롤
            // 뷰포트 중앙에 오도록 1회 정렬. 이전엔 항상 (0,0)에서 시작해 매번
            // 시작 위치를 찾아야 했음.
            // useLayoutEffect로 paint 전에 스크롤을 잡아 깜빡임 없음.
            // 마운트 시 1회만 — 이후 이동 자유, 자동 추적은 안 함.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-50: 엔티티 말(piece) — 타일 위에 얹히는 SVG text 오버레이.
            // 체스말처럼 타일 사이를 옮겨다니는 "엔티티" 표현. 배경(지형)은 그대로.
            // 나중에 사냥감(prey) 아이콘도 같은 패턴으로 추가될 예정.
            const playerPos = tiles[currentTile] && tiles[currentTile].position;
            const bossPiecePos = (boss && bossVisible && tiles[boss.position])
                ? tiles[boss.position].position
                : null;

            return (
                <div className="map-area">
                    <div className="map-container" ref={containerRef}>
                        <svg className="map-svg" width={mapExtent.totalWidth} height={mapExtent.totalHeight}>
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                    preys={preys}
                                    preyTraceTiles={preyTraceTiles}
                                    carcassTiles={carcassTiles}
                                    carcassTraceTiles={carcassTraceTiles}
                                    moveHistory={moveHistory}
                                    bossMoveHistory={bossMoveHistory}
                                    showPathView={showPathView}
                                />
                            ))}
                            {playerPos && (
                                <text
                                    className="piece piece-player"
                                    x={playerPos.x}
                                    y={playerPos.y + 11}
                                    textAnchor="middle"
                                    fontSize="32"
                                    fontWeight="700"
                                    fill="#fff"
                                    stroke="#1a1a2e"
                                    strokeWidth="1.5"
                                    paintOrder="stroke"
                                >
                                    ♟
                                </text>
                            )}
                            {bossPiecePos && (
                                <text
                                    className="piece piece-boss"
                                    x={bossPiecePos.x}
                                    y={bossPiecePos.y + 11}
                                    textAnchor="middle"
                                    fontSize="30"
                                >
                                    🦖
                                </text>
                            )}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                    <TileEventToast toast={tileEventToast} onDone={onTileEventToastDone} />
                </div>
            );
        }

        // 타일 이벤트 모달 컴포넌트 — 함정만 사용.
        // D-52 (2026-04-23 요한 지시): '풍족한 땅(구 좋은 곳)'은 모달 → 토스트로 이관.
        // 함정은 피해 정보가 있어 명시적 확인이 필요하므로 모달 유지.
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;

            const getEventInfo = () => {
                switch(tile.type) {
                    case 'trap':
                        return {
                            emoji: '⚠️',
                            title: '함정!',
                            message: tile.damage ? `생명력이 ${tile.damage} 감소했습니다!` : '위험한 함정이 있습니다!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
                            {eventInfo.emoji}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: '600', marginBottom: '15px' }}>
                            {eventInfo.title}
                        </div>
                        <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                            {eventInfo.message}
                        </div>
                        <button 
                            onClick={onClose}
                            style={{ 
                                background: 'white',
                                color: eventInfo.color,
                                border: 'none',
                                padding: '12px 30px',
                                fontSize: '16px',
                                fontWeight: '600',
                                borderRadius: '6px',
                                cursor: 'pointer'
                            }}
                        >
                            확인
                        </button>
                    </div>
                </div>
            );
        }

        // 아이템 정보창 — 이름/등급/가방칸수/성능(effect)/사용 버튼
        //
        // 데이터 소스 우선순위:
        //   1) window.TTD_DATA.ITEMS (Notion SSOT) — '이름'으로 조회, effect 포함
        //   2) InventorySystem.ITEMS[item.type] — 구버전 폴백
        function ItemInfoModal({ item, onUse, onClose }) {
            const invDef = InventorySystem.ITEMS[item.type] || {};
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const notionItem = notionItems.find(it => it && it['이름'] === (invDef.name || item.name));
            // D-51: 무기 메타 — TTD_DATA.WEAPONS에서 직접 조회 (아이템마스터 탭이 아님).
            const weaponsBundle = (window.TTD_DATA && Array.isArray(window.TTD_DATA.WEAPONS)) ? window.TTD_DATA.WEAPONS : [];
            const weaponDef = weaponsBundle.find(w => w && w.id === item.type);

            const effect = (notionItem && notionItem.effect) || null;
            const usable = !!(effect && effect.usable);
            const effectLabel = window.EffectParser
                ? window.EffectParser.describeEffect(effect)
                : (effect && effect.raw) || '효과 없음';

            const grade = (notionItem && notionItem['아이템 등급'])
                || (weaponDef && weaponDef['아이템 등급'])
                || null;
            const slot = (notionItem && notionItem['가방칸수'])
                || (weaponDef && weaponDef['가방칸수'])
                || '1x1';
            // D-51: 무기 내구도 표시 (인스턴스 durabilityLeft / 최대 durability).
            const resolved = InventorySystem.resolveDef(item.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0) ? resolved.durability : null;
            const durLeft = (typeof item.durabilityLeft === 'number') ? item.durabilityLeft : maxDur;
            const description = (notionItem && notionItem['설명 텍스트'])
                || (weaponDef && weaponDef['설명 텍스트'])
                || '';

            return (
                <div
                    className="modal"
                    style={{ zIndex: 1000 }}
                    onClick={onClose}
                >
                    <div
                        className="modal-content"
                        style={{ maxWidth: '320px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ margin: 0 }}>{invDef.name || item.name}</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>

                        <div style={{ fontSize: '13px', lineHeight: '1.7', color: '#ddd' }}>
                            {grade && <div>등급: <span style={{ color: '#fff' }}>{grade}</span></div>}
                            <div>가방칸수: <span style={{ color: '#fff' }}>{slot}</span></div>
                            <div>성능: <span style={{ color: usable ? '#8bd17c' : '#888' }}>{effectLabel}</span></div>
                            {maxDur && (
                                <div>내구도: <span style={{ color: '#d4b84a' }}>{durLeft}/{maxDur}</span></div>
                            )}
                            {description && (
                                <div style={{ marginTop: '8px', fontSize: '11px', color: '#aaa' }}>
                                    {description}
                                </div>
                            )}
                        </div>

                        <div style={{ marginTop: '14px', display: 'flex', gap: '8px' }}>
                            <button
                                onClick={onUse}
                                disabled={!usable}
                                style={{
                                    flex: 1,
                                    padding: '10px',
                                    background: usable ? '#4CAF50' : '#555',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? '사용' : '사용 불가'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 인벤토리 모달 컴포넌트
        //
        // 아이템 인터랙션 분기:
        //   - 짧은 탭 (< 400ms 내에 떼면) → 정보창 모달
        //   - 긴 누름 (≥ 400ms 유지) → 기존 동작(선택/이동/머지/회전)
        // 임계값 400ms 채택 근거: Android 표준 long-press(500ms)보다 살짝 빠르게, iOS 기본(≈300ms)보다는 여유롭게.
        // 게임은 연타/드래그가 잦아 짧은 의도를 놓치면 답답하고, 반대로 너무 짧으면 스와이프가 잘못 인식된다.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onFlashMessage }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // 확정 대기 위치 (그리드 셀을 눌러 지정)
            const [pendingPos, setPendingPos] = React.useState(null);
            // 정보창으로 띄울 아이템 (null이면 정보창 닫힘)
            const [infoItem, setInfoItem] = React.useState(null);

            // D-47: 가방 크기는 inventory 인스턴스 기준. disabled 셀은 inventory.isDisabled로.
            const ROWS = inventory.rows, COLS = inventory.cols, CELL = 47, PAD = 4;
            const LONG_PRESS_MS = 400;

            // 프레스 상태를 ref로 관리해 재렌더 없이 타이머/가드 갱신.
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // 기존 탭(=롱프레스) 경로: 선택/원복
            const activateSelect = (item) => {
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                }
                // 다른 아이템으로 전환은 셀 클릭 경로에서 처리 (교체/머지)
            };

            // 짧은 탭: 정보창 열기. 단, 이미 선택 모드라면 "즉시 머지/조합" 분기.
            //
            // D-32 (요한 지시 2026-04-22): 롱프레스 → 짧은 탭 조합으로 드래그·확정 버튼 없이
            //   한 번에 머지/조합까지 간다. 산딸기+산딸기→딸기모둠 같은 흐름이 탭 두 번이면 끝.
            //   - 같은 아이템을 다시 탭: 선택 취소(토글).
            //   - 같은 type & 머지 가능 → 즉시 머지.
            //   - 다른 type & 조합 매칭 → 즉시 조합.
            //   - 그 외: 기존대로 selectItem 경로(선택 전환) — 드래그로 빈 칸에 옮기는 기존 UX는 살림.
            // D-48: confirmPlacement 결과 반영 공통 헬퍼.
            //   - merge: 즉시 실행 (기존 동작).
            //   - swap: 새 아이템으로 선택 전환.
            //   - place: 배치 후 선택 해제.
            //   합성 패널은 이제 '선택된 아이템 기준'으로 자동 노출되므로 craft_prompt 경로 폐기.
            const applyDropResult = (res) => {
                if (!res || !res.ok) return false;
                if (res.action === 'swap') {
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                    return true;
                }
                setSelectedItem(null);
                setPendingPos(null);
                if (onFlashMessage && res.resultType && res.action === 'merge') {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    onFlashMessage(`두 재료를 합쳐 ${resultName}을(를) 얻었다.`);
                }
                return true;
            };

            // D-47 [만들기] 버튼 핸들러 — 실제 재료 소비·결과 배치는 inventory.craftRecipe.
            // D-48: 성공 시 선택 해제 (재료가 선택된 아이템이었을 수 있음). 패널은 selectedItem
            //   기반이라 해제만 해도 자동으로 닫힘.
            const handleCraft = (recipe) => {
                const res = inventory.craftRecipe(recipe);
                if (res.ok) {
                    if (onFlashMessage) {
                        const resultDef = InventorySystem.ITEMS[res.resultType] || {};
                        const name = resultDef.name || res.resultType;
                        // D-71: count>1 레시피 — produced/overflow 안내.
                        const produced = Number(res.produced || 1);
                        let msg = produced > 1
                            ? `재료를 조합해 ${name} ${produced}개를 만들었다.`
                            : `재료를 조합해 ${name}을(를) 만들었다.`;
                        if (res.overflow > 0) msg += ` (가방이 가득 차 ${res.overflow}개는 두고 왔다.)`;
                        onFlashMessage(msg);
                    }
                    inventory.selectedItem = null;
                    setSelectedItem(null);
                    setPendingPos(null);
                } else if (res.reason === 'no_space') {
                    if (onFlashMessage) onFlashMessage('가방이 가득 차 만들 수 없다.');
                } else if (res.reason === 'short_ingredients') {
                    if (onFlashMessage) onFlashMessage('재료가 부족하다.');
                }
                bump();
            };

            const openInfo = (item) => {
                if (selectedItem) {
                    if (selectedItem.id === item.id) {
                        // 토글: 동일 아이템 탭 = 선택 해제
                        inventory.cancelSelection();
                        setSelectedItem(null);
                        setPendingPos(null);
                        bump();
                        return;
                    }

                    const canMerge = inventory.canMerge(selectedItem, item);
                    // D-47: "다른 재료 + 관련 레시피 존재" 감지 → confirmPlacement가
                    //   craft_prompt 반환 → 합성 패널 오픈.
                    const hasCraftCandidate = selectedItem.type !== item.type
                        && InventorySystem.findRecipesContainingAny(selectedItem.type, item.type).length > 0;

                    if (canMerge || hasCraftCandidate) {
                        const res = inventory.confirmPlacement(item.x, item.y);
                        applyDropResult(res);
                        bump();
                        return;
                    }

                    // 머지/조합 후보 없음 — 선택 전환.
                    activateSelect(item);
                    return;
                }
                setInfoItem(item);
            };

            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // 마우스 우클릭/중간클릭 무시
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    activateSelect(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) openInfo(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // 레거시: 기존 onClick 경로 유지 (키보드 접근성/기존 테스트 호환).
            // 포인터 기반 분기가 발동하면 longFired가 true가 되어 중복 호출되지 않도록 가드.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // 포인터 이벤트가 쓰이지 않는 환경에서의 폴백
                openInfo(item);
            };

            // 사용 버튼 — 효과 적용 후 일회용이면 인벤에서 제거, 정보창 닫기
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // 아이템 제거
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                applyDropResult(res);
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // D-45 (2026-04-23): 선택한 아이템을 인벤토리에서 영구 제거.
            // - 1회 확정. 롱프레스로 이미 선택된 상태라 오조작 확률이 낮아 별도 확인창 없음.
            // - 공간이 꽉 찼을 때 탈출 수단이자 불필요한 1단계 부산물 정리용.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();
                setSelectedItem(null);
                setPendingPos(null);
                if (discarded && onFlashMessage) {
                    onFlashMessage(`${discarded.name}을(를) 버렸다.`);
                }
                bump();
            };

            // 미리보기 가능 여부 (현재 pendingPos에 selectedItem이 들어갈 수 있는가)
            //   D-47: 'combine' kind 폐기 — 조합은 이제 합성 패널 경유. 다른 재료 +
            //         관련 레시피 있음 = 'craft' kind, 아니면 'swap'.
            //   disabled 셀(가방 구석 비활성)을 하나라도 침범하면 'blocked'.
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                for (let dy = 0; dy < shape.length; dy++) {
                    for (let dx = 0; dx < shape[0].length; dx++) {
                        if (shape[dy][dx] === 1 && inventory.isDisabled(x + dx, y + dy)) {
                            return { ok: false, kind: 'blocked' };
                        }
                    }
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    const t = overlap[0];
                    if (inventory.canMerge(selectedItem, t)) return { ok: true, kind: 'merge' };
                    return { ok: true, kind: 'swap' };
                }
                return { ok: false, kind: 'blocked' };
            })();

            // D-48: 선택된 아이템의 type이 포함된 모든 레시피 → 하단 CraftPanel에 노출.
            //   선택 해제 시 null이 되어 패널도 자동으로 닫힘.
            //   매 렌더마다 계산 (combos 수가 적어 비용 무시 가능).
            const pendingCraft = (() => {
                if (!selectedItem) return null;
                const candidates = InventorySystem.findRecipesContainingAny(selectedItem.type, selectedItem.type);
                if (!candidates || candidates.length === 0) return null;
                return {
                    pair: [selectedItem.type],
                    pairItemIds: [selectedItem.id],
                    candidates
                };
            })();

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                            <h3>가방</h3>
                            <button onClick={() => { inventory.cancelSelection(); closeInventory(); }}>닫기</button>
                        </div>
                        <div style={{ position: 'relative' }}>
                            <div className="inventory-grid">
                                {Array(ROWS).fill(null).map((_, row) =>
                                    Array(COLS).fill(null).map((_, col) => {
                                        const disabled = inventory.isDisabled(col, row);
                                        const occupied = !disabled && inventory.grid[row][col];
                                        return (
                                            <div
                                                key={`${row}-${col}`}
                                                className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                                onClick={() => {
                                                    if (disabled) return;
                                                    handleCellClick(row, col);
                                                }}
                                            />
                                        );
                                    })
                                )}
                            </div>

                            {/* 확정 대기 미리보기 */}
                            {selectedItem && pendingPos && previewInfo && (
                                <div
                                    className={`inventory-preview ${previewInfo.ok ? 'ok' : 'bad'} ${previewInfo.kind}`}
                                    style={{
                                        position: 'absolute',
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                        pointerEvents: 'none'
                                    }}
                                />
                            )}

                            {/* 그리드에 배치된 아이템들.
                                D-47: 머지 가능(같은 type 2개 이상 + mergeable) 시 우상단 체크 아이콘. */}
                            {inventory.items.filter(i => !selectedItem || i.id !== selectedItem.id).map(item => {
                                const def = InventorySystem.resolveDef(item.type) || {};
                                const sameTypeCount = inventory.items.filter(i => i.type === item.type).length;
                                const canAutoMerge = !!def.mergeable && !!def.merge_result && sameTypeCount >= 2;
                                return (
                                    <div
                                        key={item.id}
                                        className="inventory-item"
                                        style={{
                                            left: `${item.x * CELL + PAD}px`,
                                            top: `${item.y * CELL + PAD}px`,
                                            width: `${item.shape[0].length * CELL - PAD}px`,
                                            height: `${item.shape.length * CELL - PAD}px`
                                        }}
                                        onPointerDown={(e) => onItemPointerDown(e, item)}
                                        onPointerUp={(e) => onItemPointerUp(e, item)}
                                        onPointerCancel={onItemPointerCancel}
                                        onPointerLeave={onItemPointerCancel}
                                        onContextMenu={(e) => e.preventDefault()}
                                    >
                                        {item.name}
                                        {canAutoMerge && (
                                            <span className="inventory-merge-check" title="같은 재료가 있어 머지 가능">
                                                ✓
                                            </span>
                                        )}
                                    </div>
                                );
                            })}

                            {/* 공중에 뜬 선택 아이템 (pendingPos를 따라감) */}
                            {selectedItem && pendingPos && (
                                <div
                                    className="inventory-item floating selected"
                                    style={{
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(selectedItem); }}
                                >
                                    {selectedItem.name}
                                </div>
                            )}
                        </div>

                        {selectedItem ? (
                            <div style={{ marginTop: '10px', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                <button onClick={handleRotate}>회전</button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={!previewInfo || !previewInfo.ok}
                                >
                                    확정{previewInfo && previewInfo.ok && previewInfo.kind !== 'place'
                                        ? ` (${previewInfo.kind === 'merge' ? '머지' : '교체'})`
                                        : ''}
                                </button>
                                <button onClick={handleCancel}>취소</button>
                                {/* D-45 (2026-04-23): 버리기 — 빨강 톤, 1회 확정.
                                    - 파밍으로 공간이 꽉 찼을 때 탈출 수단.
                                    - 머지/조합 대상이 없는 부산물(낡은 재료 등) 정리용. */}
                                <button
                                    onClick={handleDiscard}
                                    style={{
                                        marginLeft: 'auto',
                                        background: '#6b2a2f',
                                        color: '#f4d4d8',
                                        border: '1px solid #8a3a42',
                                    }}
                                >
                                    버리기
                                </button>
                            </div>
                        ) : (
                            <div style={{ marginTop: '10px', fontSize: '11px', color: '#aaa' }}>
                                짧게 탭 = 정보 · 길게 누르면 선택해서 이동/머지
                            </div>
                        )}
                        {/* D-48 합성 패널 — 선택된 아이템 기준으로 관련 레시피 자동 노출.
                            닫기 = 선택 해제 (패널은 selectedItem이 null이면 자동으로 닫힘). */}
                        {pendingCraft && (
                            <CraftPanel
                                recipes={pendingCraft.candidates}
                                inventory={inventory}
                                onCraft={handleCraft}
                                onClose={() => {
                                    inventory.cancelSelection();
                                    setSelectedItem(null);
                                    setPendingPos(null);
                                    bump();
                                }}
                            />
                        )}
                    </div>

                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={handleUseFromInfo}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // 카드로 아이템 사용 — 공통 모달 (프레임워크 D-23의 첫 구현체).
        //
        // 역할:
        //   카드 사용 시 consume 스펙이 있으면, 인벤토리에서 필터를 통과하는 아이템 목록을
        //   간략히 보여주고, 유저가 하나를 고르면 onSelect(item) 콜백.
        //
        // 왜 InventoryModal을 재사용하지 않는가:
        //   - 인벤 본 UI는 테트리스식 배치/머지/회전/롱프레스까지 복잡. 카드 사용 맥락에서는
        //     오로지 "필터 통과 아이템 선택"만 필요하므로 경량 리스트 UI가 판단 비용이 적다.
        //   - 향후 대상 수가 많아지면 이 모달을 grid/sprite로 확장하거나, 공유 셀렉터 컴포넌트로 추출.
        //
        // props:
        //   inventory:      InventorySystem 인스턴스
        //   filter:         (invItem, notionItem) => bool
        //   titleText:      상단 라벨 (예: "휴식할 음식 고르기")
        //   emptyText:      필터 통과 아이템 0개일 때 메시지
        //   onSelect(item): 확정
        //   onClose():      취소
        // D-36 (2026-04-22, 요한 지시):
        //   scales({recover: N})이 있으면 "효과가 N배" 임을 시각적으로 강조한다.
        //   - 제목 아래 안내 문구 (노란색)
        //   - 각 음식 효과 요약의 "배고픔 +1"을 "배고픔 +1 +1"로 변형하고
        //     증분 "+1" 만 노란색(#d4b84a)으로 띄운다. 효과가 2개 이상인 아이템은
        //     각 증분을 같은 방식으로 처리. scale이 걸릴 수 있는 건 양수 delta stat뿐.
        //   - scale이 없거나 1이면 기존 UI와 동일.
        //   이 표현은 휴식 외 향후 consume 카드에도 재사용 가능하도록 일반화.
        // D-57 (2026-04-24 요한 지시): 바베큐 경로 제거, 요리 시스템으로 전면 교체.
        //   - extraOptions/onExtraSelect 제거.
        //   - onCookClick + canCook prop 추가: 휴식 카드에서만 [🔥 요리] 버튼 노출.
        //     hintText 아래에 항상 표시, canCook=false면 회색 비활성.
        //   - 클릭 시 이 모달 닫지 않고 부모가 별도 CookingModal을 띄워 덮는다.
        function CardItemConsumeModal({ inventory, filter, scales, bonuses, hintText, titleText, emptyText, onSelect, onClose, onCookClick, canCook }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['이름'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const recoverBonus = (bonuses && typeof bonuses.recover === 'number') ? bonuses.recover : 0;
            const hasRecoverBoost = recoverScale !== 1 || recoverBonus !== 0;

            // D-81 (2026-04-24): 가방 그리드에 없는 아이템(선택으로 공중에 뜬 상태 등)은
            //   리스트에서 제외. inventory.items는 selectedItem도 포함하므로, selected는 사용 불가로 간주.
            //   가방 "닫기" 경로에서 cancelSelection 보장이 주 방어선, 이것은 엣지 케이스 이중 방어.
            const selectedId = inventory?.selectedItem?.id;
            const candidates = (inventory?.items || []).filter(invItem => {
                if (selectedId && invItem.id === selectedId) return false;
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            });
            const hasAny = candidates.length > 0;
            const showCookBtn = typeof onCookClick === 'function';

            // 아이템 효과 요약 표시 — scale이 있으면 원본 delta + 증분을 나란히 보여준다.
            // 반환: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['효과 요약'];
                const canScale = hasRecoverBoost && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // 폴백: 원본 효과 요약만 표시 (기존 동작)
                    return summary
                        ? (
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                                {summary}
                            </div>
                        )
                        : null;
                }

                // 각 action을 "기본 라벨 + (노란색 증분)" 형태로 렌더.
                // 예: action {stat:'hunger', delta:1}, recoverScale=2 → '배고픔 +1 +1'
                //     배고픔(회색) / '+1'(회색) / '+1'(노란색 = 증분)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scale이 안 걸리는 action(감소/spawn_card 등)은 기본 describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? '배고픔'
                                : a.stat === 'health' ? '생명력'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    // scale(곱) → bonus(합) 순서로 적용한 최종 delta - 원본 delta
                    const scaledDelta = a.delta * recoverScale + recoverBonus;
                    const bonus = Math.round(scaledDelta - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || '아이템 선택'}</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {/* D-57 요리 버튼 — 휴식 카드에서만 onCookClick 주입. canCook=false면 회색.
                            위치: hintText 바로 아래, 아이템 목록 위. */}
                        {showCookBtn && (
                            <button
                                onClick={() => { if (canCook) onCookClick(); }}
                                disabled={!canCook}
                                style={{
                                    width: '100%',
                                    textAlign: 'center',
                                    padding: '10px 12px',
                                    marginBottom: '10px',
                                    background: canCook ? '#5a3a1f' : '#2a2a2e',
                                    border: `1px solid ${canCook ? '#d4883a' : '#444'}`,
                                    color: canCook ? '#ffd79e' : '#888',
                                    fontWeight: 600,
                                    fontSize: '14px',
                                    cursor: canCook ? 'pointer' : 'not-allowed'
                                }}
                            >
                                🔥 요리하기
                            </button>
                        )}
                        {!hasAny ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || '쓸 만한 아이템이 없다.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {
                                    const def = InventorySystem.ITEMS[invItem.type] || {};
                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}
                                            style={{
                                                textAlign: 'left',
                                                padding: '10px 12px',
                                                background: '#0f3460',
                                                border: '1px solid #16213e'
                                            }}
                                        >
                                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{def.name || invItem.name}</div>
                                            {renderEffectRow(notionItem)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-57 (2026-04-24 요한 지시): 요리 모달.
        //   - 휴식 카드의 [🔥 요리하기] 버튼에서만 호출.
        //   - 1재료 요리 레시피(ingredients.length===1 && result.startsWith('grilled_'))만 노출.
        //   - 각 레시피 카드: 재료 → 결과물 미리보기 + [🔥 요리하기] 버튼.
        //     재료 보유 시만 활성. 클릭 시 inventory.craftRecipe 호출 → 결과물 생성.
        //   - 휴식 모달은 백그라운드에 유지 — 완성된 구이를 바로 식사 후보로 선택 가능.
        function CookingModal({ inventory, onCook, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byId = (id) => notionItems.find(it => it && it.id === id);
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => {
                const nDef = byId(type);
                if (nDef && nDef['이름']) return nDef['이름'];
                return defOf(type).name || type;
            };

            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                ? window.TTD_DATA.COMBOS : [];
            const recipes = combos.filter(r =>
                r && Array.isArray(r.ingredients)
                && r.ingredients.length === 1
                && typeof r.result === 'string'
                && r.result.startsWith('grilled_')
            );

            const items = (inventory && inventory.items) || [];
            const countOf = (type) => items.filter(i => i.type === type).length;

            return (
                <div className="modal" style={{ zIndex: 1200 }} onClick={onClose}>
                    <div

                        style={{ maxWidth: '360px', minWidth: '260px' }}

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>

                                    const ingType = recipe.ingredients[0];
                                    const has = countOf(ingType);
                                    const canDo = has >= 1;
                                    const ingName = nameOf(ingType);
                                    const resultName = nameOf(recipe.result);
                                    const resultMeta = byId(recipe.result);
                                    const summary = resultMeta && resultMeta['효과 요약'];
                                    return (
                                        <div
                                            key={`cook:${idx}:${recipe.result}`}

                                                padding: '10px 12px',
                                                background: canDo ? '#2a1f14' : '#1a1f2e',
                                                border: `1px solid ${canDo ? '#5a3a1f' : '#333'}`,
                                                borderRadius: '6px'
                                            }}
                                        >
                                            <div style={{ fontSize: '13px', marginBottom: '6px' }}>
                                                <span style={{ color: canDo ? '#ffd79e' : '#888' }}>{ingName}</span>
                                                <span style={{ color: '#666', margin: '0 6px' }}>→</span>
                                                <span style={{ color: canDo ? '#fff' : '#888', fontWeight: 600 }}>{resultName}</span>
                                                <span style={{ color: '#888', marginLeft: '8px', fontSize: '11px' }}>
                                                    (보유 {has})
                                                </span>
                                            </div>
                                            {summary && (
                                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '6px' }}>
                                                    {summary}

                                            <button
                                                onClick={() => canDo && onCook(recipe)}
                                                disabled={!canDo}
                                                style={{
                                                    width: '100%',
                                                    padding: '8px',
                                                    background: canDo ? '#5a3a1f' : '#2a2a2e',
                                                    border: `1px solid ${canDo ? '#d4883a' : '#444'}`,
                                                    color: canDo ? '#ffd79e' : '#888',
                                                    fontSize: '12px',
                                                    fontWeight: 600,
                                                    cursor: canDo ? 'pointer' : 'not-allowed'

                                            >

                                    );
