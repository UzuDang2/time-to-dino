<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 타임투다이노</title>
    
    <!-- 스타일 -->
    <link rel="stylesheet" href="gameStyles.css">
    
    <!-- 외부 라이브러리 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 데이터 번들 (시트 + Notion 아이템 SSOT 스냅샷, scripts/fetch_data.py로 재생성) -->
    <script src="data/data.js"></script>

    <!-- 게임 모듈 -->
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script src="dropTable.js"></script>
    <script src="effectParser.js"></script>
    <script src="combatDeck.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // React 컴포넌트들
        // ============================================

        // 상단 스탯 패널 컴포넌트
        //
        // D-27 HUD 리뉴얼 (요한 지시 2026-04-22):
        // - 생명력/배고움은 게이지(바) — 발각률 바 스타일 답습, 게임 다크톤 유지.
        // - 배고픔 <= 3일 때 노란색(#d4b84a, 채도 낮춤)으로 경고.
        // - 시간은 숫자가 아닌 '시계 아이콘'. maxTime만큼 표시하고 소모된 만큼 어둡게.
        // - 시간 전부 소모(time >= maxTime) 시 숫자/아이콘 모두 빨강으로 경고.
        // - 게임 다크 분위기와 조화를 위해 빨강/노랑 채도는 낮게 유지.
        //
        // D-37 HUD 2줄 압축 (요한 지시 2026-04-22, 7차 세션):
        // - 상단 HUD 세로 길이를 줄여 모바일에서 맵 가시 영역 확보.
        // - 1줄: [생명력 게이지][배고픔 게이지][시간 시계]  (3개 한 줄)
        // - 2줄: [보스 순찰/추격][발각률 바]             (2개 한 줄, 발각 바는 flex-grow)
        // - 라벨 제거, 아이콘만 표시. 숫자 폰트 크기 축소.
        // - 게이지 높이 12 → 10, 발각 바 20 → 14.
        // - 기존 stat-box padding 축소 필요 시 인라인으로만 오버라이드(전역 .stat-box는 다른 곳에서 재사용).
        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            const MAX_HEALTH = 6;
            const MAX_HUNGER = 12;
            const healthPct = Math.max(0, Math.min(100, (health / MAX_HEALTH) * 100));
            const hungerPct = Math.max(0, Math.min(100, (hunger / MAX_HUNGER) * 100));

            // 채도 낮춘 경고색 (다크톤 조화). 기본은 기존 팔레트 유지.
            const healthColor = health <= 0
                ? '#8a2b3a'
                : health <= 2 ? '#c04a5e' : '#b24656';
            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // 컴팩트 stat-box 스타일 — 2줄 HUD에서 높이를 낮추기 위해 padding 축소.
            const compactBox = { padding: '5px 7px' };

            return (
                <div>
                    {/* 1줄: 생명력 · 배고픔 · 시간 (3개 한 줄) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>
                        <StatGauge
                            icon="❤️"
                            value={health}
                            max={MAX_HEALTH}
                            pct={healthPct}
                            color={healthColor}
                            valueColor="#eee"
                            flex={1}
                        />
                        <StatGauge
                            icon="🍖"
                            value={hunger}
                            max={MAX_HUNGER}
                            pct={hungerPct}
                            color={hungerColor}
                            valueColor={hungerLow ? '#d4b84a' : '#eee'}
                            flex={1}
                        />
                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): 남은 회수 표시로 반전.
                                    - 밝은 아이콘 = 아직 쓸 수 있는 회수, 어두운 아이콘 = 소모됨.
                                    - 시작 3/3 → 전부 소모 시 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // i가 작을수록 먼저 소모됨. 남은 개수는 (maxTime - time).
                                    const remaining = i < (maxTime - time);
                                    return (
                                        <span
                                            key={i}
                                            style={{
                                                fontSize: '14px',
                                                lineHeight: 1,
                                                opacity: remaining ? 1 : 0.25,
                                                filter: timeEmpty
                                                    ? 'grayscale(1) brightness(0.9)'
                                                    : remaining ? 'none' : 'grayscale(1) brightness(0.7)',
                                                color: timeEmpty ? '#c04a5e' : undefined,
                                                transition: 'all 0.2s'
                                            }}
                                        >
                                            🕰️
                                        </span>
                                    );
                                })}
                            </div>
                            <span style={{
                                fontSize: '11px',
                                fontWeight: '600',
                                color: timeTextColor,
                            }}>
                                {maxTime - time}/{maxTime}
                            </span>
                        </div>
                    </div>

                    {/* 2줄: 보스 상태 · 발각률 바 (발각 바가 남은 폭 차지) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',
                                fontSize: '12px',
                                fontWeight: '600',
                                flexShrink: 0,
                                color: boss?.chaseMode ? '#e94560' : '#eee'
                            }}
                            title={boss?.chaseMode ? '추격 중' : '순찰 중'}
                        >
                            {boss?.chaseMode ? '🔴 추격' : '🟢 순찰'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>🚨</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',
                                position: 'relative'
                            }}>
                                <div style={{
                                    width: `${detection}%`,
                                    height: '100%',
                                    background: detectionColor,
                                    transition: 'all 0.3s'
                                }} />
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '10px',
                                    fontWeight: '600',
                                    color: '#fff',
                                    textShadow: '0 0 2px rgba(0,0,0,0.6)'
                                }}>
                                    {detection}%
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px', padding: '6px 8px' }}>
                        {message}
                    </div>
                </div>
            );
        }

        // 스탯 게이지 — 발각률 바와 동일 구조. 아이콘 + 게이지 + 숫자.
        // D-37: 라벨 제거·컴팩트 padding. `flex` prop으로 외부에서 너비 배분 제어.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex }) {
            return (
                <div className="stat-box" style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                        <span style={{ fontSize: '13px', lineHeight: 1 }}>{icon}</span>
                        <div style={{
                            flex: 1,
                            background: '#0f3460',
                            height: '10px',
                            borderRadius: '5px',
                            overflow: 'hidden',
                            minWidth: 0
                        }}>
                            <div style={{
                                width: `${pct}%`,
                                height: '100%',
                                background: color,
                                transition: 'all 0.3s'
                            }} />
                        </div>
                        <span style={{
                            fontSize: '11px',
                            fontWeight: '600',
                            color: valueColor,
                            minWidth: '28px',
                            textAlign: 'right',
                            flexShrink: 0
                        }}>
                            {value}/{max}
                        </span>
                    </div>
                </div>
            );
        }

        // 손패 카드 컴포넌트
        // 손패 상한 5장(HAND_SIZE) — 5열 그리드로 한 줄에 표시한다.
        // 한 줄에 모든 카드가 들어가야 상단 UI가 스크롤 없이 유지됨(기획 원칙: 하단 맵 스크롤만 허용).
        // 좁은 폭에서는 폰트/패딩이 이미 10~13px이라 5열도 안정.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map(card => (
                        <div key={card.uid} className="card" onClick={() => useCard(card)}>
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                발각 {card.detection > 0 ? '+' : ''}{card.detection}% · ⏰{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 지역 한글 라벨 (기획상 region은 이미 한글이라 매핑 불필요하지만,
        // 추후 영어 코드로 바꿀 여지가 있어 맵을 둔다. 일치하면 그대로 노출).
        const REGION_LABEL = {
            '숲': '숲', '덤불': '덤불', '평원': '평원', '시냇물': '시냇물', '동굴': '동굴',
            forest: '숲', thicket: '덤불', plain: '평원', stream: '시냇물', cave: '동굴'
        };

        // 육각형 타일 컴포넌트
        //
        // D-42 (2026-04-23 요한 지시): 보스 아이콘 노출 조건이 "tile.revealed"에서
        // "bossVisible"로 분리됨. 지형 revealed와 무관하게 bossVisible=true 일 때만
        // 보스가 있는 타일에 🦖 아이콘이 뜬다. 이동하면 setBossVisible(false).
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            // 길이 없는 타일 (connections 없음) 판별
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                // D-42: 보스 타일 배경색도 bossVisible에 연동 — 이동 후엔 평범한 타일로 위장.
                if (boss && tile.id === boss.position && bossVisible) return '#8B0000';
                return '#2d3561';
            };

            const getTileLabel = () => {
                if (!isRevealed && !isCurrent) return '?';
                if (isCurrent) return '내위치';
                if (tile.type === 'exit') return '탈출구';
                if (isBoss) return '🦖';
                if (tile.type === 'good') return '👍';
                if (tile.type === 'trap') return '⚠️';
                return '';
            };

            // 지역 이름 오버레이 — 방문한 타일에만 표시(요한 지시 2026-04-22).
            // revealed만 된 상태(정찰 등)에서는 스포일러 방지를 위해 숨긴다.
            const regionLabel = tile.visited && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile ${isCurrent ? 'current' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={isCurrent ? '#f5f5f5' : getTileColor(tile)}
                        stroke={isCurrent ? 'none' : canMove ? '#4CAF50' : '#0f3460'}
                        strokeWidth={canMove ? '3' : '2'}
                        opacity={isRevealed || isCurrent ? 1 : 0.6}
                        onClick={() => !gameOver && !victory && canMove && moveTo(tile.id)}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    <text
                        x={x}
                        y={y + 5}
                        textAnchor="middle"
                        fill={isCurrent ? '#1a1a2e' : isRevealed ? '#fff' : '#666'}
                        fontSize={isRevealed || isCurrent ? '14' : '24'}
                        fontWeight={isRevealed || isCurrent ? '700' : 'bold'}
                    >
                        {getTileLabel()}
                    </text>
                </g>
            );
        }

        // 게임 맵 컴포넌트
        //
        // D-46 (2026-04-22 요한 지시): LootToast를 .map-container(스크롤 영역)
        // 밖으로 빼고 .map-area 래퍼의 형제로 둔다. 이전(D-39)에는 맵 안에 넣어
        // "맵에서 획득" 공간감을 살렸지만, 모바일에서 맵을 스크롤하면 absolute
        // 자식이 콘텐츠와 함께 밀려 시야에서 사라지는 문제가 있었음.
        // .map-area는 HUD 바로 아래 영역이라, 토스트는 스크롤과 무관하게
        // 그 상단에 고정으로 뜨고 HUD/카드와도 겹치지 않는다.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, lootToast, onLootToastDone }) {
            const visibleTiles = tiles.filter(t => t.visited || t.discovered || t.revealed);

            return (
                <div className="map-area">
                    <div className="map-container">
                        <svg className="map-svg" width="1100" height="1000">
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                />
                            ))}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                </div>
            );
        }

        // 타일 이벤트 모달 컴포넌트
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;
            
            const getEventInfo = () => {
                switch(tile.type) {
                    case 'good':
                        return {
                            emoji: '✨',
                            title: '좋은 곳 발견!',
                            message: '이곳은 휴식하기 좋은 장소입니다.',
                            color: '#FFC107'
                        };
                    case 'trap':
                        return {
                            emoji: '⚠️',
                            title: '함정!',
                            message: tile.damage ? `생명력이 ${tile.damage} 감소했습니다!` : '위험한 함정이 있습니다!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
                            {eventInfo.emoji}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: '600', marginBottom: '15px' }}>
                            {eventInfo.title}
                        </div>
                        <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                            {eventInfo.message}
                        </div>
                        <button 
                            onClick={onClose}
                            style={{ 
                                background: 'white',
                                color: eventInfo.color,
                                border: 'none',
                                padding: '12px 30px',
                                fontSize: '16px',
                                fontWeight: '600',
                                borderRadius: '6px',
                                cursor: 'pointer'
                            }}
                        >
                            확인
                        </button>
                    </div>
                </div>
            );
        }

        // 아이템 정보창 — 이름/등급/가방칸수/성능(effect)/사용 버튼
        //
        // 데이터 소스 우선순위:
        //   1) window.TTD_DATA.ITEMS (Notion SSOT) — '이름'으로 조회, effect 포함
        //   2) InventorySystem.ITEMS[item.type] — 구버전 폴백
        function ItemInfoModal({ item, onUse, onClose }) {
            const invDef = InventorySystem.ITEMS[item.type] || {};
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const notionItem = notionItems.find(it => it && it['이름'] === (invDef.name || item.name));

            const effect = (notionItem && notionItem.effect) || null;
            const usable = !!(effect && effect.usable);
            const effectLabel = window.EffectParser
                ? window.EffectParser.describeEffect(effect)
                : (effect && effect.raw) || '효과 없음';

            const grade = (notionItem && notionItem['아이템 등급']) || null;
            const slot = (notionItem && notionItem['가방칸수']) || '1x1';

            return (
                <div
                    className="modal"
                    style={{ zIndex: 1000 }}
                    onClick={onClose}
                >
                    <div
                        className="modal-content"
                        style={{ maxWidth: '320px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ margin: 0 }}>{invDef.name || item.name}</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>

                        <div style={{ fontSize: '13px', lineHeight: '1.7', color: '#ddd' }}>
                            {grade && <div>등급: <span style={{ color: '#fff' }}>{grade}</span></div>}
                            <div>가방칸수: <span style={{ color: '#fff' }}>{slot}</span></div>
                            <div>성능: <span style={{ color: usable ? '#8bd17c' : '#888' }}>{effectLabel}</span></div>
                            {notionItem && notionItem['설명 텍스트'] && (
                                <div style={{ marginTop: '8px', fontSize: '11px', color: '#aaa' }}>
                                    {notionItem['설명 텍스트']}
                                </div>
                            )}
                        </div>

                        <div style={{ marginTop: '14px', display: 'flex', gap: '8px' }}>
                            <button
                                onClick={onUse}
                                disabled={!usable}
                                style={{
                                    flex: 1,
                                    padding: '10px',
                                    background: usable ? '#4CAF50' : '#555',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? '사용' : '사용 불가'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 인벤토리 모달 컴포넌트
        //
        // 아이템 인터랙션 분기:
        //   - 짧은 탭 (< 400ms 내에 떼면) → 정보창 모달
        //   - 긴 누름 (≥ 400ms 유지) → 기존 동작(선택/이동/머지/회전)
        // 임계값 400ms 채택 근거: Android 표준 long-press(500ms)보다 살짝 빠르게, iOS 기본(≈300ms)보다는 여유롭게.
        // 게임은 연타/드래그가 잦아 짧은 의도를 놓치면 답답하고, 반대로 너무 짧으면 스와이프가 잘못 인식된다.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onFlashMessage }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // 확정 대기 위치 (그리드 셀을 눌러 지정)
            const [pendingPos, setPendingPos] = React.useState(null);
            // 정보창으로 띄울 아이템 (null이면 정보창 닫힘)
            const [infoItem, setInfoItem] = React.useState(null);

            const ROWS = 6, COLS = 5, CELL = 47, PAD = 4;
            const LONG_PRESS_MS = 400;

            // 프레스 상태를 ref로 관리해 재렌더 없이 타이머/가드 갱신.
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // 기존 탭(=롱프레스) 경로: 선택/원복
            const activateSelect = (item) => {
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                }
                // 다른 아이템으로 전환은 셀 클릭 경로에서 처리 (교체/머지)
            };

            // 짧은 탭: 정보창 열기. 단, 이미 선택 모드라면 "즉시 머지/조합" 분기.
            //
            // D-32 (요한 지시 2026-04-22): 롱프레스 → 짧은 탭 조합으로 드래그·확정 버튼 없이
            //   한 번에 머지/조합까지 간다. 산딸기+산딸기→딸기모둠 같은 흐름이 탭 두 번이면 끝.
            //   - 같은 아이템을 다시 탭: 선택 취소(토글).
            //   - 같은 type & 머지 가능 → 즉시 머지.
            //   - 다른 type & 조합 매칭 → 즉시 조합.
            //   - 그 외: 기존대로 selectItem 경로(선택 전환) — 드래그로 빈 칸에 옮기는 기존 UX는 살림.
            const openInfo = (item) => {
                if (selectedItem) {
                    if (selectedItem.id === item.id) {
                        // 토글: 동일 아이템 탭 = 선택 해제
                        inventory.cancelSelection();
                        setSelectedItem(null);
                        setPendingPos(null);
                        bump();
                        return;
                    }

                    const canMerge = inventory.canMerge(selectedItem, item);
                    const canCombine = inventory.canCombine && inventory.canCombine(selectedItem, item);

                    if (canMerge || canCombine) {
                        // 타깃 아이템의 좌표로 확정 배치 → confirmPlacement 내부에서
                        // overlap 1개 = target → merge/combine 분기가 자동 적용.
                        const res = inventory.confirmPlacement(item.x, item.y);
                        if (res.ok) {
                            setSelectedItem(null);
                            setPendingPos(null);
                            if (onFlashMessage && res.resultType) {
                                const resultDef = InventorySystem.ITEMS[res.resultType];
                                const resultName = resultDef ? resultDef.name : res.resultType;
                                if (res.action === 'merge') {
                                    onFlashMessage(`두 재료를 합쳐 ${resultName}을(를) 얻었다.`);
                                } else if (res.action === 'combine') {
                                    onFlashMessage(`재료를 조합해 ${resultName}을(를) 만들었다.`);
                                }
                            }
                        }
                        bump();
                        return;
                    }

                    // 머지/조합 둘 다 불가 — 기존대로 선택 전환(활성화 경로).
                    activateSelect(item);
                    return;
                }
                setInfoItem(item);
            };

            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // 마우스 우클릭/중간클릭 무시
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    activateSelect(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) openInfo(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // 레거시: 기존 onClick 경로 유지 (키보드 접근성/기존 테스트 호환).
            // 포인터 기반 분기가 발동하면 longFired가 true가 되어 중복 호출되지 않도록 가드.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // 포인터 이벤트가 쓰이지 않는 환경에서의 폴백
                openInfo(item);
            };

            // 사용 버튼 — 효과 적용 후 일회용이면 인벤에서 제거, 정보창 닫기
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // 아이템 제거
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                if (!res.ok) {
                    bump();
                    return;
                }
                if (res.action === 'swap') {
                    // 새로 공중에 뜬 아이템으로 선택 전환
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                } else {
                    setSelectedItem(null);
                    setPendingPos(null);
                }
                // D-24: 머지/조합 결과 메시지. 실패 시(resultType 없음)엔 조용히 넘어감.
                if (onFlashMessage && res.resultType) {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    if (res.action === 'merge') {
                        onFlashMessage(`두 재료를 합쳐 ${resultName}을(를) 얻었다.`);
                    } else if (res.action === 'combine') {
                        onFlashMessage(`재료를 조합해 ${resultName}을(를) 만들었다.`);
                    }
                }
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // D-45 (2026-04-23): 선택한 아이템을 인벤토리에서 영구 제거.
            // - 1회 확정. 롱프레스로 이미 선택된 상태라 오조작 확률이 낮아 별도 확인창 없음.
            // - 공간이 꽉 찼을 때 탈출 수단이자 불필요한 1단계 부산물 정리용.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();
                setSelectedItem(null);
                setPendingPos(null);
                if (discarded && onFlashMessage) {
                    onFlashMessage(`${discarded.name}을(를) 버렸다.`);
                }
                bump();
            };

            // 미리보기 가능 여부 (현재 pendingPos에 selectedItem이 들어갈 수 있는가)
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    if (inventory.canMerge(selectedItem, overlap[0])) return { ok: true, kind: 'merge' };
                    if (inventory.canCombine && inventory.canCombine(selectedItem, overlap[0])) return { ok: true, kind: 'combine' };
                    return { ok: true, kind: 'swap' };
                }
                return { ok: false, kind: 'blocked' };
            })();

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                            <h3>가방 (5x6)</h3>
                            <button onClick={closeInventory}>닫기</button>
                        </div>
                        <div style={{ position: 'relative' }}>
                            <div className="inventory-grid">
                                {Array(ROWS).fill(null).map((_, row) =>
                                    Array(COLS).fill(null).map((_, col) => (
                                        <div
                                            key={`${row}-${col}`}
                                            className={`inventory-cell ${inventory.grid[row][col] ? 'occupied' : ''}`}
                                            onClick={() => handleCellClick(row, col)}
                                        />
                                    ))
                                )}
                            </div>

                            {/* 확정 대기 미리보기 */}
                            {selectedItem && pendingPos && previewInfo && (
                                <div
                                    className={`inventory-preview ${previewInfo.ok ? 'ok' : 'bad'} ${previewInfo.kind}`}
                                    style={{
                                        position: 'absolute',
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                        pointerEvents: 'none'
                                    }}
                                />
                            )}

                            {/* 그리드에 배치된 아이템들 */}
                            {inventory.items.filter(i => !selectedItem || i.id !== selectedItem.id).map(item => (
                                <div
                                    key={item.id}
                                    className="inventory-item"
                                    style={{
                                        left: `${item.x * CELL + PAD}px`,
                                        top: `${item.y * CELL + PAD}px`,
                                        width: `${item.shape[0].length * CELL - PAD}px`,
                                        height: `${item.shape.length * CELL - PAD}px`
                                    }}
                                    onPointerDown={(e) => onItemPointerDown(e, item)}
                                    onPointerUp={(e) => onItemPointerUp(e, item)}
                                    onPointerCancel={onItemPointerCancel}
                                    onPointerLeave={onItemPointerCancel}
                                    onContextMenu={(e) => e.preventDefault()}
                                >
                                    {item.name}
                                </div>
                            ))}

                            {/* 공중에 뜬 선택 아이템 (pendingPos를 따라감) */}
                            {selectedItem && pendingPos && (
                                <div
                                    className="inventory-item floating selected"
                                    style={{
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(selectedItem); }}
                                >
                                    {selectedItem.name}
                                </div>
                            )}
                        </div>

                        {selectedItem ? (
                            <div style={{ marginTop: '10px', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                <button onClick={handleRotate}>회전</button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={!previewInfo || !previewInfo.ok}
                                >
                                    확정{previewInfo && previewInfo.ok && previewInfo.kind !== 'place'
                                        ? ` (${previewInfo.kind === 'merge' ? '머지'
                                              : previewInfo.kind === 'combine' ? '조합'
                                              : '교체'})`
                                        : ''}
                                </button>
                                <button onClick={handleCancel}>취소</button>
                                {/* D-45 (2026-04-23): 버리기 — 빨강 톤, 1회 확정.
                                    - 파밍으로 공간이 꽉 찼을 때 탈출 수단.
                                    - 머지/조합 대상이 없는 부산물(낡은 재료 등) 정리용. */}
                                <button
                                    onClick={handleDiscard}
                                    style={{
                                        marginLeft: 'auto',
                                        background: '#6b2a2f',
                                        color: '#f4d4d8',
                                        border: '1px solid #8a3a42',
                                    }}
                                >
                                    버리기
                                </button>
                            </div>
                        ) : (
                            <div style={{ marginTop: '10px', fontSize: '11px', color: '#aaa' }}>
                                짧게 탭 = 정보 · 길게 누르면 선택해서 이동/머지
                            </div>
                        )}
                    </div>

                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={handleUseFromInfo}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // 카드로 아이템 사용 — 공통 모달 (프레임워크 D-23의 첫 구현체).
        //
        // 역할:
        //   카드 사용 시 consume 스펙이 있으면, 인벤토리에서 필터를 통과하는 아이템 목록을
        //   간략히 보여주고, 유저가 하나를 고르면 onSelect(item) 콜백.
        //
        // 왜 InventoryModal을 재사용하지 않는가:
        //   - 인벤 본 UI는 테트리스식 배치/머지/회전/롱프레스까지 복잡. 카드 사용 맥락에서는
        //     오로지 "필터 통과 아이템 선택"만 필요하므로 경량 리스트 UI가 판단 비용이 적다.
        //   - 향후 대상 수가 많아지면 이 모달을 grid/sprite로 확장하거나, 공유 셀렉터 컴포넌트로 추출.
        //
        // props:
        //   inventory:      InventorySystem 인스턴스
        //   filter:         (invItem, notionItem) => bool
        //   titleText:      상단 라벨 (예: "휴식할 음식 고르기")
        //   emptyText:      필터 통과 아이템 0개일 때 메시지
        //   onSelect(item): 확정
        //   onClose():      취소
        // D-36 (2026-04-22, 요한 지시):
        //   scales({recover: N})이 있으면 "효과가 N배" 임을 시각적으로 강조한다.
        //   - 제목 아래 안내 문구 (노란색)
        //   - 각 음식 효과 요약의 "배고픔 +1"을 "배고픔 +1 +1"로 변형하고
        //     증분 "+1" 만 노란색(#d4b84a)으로 띄운다. 효과가 2개 이상인 아이템은
        //     각 증분을 같은 방식으로 처리. scale이 걸릴 수 있는 건 양수 delta stat뿐.
        //   - scale이 없거나 1이면 기존 UI와 동일.
        //   이 표현은 휴식 외 향후 consume 카드에도 재사용 가능하도록 일반화.
        function CardItemConsumeModal({ inventory, filter, scales, hintText, titleText, emptyText, onSelect, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['이름'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const hasRecoverScale = recoverScale !== 1;

            const candidates = (inventory?.items || []).filter(invItem => {
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            });

            // 아이템 효과 요약 표시 — scale이 있으면 원본 delta + 증분을 나란히 보여준다.
            // 반환: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['효과 요약'];
                const canScale = hasRecoverScale && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // 폴백: 원본 효과 요약만 표시 (기존 동작)
                    return summary
                        ? (
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                                {summary}
                            </div>
                        )
                        : null;
                }

                // 각 action을 "기본 라벨 + (노란색 증분)" 형태로 렌더.
                // 예: action {stat:'hunger', delta:1}, recoverScale=2 → '배고픔 +1 +1'
                //     배고픔(회색) / '+1'(회색) / '+1'(노란색 = 증분)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scale이 안 걸리는 action(감소/spawn_card 등)은 기본 describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? '배고픔'
                                : a.stat === 'health' ? '생명력'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    const bonus = Math.round(a.delta * recoverScale - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || '아이템 선택'}</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {candidates.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || '쓸 만한 아이템이 없다.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {
                                    const def = InventorySystem.ITEMS[invItem.type] || {};
                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}
                                            style={{
                                                textAlign: 'left',
                                                padding: '10px 12px',
                                                background: '#0f3460',
                                                border: '1px solid #16213e'
                                            }}
                                        >
                                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{def.name || invItem.name}</div>
                                            {renderEffectRow(notionItem)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 획득 알림 토스트 — 뒤져보기 등으로 아이템을 얻을 때 강조용으로 띄운다.
        //
        // D-28(2026-04-22, 요한 지시):
        // - 팝업과 다르게 버튼 없음. 반투명 배경.
        // - 페이드 인(빠르게) → 1초 노출 → 2초 페이드 아웃.
        // - 여러 아이템 동시 획득 시 하나의 토스트에 목록으로.
        // - 기존 메시지 로그는 유지 (토스트는 보조 강조).
        // D-46(2026-04-22, 요한 지시): 위치를 .map-area(HUD 바로 아래 영역)
        // 상단 중앙에 absolute로 고정. 이전엔 .map-container(스크롤 영역) 안이라
        // 맵을 스크롤하면 토스트가 시야 밖으로 밀렸음.
        // .map-area는 스크롤하지 않으므로 토스트는 항상 같은 위치(HUD 직하단)에 노출되고,
        // 좌·우·상단 모두 다른 상태 UI(HUD 패널, 카드, 인벤 버튼)와 겹치지 않는다.
        // z-index는 기존 modal(.modal=100, ItemInfoModal=1000, CardListModal=1100)보다
        // 위에 두어 조우 모달 중에도 가려지지 않게 1500.
        // 배경 불투명도 0.8 (D-39, 이전 0.5).
        function LootToast({ toast, onDone }) {
            const [phase, setPhase] = React.useState('in'); // in → hold → out → done
            React.useEffect(() => {
                if (!toast) return;
                setPhase('in');
                const t1 = setTimeout(() => setPhase('hold'), 200);   // 페이드 인 0.2s
                const t2 = setTimeout(() => setPhase('out'), 200 + 1000); // 유지 1s
                const t3 = setTimeout(() => {                         // 페이드 아웃 2s
                    setPhase('done');
                    onDone && onDone();
                }, 200 + 1000 + 2000);
                return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
            }, [toast && toast.id]);

            if (!toast || phase === 'done') return null;

            const opacity = phase === 'in' ? 0 : phase === 'hold' ? 1 : 0;
            const transition = phase === 'in' ? 'opacity 0.2s ease-out'
                             : phase === 'out' ? 'opacity 2s ease-in'
                             : 'opacity 0.2s';

            return (
                <div
                    style={{
                        position: 'absolute',
                        top: '12px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        zIndex: 1500,
                        pointerEvents: 'none',
                        opacity,
                        transition,
                        background: 'rgba(22, 33, 62, 0.8)',
                        border: '1px solid rgba(233, 69, 96, 0.55)',
                        padding: '14px 18px',
                        borderRadius: '10px',
                        minWidth: '220px',
                        maxWidth: '80%',
                        boxShadow: '0 6px 20px rgba(0,0,0,0.45)',
                        color: '#fff',
                        textAlign: 'center'
                    }}
                >
                    <div style={{ fontSize: '12px', color: '#d4b84a', letterSpacing: '1px', marginBottom: '6px' }}>
                        획득
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                        {toast.entries.map((entry, i) => (
                            <div key={i} style={{ fontSize: '15px', fontWeight: 600 }}>
                                {entry.name}
                                {entry.count > 1 && (
                                    <span style={{ fontSize: '12px', color: '#aaa', marginLeft: '6px' }}>
                                        ×{entry.count}
                                    </span>
                                )}
                                {entry.grade && (
                                    <span style={{
                                        fontSize: '10px',
                                        color: '#d4b84a',
                                        marginLeft: '8px',
                                        border: '1px solid #d4b84a',
                                        borderRadius: '3px',
                                        padding: '1px 5px',
                                        verticalAlign: 'middle'
                                    }}>
                                        {entry.grade}
                                    </span>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // 카드 더미(덱/무덤) 목록 모달
        //
        // D-27 HUD 리뉴얼 (요한 지시 2026-04-22):
        // - 덱/무덤을 버튼으로 만들고, 클릭 시 남은 카드 목록을 이 모달로 보여준다.
        // - CardItemConsumeModal과 UI 구조를 공유하는 "쌍둥이" 모달.
        // - 읽기 전용: 카드 선택으로 소비되지 않는다(목록 확인용).
        function CardListModal({ title, cards, emptyText, onClose }) {
            // 이름별로 묶어서 카운트 — 같은 카드가 여러 장일 때 가독성 향상.
            const grouped = cards.reduce((acc, c) => {
                const key = c.name;
                if (!acc[key]) acc[key] = { name: c.name, effect: c.effect, detection: c.detection, time: c.time, count: 0 };
                acc[key].count += 1;
                return acc;
            }, {});
            const list = Object.values(grouped);

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{title} ({cards.length})</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        {list.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || '카드가 없습니다.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {list.map((entry, i) => (
                                    <div
                                        key={i}
                                        style={{
                                            padding: '10px 12px',
                                            background: '#0f3460',
                                            border: '1px solid #16213e',
                                            borderRadius: '6px'
                                        }}
                                    >
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{entry.name}</div>
                                            {entry.count > 1 && (
                                                <div style={{ fontSize: '12px', color: '#aaa' }}>×{entry.count}</div>
                                            )}
                                        </div>
                                        <div style={{ fontSize: '11px', color: '#aaa', marginTop: '3px' }}>
                                            {entry.effect}
                                        </div>
                                        <div style={{
                                            fontSize: '10px',
                                            color: entry.detection > 0 ? '#c04a5e' : '#4CAF50',
                                            marginTop: '2px'
                                        }}>
                                            발각 {entry.detection > 0 ? '+' : ''}{entry.detection}% · ⏰{entry.time}h
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 게임 오버/승리 모달
        function GameEndModal({ gameOver, victory }) {
            if (!gameOver && !victory) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: victory ? '#4CAF50' : '#e94560', 
                        color: 'white',
                        padding: '40px', 
                        borderRadius: '12px', 
                        textAlign: 'center'
                    }}>
                        <div style={{ fontSize: '28px', fontWeight: '600', marginBottom: '20px' }}>
                            {victory ? '🎉 승리!' : '💀 게임 오버'}
                        </div>
                        <button 
                            onClick={() => window.location.reload()}
                            style={{ 
                                background: 'white',
                                color: '#333',
                                border: 'none',
                                padding: '15px 30px',
                                fontSize: '16px',
                                fontWeight: '600'
                            }}
                        >
                            다시 시작
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================
        // 메인 게임 컴포넌트
        // ============================================

        // 손패 상한 — 요한 지시(2026-04-22): 3장 → 5장으로 증가.
        // 손패 보충 로직·초기 드로우·HandCards 그리드가 모두 이 상수 기준으로 동작한다.
        const HAND_SIZE = 5;

        function Game() {
            // 상태 관리
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(6);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            const [message, setMessage] = useState('눈을 뜨자 낯선 숲이 펼쳐졌다.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            // D-27 HUD 리뉴얼: 덱/무덤 목록 모달 표시 플래그.
            const [showDeckList, setShowDeckList] = useState(false);
            const [showGraveyardList, setShowGraveyardList] = useState(false);
            const [eventTile, setEventTile] = useState(null);
            // 전투 임시 카드(아이템 사용으로 생성) — 전투 진입 시 combat 덱에 병합, 사용 후 소멸.
            // 구조: [{ id:'throw', count:N }, ...]
            const [combatExtraCards, setCombatExtraCards] = useState([]);
            // D-23 "카드로 아이템 사용" 프레임워크 — 대기 중 consume 요청.
            // 구조: { card, consume, filter, titleText, emptyText } | null
            // 모달 활성 판정도 이 state의 truthy로 통일.
            const [pendingConsume, setPendingConsume] = useState(null);
            // D-28 획득 토스트 — 현재 노출 중인 토스트 1개만 유지.
            // 구조: { id: number, entries: [{ name, count, grade? }] } | null
            const [lootToast, setLootToast] = useState(null);
            // D-42 (2026-04-23 요한 지시): 보스 위치 가시성은 "지형 revealed"와 분리.
            // - listen 1칸 분기에서만 bossVisible=true 로 set (그 순간 보스 아이콘 노출)
            // - 플레이어가 이동하면 즉시 false (지형 revealed는 유지)
            // 공포 원칙: "한 번 본 보스 위치"가 아니라 "방금 귀기울인 위치"만 신뢰 가능.
            const [bossVisible, setBossVisible] = useState(false);
            const mapRef = useRef(null);

            // 토스트 발사 — entries는 묶음 표시 대상.
            // id는 컴포넌트가 phase 타이머를 재시작하기 위한 key 역할.
            const showLootToast = (entries) => {
                if (!entries || entries.length === 0) return;
                setLootToast({ id: Date.now() + Math.random(), entries });
            };

            // 게임 초기화
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(7);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                
                // 카드 데이터는 구글 시트 '베이스탐험카드' 탭이 SSOT.
                // data/data.js의 TTD_DATA.BASE_CARDS를 읽어 런타임 필드(time 기본값 1)만 덧붙인다.
                // 시트 갱신 시: 시트 수정 → `make data` 실행 → 새로고침.
                //
                // D-23: consume/extra_effect 컬럼은 시트 헤더에 존재. 값 없으면 빈 문자열.
                // 데이터 로드 실패 시에만 아래 else 폴백(안전망)이 사용된다.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0
                    ? sheetBaseCards.map(c => ({
                          id: c.id,
                          name: c.name,
                          count: Number(c.count) || 0,
                          effect: c.effect || '',
                          detection: Number(c.detection) || 0,
                          time: Number(c.time) || 1,
                          consume: c.consume || '',
                          extra_effect: c.extra_effect || ''
                      }))
                    : [
                          // 폴백(데이터 로드 실패 시) — 시트가 SSOT이므로 정상 경로에선 사용 안 됨.
                          { id: 'search', name: '뒤져보기', count: 5, effect: '아이템 획득', detection: 5, time: 1 },
                          { id: 'listen', name: '귀 기울이기', count: 2, effect: '몬스터 감지', detection: -5, time: 1 },
                          { id: 'find_food', name: '음식 찾기', count: 1, effect: '음식 획득', detection: 5, time: 1 },
                          { id: 'hide', name: '숨기', count: 1, effect: '은신', detection: -15, time: 1 },
                          { id: 'rest', name: '휴식', count: 1, effect: '체력/배고픔 소폭 회복, 소음 최소', detection: -13, time: 1,
                            consume: 'category:음식;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                const inv = new InventorySystem(6, 5);
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                newBoss.position = bossPos;
                setBoss(newBoss);
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // 게임 오버/승리 체크
            useEffect(() => {
                if (health <= 0 || hunger <= 0) {
                    setGameOver(true);
                    setMessage(health <= 0 ? '생명력이 다했다...' : '배고픔을 이기지 못했다...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('탈출에 성공했다!');
                }
            }, [currentTile, tiles]);

            // 아이템 사용 — 인벤토리 정보창에서 '사용' 버튼을 누를 때 호출.
            // EffectParser가 파싱한 Notion '사용 효과' DSL을 런타임에 적용하고,
            // 소비형(consumed) 판정은 effectParser가 내려준 값을 그대로 따른다.
            //
            // spawn_card:throw 는 '전투 카드 덱에 던지기 카드 추가'로 해석한다.
            // 기획 근거(요한 지시): "전투모드시에 등장하는 카드에 추가된다".
            // 사용 시점에 카드가 생성되어 임시 풀(combatExtraCards)에 쌓이고,
            // 다음 전투 시작 때 기본 덱과 병합되며, 그 전투 내에서 카드를 쓰면 소멸한다.
            // (영구 추가가 아닌 근거: 현재 아이템이 일회용 판정이 아니어도 재탐색/머지 가능 재료이므로
            //  덱에 영구 편입시키면 밸런스가 쉽게 무너지고, 요한 말 "전투 종료 시 소멸"이 자연스러움.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || item.name));
                const parsed = (notionItem && notionItem.effect) || null;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('이 아이템은 아직 사용할 수 없다.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        if (name === 'hunger') setHunger(val);
                        else if (name === 'health') setHealth(val);
                    },
                    addThrowCard: (cardId) => {
                        // 같은 cardId를 여러 번 써서 여러 장을 쌓을 수도 있음.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
                            return next;
                        });
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}을(를) 사용했다. (${label})`);
                }
                return result;
            };

            // D-23: "카드로 아이템 사용" 프레임워크의 공통 진입점.
            // 카드가 아이템을 소비해야 하는 경우(consume 스펙 보유) 이 함수가 모달을 띄우고,
            // 유저가 아이템을 고른 뒤 확정되면 finalizeCardUse로 실제 효과를 적용한다.
            // 카드 자체(손패 → 무덤, 시간·발각 증가)는 선결 조건 통과 후에만 소모.
            //
            // consume 파싱은 effectParser.parseCardConsume에 위임. 필터는 matchesConsumeFilter.
            // consume 통과 아이템이 0개면 "쓸 수 없다" 메시지로 조용히 종료(카드도 미소모).
            const finalizeCardUse = (card, extraMsg) => {
                // 손패 → 무덤, 시간·발각 처리.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume 카드 → 아이템 선택 모달 오픈.
            // 필터 통과 아이템이 없으면 조용히 스킵(카드 미소모).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('아이템 사용 프레임워크가 로드되지 않았다.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {
                    setMessage('이 카드는 아이템을 소비하지 않는다.');
                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                const hasAny = (inventory?.items || []).some(invItem => {
                    const def = InventorySystem.ITEMS[invItem.type] || {};
                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                if (!hasAny) {
                    setMessage(`${card.name}: 지금 쓸 수 있는 아이템이 없다.`);
                    return;
                }
                // D-36: 휴식 등 scale이 걸린 카드는 모달이 "효과 증폭"을 시각적으로 강조해야 함.
                // scales(예: {recover: 2})를 그대로 넘겨 모달이 아이템 효과를 미리보기로 스케일.
                // 카드 이름/효과 텍스트는 카드별 안내 문구의 기본값으로 사용.
                const hintText = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `${card.name}으로 인해 음식의 효과가 ${consume.scales.recover}배가 됩니다`
                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    hintText,
                    titleText: card.name + ' — 사용할 아이템',
                    emptyText: '쓸 만한 아이템이 없다.'
                });
            };

            // consume 모달에서 아이템 하나 선택 → 실제 효과 적용.
            // 1) 아이템의 파싱된 effect를 scaleEffect로 변형 (예: 회복 x2)
            // 2) applyItemEffect로 스탯/카드 액션 디스패치
            // 3) 아이템 1개 인벤에서 제거 (일회용·비일회용 무관: 카드가 소비하는 맥락)
            // 4) 카드 본체 소모 + 시간/발각 반영
            const resolveConsumeChoice = (invItem) => {
                if (!pendingConsume) return;
                const Parser = window.EffectParser;
                const { card, consume } = pendingConsume;

                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                const parsedEffect = (notionItem && notionItem.effect) || null;

                let appliedMsg = '';
                if (parsedEffect && parsedEffect.usable && Parser) {
                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {});
                    Parser.applyItemEffect(scaled, {
                        getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                        setStat: (name, val) => {
                            if (name === 'hunger') setHunger(val);
                            else if (name === 'health') setHealth(val);
                        },
                        addThrowCard: (cardId) => {
                            setCombatExtraCards(prev => {
                                const next = [...prev];
                                const idx = next.findIndex(c => c.id === cardId);
                                if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                                else next.push({ id: cardId, count: 1 });
                                return next;
                            });
                        },
                        setMessage
                    });
                    appliedMsg = `${def.name || invItem.name}을(를) 소모하고 ${Parser.describeEffect(scaled)}.`;
                } else {
                    appliedMsg = `${def.name || invItem.name}을(를) 소모했지만 별 효과는 없었다.`;
                }

                // 아이템 1개 소비
                if (inventory) {
                    inventory.removeItem(invItem);
                    inventory.items = inventory.items.filter(i => i.id !== invItem.id);
                }

                setPendingConsume(null);
                finalizeCardUse(card, appliedMsg);
            };

            const cancelConsume = () => {
                setPendingConsume(null);
            };

            // 카드 사용
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('시간이 부족합니다!');
                    return;
                }

                // D-23: consume 스펙이 있는 카드는 모달을 띄우고 선택 후 효과 적용.
                // 카드 본체 소모·시간·발각은 finalizeCardUse에서만 발생.
                if (card.consume) {
                    openConsumeForCard(card);
                    return;
                }

                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);

                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);

                let msg = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;

                if (card.id === 'search') {
                    // D-28(2026-04-22, 요한 지시): 뒤져보기는 3슬롯 독립 추첨(100/20/20).
                    // 슬롯 확률/개수 자체는 비공개. 결과만 메시지+토스트로 노출.
                    // 여러 개 획득 시 같은 아이템은 개수 누적, 묶음 토스트 1개.
                    //
                    // D-34: 타일 type === 'good'이면 슬롯 확률이 상향(100/80/80).
                    // D-35: 같은 타일 반복·복귀 뒤져보기에는 페널티 곱수가 붙는다
                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLoot가
                    //       tile 객체를 받아 안에서 처리한다.
                    const tile = tiles[currentTile];
                    const currentRegion = tile?.region;
                    if (currentRegion) {
                        const drops = rollSearchLoot(currentRegion, tile);
                        // 같은 아이템 개수 누적 (토스트/메시지 가독성)
                        const counter = new Map(); // item -> count
                        let overflow = 0; // 가방 포화로 못 담은 수
                        drops.forEach(({ item }) => {
                            const added = inventory.addItem(item);
                            if (added) {
                                counter.set(item, (counter.get(item) || 0) + 1);
                            } else {
                                overflow += 1;
                            }
                        });

                        if (counter.size > 0) {
                            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                            const entries = [];
                            const nameParts = [];
                            counter.forEach((count, item) => {
                                const def = InventorySystem.ITEMS[item] || {};
                                const displayName = def.name || item;
                                const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                const grade = notionItem && notionItem['아이템 등급'];
                                entries.push({ name: displayName, count, grade });
                                nameParts.push(count > 1 ? `${displayName} ×${count}` : displayName);
                            });
                            msg += `[${currentRegion}] ${nameParts.join(', ')}을(를) 발견했다.`;
                            if (overflow > 0) msg += ` (가방이 가득 차 ${overflow}개는 두고 왔다.)`;
                            showLootToast(entries);
                        } else if (overflow > 0) {
                            msg += `[${currentRegion}] 쓸 만한 걸 찾았지만 가방이 가득 차 들고 오지 못했다.`;
                        } else {
                            msg += `[${currentRegion}] 이 근처에는 쓸만한 게 없다.`;
                        }

                        // D-35: 이 타일의 뒤져보기 카운터 증가.
                        // 추첨이 끝난 뒤에 올려야 "첫 사용은 mult=1" 규약이 지켜진다.
                        setTiles(prev => prev.map(t =>
                            t.id === currentTile
                                ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                : t
                        ));
                    } else {
                        // 안전망: region 없는 타일(구버전 세이브 등)은 레거시 동작
                        inventory.addItem('material_low');
                        msg += `재료를 발견했다.`;
                    }
                } else if (card.id === 'find_food') {
                    // '음식 찾기' 카드 — food 카테고리 강제 드롭(요한 지시 2026-04-22).
                    // 'food' 독립 아이템은 제거됐으므로, 지역의 음식재료 풀에서 직접 추첨.
                    // 지역에 food 풀이 비어있으면(시냇물 등) 폴백 메시지.
                    //
                    // D-40 (2026-04-23 요한 지시): search와 동일하게 LootToast 노출.
                    // 단일 아이템이라 entries 배열에 원소 1개. 가방이 찬 경우(added=false)는
                    // 토스트 생략(기존 search 분기와 동일한 규칙: 실제 획득한 것만).
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item } = rollTileDrop(currentRegion, { forceCategory: 'food' });
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            if (added) {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 찾아냈다.`;
                                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                const displayName = def?.name || item;
                                const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                const grade = notionItem && notionItem['아이템 등급'];
                                showLootToast([{ name: displayName, count: 1, grade }]);
                            } else {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 찾았지만 가방이 가득 찼다.`;
                            }
                        } else {
                            msg += `[${currentRegion}] 먹을 만한 건 보이지 않는다.`;
                        }
                    } else {
                        msg += '먹을 만한 건 보이지 않는다.';
                    }
                } else if (card.id === 'listen') {
                    // D-31 (2026-04-22 보강):
                    //   listen 카드의 기본 효과는 "인접 타일 revealed" — 거리와 무관하게 항상 실행.
                    //   그 위에 거리별 청각 메시지(보스와의 BFS 거리)가 중첩된다.
                    //   1칸  → 보스 위치 노출 + 인접 revealed
                    //   2칸  → "숨쉬는 소리가 꽤 가까이..." + 인접 revealed
                    //   3칸  → "발걸음 소리가 가까워진듯..." + 인접 revealed
                    //   ≥4칸 → "발걸음 소리가 아주 멀리서..." + 인접 revealed
                    // (직전 버전에서 2칸 이상일 때 revealed를 끊었으나, 이는 listen의 핵심 기능을
                    //  제거한 회귀였음. 요한 QA 2026-04-22 지시로 복구.)
                    const bossPos = boss.getPosition();
                    const bossDist = boss.calculateDistance(currentTile, bossPos);

                    // 인접 타일 revealed — 거리 무관하게 항상 실행되는 listen의 기본 효과.
                    const newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    setTiles(newTiles);

                    if (bossDist === 1) {
                        // D-42: 보스 위치 노출은 이 순간만. 이동 시 moveTo에서 다시 false로.
                        setBossVisible(true);
                        msg += `가쁜 숨소리가 바로 곁에서 들려온다. 보스는 타일 #${bossPos}에 있다.`;
