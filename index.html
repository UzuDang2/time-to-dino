                    {packOpen && inv && pack && (
                        <PackTransferModal
                            storage={inv}
                            pack={pack}
                            onChange={onInventoryChange}
                            onClose={() => setPackOpen(false)}
                        />
                    )}

                    {resetOpen && (
                        <ResetConfirmModal
                            onCancel={() => setResetOpen(false)}
                            onConfirm={() => {
                                setResetOpen(false);
                                onResetData && onResetData();
                            }}
                        />
                    )}

                    {/* D-168: 빌딩 카드 클릭 시 상세 모달. tent → 다음 레벨 퀘스트, placeholder → 추후 공개 안내. */}
                    {selectedBuilding && (
                        <BuildingDetailModal
                            building={selectedBuilding}
                            campState={campState}
                            activeQuests={activeQuests}
                            completedQuests={completedQuests}
                            onClose={() => setSelectedBuilding(null)}
                            onTakeQuest={(qid) => {
                                // D-177: 빌딩은 시나리오 텍스트가 effect_raw 한 줄(BuildingDetailModal에 이미 노출)이라
                                //   TentQuestModal 같은 추가 스토리 단계 없이 직접 active 등재.
                                //   텐트는 기존 흐름대로 setOfferQuestId → TentQuestModal → [수락] 유지.
                                if (typeof qid === 'string' && qid.startsWith('bld_')) {
                                    onTakeQuest && onTakeQuest(qid);
                                } else {
                                    setOfferQuestId(qid);
                                }
                            }}
                            onCompleteQuest={onCompleteQuest}
                        />
                    )}

                    {/* D-151: 퀘스트 [받기] → 스토리/정보 모달 → [수락]에서 active push.
                        D-168: tent_N 다단계 모두 동일 모달(TentQuestModal) 사용 — Lv 정보는 offerQuestId에서 추출. */}
                    {isTentQuestId(offerQuestId) && (
                        <TentQuestModal
                            questId={offerQuestId}
                            onCancel={() => setOfferQuestId(null)}
                            onAccept={() => {
                                if (typeof onTakeQuest === 'function') onTakeQuest(offerQuestId);
                                setOfferQuestId(null);
                            }}
                        />
                    )}

                    {/* D-154: 퀘스트 목록 모달 — 받기/진행/완수 행 스크롤. 행 클릭 → 상세. */}
                    {questListOpen && (() => {
                        const taken = new Set([
                            ...activeQuests.map(q => q.id),
                            ...completedQuests.map(q => q.id)
                        ]);
                        // D-168: 다음 텐트 레벨 1종만.
                        const curTentLv = Number((campState && (campState.tentLevel != null ? campState.tentLevel : (campState.tentBuilt ? 1 : 0))) || 0);
                        const nextTent = getNextTentQuest(curTentLv);
                        const available = (nextTent && !taken.has(nextTent.id)) ? [nextTent] : [];
                        const rowStyle = {
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center',
                            padding: '12px 14px',
                            marginBottom: '8px',
                            background: '#16213e',
                            border: '1px solid #2a3a5e',
                            borderRadius: '8px',
                            cursor: 'pointer'
                        };
                        return (
                            <div className="modal" style={{ zIndex: 3400 }}>
                                <div style={{
                                    background: '#0f1a2e',
                                    color: '#eee',
                                    padding: '20px',
                                    borderRadius: '10px',
                                    border: '1px solid #4a4a6e',
                                    width: 'min(480px, 92vw)',
                                    maxHeight: '80dvh',
                                    display: 'flex',
                                    flexDirection: 'column'
                                }}>
                                    <div style={{
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                        marginBottom: '12px'
                                    }}>
                                        <span style={{ fontSize: '15px', fontWeight: 700, color: '#d4b84a' }}>
                                            📜 퀘스트 목록
                                        </span>
                                        <button
                                            onClick={() => setQuestListOpen(false)}
                                            style={{
                                                background: '#2a3a5e',
                                                color: '#ddd',
                                                border: 'none',
                                                padding: '6px 14px',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                fontSize: '12px'
                                            }}
                                        >
                                            닫기
                                        </button>
                                    </div>
                                    <div style={{ overflowY: 'auto', WebkitOverflowScrolling: 'touch', flex: 1 }}>
                                        {available.length === 0 && activeQuests.length === 0 && completedQuests.length === 0 && (
                                            <div style={{ fontSize: '12px', color: '#777', textAlign: 'center', padding: '24px 0' }}>
                                                받을 수 있는 퀘스트가 없다.
                                            </div>
                                        )}
                                        {available.map(def => (
                                            <div
                                                key={`avail:${def.id}`}
                                                onClick={() => {
                                                    setQuestListOpen(false);
                                                    setOfferQuestId(def.id);
                                                }}
                                                style={rowStyle}
                                            >
                                                <span style={{ fontSize: '13px', color: '#d4b84a' }}>
                                                    ✨ {def.icon} {def.name}
                                                </span>
                                                <span style={{ fontSize: '11px', color: '#888' }}>받기 가능 ›</span>
                                            </div>
                                        ))}
                                        {activeQuests.map(quest => {
                                            const def = getTentQuestDef(quest.id);
                                            if (!def) return null;
                                            return (
                                                <div
                                                    key={quest.id}
                                                    onClick={() => {
                                                        setQuestListOpen(false);
                                                        setActiveDetailQuestId(quest.id);
                                                    }}
                                                    style={rowStyle}
                                                >
                                                    <span style={{ fontSize: '13px', color: '#ddd' }}>
                                                        {def.icon} {def.name}
                                                    </span>
                                                    <span style={{ fontSize: '11px', color: '#888' }}>진행 중 ›</span>
                                                </div>
                                            );
                                        })}
                                        {completedQuests.map(q => {
                                            const def = getTentQuestDef(q.id);
                                            if (!def) return null;
                                            return (
                                                <div
                                                    key={q.id}
                                                    style={{ ...rowStyle, cursor: 'default', opacity: 0.7 }}
                                                >
                                                    <span style={{ fontSize: '13px', color: '#8bd17c' }}>
                                                        ✅ {def.name}
                                                    </span>
                                                    <span style={{ fontSize: '11px', color: '#666' }}>완수</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* D-154: 진행 중 퀘스트 상세 — 행 클릭 시. 재료 진행 + [완수] 버튼. */}
                    {activeDetailQuestId && (() => {
                        const quest = activeQuests.find(q => q.id === activeDetailQuestId);
                        if (!quest) return null;
                        return (
                            <div className="modal" style={{ zIndex: 3450 }}>
                                <div style={{
                                    background: '#1a1a2e',
                                    color: '#eee',
                                    padding: '24px 22px',
                                    borderRadius: '10px',
                                    border: '1px solid #4a4a6e',
                                    width: 'min(440px, 92vw)',
                                    boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                                }}>
                                    {renderQuestCard(quest)}
                                    <div style={{ textAlign: 'right', marginTop: '8px' }}>
                                        <button
                                            onClick={() => setActiveDetailQuestId(null)}
                                            style={{
                                                background: '#2a3a5e',
                                                color: '#ddd',
                                                border: 'none',
                                                padding: '8px 18px',
                                                borderRadius: '5px',
                                                cursor: 'pointer',
                                                fontSize: '12px'
                                            }}
                                        >
                                            닫기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        }

        // ============================================
        // D-110 (2026-04-24): 점수 배지 — 점수와 산출 항목을 미니 리스트로 표시.
        //   props.score      — 최종 점수.
        //   props.breakdown  — [{ label, value }] 양수만 (0은 호출자가 걸러 넘김).
        //   GameEndModal/LootResultScreen/CampScreen에서 공통 사용.
        // ============================================
        function ScoreBadge({ score, breakdown }) {
            const rows = Array.isArray(breakdown) ? breakdown.filter(r => r && r.value) : [];
            return (
                <div className="score-badge">
                    <div className="score-value">🏆 점수: {score}</div>
                    {rows.map((r, i) => (
                        <div key={i} className="score-row">
                            <span className="lbl">{r.label}</span>
                            <span>+{r.value}</span>
                        </div>
                    ))}
                </div>
            );
        }

        // 점수 산출 내역 — calculateRunScore와 같은 규칙으로 항목별 가산값 산출.
        //   selectedList가 null이면 items 전체 기준.
        function buildScoreBreakdown({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return [];
            const rows = [];
            rows.push({ label: '생존', value: 100 });
            const tiles = Math.max(0, Number(uniqueTilesVisited) || 0);
            if (tiles > 0) rows.push({ label: `이동거리(${tiles})`, value: tiles * 3 });
            if ((Number(detection) || 0) < 80) rows.push({ label: '은밀(발각<80)', value: 30 });

            const stats = runStats || {};
            const l1 = Number(stats.l1PreyKills) || 0;
            const l2 = Number(stats.l2PreyKills) || 0;
            const bd = Number(stats.bossDangerEntered) || 0;
            if (l1) rows.push({ label: `사냥 L1 ×${l1}`, value: l1 * 5 });
            if (l2) rows.push({ label: `사냥 L2 ×${l2}`, value: l2 * 20 });
            if (bd) rows.push({ label: `보스 위협권 ×${bd}`, value: bd * 15 });

            // 자원 — grade별 합산.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            let weapons = 0, armorShield = 0, g1 = 0, g2 = 0, g3 = 0;
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === '무기') { weapons += 1; continue; }
                if (cat === 'shield' || cat === 'armor') { armorShield += 1; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) g1 += 1;
                else if (grade === 2) g2 += 1;
                else if (grade === 3) g3 += 1;
            }
            if (weapons) rows.push({ label: `무기 ×${weapons}`, value: weapons * 5 });
            if (armorShield) rows.push({ label: `방어구 ×${armorShield}`, value: armorShield * 8 });
            if (g1) rows.push({ label: `자원 1단계 ×${g1}`, value: g1 * 1 });
            if (g2) rows.push({ label: `자원 2단계 ×${g2}`, value: g2 * 3 });
            if (g3) rows.push({ label: `자원 3단계 ×${g3}`, value: g3 * 6 });
            return rows;
        }

        // ============================================
        // D-110 (2026-04-24): 전리품 결과창.
        //   props.runFinal     — { victory, items, runStats, uniqueTilesVisited, detection }
        //   props.onConfirm(selectedItemIds[]) — 선택 항목 캠프 인입.
        //   props.onCancel     — 모달 닫기 (GameEndModal 복귀).
        //
        //   - 인벤 그리드(rows × cols, 8x12 시각) — items.x/y/shape 그대로 배치.
        //   - 셀(아이템) 탭 = 선택/해제. 초기값: 모든 items 선택.
        //   - 점수는 selectedIds 변동에 따라 실시간 재계산(자원 점수만 변동).
        //   - 버튼: [전부 챙기기] / [선택만 챙기기] / [취소].
        // ============================================
        function LootResultScreen({ runFinal, onConfirm, onCancel }) {
            const items = (runFinal && Array.isArray(runFinal.items)) ? runFinal.items : [];
            const [selectedIds, setSelectedIds] = React.useState(() => {
                const s = new Set();
                for (const it of items) { if (it && it.id != null) s.add(it.id); }
                return s;
            });

            const toggleId = (id) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const selectedItems = items.filter(it => it && selectedIds.has(it.id));
            const score = calculateRunScore({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });
            const breakdown = buildScoreBreakdown({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });

            // D-144: 그리드 사이즈는 실제 런 가방(inventory.rows/cols) 기준. fallback 5x5.
            //   가방 disabled 셀(좌우 상단 구석)도 동일하게 비활성 표시 — 시각 일관성.
            const lootInv = runFinal && runFinal.inventory;
            const ROWS = (lootInv && Number(lootInv.rows)) || 5;
            const COLS = (lootInv && Number(lootInv.cols)) || 5;
            const CELL = 44, PAD = 3;

            return (
                <div className="modal" style={{
                    zIndex: 1800,
                    background: 'rgba(8,10,18,0.92)',
                    alignItems: 'flex-start',
                    overflowY: 'auto',
                    padding: '24px 16px'
                }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        border: '1px solid #2a3a5e',
                        borderRadius: '10px',
                        padding: '20px 18px',
                        maxWidth: '560px',
                        width: '100%',
                        boxSizing: 'border-box'
                    }}>
                        {/* 헤더 */}
                        <div style={{
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'flex-start',
                            gap: '12px',
                            marginBottom: '14px',
                            flexWrap: 'wrap'
                        }}>
                            <div style={{
                                fontSize: '18px',
                                fontWeight: 700,
                                color: '#d4b84a'
                            }}>
                                📦 탐험 결과
                            </div>
                            <ScoreBadge score={score} breakdown={breakdown} />
                        </div>

                        {/* 인벤 그리드 */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '12px' }}>
                            <div style={{ position: 'relative', display: 'inline-block' }}>
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                                    gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                                    gap: '2px',
                                    background: '#0f3460',
                                    padding: `${PAD}px`,
                                    borderRadius: '8px'
                                }}>
                                    {Array(ROWS).fill(null).map((_, row) =>
                                        Array(COLS).fill(null).map((_, col) => {
                                            const disabled = lootInv && typeof lootInv.isDisabled === 'function'
                                                ? lootInv.isDisabled(col, row) : false;
                                            return (
                                                <div
                                                    key={`${row}-${col}`}
                                                    className={`inventory-cell ${disabled ? 'disabled' : ''}`}
                                                />
                                            );
                                        })
                                    )}
                                </div>
                                {items.map(item => {
                                    if (!item || !item.shape) return null;
                                    const w = item.shape[0].length;
                                    const h = item.shape.length;
                                    const emoji = itemEmoji(item.type);
                                    const selected = selectedIds.has(item.id);
                                    return (
                                        <div
                                            key={item.id}
                                            className={`inventory-item loot-item ${selected ? 'selected' : ''}`}
                                            onClick={() => toggleId(item.id)}
                                            style={{
                                                left: `${item.x * CELL + PAD}px`,
                                                top: `${item.y * CELL + PAD}px`,
                                                width: `${w * CELL - PAD}px`,
                                                height: `${h * CELL - PAD}px`,
                                                fontSize: '9px',
                                                cursor: 'pointer',
                                                opacity: selected ? 1 : 0.4
                                            }}
                                            title={item.name || item.type}

                                            {emoji

                                    borderRadius: '6px',

        }

        function GameEndModal({ gameOver, victory, deathReason, showPathView, onViewPath, onReturnCamp, onShowLoot, runFinal }) {
            // 승리 후 '맵 보기' 모드일 때 모달 숨김 — 경로를 볼 수 있게.
            if ((!gameOver && !victory) || showPathView) return null;

            const narrative = !victory && deathReason ? DEATH_NARRATIVE[deathReason] : null;
            // D-112 (요한 지시): 승리 모달도 다크 배경 통일 — 녹색 배경에 노랑 텍스트가 잘 안 보임.
            //   타이틀(승리/게임오버)에만 색 차이를 주고, 모달 배경은 표준 다크.
            const bgColor = '#2a2a3e';
            const accentColor = victory ? '#fff' : '#e94560';

            // D-110: 승리 시에만 점수 배지 + [전리품 확인] 노출.
            const showScore = !!victory && !!runFinal;
            const score = showScore ? calculateRunScore({
                victory: true,
                uniqueTilesVisited: runFinal.uniqueTilesVisited,
                detection: runFinal.detection,
                items: runFinal.items,
                runStats: runFinal.runStats,
                selectedItems: null
            }) : 0;
            const breakdown = showScore ? buildScoreBreakdown({
                victory: true,
                uniqueTilesVisited: runFinal.uniqueTilesVisited,
                detection: runFinal.detection,
                items: runFinal.items,
                runStats: runFinal.runStats,
                selectedItems: null
            }) : [];

            return (
                <div className="modal">
                    <div style={{
                        background: bgColor,
                        color: 'white',
                        padding: '32px 28px',
                        borderRadius: '12px',
                        textAlign: 'center',
                        maxWidth: '420px',
                        width: '90vw',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{
                            fontSize: '26px',
                            fontWeight: 700,
                            marginBottom: narrative ? '14px' : '24px',
                            color: accentColor
                        }}>
                            {victory ? '🎉 승리!' : '💀 게임 오버'}
                        </div>

                        {narrative && (
                            <>
                                <div style={{
                                    fontSize: '17px',
                                    fontWeight: 700,
                                    lineHeight: 1.45,
                                    marginBottom: '16px',
                                    color: '#fff'
                                }}>
                                    {narrative.subtitle}
                                </div>
                                <div style={{
                                    fontSize: '13px',
                                    fontWeight: 400,
                                    lineHeight: 1.6,
                                    color: '#d8d8d8',
                                    background: 'rgba(0,0,0,0.25)',
                                    padding: '12px 14px',
                                    borderRadius: '8px',
                                    textAlign: 'left',
                                    marginBottom: '22px'
                                }}>
                                    <span style={{ color: '#d4b84a', fontWeight: 700 }}>가이드 · </span>
                                    {narrative.guide}
                                </div>
                            </>
                        )}

                        {/* D-110: 승리 시 점수 배지 표시 — 전체 인입 기준. */}
                        {showScore && (
                            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                                <ScoreBadge score={score} breakdown={breakdown} />
                            </div>
                        )}

                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
                            {/* D-56 (2026-04-24 요한 지시): victory/defeat 모두 [맵 보기] 노출.
                                defeat에서도 보스 경로·플레이어 동선을 복기할 수 있도록. */}
                            <button
                                onClick={() => onViewPath && onViewPath()}
                                style={{
                                    background: '#d4b84a',
                                    color: '#333',
                                    border: 'none',
