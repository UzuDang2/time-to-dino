        const REGION_LABEL = {

        //   žĚīž†ĄžóĒ sound trace(ūüĎ£)ÍįÄ žöįžÉĀŽč®, preyÍįÄ ž§Ďžēô, ‚ôü/ūü¶ĖÍįÄ Ž≥ĄŽŹĄ SVG text žė§Ž≤ĄŽ†ąžĚīŽ°ú
        //   Ž∂ĄžāįŽźźŽč§. žöĒŪēú: "ž†ĄŽ∂Ä ž§Ďžēôž™Ĺžóź ŪĎúžčúŽźėžěĖžēĄ ‚Ä¶ žä§ŪÉĚŽźėÍ≤Ć ŪēīžĄú ŽĎźÍįúžĚľŽēź „Öá„Öá,
        //   žĄłÍįúŽ∂ÄŪĄįŽäĒ „Öá„Öá/„Öá, ŽĄ§ÍįúžĚľŽēź „Öá„Öá/„Öá„Öá".
        //   Žč®žąú žä¨Ž°Į žĘĆŪĎúŪĎú(ŪÉÄžĚľ ž§Ďžč¨žóź ŽĆÄŪēú dx/dy). ŪŹįŪäł 24 Íłįž§Ä ÍįÄŽ°ú ¬Ī15, žĄłŽ°ú ŪĖČÍįĄ ~30.
        const TILE_STACK_LAYOUTS = {

        const TILE_STACK_MAX = 4;

        //   ‚Üí traceŽäĒ preyŽāė carcassÍįÄ ÍįôžĚÄ ŪÉÄžĚľžóź Ž≥īžĚīŽ©ī žěźŽŹô žÉĚŽěĶ.
        //   isPlayer/isBoss ŪĒĆŽěėÍ∑łŽäĒ HexTiležóźžĄú Ž≥łž≤ī Ž†ĆŽćĒ žčú skip(GameMapžĚī Ž≥ĄŽŹĄ SVG textŽ°ú
        //   transition žä¨ŽĚľžĚīŽďúŽ•ľ žúĄŪēī Žč®žĚľ žĚłžä§ŪĄīžä§ žú†žßÄ) ŪēėŽäĒŽćį žďįžĚłŽč§.
        function computeTileIcons(tile, ctx) {

            if (!isRevealed) return [];
            const list = [];
            if (tile.type === 'exit') {

                if (ctx.showPrey) list.push({ kind: 'prey', emoji: ctx.preyEmoji });
                // D-94: žú†ž†ÄÍįÄ ŽÜďžēĄŽĎĒ ÍĪįŽĆÄŪēú Ž®ĻžĚī ‚ÄĒ visitedžôÄ Ž¨īÍīÄ(žĻīŽďú Ūö®Í≥ľŽ°ú žěźÍłį ŪÉÄžĚľžóź ŽÜďžēĄŽŹĄ
                //   visitedŽäĒ žĚīŽĮł truežěĄ). carcassžôÄ ŽŹôžčúžóź žěąžĚĄ žąė žóÜžĚĆ(Ž≥īžä§ÍįÄ Ž®ĻžúľŽ©ī carcassŽ°ú ž†ĄŪôė).
                if (ctx.hasBait && !(tile.visited && ctx.hasCarcass)) {

            // žöįžĄ†žąúžúĄ žó≠žąúžĚīŽĚľ Žß® žēěŽ∂ÄŪĄį žěėŽĚľžēľ player/bossÍįÄ žāīžēĄŽā®žĚĆ).

        // Ž≥īžä§ÍįÄ žěąŽäĒ ŪÉÄžĚľžóź ūü¶Ė žēĄžĚīžĹėžĚī Žú¨Žč§. žĚīŽŹôŪēėŽ©ī setBossVisible(false).

        // žßÄŪėē žÜćžĄĪŽßĆ ŪĎúŪėĄ. Žßź Ž†ĆŽćĒŽßĀžĚÄ GameMapžóźžĄú HexTile žúĄžóź SVG textŽ°ú žąėŪĖČ.
        //

        //   - ŪĚĒž†Ā(ūüĎ£ žöįžÉĀŽč®): preyTraceTiles.has(tile.id) ‚ÄĒ visited Ž¨īÍīÄ (ž≤≠ÍįĀ Žč®žĄú).
        //   - D-48: ŽįúžěźÍĶ≠ Žį©ŪĖ• ŪôĒžāīŪĎú ž†úÍĪį ‚ÄĒ ŪĚĒž†Ā(ūüĎ£)ŽßĆžúľŽ°ú Žč®žĄú ž†úÍ≥Ķ.
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo, requestWait, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            const { x, y } = tile.position;

            const hasCarcassTrace = carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tile.id);
            // D-94: ÍĪįŽĆÄŪēú Ž®ĻžĚī ‚ÄĒ žú†ž†ÄÍįÄ ŽÜďžēĄŽĎĒ ŪÉÄžĚľ.
            const hasBait = baitTiles && baitTiles.has && baitTiles.has(tile.id);

            // D-53: [ŽßĶ Ž≥īÍłį] Ž™®ŽďúžóźžĄú ŽĮłŽį©Ž¨ł ŪÉÄžĚľžĚÄ ŽįėŪą¨Ž™Ö ŪöĆžÉČ žú§Í≥ĹŽßĆ Í≥ĶÍįú.
            // žßÄžó≠ žĚīŽ¶Ą/ŽßąžĽ§/prey/ŪĚĒž†ĀžĚÄ žą®ÍłīŽč§(žä§ŪŹ¨žĚľŽü¨ Žį©žßÄ ‚ÄĒ Žį©Ž¨ł žēą Ūēú Í≥≥žĚÄ žßÄŪėēŽßĆ Íįź).

            // D-80 (2026-04-24 žöĒŪēú žßÄžčú): listen žč§Ž£®žó£ ‚ÄĒ ž†ēŽ≥īÍįÄ ŽįĚŪėÄžßĄ ŪÉÄžĚľžóź
            // žĚłž†ĎŪēėžó¨ ÍłłžĚī žóįÍ≤įŽźú Í∑ł Žč§žĚĆ 1žĻł ŪÉÄžĚľžĚĄ ŽßĶŽ≥īÍłįžôÄ ŽŹôžĚľŪēú dim žÉČžÉĀžúľŽ°ú ŽÖłž∂ú.
            // ÍłłžįĺÍłį ŽāúžĚīŽŹĄ ŪēėŪĖ• Ž™©ž†Ā. Í≤ĆžěĄ ž§ĎžóźŽŹĄ žĚīŽŹôžĚÄ ÍįÄŽä•(canMoveŽ©ī ŪĀīŽ¶≠ Ūóąžö©).
            const silhouetteOnly = !showPathView && tile.silhouette && !tile.revealed && !tile.visited;
            const dimmed = pathUnvisited || silhouetteOnly;

            const hasNoConnections = tile.connections.length === 0 &&

            const getTileColor = (tile) => {

                if (tile.type === 'good' && tile.revealed) return '#FFC107';

            // D-89: getTileLabel ŪŹźÍłį ‚ÄĒ Ž™®Žď† žēĄžĚīžĹėžĚī computeTileIcons + žä§ŪÉĚ žä¨Ž°Į žúĄžĻėŽ°ú ŪÜĶŪē©.
            //   ŽĮłÍ≥ĶÍįú ŪÉÄžĚľžóźŽßĆ Žč®ŽŹÖ '?' ŽĚľŽ≤® žā¨žö©.
            const tileIcons = computeTileIcons(tile, {

            // HexTiležĚÄ Í∑ł žôł žēĄžĚīžĹėŽßĆ Ž†ĆŽćĒŪēėŽźė, žä§ŪÉĚ žä¨Ž°Į žĚłŽćĪžä§ŽäĒ player/boss žěźŽ¶¨ŽŹĄ
            // žį®žßÄŪēú žÉĀŪÉúŽ°ú Í≥Ąžāį ‚Üí GameMapžĚė Í≥ĄžāįÍ≥ľ ŽŹôžĚľŪēėÍ≤Ć žĚľžĻė.

            // žĚīž†Ą(D-27~): visitedŽßĆ ŪĎúžčú. žĚīž†ú listenžúľŽ°ú ž£ľŽ≥Ä žßÄŪėē ŪĆĆžēÖžĚī ÍįÄŽä•Ūēīžßź.
            // Žį©Ž¨ł(visited)Í≥ľ ž†ēžįį(revealed only) ÍĶ¨Ž∂Ą:

            // - revealed only: žßÄŪėē žĚīŽ¶ĄŽßĆ (ŽßąžĽ§ žóÜžĚĆ), ŪÉÄžĚľ žēĹÍįĄ žĖīŽĎźžõÄ(opacity 0.7)

            const regionLabel = !dimmed && (tile.visited || tile.revealed) && tile.region

            // D-80 Ž≥īÍįē (2026-04-24 žöĒŪēú žßÄžčú): revealed-only(ŽįĚŪėÄž°ĆžßÄŽßĆ žēą ÍįÄŽ≥ł) ŪÉÄžĚľžĚÄ
            // žÉČžÉĀŽßĆ žč§Ž£®žó£Í≥ľ ŽŹôžĚľ(#444)Ž°ú Žāģž∂ĒÍ≥†, opacity¬∑stroke¬∑ŽßąžĽ§¬∑žßÄžó≠Ž™ÖžĚÄ žú†žßÄ.

            // ÍłłžįĺÍłįÍįÄ žČĹŽč§. polygon opacity Ūēú Žį©žúľŽ°úŽäĒ ŽĎėžĚĄ Ž∂ĄŽ¶¨Ūē† žąė žóÜžĖī fillOpacityžôÄ
            // strokeOpacityŽ•ľ ŽĒįŽ°ú ŽĎĒŽč§.

            // silhouette/dim žÉĀŪÉúžó¨ŽŹĄ Ūē≠žÉĀ ŽÖĻžÉČ canMove ŪÖĆŽĎźŽ¶¨Ž•ľ ŽĚĄžõĆžēľ ŪēúŽč§. žĚīž†ĄžóźŽäĒ
            // dimmedžĚľ ŽēĆ stroke=#555/width=1Ž°ú ŽćģžĖīžć®žĄú, listenžúľŽ°ú silhouette ŪĒĆŽěėÍ∑łÍįÄ
            // Ž∂ôžĚÄ "Íįą žąė žěąŽäĒ" ŪÉÄžĚľžĚī "Ž™Ľ ÍįÄŽäĒ ŪÉÄžĚľ"ž≤ėŽüľ Ž≥īžĚīŽäĒ Ž≤ĄÍ∑łÍįÄ žěąžóąŽč§.
            // ‚Üí canMoveÍįÄ žĶúžöįžĄ†, Í∑ł Žč§žĚĆžóź dimmed, Í∑ł Žč§žĚĆ ÍłįŽ≥ł ŪÖĆŽĎźŽ¶¨.
            // Žč®, [ŽßĶ Ž≥īÍłį](showPathView)žóźžĄú pathUnvisitedžĚīŽ©ī žč§ž†ú ŪĀīŽ¶≠žĚī ŽßČŪěąŽĮÄŽ°ú
            // ŽÖĻžÉČ žäĻÍ≤©ŽŹĄ žÉĚŽěĶŪēīžĄú "ŽÖĻžÉČžĚłŽćį žēą ŽąĆŽ¶ľ" Ž™®žąúžĚĄ ŪĒľŪēúŽč§.
            const showCanMove = canMove && !pathUnvisited;
            const revealedOnly = !tile.visited && tile.revealed;

                    {/* ŽĮłÍ≥ĶÍįú ŪÉÄžĚľ ‚ÄĒ '?' Žč®ŽŹÖ ŽĚľŽ≤®. */}
                    {!dimmed && !isRevealed && (

        // Í≤ĆžěĄ ŽßĶ žĽīŪŹ¨ŽĄĆŪäł
        //
        // D-46 (2026-04-22 žöĒŪēú žßÄžčú): LootToastŽ•ľ .map-container(žä§ŪĀ¨Ž°§ žėĀžó≠)
        // ŽįĖžúľŽ°ú ŽĻľÍ≥† .map-area ŽěėŪćľžĚė Ūėēž†úŽ°ú ŽĎĒŽč§. žĚīž†Ą(D-39)žóźŽäĒ ŽßĶ žēąžóź ŽĄ£žĖī
        // "ŽßĶžóźžĄú ŪöćŽďĚ" Í≥ĶÍįĄÍįźžĚĄ žāīŽ†łžßÄŽßĆ, Ž™®ŽįĒžĚľžóźžĄú ŽßĶžĚĄ žä§ŪĀ¨Ž°§ŪēėŽ©ī absolute
        // žěźžčĚžĚī žĹėŪÖźžł†žôÄ Ūē®ÍĽė ŽįÄŽ†§ žčúžēľžóźžĄú žā¨ŽĚľžßÄŽäĒ Ž¨łž†úÍįÄ žěąžóąžĚĆ.
        // .map-areaŽäĒ HUD ŽįĒŽ°ú žēĄŽěė žėĀžó≠žĚīŽĚľ, ŪÜ†žä§ŪäłŽäĒ žä§ŪĀ¨Ž°§Í≥ľ Ž¨īÍīÄŪēėÍ≤Ć
        // Í∑ł žÉĀŽč®žóź Í≥†ž†ēžúľŽ°ú Žú®Í≥† HUD/žĻīŽďúžôÄŽŹĄ Í≤ĻžĻėžßÄ žēäŽäĒŽč§.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, requestWait, lootToast, onLootToastDone, tileEventToast, onTileEventToastDone, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            // D-53: [ŽßĶ Ž≥īÍłį] Ž™®ŽďúžóźžĄúŽäĒ Žį©Ž¨ł/ŽįúÍ≤¨ žó¨Ž∂ÄžôÄ Ž¨īÍīÄŪēėÍ≤Ć Ž™®Žď† ŽĻĄžĖīžěąžßÄ žēäžĚÄ ŪÉÄžĚľ Í≥ĶÍįú.
            // ŽĮłŽį©Ž¨ł ŪÉÄžĚľžĚÄ HexTile ŽāīŽ∂ÄžóźžĄú ŽįėŪą¨Ž™Ö ŪöĆžÉČžúľŽ°ú Í∑łŽ¶įŽč§.
            // D-80 Ž≥īÍįē(2026-04-24): silhouette ŪĒĆŽěėÍ∑łŽŹĄ Ž†ĆŽćĒ ŽĆÄžÉĀ ‚ÄĒ listen žčúž†źžóź ž¶Čžčú ŽÖłž∂ú.
            //   (žĚīž†ĄžóĒ discovered=falseŽ©ī filteržóźžĄú ÍĪłŽ†§ žĚīŽŹô ŪõĄžóźžēľ Ží§Žä¶Í≤Ć ŽāėŪÉÄŽāėŽäĒ Ž≤ĄÍ∑łÍįÄ žěąžóąžĚĆ.)
            const visibleTiles = showPathView
                ? tiles.filter(t => !t.isEmpty)
                : tiles.filter(t => t.visited || t.discovered || t.revealed || t.silhouette);
            const containerRef = React.useRef(null);

            // D-54: ŪĒĆŽ†ąžĚī Í∑łŽ¶¨Žďú ž£ľŽ≥Äžóź ŽĄČŽĄČŪēú ŽĻą ŪĆ®ŽĒ©žĚĄ ŽĎźžĖī žä§ŪĀ¨Ž°§ŪēīŽŹĄ "ŽĀĚ"žĚī
            // žēą Ž≥īžĚīÍ≤Ć ŪēúŽč§. SVG žīĚ ŪĀ¨ÍłįŽäĒ mapGeneratorÍįÄ PADDING_HEXES ŽįėžėĀŪēī žāįž∂ú.
            const mapExtent = React.useMemo(() => {
                const gen = new MapGenerator(MAP_SIZE);
                return gen.getMapExtent();
            }, []);

            // D-82 (2026-04-24 žöĒŪēú žßÄžčú): ŽßĶ ž°įžěĎ ÍįúžĄ†.
            //   - ÍĺĻ ŽąĄŽ•ł žĪĄ ŽďúŽěėÍ∑ł ‚Üí ŽßĶ pan (PC Žßąžöįžä§ + Ž™®ŽįĒžĚľ 1 finger).
            //   - Žßąžöįžä§ Ūú† ‚Üí ŪôēŽĆÄ/ž∂ēžÜĆ (PC).
            //   - ŽĎź žÜźÍįÄŽĚĹ ŪēÄžĻė ‚Üí ŪôēŽĆÄ/ž∂ēžÜĆ (Ž™®ŽįĒžĚľ).
            //   - ŽďúŽěėÍ∑ł žěĄÍ≥ĄÍįí 4px ŽĄėžúľŽ©ī ÍįôžĚÄ ž†úžä§ž≤ėžĚė click(=hex tap) žĚīŽ≤§ŪäłŽ•ľ capture Žč®Í≥ĄžóźžĄú žį®Žč®.
            const [zoom, setZoom] = React.useState(1);
            const zoomRef = React.useRef(1);
            React.useEffect(() => { zoomRef.current = zoom; }, [zoom]);
            const ZOOM_MIN = 0.5;
            const ZOOM_MAX = 2.5;

            // D-47 (2026-04-22 žöĒŪēú žßÄžčú): Í≤ĆžěĄ žčúžěĎ žčú ŪėĄžě¨ žúĄžĻė ŪÉÄžĚľžĚī žä§ŪĀ¨Ž°§
            // Ž∑įŪŹ¨Ūäł ž§Ďžēôžóź žė§ŽŹĄŽ°Ě 1ŪöĆ ž†ēŽ†¨. žĚīž†ĄžóĒ Ūē≠žÉĀ (0,0)žóźžĄú žčúžěĎŪēī Žß§Ž≤ą
            // žčúžěĎ žúĄžĻėŽ•ľ žįĺžēĄžēľ ŪĖąžĚĆ.
            // useLayoutEffectŽ°ú paint ž†Ąžóź žä§ŪĀ¨Ž°§žĚĄ žě°žēĄ ÍĻúŽĻ°žěĄ žóÜžĚĆ.
            // ŽßąžöīŪäł žčú 1ŪöĆŽßĆ ‚ÄĒ žĚīŪõĄ žĚīŽŹô žěźžú†, žěźŽŹô ž∂Ēž†ĀžĚÄ žēą Ūē®.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-82: ŽďúŽěėÍ∑ł/ž§Ć žĚīŽ≤§Ūäł ŽįĒžĚłŽĒ©. ŽĄ§žĚīŪčįŽłĆ Ž¶¨žä§ŽĄąŽ°ú Ž∂ôžó¨ wheelžóźžĄú preventDefault ÍįÄŽä•.
            React.useEffect(() => {
                const el = containerRef.current;
                if (!el) return;

                const drag = { active: false, startX: 0, startY: 0, sL: 0, sT: 0, moved: false };
                const pinch = { active: false, dist: 0, zoomStart: 1 };
                let blockNextClick = false;

                // D-88 (2026-04-25): pinch ž§Ďžč¨ž†ź ŽďúŽ¶¨ŪĒĄŪäł žąėž†ē.
                // Ūēú ŪĒĄŽ†ąžěĄžóź setZoom + rAFŽ°ú scrollLeftžĚĄ ž†Āžö©ŪēėŽäĒ ÍĶ¨ž°įžóźžĄú, touchmoveÍįÄ
                // rAFŽ≥īŽč§ ŽĻ†Ž•īÍ≤Ć žóįžÜć ŽįúžÉĚŪēėŽ©ī Žč§žĚĆ ŪĒĄŽ†ąžěĄ Í≥ĄžāįžĚī "žÉą zoom + DOMžĚė žėõ scrollLeft"
                // Ž•ľ žĄěžĖī cx Í≥ĄžāįžĚī žĖīÍłčŽā®(ž§Ďžč¨ž†źžĚī žÜźÍįÄŽĚĹžóźžĄú ž†źž†ź Ž©ÄžĖīžßź). žĚėŽŹĄŽźú žä§ŪĀ¨Ž°§
                // žúĄžĻėŽ•ľ refžóź ŽŹôÍłįŽ°ú ÍłįŽ°ĚŪēėÍ≥† ž§Ć Í≥ĄžāįžĚÄ ž†ĄŽ∂Ä žĚī refŽßĆ Ž≥īÍ≤Ć ŪēúŽč§.
                const scrollRef = { x: el.scrollLeft, y: el.scrollTop };
                const syncScrollFromDOM = () => {
                    scrollRef.x = el.scrollLeft;
                    scrollRef.y = el.scrollTop;
                };

                const getDist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

                const beginPan = (x, y) => {
                    syncScrollFromDOM();
                    drag.active = true;
                    drag.startX = x;
                    drag.startY = y;
                    drag.sL = scrollRef.x;
                    drag.sT = scrollRef.y;
                    drag.moved = false;
                    el.classList.add('dragging');
                };
                const continuePan = (x, y) => {
                    if (!drag.active) return;
                    const dx = x - drag.startX;
                    const dy = y - drag.startY;
                    if (!drag.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                        drag.moved = true;
                    }
                    el.scrollLeft = drag.sL - dx;
                    el.scrollTop = drag.sT - dy;
                    syncScrollFromDOM();
                };
                const endPan = () => {
                    if (drag.moved) blockNextClick = true;
                    drag.active = false;
                    el.classList.remove('dragging');
                };

                // ŪēĶžč¨: focusOffset(viewport Žāī ŪĒĹžÖÄ) Íłįž§ÄžúľŽ°ú žĹėŪÖźžł† žĘĆŪĎúŽ•ľ Í≥Ąžāį.
                // scrollRef.xŽäĒ ŽßąžßÄŽßČžúľŽ°ú "žĚėŽŹĄŪēú" žä§ŪĀ¨Ž°§žĚīŽĚľ rAF ŽĆÄÍłį ž§ĎžóźŽŹĄ žĚľÍīÄŽź®.
                const applyZoomAt = (ratio, focusClientX, focusClientY) => {
                    const prev = zoomRef.current;
                    const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, prev * ratio));
                    if (Math.abs(next - prev) < 0.001) return;
                    const rect = el.getBoundingClientRect();
                    const focusOffsetX = focusClientX - rect.left;
                    const focusOffsetY = focusClientY - rect.top;
                    const factor = next / prev;
                    const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                    const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                    zoomRef.current = next;
                    scrollRef.x = newScrollL;
                    scrollRef.y = newScrollT;
                    setZoom(next);
                    requestAnimationFrame(() => {
                        el.scrollLeft = newScrollL;
                        el.scrollTop = newScrollT;
                    });
                };

                // ‚ĒÄ‚ĒÄ Mouse ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
                const onMouseDown = (e) => {
                    if (e.button !== 0) return; // žĘĆŪĀīŽ¶≠ŽßĆ
                    beginPan(e.clientX, e.clientY);
                };
                const onMouseMove = (e) => { continuePan(e.clientX, e.clientY); };
                const onMouseUp = () => { endPan(); };
                const onWheel = (e) => {
                    e.preventDefault();
                    const ratio = e.deltaY > 0 ? 0.9 : 1.1;
                    applyZoomAt(ratio, e.clientX, e.clientY);
                };

                // ‚ĒÄ‚ĒÄ Touch ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
                const onTouchStart = (e) => {
                    if (e.touches.length === 2) {
                        // ŪēÄžĻė žčúžěĎ ‚ÄĒ pan ž§ĎŽč®.
                        if (drag.active) { drag.active = false; el.classList.remove('dragging'); }
                        pinch.active = true;
                        pinch.dist = getDist(e.touches[0], e.touches[1]);
                        pinch.zoomStart = zoomRef.current;
                    } else if (e.touches.length === 1) {
                        pinch.active = false;
                        beginPan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchMove = (e) => {
                    if (pinch.active && e.touches.length === 2) {
                        e.preventDefault();
                        const d = getDist(e.touches[0], e.touches[1]);
                        if (pinch.dist === 0) return;
                        const ratio = d / pinch.dist;
                        const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinch.zoomStart * ratio));
                        if (Math.abs(next - zoomRef.current) < 0.001) return;
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const factor = next / zoomRef.current;
                        const rect = el.getBoundingClientRect();
                        const focusOffsetX = midX - rect.left;
                        const focusOffsetY = midY - rect.top;
                        const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                        const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                        zoomRef.current = next;
                        scrollRef.x = newScrollL;
                        scrollRef.y = newScrollT;
                        setZoom(next);
                        requestAnimationFrame(() => {
                            el.scrollLeft = newScrollL;
                            el.scrollTop = newScrollT;
                        });
                    } else if (drag.active && e.touches.length === 1) {
                        e.preventDefault();
                        continuePan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchEnd = (e) => {
                    if (e.touches.length < 2) pinch.active = false;
                    if (e.touches.length === 0) endPan();
                };

                // ‚ĒÄ‚ĒÄ Click capture ‚ÄĒ ŽďúŽěėÍ∑ł ŪõĄ ŽįúžÉĚŪēú click žĖĶž†ú ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
                const onClickCapture = (e) => {
                    if (blockNextClick) {
                        e.stopPropagation();
                        e.preventDefault();
                        blockNextClick = false;
                    }
                };

                el.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                el.addEventListener('wheel', onWheel, { passive: false });
                el.addEventListener('touchstart', onTouchStart, { passive: false });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('touchcancel', onTouchEnd);
                el.addEventListener('click', onClickCapture, true);

                return () => {
                    el.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    el.removeEventListener('wheel', onWheel);
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('touchcancel', onTouchEnd);
                    el.removeEventListener('click', onClickCapture, true);
                };
            }, []);

            // D-50/D-89: žóĒŪčįŪčį Žßź(piece) ‚ÄĒ ŪÉÄžĚľ žúĄžóź žĖĻŪěąŽäĒ SVG text žė§Ž≤ĄŽ†ąžĚī.
            //   transition žä¨ŽĚľžĚīŽďú Ž≥īž°īžĚĄ žúĄŪēī Žč®žĚľ SVG text žĚłžä§ŪĄīžä§Ž•ľ žú†žßÄ.
            //   D-89: ŪÉÄžĚľ ž§Ďžēô ŪÜĶŪē© žä§ŪÉĚ ŽŹĄžěÖ ‚Üí player/bossŽŹĄ Í∑ł žä§ŪÉĚžĚė Ūēú žä¨Ž°ĮžĚĄ žį®žßÄ.
            //   HexTile/GameMap ŽĎė Žč§ computeTileIconsŽ°ú ÍįôžĚÄ žěÖŽ†•‚ÜíÍįôžĚÄ Í≤įÍ≥ľŽ•ľ ŽįõžēĄ
            //   žä¨Ž°Į žĚłŽćĪžä§ÍįÄ žěźŽŹô žĚľžĻėŪēúŽč§.
            const computeStackOffset = (tileObj, isPlayerTile, isBossTile) => {
                if (!tileObj) return null;
                const ctx = {
                    isCurrent: isPlayerTile,
                    isBoss: isBossTile,
                    showPrey: tileObj.visited && (preys || []).some(p => p.tileId === tileObj.id) && !isBossTile,
                    preyEmoji: (() => {
                        const p = (preys || []).find(pp => pp.tileId === tileObj.id);
                        return p ? (PREY_EMOJI[p.preyType] || '‚Ěď') : null;
                    })(),
                    hasCarcass: carcassTiles && carcassTiles.has && carcassTiles.has(tileObj.id),
                    hasTrace: preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tileObj.id),
                    hasCarcassTrace: carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tileObj.id),
                    hasBait: baitTiles && baitTiles.has && baitTiles.has(tileObj.id)
                };
                const icons = computeTileIcons(tileObj, ctx);
                const layout = TILE_STACK_LAYOUTS[Math.min(icons.length, TILE_STACK_MAX)] || [];
                const idx = icons.findIndex(i => isPlayerTile ? i.isPlayer : i.isBoss);
                return (idx >= 0 && layout[idx]) ? layout[idx] : { dx: 0, dy: 8 };
            };
            const playerTile = tiles[currentTile];
            const playerPos = playerTile && playerTile.position;
            const playerStackOff = playerPos
                ? computeStackOffset(playerTile, true, !!(boss && bossVisible && boss.position === currentTile))
                : null;
            const bossTile = (boss && bossVisible && tiles[boss.position]) ? tiles[boss.position] : null;
            const bossPiecePos = bossTile ? bossTile.position : null;
            const bossStackOff = bossPiecePos
                ? computeStackOffset(bossTile, currentTile === boss.position, true)
                : null;

            return (
                <div className="map-area">
                    <div className="map-container" ref={containerRef}>
                        <svg
                            className="map-svg"
                            width={mapExtent.totalWidth * zoom}
                            height={mapExtent.totalHeight * zoom}
                            viewBox={`0 0 ${mapExtent.totalWidth} ${mapExtent.totalHeight}`}
                        >
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                    requestWait={requestWait}
                                    preys={preys}
                                    preyTraceTiles={preyTraceTiles}
                                    carcassTiles={carcassTiles}
                                    carcassTraceTiles={carcassTraceTiles}
                                    baitTiles={baitTiles}
                                    moveHistory={moveHistory}
                                    bossMoveHistory={bossMoveHistory}
                                    showPathView={showPathView}
                                />
                            ))}
                            {playerPos && playerStackOff && (
                                <text
                                    className="piece piece-player"
                                    x={playerPos.x + playerStackOff.dx}
                                    y={playerPos.y + playerStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                    fontWeight="700"
                                    fill="#fff"
                                    stroke="#1a1a2e"
                                    strokeWidth="1.5"
                                    paintOrder="stroke"
                                >
                                    ‚ôü
                                </text>
                            )}
                            {bossPiecePos && bossStackOff && (
                                <text
                                    className="piece piece-boss"
                                    x={bossPiecePos.x + bossStackOff.dx}
                                    y={bossPiecePos.y + bossStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                >
                                    ūü¶Ė
                                </text>
                            )}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                    <TileEventToast toast={tileEventToast} onDone={onTileEventToastDone} />
                </div>
            );
        }

        // ŪÉÄžĚľ žĚīŽ≤§Ūäł Ž™®Žč¨ žĽīŪŹ¨ŽĄĆŪäł ‚ÄĒ Ūē®ž†ēŽßĆ žā¨žö©.
        // D-52 (2026-04-23 žöĒŪēú žßÄžčú): 'Ūíćž°ĪŪēú ŽēÖ(ÍĶ¨ žĘčžĚÄ Í≥≥)'žĚÄ Ž™®Žč¨ ‚Üí ŪÜ†žä§ŪäłŽ°ú žĚīÍīÄ.
        // Ūē®ž†ēžĚÄ ŪĒľŪēī ž†ēŽ≥īÍįÄ žěąžĖī Ž™Öžčúž†Ā ŪôēžĚłžĚī ŪēĄžöĒŪēėŽĮÄŽ°ú Ž™®Žč¨ žú†žßÄ.
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;

            const getEventInfo = () => {
                switch(tile.type) {
                    case 'trap':
                        return {
                            emoji: '‚ö†ÔłŹ',
                            title: 'Ūē®ž†ē!',
                            message: tile.damage ? `žÉĚŽ™ÖŽ†•žĚī ${tile.damage} ÍįźžÜĆŪĖąžäĶŽčąŽč§!` : 'žúĄŪóėŪēú Ūē®ž†ēžĚī žěąžäĶŽčąŽč§!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>

        // žĚłŽ≤§ŪÜ†Ž¶¨ Ž™®Žč¨ žĽīŪŹ¨ŽĄĆŪäł

        // Í≤ĆžěĄžĚÄ žóįŪÉÄ/ŽďúŽěėÍ∑łÍįÄ žě¶žēĄ žßßžĚÄ žĚėŽŹĄŽ•ľ ŽÜďžĻėŽ©ī ŽčĶŽčĶŪēėÍ≥†, ŽįėŽĆÄŽ°ú ŽĄąŽ¨ī žßßžúľŽ©ī žä§žôÄžĚīŪĒĄÍįÄ žěėŽ™Ľ žĚłžčĚŽźúŽč§.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onLureBait, onFlashMessage }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // Ūôēž†ē ŽĆÄÍłį žúĄžĻė (Í∑łŽ¶¨Žďú žÖÄžĚĄ ŽąĆŽü¨ žßÄž†ē)
            const [pendingPos, setPendingPos] = React.useState(null);

            const [infoItem, setInfoItem] = React.useState(null);

            // D-104 (2026-04-27 žöĒŪēú žßÄžčú): Ūē©žĄĪ ŪĆ®ŽĄź Ūē≠žÉĀ Ž†ĆŽćĒ + žĻīŪÖĆÍ≥†Ž¶¨ ŪÉ≠.
            //   ŽĻĄžĄ†ŪÉĚ žÉĀŪÉúžóźžĄúŽŹĄ Ž™®Žď† Ž†ąžčúŪĒľŽ•ľ žĻīŪÖĆÍ≥†Ž¶¨Ž≥ĄŽ°ú ŪēĄŪĄįŽßĀŪēī ŽÖłž∂ú.
            //   žú†ž†ÄÍįÄ ŽßąžßÄŽßČžúľŽ°ú Í≥†Ž•ł žĻīŪÖĆÍ≥†Ž¶¨ŽäĒ localStoragežóź Ž≥īž°ī.
            const [recipeCategory, setRecipeCategory] = React.useState(() => {

            // ÍįÄŽį© ŽčęÍłį ‚ÄĒ žĄ†ŪÉĚ Ž™®ŽďúŽŹĄ Ūē®ÍĽė ž∑®žÜĆ(D-104 žöĒŪēú žßÄžčú: ŽčęÍ≥† Žč§žčú žóīžĖīŽŹĄ žĄ†ŪÉĚŽ™®Žďú žú†žßÄŽźėŽ©ī žēą Žź®).
            const handleClose = () => {

            const ROWS = inventory.rows, COLS = inventory.cols, CELL = 47, PAD = 4;
            const LONG_PRESS_MS = 400;

            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // D-83 (2026-04-24 žöĒŪēú žßÄžčú): ŪÉ≠ ‚ÜĒ Ž°ĪŪĒĄŽ†ąžä§ žó≠Ūē† žä§žôĎ.
            //   žč†Í∑ú UX:
            //     - žßßžĚÄ ŪÉ≠  = žĄ†ŪÉĚ Ž™®Žďú žßĄžěÖ/ŪÜ†ÍłÄ/Ž®łžßÄ/swap (ž£ľ ž°įžěĎ)
            //     - Ž°ĪŪĒĄŽ†ąžä§ = žēĄžĚīŪÖú ž†ēŽ≥īžįĹ
            //     - ž°įŪē©žĚÄ ŪēėŽč® Ūē©žĄĪ ŪĆ®ŽĄźžĚė [ŽßĆŽď§Íłį] Ž≤ĄŪäľ ž†Ąžö© ‚ÄĒ Žč§Ž•ł žě¨Ž£Ć ŪÉ≠žĚÄ swapŽßĆ žąėŪĖČ.
            //   žĚīž†Ą UX(D-32)ŽäĒ Ž°ĪŪĒĄŽ†ąžä§=žĄ†ŪÉĚ, ŪÉ≠=ž†ēŽ≥īžįĹ+žěźŽŹô ž°įŪē©žĚīžóąžúľŽāė,
            //   "žúĄžĻė ÍĶźž≤īŪēėŽ†§Žč§ žĚėŽŹĄžĻė žēäÍ≤Ć ž°įŪē©žĚī ŽįúŽŹô"ŽźėŽäĒ žľÄžĚīžä§ÍįÄ žěąžĖī ž£ľ ž°įžěĎžĚĄ ŪÉ≠žúľŽ°ú

            const onShortTap = (item) => {

                if (!selectedItem) {

                if (selectedItem.id === item.id) {

                    setPendingPos(null);

                // Žč§Ž•ł žēĄžĚīŪÖú ŪÉ≠ ‚Üí confirmPlacementŽ°ú žĚľžěĄ:

                const res = inventory.confirmPlacement(item.x, item.y);

            const onLongPressInfo = (item) => {

            // D-48: confirmPlacement Í≤įÍ≥ľ ŽįėžėĀ Í≥ĶŪÜĶ Ūó¨Ūćľ.

            //   - swap: žÉą žēĄžĚīŪÖúžúľŽ°ú žĄ†ŪÉĚ ž†ĄŪôė.
            //   - place: ŽįįžĻė ŪõĄ žĄ†ŪÉĚ Ūēīž†ú.

            const applyDropResult = (res) => {
                if (!res || !res.ok) return false;
                if (res.action === 'swap') {
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem

                    return true;
                }
                setSelectedItem(null);
                setPendingPos(null);
                if (onFlashMessage && res.resultType && res.action === 'merge') {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    onFlashMessage(`ŽĎź žě¨Ž£ĆŽ•ľ Ūē©ž≥ź ${resultName}žĚĄ(Ž•ľ) žĖĽžóąŽč§.`);
                }
                return true;
            };

            // D-47 [ŽßĆŽď§Íłį] Ž≤ĄŪäľ ŪēłŽď§Žü¨ ‚ÄĒ žč§ž†ú žě¨Ž£Ć žÜĆŽĻĄ¬∑Í≤įÍ≥ľ ŽįįžĻėŽäĒ inventory.craftRecipe.
            // D-48: žĄĪÍ≥Ķ žčú žĄ†ŪÉĚ Ūēīž†ú (žě¨Ž£ĆÍįÄ žĄ†ŪÉĚŽźú žēĄžĚīŪÖúžĚīžóąžĚĄ žąė žěąžĚĆ). ŪĆ®ŽĄźžĚÄ selectedItem
            //   ÍłįŽįėžĚīŽĚľ Ūēīž†úŽßĆ ŪēīŽŹĄ žěźŽŹôžúľŽ°ú ŽčęŪěė.
            const handleCraft = (recipe) => {

                        const produced = Number(res.produced || 1);

                            : `žě¨Ž£ĆŽ•ľ ž°įŪē©Ūēī ${name}žĚĄ(Ž•ľ) ŽßĆŽď§žóąŽč§.`;
                        if (res.overflow > 0) msg += ` (ÍįÄŽį©žĚī ÍįÄŽďĚ žį® ${res.overflow}ÍįúŽäĒ ŽĎźÍ≥† žôĒŽč§.)`;
                        onFlashMessage(msg);
                    }
                    inventory.selectedItem = null;
                    setSelectedItem(null);
                    setPendingPos(null);
                } else if (res.reason === 'no_space') {
                    if (onFlashMessage) onFlashMessage('ÍįÄŽį©žĚī ÍįÄŽďĚ žį® ŽßĆŽď§ žąė žóÜŽč§.');
                } else if (res.reason === 'short_ingredients') {

                }
                bump();

            const onItemPointerDown = (e, item) => {

                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    onLongPressInfo(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {

            const onItemPointerCancel = () => {

                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // Ž†ąÍĪįžčú: Íłįž°ī onClick Í≤ĹŽ°ú žú†žßÄ (Ūā§Ž≥īŽďú ž†ĎÍ∑ľžĄĪ/Íłįž°ī ŪÖĆžä§Ūäł ŪėłŪôė).
            // ŪŹ¨žĚłŪĄį ÍłįŽįė Ž∂ĄÍłįÍįÄ ŽįúŽŹôŪēėŽ©ī longFiredÍįÄ trueÍįÄ ŽźėžĖī ž§ĎŽ≥Ķ Ūėłž∂úŽźėžßÄ žēäŽŹĄŽ°Ě ÍįÄŽďú.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // ŪŹ¨žĚłŪĄį žĚīŽ≤§ŪäłÍįÄ žďįžĚīžßÄ žēäŽäĒ ŪôėÍ≤ĹžóźžĄúžĚė ŪŹīŽįĪ
                onShortTap(item);

            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // žēĄžĚīŪÖú ž†úÍĪį
                    inventory.removeItem(infoItem);

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();

            // D-91 (2026-04-25 žöĒŪēú žßÄžčú): Ūö®Í≥ľ žąėžĻė ŽÜížĚÄ žąú ŽāīŽ¶ľžį®žąú ž†ēŽ†¨.

            //   žÉĚÍ≥†Íłį hunger+1/health-1 Ūē©=0Ž≥īŽč§ žāįŽĒłÍłį hunger+1 Ūē©=1žĚī žúĄŽ°ú.
            const scoreItem = (notionItem) => {

                let s = 0;
                for (const a of parsed.actions) {

            const candidates = (inventory?.items || []).filter(invItem => {

                const aNotion = byName(aDef.name || a.name);

                const sb = scoreItem(bNotion);
                const sa = scoreItem(aNotion);
                if (sb !== sa) return sb - sa;
                // ŽŹôž†ź ‚Üí žĚīŽ¶Ąžąú(ÍįÄŽŹÖžĄĪ)
                return String(aDef.name || a.name || '').localeCompare(String(bDef.name || b.name || ''));

            // ŽįėŪôė: JSX or null

                // žėą: action {stat:'hunger', delta:1}, recoverScale=2 ‚Üí 'ŽįįÍ≥†ŪĒĒ +1 +1'
                //     ŽįįÍ≥†ŪĒĒ(ŪöĆžÉČ) / '+1'(ŪöĆžÉČ) / '+1'(ŽÖłŽěÄžÉČ = ž¶ĚŽ∂Ą)
                const parts = parsedEffect.actions.map((a, i) => {

            }

                        {showCookBtn && (

        // D-57 (2026-04-24 žöĒŪēú žßÄžčú): žöĒŽ¶¨ Ž™®Žč¨.

        //   - ŪúīžčĚ Ž™®Žč¨žĚÄ ŽįĪÍ∑łŽĚľžöīŽďúžóź žú†žßÄ ‚ÄĒ žôĄžĄĪŽźú ÍĶ¨žĚīŽ•ľ ŽįĒŽ°ú žčĚžā¨ ŪõĄŽ≥īŽ°ú žĄ†ŪÉĚ ÍįÄŽä•.

        // D-47 Ūē©žĄĪ ŪĆ®ŽĄź ‚ÄĒ žĚłŽ≤§ Ž™®Žč¨ ŪēėŽč®žóź Í≥†ž†ēŽźú ŽįĒ ŪėēŪÉú.

        //   - ÍįĀ žĻīŽďú: žě¨Ž£Ć(ŪēĄžöĒ žąėŽüČ) + Í≤įÍ≥ľ, Ž≥īžú†ŽüČžúľŽ°ú žôĄžĄĪ ÍįÄŽä• žó¨Ž∂Ä¬∑Ž∂Äž°Ī žě¨Ž£Ć ŪĎúÍłį.

        //   - ÍįôžĚÄ žě¨Ž£Ć Ž®łžßÄŽäĒ žĚī ŪĆ®ŽĄźžóź žēą Žúł (ž¶Čžčú žč§ŪĖČ Í≤ĹŽ°ú).
        //   D-104 (2026-04-27 žöĒŪēú žßÄžčú): Ūē≠žÉĀ Ž†ĆŽćĒ. ŽĻĄžĄ†ŪÉĚ žčú žĻīŪÖĆÍ≥†Ž¶¨ ŪÉ≠ 5žĘÖ ŽÖłž∂ú.

        //   - victory=false ‚Üí 0 (žā¨ŽßĚžĚÄ ž†źžąė Ž¨īŪö®).
        //   - žÉĚž°ī 100 + uniqueTilesVisited*3 + (detection<80 ? 30 : 0).
        //     ‚ÜĎ žöĒŪēú žßÄžčú (2026-04-24): žčúÍįĄ žěĒžó¨ ž†źžąėŽäĒ Ž™®Ūėł ‚Üí žĚīŽŹôÍĪįŽ¶¨(žßĀž†Ď ŽįüžĚÄ Í≥†žú† ŪÉÄžĚľ žąė)Ž°ú ÍĶźž≤ī.
        //   - L1 prey 5 / L2 prey 20 / Ž≥īžä§ ÍĪįŽ¶¨‚Č§2 žßĄžěÖ 15 (ÍįĀÍįĀ ŽąĄž†Ā žĻīžöīŪäł * ÍįÄž§ĎžĻė).

        //   selectedItemsÍįÄ nullžĚīŽ©ī items ž†Ąž≤īŽ°ú Í≥Ąžāį.
        // ============================================
        function calculateRunScore({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return 0;
            let score = 100;
            score += Math.max(0, Number(uniqueTilesVisited) || 0) * 3;
            if ((Number(detection) || 0) < 80) score += 30;

            const stats = runStats || {};
            score += (Number(stats.l1PreyKills) || 0) * 5;
            score += (Number(stats.l2PreyKills) || 0) * 20;
            score += (Number(stats.bossDangerEntered) || 0) * 15;

            // žěźžõź ž†źžąė ‚ÄĒ selectedItemsÍįÄ ŽįįžóīžĚīŽ©ī Í∑łÍ≤ÉŽßĆ, nullžĚīŽ©ī items ž†Ąž≤ī.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);

                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === 'Ž¨īÍłį') { score += 5; continue; }
                if (cat === 'shield' || cat === 'armor') { score += 8; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) score += 1;
                else if (grade === 2) score += 3;
                else if (grade === 3) score += 6;
            }
            return score;

        //     - onItemClick(item): žēĄžĚīŪÖú žėĀžó≠ ŪÉ≠ ‚ÄĒ Žč§ž§ĎžĄ†ŪÉĚ ŪÜ†ÍłÄ ŽďĪžóź žā¨žö©.
        //     - onItemLongPress(item): ÍłłÍ≤Ć ŽąĄŽ•īŽ©ī ItemInfoModal žóīÍłį ŽďĪ.
        //   ÍłįŽ≥łžĚÄ ž†ēž†Ā ŪĎúžčú(ŪĀīŽ¶≠ ŪēłŽď§Žü¨ žóÜžĚĆ).
        function CampInventoryGrid({ inventory, cellSize, selectedIds, onItemClick, onItemLongPress }) {
            if (!inventory) return null;
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = Number(cellSize) > 0 ? Number(cellSize) : 36;
            const PAD = 3;
            const selSet = selectedIds instanceof Set
                ? selectedIds
                : (Array.isArray(selectedIds) ? new Set(selectedIds) : null);

            // ÍłłÍ≤Ć ŽąĄŽ•īÍłį(Ž°ĪŪĒĄŽ†ąžä§) ÍįźžßÄ ‚ÄĒ 500ms.
            const pressTimerRef = React.useRef(null);
            const longFiredRef = React.useRef(false);
            const startPress = (item) => {
                longFiredRef.current = false;
                if (typeof onItemLongPress !== 'function') return;
                pressTimerRef.current = setTimeout(() => {
                    longFiredRef.current = true;
                    onItemLongPress(item);
                }, 500);
            };
            const cancelPress = () => {
                if (pressTimerRef.current) {
                    clearTimeout(pressTimerRef.current);
                    pressTimerRef.current = null;
                }
            };
            const handleClick = (item) => {
                if (longFiredRef.current) return;
                if (typeof onItemClick === 'function') onItemClick(item);
            };

            return (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                        gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                        gap: '2px',
                        background: '#0f3460',
                        padding: `${PAD}px`,
                        borderRadius: '8px'
                    }}>
                        {Array(ROWS).fill(null).map((_, row) =>
                            Array(COLS).fill(null).map((_, col) => {
                                const occupied = !!inventory.grid[row][col];
                                const disabled = inventory.isDisabled && inventory.isDisabled(col, row);
                                return (
                                    <div
                                        key={`${row}-${col}`}
                                        className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                        style={disabled ? { background: '#0a1a2a', opacity: 0.35 } : undefined}
                                    />
                                );
                            })
                        )}
                    </div>
                    {inventory.items.map(item => {
                        const w = item.shape[0].length;
                        const h = item.shape.length;
                        const emoji = itemEmoji(item.type);
                        const selected = selSet && selSet.has(item.id);
                        const interactive = typeof onItemClick === 'function' || typeof onItemLongPress === 'function';
                        return (
                            <div
                                key={item.id}
                                className={`inventory-item${selected ? ' selected' : ''}`}
                                style={{
                                    left: `${item.x * CELL + PAD}px`,
                                    top: `${item.y * CELL + PAD}px`,
                                    width: `${w * CELL - PAD}px`,
                                    height: `${h * CELL - PAD}px`,
                                    fontSize: '9px',
                                    cursor: interactive ? 'pointer' : 'default',
                                    pointerEvents: interactive ? 'auto' : 'none',
                                    outline: selected ? '2px solid #4dd0e1' : undefined,
                                    boxShadow: selected ? '0 0 8px rgba(77,208,225,0.55)' : undefined,
                                    zIndex: selected ? 2 : 1
                                }}
                                onClick={() => handleClick(item)}
                                onMouseDown={() => startPress(item)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onTouchStart={() => startPress(item)}
                                onTouchEnd={cancelPress}
                                onTouchCancel={cancelPress}
                            >
                                {emoji
                                    ? <span style={{ fontSize: Math.round(CELL * 0.55) + 'px', lineHeight: 1 }}>{emoji}</span>
                                    : item.name}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // D-113: Ž≥īÍīÄŪē® Žč®ŽŹÖ ŪíÄžä§ŪĀ¨Ž¶į ŪĆĚžóÖ.

        // D-113: žĚłŽ≤§ ÍįĄ žēĄžĚīŪÖú žĚīž†Ą ‚ÄĒ žĚłžä§ŪĄīžä§ žßĀž†Ď placement (durability/rotation Ž≥īž°ī).
        //   selectedIds: žėģÍłł source žēĄžĚīŪÖú id Žįįžóī.
        //   src/dst: InventorySystem žĚłžä§ŪĄīžä§. dstžóź ŽĻą žěźŽ¶¨ žóÜžúľŽ©ī Ž∂ÄŽ∂Ą žĚīž†Ą(Žď§žĖīÍįĄ ŽßĆŪĀľŽßĆ).
        //   ŽįėŪôė: { moved: [item...], failed: [item...] } ‚ÄĒ Ūėłž∂úŽ∂Ä ŪÜ†žä§Ūäł Ž©ĒžčúžßÄžóź žā¨žö©.
        //   srcžóźžĄú ž†úÍĪį + dstžóź žÉą žĘĆŪĎúŽ°ú placeItem. idŽäĒ dst žł°žóźžĄú žÉąŽ°ú ŽįúÍłČ(ÍįôžĚÄ id ž∂©ŽŹĆ Žį©žßÄ).
        function transferItems(src, dst, selectedIds) {
            const idSet = new Set(selectedIds || []);
            const moved = [];
            const failed = [];
            // src.itemsŽ•ľ Ž≥Ķžā¨ ŪõĄ žąúŪöĆ ‚ÄĒ removeItem žčú src.itemsŽŹĄ ÍįĪžč†ŽźėŽĮÄŽ°ú ŽĮłŽ¶¨ ŽĖ†ŽĎźÍłį.
            const targets = src.items.filter(it => idSet.has(it.id));
            for (const it of targets) {
                const shape = it.shape;
                const pos = dst.findEmptySpace(shape);
                if (!pos) { failed.push(it); continue; }
                const placed = {
                    ...it,
                    id: Date.now() + Math.random(),
                    x: pos.x,
                    y: pos.y
                };
                // srcžóźžĄú Í∑łŽ¶¨Žďú ŽĻĄžöįÍ≥† itemsžóźžĄú ž†úÍĪį.
                src.removeItem(it);
                src.items = src.items.filter(x => x.id !== it.id);
                // dstžóź ŽįįžĻė.
                dst.placeItem(placed);
                dst.items.push(placed);
                moved.push(placed);
            }
            return { moved, failed };
        }

        // D-113: Ž≥īÍīÄŪē® ‚ÜĒ ÍįÄŽį© Žč§ž§ĎžĄ†ŪÉĚ¬∑žėģÍłįÍłį¬∑žĄúŽ°ú ŽįĒÍĺłÍłį ŪíÄžä§ŪĀ¨Ž¶į Ž™®Žč¨.
        //   props.storage / props.pack ‚ÄĒ InventorySystem žĚłžä§ŪĄīžä§.
        //   props.onChange() ‚ÄĒ Ž≥ÄÍ≤Ĺ ŪõĄ Ž∂ÄŽ™®žóź žě¨Ž†ĆŽćĒ ŪäłŽ¶¨ÍĪį žēĆŽ¶ľ (campState ÍįĚž≤ī žÉąŽ°ú ŽßĆŽď§Íłį).
        //   props.onClose ‚ÄĒ ŽčęÍłį.
        //   žÉĀŪÉú: selectedFromStorage / selectedFromPack (ÍįĀÍįĀ Set<itemId>).
        //   Ž≤ĄŪäľ ŪôúžĄĪ:
        //     - storageŽßĆ žĄ†ŪÉĚ ‚Üí [ÍįÄŽį©žúľŽ°ú]
        //     - packŽßĆ žĄ†ŪÉĚ ‚Üí [Ž≥īÍīÄŪē®žúľŽ°ú]
        //     - žĖĎž™Ĺ žĄ†ŪÉĚ ‚Üí [žĄúŽ°ú ŽįĒÍĺłÍłį]
        function PackTransferModal({ storage, pack, onChange, onClose }) {
            const [selStorage, setSelStorage] = React.useState(() => new Set());
            const [selPack, setSelPack] = React.useState(() => new Set());
            const [toast, setToast] = React.useState(null);

            const toggle = (which, id) => {
                const setter = which === 'storage' ? setSelStorage : setSelPack;
                setter(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 1800);
            };

            const onlyStorage = selStorage.size > 0 && selPack.size === 0;
            const onlyPack = selPack.size > 0 && selStorage.size === 0;
            const both = selStorage.size > 0 && selPack.size > 0;

            // [ÍįÄŽį©žúľŽ°ú žėģÍłįÍłį]
            const moveToPack = () => {
                const ids = Array.from(selStorage);
                const r = transferItems(storage, pack, ids);
                if (r.failed.length > 0) {
                    showToast(`ÍįÄŽį©žĚī ÍįÄŽďĚ ‚ÄĒ ${r.moved.length}ÍįúŽßĆ žėģÍĻÄ`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}ÍįúŽ•ľ ÍįÄŽį©žúľŽ°ú`);
                }
                setSelStorage(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [Ž≥īÍīÄŪē®žúľŽ°ú žėģÍłįÍłį]
            const moveToStorage = () => {
                const ids = Array.from(selPack);
                const r = transferItems(pack, storage, ids);
                if (r.failed.length > 0) {
                    showToast(`Ž≥īÍīÄŪē®žĚī ÍįÄŽďĚ ‚ÄĒ ${r.moved.length}ÍįúŽßĆ žėģÍĻÄ`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}ÍįúŽ•ľ Ž≥īÍīÄŪē®žúľŽ°ú`);
                }
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [žĄúŽ°ú ŽįĒÍĺłÍłį] ‚ÄĒ ŽŹôžčúžóź žĖĎž™ĹžúľŽ°ú Ž≥īŽāłŽč§.
            //   Ž®ľž†Ä žĖĎž™ĹžóźžĄú žĄ†ŪÉĚ žēĄžĚīŪÖúžĚĄ src.itemsžóźžĄú ŽĖľžĖīŽāīÍ≥†(gridŽŹĄ ŽĻĄžõÄ),
            //   ÍįĀÍįĀ žÉĀŽĆÄŪéł dstžóź ŽĻą žěźŽ¶¨žóź ŽįįžĻė. Í≥ĶÍįĄ Ž∂Äž°Ī žčú Ž∂ÄŽ∂ĄŽßĆ žĄĪÍ≥Ķ.
            //   Ž∂ÄŽ∂Ą žĄĪÍ≥Ķ žčú žč§ŪĆ®Ūēú ž™ĹžĚÄ žõźŽěė žĚłŽ≤§žóź Žč§žčú ŽĻą žěźŽ¶¨Ž°ú ŪŹīŽįĪ.
            const swapBoth = () => {
                const sIds = Array.from(selStorage);
                const pIds = Array.from(selPack);
                const sItems = storage.items.filter(it => selStorage.has(it.id));
                const pItems = pack.items.filter(it => selPack.has(it.id));
                // 1) srcžóźžĄú Ž∂ĄŽ¶¨ (žĖĎž™Ĺ Ž™®ŽĎź).
                for (const it of sItems) {
                    storage.removeItem(it);
                    storage.items = storage.items.filter(x => x.id !== it.id);
                }
                for (const it of pItems) {
                    pack.removeItem(it);
                    pack.items = pack.items.filter(x => x.id !== it.id);
                }
                // 2) žÉĀŽĆÄŪéł dstžóź ŽįįžĻė žčúŽŹĄ. žč§ŪĆ® žčú žõźŽěė žĚłŽ≤§žúľŽ°ú Ž≥Ķžõź.
                let movedToPack = 0, movedToStorage = 0, failedBack = 0;
                const place = (item, dst) => {
                    const pos = dst.findEmptySpace(item.shape);
                    if (!pos) return false;
                    const placed = { ...item, id: Date.now() + Math.random(), x: pos.x, y: pos.y };
                    dst.placeItem(placed);
                    dst.items.push(placed);
                    return true;
                };
                for (const it of sItems) {
                    if (place(it, pack)) movedToPack += 1;
                    else {
                        // žõźŽěė storageŽ°ú ŪŹīŽįĪ.
                        if (!place(it, storage)) failedBack += 1;
                    }
                }
                for (const it of pItems) {
                    if (place(it, storage)) movedToStorage += 1;
                    else {
                        if (!place(it, pack)) failedBack += 1;
                    }
                }
                if (movedToPack + movedToStorage === 0) {
                    showToast('Í≥ĶÍįĄžĚī Ž∂Äž°ĪŪēī ŽįĒÍĺłžßÄ Ž™ĽŪē®');
                } else if (sItems.length + pItems.length > movedToPack + movedToStorage) {
                    showToast(`žĚľŽ∂ÄŽßĆ ÍĶźŪôė (ÍįÄŽį© ${movedToPack} / Ž≥īÍīÄŪē® ${movedToStorage})`);
                } else {
                    showToast(`ÍĶźŪôė žôĄŽ£Ć (ÍįÄŽį© ${movedToPack} / Ž≥īÍīÄŪē® ${movedToStorage})`);
                }
                setSelStorage(new Set());
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };

            const btnStyle = (active) => ({
                background: active ? '#d4b84a' : '#2a2a3e',
                color: active ? '#1a1a2e' : '#666',
                border: 'none',

        //   props.score      ‚ÄĒ žĶúžĘÖ ž†źžąė.
        //   props.breakdown  ‚ÄĒ [{ label, value }] žĖĎžąėŽßĆ (0žĚÄ Ūėłž∂úžěźÍįÄ ÍĪłŽü¨ ŽĄėÍĻÄ).
        //   GameEndModal/LootResultScreen/CampScreenžóźžĄú Í≥ĶŪÜĶ žā¨žö©.

        function ScoreBadge({ score, breakdown }) {

            return (
                <div className="score-badge">
                    <div className="score-value">ūüŹÜ ž†źžąė: {score}</div>

        // ž†źžąė žāįž∂ú Žāīžó≠ ‚ÄĒ calculateRunScorežôÄ ÍįôžĚÄ Í∑úžĻôžúľŽ°ú Ūē≠Ž™©Ž≥Ą ÍįÄžāįÍįí žāįž∂ú.
        //   selectedListÍįÄ nullžĚīŽ©ī items ž†Ąž≤ī Íłįž§Ä.
        function buildScoreBreakdown({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return [];
            const rows = [];
            rows.push({ label: 'žÉĚž°ī', value: 100 });
            const tiles = Math.max(0, Number(uniqueTilesVisited) || 0);
            if (tiles > 0) rows.push({ label: `žĚīŽŹôÍĪįŽ¶¨(${tiles})`, value: tiles * 3 });
            if ((Number(detection) || 0) < 80) rows.push({ label: 'žĚÄŽįÄ(ŽįúÍįĀ<80)', value: 30 });

            const stats = runStats || {};
            const l1 = Number(stats.l1PreyKills) || 0;
            const l2 = Number(stats.l2PreyKills) || 0;
            const bd = Number(stats.bossDangerEntered) || 0;
            if (l1) rows.push({ label: `žā¨ŽÉ• L1 √ó${l1}`, value: l1 * 5 });
            if (l2) rows.push({ label: `žā¨ŽÉ• L2 √ó${l2}`, value: l2 * 20 });
            if (bd) rows.push({ label: `Ž≥īžä§ žúĄŪėĎÍ∂Ć √ó${bd}`, value: bd * 15 });

            // žěźžõź ‚ÄĒ gradeŽ≥Ą Ūē©žāį.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            let weapons = 0, armorShield = 0, g1 = 0, g2 = 0, g3 = 0;
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === 'Ž¨īÍłį') { weapons += 1; continue; }
                if (cat === 'shield' || cat === 'armor') { armorShield += 1; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) g1 += 1;
                else if (grade === 2) g2 += 1;
                else if (grade === 3) g3 += 1;
            }
            if (weapons) rows.push({ label: `Ž¨īÍłį √ó${weapons}`, value: weapons * 5 });
            if (armorShield) rows.push({ label: `Žį©žĖīÍĶ¨ √ó${armorShield}`, value: armorShield * 8 });
            if (g1) rows.push({ label: `žěźžõź 1Žč®Í≥Ą √ó${g1}`, value: g1 * 1 });
            if (g2) rows.push({ label: `žěźžõź 2Žč®Í≥Ą √ó${g2}`, value: g2 * 3 });
            if (g3) rows.push({ label: `žěźžõź 3Žč®Í≥Ą √ó${g3}`, value: g3 * 6 });
            return rows;
        }

        // ============================================
        // D-110 (2026-04-24): ž†ĄŽ¶¨Ūíą Í≤įÍ≥ľžįĹ.
        //   props.runFinal     ‚ÄĒ { victory, items, runStats, uniqueTilesVisited, detection }
        //   props.onConfirm(selectedItemIds[]) ‚ÄĒ žĄ†ŪÉĚ Ūē≠Ž™© žļ†ŪĒĄ žĚłžěÖ.
        //   props.onCancel     ‚ÄĒ Ž™®Žč¨ ŽčęÍłį (GameEndModal Ž≥ĶÍ∑Ä).

        //   - ž†Ā ŪĆ®ŪĄī 3žä¨Ž°Į(readonly): ŪöĆŪĒľ / ŪöĆŪĒľ / ŽĻ†Ž•īÍ≤Ć ŽŹĄŽßĚ
        //   - Žāī žä¨Ž°Į 3žĻł: ŽĻĄžóąžúľŽ©ī "ŽĻĄžóąžĚĆ", žĻīŽďú žěąžúľŽ©ī žĻīŽďú Ž†ĆŽćĒ(ŪÉ≠‚ÜížÜźŪĆ® Ž≥ĶÍ∑Ä)
        //   - Ūôēž†ē Ž≤ĄŪäľ: 3žä¨Ž°Į Ž™®ŽĎź žį®žēľ ŪôúžĄĪ
        //   - Žāī žÜźŪĆ®: buildHuntDeck Í≤įÍ≥ľ. ŪÉ≠ žčú ÍįÄžě• žôľž™Ĺ ŽĻą žä¨Ž°Įžóź ŽįįžĻė.
        //
        // žä¨Ž°Į‚ÜĒžÜźŪĆ® žĚīŽŹôžĚÄ uid Íłįž§Ä. "Ží§ žä¨Ž°Į Í≥†ž†ē" žõźžĻô ‚ÄĒ žä¨Ž°Į‚ÜížÜźŪĆ® Ž≥ĶÍ∑Ä žčú Žč§Ž•ł žä¨Ž°Į žúĄžĻė žú†žßÄ.
        // Ūôēž†ē žčú resolveHunt(prey, slots) ‚Üí ŪĄī Ž°úÍ∑ł žąúžį® ŪĎúžčú(500ms) ‚Üí onResolve(result) žĹúŽįĪ.
        // D-58/D-74: HuntCombatModal žąėžĻė ŽįįžßÄ ŪÜĶžĚľ.
        //   - ūüó°ÔłŹ+N / N% / ūüŹĻ+N / ūüõ°ÔłŹ+N žąúžĄú Í≥†ž†ē, ž§ĄŽįĒÍŅą žóÜžĚĆ.
        //   - damage=0 && defense>0 ‚Üí ūüó°ÔłŹ žą®ÍłįÍ≥† ūüõ°ÔłŹ ŪĎúžčú (ŪĀ¨žēĄ žõÖŪĀ¨Ž¶¨Íłį/Žį©ŪĆ® ŽßČÍłį).
        //   - damage=0 && defense=0 (dodge/run_away) ‚Üí ūüó°ÔłŹ¬∑ūüŹĻ žÉĚŽěĶ, N%ŽßĆ.
        //   - ŽĚľŽ≤® ŪÖćžä§Ūäł ž†ĄŽ∂Ä ž†úÍĪį ‚ÄĒ žēĄžĚīžĹė + žąęžěźŽ°ú ŪÜĶžĚľ.
        const STAT_ICONS = { damage: 'ūüó°ÔłŹ', accuracy: 'ūüŹĻ', defense: 'ūüõ°ÔłŹ', evade: 'ūüí®' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff', evade: '#d4b84a' };

        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel }) {
            // D-75: Level 2 preyŽäĒ 4ŪĄī. Level 1žĚÄ Íłįž°ī 3ŪĄī.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // ŪĎúžčúŽźú ŪĄī Ž°úÍ∑ł
            const [result, setResult] = useState(null);

            // D-58/D-60/D-96: žä¨Ž°ĮŽ≥Ą žĶúžĘÖ ŪöĆŪĒľ Í≥Ąžāį (ŪĄīŽ≥Ą base ŽįėžėĀ).
            //   SSOT: combatDeck.js::resolveHunt Í≥ĶžčĚÍ≥ľ ŽŹôžĚľ.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount)
            //     finalEvade = baseEvadeT (Ž™Öž§Ď vs ŪöĆŪĒľŽäĒ Í≤įž†ēŽ°† ŽĻĄÍĶź ‚ÄĒ UIžóźžĄ† base ŪĎúžčú).
            //   damage=0 žĻīŽďú / ŽĻą žä¨Ž°Į ‚Üí base(ŪĄīŽ≥Ą) Í∑łŽĆÄŽ°ú.
            //   card.accuracy(Ž™Öž§Ď)ŽäĒ buildHuntDeck žĚī žĚīŽĮł žĻīŽďú+Ž¨īÍłį Ūē©žāį(D-50).
            // D-75/D-98/D-108: actions_per_turn CSV ŪĆĆžčĪ ‚Üí ŪĄīŽ≥Ą actionDef Žįįžóī.
            //   SSOTŽäĒ combatDeck.js::parsePreyActions + findPreyAction.
            //   slotActions[i] = { id, name, type, damage, accuracy, defense } ‚ÄĒ UI ŽįįžßÄžóź žßĀž†Ď žā¨žö©.
            const slotActions = React.useMemo(() => {
                const ids = CombatDeck.parsePreyActions(prey, SLOT_COUNT);
                return ids.map(id => CombatDeck.findPreyAction(id));
            }, [prey.actions_per_turn, prey.level, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    // D-96: % ‚Üí ž†ēžąė. ŽŹĄž£ľ ŽąĄž†Ā ŪĆ®ŽĄźŪčįŽäĒ 1ŽčĻ ŪöĆŪĒľ -1.
                    const base = Math.max(0, (byTurn[i] ?? 1) - fleeCount);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    // D-96: Í≤įž†ēŽ°† ‚ÄĒ Ž™Öž§Ď ‚Č• ŪöĆŪĒľ ‚Üí Ž¨īž°įÍĪī Ž™Öž§Ď(final=0). ŪöĆŪĒľ > Ž™Öž§Ď ‚Üí Ž¨īŪö®(final=base).
                    const acc = Number(card.accuracy) || 0;
                    const final = (acc >= base) ? 0 : base;
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));

                            instances.shift();

                        // weaponUsage.usedŽäĒ žĚīŽĮł fullLossŽ•ľ ŪŹ¨Ūē®Ūēú žīĚŽüČžĚīŽĮÄŽ°ú žĚľŽįė žį®ÍįźŽ∂ĄŽßĆ Ž∂ĄŽ¶¨.

                    {/* ŽßĶ Ž≥īÍłį Ž™®Žďú ŪĒĆŽ°úŪĆÖ žĽ®ŪäłŽ°§ ‚ÄĒ žäĻŽ¶¨ ŪõĄ Í≤ĹŽ°úŽ•ľ Žď§žó¨Žč§Ž≥ľ ŽēĆ */}

        // ============================================
        // D-109 (2026-04-24): App ‚ÄĒ Í≤ĆžěĄ ŪĚźŽ¶Ą žĽ®ŪäłŽ°§Žü¨.
        //   view: 'intro' | 'play' | 'camp'
        //   campState žėĀžÜćŪôĒ(localStorage 'ttd:campState:v1') ‚ÄĒ load on mount, save on change.
        //   ž≤ę ŽßąžöīŪäł:
        //     - localStorage žóÜžĚĆ ‚Üí view='intro'
        //     - localStorage žěąžĚĆ ‚Üí view='camp' (žčúŽāėŽ¶¨žė§ žä§ŪāĶ, žÉąŽ°úÍ≥†žĻ®žĚÄ Ūē≠žÉĀ žļ†ŪĒĄ)
        //   žßĄŪĖČ ž§Ď Žüį(view='play')žĚÄ žÉąŽ°úÍ≥†žĻ® žčú ŪŹźÍłįŽź® (žĚėŽŹĄŽźú ŽŹôžěĎ).
        // ============================================

        const CAMP_STATE_KEY = 'ttd:campState:v1';

        // ŽĻą žÉĀŪÉú(ž≤ę žč†Í∑ú žú†ž†Ä).
        // D-113: Ž≥īÍīÄŪē®žĚÄ 12x8(rows=12, cols=8 ‚ÄĒ žĄłŽ°úŽ°ú ÍĻÄ). ŪÉźŪóėžö© ÍįÄŽį©(pack)žĚÄ 5x5(D-47 Ž™®žĖĎ).
        function makeInitialCampState() {
            return {
                version: 1,
                seenIntro: false,
                firstReturnDone: false,
                inventory: new InventorySystem(12, 8, { disabled: [] }),
                pack: new InventorySystem(5, 5),  // D-113: ŪÉźŪóė žčú Žď§Í≥† ÍįÄŽäĒ ÍįÄŽį©. ÍłįŽ≥ł disabled ŪĆ®ŪĄī.
                quests: { active: [], completed: [] },
                // D-110: bestScore(žĶúÍ≥† ž†źžąė) / totalScore(ŽąĄž†ĀŪē©) / lastScore(ŽßąžßÄŽßČ Žüį).
                runs: { total: 0, victories: 0, deaths: 0, bestScore: 0, totalScore: 0, lastScore: 0 }
            };
        }

        // žßĀŽ†¨ŪôĒ ‚ÄĒ InventorySystem.itemsŽßĆ {type,x,y,rotation,durabilityLeft} ŽįįžóīŽ°ú Ž≥īž°ī.
        //   InventorySystem žĚłžä§ŪĄīžä§ žěźž≤īŽ•ľ JSON.stringifyŪēėŽ©ī grid 2DŽįįžóī¬∑class Ž©ĒŪÉÄÍįÄ ŽĒįŽĚľÍįÄ
        //   Ž≥Ķžõź žčú Ž©ĒžĄúŽďúÍįÄ žóÜžĖīžßĄŽč§. itemsŽßĆ ž†Äžě• ‚Üí Ž°úŽďú žčú žÉą žĚłžä§ŪĄīžä§ + placeItem Ž≥Ķžõź.
        // D-113: Ž¨īÍłį durabilityLeft ŪŹ¨Ūē®. pack(ÍįÄŽį©) žĚłŽ≤§ŽŹĄ Ūē®ÍĽė žßĀŽ†¨ŪôĒ.
        function serializeInvItems(inv) {
            if (!inv || !Array.isArray(inv.items)) return [];
            return inv.items.map(it => ({
                type: it.type,
                x: it.x,
                y: it.y,
                rotation: it.rotation || 0,
                ...(typeof it.durabilityLeft === 'number' ? { durabilityLeft: it.durabilityLeft } : {})
            }));
        }
        function serializeCampState(state) {
            if (!state) return null;
            return {
                version: 2,
                seenIntro: !!state.seenIntro,
                firstReturnDone: !!state.firstReturnDone,
                inventory: serializeInvItems(state.inventory),
                pack: serializeInvItems(state.pack),
                quests: {
                    active: (state.quests && state.quests.active) || [],
                    completed: (state.quests && state.quests.completed) || []
                },
                runs: {
                    total: Number((state.runs && state.runs.total) || 0),
                    victories: Number((state.runs && state.runs.victories) || 0),
                    deaths: Number((state.runs && state.runs.deaths) || 0),
                    bestScore: Number((state.runs && state.runs.bestScore) || 0),
                    totalScore: Number((state.runs && state.runs.totalScore) || 0),
                    lastScore: Number((state.runs && state.runs.lastScore) || 0)
                }
            };
        }

        // žēĄžĚīŪÖú Ūē≠Ž™©žĚĄ InventorySystem žĚłžä§ŪĄīžä§žóź Ž≥Ķžõź.
        //   žĘĆŪĎúÍįÄ žú†Ūö®ŪēėŽ©ī placeItemžúľŽ°ú, žēĄŽčąŽ©ī addItem(type)žúľŽ°ú ŪŹīŽįĪ.
        //   D-113: durabilityLeft Ž≥īž°ī. žĚłžä§ŪĄīžä§ žßĀž†Ď placement (rotation¬∑durability Ž™®ŽĎź žú†žßÄ).
        function restoreItemEntry(inv, entry) {
            if (!entry || !entry.type) return;
            const def = InventorySystem.resolveDef(entry.type) || InventorySystem.ITEMS[entry.type];
            if (!def || !def.shape) return;
            let shape = def.shape;
            const rot = Number(entry.rotation) || 0;
            for (let r = 0; r < (rot / 90) % 4; r++) {
                shape = inv.rotate90(shape);
            }
            const item = {
                id: Date.now() + Math.random(),
                type: entry.type,
                ...InventorySystem.ITEMS[entry.type],
                shape,
                rotation: rot,
                x: Number(entry.x) || 0,
                y: Number(entry.y) || 0
            };
            const resolved = InventorySystem.resolveDef(entry.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0)
                ? resolved.durability : null;
            if (maxDur != null) {
                item.durabilityLeft = (typeof entry.durabilityLeft === 'number')
                    ? Math.max(0, Math.min(maxDur, entry.durabilityLeft))
                    : maxDur;
            }
            if (inv.canPlace(shape, item.x, item.y)) {
                inv.placeItem(item);
                inv.items.push(item);
            } else {
                // žĘĆŪĎú ž∂©ŽŹĆ¬∑Ž≤ĒžúĄ žīąÍ≥ľ(žėą: 8x12‚Üí12x8 ŽßąžĚīÍ∑łŽ†ąžĚīžÖė) ‚Üí ŽĻą žěźŽ¶¨Ž°ú žě¨ŽįįžĻė.
                const pos = inv.findEmptySpace(shape);
                if (pos) {
                    item.x = pos.x;
                    item.y = pos.y;
                    inv.placeItem(item);
                    inv.items.push(item);
                }
            }
        }

        // žó≠žßĀŽ†¨ŪôĒ ‚ÄĒ items ŽįįžóīžĚĄ žÉą 12x8 InventorySystemžóź Ž≥Ķžõź.
        //   D-113: Íłįž°ī 8x12 ‚Üí 12x8 ŽßąžĚīÍ∑łŽ†ąžĚīžÖė. žĘĆŪĎú ž∂©ŽŹĆ žčú ŽĻą žěźŽ¶¨Ž°ú žěźŽŹô žě¨ŽįįžĻė.
        function deserializeCampState(raw) {
            if (!raw || typeof raw !== 'object') return null;
            const inv = new InventorySystem(12, 8, { disabled: [] });
            const itemsRaw = Array.isArray(raw.inventory) ? raw.inventory : [];
            for (const entry of itemsRaw) restoreItemEntry(inv, entry);

            // pack ‚ÄĒ žč†Í∑ú ŪēĄŽďú. Íłįž°ī ž†Äžě•Ž≥łžóĒ žóÜžĚĄ žąė žěąžúľŽčą ŽĻą žĚłŽ≤§žúľŽ°ú žčúžěĎ.
            const pack = new InventorySystem(5, 5);
            const packRaw = Array.isArray(raw.pack) ? raw.pack : [];
            for (const entry of packRaw) restoreItemEntry(pack, entry);

            return {
                version: 2,
                seenIntro: !!raw.seenIntro,
                firstReturnDone: !!raw.firstReturnDone,
                inventory: inv,
                pack,
                quests: {
                    active: (raw.quests && Array.isArray(raw.quests.active)) ? raw.quests.active : [],
                    completed: (raw.quests && Array.isArray(raw.quests.completed)) ? raw.quests.completed : []
                },
                runs: {
                    total: Number((raw.runs && raw.runs.total) || 0),
                    victories: Number((raw.runs && raw.runs.victories) || 0),
                    deaths: Number((raw.runs && raw.runs.deaths) || 0),
                    bestScore: Number((raw.runs && raw.runs.bestScore) || 0),
                    totalScore: Number((raw.runs && raw.runs.totalScore) || 0),
                    lastScore: Number((raw.runs && raw.runs.lastScore) || 0)
                }
            };
        }

        // localStorage I/O ‚ÄĒ žč§ŪĆ®ŪēīŽŹĄ Í≤ĆžěĄžĚÄ ÍĶīŽü¨ÍįÄžēľ Ūē®(žčúŪĀ¨Ž¶Ņ Ž™®Žďú ŽďĪ).
        function loadCampStateFromStorage() {
            try {
                const raw = localStorage.getItem(CAMP_STATE_KEY);
                if (!raw) return null;
                return deserializeCampState(JSON.parse(raw));
            } catch (e) {
                console.warn('campState load failed', e);
                return null;
            }
        }
        function saveCampStateToStorage(state) {
            try {
                localStorage.setItem(CAMP_STATE_KEY, JSON.stringify(serializeCampState(state)));
            } catch (e) {
                console.warn('campState save failed', e);
            }
        }

        function App() {
            // ž≤ę ŽßąžöīŪäł: localStorage žěąžúľŽ©ī žļ†ŪĒĄ, žóÜžúľŽ©ī žĚłŪäłŽ°ú.
            //   loadedŽäĒ useRef-like Ūēú Ž≤ąŽßĆ ŪŹČÍįÄ ‚ÄĒ ŽĎź useState lazy initializerÍįÄ ŽŹôžĚľ ÍįížĚĄ žįłž°į.
            const initialLoadedRef = useRef(undefined);
            const getInitialLoaded = () => {
                if (initialLoadedRef.current === undefined) {
                    initialLoadedRef.current = loadCampStateFromStorage();
                }
                return initialLoadedRef.current;
            };
            const [campState, setCampState] = useState(() => getInitialLoaded() || makeInitialCampState());
            const [view, setView] = useState(() => (getInitialLoaded() ? 'camp' : 'intro'));
            // ž≤ę žļ†ŪĒĄ ŽŹĄžį© Ž™®Žč¨žö© outcome ('victory'|'death'|null).
            const [pendingTentModal, setPendingTentModal] = useState(null);

            // campState Ž≥ÄŪôĒ žčúŽßąŽč§ ž†Äžě•.
            useEffect(() => {
                saveCampStateToStorage(campState);
            }, [campState]);

            // [ž†ēžč†žĚĄ žį®Ž¶įŽč§] ‚ÄĒ žčúŽāėŽ¶¨žė§ ‚Üí ž≤ę ŪÉźŪóė.
            const handleIntroDismiss = () => {
                setCampState(prev => ({ ...prev, seenIntro: true }));
                setView('play');
            };

            // ŪÉźŪóė Í≤įÍ≥ľ ž≤ėŽ¶¨ ‚ÄĒ GamežĚī returnToCampžóźžĄú Ūėłž∂ú.
            //   payload: { outcome, runInventory, selectedIds?, runStats?, runFinal? }.
            //   - žäĻŽ¶¨: runInventory.items ž§Ď selectedIds(žěąžúľŽ©ī)ŽßĆ žļ†ŪĒĄ žĚłŽ≤§žóź addItem, žóÜžúľŽ©ī ž†Ąž≤ī.
            //   - žā¨ŽßĚ: žĚłŽ≤§ 0 žĚłžěÖ.
            //   - ž≤ę žļ†ŪĒĄ Ž≥ĶÍ∑Ä(firstReturnDone=false)Ž©ī ŪÖźŪäł ŪÄėžä§Ūäł Ž∂Äžó¨ + TentQuestModal.
            //   D-110: runStats + runFinalŽ°ú calculateRunScore ‚Üí bestScore/totalScore/lastScore ÍįĪžč†.
            const handleRunEnd = (payload) => {
                const outcome = (payload && payload.outcome) || 'death';
                const runInv = payload && payload.runInventory;
                const selectedIds = payload && payload.selectedIds;  // null|undefined ‚Üí ž†Ąž≤ī
                const runStats = (payload && payload.runStats) || { l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 };
                const runFinal = (payload && payload.runFinal) || {};
                const isFirstReturn = !campState.firstReturnDone;

                // D-110: žĚłžěÖŪē† žēĄžĚīŪÖú Ž™©Ž°Ě Í≤įž†ē. selectedIdsÍįÄ ŽįįžóīžĚīŽ©ī ŪēĄŪĄįŽßĀ, Í∑ł žôłžóĒ ž†Ąž≤ī.
                const itemsAll = (runInv && Array.isArray(runInv.items)) ? runInv.items : [];
                const itemsToTransfer = (outcome === 'victory')
                    ? (Array.isArray(selectedIds)
                        ? itemsAll.filter(it => it && selectedIds.includes(it.id))
                        : itemsAll)
                    : [];

                // ž†źžąė Í≥Ąžāį ‚ÄĒ žĚłžěÖŪēú žēĄžĚīŪÖú Íłįž§Ä.
                const score = calculateRunScore({
                    victory: outcome === 'victory',
                    uniqueTilesVisited: runFinal.uniqueTilesVisited,
                    detection: runFinal.detection,
                    items: itemsAll,
                    runStats,
                    selectedItems: itemsToTransfer
                });

                setCampState(prev => {
                    // žļ†ŪĒĄ žĚłŽ≤§ žĚłžä§ŪĄīžä§ žßĀž†Ď Ž≥ÄŪėē(ÍįôžĚÄ žįłž°į žú†žßÄ). React žě¨Ž†ĆŽćĒŽäĒ ...prev ÍįĚž≤ī žÉąŽ°ú ŽßĆŽď§žĖīžĄú ŪäłŽ¶¨ÍĪį.
                    // D-113: žĚłžä§ŪĄīžä§ žßĀž†Ď placement ‚ÄĒ durabilityLeft / rotation Ž≥īž°ī.
                    //   žļ†ŪĒĄ žĚłŽ≤§žĚÄ disabled žÖÄ žóÜžĚĆ ‚Üí ŽĻą žěźŽ¶¨ žįĺžēĄ žÉą žĘĆŪĎúŽ°ú žě¨ŽįįžĻė.
                    const camp = prev.inventory;
                    for (const it of itemsToTransfer) {
                        if (!it || !it.type) continue;
                        const def = InventorySystem.resolveDef(it.type) || InventorySystem.ITEMS[it.type] || {};
                        const shape = it.shape || (def.shape ? def.shape : null);
                        if (!shape) { camp.addItem(it.type); continue; }
                        const pos = camp.findEmptySpace(shape);
                        if (!pos) continue; // žļ†ŪĒĄ žĚłŽ≤§ ÍįÄŽďĚ ‚ÄĒ Ž¨īžčú(ž∂ĒŪõĄ: žēąŽāī).
                        const placed = {
                            ...it,
                            id: Date.now() + Math.random(), // žļ†ŪĒĄ žł° žÉą idŽ°ú(ž†Ą ŽüįÍ≥ľ ž∂©ŽŹĆ Žį©žßÄ).
                            x: pos.x,
                            y: pos.y
                        };
                        camp.placeItem(placed);
                        camp.items.push(placed);
                    }
                    const next = {
                        ...prev,
                        runs: {
                            total: prev.runs.total + 1,
                            victories: prev.runs.victories + (outcome === 'victory' ? 1 : 0),
                            deaths: prev.runs.deaths + (outcome === 'death' ? 1 : 0),
                            bestScore: Math.max(Number(prev.runs.bestScore) || 0, score),
                            totalScore: (Number(prev.runs.totalScore) || 0) + score,
                            lastScore: score
                        }
                    };
                    if (isFirstReturn) {
                        next.firstReturnDone = true;
                        next.quests = {
                            active: [...(prev.quests.active || []), { id: TENT_QUEST.id, progress: { branch: 0, stone: 0, stem: 0 } }],
                            completed: prev.quests.completed || []
                        };
                    }
                    return next;
                });
                if (isFirstReturn) {
                    setPendingTentModal(outcome);
                }
                setView('camp');
            };

            // [ŪÉźŪóė ŽĖ†ŽāėÍłį]
            // D-113: žļ†ŪĒĄ pack(ÍįÄŽį©) ‚Üí ŪÉźŪóė žĚłŽ≤§ žĚłÍ≥Ą.
            //   packžĚė InventorySystem žĚłžä§ŪĄīžä§Ž•ľ Í∑łŽĆÄŽ°ú Gamežóź ŽĄėÍłīŽč§(žēĄžĚīŪÖú ÍįĚž≤ī ž†Ąž≤ī Ž≥īž°ī = durabilityLeft/rotation žú†žßÄ).
            //   campState.packžĚÄ žÉą ŽĻą žĚłŽ≤§žúľŽ°ú ÍĶźž≤ī ‚ÄĒ Žď§Í≥† ÍįĒžúľŽčą žļ†ŪĒĄžóĒ ŽĻĄžõÄ.
            //   ŪÉźŪóė ž§Ď žĚłŽ≤§žĚī Í≥ß ÍįÄŽį©žĚė ŪõĄžÜć(ŪÉźŪóėžóźžĄú ŪöćŽďĚŪēú žēĄžĚīŪÖúŽď§žĚī ž∂ĒÍįÄŽź®).
            //   handleRunEndÍįÄ žäĻŽ¶¨ žčú Í∑ł žĚłŽ≤§žĚĄ Ž≥īÍīÄŪē®žúľŽ°ú žĚłžěÖ. žā¨ŽßĚ žčú ŪŹźÍłį.
            const [departInv, setDepartInv] = useState(null);
            const handleDepart = () => {
                const carried = campState.pack;
                setDepartInv(carried || null);
                setCampState(prev => ({ ...prev, pack: new InventorySystem(5, 5) }));
                setView('play');
            };

            // ŪÖźŪäł ŪÄėžä§Ūäł žôĄŽ£Ć žēĆŽ¶ľ Ž©ĒžčúžßÄ ‚ÄĒ App Ž†ąŽ≤® ŪÜ†žä§Ūäł ŽĆÄžč† ÍįÄŽ≤ľžöī Ž™®Žč¨.
            const [questCompleteMsg, setQuestCompleteMsg] = useState(null);

            // [žôĄžąė] ‚ÄĒ žě¨Ž£Ć žį®Íįź + completed žĚīŽŹô + žēĆŽ¶ľ.
            //   žě¨Ž£Ć Ž≥īžú†ŽüČ žě¨ŪôēžĚł(Ž†ąžĚīžä§ ÍįÄŽďú). Ž∂Äž°ĪŪēėŽ©ī Ž¨īžčú(Ž≤ĄŪäľžĚÄ disabledžó¨žēľ Ūē®).
            const handleCompleteQuest = (questId) => {
                const def = questId === TENT_QUEST.id ? TENT_QUEST : null;
                if (!def) return;
                const inv = campState.inventory;
                if (!inv) return;
                // žě¨ŪôēžĚł.
                const reqs = def.requirements || {};
                for (const [type, need] of Object.entries(reqs)) {
                    const have = inv.items.filter(it => it.type === type).length;
                    if (have < need) return; // disabledžó¨žēľ ŪĖąžßÄŽßĆ ÍįÄŽďú.
                }
                // žį®Íįź ‚ÄĒ ÍįĀ type žēěžóźžĄúŽ∂ÄŪĄį needÍįú removeItem + items Žįįžóī ÍįĪžč†.
                for (const [type, need] of Object.entries(reqs)) {
                    let remaining = need;
                    const keep = [];
                    for (const it of inv.items) {
                        if (remaining > 0 && it.type === type) {
                            inv.removeItem(it);
                            remaining -= 1;
                            continue;
                        }
                        keep.push(it);
                    }
                    inv.items = keep;
                }
                setCampState(prev => {
                    const active = prev.quests.active.filter(q => q.id !== questId);
                    const moved = prev.quests.active.find(q => q.id === questId);
                    return {
                        ...prev,
                        quests: {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : prev.quests.completed
                        }
                    };
                });
                if (questId === TENT_QUEST.id) {
                    setQuestCompleteMsg('ŪÖźŪäł žěźŽ¶¨Ž•ľ žě°žēėŽč§. žĚīž†ú Žį§žĚī ž°įÍłąžĚÄ Í≤¨ŽĒú ŽßĆŪēėŽč§.');
                }
            };

            // [ŽćįžĚīŪĄį žīąÍłįŪôĒ] ‚ÄĒ localStorage žā≠ž†ú + žīąÍłį žÉĀŪÉú + žčúŽāėŽ¶¨žė§Ž∂ÄŪĄį.
            const handleResetData = () => {
                try { localStorage.removeItem(CAMP_STATE_KEY); } catch {}
                setCampState(makeInitialCampState());
                setPendingTentModal(null);
                setQuestCompleteMsg(null);
                setDepartInv(null);
                setView('intro');
            };

            if (view === 'intro') {
                return <IntroScenarioScreen onDismiss={handleIntroDismiss} />;
            }
            if (view === 'play') {
                return <Game onRunEnd={handleRunEnd} initialInventory={departInv} />;
            }
            // camp
            return (
                <>
                    <CampScreen
                        campState={campState}
                        onDepart={handleDepart}
                        onCompleteQuest={handleCompleteQuest}
                        onResetData={handleResetData}
                        onInventoryChange={() => setCampState(prev => ({ ...prev }))}
                    />
                    {pendingTentModal && (
                        <TentQuestModal
                            outcome={pendingTentModal}
                            onDismiss={() => setPendingTentModal(null)}
                        />
                    )}
                    {questCompleteMsg && (
                        <div className="modal" style={{ zIndex: 3400 }}>
                            <div style={{
                                background: '#1a1a2e',
                                color: '#eee',
                                padding: '24px 22px',
                                borderRadius: '10px',
                                border: '1px solid #d4b84a',
                                maxWidth: '360px',
                                width: '90vw',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', marginBottom: '10px' }}>ūüŹēÔłŹ</div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, marginBottom: '18px' }}>
                                    {questCompleteMsg}
                                </div>
                                <button
                                    onClick={() => setQuestCompleteMsg(null)}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    ŪôēžĚł
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));

        // D-41 (2026-04-23 žöĒŪēú žßÄžčú): Í≤ĆžěĄ žėĀžó≠ ŽāīŽ∂ÄžĚė contextmenu(žöįŪĀīŽ¶≠/Ž°ĪŪĒĄŽ†ąžä§)
        // ÍłįŽ≥ł ŽŹôžěĎ žį®Žč®. CSS user-select:noneŽßĆžúľŽ°úŽäĒ iOS Safari Ž°ĪŪĒĄŽ†ąžä§ Ž≥Ķžā¨ Ž©ĒŽČīÍįÄ
        // Žú®ŽäĒ Í≤ĹžöįÍįÄ žěąžĖī JS Ž†ąŽ≤®žóźžĄúŽŹĄ ŽßČŽäĒŽč§.
        // input/textarea/contentEditabležĚÄ ž†úžôł ‚ÄĒ ŪÖćžä§Ūäł žĄ†ŪÉĚ¬∑Ž∂ôžó¨ŽĄ£Íłį žĽ®ŪÖćžä§ŪäłÍįÄ ŪēĄžöĒ.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
