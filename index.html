                    // лӮЁлҠ” мҠ¬лЎҜмқҙ мһҲмңјл©ҙ normalлЎң к°•л“ұ (лҸ„м°© мӢң нҸүлІ”н•ң мҲІкёё н…ҚмҠӨнҠё).
                    if (eventSlots.length > eventDefs.length) {
                        for (let i = eventDefs.length; i < eventSlots.length; i++) {
                            const tid = eventSlots[i];
                            newTiles[tid] = { ...newTiles[tid], type: 'normal' };
                        }
                        // setTilesлҠ” мқҙлҜё мң„м—җм„ң нҳём¶ңлҗҗм§Җл§Ң, нҸҙл°ұ л°ҳмҳҒмқ„ мң„н•ҙ н•ң лІҲ лҚ” к°ҷмқҖ л°°м—ҙлЎң к°ұмӢ .
                        setTiles(newTiles.slice());
                    }
                    setEventTileAssignments(assignments);
                }

                // м№ҙл“ң лҚ°мқҙн„°лҠ” кө¬кёҖ мӢңнҠё 'лІ мқҙмҠӨнғҗн—ҳм№ҙл“ң' нғӯмқҙ SSOT.
                // data/data.jsмқҳ TTD_DATA.BASE_CARDSлҘј мқҪм–ҙ лҹ°нғҖмһ„ н•„л“ң(time кё°ліёк°’ 1)л§Ң лҚ§л¶ҷмқёлӢӨ.
                // мӢңнҠё к°ұмӢ  мӢң: мӢңнҠё мҲҳм • вҶ’ `make data` мӢӨн–ү вҶ’ мғҲлЎңкі м№Ё.
                //
                // D-23: consume/extra_effect м»¬лҹјмқҖ мӢңнҠё н—ӨлҚ”м—җ мЎҙмһ¬. к°’ м—Ҷмңјл©ҙ л№Ҳ л¬ёмһҗм—ҙ.
                // лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ мӢңм—җл§Ң м•„лһҳ else нҸҙл°ұ(м•Ҳм „л§қ)мқҙ мӮ¬мҡ©лҗңлӢӨ.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0
                    ? sheetBaseCards.map(c => ({
                          id: c.id,
                          name: c.name,
                          count: Number(c.count) || 0,
                          effect: c.effect || '',
                          detection: Number(c.detection) || 0,
                          time: Number(c.time) || 1,
                          consume: c.consume || '',
                          extra_effect: c.extra_effect || ''
                      }))
                    : [
                          // нҸҙл°ұ(лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ мӢң) вҖ” мӢңнҠёк°Җ SSOTмқҙлҜҖлЎң м •мғҒ кІҪлЎңм—җм„  мӮ¬мҡ© м•Ҳ лҗЁ.
                          { id: 'search', name: 'л’Өм ёліҙкё°', count: 5, effect: 'м•„мқҙн…ң нҡҚл“қ', detection: 5, time: 1 },
                          { id: 'listen', name: 'к·Җ кё°мҡёмқҙкё°', count: 2, effect: 'лӘ¬мҠӨн„° к°җм§Җ', detection: -5, time: 1 },
                          { id: 'find_food', name: 'мқҢмӢқ м°ҫкё°', count: 1, effect: 'мқҢмӢқ нҡҚл“қ', detection: 5, time: 1 },
                          { id: 'hide', name: 'мҲЁкё°', count: 1, effect: 'мқҖмӢ ', detection: -15, time: 1 },
                          { id: 'rest', name: 'нңҙмӢқ', count: 1, effect: 'мІҙл Ҙ/л°°кі н”” мҶҢнҸӯ нҡҢліө, мҶҢмқҢ мөңмҶҢ', detection: -13, time: 1,
                            consume: 'category:food;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                // D-47: кё°ліё к°Җл°© лӘЁм–‘(5x5, мң„ 2н–ү кө¬м„қ 4м№ё disabled) вҖ” InventorySystem кё°ліёк°’ мӮ¬мҡ©.
                // D-113: initialInventoryк°Җ мһҲмңјл©ҙ к·ёкІғмқ„ мӢңмһ‘ мқёлІӨмңјлЎң мӮ¬мҡ©(мә н”„ к°Җл°© мқёкі„).
                //   Appм—җм„ң нғҗн—ҳ мӢңмһ‘ мӢңм җм—җ packмқ„ л№„мҡ°кі  мқёмҠӨн„ҙмҠӨлҘј к·ёлҢҖлЎң л„ҳкёҙлӢӨ.
                const inv = initialInventory || new InventorySystem();
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                // D-62: setPositionмқҖ visitedTilesм—җлҸ„ bossPos лҸҷкё°нҷ” вҖ” мһҳлӘ»лҗң мҠӨнҸ° кё°лЎқ л°©м§Җ.
                newBoss.setPosition(bossPos);
                // D-77: нҸ¬мӢқ мҪңл°ұ м—°кІ°.
                //   onPredationStart  вҖ” нғҖкІҹ L2 preyлҘј preysм—җм„ң м ңкұ°(ліҙмҠӨк°Җ мһЎм•„лЁ№кё° мӢңмһ‘).
                //   onPredationComplete вҖ” ліҙмҠӨк°Җ к·ё нғҖмқјм—җм„ң 2н„ҙ м •м§ҖлҘј лҒқлӮј л•Ң мӮ¬мІҙ нғҖмқј мғқм„ұ.
                newBoss.onPredationStart = (targetPreyId, tileId, prey) => {
                    // D-94: preyк°Җ isBaitл©ҙ baitTilesм—җм„ң м ңкұ°. к·ё мҷё(L2 prey)лҠ” кё°мЎҙлҢҖлЎң setPreys.
                    if (prey && prey.isBait) {
                        setBaitTiles(prev => {
                            const next = new Set(prev);
                            next.delete(tileId);
                            return next;
                        });
                    } else {
                        setPreys(prev => prev.filter(p => p.id !== targetPreyId));
                    }
                };
                // D-90: мҪңл°ұ 3лІҲм§ё мқёмһҗ preyType м¶”к°Җ вҖ” мӮ¬мІҙ лҸ„м°© л©”мӢңм§Җм—җ мӮ¬лғҘк°җ мқҙлҰ„ мӮ¬мҡ©.
                // D-94: preyType='__bait__'мқҙл©ҙ мӮ¬мІҙ л©”мӢңм§Җк°Җ лӢӨлҘё нҶӨмңјлЎң л¶„кё°.
                // D-157: targetIdк°Җ nullмқҙл©ҙ (snare_trap л°ңлҸҷм—җ мқҳн•ң лӢЁмҲң м •м§Җ) мӮ¬мІҙ мғқм„ұ skip.
                newBoss.onPredationComplete = (tileId, targetPreyId, preyType) => {
                    if (!targetPreyId) return; // snare_trap м •м§Җ л“ұ prey м—ҶлҠ” мјҖмқҙмҠӨ.
                    setCarcassTiles(prev => {
                        const next = new Map(prev);
                        next.set(tileId, { preyType: preyType || null });
                        return next;
                    });
                };
                setBoss(newBoss);
                // D-53: ліҙмҠӨ мқҙлҸҷ history мҙҲкё°нҷ” (мӢңмһ‘ мң„м№ҳк°Җ B1).
                setBossMoveHistory([bossPos]);

                // D-46/D-76: мӮ¬лғҘк°җ мҠӨнҸ°. level1/level2 к°Ғк°Ғ PREY_SPAWN л§ҢнҒј.
                //   reserved = н”Ңл Ҳмқҙм–ҙ мӢңмһ‘/ліҙмҠӨ/нғҲм¶ңкө¬. preyDataлҠ” TTD_DATA.PREY.
                //   habitatFallbackмқҖ prey.habitat м—Ҷмқ„ л•Ңл§Ң мӮ¬мҡ©.
                const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const spawned = (typeof window.spawnPrey === 'function')
                    ? window.spawnPrey(newTiles, preyData, PREY_SPAWN, {
                        playerStartId: playerStart,
                        bossPosId: bossPos,
                        exitPosId: exitPos
                    }, PREY_HABITAT)
                    : [];
                setPreys(spawned);
                setPreyTraceTiles(new Set());
                setCarcassTiles(new Map());
                setCarcassMeatTaken(new Set());
                setCarcassVisitedTiles(new Set());
                setCarcassTraceTiles(new Set());
                setActiveHunt(null);
                setWaitConfirmOpen(false);
                setPredationListenInfo(null);
                setBaitTiles(new Set());
                // мҪҳмҶ” кІҖмҰқмҡ© вҖ” лҰҙлҰ¬мҠӨ мӢң м ңкұ°н•ҙлҸ„ л¬ҙл°©.
                if (typeof window !== 'undefined') window.__preys = spawned;
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // кІҢмһ„ мҳӨлІ„/мҠ№лҰ¬ мІҙнҒ¬
            // D-54: мӮ¬мң  кө¬л¶„ вҖ” мІҙл Ҙмқҙ лЁјм Җ 0мқҙл©ҙ 'health', л°°кі н”” лЁјм Җл©ҙ 'starvation'.
            useEffect(() => {
                if (health <= 0) {
                    setGameOver(true);
                    setDeathReason('health');
                    setMessage('мғқлӘ…л Ҙмқҙ лӢӨн–ҲлӢӨ...');
                } else if (hunger <= 0) {
                    setGameOver(true);
                    setDeathReason('starvation');
                    setMessage('л°°кі н””мқ„ мқҙкё°м§Җ лӘ»н–ҲлӢӨ...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('нғҲм¶ңм—җ м„ұкіөн–ҲлӢӨ!');
                }
            }, [currentTile, tiles]);

            // hunt_start м№ҙл“ң мһҗлҸҷ м •лҰ¬ вҖ” мӮ¬лғҘк°җмқҙ мІҳм№ҳлҗҳкұ°лӮҳ лҸ„л§қмңјлЎң нҳ„мһ¬ нғҖмқјмқ„
            // л– лӮң мҲңк°„ мҶҗнҢЁм—җ лӮЁлҠ” мӮ¬лғҘмӢңмһ‘ м№ҙл“ңлҘј мҰүмӢң л¬ҙлҚӨмңјлЎң ліҙлӮёлӢӨ.
            // мқҙлҸҷ мӢңм җмқҳ мҶҗнҢЁ көҗмІҙ(moveTo)лЎңлҸ„ м •лҰ¬лҗҳм§Җл§Ң, к·ё нғҖмқјм—җ лЁёл¬јл©° м „нҲ¬к°Җ
            // лҒқлӮң кІҪмҡ°м—” мһЎмқ„ кёёмқҙ м—Ҷм–ҙ лі„лҸ„ к°җмӢңк°Җ н•„мҡ”.
            useEffect(() => {
                const orphan = (hand || []).filter(c => {
                    if (c.id !== 'hunt_start') return false;
                    const t = c.target;
                    if (!t) return true;
                    return !(preys || []).some(p => p.id === t.preyId && p.tileId === currentTile);
                });
                if (orphan.length === 0) return;
                const orphanUids = new Set(orphan.map(c => c.uid));
                // D-65: hunt_startлҠ” л¬ҙлҚӨмқҙ м•„лӢҲлқј мҶҢл©ё (мҡ”н•ң мӣҗл¬ё). setGraveyard нҳём¶ң м ңкұ°.
                setHand(prev => prev.filter(c => !orphanUids.has(c.uid)));
            }, [preys, currentTile]);

            // D-63 (2026-04-24): D-59 revert.
            // мҶҗнҢЁ мһҗлҸҷ ліҙм¶©мқҖ мҡ”н•ң мқҳлҸ„ л°ҳлҢҖмҳҖлӢӨ. мҳ¬л°”лҘё к·ңм№ҷ:
            //   - нғҖмқј мқҙлҸҷ мӢңм—җл§Ң лҚұм—җм„ң 5мһҘ мғҲлЎң л“ңлЎңмҡ° (moveToм—җм„ң мІҳлҰ¬, D-48).
            //   - м№ҙл“ң мӮ¬мҡ©мңјлЎң мҶҗнҢЁк°Җ мӨ„л©ҙ ліҙм¶© м—ҶмқҢ (н”Ңл Ҳмқҙм–ҙк°Җ м ҒкІҢ м“°л©ҙ лӢӨмқҢ нғҖмқјм—җм„ң лҰ¬н•„).
            //   - hunt_startлҠ” мӮ¬лғҘк°җ мЎ°мҡ° мӢң overflowлЎң м¶”к°Җ (м№ҙмҡҙн„° м ңмҷё, мқҙлҸҷ мӢң мҶҢл©ё).
            // л”°лқјм„ң м№ҙл“ң мӮ¬мҡ© м§Ғнӣ„ мһҗлҸҷ ліҙм¶© useEffectлҠ” м ңкұ°.

            // D-67 (2026-04-24): л°°кі н”” 1 мқҙн•ҳ м§Ғм ‘ м•ҢлҰј.
            //   D-55 кІҢмқҙм§Җ м җл©ёл§ҢмңјлЎңлҠ” кІҪкі к°Җ м•Ҫн•ҳлӢӨлҠ” мҡ”н•ң н”јл“ңл°ұ. hunger <= 1лЎң л–Ём–ҙм§Җл©ҙ
            //   л©”мӢңм§ҖлЎң 'л°°кі нҢҢм„ң м“°лҹ¬м§Ҳ кІғ к°ҷлӢӨ...' лҘј лҚ®м–ҙм”ҢмӣҢ мң м Җк°Җ мҰүмӢң мқём§Җн•ҳлҸ„лЎқ.
            //   hunger ліҖнҷ” мӢңл§ҲлӢӨ мһ¬нҸүк°Җ вҖ” нҡҢліөлҗҳл©ҙ лӢӨлҘё actionмқҙ лҚ®м–ҙм“°л©ҙм„ң мһҗм—° н•ҙм ң.
            useEffect(() => {
                if (gameOver || victory) return;
                if (hunger <= 1) {
                    setMessage('л°°кі нҢҢм„ң м“°лҹ¬м§Ҳ кІғ к°ҷлӢӨ...');
                }
            }, [hunger, gameOver, victory]);

            // м•„мқҙн…ң мӮ¬мҡ© вҖ” мқёлІӨнҶ лҰ¬ м •ліҙм°Ҫм—җм„ң 'мӮ¬мҡ©' лІ„нҠјмқ„ лҲ„лҘј л•Ң нҳём¶ң.
            // EffectParserк°Җ нҢҢмӢұн•ң Notion 'мӮ¬мҡ© нҡЁкіј' DSLмқ„ лҹ°нғҖмһ„м—җ м Ғмҡ©н•ҳкі ,
            // мҶҢл№„нҳ•(consumed) нҢҗм •мқҖ effectParserк°Җ лӮҙл ӨмӨҖ к°’мқ„ к·ёлҢҖлЎң л”°лҘёлӢӨ.
            //
            // spawn_card:throw лҠ” 'м „нҲ¬ м№ҙл“ң лҚұм—җ лҚҳм§Җкё° м№ҙл“ң м¶”к°Җ'лЎң н•ҙм„қн•ңлӢӨ.
            // кё°нҡҚ к·јкұ°(мҡ”н•ң м§ҖмӢң): "м „нҲ¬лӘЁл“ңмӢңм—җ л“ұмһҘн•ҳлҠ” м№ҙл“ңм—җ м¶”к°ҖлҗңлӢӨ".
            // мӮ¬мҡ© мӢңм җм—җ м№ҙл“ңк°Җ мғқм„ұлҗҳм–ҙ мһ„мӢң н’Җ(combatExtraCards)м—җ мҢ“мқҙкі ,
            // лӢӨмқҢ м „нҲ¬ мӢңмһ‘ л•Ң кё°ліё лҚұкіј лі‘н•©лҗҳл©°, к·ё м „нҲ¬ лӮҙм—җм„ң м№ҙл“ңлҘј м“°л©ҙ мҶҢл©ён•ңлӢӨ.
            // (мҳҒкө¬ м¶”к°Җк°Җ м•„лӢҢ к·јкұ°: нҳ„мһ¬ м•„мқҙн…ңмқҙ мқјнҡҢмҡ© нҢҗм •мқҙ м•„лӢҲм–ҙлҸ„ мһ¬нғҗмғү/лЁём§Җ к°ҖлҠҘ мһ¬лЈҢмқҙлҜҖлЎң
            //  лҚұм—җ мҳҒкө¬ нҺёмһ…мӢңнӮӨл©ҙ л°ёлҹ°мҠӨк°Җ мүҪкІҢ л¬ҙл„Ҳм§Җкі , мҡ”н•ң л§җ "м „нҲ¬ мў…лЈҢ мӢң мҶҢл©ё"мқҙ мһҗм—°мҠӨлҹ¬мӣҖ.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || item.name));
                // D-156: ItemInfoModalкіј лҸҷмқјн•ҳкІҢ raw вҶ’ лҹ°нғҖмһ„ мһ¬нҢҢмӢұ (мӢ к·ң нҶ нҒ° hint:/place_snare л“ұ мқёмӢқ).
                const cachedEffect = (notionItem && notionItem.effect) || null;
                const rawEffect = (notionItem && (notionItem['мӮ¬мҡ© нҡЁкіј'] || (cachedEffect && cachedEffect.raw))) || '';
                const parsed = (window.EffectParser && rawEffect)
                    ? window.EffectParser.parseItemEffect(rawEffect)
                    : cachedEffect;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('мқҙ м•„мқҙн…ңмқҖ м•„м§Ғ мӮ¬мҡ©н•  мҲҳ м—ҶлӢӨ.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        // D-170: нҢҢм„ңмқҳ STAT_BOUNDSлҠ” м •м Ғ мғҒн•ң(12/8)мқҙлқј н…җнҠё л ҲлІЁлі„ лҸҷм Ғ MAXмҷҖ м–ҙкёӢлӮңлӢӨ.
                        //   м„ён„° мёЎм—җм„ң лҹ°нғҖмһ„ MAXлЎң мһ¬-clampн•ҙ нҡҢліөмқҙ мөңлҢҖм№ҳлҘј л„ҳм§Җ м•ҠкІҢ н•ңлӢӨ.
                        if (name === 'hunger') setHunger(Math.max(0, Math.min(MAX_HUNGER, val)));
                        else if (name === 'health') setHealth(Math.max(0, Math.min(MAX_HEALTH, val)));
                    },
                    addThrowCard: (cardId) => {
                        // к°ҷмқҖ cardIdлҘј м—¬лҹ¬ лІҲ мҚЁм„ң м—¬лҹ¬ мһҘмқ„ мҢ“мқ„ мҲҳлҸ„ мһҲмқҢ.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
                            return next;
                        });
                    },
                    // D-156: м•„мқҙн…ңм—җм„ң л°ңлҸҷлҗң нһҢнҠё вҖ” мӢӨм ң л°©н–Ҙ кі„мӮ°мқҖ лӢЁкі„ 1м—җм„ң мқҙлҜё кө¬нҳ„лҗң н—¬нҚј.
                    showHint: (kind) => {
                        const fromHere = (toId) => {
                            if (typeof toId !== 'number' || toId < 0) return null;
                            if (typeof window.getHexDirection !== 'function') return null;
                            return window.getHexDirection(tiles, currentTile, toId);
                        };
                        if (kind === 'exit_direction') {
                            const info = fromHere(exitTileId);
                            if (info && info.dir !== 'unknown' && info.dir !== 'here') {
                                setMessage(`м°ўм–ҙм§„ мў…мқҙ мң„ нҷ”мӮҙн‘ңк°Җ л–ЁлҰ°лӢӨ. кёёмқҳ лҒқмқҖ ${info.label}мқҙлӢӨ. ${info.arrow}`);
                            } else if (info && info.dir === 'here') {
                                setMessage('м§ҖлҸ„к°Җ к°ҖлҰ¬нӮӨлҠ” кіі, л°”лЎң мқҙкіімқҙ кёёмқҳ лҒқмқҙлӢӨ.');
                            } else {
                                setMessage('м§ҖлҸ„мқҳ мһүнҒ¬к°Җ л„Ҳл¬ҙ лІҲм ё л°©н–Ҙмқ„ мқҪмқ„ мҲҳ м—ҶлӢӨ.');
                            }
                        } else if (kind === 'boss_direction') {
                            const bossPos = boss ? boss.getPosition() : -1;
                            const info = fromHere(bossPos);
                            if (info && info.dir !== 'unknown') {
                                setMessage(`мў…мқҙ н•ң к·ҖнүҒмқҙм—җм„ң м§җмҠ№мқҳ л°ңмһҗкөӯмқҙ ліҙмқёлӢӨ. ${info.label} ${info.arrow}`);
                            }
                        } else {
                            setMessage('л¬ҙм–ёк°Җмқҳ лӢЁм„ңк°Җ лЁёлҰҝмҶҚм—җ лӮЁлҠ”лӢӨ.');
                        }
                    },
                    // D-157 / D-161: snare_trap лҠҘлҸҷ мӮ¬мҡ© вҖ” placedTrap л“ұлЎқ. нҶ мҠӨнҠё нҸҗкё°.
                    placeSnare: () => {
                        setTiles(prev => prev.map(t => t.id === currentTile ? { ...t, placedTrap: { type: 'snare', placedAt: Date.now() } } : t));
                        setMessage('рҹӘӨ н’ҖмһҺ мӮ¬мқҙм—җ нҶұлӢҲлҘј мҲЁкё°кі  мӨ„мқ„ нҢҪнҢҪнһҲ л§Өм–ҙл‘җм—ҲлӢӨ.');
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ. (${label})`);

                    // D-156 (2026-04-28): м•„мқҙн…ң мқёмҠӨн„ҙмҠӨ statusTags мІҳлҰ¬.
                    //   poison_biteмІҳлҹј "м•„мқҙн…ң 1к°ңм—җ мқјнҡҢм„ұ нҺҳл„җнӢ°"к°Җ л¶ҷм–ҙ мһҲмңјл©ҙ мӮ¬мҡ© мӢңм җм—җ 1нҡҢ нҠёлҰ¬кұ°.
                    //   StatusEffects.onItemConsumedк°Җ ctx.applyStat/addLogLineмқ„ нҳём¶ңн•ҙ м¶”к°Җ нҡЁкіј м Ғмҡ©.
                    if (window.StatusEffects && typeof window.StatusEffects.onItemConsumed === 'function') {
                        const tagCtx = {
                            applyStat: (stat, delta) => {
                                if (stat === 'hunger') setHunger(p => Math.max(0, Math.min(MAX_HUNGER, p + delta)));
                                else if (stat === 'health') setHealth(p => Math.max(0, Math.min(MAX_HEALTH, p + delta)));
                            },
                            addLogLine: (txt) => {
                                if (txt) setMessage(prev => (prev ? prev + ' ' + txt : txt));
                            }
                        };
                        try { window.StatusEffects.onItemConsumed(item, tagCtx); }
                        catch (e) { console.warn('[onItemConsumed] error:', e); }
                    }
                }
                return result;
            };

            // D-94 (2026-04-25 мҡ”н•ң м§ҖмӢң): кұ°лҢҖн•ң лЁ№мқҙ [лЁ№мқҙлЎң мң мқён•ҳкё°] н•ёл“Өлҹ¬.
            //   нҳ„мһ¬ нғҖмқјм—җ лЁ№мқҙ placeholderлҘј л“ұлЎқ(baitTiles Set). ліҙмҠӨк°Җ лӢӨмқҢ onPlayerMoveм—җм„ң
            //   synthetic preyлЎң мқёмӢқн•ҙ BFS м¶”кІ© вҶ’ лҸ„лӢ¬ мӢң нҸ¬мӢқ(=лЁ№мқҙ мҶҢм§„ + мӮ¬мІҙ нғҖмқј мғқм„ұ).
            //   мқёлІӨм—җм„ң 1к°ң м°Ёк°җ + к°Җл°© лӘЁлӢ¬ лӢ«кё° + нҶ мҠӨнҠё.
            const handleLureBait = (item) => {
                if (!inventory || !item) return;
                inventory.removeItem(item);
                inventory.items = inventory.items.filter(i => i.id !== item.id);
                setBaitTiles(prev => {
                    const next = new Set(prev);
                    next.add(currentTile);
                    return next;
                });
                setShowInventory(false);
                // D-161: нҶ мҠӨнҠё нҸҗкё° вҖ” л©”мӢңм§Җм—җ мқҙлӘЁм§Җ мқёлқјмқё.
                setMessage('рҹҚ– мқҙкіім—җ лЁ№мқҙлҘј лҶ”л‘җм—ҲлӢӨ. л©ҖлҰ¬м„ңл¶Җн„° л°ңмҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§ҖлҠ” кё°л¶„мқҙ л“ лӢӨвҖҰ кұ°лҢҖн•ң м§җмҠ№мқҙ кі§ мқҙкіімңјлЎң н–Ҙн•  кІғмқҙлӢӨ.');
            };

            // D-23: "м№ҙл“ңлЎң м•„мқҙн…ң мӮ¬мҡ©" н”„л Ҳмһ„мӣҢнҒ¬мқҳ кіөнҶө м§„мһ…м җ.
            // м№ҙл“ңк°Җ м•„мқҙн…ңмқ„ мҶҢл№„н•ҙм•ј н•ҳлҠ” кІҪмҡ°(consume мҠӨнҺҷ ліҙмң ) мқҙ н•ЁмҲҳк°Җ лӘЁлӢ¬мқ„ лқ„мҡ°кі ,
            // мң м Җк°Җ м•„мқҙн…ңмқ„ кі лҘё л’Ө нҷ•м •лҗҳл©ҙ finalizeCardUseлЎң мӢӨм ң нҡЁкіјлҘј м Ғмҡ©н•ңлӢӨ.
            // м№ҙл“ң мһҗмІҙ(мҶҗнҢЁ вҶ’ л¬ҙлҚӨ, мӢңк°„В·л°ңк°Ғ мҰқк°Җ)лҠ” м„ кІ° мЎ°кұҙ нҶөкіј нӣ„м—җл§Ң мҶҢлӘЁ.
            //
            // consume нҢҢмӢұмқҖ effectParser.parseCardConsumeм—җ мң„мһ„. н•„н„°лҠ” matchesConsumeFilter.
            // consume нҶөкіј м•„мқҙн…ңмқҙ 0к°ңл©ҙ "м“ё мҲҳ м—ҶлӢӨ" л©”мӢңм§ҖлЎң мЎ°мҡ©нһҲ мў…лЈҢ(м№ҙл“ңлҸ„ лҜёмҶҢлӘЁ).
            const finalizeCardUse = (card, extraMsg) => {
                // мҶҗнҢЁ вҶ’ л¬ҙлҚӨ, мӢңк°„В·л°ңк°Ғ мІҳлҰ¬.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ.`;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume м№ҙл“ң вҶ’ м•„мқҙн…ң м„ нғқ лӘЁлӢ¬ мҳӨн”Ҳ.
            // н•„н„° нҶөкіј м•„мқҙн…ңмқҙ м—Ҷмңјл©ҙ мЎ°мҡ©нһҲ мҠӨнӮө(м№ҙл“ң лҜёмҶҢлӘЁ).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('м•„мқҙн…ң мӮ¬мҡ© н”„л Ҳмһ„мӣҢнҒ¬к°Җ лЎңл“ңлҗҳм§Җ м•Ҡм•ҳлӢӨ.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {
                    setMessage('мқҙ м№ҙл“ңлҠ” м•„мқҙн…ңмқ„ мҶҢл№„н•ҳм§Җ м•ҠлҠ”лӢӨ.');
                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                // D-81: м„ нғқ(floating) мӨ‘мқё м•„мқҙн…ңмқҖ мӮ¬мҡ© к°ҖлҠҘ лҢҖмғҒм—җм„ң м ңмҷё вҖ” лӘЁлӢ¬ candidatesмҷҖ мқјм№ҳмӢңмјң
                //   "лҰ¬мҠӨнҠёлҠ” л№„м—Ҳм§Җл§Ң hasAny=true"лЎң лӘЁлӢ¬мқҙ лңЁлҠ” л¶Җм •н•© л°©м§Җ.
                const selectedId = inventory?.selectedItem?.id;
                const hasAny = (inventory?.items || []).some(invItem => {
                    if (selectedId && invItem.id === selectedId) return false;
                    const def = InventorySystem.ITEMS[invItem.type] || {};
                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                // D-57 (2026-04-24): л°”лІ нҒҗ к°ҖмғҒ м„ нғқм§Җ м ңкұ° вҶ’ нңҙмӢқ м№ҙл“ң мҡ”лҰ¬ лӘЁлӢ¬лЎң лҢҖмІҙ.
                //   [рҹ”Ҙ мҡ”лҰ¬н•ҳкё°] лІ„нҠјмқҖ CardItemConsumeModal лӮҙл¶Җм—җм„ң л…ём¶ң.
                //   мһ¬лЈҢ(meat_skewer/fish_skewer) ліҙмң  мӢң нҷңм„ұ, м—Ҷмңјл©ҙ нҡҢмғү л№„нҷңм„ұ.
                if (!hasAny) {
                    setMessage(`${card.name}: м§ҖкёҲ м“ё мҲҳ мһҲлҠ” м•„мқҙн…ңмқҙ м—ҶлӢӨ.`);
                    return;
                }
                // D-36: нңҙмӢқ л“ұ scaleмқҙ кұёлҰ° м№ҙл“ңлҠ” лӘЁлӢ¬мқҙ "нҡЁкіј мҰқнҸӯ"мқ„ мӢңк°Ғм ҒмңјлЎң к°•мЎ°н•ҙм•ј н•Ё.
                // scales(мҳҲ: {recover: 2})лҘј к·ёлҢҖлЎң л„ҳкІЁ лӘЁлӢ¬мқҙ м•„мқҙн…ң нҡЁкіјлҘј лҜёлҰ¬ліҙкё°лЎң мҠӨмјҖмқј.
                // м№ҙл“ң мқҙлҰ„/нҡЁкіј н…ҚмҠӨнҠёлҠ” м№ҙл“ңлі„ м•ҲлӮҙ л¬ёкө¬мқҳ кё°ліёк°’мңјлЎң мӮ¬мҡ©.
                const scaleHint = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `мқҢмӢқмқҳ нҡЁкіјк°Җ ${consume.scales.recover}л°°`
                    : null;
                const bonusHint = (consume.bonuses && consume.bonuses.recover && consume.bonuses.recover !== 0)
                    ? `мқҢмӢқмқҳ нҡЁкіјм—җ +${consume.bonuses.recover}`
                    : null;
                const hintText = (scaleHint || bonusHint)
                    ? `${card.name}мңјлЎң мқён•ҙ ${[scaleHint, bonusHint].filter(Boolean).join(' л°Ҹ ')}к°Җ лҗ©лӢҲлӢӨ`
                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    bonuses: consume.bonuses || {},
                    hintText,
                    titleText: card.name + ' вҖ” мӮ¬мҡ©н•  м•„мқҙн…ң',
                    emptyText: 'м“ё л§Ңн•ң м•„мқҙн…ңмқҙ м—ҶлӢӨ.',
                });
            };

            // D-57: мҡ”лҰ¬ лӘЁлӢ¬м—җм„ң л ҲмӢңн”ј нҷ•м • мӢң нҳём¶ң.
            //   inventory.craftRecipeлЎң мһ¬лЈҢ мҶҢл№„ + кІ°кіјл¬ј л°°м№ҳ. нңҙмӢқ м№ҙл“ңлҠ” мҶҢлӘЁн•ҳм§Җ м•ҠмқҢ
            //   (мҡ”лҰ¬ мһҗмІҙлЎңлҠ” мӢңк°„/л°ңк°Ғ м§„н–ү м—ҶмқҢ вҖ” нңҙмӢқ лӘЁлӢ¬лЎң ліөк·Җ нӣ„ мӢқмӮ¬к№Ңм§Җ мқҙм–ҙм§Җл©ҙ
            //    к·ёл•Ң м№ҙл“ңк°Җ мҶҢл№„лҗЁ). л©”мӢңм§ҖлҠ” "Xмқ„(лҘј) кө¬мӣ лӢӨ." нҸ¬л§·.
            const handleCookRecipe = (recipe) => {
                if (!inventory) return;
                const res = inventory.craftRecipe(recipe);
                if (!res.ok) {
                    if (res.reason === 'no_space') setMessage('к°Җл°©мқҙ к°Җл“қ м°Ё мҡ”лҰ¬ кІ°кіјлҘј л‘ҳ кіімқҙ м—ҶлӢӨ.');
                    else if (res.reason === 'short_ingredients') setMessage('мҡ”лҰ¬ мһ¬лЈҢк°Җ л¶ҖмЎұн•ҳлӢӨ.');
                    else setMessage('мҡ”лҰ¬м—җ мӢӨнҢЁн–ҲлӢӨ.');
                    return;
                }
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const resultMeta = notionItems.find(it => it && it.id === res.resultType);
                const resultName = (resultMeta && resultMeta['мқҙлҰ„'])
                    || (InventorySystem.ITEMS[res.resultType] && InventorySystem.ITEMS[res.resultType].name)
                    || res.resultType;
                setMessage(`${resultName}мқ„(лҘј) кө¬мӣ лӢӨ.`);
                setCookingOpen(false);
            };

            // consume лӘЁлӢ¬м—җм„ң м•„мқҙн…ң н•ҳлӮҳ м„ нғқ вҶ’ мӢӨм ң нҡЁкіј м Ғмҡ©.
            // 1) м•„мқҙн…ңмқҳ нҢҢмӢұлҗң effectлҘј scaleEffectлЎң ліҖнҳ• (мҳҲ: нҡҢліө x2)
            // 2) applyItemEffectлЎң мҠӨнғҜ/м№ҙл“ң м•Ўм…ҳ л””мҠӨнҢЁм№ҳ
            // 3) м•„мқҙн…ң 1к°ң мқёлІӨм—җм„ң м ңкұ° (мқјнҡҢмҡ©В·л№„мқјнҡҢмҡ© л¬ҙкҙҖ: м№ҙл“ңк°Җ мҶҢл№„н•ҳлҠ” л§ҘлқҪ)
            // 4) м№ҙл“ң ліёмІҙ мҶҢлӘЁ + мӢңк°„/л°ңк°Ғ л°ҳмҳҒ
            const resolveConsumeChoice = (invItem) => {
                if (!pendingConsume) return;
                const Parser = window.EffectParser;
                const { card, consume } = pendingConsume;

                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (def.name || invItem.name));
                const parsedEffect = (notionItem && notionItem.effect) || null;

                let appliedMsg = '';
                if (parsedEffect && parsedEffect.usable && Parser) {
                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {}, consume.bonuses || {});
                    Parser.applyItemEffect(scaled, {
                        getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                        setStat: (name, val) => {
                            // D-170: лҸҷм Ғ MAX мһ¬-clamp (м „нҲ¬ м№ҙл“ң мҶҢлӘЁ кІҪлЎң).
                            if (name === 'hunger') setHunger(Math.max(0, Math.min(MAX_HUNGER, val)));
                            else if (name === 'health') setHealth(Math.max(0, Math.min(MAX_HEALTH, val)));
                        },
                        addThrowCard: (cardId) => {
                            setCombatExtraCards(prev => {
                                const next = [...prev];
                                const idx = next.findIndex(c => c.id === cardId);
                                if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                                else next.push({ id: cardId, count: 1 });
                                return next;
                            });
                        },
                        setMessage
                    });
                    appliedMsg = `${def.name || invItem.name}мқ„(лҘј) мҶҢлӘЁн•ҳкі  ${Parser.describeEffect(scaled)}.`;
                } else {
                    appliedMsg = `${def.name || invItem.name}мқ„(лҘј) мҶҢлӘЁн–Ҳм§Җл§Ң лі„ нҡЁкіјлҠ” м—Ҷм—ҲлӢӨ.`;
                }

                // м•„мқҙн…ң 1к°ң мҶҢл№„
                if (inventory) {
                    inventory.removeItem(invItem);
                    inventory.items = inventory.items.filter(i => i.id !== invItem.id);
                }

                setPendingConsume(null);
                finalizeCardUse(card, appliedMsg);
            };

            const cancelConsume = () => {
                setPendingConsume(null);
                // D-57: мҡ”лҰ¬ лӘЁлӢ¬лҸ„ н•Ёк»ҳ лӢ«м•„ лЈЁмҰҲн•ң мғҒнғң мһ”мЎҙ л°©м§Җ.
                setCookingOpen(false);
            };

            // м№ҙл“ң мӮ¬мҡ©
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('мӢңк°„мқҙ л¶ҖмЎұн•©лӢҲлӢӨ!');
                    return;
                }

                // D-46 (2026-04-23): hunt_start м№ҙл“ң л¶„кё°.
                //   нҳ„мһ¬ preysм—җм„ң target.preyIdлЎң prey м°ҫкё°. м—Ҷмңјл©ҙ "мӮ¬лқјмЎҢлӢӨ" л©”мӢңм§Җ + мһҗмӣҗ лҜёмҶҢлӘЁ.
                //   мһҲмңјл©ҙ мҰүмӢң мҶҢлӘЁ(time+1/detection+2/мҶҗнҢЁ м ңкұ°/л¬ҙлҚӨ м¶”к°Җ) нӣ„ activeHunt set.
                if (card.id === 'hunt_start') {
                    const targetId = card.target && card.target.preyId;
                    const prey = (preys || []).find(p => p.id === targetId);
                    if (!prey) {
                        // D-65: hunt_startлҠ” л¬ҙлҚӨмңјлЎң к°Җм§Җ м•Ҡкі  мҶҢл©ё.
                        setMessage('мӮ¬лғҘк°җмқҙ мӮ¬лқјмЎҢлӢӨ.');
                        setHand(prev => prev.filter(c => c.uid !== card.uid));
                        return;
                    }
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    // D-65: hunt_startлҠ” л¬ҙлҚӨмңјлЎң к°Җм§Җ м•Ҡкі  мҶҢл©ё.
                    setHand(hand.filter(c => c.uid !== card.uid));
                    setTime(time + card.time);
                    const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                    setDetection(newDetection);
                    setActiveHunt({
                        prey: {
                            id: prey.id,
                            tileId: prey.tileId,
                            preyType: prey.preyType,
                            name: preyDef.name || prey.preyType,
                            // D-47: мқҙм „ м „нҲ¬м—җм„ң мӨҖ лҚ°лҜём§Җ лҲ„м Ғ мң м§Җ. hpCurrentк°Җ мһҲмңјл©ҙ к·ё к°’мңјлЎң мӢңмһ‘.
                            hp: (typeof prey.hpCurrent === 'number') ? prey.hpCurrent : (preyDef.hp || 1),
                            meat: preyDef.meat || 1,
                            // D-71: prey м „мҡ© л“ңлЎӯ м•„мқҙн…ң id. мӢңнҠё `мӮ¬лғҘк°җ.drop_item` м»¬лҹј.
                            //   л№Ҳк°’мқҙл©ҙ handleHuntResolveм—җм„ң 'meat' нҸҙл°ұ.
                            drop_item: preyDef.drop_item || '',
                            evade_rate: preyDef.evade_rate || 20,
                            // D-60: н„ҙлі„ нҡҢн”јмңЁ CSV ("30,30,20") вҖ” л№Ҳк°’мқҙл©ҙ resolveHunt/UIм—җм„ң evade_rateлЎң нҸҙл°ұ.
                            evade_per_turn: preyDef.evade_per_turn || '',
                            // D-60: мқҙ prey к°ңмІҙк°Җ к·ёлҸҷм•Ҳ лӘҮ лІҲ лҸ„л§қміӨлҠ”м§Җ вҖ” н„ҙлі„ нҡҢн”јмңЁм—җм„ң *10 м°Ёк°җ.
                            fleeCount: prey.fleeCount || 0,
                            // D-74/D-75: Level 2 prey 4н„ҙ мӢңмҠӨн…ң.
                            //   level=2л©ҙ HuntCombatModalмқҙ 4мҠ¬лЎҜмңјлЎң кө¬м„ұ, resolveHuntк°Җ 4н„ҙ actions DSL м Ғмҡ©.
                            //   attack: prey кіөкІ©л Ҙ (мң м Җк°Җ л°ӣлҠ” лҢҖлҜём§Җ - мң м Җ м№ҙл“ң defense).
                            //   defense: prey 'defend' н„ҙмқҳ л°©м–ҙк°’ (мң м Җ кіөкІ© к°җмҮ„).
                            //   actions_per_turn: 4н„ҙ н–үлҸҷ CSV.
                            level: Number(preyDef.level) || 1,
                            attack: Number(preyDef.attack) || 0,
                            defense: Number(preyDef.defense) || 0,
                            actions_per_turn: preyDef.actions_per_turn || ''
                        }
                    });
                    setMessage(`${preyDef.name || 'мӮ¬лғҘк°җ'}кіј м „нҲ¬лҘј мӢңмһ‘н•ңлӢӨ.`);
                    return;
                }

                // D-23: consume мҠӨнҺҷмқҙ мһҲлҠ” м№ҙл“ңлҠ” лӘЁлӢ¬мқ„ лқ„мҡ°кі  м„ нғқ нӣ„ нҡЁкіј м Ғмҡ©.
                // м№ҙл“ң ліёмІҙ мҶҢлӘЁВ·мӢңк°„В·л°ңк°ҒмқҖ finalizeCardUseм—җм„ңл§Ң л°ңмғқ.
                if (card.consume) {
                    openConsumeForCard(card);
                    return;
                }

                // D-114: л’Өм ёліҙкё°В·мқҢмӢқм°ҫкё°лҠ” к°Җл°© л№Ҳм№ёмқҙ 0мқҙл©ҙ мӮ¬мҡ© л¶Ҳк°Җ(м№ҙл“ң лҜёмҶҢлӘЁ).
                //   findEmptySpace([[1]]) null = 1x1 л“Өм–ҙк°Ҳ мһҗлҰ¬лҸ„ м—ҶмқҢ вҶ’ к°Җл“қ.
                //   1м№ёмқҙлқјлҸ„ мһҲмңјл©ҙ нҶөкіј. кІ°кіјк°Җ лӢӨмӨ‘мқј л•ҢлҠ” LootPickupModalлЎң л¶„кё°(лӢӨмқҢ лӢЁкі„).
                if ((card.id === 'search' || card.id === 'find_food')
                    && inventory && !inventory.findEmptySpace([[1]])) {
                    setMessage('к°Җл°©мқҙ кҪү м°Ём„ң мӮ¬мҡ©н•  мҲҳ м—ҶлӢӨ.');
                    return;
                }

                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);

                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);

                let msg = `${card.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ.`;

                if (card.id === 'search') {
                    // D-28(2026-04-22, мҡ”н•ң м§ҖмӢң): л’Өм ёліҙкё°лҠ” 3мҠ¬лЎҜ лҸ…лҰҪ м¶”мІЁ(100/20/20).
                    // мҠ¬лЎҜ нҷ•лҘ /к°ңмҲҳ мһҗмІҙлҠ” л№„кіөк°ң. кІ°кіјл§Ң л©”мӢңм§Җ+нҶ мҠӨнҠёлЎң л…ём¶ң.
                    // м—¬лҹ¬ к°ң нҡҚл“қ мӢң к°ҷмқҖ м•„мқҙн…ңмқҖ к°ңмҲҳ лҲ„м Ғ, л¬¶мқҢ нҶ мҠӨнҠё 1к°ң.
                    //
                    // D-34: нғҖмқј type === 'good'мқҙл©ҙ мҠ¬лЎҜ нҷ•лҘ мқҙ мғҒн–Ҙ(100/80/80).
                    // D-35: к°ҷмқҖ нғҖмқј л°ҳліөВ·ліөк·Җ л’Өм ёліҙкё°м—җлҠ” нҺҳл„җнӢ° кіұмҲҳк°Җ л¶ҷлҠ”лӢӨ
                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLootк°Җ
                    //       tile к°қмІҙлҘј л°ӣм•„ м•Ҳм—җм„ң мІҳлҰ¬н•ңлӢӨ.
                    //
                    // D-114: кІ°кіј кёёмқҙ вүҘ 2л©ҙ мһҗлҸҷ мқёмһ… м•Ҳ н•ҳкі  LootPickupModalлЎң.
                    //   мң м Җк°Җ мұҷкёё н•ӯлӘ©мқ„ м§Ғм ‘ м„ нғқ. м№ҙл“ң мһҗмІҙлҠ” мқҙлҜё мҶҢлӘЁлҗң мғҒнғң(мӢңк°„/л°ңк°Ғ м •мғҒ).
                    //   кІ°кіј 1к°ңл©ҙ кё°мЎҙлҢҖлЎң мһҗлҸҷ мқёмһ… + LootToast.
                    const tile = tiles[currentTile];
                    const currentRegion = tile?.region;
                    // D-78: мӮ¬мІҙ нғҖмқј мІ« л’Өм ёліҙкё° вҶ’ мқјл°ҳ region л“ңлЎӯн’Җ + мғқкі кё° +1 ліҙл„ҲмҠӨ.
                    //   мқҙлҜё 1нҡҢ лҪ‘м•ҳмңјл©ҙ(carcassMeatTakenм—җ л“ұлЎқ) ліҙл„ҲмҠӨ м—Ҷмқҙ мқјл°ҳ л“ңлЎӯл§Ң.
                    const onCarcass = carcassTiles.has(currentTile);
                    const carcassBonus = onCarcass && !carcassMeatTaken.has(currentTile);
                    if (currentRegion) {
                        const drops = rollSearchLoot(currentRegion, tile);
                        // лӘЁл“  л“ңлЎӯ нӣ„ліҙлҘј лӢЁмқј л°°м—ҙлЎң н•©м№ҳкё° (search + carcass ліҙл„ҲмҠӨ).
                        const allDrops = drops.map(d => d.item);
                        if (carcassBonus) allDrops.push('meat');

                        // D-114 (D-115 м •м •): лӢӨмӨ‘ л“ңлЎӯмқҙл©ҙ лӘЁлӢ¬ вҖ” лӢЁ к°Җл°© л№Ҳм№ёмқҙ л¶ҖмЎұн•  л•Ңл§Ң.
                        //   мҡ”н•ң м •м •: "1к°ңл§Ң л“ңлЎӯмқҙл©ҙ мһҗлҸҷ, 2к°ң мқҙмғҒмқҙлқјлҸ„ к°Җл°© кіөк°„ м¶©л¶„мқҙл©ҙ мһҗлҸҷ.
                        //   л№Ҳм№ё < л“ңлЎӯ мҲҳмқј л•Ң м–ҙл–Ө кұё мұҷкёём§Җ м„ нғқ лӘЁлӢ¬."
                        //   carcass ліҙл„ҲмҠӨ мҶҢм§„мқҖ лӘЁлӢ¬ л§ҲмҡҙнҠё мӢңм җ лҜёлҰ¬ мІҳлҰ¬(кІ°кіј нҷ•м • нӣ„лқј 1нҡҢ мҶҢм§„ к°„мЈј).
                        let occupiedCells = 0;
                        for (const it of (inventory.items || [])) {
                            const idef = InventorySystem.resolveDef(it.type) || {};
                            const shape = idef.shape || [[1]];
                            for (const row of shape) for (const v of row) if (v) occupiedCells += 1;
                        }
                        const totalCells = inventory.rows * inventory.cols - (inventory.disabled ? inventory.disabled.size : 0);
                        const emptyCells = Math.max(0, totalCells - occupiedCells);
                        const needsPickup = allDrops.length >= 2 && allDrops.length > emptyCells;
                        if (needsPickup) {
                            if (carcassBonus) {
                                setCarcassMeatTaken(prev => {
                                    const next = new Set(prev);
                                    next.add(currentTile);
                                    return next;
                                });
                            }
                            // нғҖмқј м№ҙмҡҙн„°лҠ” мһҗлҸҷ мқёмһ… л¶„кё°мҷҖ лҸҷмқјн•ҳкІҢ к°ұмӢ .
                            setTiles(prev => prev.map(t =>
                                t.id === currentTile
                                    ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                    : t
                            ));
                            setLootPickup({
                                id: Date.now() + Math.random(),
                                drops: allDrops,
                                region: currentRegion
                            });
                            msg += `л¬ҙм–ёк°ҖлҘј л°ңкІ¬н–ҲлӢӨ. мұҷкёё кІғмқ„ кіЁлқјлқј.`;
                        } else {
                            // лӢЁмқј л“ңлЎӯ(лҳҗлҠ” 0к°ң) вҖ” кё°мЎҙ мһҗлҸҷ мқёмһ… нқҗлҰ„.
                            const counter = new Map();
                            let overflow = 0;
                            allDrops.forEach(item => {
                                const added = inventory.addItem(item);
                                if (added) {
                                    counter.set(item, (counter.get(item) || 0) + 1);
                                } else {
                                    overflow += 1;
                                }
                            });

                            if (carcassBonus) {
                                setCarcassMeatTaken(prev => {
                                    const next = new Set(prev);
                                    next.add(currentTile);
                                    return next;
                                });
                            }

                            if (counter.size > 0) {
                                // D-161: LootToast нҸҗкё° вҖ” л©”мӢңм§Җм—җ мқҙлӘЁм§Җ + мқҙлҰ„ мқёлқјмқёмңјлЎң н•©м„ұ.
                                const nameParts = [];
                                counter.forEach((count, item) => {
                                    const def = InventorySystem.ITEMS[item] || {};
                                    const displayName = def.name || item;
                                    const emj = (typeof itemEmoji === 'function') ? itemEmoji(item) : '';
                                    const namePart = `${emj ? emj + ' ' : ''}${displayName}`;
                                    nameParts.push(count > 1 ? `${namePart} Г—${count}` : namePart);
                                });
                                msg += `${nameParts.join(', ')}мқ„(лҘј) л°ңкІ¬н–ҲлӢӨ.`;
                                if (overflow > 0) msg += ` (к°Җл°©мқҙ к°Җл“қ м°Ё ${overflow}к°ңлҠ” л‘җкі  мҷ”лӢӨ.)`;
                            } else if (overflow > 0) {
                                msg += `м“ё л§Ңн•ң кұё м°ҫм•ҳм§Җл§Ң к°Җл°©мқҙ к°Җл“қ м°Ё л“Өкі  мҳӨм§Җ лӘ»н–ҲлӢӨ.`;
                            } else {
                                msg += `мқҙ к·јмІҳм—җлҠ” м“ёл§Ңн•ң кІҢ м—ҶлӢӨ.`;
                            }

                            setTiles(prev => prev.map(t =>
                                t.id === currentTile
                                    ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                    : t
                            ));
                        }
                    } else {
                        // м•Ҳм „л§қ: region м—ҶлҠ” нғҖмқј(кө¬лІ„м „ м„ёмқҙлёҢ л“ұ)мқҖ л Ҳкұ°мӢң лҸҷмһ‘
                        inventory.addItem('material_low');
                        msg += `мһ¬лЈҢлҘј л°ңкІ¬н–ҲлӢӨ.`;
                    }
                } else if (card.id === 'find_food') {
                    // 'мқҢмӢқ м°ҫкё°' м№ҙл“ң вҖ” food м№ҙн…Ңкі лҰ¬ к°•м ң л“ңлЎӯ(мҡ”н•ң м§ҖмӢң 2026-04-22).
                    // 'food' лҸ…лҰҪ м•„мқҙн…ңмқҖ м ңкұ°лҗҗмңјлҜҖлЎң, м§Җм—ӯмқҳ мқҢмӢқмһ¬лЈҢ н’Җм—җм„ң м§Ғм ‘ м¶”мІЁ.
                    // м§Җм—ӯм—җ food н’Җмқҙ л№„м–ҙмһҲмңјл©ҙ(мӢңлғҮл¬ј л“ұ) нҸҙл°ұ л©”мӢңм§Җ.
                    //
                    // D-161: LootToast нҸҗкё° вҖ” нҡҚл“қмқҖ л©”мӢңм§Җм—җ мқҙлӘЁм§Җ + мқҙлҰ„ мқёлқјмқёмңјлЎң.
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item } = rollTileDrop(currentRegion, { forceCategory: 'food' });
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            const emj = (typeof itemEmoji === 'function') ? itemEmoji(item) : '';
                            if (added) {
                                msg += `${emj ? emj + ' ' : ''}${def?.name || item}мқ„(лҘј) м°ҫм•„лғҲлӢӨ.`;
                            } else {
                                msg += `${emj ? emj + ' ' : ''}${def?.name || item}мқ„(лҘј) м°ҫм•ҳм§Җл§Ң к°Җл°©мқҙ к°Җл“қ м°јлӢӨ.`;
                            }
                        } else {
                            msg += `лЁ№мқ„ л§Ңн•ң кұҙ ліҙмқҙм§Җ м•ҠлҠ”лӢӨ.`;
                        }
                    } else {
                        msg += 'лЁ№мқ„ л§Ңн•ң кұҙ ліҙмқҙм§Җ м•ҠлҠ”лӢӨ.';
                    }
                } else if (card.id === 'listen') {
                    // D-31 (2026-04-22 ліҙк°•):
                    //   listen м№ҙл“ңмқҳ кё°ліё нҡЁкіјлҠ” "мқём ‘ нғҖмқј revealed" вҖ” кұ°лҰ¬мҷҖ л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ мӢӨн–ү.
                    //   к·ё мң„м—җ кұ°лҰ¬лі„ мІӯк°Ғ л©”мӢңм§Җ(ліҙмҠӨмҷҖмқҳ BFS кұ°лҰ¬)к°Җ мӨ‘мІ©лҗңлӢӨ.
                    //   1м№ё  вҶ’ ліҙмҠӨ мң„м№ҳ л…ём¶ң + мқём ‘ revealed
                    //   2м№ё  вҶ’ "мҲЁмү¬лҠ” мҶҢлҰ¬к°Җ кҪӨ к°Җк№Ңмқҙ..." + мқём ‘ revealed
                    //   3м№ё  вҶ’ "л°ңкұёмқҢ мҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§„л“Ҝ..." + мқём ‘ revealed
                    //   вүҘ4м№ё вҶ’ "л°ңкұёмқҢ мҶҢлҰ¬к°Җ м•„мЈј л©ҖлҰ¬м„ң..." + мқём ‘ revealed
                    // (м§Ғм „ лІ„м „м—җм„ң 2м№ё мқҙмғҒмқј л•Ң revealedлҘј лҒҠм—ҲмңјлӮҳ, мқҙлҠ” listenмқҳ н•өмӢ¬ кё°лҠҘмқ„
                    //  м ңкұ°н•ң нҡҢк·ҖмҳҖмқҢ. мҡ”н•ң QA 2026-04-22 м§ҖмӢңлЎң ліөкө¬.)
                    const bossPos = boss.getPosition();
                    // D-55 (2026-04-23 мҡ”н•ң м§ҖмӢң): мІӯк°Ғ кұ°лҰ¬лҠ” physical hex кұ°лҰ¬ мӮ¬мҡ©.
                    // calculateDistance(path-BFS)лҠ” л№Ҳ мҠ¬лЎҜВ·л№„мңЎк°Ғ мқҙмӣғ мҳҒн–ҘмңјлЎң
                    // кіөк°„м ҒмңјлЎң к°Җк№ҢмӣҢлҸ„ "л©ҖлӢӨ"кі  л§җн•  мҲҳ мһҲм–ҙ listen мҡ©лҸ„м—” л¶Җм Ғн•©.
                    const bossDist = boss.calculateHexDistance(currentTile, bossPos);

                    // мқём ‘ нғҖмқј revealed вҖ” кұ°лҰ¬ л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ мӢӨн–үлҗҳлҠ” listenмқҳ кё°ліё нҡЁкіј.
                    let newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    // D-80 (2026-04-24 мҡ”н•ң м§ҖмӢң): кёём°ҫкё° лӮңмқҙлҸ„ н•ҳн–Ҙ вҖ” м •ліҙк°Җ л°қнҳҖм§„ нғҖмқјмқҳ
                    // connections мӨ‘ м•„м§Ғ кіөк°ң м „мқё нғҖмқјмқ„ silhouetteмңјлЎң л§ҲнӮ№. HexTileмқҙ л§өліҙкё°мқҳ
                    // dim мғүмғҒ(#444 / opacity 0.22)мңјлЎң мңӨкіҪл§Ң л…ём¶ң. мҳҒкө¬ мң м§Җ(мқҙнӣ„ revealed/visited лҗҳл©ҙ
                    // мһҗм—°мҠӨлҹҪкІҢ мғҒмң„ мҠӨнғҖмқјлЎң мҠ№кІ©). мқҙлҸҷ к°ҖлҠҘ м—¬л¶ҖлҠ” кё°мЎҙлҢҖлЎң canMove нҢҗм •.
                    const silhouetteIds = new Set();
                    newTiles.forEach(t => {
                        if (!t.revealed && !t.visited) return;
                        (t.connections || []).forEach(cid => {
                            const target = newTiles[cid];
                            if (!target) return;
                            if (target.revealed || target.visited) return;
                            silhouetteIds.add(cid);
                        });
                    });
                    if (silhouetteIds.size > 0) {
                        newTiles = newTiles.map(t =>
                            silhouetteIds.has(t.id) ? { ...t, silhouette: true } : t
                        );
                    }
                    setTiles(newTiles);

                    // D-161: listen ліҙмҠӨ к°җм§Җ вҶ’ нҶ мҠӨнҠё м»ҙнҸ¬л„ҢнҠё нҸҗкё°, лӮҙл Ҳмқҙм…ҳ л°”лЎң нқЎмҲҳ.
                    //   кұ°лҰ¬ лӢЁкі„лі„ мӢңк°Ғ мһ„нҢ©нҠёлҠ” л©”мӢңм§Җ м•Ҳм—җ мқҙлӘЁм§Җ + мғү к°•мЎ° н…ҚмҠӨнҠёлЎң ліҙмЎҙ.
                    //   1м№ёмқҖ м җн”„мҠӨмјҖм–ҙ мҳӨлІ„л ҲмқҙлЎң м¶”к°Җ кіөнҸ¬к°җ (ліҖкІҪ м—ҶмқҢ).
                    // D-165 (2026-04-29 мҡ”н•ң): кұ°лҰ¬ лӢЁкі„лі„ л©”мӢңм§Җ м№ҙл“ң н…Ңл‘җлҰ¬ мғү.
                    //   л©”мӢңм§Җ ліёл¬ё мӢңмһ‘м—җ prefix 'вҹҰbossThreat:1|2вҹ§' мӮҪмһ… вҶ’ м№ҙл“ң л ҢлҚ” мӢң м¶”м¶ң.
                    //   1м№ё=л№Ёк°•, 2м№ё=л…ёлһ‘, 3м№ё+=кё°ліё. н…ҚмҠӨнҠёлҸ„ мһ„нҢ©нҠё к°•нҷ”лЎң ліҖкІҪ.
                    let listenBossLine = '';
                    let listenThreatPrefix = '';
                    if (bossDist === 1) {
                        // D-42: ліҙмҠӨ мң„м№ҳ л…ём¶ңмқҖ мқҙ мҲңк°„л§Ң. мқҙлҸҷ мӢң moveToм—җм„ң лӢӨмӢң falseлЎң.
                        setBossVisible(true);
                        setBossJumpscare(true);
                        // D-90 (2026-04-25 мҡ”н•ң м§ҖмӢң): мқём ‘ 1м№ё + ліҙмҠӨ нҸ¬мӢқмӨ‘мқҙл©ҙ м җн”„мҠӨмјҖм–ҙ
                        // м§Ғнӣ„ "нҸ¬мӢқмӨ‘мқё м§җмҠ№" лӘЁлӢ¬. мқјл°ҳ нҶ мҠӨнҠё лҢҖмӢ  лӘЁлӢ¬ н•ң мһҘл§Ң лқ„мӣҖ.
                        if (boss.predationStay > 0) {
                            const preyType = boss.predationPreyType;
                            // D-94: bait нҸ¬мӢқ мӢң prey мқҙлҰ„/мқҙлӘЁм§Җ л¶„кё°.
                            let preyName, preyEmoji;
                            if (preyType === '__bait__') {
                                preyName = 'кұ°лҢҖн•ң лЁ№мқҙ';
                                preyEmoji = 'рҹҚ–';
                            } else {
                                const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                                const preyDef = preyDataArr.find(p => p.id === preyType);
                                preyName = (preyDef && preyDef.name) || 'мӮ¬лғҘк°җ';
                                preyEmoji = PREY_EMOJI[preyType] || 'рҹҗҫ';
                            }
                            // м җн”„мҠӨмјҖм–ҙ кёёмқҙ ~0.8s нӣ„м—җ лӘЁлӢ¬ л§ҲмҡҙнҠён•ҙ мӢңнҖҖмҠӨ л¶„лҰ¬.
                            setTimeout(() => {
                                setPredationListenInfo({ preyType, preyName, preyEmoji });
                            }, 800);
                        } else {
                            listenBossLine = 'рҹҰ– кұ°м№ң мҲЁмҶҢлҰ¬к°Җ мҪ”м•һм—җм„ң л“ӨлҰ°лӢӨ. н•ң кұёмқҢл§Ң мһҳлӘ» л–јлҸ„ лҒқмһҘмқҙлӢӨ.';
                            listenThreatPrefix = 'вҹҰbossThreat:1вҹ§';
                        }
                    } else if (bossDist === 2) {
                        listenBossLine = 'рҹҰ– л¬ҙкұ°мҡҙ л°ңмһҗкөӯмқҙ к°Җк№Ңмқҙм„ң мҡёлҰ°лӢӨ. кі§ л§ҲмЈјм№  мҲҳ мһҲлӢӨ.';
                        listenThreatPrefix = 'вҹҰbossThreat:2вҹ§';
                    } else if (bossDist === 3) {
                        listenBossLine = 'рҹҰ– л°ңкұёмқҢ мҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§„ л“Ҝн•ҳлӢӨ.';
                    } else {
                        listenBossLine = 'рҹҰ– л°ңкұёмқҢ мҶҢлҰ¬к°Җ м•„мЈј л©ҖлҰ¬м„ң л“ӨлҰ°лӢӨ. лӢ№л¶„к°„мқҖ м•ҲмӢ¬н•ҙлҸ„ лҗ  кІғ к°ҷлӢӨ.';
                    }
                    if (listenBossLine) msg += (msg ? ' ' : '') + listenBossLine;
                    if (listenThreatPrefix) msg = listenThreatPrefix + msg;

                    // D-46 (2026-04-23): listen мқём ‘ мӮ¬лғҘк°җ нқ”м Ғ к°җм§Җ.
                    //   нҳ„мһ¬ нғҖмқјмқҳ мқём ‘ нғҖмқј вҲ© preys tileId = "кё°мІҷмқҙ лҠҗк»ҙм§ҖлҠ” нғҖмқј".
                    //   мў…лҘҳлҠ” л№„кіөк°ң(рҹ‘Ј л§Ҳм»Өл§Ң). preyTraceTiles Setм—җ н•ҙлӢ№ tileId лҲ„м Ғ.
                    //   ліҙмҠӨ лӮҙл Ҳмқҙм…ҳВ·D-42 bossVisibleкіј лҸ…лҰҪлҗң м„№м…ҳ вҖ” кё°мЎҙ лЎңм§Ғ кұҙл“ңлҰ¬м§Җ м•ҠмқҢ.
                    const neighborIds = tiles[currentTile].connections;
                    const traceHits = (preys || [])
                        .filter(p => neighborIds.includes(p.tileId))
                        .map(p => p.tileId);
                    if (traceHits.length > 0) {
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            traceHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\nк·јмІҳм—җм„ң нқ¬лҜён•ң кё°мІҷмқҙ лҠҗк»ҙм§„лӢӨ.';
                    }

                    // D-78: мқём ‘ мӮ¬мІҙ нғҖмқј к°җм§Җ вҖ” рҹ‘Ј лҢҖмӢ  рҹҰҙ trace.
                    //   carcassTiles вҲ© мқём ‘ = "мӮ¬мІҙ лғ„мғҲк°Җ лӮҳлҠ” нғҖмқј".
                    const carcassHits = neighborIds.filter(nid => carcassTiles.has(nid));
                    if (carcassHits.length > 0) {
                        setCarcassTraceTiles(prev => {
                            const next = new Set(prev);
                            carcassHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\nм–ҙл””м„ к°Җ м§җмҠ№мқҳ мӮ¬мІҙ лғ„мғҲк°Җ н’ҚкёҙлӢӨ.';
                    }
                } else if (card.id === 'hide') {
                    msg += 'мЎ°мҡ©нһҲ лӘёмқ„ мҲЁкІјлӢӨ.';
                }
                
                setMessage(msg);
            };

            // D-126 (2026-04-28): мқҙлІӨнҠё м„ нғқм§Җ нҒҙлҰӯ н•ёл“Өлҹ¬.
            //   1) нҡЁкіј DSL нҢҢмӢұ вҶ’ applyEventEffectлЎң м Ғмҡ©.
            //   2) нҡЁкіј нӣ„ л°ңмғқ лқјмқёмқҖ setMessageлЎң н•©міҗ л…ём¶ң.
            //   3) лӘЁлӢ¬ лӢ«кі , н•ҙлӢ№ нғҖмқјмқҖ normalлЎң к°•л“ұ(к°ҷмқҖ нғҖмқј мһ¬л°©л¬ё мӢң лҜёл°ңлҸҷ).
            //   4) eventTileAssignmentsм—җм„ң м ңкұ°.
            const handleEventChoice = (assign, choice) => {
                if (!choice || !assign) return;
                const dsl = choice.effect_dsl || '';
                const bundle = (window.TTD_DATA && window.TTD_DATA.EVENTS) || { pool: {} };

                const lines = [];
                let pendingForceMove = false;

                const ctx = {
                    grantItem: (itemId, count) => {
                        if (!inventory) return false;
                        let ok = true;
                        for (let i = 0; i < (count || 1); i++) {
                            const r = inventory.addItem(itemId);
                            if (!r) { ok = false; break; }
                        }
                        // setInventory(inventory) вҖ” к°ҷмқҖ мқёмҠӨн„ҙмҠӨлқј Reactк°Җ лҰ¬л ҢлҚ” м•Ҳ н•  мҲҳ мһҲмқҢ. мғҲ referenceлЎң.
                        setInventory(Object.create(Object.getPrototypeOf(inventory), Object.getOwnPropertyDescriptors(inventory)));
                        return ok;
                    },
                    itemNameOf: (itemId) => {
                        const def = InventorySystem.resolveDef ? InventorySystem.resolveDef(itemId) : null;
                        return (def && (def.name || def['мқҙлҰ„'])) || itemId;
                    },
                    poolPick: (poolId, count) => {
                        // D-156: weight к°ҖмӨ‘ л№„ліөмӣҗ м¶”мІЁ. weight лҜём§Җм • мӢң кё°ліё 1.
                        //   н’Җ л¶ҖмЎұ мӢң к°ҖлҠҘн•ң л§ҢнҒјл§Ң л°ҳнҷҳ. к°ҷмқҖ н•ӯлӘ© мӨ‘ліө л°©м§Җ(л№„ліөмӣҗ).
                        const pool = (bundle.pool && bundle.pool[poolId]) || [];
                        const copy = pool.map(p => ({ ...p, _w: Number.isFinite(p.weight) ? p.weight : 1 }));
                        const picks = [];
                        const n = Math.min(count || 1, copy.length);
                        for (let i = 0; i < n; i++) {
                            const totalW = copy.reduce((s, x) => s + (x._w > 0 ? x._w : 0), 0);
                            if (totalW <= 0) break;
                            let r = Math.random() * totalW;
                            let idx = 0;
                            for (let j = 0; j < copy.length; j++) {
                                r -= (copy[j]._w > 0 ? copy[j]._w : 0);
                                if (r <= 0) { idx = j; break; }
                            }
                            const pick = copy.splice(idx, 1)[0];
                            delete pick._w;
                            picks.push(pick);
                        }
                        return picks;
                    },
                    consumeItemByFilter: (filter, count) => {
                        if (!inventory) return false;
                        // D-159: filterлҠ” м№ҙн…Ңкі лҰ¬ мҳҒл¬ё мӢқлі„мһҗ(мҳҲ: 'food'). resolveDefлЎң м№ҙн…Ңкі лҰ¬ л№„көҗ.
                        // лқјлІЁмқҖ н•ңкөӯм–ҙлЎң ліҖнҷҳ (UI л…ём¶ң нҶӨ мң м§Җ).
                        const want = String(filter || '').trim();
                        const FILTER_KR = { food: 'мқҢмӢқ', material: 'мһ¬лЈҢ', consumable: 'мҶҢлӘЁн’Ҳ' };
                        const krLabel = FILTER_KR[want] || want;
                        const targets = [];
                        for (let i = inventory.items.length - 1; i >= 0 && targets.length < (count || 1); i--) {
                            const it = inventory.items[i];
                            const def = InventorySystem.resolveDef ? InventorySystem.resolveDef(it.type) : null;
                            const cat = (def && (def['м№ҙн…Ңкі лҰ¬'] || def.category)) || '';
                            if (cat === want) targets.push(it);
                        }
                        for (const it of targets) {
                            inventory.removeItem(it);
                            inventory.items = inventory.items.filter(x => x.id !== it.id);
                        }
                        if (targets.length > 0) {
                            setInventory(Object.create(Object.getPrototypeOf(inventory), Object.getOwnPropertyDescriptors(inventory)));
                            lines.push(`${krLabel} ${targets.length}к°ңлҘј лҚҳм ёмЈјм—ҲлӢӨ.`);
                        } else {
                            lines.push(`мӨ„ л§Ңн•ң ${krLabel}мқҙ(к°Җ) к°Җл°©м—җ м—ҶлӢӨ.`);
                        }
                        return targets.length > 0;
                    },
                    applyStat: (stat, delta) => {
                        if (stat === 'hunger') setHunger(prev => Math.max(0, Math.min(MAX_HUNGER, prev + delta)));
                        else if (stat === 'health') setHealth(prev => Math.max(0, Math.min(MAX_HEALTH, prev + delta)));
                        // D-159: кІ°кіј нҢқм—… лқјлІЁ (D-158 мӮ¬м „ лқјлІЁ нҶӨкіј мқјм№ҳ вҖ” "мІҙл Ҙ -1" нҳ•мӢқ).
                        const STAT_LABEL = { hunger: 'л°°кі н””', health: 'мІҙл Ҙ' };
                        const sign = delta >= 0 ? '+' : '';
                        lines.push(`${STAT_LABEL[stat] || stat} ${sign}${delta}`);
                    },
                    applyDetection: (delta) => {
                        setDetection(prev => Math.max(0, Math.min(100, prev + delta)));
                        // D-156 / D-161: л°ңк°Ғ ліҖнҷ” вҖ” нҶ мҠӨнҠё нҸҗкё°. кІ°кіј нҢқм—… лқјлІЁ(D-159)мқҖ к·ёлҢҖлЎң мң м§Җ.
                        //   1мқём№ӯ к°җк°Ғ лқјмқёмқҖ EventResultModalм—җ linesлЎң л“Өм–ҙк°ҖлҜҖлЎң лі„лҸ„ message н•©м„ұмқҖ мғқлһө.
                        const sign = delta >= 0 ? '+' : '';
                        lines.push(`л°ңк°Ғ ${sign}${delta}%`);
                    },
                    applyStatus: (statusId, duration) => {
                        if (statusId === 'poison_bite') {
                            // мқёмҠӨн„ҙмҠӨ лӢЁмң„ вҖ” apply()лҠ” л¬ҙмӢң. нҳём¶ңмһҗ(мқҙлІӨнҠё)лҠ” grantItemTagged кІҪлЎң мӮ¬мҡ©.
                            return;
                        }
                        setPlayerStatuses(prev => window.StatusEffects.apply(prev, statusId, duration));
                        const cat = window.StatusEffects.getCatalog(statusId);
                        if (cat) lines.push(`${cat.name} мғҒнғңм—җ л№ мЎҢлӢӨ.`);
                    },
                    showHint: (kind) => {
                        // D-156 (2026-04-28): мӢӨм ң л°©н–Ҙ/мң„м№ҳ кі„мӮ°. window.getHexDirectionмқҖ
                        //   mapGenerator.jsк°Җ м ңкіө. кІ°кіј лқјлІЁмқ„ 1мқём№ӯ н…ҚмҠӨнҠём—җ лҒјмӣҢ л„ЈлҠ”лӢӨ.
                        const dirOf = (toId) => {
                            if (typeof toId !== 'number' || toId < 0) return null;
                            if (typeof window.getHexDirection !== 'function') return null;
                            return window.getHexDirection(tiles, assign.tileId, toId);
                        };
                        const fromHere = (toId) => dirOf(toId);

                        if (kind === 'exit_direction') {
                            const info = fromHere(exitTileId);
                            if (info && info.dir !== 'unknown' && info.dir !== 'here') {
                                lines.push(`л°”лһҢмқҙ ${info.label}мңјлЎң нқҳлҹ¬к°„лӢӨ. кёёмқҳ лҒқмқҙ к·ёмӘҪм—җ мһҲлӢӨ. ${info.arrow}`);
                            } else if (info && info.dir === 'here') {
                                lines.push('м§ҖкёҲ л°ң л””л”ҳ мһҗлҰ¬, к·ёкіімқҙ кёёмқҳ лҒқмқҙлӢӨ.');
                            } else {
                                lines.push('м Җ л©ҖлҰ¬, м–ҙл”ҳк°Җм—җ кёёмқҳ лҒқмқҙ мһҲлӢӨлҠ” к°җк°Ғл§Ң л“ лӢӨ.');
                            }
                            return;
                        }
                        if (kind === 'wrong_exit_direction') {
                            // мқҳлҸ„м ҒмңјлЎң мһҳлӘ»лҗң л°©н–Ҙ вҖ” мӢӨм ң нғҲм¶ңкө¬мқҳ л°ҳлҢҖнҺё 6л°©н–Ҙ мӨ‘ н•ҳлӮҳлҘј кіЁлқј м•ҢлҰј.
                            const real = fromHere(exitTileId);
                            const OPPOSITE = { N: 'S', S: 'N', NE: 'SW', SW: 'NE', NW: 'SE', SE: 'NW' };
                            const LABEL = { N: 'л¶ҒмӘҪ', NE: 'л¶ҒлҸҷмӘҪ', SE: 'лӮЁлҸҷмӘҪ', S: 'лӮЁмӘҪ', SW: 'лӮЁм„ңмӘҪ', NW: 'л¶Ғм„ңмӘҪ' };
                            const ARROW = { N: 'вҶ‘', NE: 'вҶ—', SE: 'вҶҳ', S: 'вҶ“', SW: 'вҶҷ', NW: 'вҶ–' };
                            const wrongDir = (real && real.dir && OPPOSITE[real.dir]) || 'N';
                            lines.push(`л°”лһҢмқҙ ${LABEL[wrongDir]}мңјлЎң нқҗлҘёлӢӨкі  мқјлҹ¬мЈјлҠ”лҚ°вҖҰ м–ҙм©җм§Җ лҜёлҚҘм§Җ м•ҠлӢӨ. ${ARROW[wrongDir]}`);
                            return;
                        }
                        if (kind === 'boss_direction') {
                            const bossPos = boss ? boss.getPosition() : -1;
                            const info = fromHere(bossPos);
                            if (info && info.dir !== 'unknown' && info.dir !== 'here') {
                                lines.push(`кұ°лҢҖн•ң л°ңмҶҢлҰ¬к°Җ ${info.label}м—җм„ң мҡёл ӨмҳЁлӢӨ. ${info.arrow}`);
                            } else if (info && info.dir === 'here') {
                                lines.push('мҲЁмқҙ л©Һмқ„ л§ҢнҒј к°Җк№Ңмҡҙ кіім—җм„ң мҡёмқҢмқҙ л“ӨлҰ°лӢӨ. л°”лЎң кіҒмқҙлӢӨ.');
                            } else {
                                lines.push('м–ҙл”ҳк°Җм—җм„ң кұ°лҢҖн•ң м§җмҠ№мқҳ л°ңмҶҢлҰ¬к°Җ мҡёл ӨмҳЁлӢӨ.');
                            }
                            return;
                        }
                        if (kind === 'boss_position' || kind === 'exit_direction_or_boss') {
                            // boss_position: ліҙмҠӨ мң„м№ҳ 1нҡҢ к°ҖмӢңнҷ”.
                            // exit_direction_or_boss: к°Җк№Ңмҡҙ мӘҪ(кұ°лҰ¬ мһ‘мқҖ мӘҪ) мҡ°м„  л…ём¶ң.
                            const bossPos = boss ? boss.getPosition() : -1;
                            const bInfo = fromHere(bossPos);
                            if (kind === 'boss_position') {
                                if (bInfo && bInfo.dir !== 'unknown') {
                                    lines.push(`мһ мӢң ліҙмҠӨмқҳ мң„м№ҳк°Җ лЁёлҰҝмҶҚмқ„ мҠӨм№ңлӢӨ. ${bInfo.label} ${bInfo.arrow}`);
                                    setBossVisible(true);
                                } else {
                                    lines.push('ліҙмҠӨмқҳ мң„м№ҳк°Җ лЁёлҰҝмҶҚмқ„ мҠӨміӨм§Җл§Ң нқҗлҰҝн•ҳлӢӨ.');
                                }
                                return;
                            }
                            // exit_direction_or_boss
                            const eInfo = fromHere(exitTileId);
                            const useBoss = bInfo && eInfo && bInfo.dist < eInfo.dist;
                            const pick = useBoss ? bInfo : eInfo;
                            if (pick && pick.dir !== 'unknown' && pick.dir !== 'here') {
                                lines.push(useBoss
                                    ? `м§җмҠ№мқҳ мҲЁмҶҢлҰ¬к°Җ ${pick.label}м—җм„ң л“ӨлҰ°лӢӨ. ${pick.arrow}`
                                    : `кёёмқҳ лҒқмқҙ ${pick.label}м—җ мһҲлӢӨ. ${pick.arrow}`);
                            } else {
                                lines.push('лЁёлҰҝмҶҚм—җ л¬ҙм–ёк°Җмқҳ л°©н–Ҙ к°җк°Ғмқҙ нқҳлҹ¬к°”лӢӨ.');
                            }
                            return;
                        }
                        if (kind === 'tile_reveal') {
                            // к°ҖмһҘ к°Җк№Ңмҡҙ лҜёкіөк°ң normal/event/good/exit нғҖмқјмқ„ 1к°ң revealed=trueлЎң.
                            let target = -1;
                            let bestDist = Infinity;
                            for (let i = 0; i < tiles.length; i++) {
                                const t = tiles[i];
                                if (!t || t.isEmpty) continue;
                                if (t.revealed || t.discovered) continue;
                                const d = window.getHexDirection
                                    ? window.getHexDirection(tiles, assign.tileId, i).dist
                                    : Infinity;
                                if (d < bestDist) { bestDist = d; target = i; }
                            }
                            if (target >= 0) {
                                setTiles(prev => prev.map(t => t.id === target ? { ...t, revealed: true, discovered: true } : t));
                                const info = fromHere(target);
                                lines.push(info && info.label
                                    ? `м–ҙл‘  мҶҚ н•ң мһҗлҰ¬к°Җ нҷҳн•ҙмЎҢлӢӨ. ${info.label} ${info.arrow}`
                                    : 'м–ҙл‘  мҶҚ н•ң мһҗлҰ¬к°Җ нҷҳн•ҙмЎҢлӢӨ.');
                            } else {
                                lines.push('лЁёлҰҝмҶҚм—җ н•ң мӨ„кё° л№ӣмқҙ мҠӨміӨм§Җл§Ң мғҲ н’ҚкІҪмқҖ м—ҶлӢӨ.');
                            }
                            return;
                        }
                        if (kind === 'nearby_tile_reveal') {
                            // нҳ„мһ¬ нғҖмқјкіј мқём ‘н•ң нғҖмқј мӨ‘ лҜёкіөк°ң н•ң кіімқ„ reveal.
                            const cur = tiles[assign.tileId];
                            const conns = (cur && cur.connections) || [];
                            const candidates = conns.filter(id => {
                                const t = tiles[id];
                                return t && !t.revealed && !t.isEmpty;
                            });
                            if (candidates.length > 0) {
                                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                                setTiles(prev => prev.map(t => t.id === pick ? { ...t, revealed: true, discovered: true } : t));
                                const info = fromHere(pick);
                                lines.push(info && info.label
                                    ? `л°ңм№ҳмқҳ м•Ҳк°ңк°Җ к°ҖмӢңл©° ${info.label} л„ҲлЁёк°Җ л“ңлҹ¬лӮ¬лӢӨ. ${info.arrow}`
                                    : 'л°ңм№ҳмқҳ м•Ҳк°ңк°Җ н•ң мӨ„кё° к°Җм…ЁлӢӨ.');
                            } else {
                                lines.push('мЈјліҖ м•Ҳк°ңлҠ” мқҙлҜё к°Җм…ЁлӢӨ.');
                            }
                            return;
                        }
                        // м•Ң мҲҳ м—ҶлҠ” kind вҖ” м•Ҳм „л§қ.
                        console.warn('[showHint] лҜём§Җмқҳ kind:', kind);
                        lines.push('л¬ҙм–ёк°Җмқҳ нқ”м Ғмқҙ лЁёлҰҝмҶҚм—җ лӮЁлҠ”лӢӨ.');
                    },
                    forceRandomMove: () => {
                        pendingForceMove = true;
                        // D-159: кІ°кіј нҢқм—… лқјлІЁ вҖ” мӮ¬мҡ©мһҗк°Җ [нҷ•мқё] лҲ„лҘҙл©ҙ нҺҳмқҙл“ң вҶ’ мқҙлҸҷ л°ңлҸҷ.
                        lines.push('мқҳмӢқмқҙ нқҗл Өм§Җл©° л°ңмқҙ л©ӢлҢҖлЎң мӣҖм§ҒмқёлӢӨ.');
                    },
                    tagLastGrantedItem: (itemId, statusId) => {
                        // м§Ғм „ grant кІ°кіј 1к°ңм—җ statusTag л¶Җм—¬. к°ҖмһҘ мөңк·јм—җ м¶”к°Җлҗң к°ҷмқҖ type 1к°ңлҘј м°ҫлҠ”лӢӨ.
                        if (!inventory) return;
                        for (let i = inventory.items.length - 1; i >= 0; i--) {
                            if (inventory.items[i].type === itemId) {
                                const it = inventory.items[i];
                                it.statusTags = Array.isArray(it.statusTags) ? it.statusTags.slice() : [];
                                if (!it.statusTags.includes(statusId)) it.statusTags.push(statusId);
                                break;
                            }
                        }
                        setInventory(Object.create(Object.getPrototypeOf(inventory), Object.getOwnPropertyDescriptors(inventory)));
                        const cat = window.StatusEffects && window.StatusEffects.getCatalog(statusId);
                        if (cat) lines.push(`к·ёмӨ‘ н•ҳлӮҳлҠ” ${cat.name}.`);
                    },
                    addLogLine: (txt) => { if (txt) lines.push(txt); }
                };

                const parsed = window.EffectParser.parseEventEffect(dsl);
                window.EffectParser.applyEventEffect(parsed, ctx).forEach(l => lines.push(l));

                // нӣ„мҶҚ(нғҖмқј к°•л“ұ + к°•м ң мқҙлҸҷ)мқ„ кІ°кіј нҢқм—… [нҷ•мқё] мқҙнӣ„лЎң лҜёлЈ¬лӢӨ.
                // D-159 мӢңнҖҖмҠӨ: м„ нғқм§Җ вҶ’ нҡЁкіј м Ғмҡ© вҶ’ кІ°кіј нҢқм—… вҶ’ нҷ•мқё вҶ’ нҺҳмқҙл“ң/мқҙлҸҷ.
                const finalize = () => {
                    setEventResult(null);
                    // нҡЁкіј л©”мӢңм§Җ н•©м№ҳкё° (л©”мӢңм§Җ м№ҙл“ң).
                    if (lines.length > 0) setMessage(lines.join(' '));
                    else setMessage('мһ мӢң л©Ҳм¶°м„ң мҲЁмқ„ кіЁлһҗлӢӨ.');

                    // нғҖмқјмқҖ normalлЎң к°•л“ұ вҖ” к°ҷмқҖ м№ё мһ¬л°©л¬ён•ҙлҸ„ к°ҷмқҖ мқҙлІӨнҠё мһ¬л°ңмғқ X.
                    setTiles(prev => prev.map(t => t.id === assign.tileId ? { ...t, type: 'normal' } : t));
                    setEventTileAssignments(prev => {
                        const next = { ...prev };
                        delete next[assign.tileId];
                        return next;
                    });

                    // вҳҶ4: force_random_move = 1мҙҲ нҺҳмқҙл“ң м—°м¶ң. кІ°кіј нҢқм—… [нҷ•мқё] мқҙнӣ„ л°ңлҸҷ.
                    if (pendingForceMove) {
                        setFadeActive(true);
                        setTimeout(() => {
                            const cur = tiles[assign.tileId];
                            const conns = (cur && cur.connections) || [];
                            if (conns.length > 0) {
                                const dest = conns[Math.floor(Math.random() * conns.length)];
                                setCurrentTile(dest);
                                setMoveHistory(prev => [...prev, dest]);
                                setTiles(prev => prev.map(t => t.id === dest ? { ...t, visited: true, discovered: true, revealed: true } : t));
                            }
                            setFadeActive(false);
                        }, 1000);
                    }
                };

                // м„ нғқм§Җ лӘЁлӢ¬мқҖ мҰүмӢң лӢ«лҠ”лӢӨ вҖ” кІ°кіј нҢқм—…мқҙ к·ё мһҗлҰ¬м—җ лңЁлҸ„лЎқ.
                setEventChoice(null);

                // D-159: кІ°кіј нҢқм—….
                //   - лқјмқёмқҙ 1к°ң мқҙмғҒмқҙл©ҙ EventResultModal л…ём¶ң, мӮ¬мҡ©мһҗк°Җ нҷ•мқён•ҳкё° м „м—” нӣ„мҶҚ ліҙлҘҳ.
                //   - лқјмқё 0кұҙ(м•„л¬ҙ мқјлҸ„ м—Ҷм—ҲлӢӨ)мқҖ лӘЁлӢ¬ лқ„мҡ°м§Җ м•Ҡкі  мҰүмӢң finalize вҖ” м •ліҙк°Җ м—ҶлҠ”лҚ°
                //     лӘЁлӢ¬ лқ„мҡ°лҠ” кұҙ кіјн•Ё. м§§мқҖ л©”мӢңм§Җ(мһ мӢң л©Ҳм¶°м„ңвҖҰ)л§Ң setMessageлЎң нқҳлҰј.
                if (lines.length > 0) {
                    setEventResult({ lines, onConfirm: finalize });
                } else {
                    finalize();
                }
            };

            // нғҖмқј мқҙлҸҷ (D-90: targetId === currentTileмқҙл©ҙ "м ңмһҗлҰ¬м—җм„ң мӢңк°„ ліҙлӮҙкё°" вҖ” лӢӨлҘё
            //   нғҖмқјлЎң мқҙлҸҷн•ң кІғкіј лҸҷмқјн•ң к·ңм№ҷ м Ғмҡ©. лӘЁл“  л¶ҖмҲҳ нҡЁкіј(мӢңк°„/л°°кі н””/л°ңк°ҒлҘ /ліҙмҠӨ
            //   мқҙлҸҷ/мҶҗнҢЁ мӮ¬мқҙнҒҙ л“ұ)к°Җ к·ёлҢҖлЎң нқҗлҘёлӢӨ. HexTile onClickм—җм„ң isCurrentл©ҙ лі„лҸ„
            //   нҷ•мқё лӘЁлӢ¬мқ„ кұ°міҗ мқҙ н•ЁмҲҳм—җ self targetмқ„ л„ҳкё°лҸ„лЎқ н•ңлӢӨ).
            const moveTo = (targetId) => {
                const isWaitInPlace = targetId === currentTile;
                if (!isWaitInPlace && !tiles[currentTile].connections.includes(targetId)) {
                    setMessage('к·ёкіімңјлЎңлҠ” к°Ҳ мҲҳ м—ҶмҠөлӢҲлӢӨ!');
                    return;
                }

                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                setHunger(hunger - 1);
                setTime(0);

                // D-42: мқҙлҸҷн•ҳлҠ” мҲңк°„ ліҙмҠӨ мң„м№ҳ лӢӨмӢң м•Ҳк°ң мҶҚмңјлЎң.
                // м§Җнҳ• revealedлҠ” к·ёлҢҖлЎң л‘җкі  ліҙмҠӨ м•„мқҙмҪҳл§Ң мҲЁкёҙлӢӨ.
                // (кіөнҸ¬ мӣҗм№ҷ: н•ң лІҲ ліё мң„м№ҳлҘј кі„мҶҚ мӢ лў°н•ҳм§Җ лӘ»н•ҳлҸ„лЎқ.)
                setBossVisible(false);

                // мқҙлҸҷл§ҲлӢӨ л°ңк°ҒлҘ  +5% (мҡ”н•ң м§ҖмӢң 2026-04-22).
                // м№ҙл“ңмқҳ detection к°ҖмӨ‘м№ҳмҷҖ лі„к°ңлЎң, лӢЁмҲң мқҙлҸҷ мһҗмІҙк°Җ ліҙмҠӨм—җкІҢ л“ңлҹ¬лӮҳлҠ” кё°ліё мң„н—ҳ.
                // мғҒн•ң 100. detection stateлҠ” мқҙнӣ„ chaseMode м „нҷҳ нҢҗм •(>=80)м—җ к·ёлҢҖлЎң м“°мһ„.
                const movedDetection = Math.min(100, detection + 5);
                setDetection(movedDetection);
                
                // getHexNeighborsлҘј мӮ¬мҡ©н•ҳм—¬ л¬јлҰ¬м ҒмңјлЎң мқём ‘н•ң лӘЁл“  нғҖмқјмқ„ discoveredлЎң м„Өм •
                const mapGen = new MapGenerator(MAP_SIZE);
                const positions = mapGen.generateHexPositions();
                const targetNeighbors = mapGen.getHexNeighbors(targetId, positions);
                
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        // лҸ„м°©н•ң нғҖмқјмқҖ мҰүмӢң лӘЁл“  м •ліҙ кіөк°ң
                        return { ...t, visited: true, discovered: true, revealed: true };
                    }
                    // D-35: н”Ңл Ҳмқҙм–ҙк°Җ м§Ғм „ нғҖмқјмқ„ 'л– лӮ¬лӢӨ'лҠ” мӮ¬мӢӨ кё°лЎқ.
                    // мқҙнӣ„ лҸҢм•„мҳӨлҚ”лқјлҸ„ trueлЎң мң м§Җлҗҳм–ҙ л°ҳліө нҺҳл„җнӢ°мқҳ мҙҲкё° 0.5 кіұмҲҳк°Җ м Ғмҡ©лҗңлӢӨ.
                    if (t.id === currentTile) {
                        return {
                            ...t,
                            hasBeenLeft: true,
                            // к°ҷмқҖ мҶҚм„ұмқҳ мқём ‘ нғҖмқјлҸ„ discovered мң м§Җ
                            discovered: targetNeighbors.includes(t.id) ? true : t.discovered
                        };
                    }
                    // мғҲлЎңмҡҙ мң„м№ҳмқҳ л¬јлҰ¬м Ғ мқём ‘ нғҖмқјл“Өмқ„ discoveredлЎң м„Өм •
                    if (targetNeighbors.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                setMoveHistory(prev => [...prev, targetId]);

                // D-125 / D-161: лҸ„м°© м§Җм—ӯ 1мқём№ӯ лӮҙл Ҳмқҙм…ҳ вҖ” мІ« л°©л¬ё vs мһ¬л°©л¬ё л¶„кё°.
                //   мІ« л°©л¬ё = REGION_INTRO_NARRATIVE (н’Җ л¬ҳмӮ¬). мһ¬л°©л¬ё = REGION_REVISIT_NARRATIVE (м§§мқҢ).
                //   нҢҗм •: м§Ғм „ tilesм—җм„ң н•ҙлӢ№ нғҖмқјмқҳ visited м—¬л¶Җ (newTilesлҠ” мқҙлҜё visited=trueлЎң к°ұмӢ ).
                //   мқҙ мӢңл“ңлҠ” н•©м„ұмқҳ [м§Җм—ӯ мқёнҠёлЎң] мЎ°к°ҒмңјлЎң м“°мқҙкі , м•„лһҳ нғҖмқј/мӮ¬мІҙ/мӮ¬лғҘк°җ/ліҙмҠӨ/нҡҚл“қ
                //   мЎ°к°Ғмқҙ к°ҷмқҖ н•©м„ұм—җ н•©лҘҳн•ңлӢӨ (мӨ‘к°„ setMessage м ңкұ° вҖ” л§Ҳм§Җл§үм—җ н•ң лІҲл§Ң).
                let narrationIntro = '';
                {
                    const prevTile = tiles[targetId];
                    const arrivedTile = newTiles[targetId];
                    const region = arrivedTile && arrivedTile.region;
                    if (region) {
                        const isFirstVisit = !(prevTile && prevTile.visited);
                        narrationIntro = (isFirstVisit ? REGION_INTRO_NARRATIVE[region] : REGION_REVISIT_NARRATIVE[region]) || '';
                    }
                }

                // D-78: л°©л¬ён•ң нғҖмқјмқҙ carcassTraceм—җ мһҲм—ҲлӢӨл©ҙ м •лҰ¬ (мқҙм ң visited вҶ’ мӨ‘м•ҷ рҹҰҙлЎң н‘ңмӢң).
                if (carcassTraceTiles.has(targetId)) {
                    setCarcassTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(targetId);
                        return next;
                    });
                }

                // D-90 / D-161: мӮ¬мІҙ нғҖмқј мІ« лҸ„м°© мӢң кІҪкі . нҶ мҠӨнҠё вҶ’ лӮҙл Ҳмқҙм…ҳ н•©м„ұ мЎ°к°ҒмңјлЎң нқЎмҲҳ.
                //   мһ¬л°©л¬ё/м ңмһҗлҰ¬ лҢҖкё°м—җлҠ” м№Ёл¬ө. carcassTilesлҠ” Map<tileId, {preyType}>.
                //   bait нҸ¬мӢқ нқ”м ҒмқҖ лӢӨлҘё нҶӨ вҖ” "лҶ“м•„л‘” лЁ№мқҙк°Җ к№ЁлҒ—мқҙ мӮ¬лқјмЎҢлӢӨ".
                let carcassNarration = '';
                if (!isWaitInPlace && carcassTiles.has(targetId) && !carcassVisitedTiles.has(targetId)) {
                    const carcassInfo = carcassTiles.get(targetId) || {};
                    if (carcassInfo.preyType === '__bait__') {
                        carcassNarration = 'рҹҰҙ лҶ“м•„л‘” лЁ№мқҙк°Җ к№ЁлҒ—мқҙ мӮ¬лқјмЎҢлӢӨ. кұ°лҢҖн•ң м§җмҠ№мқҳ мӢқмӮ¬ нқ”м ҒмқҙлӢӨ, мЎ°мӢ¬н•ҳмһҗ.';
                    } else {
                        const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                        const preyDef = preyDataArr.find(p => p.id === carcassInfo.preyType);
                        const preyName = (preyDef && preyDef.name) || 'мӮ¬лғҘк°җ';
                        carcassNarration = `рҹҰҙ кұ°лҢҖн•ң м§җмҠ№мқҙ ${preyName}мқ„(лҘј) лңҜм–ҙлЁ№мқҖ нқ”м ҒмқҙлӢӨ, мЎ°мӢ¬н•ҳмһҗ.`;
                    }
                    setCarcassVisitedTiles(prev => {
                        const next = new Set(prev);
                        next.add(targetId);
                        return next;
                    });
                }

                // D-48: м№ҙл“ң к·ңм№ҷ к°ңм • вҖ” нғҖмқј мқҙлҸҷ мӢң мҶҗнҢЁ м „л¶Җ л¬ҙлҚӨмңјлЎң ліҙлӮҙкі  лҚұм—җм„ң
                //   HAND_SIZE(5)мһҘ мғҲлЎң л“ңлЎңмҡ°. лҚұ мҶҢм§„ мӢң л¬ҙлҚӨ м…”н”Ңн•ҙм„ң лҚұ мһ¬кө¬м„ұ.
                //   мқҙм „ 'лҜёмӮ¬мҡ© м№ҙл“ң мң м§Җ' к·ңм№ҷ нҸҗкё°. hunt_start м№ҙл“ңлҸ„ мһҗм—° мҶҢл©ё (мҶҗнҢЁм—җ
                //   мһҲлҚҳ hunt_startк°Җ л¬ҙлҚӨн–ү вҖ” мһ¬мЎ°мҡ° мӢң мғҲлЎң мғқм„ұлҗҳлҜҖлЎң л¬ҙлҚӨ мӘҪм—җм„ң л№јл‘ҳ н•„мҡ” м—ҶмқҢ).
                //   лӢЁ, hunt_startлҠ” overflowлЎң HAND_SIZE м№ҙмҡҙнҠём—җм„ң м ңмҷё.
                const preyHere = (preys || []).find(p => p.tileId === targetId);

                // 1) мҶҗнҢЁ м „л¶Җ л¬ҙлҚӨмңјлЎң. лӢЁ, hunt_start(overflow)лҠ” м•„мҳҲ мҶҢл©ё вҖ” л¬ҙлҚӨ/лҚұ н’Җм—җ
                //    нҸ¬н•Ёлҗҳл©ҙ м•Ҳ лҗЁ (D-65 мҡ”н•ң мӣҗл¬ё). кё°мЎҙ graveyardм—җ м„һм—¬ мһҲлҚҳ hunt_startлҸ„ мІӯмҶҢ.
                let newGraveyard = [...graveyard, ...hand]
                    .filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newDeck = [...deck].filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newHand = [];

                // 2) лҚұм—җм„ң HAND_SIZE л“ңлЎңмҡ°. лҚұ мҶҢм§„ мӢң л¬ҙлҚӨ м…”н”Ң.
                while (newHand.length < HAND_SIZE) {
                    if (newDeck.length === 0) {
                        if (newGraveyard.length === 0) break;
                        newDeck = shuffleDeck(newGraveyard);
                        newGraveyard = [];
                    }
                    newHand.push(newDeck.shift());
                }

                // 3) hunt_start м№ҙл“ң pushлҠ” ліҙмҠӨ мқҙлҸҷ мқҙнӣ„лЎң лҜёлЈ¬лӢӨ (D-93).
                //    мқҙмң : к°ҷмқҖ н„ҙм—җ ліҙмҠӨк°Җ к°ҷмқҖ нғҖмқј preyлҘј нҸ¬мӢқ мӢңмһ‘н•ҳл©ҙ preyк°Җ мҰүмӢң мӮ¬лқјм§ҖлҜҖлЎң
                //    hunt_startлҘј мҶҗнҢЁм—җ л„Јм–ҙлҸ„ лҚ” мқҙмғҒ мң нҡЁн•ң лҢҖмғҒмқҙ м—ҶлӢӨ(мң м Җк°Җ м№ҙл“ң лӘ» м”Җ).
                //    setHand/Deck/GraveyardлҸ„ ліҙмҠӨ мқҙлҸҷ нӣ„лЎң мқҙкҙҖ вҖ” лҸҷмқј н”„л Ҳмһ„мқҙлқј мӢңк°Ғ м°Ёмқҙ м—ҶмқҢ.
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                setGraveyardFlashKey(k => k + 1);
                
                // ліҙмҠӨ мқҙлҸҷ лЎңм§Ғ
                // D-62: мқјл°ҳ лӘЁл“ң лһңлҚӨ мқҙлҸҷмқ„ boss.moveRandom() мң„мһ„ вҖ”
                //   лҜёл°©л¬ё нғҖмқј мҡ°м„  лЎңм§Ғмқҙ мһҗм—°нһҲ м Ғмҡ©лҗңлӢӨ(м „л§ө мҲңнҡҢ к°•нҷ”).
                //   boss.tiles м°ёмЎ°лҠ” мҙҲкё°нҷ” мӢң мЈјмһ…лҗң tiles вҖ” moveToм—җм„ң л§Ңл“  newTilesмҷҖ
                //   лҸҷмқј к°қмІҙ(м°ёмЎ° кіөмң ). м•Ҳм „мқ„ мң„н•ҙ нҳём¶ң м „ мөңмӢ  tiles л°ҳмҳҒ.
                // D-77: нҸ¬мӢқ мқҙлҸҷ мҡ°м„ к¶Ң вҖ” boss.onPlayerMoveм—җ L2 preysлҘј л„ҳкё°л©ҙ
                //   нғҖмқјкұ°лҰ¬ 2 мқҙлӮҙ L2 preyк°Җ мһҲмңјл©ҙ нҸ¬мӢқ кІҪлЎңк°Җ мҡ°м„  мӢӨн–үлҗңлӢӨ.
                //   нҸ¬мӢқ мӨ‘мқҙ м•„лӢҲл©ҙ chase/мқјл°ҳ кё°мЎҙ кІҪлЎң к·ёлҢҖлЎң.
                boss.tiles = newTiles;
                const bossStartPos = boss.position;
                let newBossPos = boss.position;

                if (movedDetection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }

                // D-77: L2 preyл§Ң м¶”л Өм„ң ліҙмҠӨм—җ м „лӢ¬ (нҸ¬мӢқ нӣ„ліҙ).
                const preyDataArrBossMove = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const l2Preys = (preys || []).filter(p => {
                    const def = preyDataArrBossMove.find(pd => pd && pd.id === p.preyType);
                    return def && def.level === 2;
                });
                // D-94 (2026-04-25): кұ°лҢҖн•ң лЁ№мқҙк°Җ лҶ“мқё нғҖмқјмқ„ synthetic preyлЎң ліҖнҷҳн•ҙ лҸҷмқј кІҪлЎңлЎң мІҳлҰ¬.
                //   level=2 + isBait н”Ңлһҳк·ё. bossлҠ” preyмҷҖ кө¬л¶„ м—Ҷмқҙ BFS м¶”кІ©вҶ’нҸ¬мӢқ мӢңмһ‘.
                //   onPredationStart мҪңл°ұм—җм„ң prey.isBait л¶„кё°лЎң baitTiles м ңкұ°.
                const baitAsPreys = Array.from(baitTiles).map(tid => ({
                    id: 'bait:' + tid,
                    tileId: tid,
                    level: 2,
                    preyType: '__bait__',
