                            return next;
                        });
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}을(를) 사용했다. (${label})`);
                }
                return result;
            };

            // D-23: "카드로 아이템 사용" 프레임워크의 공통 진입점.
            // 카드가 아이템을 소비해야 하는 경우(consume 스펙 보유) 이 함수가 모달을 띄우고,
            // 유저가 아이템을 고른 뒤 확정되면 finalizeCardUse로 실제 효과를 적용한다.
            // 카드 자체(손패 → 무덤, 시간·발각 증가)는 선결 조건 통과 후에만 소모.
            //
            // consume 파싱은 effectParser.parseCardConsume에 위임. 필터는 matchesConsumeFilter.
            // consume 통과 아이템이 0개면 "쓸 수 없다" 메시지로 조용히 종료(카드도 미소모).
            const finalizeCardUse = (card, extraMsg) => {
                // 손패 → 무덤, 시간·발각 처리.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume 카드 → 아이템 선택 모달 오픈.
            // 필터 통과 아이템이 없으면 조용히 스킵(카드 미소모).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('아이템 사용 프레임워크가 로드되지 않았다.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {
                    setMessage('이 카드는 아이템을 소비하지 않는다.');
                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                // D-81: 선택(floating) 중인 아이템은 사용 가능 대상에서 제외 — 모달 candidates와 일치시켜
                //   "리스트는 비었지만 hasAny=true"로 모달이 뜨는 부정합 방지.
                const selectedId = inventory?.selectedItem?.id;
                const hasAny = (inventory?.items || []).some(invItem => {
                    if (selectedId && invItem.id === selectedId) return false;
                    const def = InventorySystem.ITEMS[invItem.type] || {};
                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                // D-57 (2026-04-24): 바베큐 가상 선택지 제거 → 휴식 카드 요리 모달로 대체.
                //   [🔥 요리하기] 버튼은 CardItemConsumeModal 내부에서 노출.
                //   재료(meat_skewer/fish_skewer) 보유 시 활성, 없으면 회색 비활성.
                if (!hasAny) {
                    setMessage(`${card.name}: 지금 쓸 수 있는 아이템이 없다.`);
                    return;
                }
                // D-36: 휴식 등 scale이 걸린 카드는 모달이 "효과 증폭"을 시각적으로 강조해야 함.
                // scales(예: {recover: 2})를 그대로 넘겨 모달이 아이템 효과를 미리보기로 스케일.
                // 카드 이름/효과 텍스트는 카드별 안내 문구의 기본값으로 사용.
                const scaleHint = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `음식의 효과가 ${consume.scales.recover}배`
                    : null;
                const bonusHint = (consume.bonuses && consume.bonuses.recover && consume.bonuses.recover !== 0)
                    ? `음식의 효과에 +${consume.bonuses.recover}`
                    : null;
                const hintText = (scaleHint || bonusHint)
                    ? `${card.name}으로 인해 ${[scaleHint, bonusHint].filter(Boolean).join(' 및 ')}가 됩니다`
                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    bonuses: consume.bonuses || {},
                    hintText,
                    titleText: card.name + ' — 사용할 아이템',
                    emptyText: '쓸 만한 아이템이 없다.',
                });
            };

            // D-57: 요리 모달에서 레시피 확정 시 호출.
            //   inventory.craftRecipe로 재료 소비 + 결과물 배치. 휴식 카드는 소모하지 않음
            //   (요리 자체로는 시간/발각 진행 없음 — 휴식 모달로 복귀 후 식사까지 이어지면
            //    그때 카드가 소비됨). 메시지는 "X을(를) 구웠다." 포맷.
            const handleCookRecipe = (recipe) => {
                if (!inventory) return;
                const res = inventory.craftRecipe(recipe);
                if (!res.ok) {
                    if (res.reason === 'no_space') setMessage('가방이 가득 차 요리 결과를 둘 곳이 없다.');
                    else if (res.reason === 'short_ingredients') setMessage('요리 재료가 부족하다.');
                    else setMessage('요리에 실패했다.');
                    return;
                }
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const resultMeta = notionItems.find(it => it && it.id === res.resultType);
                const resultName = (resultMeta && resultMeta['이름'])
                    || (InventorySystem.ITEMS[res.resultType] && InventorySystem.ITEMS[res.resultType].name)
                    || res.resultType;
                setMessage(`${resultName}을(를) 구웠다.`);
                setCookingOpen(false);
            };

            // consume 모달에서 아이템 하나 선택 → 실제 효과 적용.
            // 1) 아이템의 파싱된 effect를 scaleEffect로 변형 (예: 회복 x2)
            // 2) applyItemEffect로 스탯/카드 액션 디스패치
            // 3) 아이템 1개 인벤에서 제거 (일회용·비일회용 무관: 카드가 소비하는 맥락)
            // 4) 카드 본체 소모 + 시간/발각 반영
            const resolveConsumeChoice = (invItem) => {
                if (!pendingConsume) return;
                const Parser = window.EffectParser;
                const { card, consume } = pendingConsume;

                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                const parsedEffect = (notionItem && notionItem.effect) || null;

                let appliedMsg = '';
                if (parsedEffect && parsedEffect.usable && Parser) {
                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {}, consume.bonuses || {});
                    Parser.applyItemEffect(scaled, {
                        getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                        setStat: (name, val) => {
                            if (name === 'hunger') setHunger(val);
                            else if (name === 'health') setHealth(val);
                        },
                        addThrowCard: (cardId) => {
                            setCombatExtraCards(prev => {
                                const next = [...prev];
                                const idx = next.findIndex(c => c.id === cardId);
                                if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                                else next.push({ id: cardId, count: 1 });
                                return next;
                            });
                        },
                        setMessage
                    });
                    appliedMsg = `${def.name || invItem.name}을(를) 소모하고 ${Parser.describeEffect(scaled)}.`;
                } else {
                    appliedMsg = `${def.name || invItem.name}을(를) 소모했지만 별 효과는 없었다.`;
                }

                // 아이템 1개 소비
                if (inventory) {
                    inventory.removeItem(invItem);
                    inventory.items = inventory.items.filter(i => i.id !== invItem.id);
                }

                setPendingConsume(null);
                finalizeCardUse(card, appliedMsg);
            };

            const cancelConsume = () => {
                setPendingConsume(null);
                // D-57: 요리 모달도 함께 닫아 루즈한 상태 잔존 방지.
                setCookingOpen(false);
            };

            // 카드 사용
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('시간이 부족합니다!');
                    return;
                }

                // D-46 (2026-04-23): hunt_start 카드 분기.
                //   현재 preys에서 target.preyId로 prey 찾기. 없으면 "사라졌다" 메시지 + 자원 미소모.
                //   있으면 즉시 소모(time+1/detection+2/손패 제거/무덤 추가) 후 activeHunt set.
                if (card.id === 'hunt_start') {
                    const targetId = card.target && card.target.preyId;
                    const prey = (preys || []).find(p => p.id === targetId);
                    if (!prey) {
                        // D-65: hunt_start는 무덤으로 가지 않고 소멸.
                        setMessage('사냥감이 사라졌다.');
                        setHand(prev => prev.filter(c => c.uid !== card.uid));
                        return;
                    }
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    // D-65: hunt_start는 무덤으로 가지 않고 소멸.
                    setHand(hand.filter(c => c.uid !== card.uid));
                    setTime(time + card.time);
                    const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                    setDetection(newDetection);
                    setActiveHunt({
                        prey: {
                            id: prey.id,
                            tileId: prey.tileId,
                            preyType: prey.preyType,
                            name: preyDef.name || prey.preyType,
                            // D-47: 이전 전투에서 준 데미지 누적 유지. hpCurrent가 있으면 그 값으로 시작.
                            hp: (typeof prey.hpCurrent === 'number') ? prey.hpCurrent : (preyDef.hp || 1),
                            meat: preyDef.meat || 1,
                            // D-71: prey 전용 드롭 아이템 id. 시트 `사냥감.drop_item` 컬럼.
                            //   빈값이면 handleHuntResolve에서 'meat' 폴백.
                            drop_item: preyDef.drop_item || '',
                            evade_rate: preyDef.evade_rate || 20,
                            // D-60: 턴별 회피율 CSV ("30,30,20") — 빈값이면 resolveHunt/UI에서 evade_rate로 폴백.
                            evade_per_turn: preyDef.evade_per_turn || '',
                            // D-60: 이 prey 개체가 그동안 몇 번 도망쳤는지 — 턴별 회피율에서 *10 차감.
                            fleeCount: prey.fleeCount || 0,
                            // D-74/D-75: Level 2 prey 4턴 시스템.
                            //   level=2면 HuntCombatModal이 4슬롯으로 구성, resolveHunt가 4턴 actions DSL 적용.
                            //   attack: prey 공격력 (유저가 받는 대미지 - 유저 카드 defense).
                            //   defense: prey 'defend' 턴의 방어값 (유저 공격 감쇄).
                            //   actions_per_turn: 4턴 행동 CSV.
                            level: Number(preyDef.level) || 1,
                            attack: Number(preyDef.attack) || 0,
                            defense: Number(preyDef.defense) || 0,
                            actions_per_turn: preyDef.actions_per_turn || ''
                        }
                    });
                    setMessage(`${preyDef.name || '사냥감'}과 전투를 시작한다.`);
                    return;
                }

                // D-23: consume 스펙이 있는 카드는 모달을 띄우고 선택 후 효과 적용.
                // 카드 본체 소모·시간·발각은 finalizeCardUse에서만 발생.
                if (card.consume) {
                    openConsumeForCard(card);
                    return;
                }

                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);

                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);

                let msg = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;

                if (card.id === 'search') {
                    // D-28(2026-04-22, 요한 지시): 뒤져보기는 3슬롯 독립 추첨(100/20/20).
                    // 슬롯 확률/개수 자체는 비공개. 결과만 메시지+토스트로 노출.
                    // 여러 개 획득 시 같은 아이템은 개수 누적, 묶음 토스트 1개.
                    //
                    // D-34: 타일 type === 'good'이면 슬롯 확률이 상향(100/80/80).
                    // D-35: 같은 타일 반복·복귀 뒤져보기에는 페널티 곱수가 붙는다
                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLoot가
                    //       tile 객체를 받아 안에서 처리한다.
                    const tile = tiles[currentTile];
                    const currentRegion = tile?.region;
                    // D-78: 사체 타일 첫 뒤져보기 → 일반 region 드롭풀 + 생고기 +1 보너스.
                    //   이미 1회 뽑았으면(carcassMeatTaken에 등록) 보너스 없이 일반 드롭만.
                    const onCarcass = carcassTiles.has(currentTile);
                    const carcassBonus = onCarcass && !carcassMeatTaken.has(currentTile);
                    if (currentRegion) {
                        const drops = rollSearchLoot(currentRegion, tile);
                        // 같은 아이템 개수 누적 (토스트/메시지 가독성)
                        const counter = new Map(); // item -> count
                        let overflow = 0; // 가방 포화로 못 담은 수
                        drops.forEach(({ item }) => {
                            const added = inventory.addItem(item);
                            if (added) {
                                counter.set(item, (counter.get(item) || 0) + 1);
                            } else {
                                overflow += 1;
                            }
                        });

                        // D-78: 사체 첫 뒤져보기 보너스 — 생고기 +1. 한 번만.
                        if (carcassBonus) {
                            const addedMeat = inventory.addItem('meat');
                            if (addedMeat) {
                                counter.set('meat', (counter.get('meat') || 0) + 1);
                            } else {
                                overflow += 1;
                            }
                            setCarcassMeatTaken(prev => {
                                const next = new Set(prev);
                                next.add(currentTile);
                                return next;
                            });
                            // 사체 trace 마커는 이 타일에 남아있더라도 visited 이후엔 사체 🦴가
                            // 이미 가운데 아이콘으로 노출되므로 trace는 그대로 둬도 혼선 없음.
                        }

                        if (counter.size > 0) {
                            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                            const entries = [];
                            const nameParts = [];
                            counter.forEach((count, item) => {
                                const def = InventorySystem.ITEMS[item] || {};
                                const displayName = def.name || item;
                                const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                const grade = notionItem && notionItem['아이템 등급'];
                                entries.push({ name: displayName, count, grade });
                                nameParts.push(count > 1 ? `${displayName} ×${count}` : displayName);
                            });
                            msg += `[${currentRegion}] ${nameParts.join(', ')}을(를) 발견했다.`;
                            if (overflow > 0) msg += ` (가방이 가득 차 ${overflow}개는 두고 왔다.)`;
                            showLootToast(entries);
                        } else if (overflow > 0) {
                            msg += `[${currentRegion}] 쓸 만한 걸 찾았지만 가방이 가득 차 들고 오지 못했다.`;
                        } else {
                            msg += `[${currentRegion}] 이 근처에는 쓸만한 게 없다.`;
                        }

                        // D-35: 이 타일의 뒤져보기 카운터 증가.
                        // 추첨이 끝난 뒤에 올려야 "첫 사용은 mult=1" 규약이 지켜진다.
                        setTiles(prev => prev.map(t =>
                            t.id === currentTile
                                ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                : t
                        ));
                    } else {
                        // 안전망: region 없는 타일(구버전 세이브 등)은 레거시 동작
                        inventory.addItem('material_low');
                        msg += `재료를 발견했다.`;
                    }
                } else if (card.id === 'find_food') {
                    // '음식 찾기' 카드 — food 카테고리 강제 드롭(요한 지시 2026-04-22).
                    // 'food' 독립 아이템은 제거됐으므로, 지역의 음식재료 풀에서 직접 추첨.
                    // 지역에 food 풀이 비어있으면(시냇물 등) 폴백 메시지.
                    //
                    // D-40 (2026-04-23 요한 지시): search와 동일하게 LootToast 노출.
                    // 단일 아이템이라 entries 배열에 원소 1개. 가방이 찬 경우(added=false)는
                    // 토스트 생략(기존 search 분기와 동일한 규칙: 실제 획득한 것만).
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item } = rollTileDrop(currentRegion, { forceCategory: 'food' });
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            if (added) {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 찾아냈다.`;
                                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                const displayName = def?.name || item;
                                const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                const grade = notionItem && notionItem['아이템 등급'];
                                showLootToast([{ name: displayName, count: 1, grade }]);
                            } else {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 찾았지만 가방이 가득 찼다.`;
                            }
                        } else {
                            msg += `[${currentRegion}] 먹을 만한 건 보이지 않는다.`;
                        }
                    } else {
                        msg += '먹을 만한 건 보이지 않는다.';
                    }
                } else if (card.id === 'listen') {
                    // D-31 (2026-04-22 보강):
                    //   listen 카드의 기본 효과는 "인접 타일 revealed" — 거리와 무관하게 항상 실행.
                    //   그 위에 거리별 청각 메시지(보스와의 BFS 거리)가 중첩된다.
                    //   1칸  → 보스 위치 노출 + 인접 revealed
                    //   2칸  → "숨쉬는 소리가 꽤 가까이..." + 인접 revealed
                    //   3칸  → "발걸음 소리가 가까워진듯..." + 인접 revealed
                    //   ≥4칸 → "발걸음 소리가 아주 멀리서..." + 인접 revealed
                    // (직전 버전에서 2칸 이상일 때 revealed를 끊었으나, 이는 listen의 핵심 기능을
                    //  제거한 회귀였음. 요한 QA 2026-04-22 지시로 복구.)
                    const bossPos = boss.getPosition();
                    // D-55 (2026-04-23 요한 지시): 청각 거리는 physical hex 거리 사용.
                    // calculateDistance(path-BFS)는 빈 슬롯·비육각 이웃 영향으로
                    // 공간적으로 가까워도 "멀다"고 말할 수 있어 listen 용도엔 부적합.
                    const bossDist = boss.calculateHexDistance(currentTile, bossPos);

                    // 인접 타일 revealed — 거리 무관하게 항상 실행되는 listen의 기본 효과.
                    let newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    // D-80 (2026-04-24 요한 지시): 길찾기 난이도 하향 — 정보가 밝혀진 타일의
                    // connections 중 아직 공개 전인 타일을 silhouette으로 마킹. HexTile이 맵보기의
                    // dim 색상(#444 / opacity 0.22)으로 윤곽만 노출. 영구 유지(이후 revealed/visited 되면
                    // 자연스럽게 상위 스타일로 승격). 이동 가능 여부는 기존대로 canMove 판정.
                    const silhouetteIds = new Set();
                    newTiles.forEach(t => {
                        if (!t.revealed && !t.visited) return;
                        (t.connections || []).forEach(cid => {
                            const target = newTiles[cid];
                            if (!target) return;
                            if (target.revealed || target.visited) return;
                            silhouetteIds.add(cid);
                        });
                    });
                    if (silhouetteIds.size > 0) {
                        newTiles = newTiles.map(t =>
                            silhouetteIds.has(t.id) ? { ...t, silhouette: true } : t
                        );
                    }
                    setTiles(newTiles);

                    // listen 보스 감지 → TileEventToast로 시각화 (공룡 아이콘 + 단계별 테두리 색).
                    // 색 코드: 빨강(인접 1칸, 즉사 경고) / 노랑(2~3칸, 경계) / 초록(≥4칸, 안심).
                    // 1칸은 추가로 점프스케어 오버레이를 터뜨려 공포감 강화.
                    // (기존 하단 메시지 패널은 서사적 톤과 어울리지 않아 시인성 떨어진다는 요한 피드백.)
                    if (bossDist === 1) {
                        // D-42: 보스 위치 노출은 이 순간만. 이동 시 moveTo에서 다시 false로.
                        setBossVisible(true);
                        setBossJumpscare(true);
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 근접',
                            message: `가쁜 숨소리가 바로 곁에서 들려온다. 보스는 타일 #${bossPos}에 있다.`,
                            color: '#ff3b3b'
                        });
                    } else if (bossDist === 2) {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 경계',
                            message: '숨쉬는 소리가 꽤 가까이 들리는 듯 하여 소름이 돋는다.',
                            color: '#ffb300'
                        });
                    } else if (bossDist === 3) {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 감지',
                            message: '발걸음 소리가 가까워진듯 하다.',
                            color: '#ffb300'
                        });
                    } else {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 탐지',
                            message: '발걸음 소리가 아주 멀리서 들린다, 당분간은 안심해도 될 것 같다.',
                            color: '#4CAF50'
                        });
                    }

                    // D-46 (2026-04-23): listen 인접 사냥감 흔적 감지.
                    //   현재 타일의 인접 타일 ∩ preys tileId = "기척이 느껴지는 타일".
                    //   종류는 비공개(👣 마커만). preyTraceTiles Set에 해당 tileId 누적.
                    //   보스 내레이션·D-42 bossVisible과 독립된 섹션 — 기존 로직 건드리지 않음.
                    const neighborIds = tiles[currentTile].connections;
                    const traceHits = (preys || [])
                        .filter(p => neighborIds.includes(p.tileId))
                        .map(p => p.tileId);
                    if (traceHits.length > 0) {
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            traceHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\n근처에서 희미한 기척이 느껴진다.';
                    }

                    // D-78: 인접 사체 타일 감지 — 👣 대신 🦴 trace.
                    //   carcassTiles ∩ 인접 = "사체 냄새가 나는 타일".
                    const carcassHits = neighborIds.filter(nid => carcassTiles.has(nid));
                    if (carcassHits.length > 0) {
                        setCarcassTraceTiles(prev => {
                            const next = new Set(prev);
                            carcassHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\n어디선가 짐승의 사체 냄새가 풍긴다.';
                    }
                } else if (card.id === 'hide') {
                    msg += '조용히 몸을 숨겼다.';
                }
                
                setMessage(msg);
            };

            // 타일 이동
            const moveTo = (targetId) => {
                if (!tiles[currentTile].connections.includes(targetId)) {
                    setMessage('그곳으로는 갈 수 없습니다!');
                    return;
                }

                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                setHunger(hunger - 1);
                setTime(0);

                // D-42: 이동하는 순간 보스 위치 다시 안개 속으로.
                // 지형 revealed는 그대로 두고 보스 아이콘만 숨긴다.
                // (공포 원칙: 한 번 본 위치를 계속 신뢰하지 못하도록.)
                setBossVisible(false);

                // 이동마다 발각률 +5% (요한 지시 2026-04-22).
                // 카드의 detection 가중치와 별개로, 단순 이동 자체가 보스에게 드러나는 기본 위험.
                // 상한 100. detection state는 이후 chaseMode 전환 판정(>=80)에 그대로 쓰임.
                const movedDetection = Math.min(100, detection + 5);
                setDetection(movedDetection);
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const mapGen = new MapGenerator(MAP_SIZE);
                const positions = mapGen.generateHexPositions();
                const targetNeighbors = mapGen.getHexNeighbors(targetId, positions);
                
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        // 도착한 타일은 즉시 모든 정보 공개
                        return { ...t, visited: true, discovered: true, revealed: true };
                    }
                    // D-35: 플레이어가 직전 타일을 '떠났다'는 사실 기록.
                    // 이후 돌아오더라도 true로 유지되어 반복 페널티의 초기 0.5 곱수가 적용된다.
                    if (t.id === currentTile) {
                        return {
                            ...t,
                            hasBeenLeft: true,
                            // 같은 속성의 인접 타일도 discovered 유지
                            discovered: targetNeighbors.includes(t.id) ? true : t.discovered
                        };
                    }
                    // 새로운 위치의 물리적 인접 타일들을 discovered로 설정
                    if (targetNeighbors.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                setMoveHistory(prev => [...prev, targetId]);

                // D-78: 방문한 타일이 carcassTrace에 있었다면 정리 (이제 visited → 중앙 🦴로 표시).
                if (carcassTraceTiles.has(targetId)) {
                    setCarcassTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(targetId);
                        return next;
                    });
                }

                // D-48: 카드 규칙 개정 — 타일 이동 시 손패 전부 무덤으로 보내고 덱에서
                //   HAND_SIZE(5)장 새로 드로우. 덱 소진 시 무덤 셔플해서 덱 재구성.
                //   이전 '미사용 카드 유지' 규칙 폐기. hunt_start 카드도 자연 소멸 (손패에
                //   있던 hunt_start가 무덤행 — 재조우 시 새로 생성되므로 무덤 쪽에서 빼둘 필요 없음).
                //   단, hunt_start는 overflow로 HAND_SIZE 카운트에서 제외.
                const preyHere = (preys || []).find(p => p.tileId === targetId);

                // 1) 손패 전부 무덤으로. 단, hunt_start(overflow)는 아예 소멸 — 무덤/덱 풀에
                //    포함되면 안 됨 (D-65 요한 원문). 기존 graveyard에 섞여 있던 hunt_start도 청소.
                let newGraveyard = [...graveyard, ...hand]
                    .filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newDeck = [...deck].filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newHand = [];

                // 2) 덱에서 HAND_SIZE 드로우. 덱 소진 시 무덤 셔플.
                while (newHand.length < HAND_SIZE) {
                    if (newDeck.length === 0) {
                        if (newGraveyard.length === 0) break;
                        newDeck = shuffleDeck(newGraveyard);
                        newGraveyard = [];
                    }
                    newHand.push(newDeck.shift());
                }

                // 3) 도착 타일에 사냥감 있으면 hunt_start 카드 overflow로 추가 + 토스트.
                if (preyHere) {
                    newHand.push({
                        ...HUNT_START_CARD,
                        uid: `hunt_start_${preyHere.id}_${Date.now()}`,
                        target: {
                            tileId: targetId,
                            preyId: preyHere.id,
                            preyType: preyHere.preyType
                        }
                    });
                    const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const foundDef = preyDataArr.find(p => p.id === preyHere.preyType) || {};
                    const hpNote = (typeof preyHere.hpCurrent === 'number' && preyHere.hpCurrent < (foundDef.hp || 0))
                        ? ` (HP ${preyHere.hpCurrent}/${foundDef.hp})`
                        : '';
                    showTileEventToast({
                        emoji: PREY_EMOJI[preyHere.preyType] || '❓',
                        title: '사냥감 발견',
                        message: (foundDef.name || preyHere.preyType) + hpNote,
                        color: '#3dd68c'
                    });
                }

                setHand(newHand);
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                // D-48: 이동으로 손패가 전부 무덤행임을 시각적으로 안내.
                setGraveyardFlashKey(k => k + 1);
                
                // 보스 이동 로직
                // D-62: 일반 모드 랜덤 이동을 boss.moveRandom() 위임 —
                //   미방문 타일 우선 로직이 자연히 적용된다(전맵 순회 강화).
                //   boss.tiles 참조는 초기화 시 주입된 tiles — moveTo에서 만든 newTiles와
                //   동일 객체(참조 공유). 안전을 위해 호출 전 최신 tiles 반영.
                // D-77: 포식 이동 우선권 — boss.onPlayerMove에 L2 preys를 넘기면
                //   타일거리 2 이내 L2 prey가 있으면 포식 경로가 우선 실행된다.
                //   포식 중이 아니면 chase/일반 기존 경로 그대로.
                boss.tiles = newTiles;
                const bossStartPos = boss.position;
                let newBossPos = boss.position;

                if (movedDetection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }

                // D-77: L2 prey만 추려서 보스에 전달 (포식 후보).
                const preyDataArrBossMove = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const l2Preys = (preys || []).filter(p => {
                    const def = preyDataArrBossMove.find(pd => pd && pd.id === p.preyType);
                    return def && def.level === 2;
                });

                // 일반 모드에서는 2턴마다, chase 모드에선 매 턴 호출.
                if (boss.chaseMode || newMoveCount % 2 === 0) {
                    boss.onPlayerMove(targetId, movedDetection, l2Preys);
                    newBossPos = boss.position;
                }

                // D-53: 보스가 실제로 이동한 경우에만 history에 push. 같은 자리 유지면 skip.
                if (newBossPos !== bossStartPos) {
                    setBossMoveHistory(prev => (
                        prev.length > 0 && prev[prev.length - 1] === newBossPos
                            ? prev
                            : [...prev, newBossPos]
                    ));
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';
                
                if (encounter) {
                    // D-56 (2026-04-24 요한 지시): 보스 조우 시 점프스케어 선재생 → 0.55s 뒤
                    // 게임오버 모달. 같은 타일 진입 기준(listen 인접 1칸 연출과는 별개 경로).
                    setBossJumpscare(true);
                    setTimeout(() => {
                        setBossJumpscare(false);
                        setGameOver(true);
                        setDeathReason('boss');
                    }, 550);
                    msg = '보스 몬스터와 조우했다! 게임 오버...';
                } else if (tile.type === 'normal') {
                    msg = '평범한 숲길이다.';
                } else if (tile.type === 'good') {
                    // D-52 (2026-04-23 요한 지시): '좋은 곳' → '풍족한 땅'으로 의미 재정의.
                    // 팝업 모달 → 토스트 알림으로 전환(흐름 끊김 완화).
                    msg = '풍족한 땅을 발견했다!';
                    showTileEventToast({
                        emoji: '🌾',
                        title: '풍족한 땅',
                        message: '자원과 먹거리가 풍부한 곳이다.',
                        color: '#FFC107'
                    });
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `함정! 생명력 -${damage}`;
                    // 이벤트 모달 표시 (데미지 정보 포함)
                    setEventTile({ ...tile, damage });
                } else if (tile.type === 'exit') {
                    msg = '탈출구다!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [⚠️ 보스 추격중!]`;
                }
                
                setMessage(msg);
            };

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>게임 로딩 중...</div>;
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    <div className="ui-panel">
                        <StatPanel 
                            health={health}
                            hunger={hunger}
                            time={time}
                            maxTime={maxTime}
                            boss={boss}
                            detection={detection}
                            message={message}
                        />
                        
                        {/* D-27 HUD 리뉴얼 → D-28 재배치 (요한 지시 2026-04-22):
                            - 가방 버튼은 좌측 고정.
                            - 덱/무덤 버튼은 '손패 N/5' 카운터 쪽(우측 끝)으로 묶는다.
                              근거: "카드 자원 관리 UI는 한 곳에"라는 요한 의도. 손패·덱·무덤은
                              같은 카드 자원이므로 시선이 분리되지 않도록 묶음.
                            - 손패는 하단에 항상 표시되므로 숫자만 간결히. */}
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', alignItems: 'center' }}>
                            <button onClick={() => setShowInventory(!showInventory)}>
                                {showInventory ? '가방 닫기' : '가방 열기'}
                            </button>
                            {/* D-53: 가운데 정렬은 양쪽 marginLeft/Right auto. 좌(가방)와 우(덱/무덤) 사이 등분. */}
                            <button
                                onClick={() => setShowHelp(true)}
                                style={{ marginLeft: 'auto', marginRight: 'auto' }}
                            >
                                플레이방법
                            </button>
                            <div style={{
                                display: 'flex',
                                gap: '6px',
                                alignItems: 'center'
                            }}>
                                <div style={{ fontSize: '12px', color: '#aaa' }}>
                                    손패 {hand.filter(c => !c.overflow).length}/{HAND_SIZE}
                                </div>
                                <button onClick={() => setShowDeckList(true)}>
                                    덱 {deck.length}
                                </button>
                                <button
                                    key={`graveyard-${graveyardFlashKey}`}
                                    className={graveyardFlashKey > 0 ? 'graveyard-flash' : ''}
                                    onClick={() => setShowGraveyardList(true)}
                                >
                                    무덤 {graveyard.length}
                                </button>
                            </div>
                        </div>

                        <HandCards 
                            hand={hand}
                            gameOver={gameOver}
                            victory={victory}
                            useCard={useCard}
                        />
                    </div>

                    <GameMap
                        tiles={tiles}
                        currentTile={currentTile}
                        boss={boss}
                        bossVisible={bossVisible}
                        gameOver={gameOver}
                        victory={victory}
                        moveTo={moveTo}
                        lootToast={lootToast}
                        onLootToastDone={() => setLootToast(null)}
                        tileEventToast={tileEventToast}
                        onTileEventToastDone={() => setTileEventToast(null)}
                        preys={preys}
                        preyTraceTiles={preyTraceTiles}
                        carcassTiles={carcassTiles}
                        carcassTraceTiles={carcassTraceTiles}
                        moveHistory={moveHistory}
                        bossMoveHistory={bossMoveHistory}
                        showPathView={showPathView}
                    />

                    {eventTile && (
                        <TileEventModal 
                            tile={eventTile} 
                            onClose={() => setEventTile(null)} 
                        />
                    )}

                    {showInventory && inventory && (
                        <InventoryModal
                            inventory={inventory}
                            selectedItem={selectedInventoryItem}
                            setSelectedItem={setSelectedInventoryItem}
                            closeInventory={() => setShowInventory(false)}
                            onUseItem={handleUseItem}
                            onFlashMessage={setMessage}
                        />
                    )}

                    {showHelp && (
                        <HelpModal onClose={() => setShowHelp(false)} />
                    )}

                    {showDeckList && (
                        <CardListModal
                            title="남은 덱"
                            cards={deck}
                            emptyText="덱이 비었다. 무덤이 셔플될 차례다."
                            onClose={() => setShowDeckList(false)}
                        />
                    )}

                    {showGraveyardList && (
                        <CardListModal
                            title="무덤"
                            cards={graveyard}
                            emptyText="아직 사용한 카드가 없다."
                            onClose={() => setShowGraveyardList(false)}
                        />
                    )}

                    {pendingConsume && inventory && (() => {
                        // D-57: 휴식 카드(id='rest')에서만 [🔥 요리하기] 버튼 노출.
                        //   canCook: 요리 가능 재료(meat_skewer/fish_skewer 등 1재료 grilled_ 레시피
                        //   재료) 보유 여부. 없으면 버튼은 회색 비활성.
                        const isRest = pendingConsume.card && pendingConsume.card.id === 'rest';
                        let canCook = false;
                        let onCookClick = undefined;
                        if (isRest) {
                            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                                ? window.TTD_DATA.COMBOS : [];
                            const cookIngs = new Set(
                                combos
                                    .filter(r => r && Array.isArray(r.ingredients)
                                        && r.ingredients.length === 1
                                        && typeof r.result === 'string'
                                        && r.result.startsWith('grilled_'))
                                    .map(r => r.ingredients[0])
                            );
                            canCook = (inventory.items || []).some(it => cookIngs.has(it.type));
                            onCookClick = () => setCookingOpen(true);
                        }
                        return (
                            <CardItemConsumeModal
                                inventory={inventory}
                                filter={pendingConsume.filter}
                                scales={pendingConsume.scales}
                                bonuses={pendingConsume.bonuses}
                                hintText={pendingConsume.hintText}
                                titleText={pendingConsume.titleText}
                                emptyText={pendingConsume.emptyText}
                                onSelect={resolveConsumeChoice}
                                onClose={cancelConsume}
                                onCookClick={onCookClick}
                                canCook={canCook}
                            />
                        );
                    })()}

                    {/* D-57: 요리 모달 — 휴식 모달 위에 덮인다. 닫으면 휴식 모달로 복귀. */}
                    {cookingOpen && inventory && (
                        <CookingModal
                            inventory={inventory}
                            onCook={handleCookRecipe}
                            onClose={() => setCookingOpen(false)}
                        />
                    )}

                    {/* D-42 (2026-04-23): 최상위 LootToast 제거.
                        이미 GameMap 내부에서 렌더되므로 중복 마운트였음.
                        맵 컨테이너 기준 top:12px 하나만 유지. */}

                    {/* D-46 (2026-04-23): 사냥 전투 모달. activeHunt 설정되면 마운트. */}
                    {activeHunt && (
                        <HuntCombatModal
                            prey={activeHunt.prey}
                            inventory={inventory}
                            combatCards={(window.TTD_DATA && window.TTD_DATA.COMBAT_CARDS) || []}
                            onResolve={handleHuntResolve}
                            onCancel={() => setActiveHunt(null)}
                        />
                    )}

                    <GameEndModal
                        gameOver={gameOver}
                        victory={victory}
                        deathReason={deathReason}
                        showPathView={showPathView}
                        onViewPath={() => setShowPathView(true)}
                    />

                    <BossJumpscare active={bossJumpscare} onDone={() => setBossJumpscare(false)} />

                    {/* 맵 보기 모드 플로팅 컨트롤 — 승리 후 경로를 들여다볼 때 */}
                    {showPathView && (
                        <div style={{
                            position: 'fixed',
                            bottom: '20px',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            zIndex: 200,
                            display: 'flex',
                            gap: '10px'
                        }}>
                            <button
                                onClick={() => setShowPathView(false)}
                                style={{
                                    background: '#2a2a3e',
                                    color: '#d4b84a',
                                    border: '1px solid #d4b84a',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600
                                }}
                            >
                                {victory ? '← 승리 화면' : '← 결과 화면'}
                            </button>
                            <button
                                onClick={() => window.location.reload()}
                                style={{
                                    background: '#4CAF50',
                                    color: 'white',
                                    border: 'none',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600
                                }}
                            >
                                다시 시작
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<Game />, document.getElementById('root'));

        // D-41 (2026-04-23 요한 지시): 게임 영역 내부의 contextmenu(우클릭/롱프레스)
        // 기본 동작 차단. CSS user-select:none만으로는 iOS Safari 롱프레스 복사 메뉴가
        // 뜨는 경우가 있어 JS 레벨에서도 막는다.
        // input/textarea/contentEditable은 제외 — 텍스트 선택·붙여넣기 컨텍스트가 필요.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
