                                    fontSize: '15px',
                                    fontWeight: '600',
                                    borderRadius: '6px',
                                    cursor: 'pointer'
                                }}
                            >
                                🗺️ 맵 보기
                            </button>
                            {/* D-110: 승리 시에만 [전리품 확인] — 선택 인입 모달 진입. */}
                            {victory && onShowLoot && (
                                <button
                                    onClick={() => onShowLoot()}
                                    style={{
                                        background: '#1a1a2e',
                                        color: '#d4b84a',
                                        border: '1px solid #d4b84a',
                                        padding: '12px 24px',
                                        fontSize: '15px',
                                        fontWeight: '600',
                                        borderRadius: '6px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    📦 전리품 확인
                                </button>
                            )}
                            <button
                                onClick={() => onReturnCamp && onReturnCamp()}
                                style={{
                                    background: 'white',
                                    color: '#333',
                                    border: 'none',
                                    padding: '12px 24px',
                                    fontSize: '15px',
                                    fontWeight: '600',
                                    borderRadius: '6px',
                                    cursor: 'pointer'
                                }}
                            >
                                🏕️ 베이스캠프로 귀환
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // 사냥 전투 모달 (D-46, 2026-04-23)
        // ============================================
        //
        // 구조:
        //   - 상단: prey 이름 + HP 바 + meat 표시
        //   - 적 패턴 3슬롯(readonly): 회피 / 회피 / 빠르게 도망
        //   - 내 슬롯 3칸: 비었으면 "비었음", 카드 있으면 카드 렌더(탭→손패 복귀)
        //   - 확정 버튼: 3슬롯 모두 차야 활성
        //   - 내 손패: buildHuntDeck 결과. 탭 시 가장 왼쪽 빈 슬롯에 배치.
        //
        // 슬롯↔손패 이동은 uid 기준. "뒤 슬롯 고정" 원칙 — 슬롯→손패 복귀 시 다른 슬롯 위치 유지.
        // 확정 시 resolveHunt(prey, slots) → 턴 로그 순차 표시(500ms) → onResolve(result) 콜백.
        // D-58/D-74: HuntCombatModal 수치 배지 통일.
        //   - 🗡️+N / N% / 🏹+N / 🛡️+N 순서 고정, 줄바꿈 없음.
        //   - damage=0 && defense>0 → 🗡️ 숨기고 🛡️ 표시 (크아 웅크리기/방패 막기).
        //   - damage=0 && defense=0 (dodge/run_away) → 🗡️·🏹 생략, N%만.
        //   - 라벨 텍스트 전부 제거 — 아이콘 + 숫자로 통일.
        const STAT_ICONS = { damage: '🗡️', accuracy: '🏹', defense: '🛡️', evade: '💨' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff', evade: '#d4b84a' };
        function StatBadges({ card }) {
            const dmg = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const def = Number(card.defense) || 0;
            const eva = Number(card.evade) || 0;
            const sr = card.success_rate;
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap' }}>
                    {dmg > 0 && (
                        <span style={{ color: STAT_COLORS.damage }}>{STAT_ICONS.damage}+{dmg}</span>
                    )}
                    {/* D-113: success_rate=100은 모든 공격/회피 카드의 기본값 — 정보 가치 없어 숨김.
                        run_away 등 100 미만 카드만 % 표시. */}
                    {(sr !== undefined && sr !== null && Number(sr) !== 100) && (
                        <span style={{ color: '#aaa' }}>{sr}%</span>
                    )}
                    {dmg > 0 && acc > 0 && (
                        <span style={{ color: STAT_COLORS.accuracy }}>{STAT_ICONS.accuracy}+{acc}</span>
                    )}
                    {def > 0 && (
                        <span style={{ color: STAT_COLORS.defense }}>{STAT_ICONS.defense}+{def}</span>
                    )}
                    {eva > 0 && (
                        <span style={{ color: STAT_COLORS.evade }}>{STAT_ICONS.evade}+{eva}</span>
                    )}
                </span>
            );
        }

        // D-58: 적 슬롯 최종 회피율 배지.
        //   - damage>0 카드 배치 + finalEvade < baseEvade → 초록 + bold.
        //   - 그 외(빈 슬롯 / damage=0 카드 / 감소 없음) → 기본색.
        // D-167 (2026-04-29 요한): 회피 메타포 일관 — 카드 StatBadges와 동일한 '💨+N' 표기.
        //   "회피 N" 텍스트 → 💨+N. 회피하기 카드(evade) 수치도 이 패턴이라 적/나 양쪽 메타포 통일.
        function EvadeBadge({ baseEvade, finalEvade, consumed }) {
            const reduced = finalEvade < baseEvade;
            return (
                <span
                    className={reduced ? 'evade-changed' : undefined}
                    style={{
                        color: reduced ? '#8bd17c' : '#d4b84a',
                        fontWeight: reduced ? 700 : 400,
                        opacity: consumed ? 0.5 : 1,
                        transition: 'color 0.2s, opacity 0.2s'
                    }}>
                    💨+{finalEvade}
                </span>
            );
        }

        // D-176 Phase A (2026-04-30 요한 지시): 포켓몬식 대결 구도 패널.
        //   상단 좌하에 내 캐릭터 뒷모습, 우상에 사냥감을 배치 — "마주 보는" 구도.
        //   - 사냥감 imageUrl 비어있으면 큰 이모지(72px) fallback.
        //   - 사냥감 위 HP 바(빨강) + 🗡️/🛡️/회피 배지.
        //   - 내 캐릭터 위 health(빨강) + hunger(주황) 바.
        //   - 잔여 행동(slotActions)을 사냥감 옆에 작은 dot으로 미리 노출 — 소비된 턴은 흐림.
        //   - 향후 Phase B에서 카드 사용 시 트랜지션(흔들림/밀기)을 이 컴포넌트에 추가.
        function BattleStage({
            preyName, preyEmoji, preyImageUrl, preyMeat,
            hpCurrent, hpMax, hpDisplayPct, preyAttack, preyDefense,
            slotActions, computedEvades, slotsConsumed,
            playerHealth, playerHunger, maxHealth, maxHunger,
            playerImageUrl,
            activeEvent,
            children,  // D-180: 슬롯 overlay 등 외부 주입 — HuntCombatModal에서 사냥감 슬롯/내 슬롯을 absolute로 띄움.
        }) {
            const healthPct = Math.max(0, Math.min(100, (playerHealth / Math.max(1, maxHealth)) * 100));
            const hungerPct = Math.max(0, Math.min(100, (playerHunger / Math.max(1, maxHunger)) * 100));
            const actionTypeIcon = { peek: '👁️', attack: '🗡️', defend: '🛡️', evade: '💨' };

            // D-176 Phase B: 액션 시네마틱.
            //   activeEvent: { id, slotIdx, playerAttack, preyEvaded, preyDamage, playerDamage } | null
            //   - id를 React key에 연결 → wrapper remount → CSS animation 재시작 (캐릭터 공격/피격, 사냥감 회피/피격).
            //   - 데미지 숫자 / MISS 텍스트는 useEffect로 floats 큐에 추가하고 0.7s 후 제거.
            //   - 회피=흔들림 / 피격=플래시 분리 (gameStyles.css 동일 정책).
            const floatCounterRef = React.useRef(0);
            const [floats, setFloats] = useState([]);
            useEffect(() => {
                if (!activeEvent) return;
                const newOnes = [];
                if (activeEvent.preyDamage > 0) newOnes.push({ id: ++floatCounterRef.current, side: 'prey', kind: 'damage', text: `-${activeEvent.preyDamage}` });
                if (activeEvent.playerDamage > 0) newOnes.push({ id: ++floatCounterRef.current, side: 'player', kind: 'damage', text: `-${activeEvent.playerDamage}` });
                if (activeEvent.preyEvaded) newOnes.push({ id: ++floatCounterRef.current, side: 'prey', kind: 'miss', text: 'MISS!' });
                if (newOnes.length === 0) return;
                setFloats(prev => [...prev, ...newOnes]);
                const expireIds = newOnes.map(f => f.id);
                const t = setTimeout(() => {
                    setFloats(prev => prev.filter(f => !expireIds.includes(f.id)));
                }, 750);
                return () => clearTimeout(t);
            }, [activeEvent && activeEvent.id]);

            const eventId = activeEvent && activeEvent.id;
            const playerAttackClass = activeEvent && activeEvent.playerAttack ? 'battle-anim-attack-push' : '';
            const playerHitClass = activeEvent && activeEvent.playerDamage > 0 ? 'battle-anim-player-hit' : '';
            const preyShakeClass = activeEvent && activeEvent.preyEvaded ? 'battle-anim-prey-shake' : '';
            const preyFlashClass = activeEvent && activeEvent.preyDamage > 0 ? 'battle-anim-prey-flash' : '';
            return (
                <div style={{
                    position: 'relative',
                    // D-183: 풀스크린 안에서 BattleStage가 화면 끝까지 시원하게.
                    //   100dvh - 헤더(28) - 손패 fixed 영역(110) - 패딩/여백(80) ≈ viewport - 220.
                    //   결과 배너/확정 버튼은 별도 팝업으로 분리되어 BattleStage 다음 stack 안 차지.
                    height: 'calc(100dvh - 200px)',
                    minHeight: '380px',
                    marginBottom: '14px',
                    background: 'linear-gradient(180deg, #1f2a3a 0%, #2a2a3e 60%, #3a2f2a 100%)',
                    borderRadius: '10px',
                    border: '1px solid #444',
                    overflow: 'hidden'
                }}>
                    {/* 좌상 — 사냥감 정보 박스 (D-180: 우상→좌상). */}
                    <div style={{
                        position: 'absolute', top: 8, left: 8, maxWidth: '52%',
                        background: 'rgba(0,0,0,0.6)', padding: '6px 10px',
                        borderRadius: '8px', boxSizing: 'border-box', zIndex: 2
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3, gap: 8 }}>
                            <span style={{ fontSize: 13, fontWeight: 600 }}>{preyName}</span>
                            <span style={{ fontSize: 11, color: '#ffd58a' }}>🥩×{preyMeat}</span>
                        </div>
                        <div style={{ height: 8, background: '#222', borderRadius: 4, overflow: 'hidden' }}>
                            <div style={{
                                width: `${hpDisplayPct}%`, height: '100%',
                                background: 'linear-gradient(90deg, #b24656 0%, #e2718a 100%)',
                                transition: 'width 0.3s ease'
                            }} />
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginTop: 3, fontSize: 10, color: '#ccc', flexWrap: 'wrap' }}>
                            <span>HP {hpCurrent}/{hpMax}</span>
                            {preyAttack > 0 && <span style={{ color: '#ff9999' }}>🗡️{preyAttack}</span>}
                            {preyDefense > 0 && <span style={{ color: '#9bd6ff' }}>🛡️{preyDefense}</span>}
                        </div>
                        {/* 잔여 행동 dot — 패턴 미리 노출(기획서 명시) */}
                        <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                            {(slotActions || []).map((a, i) => {
                                const t = (a && a.type) || 'peek';
                                const dim = !!(slotsConsumed && slotsConsumed[i]);
                                return (
                                    <div key={i} title={`T${i+1} ${a && a.name || '?'}`} style={{
                                        width: 22, height: 22, borderRadius: '50%',
                                        background: dim ? '#222' : '#3a3a5e',
                                        border: `1px solid ${dim ? '#333' : '#6a6aaa'}`,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        fontSize: 11, opacity: dim ? 0.4 : 1
                                    }}>
                                        {actionTypeIcon[t] || '?'}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* 우중 — 사냥감 비주얼 (정보 박스 아래에 큰 이미지/이모지)
                        Phase B: 회피=shake / 피격=flash. activeEvent.id를 key에 묶어 매 턴 마다 애니 재시작. */}
                    <div style={{
                        position: 'absolute', top: 14, right: 14,
                        width: 120, height: 120, marginTop: 0,
                        display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end',
                        filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))',
                        zIndex: 1, pointerEvents: 'none'
                    }}>
                        <div
                            key={`prey-anim-${eventId || 'idle'}`}
                            className={`${preyShakeClass} ${preyFlashClass}`.trim()}
                            style={{ width: '100%', height: '100%', position: 'relative',
                                     display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end' }}>
                            {preyImageUrl ? (
                                <img src={preyImageUrl} alt={preyName}
                                    style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                            ) : (
                                <span style={{ fontSize: 96, lineHeight: 1, marginTop: 24 }}>{preyEmoji}</span>
                            )}
                            {/* Phase B: 사냥감 위 floating 데미지/MISS */}
                            {floats.filter(f => f.side === 'prey').map(f => (
                                <span key={f.id} className={`battle-float-text kind-${f.kind}`}>{f.text}</span>
                            ))}
                        </div>
                    </div>

                    {/* 좌하 — 캐릭터 비주얼 (D-182: 110x140 → 130x170 사이즈 회복 + bottom 50으로 위치 — 사냥감 슬롯 영역(130~190)과 캐릭터(top 160~330) 안 겹침). */}
                    <div
                        key={`player-push-${eventId || 'idle'}`}
                        className={playerAttackClass}
                        style={{
                            position: 'absolute', bottom: 50, left: 6,
                            width: 130, height: 170,
                            zIndex: 1, pointerEvents: 'none'
                        }}>
                        <div
                            key={`player-hit-${eventId || 'idle'}`}
                            className={playerHitClass}
                            style={{
                                width: '100%', height: '100%', position: 'relative',
                                display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
                                filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))'
                            }}>
                            {playerImageUrl ? (
                                <img src={playerImageUrl} alt="나"
                                    style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                            ) : (
                                <span style={{ fontSize: 84, lineHeight: 1 }}>🧍</span>
                            )}
                            {floats.filter(f => f.side === 'player').map(f => (
                                <span key={f.id} className={`battle-float-text kind-${f.kind}`}>{f.text}</span>
                            ))}
                        </div>
                    </div>

                    {/* D-180/D-182: 캐릭터 아래 "나" 라벨. */}
                    <div style={{
                        position: 'absolute', bottom: 14, left: 6, width: 130,
                        textAlign: 'center', fontSize: 11, fontWeight: 600, color: '#ddd',
                        background: 'rgba(0,0,0,0.4)', borderRadius: 4, padding: '2px 0',
                        zIndex: 2
                    }}>나</div>

                    {/* D-180: 슬롯 overlay 등 외부 주입 영역 — HuntCombatModal에서 absolute로 사냥감/내 슬롯 띄움. */}
                    {children}
                </div>
            );
        }

        // D-178 (2026-04-30 요한 지시): 사냥 전투 카드 비주얼 — Figma 디자인(node 41:485) 정착.
        //   카드 본체 141:210 비율, 좌측 4 스탯 배지(att/acc/eva/def — 0이면 숨김),
        //   상단 카드 이름, 중앙 일러스트, 하단 효과 본문.
        //   일러스트 PNG는 CARD_ILLUSTRATIONS 매핑 — punch만 우선 공급, 나머지는 빈 자리.
        //   향후 카드별 PNG 추가는 매핑 객체에 한 줄씩 더하면 즉시 반영.
        const CARD_ILLUSTRATIONS = {
            punch: 'data/Assets/cards/punch.png',
        };
        const HUNT_CARD_ICONS = {
            att: 'data/Assets/cards/icons/att.png',
            acc: 'data/Assets/cards/icons/acc.png',
            eva: 'data/Assets/cards/icons/eva.png',
            def: 'data/Assets/cards/icons/def.png',
        };
        // 디자인 명세상 카드 하단 본문은 카드별 다른 효과 설명. 시트 컬럼 추가 전까지
        //   디자인에 명시된 punch만 하드코딩. 나머지는 빈 본문(추가 정보 영역으로 사용).
        const CARD_DESCRIPTIONS = {
            punch: '두 주먹 불끈쥐고 휘둘러\n1 대미지를 줍니다.',
        };
        // HuntCard — 디자인 카드 한 장 렌더.
        //   props:
        //     card        — combat_card 객체.
        //     exhausted   — 잔여 0 / 무기 부재 등 비활성. opacity 0.45 + click ignore.
        //     selected    — 슬롯 배치 상태(외곽 강조).
        //     onClick     — 클릭 핸들러.
        //     cornerBadge — 우상단 작은 배지(잔여 ×N 또는 ∞).
        //     extraInfo   — 본문 영역에 추가 표시할 정보(내구도/분실/방어구). ReactNode.
        function HuntCard({ card, exhausted, selected, onClick, cornerBadge, extraInfo }) {
            if (!card) return null;
            const illustUrl = CARD_ILLUSTRATIONS[card.id];
            const desc = CARD_DESCRIPTIONS[card.id];
            const att = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const eva = Number(card.evade) || 0;
            const def = Number(card.defense) || 0;
            const cls = ['hunt-card', exhausted ? 'is-exhausted' : '', selected ? 'is-selected' : '']
                .filter(Boolean).join(' ');
            return (
                <div className={cls} onClick={exhausted ? undefined : onClick}>
                    <div className="hunt-card-name">{card.name}</div>
                    <div className="hunt-card-illust">
                        {illustUrl ? (
                            <img src={illustUrl} alt={card.name} />
                        ) : (
                            <div className="hunt-card-illust-empty">(준비 중)</div>
                        )}
                    </div>
                    {/* D-179: 양수 스탯만 좌상단부터 차례로 스택. 빈 자리 없음. */}
                    {(att > 0 || acc > 0 || eva > 0 || def > 0) && (
                        <div className="hunt-card-stats">
                            {att > 0 && (
                                <div className="hunt-card-stat hunt-card-stat--att">
                                    <img src={HUNT_CARD_ICONS.att} alt="" />
                                    <span>{att}</span>
                                </div>
                            )}
                            {acc > 0 && (
                                <div className="hunt-card-stat hunt-card-stat--acc">
                                    <img src={HUNT_CARD_ICONS.acc} alt="" />
                                    <span>{acc}</span>
                                </div>
                            )}
                            {eva > 0 && (
                                <div className="hunt-card-stat hunt-card-stat--eva">
                                    <img src={HUNT_CARD_ICONS.eva} alt="" />
                                    <span>{eva}</span>
                                </div>
                            )}
                            {def > 0 && (
                                <div className="hunt-card-stat hunt-card-stat--def">
                                    <img src={HUNT_CARD_ICONS.def} alt="" />
                                    <span>{def}</span>
                                </div>
                            )}
                        </div>
                    )}
                    {cornerBadge && <div className="hunt-card-corner-badge">{cornerBadge}</div>}
                    <div className="hunt-card-body">
                        {desc && <div style={{ whiteSpace: 'pre-line' }}>{desc}</div>}
                        {extraInfo}
                    </div>
                </div>
            );
        }

        // D-176 Phase A (2026-04-30 요한 지시): 전투 모달을 포켓몬식 대결 구도로 개편.
        //   - playerHealth / playerHunger / maxHealth / maxHunger 추가 prop으로 받아 BattleStage에 표시.
        //   - 사냥감은 emoji 또는 imageUrl(prey.imageUrl, 향후 시트 컬럼) 분기.
        //   - playerImageUrl 기본값: data/Assets/character/Player.png (뒷모습 스케치).
        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel,
                                   playerHealth, playerHunger, maxHealth, maxHunger,
                                   playerImageUrl }) {
            // D-75: Level 2 prey는 4턴. Level 1은 기존 3턴.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // 표시된 턴 로그
            const [result, setResult] = useState(null);
            // D-176 Phase B: 액션 시네마틱 — BattleStage에 전달되는 현재 턴 이벤트.
            //   { id, slotIdx, playerAttack, preyEvaded, preyDamage, playerDamage } | null
            //   id가 바뀔 때마다 BattleStage가 wrapper key를 갱신해 CSS 애니 재시작.
            const [activeEvent, setActiveEvent] = useState(null);
            // D-179: 무덤(비활성 카드) 모달 — 자원 부족·무기 부재로 못 쓰는 카드 보기.
            const [discardOpen, setDiscardOpen] = useState(false);
            // D-183: 손패 카드 hover preview — uid를 저장. 가운데 큰 카드 노출 + 원본 자리 darkened.
            const [hoveredCardUid, setHoveredCardUid] = useState(null);

            // D-58/D-60/D-96: 슬롯별 최종 회피 계산 (턴별 base 반영).
            //   SSOT: combatDeck.js::resolveHunt 공식과 동일.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount)
            //     finalEvade = baseEvadeT (명중 vs 회피는 결정론 비교 — UI에선 base 표시).
            //   damage=0 카드 / 빈 슬롯 → base(턴별) 그대로.
            //   card.accuracy(명중)는 buildHuntDeck 이 이미 카드+무기 합산(D-50).
            // D-75/D-98/D-108: actions_per_turn CSV 파싱 → 턴별 actionDef 배열.
            //   SSOT는 combatDeck.js::parsePreyActions + findPreyAction.
            //   slotActions[i] = { id, name, type, damage, accuracy, defense } — UI 배지에 직접 사용.
            const slotActions = React.useMemo(() => {
                const ids = CombatDeck.parsePreyActions(prey, SLOT_COUNT);
                return ids.map(id => CombatDeck.findPreyAction(id));
            }, [prey.actions_per_turn, prey.level, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    // D-96: % → 정수. 도주 누적 패널티는 1당 회피 -1.
                    const base = Math.max(0, (byTurn[i] ?? 1) - fleeCount);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    // D-96: 결정론 — 명중 ≥ 회피 → 무조건 명중(final=0). 회피 > 명중 → 무효(final=base).
                    const acc = Number(card.accuracy) || 0;
                    const final = (acc >= base) ? 0 : base;
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));
            // 전투 시작 시 hpCurrent = prey.hp. 이후 표시용으로만 사용.
            const [hpCurrent, setHpCurrent] = useState(prey.hp);

            const allFilled = slots.every(s => s !== null);

            // D-64 (2026-04-24): 슬롯 배치 실시간 재고 반영.
            //   buildHuntDeck의 slotLimit은 전투 시작 시점 1회 계산이라 배치로 차감 안 됨.
            //   requirement 이름 기반 capacity를 실시간으로 계산해 손패 비활성·슬롯 내구도 표시.
            //   무기(category='무기')는 durabilityLeft 합이 capacity, 일반 재료는 인스턴스 수.
            const reqCapacityByName = React.useMemo(() => {
                const cap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    const name = def.name || it.name;
                    if (!name) continue;
                    const isWeapon = def.category === '무기';
                    const contribute = isWeapon
                        ? (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0)
                        : 1;
                    cap[name] = (cap[name] || 0) + contribute;
                }
                return cap;
            }, [inventory]);

            // 슬롯에 이미 배치된 카드의 requirements만큼 차감한 잔량.
            const remainingByReq = React.useMemo(() => {
                const rem = { ...reqCapacityByName };
                for (const c of slots) {
                    if (!c || !Array.isArray(c.requirements)) continue;
                    for (const r of c.requirements) {
                        rem[r] = (rem[r] || 0) - 1;
                    }
                }
                return rem;
            }, [slots, reqCapacityByName]);

            const canPlaceCard = (card) => {
                if (!Array.isArray(card.requirements) || card.requirements.length === 0) return true;
                for (const r of card.requirements) {
                    if ((remainingByReq[r] || 0) <= 0) return false;
                }
                return true;
            };

            // 슬롯별 무기 내구도 계산 (weaponId별 순차 차감).
            //   before: 이 슬롯 사용 직전 내구, after: 사용 직후 내구.
            //   무기 아닌 카드(돌 던지기 등)와 빈 슬롯은 null.
            const slotWeaponDur = React.useMemo(() => {
                const weaponCap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    if (def.category !== '무기') continue;
                    weaponCap[it.type] = (weaponCap[it.type] || 0)
                        + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0);
                }
                const remain = { ...weaponCap };
                return slots.map(card => {
                    if (!card || !card.weaponId) return null;
                    const before = remain[card.weaponId] || 0;
                    const loss = (card.full_loss === 'Y' || card.fullLoss === true) ? before : 1;
                    const after = Math.max(0, before - loss);
                    remain[card.weaponId] = after;
                    return { before, after };
                });
            }, [slots, inventory]);

            // D-153: 방어구 내구도. 카드 cardDefense > 0이면 모든 잔여 방어구 1씩 차감.
            //   armorInstancesInitial: 사냥 시작 시 인벤 보유 방어구 인스턴스별 잔여/이름.
            //   slotArmorBefore[i]: i번째 슬롯 사용 직전 인스턴스별 잔여 배열.
            const armorInstancesInitial = React.useMemo(() => {
                const items = (inventory && inventory.items) || [];
                return items
                    .map(it => {
                        const d = InventorySystem.resolveDef(it.type) || {};
                        if (d.category !== 'shield' && d.category !== 'armor') return null;
                        const max = Number(d.durability) || 0;
                        const left = (typeof it.durabilityLeft === 'number')
                            ? it.durabilityLeft : max;
                        if (max <= 0) return null;
                        return { id: it.id, name: d.name || it.type, max, left };
                    })
                    .filter(Boolean);
            }, [inventory]);

            const slotArmorBefore = React.useMemo(() => {
                const states = [];
                let cur = armorInstancesInitial.map(a => ({ ...a }));
                for (const card of slots) {
                    states.push(cur.map(a => ({ ...a }))); // before = 사용 직전
                    const def = Number(card && card.defense) || 0;
                    if (def > 0) {
                        cur = cur.map(a => ({ ...a, left: Math.max(0, a.left - 1) }));
                    }
                }
                return states;
            }, [slots, armorInstancesInitial]);

            // D-46/D-47: 카드 재사용 규칙.
            //   - infinite 카드(주먹/회피/도망): 손패 1장, 슬롯 무제한 배치.
            //   - slotLimit 카드(돌 던지기/창 등): 손패 1장, 슬롯 배치는 가방 내 아이템 개수만큼.
            //   - D-64: 실시간 재고 체크로 통합 — canPlaceCard로 판정.
            const handleHandClick = (card) => {
                if (phase !== 'select') return;
                const emptyIdx = slots.findIndex(s => s === null);
                if (emptyIdx < 0) return;
                if (!canPlaceCard(card)) return;
                const isReusable = !!(card.infinite || card.slotLimit);
                const newSlots = [...slots];
                newSlots[emptyIdx] = isReusable
                    ? { ...card, uid: `${card.uid}:slot:${emptyIdx}:${Date.now()}` }
                    : card;
                setSlots(newSlots);
                if (!isReusable) {
                    setHand(hand.filter(c => c.uid !== card.uid));
                }
            };

            const handleSlotClick = (slotIdx) => {
                if (phase !== 'select') return;
                const card = slots[slotIdx];
                if (!card) return;
                const newSlots = [...slots];
                newSlots[slotIdx] = null;
                setSlots(newSlots);
                const isReusable = !!(card.infinite || card.slotLimit);
                if (!isReusable) {
                    setHand([...hand, card]);
                }
            };

            const handleConfirm = () => {
                if (!allFilled || phase !== 'select') return;
                // D-51: weaponState 구성 — 슬롯에 배치된 무기 요구 카드의 owning weapon
                //   인스턴스 1자루(가장 내구 높은 순)의 durabilityLeft를 추적.
                //   동일 weaponId에 대해 여러 자루를 동시 추적하진 않음(현재 1자루 전제).
                const weaponState = {};
                const seenWeaponIds = new Set();
                for (const c of slots) {
                    if (!c || !c.weaponId || seenWeaponIds.has(c.weaponId)) continue;
                    seenWeaponIds.add(c.weaponId);
                    // inventory에서 해당 type의 아이템 중 durabilityLeft 최댓값 사용.
                    const items = (inventory && inventory.items) || [];
                    const instances = items.filter(it => it.type === c.weaponId);
                    const total = instances.reduce((s, it) =>
                        s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                    weaponState[c.weaponId] = { durabilityLeft: total };
                }
                // D-150: armorState — 인벤 모든 방어구(shield/armor) 인스턴스별 잔여 durability.
                //   item.id를 키로 인스턴스 단위 추적(동일 type 여러 개 보유 가능).
                const armorState = {};
                {
                    const items = (inventory && inventory.items) || [];
                    for (const it of items) {
                        const def = InventorySystem.resolveDef(it.type) || {};
                        const cat = def.category;
                        if (cat !== 'shield' && cat !== 'armor') continue;
                        const dur = (typeof it.durabilityLeft === 'number')
                            ? it.durabilityLeft
                            : (typeof def.durability === 'number' ? def.durability : 0);
                        if (dur <= 0) continue;
                        armorState[it.id] = { durabilityLeft: dur };
                    }
                }
                const res = CombatDeck.resolveHunt(prey, slots, { weaponState, armorState });
                setResult(res);
                setPhase('resolve');

                // D-176 Phase B: 턴 로그 600ms 간격 순차 표시 + BattleStage activeEvent 트리거.
                //   - 500→600ms: 데미지 숫자/MISS 0.7s 페이드와 다음 턴 진입 사이 여유.
                //   - 카드 damage>0 + hit이면 playerAttack=true (사냥감 회피해도 공격 모션은 발동 — 헛스윙 자연).
                //   - preyEvaded / preyDamage / playerDamage 그대로 전달.
                res.turns.forEach((turn, idx) => {
                    setTimeout(() => {
                        setLogs(prev => [...prev, turn]);
                        if (typeof turn.preyHpAfter === 'number') setHpCurrent(turn.preyHpAfter);
                        const card = turn.userCard;
                        const cardDamage = Number(card && card.damage) || 0;
                        setActiveEvent({
                            id: idx + 1,
                            slotIdx: idx,
                            playerAttack: !!(turn.hit && cardDamage > 0),
                            preyEvaded: !!turn.preyEvaded,
                            preyDamage: Number(turn.damage) || 0,
                            playerDamage: Number(turn.playerDamage) || 0,
                        });
                    }, 600 * (idx + 1));
                });
                // 마지막 로그 후 결과 페이즈 전환. onResolve는 '결과 확인' 버튼에서 호출.
                setTimeout(() => {
                    setPhase('done');
                    setActiveEvent(null);
                }, 600 * (res.turns.length + 1));
            };

            // D-48: '결과 확인' 버튼 — 유저가 결과를 읽고 수동으로 닫을 때 onResolve 호출.
            const handleCloseResult = () => {
                if (phase !== 'done' || !result) return;
                onResolve(result);
            };

            const hpDisplayPct = Math.max(0, Math.min(100, (hpCurrent / prey.hp) * 100));
            const preyName = prey.name || prey.preyType;

            // D-48: 결과 메시지 — 한글 조사(을/를, 이/가) 받침 유무로 자동 선택.
            const hasBatchim = (word) => {
                if (!word) return false;
                const code = word.charCodeAt(word.length - 1);
                if (code < 0xAC00 || code > 0xD7A3) return false;
                return (code - 0xAC00) % 28 !== 0;
            };
            const particleEul = hasBatchim(preyName) ? '을' : '를';
            const particleI = hasBatchim(preyName) ? '이' : '가';
            const resultMessage = result ? (
                result.outcome === 'victory' ? `${preyName}${particleEul} 잡았다!`
                : result.outcome === 'prey_fled' ? `${preyName}${particleI} 도망치고 말았다...!`
                : result.outcome === 'player_fled' ? '사냥을 포기하고 물러섰다.'
                : ''
            ) : '';
            const resultTone = result && result.outcome === 'victory' ? 'victory' : 'fail';

            return (
                // D-181 (요한 지시): 모달 → 풀스크린 화면 전환. 게임 화면을 완전히 대체.
                //   .modal 기본 align center/justify center → stretch + padding 0.
                //   자식이 100vw × 100vh 차지, 어두운 게임 배경 색 그대로.
                <div className="modal" style={{ zIndex: 1500, alignItems: 'stretch', justifyContent: 'stretch', padding: 0 }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '12px 12px 110px',  // 하단 패딩 — 손패 부채꼴 fixed 영역 확보(카드 절반 viewport 밖이라 ~110).
                        borderRadius: 0,
                        width: '100%',
                        height: '100%',
                        maxWidth: 'none',
                        maxHeight: 'none',
                        overflowY: 'auto',
                        boxSizing: 'border-box'
                    }}>
                        {/* D-180: 내 스탯 한 줄 — BattleStage 외부 헤더(시안엔 단순 "나" 라벨만 있어 BattleStage 안 통합 X). */}
                        <div style={{
                            display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 12,
                            padding: '4px 8px', marginBottom: 8,
                            fontSize: 11, color: '#ccc',
                            background: 'rgba(0,0,0,0.25)', borderRadius: 6
                        }}>
                            <span style={{ color: '#888' }}>나</span>
                            <span><span style={{ color: '#ff7a8a' }}>❤️</span> {playerHealth}/{maxHealth}</span>
                            <span><span style={{ color: '#f5c46d' }}>🍖</span> {playerHunger}/{maxHunger}</span>
                        </div>

                        {/* D-180 (요한 시안): BattleStage 안에 사냥감 슬롯/내 슬롯 통합.
                            - 사냥감 슬롯: 사냥감 정보·비주얼 아래(중앙 영역) 가로 4칸.
                            - 내 슬롯: 캐릭터(좌하) 우측 옆 가로 4칸.
                            - 슬롯 카드 상세 정보(내구·방어구·분실)는 시각 단순화 위해 슬롯 안에선 단축, 손패에서 확인. */}
                        <BattleStage
                            preyName={preyName}
                            preyEmoji={PREY_EMOJI[prey.preyType] || '🐾'}
                            preyImageUrl={prey.imageUrl || null}
                            preyMeat={prey.meat}
                            hpCurrent={hpCurrent}
                            hpMax={prey.hp}
                            hpDisplayPct={hpDisplayPct}
                            preyAttack={Number(prey.attack) || 0}
                            preyDefense={Number(prey.defense) || 0}
                            slotActions={slotActions}
                            computedEvades={computedEvades}
                            slotsConsumed={slots.map((_, i) => !!logs.find(l => l.turn === i + 1))}
                            playerHealth={playerHealth}
                            playerHunger={playerHunger}
                            maxHealth={maxHealth}
                            maxHunger={maxHunger}
                            playerImageUrl={playerImageUrl}
                            activeEvent={activeEvent}
                        >
                            {/* 사냥감 슬롯 — D-183: 단순 박스 → HuntCard 비주얼.
                                actionDef를 card-like 객체로 변환해 HuntCard에 그대로 넘김.
                                일러스트는 미공급 → "(준비 중)" 빈 자리. 좌상단 스탯은 행동 타입별 양수만. */}
                            <div style={{
                                position: 'absolute', top: 130, left: 8, right: 8,
                                display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: 6,
                                zIndex: 2
                            }}>
                                {Array.from({ length: SLOT_COUNT }, (_, i) => {
                                    const ev = computedEvades[i] || { base: 0, final: 0 };
                                    const consumed = !!logs.find(l => l.turn === i + 1);
                                    const actionDef = slotActions[i] || { name: '?', type: 'peek', damage: 0, accuracy: 0, defense: 0 };
                                    const type = actionDef.type;
                                    const preyAtkFallback = Number(prey.attack) || 0;
                                    const preyDefFallback = Number(prey.defense) || 0;
                                    const dmg = (actionDef.damage > 0) ? actionDef.damage : preyAtkFallback;
                                    const def = (actionDef.defense > 0) ? actionDef.defense : preyDefFallback;
                                    const acc = Number(actionDef.accuracy) || 0;
                                    // HuntCard에 넘길 card-like 객체 — id는 type 기반 미니어처 식별용.
                                    const preyCard = {
                                        id: `prey_${type}`,
                                        name: actionDef.name || (type === 'peek' ? '눈치보기' : type),
                                        damage: type === 'attack' ? dmg : 0,
                                        accuracy: type === 'attack' ? acc : 0,
                                        evade: type === 'evade' ? ev.base : 0,
                                        defense: type === 'defend' ? def : 0,
                                    };
                                    return (
                                        <div key={i} style={{ opacity: consumed ? 0.4 : 1 }}>
                                            <HuntCard card={preyCard} cornerBadge={`T${i+1}`} />
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 내 슬롯 — 캐릭터(좌하 130x170, bottom 50~220) 우측 옆 가로.
                                D-182: bottom 32→100 (캐릭터 가운데 라인 정렬), left 124→144 (캐릭터 우측 끝 + 8 여유). */}
                            <div style={{
                                position: 'absolute', bottom: 100, left: 144, right: 8,
                                display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: 4,
                                zIndex: 2
                            }}>
                                {Array.from({ length: SLOT_COUNT }, (_, i) => {
                                    const card = slots[i];
                                    if (!card) {
                                        return (
                                            <div key={i}
                                                onClick={() => phase === 'select' && handleSlotClick(i)}
                                                style={{
                                                    aspectRatio: '1 / 1.2',
                                                    background: 'rgba(22, 33, 62, 0.6)',
                                                    border: '1px dashed #555',
                                                    borderRadius: 6,
                                                    color: '#666',
                                                    fontSize: 14,
                                                    fontWeight: 700,
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    cursor: phase === 'select' ? 'default' : 'default'
                                                }}>
                                                {i + 1}
                                            </div>
                                        );
                                    }
                                    const att = Number(card.damage) || 0;
                                    return (
                                        <div key={i}
                                            onClick={phase === 'select' ? () => handleSlotClick(i) : undefined}
                                            style={{
                                                aspectRatio: '1 / 1.2',
                                                background: '#3a3a5e',
                                                border: '1px solid #6a6aaa',
                                                borderRadius: 6,
                                                padding: '3px 2px',
                                                fontSize: 9,
                                                textAlign: 'center',
                                                color: '#eee',
                                                cursor: phase === 'select' ? 'pointer' : 'default',
                                                display: 'flex',
                                                flexDirection: 'column',
                                                justifyContent: 'space-between',
                                                lineHeight: 1.1
                                            }}>
                                            <div style={{ fontSize: 10, fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                {card.name}
                                            </div>
                                            <div style={{ fontSize: 9, color: '#aaa' }}>
                                                {att > 0 && <span style={{ color: '#ff9999' }}>⚔{att}</span>}
                                                {Number(card.defense) > 0 && <span style={{ color: '#9bd6ff', marginLeft: 2 }}>🛡{card.defense}</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </BattleStage>

                        {/* D-183: 결과 배너 → 별도 팝업(z-index 1800)으로 분리. BattleStage 시원하게 늘릴 자리 확보. */}
                        {phase === 'done' && resultMessage && (
                            <div className="modal" style={{ zIndex: 1800 }}>
                                <div style={{
                                    background: '#1a1a2e',
                                    color: '#eee',
                                    padding: '24px 22px',
                                    borderRadius: '10px',
                                    border: `2px solid ${resultTone === 'victory' ? '#4CAF50' : '#b24656'}`,
                                    maxWidth: '360px',
                                    width: '90vw',
                                    textAlign: 'center'
                                }}>
                                    <div style={{
                                        fontSize: '18px',
                                        fontWeight: 700,
                                        marginBottom: '14px',
                                        color: resultTone === 'victory' ? '#a5d18f' : '#ff9999'
                                    }}>
                                        {resultMessage}
                                    </div>
                                    <button
                                        onClick={handleCloseResult}
                                        style={{
                                            width: '100%',
                                            padding: '10px',
                                            background: resultTone === 'victory' ? '#4CAF50' : '#b24656',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '6px',
                                            fontSize: '14px',
                                            fontWeight: 700,
                                            cursor: 'pointer'
                                        }}>
                                        결과 확인
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* D-48/D-183: 확정 버튼 — phase 'select'에서만 노출. 결과 확인은 별도 팝업 안. */}
                        {(phase === 'select' || phase === 'resolve') && (
                            <button
                                disabled={(phase === 'select' && !allFilled) || phase === 'resolve'}
                                onClick={() => phase === 'select' && handleConfirm()}
                                style={{
                                    width: '100%',
                                    padding: '10px',
                                    marginBottom: '10px',
                                    background: (phase === 'select' && allFilled) ? '#4CAF50' : '#444',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '6px',
                                    fontSize: '14px',
                                    fontWeight: '600',
                                    cursor: (phase === 'select' && allFilled) ? 'pointer' : 'not-allowed'
                                }}>
                                {phase === 'select' ? '확정' : '전투 중...'}
                            </button>
                        )}

                        {/* D-91 (2026-04-25 요한 지시): 턴 로그 직관적 재설계.
                            한 줄 요약 → 2줄(내 행동 / 적 행동) 카드 형식.
                            결과별 색상 분기로 명중/회피/방어/피해를 한눈에 식별. */}
                        {logs.length > 0 && (
                            <div style={{
                                background: '#0f0f1a',
                                padding: '8px',
                                borderRadius: '6px',
                                marginBottom: '10px',
                                fontSize: '11px',
                                maxHeight: '180px',
                                overflowY: 'auto'
                            }}>
                                {logs.map((log, i) => {
                                    const card = log.userCard;
                                    const preyEmoji = PREY_EMOJI[prey.preyType] || '🐾';

                                    // 내 라인 — 색상 + 텍스트 결정
                                    let playerColor = '#ddd';
                                    let playerText;
                                    if (log.outcome === 'flee_signal') {
                                        playerColor = '#aaa';
                                        playerText = '— (사냥감이 먼저 도망)';
                                    } else if (log.outcome === 'player_flee') {
                                        playerColor = '#d4b84a';
                                        playerText = `${card ? card.name + ' → ' : ''}도망 성공 ✓`;
                                    } else if (!card) {
                                        playerColor = '#666';
                                        playerText = '— (빈 슬롯)';
                                    } else if (log.autoFail) {
                                        playerColor = '#ff9999';
                                        playerText = `${card.name} → ${log.reason === 'weapon_missing' ? '무기 부재로 무산' : '행동 무산'}`;
                                    } else if (Number(card.damage) > 0) {
                                        // 공격 카드
                                        if (!log.hit) {
                                            playerColor = '#aaa';
                                            playerText = `${card.name} → 빗나감 ✗`;
                                        } else if (log.preyEvaded) {
                                            playerColor = '#d4b84a';
                                            const evNote = (typeof log.effectiveEvade === 'number') ? ` (💨+${log.effectiveEvade})` : '';
                                            playerText = `${card.name} → 회피당함 〰️${evNote}`;
                                        } else if (Number(log.preyDefended) > 0) {
                                            playerColor = '#9bd6ff';
                                            playerText = `${card.name} → 명중하지만 -${log.damage} (방어 감쇄 ${log.preyDefended})`;
                                        } else {
                                            playerColor = '#3dd68c';
                                            playerText = `${card.name} → 명중! -${log.damage} HP`;
                                        }
                                    } else if (card.id === 'run_away') {
                                        playerColor = '#aaa';
                                        playerText = `${card.name} → 도망 시도 실패`;
                                    } else if (Number(card.defense) > 0) {
                                        playerColor = '#9bd6ff';
                                        playerText = `${card.name} → 방어 자세 🛡️ +${card.defense}`;
                                    } else {
                                        playerColor = '#ddd';
                                        playerText = `${card.name}`;
                                    }

                                    // 적 라인
                                    let preyColor = '#aaa';
                                    let preyText;
                                    const playerDmg = Number(log.playerDamage) || 0;
                                    if (log.outcome === 'flee_signal' || log.outcome === 'player_flee') {
                                        preyText = '—';
                                    } else if (log.preyActionType === 'attack') {
                                        // D-108: 행동명은 actionDef.name (예: '어금니 돌진') 사용.
                                        const actName = log.preyAction || '공격';
                                        if (playerDmg > 0) {
                                            preyColor = '#ff6666';
                                            preyText = `${actName} 💥 → 내 HP -${playerDmg}`;
                                        } else if (Number(card && card.defense) > 0) {
                                            preyColor = '#9bd6ff';
                                            preyText = `${actName} → 막아냄 (방어 ${card.defense}로 감쇄)`;
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = `${actName} → 빗나감`;
                                        }
                                    } else if (log.preyActionType === 'defend') {
                                        const actName = log.preyAction || '방어';
                                        if (Number(log.preyDefended) > 0) {
                                            preyColor = '#9bd6ff';
                                            preyText = `${actName} 🛡️ (감쇄 ${log.preyDefended})`;
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = `${actName} 🛡️`;
                                        }
                                    } else if (log.preyActionType === 'evade') {
                                        if (log.hit && log.preyEvaded) {
                                            preyColor = '#d4b84a';
                                            preyText = '회피 성공 〰️';
                                        } else if (log.hit && !log.preyEvaded && Number(card && card.damage) > 0) {
                                            preyColor = '#3dd68c';
                                            preyText = '회피 실패';
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = '회피 자세';
                                        }
                                    } else if (log.preyActionType === 'peek') {
                                        preyColor = '#aaa';
                                        preyText = '눈치 보기 👁️ (회피 못 함)';
                                    } else {
                                        preyText = log.preyAction || '—';
                                    }

                                    return (
                                        <div key={i} style={{
                                            marginBottom: '8px',
                                            paddingLeft: '8px',
                                            borderLeft: `3px solid ${playerColor}`,
                                            lineHeight: 1.45
                                        }}>
                                            <div style={{ color: playerColor, fontWeight: 600 }}>
                                                <span style={{ color: '#888', fontWeight: 400, marginRight: '4px' }}>T{log.turn}</span>
                                                👤 {playerText}
                                            </div>
                                            <div style={{ color: preyColor, fontSize: '10.5px' }}>
                                                <span style={{ marginRight: '4px' }}>{preyEmoji}</span>
                                                {preyText}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* 내 손패 — D-179: 부채꼴 스택 + 비활성 카드는 무덤으로 분리.
                            카드 메타 계산은 활성/비활성 공통이라 한 번에 묶어 처리한 뒤 분류. */}
                        {phase === 'select' && (() => {
                            const cardMeta = hand.map(card => {
                                const exhausted = !canPlaceCard(card);
                                let durBadge = null;
                                if (card.weaponId) {
                                    const items = (inventory && inventory.items) || [];
                                    const instances = items.filter(it => it.type === card.weaponId);
                                    const durMaxInitial = instances.reduce((s, it) =>
                                        s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                                    const usedInSlots = slots.filter(s => s && s.weaponId === card.weaponId).length;
                                    const durLeft = Math.max(0, durMaxInitial - usedInSlots);
                                    if (durMaxInitial > 0) durBadge = `내구 ${durLeft}/${durMaxInitial}`;
                                }
                                const reqRemaining = (Array.isArray(card.requirements) && card.requirements.length > 0)
                                    ? Math.max(0, Math.min(...card.requirements.map(r => remainingByReq[r] ?? 0)))
                                    : null;
                                const cornerBadge = card.infinite
                                    ? '∞'
                                    : (card.slotLimit && reqRemaining !== null ? `×${reqRemaining}` : null);
                                const fl = String(card.full_loss || '').toUpperCase() === 'Y';
                                const lc = Number(card.loss_chance) || 0;
                                const extraInfo = (
                                    <>
                                        {durBadge && <div style={{ color: '#d4b84a', fontSize: '9px' }}>{durBadge}</div>}
                                        {Number(card.defense) > 0 && armorInstancesInitial.length > 0 && (
                                            <div style={{ color: '#88aaff', fontSize: '9px' }}>
                                                {armorInstancesInitial.map(a => (
                                                    <div key={a.id}>🛡️ {a.name} {a.left}/{a.max}</div>
                                                ))}
                                            </div>
                                        )}
                                        {fl && <div style={{ color: '#ff9999', fontSize: '9px' }}>⚠ 100% 분실</div>}
                                        {!fl && lc > 0 && <div style={{ color: '#ff9999', fontSize: '9px' }}>⚠ {lc}% 분실</div>}
                                    </>
                                );
                                return { card, exhausted, cornerBadge, extraInfo };
                            });
                            const active = cardMeta.filter(m => !m.exhausted);
                            const discarded = cardMeta.filter(m => m.exhausted);
                            // D-180: 부채꼴 각도 완화 — 카드 기울기가 너무 심해 가독성/이쁨 저하.
                            //   step 8→4° (절반), x 간격은 살짝 늘려 옆으로 더 펴짐(겹침 감소).
                            //   yOffset도 약하게(parabolic 계수 6→3).
                            const N = active.length;
                            const step = N > 1 ? Math.min(4, 18 / N) : 0;
                            const xStep = N > 1 ? Math.min(32, 240 / Math.max(1, N - 1)) : 0;
                            // D-181: 손패 viewport 하단 fixed wrapper — 카드 절반 viewport 밖.
                            //   "내 손패" 라벨 제거(레퍼 이미지 단순함). 빈 상태도 fixed 영역에 안내.
                            return (
                                <div className="hunt-hand-fixed-bottom">
                                    {active.length === 0 && discarded.length === 0 ? (
                                        <div style={{ color: '#666', fontSize: '11px', padding: '20px', background: 'rgba(0,0,0,0.5)', borderRadius: 8 }}>
                                            사용할 수 있는 전투 카드가 없다.
                                        </div>
                                    ) : (
                                        <>
                                            {/* D-182: 부채꼴 가운데 정렬 — 무덤은 우측 absolute로 분리해 부채꼴 무게에 영향 X. */}
                                            <div className="hunt-hand-fan" style={{ width: '100%', maxWidth: 360 }}>
                                                {active.map((m, i) => {
                                                    const off = i - (N - 1) / 2;
                                                    const rot = off * step;
                                                    const xPx = off * xStep;
                                                    const yPx = Math.pow(Math.abs(off), 1.2) * 3;
                                                    const isHovered = hoveredCardUid === m.card.uid;
                                                    return (
                                                        <div
                                                            key={m.card.uid}
                                                            className="hunt-card-fan-slot"
                                                            style={{
                                                                transform: `translate(${xPx}px, ${yPx}px) rotate(${rot}deg)`,
                                                                zIndex: N - Math.abs(off),
                                                                opacity: isHovered ? 0.25 : 1,
                                                                transition: 'opacity 0.15s',
                                                            }}
                                                            onMouseEnter={() => setHoveredCardUid(m.card.uid)}
                                                            onMouseLeave={() => setHoveredCardUid(null)}>
                                                            <div className="hunt-card-fan-inner">
                                                                <HuntCard
                                                                    card={m.card}
                                                                    onClick={() => handleHandClick(m.card)}
                                                                    cornerBadge={m.cornerBadge}
                                                                    extraInfo={m.extraInfo}
                                                                />
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                            {/* 무덤 — 우측 하단 작은 원형 버튼. 부채꼴과 분리. */}
                                            <div
                                                className={`hunt-discard-pile ${discarded.length === 0 ? 'is-empty' : ''}`}
                                                onClick={() => discarded.length > 0 && setDiscardOpen(true)}
                                                title="비활성 카드"
                                                style={{ position: 'absolute', right: 12, bottom: 12 }}>
                                                <div className="hunt-discard-pile-icon">🪦</div>
                                                {discarded.length > 0 && (
                                                    <div className="hunt-discard-pile-count">{discarded.length}</div>
                                                )}
                                            </div>
                                        </>
                                    )}
                                </div>
                            );
                        })()}

                        {/* D-183: hover 카드 큰 preview — 화면 가운데 떠있는 큰 카드. 손패의 원본은 어두워짐.
                            pointer-events: none — preview 자체는 마우스 이벤트 받지 않아 손패 hover 유지. */}
                        {hoveredCardUid && (() => {
                            const hoveredItem = phase === 'select' && hand
                                ? hand.find(c => c.uid === hoveredCardUid)
                                : null;
                            if (!hoveredItem) return null;
                            return (
                                <div style={{
                                    position: 'fixed',
                                    top: '50%', left: '50%',
                                    transform: 'translate(-50%, -50%)',
                                    width: 'min(72vw, 280px)',
                                    zIndex: 1600,
                                    pointerEvents: 'none',
                                    filter: 'drop-shadow(0 12px 32px rgba(0,0,0,0.7))',
                                }}>
                                    <div className="hunt-card-preview-large">
                                        <HuntCard card={hoveredItem} />
                                    </div>
                                </div>
                            );
                        })()}

                        {/* D-179: 무덤 모달 — 비활성 카드 그리드 노출. 클릭 동작 없음(읽기 전용). */}
                        {discardOpen && (
                            <div className="modal" style={{ zIndex: 1700 }} onClick={() => setDiscardOpen(false)}>
                                <div onClick={e => e.stopPropagation()} style={{
                                    background: '#1a1a2e',
                                    color: '#eee',
                                    padding: '20px',
                                    borderRadius: '12px',
                                    width: '90%',
                                    maxWidth: '420px',
                                    maxHeight: '80vh',
                                    overflowY: 'auto'
                                }}>
                                    <div style={{ fontSize: '14px', fontWeight: 700, marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        🪦 비활성 카드
                                        <span style={{ marginLeft: 'auto', color: '#888', fontSize: '11px', fontWeight: 400 }}>
                                            자원·무기 부재로 사용 불가
                                        </span>
                                    </div>
                                    {(() => {
                                        const discarded = hand
                                            .map(card => ({ card, exhausted: !canPlaceCard(card) }))
                                            .filter(m => m.exhausted);
                                        if (discarded.length === 0) {
                                            return <div style={{ color: '#666', fontSize: '12px', padding: '10px' }}>비활성 카드가 없다.</div>;
                                        }
                                        return (
                                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px' }}>
                                                {discarded.map(m => (
                                                    <HuntCard
                                                        key={m.card.uid}
