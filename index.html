                                        playerColor = '#ddd';
                                        playerText = `${card.name}`;
                                    }

                                    // 적 라인
                                    let preyColor = '#aaa';
                                    let preyText;
                                    const playerDmg = Number(log.playerDamage) || 0;
                                    if (log.outcome === 'flee_signal' || log.outcome === 'player_flee') {
                                        preyText = '—';
                                    } else if (log.preyActionType === 'attack') {
                                        // D-108: 행동명은 actionDef.name (예: '어금니 돌진') 사용.
                                        const actName = log.preyAction || '공격';
                                        if (playerDmg > 0) {
                                            preyColor = '#ff6666';
                                            preyText = `${actName} 💥 → 내 HP -${playerDmg}`;
                                        } else if (Number(card && card.defense) > 0) {
                                            preyColor = '#9bd6ff';
                                            preyText = `${actName} → 막아냄 (방어 ${card.defense}로 감쇄)`;
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = `${actName} → 빗나감`;
                                        }
                                    } else if (log.preyActionType === 'defend') {
                                        const actName = log.preyAction || '방어';
                                        if (Number(log.preyDefended) > 0) {
                                            preyColor = '#9bd6ff';
                                            preyText = `${actName} 🛡️ (감쇄 ${log.preyDefended})`;
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = `${actName} 🛡️`;
                                        }
                                    } else if (log.preyActionType === 'evade') {
                                        if (log.hit && log.preyEvaded) {
                                            preyColor = '#d4b84a';
                                            preyText = '회피 성공 〰️';
                                        } else if (log.hit && !log.preyEvaded && Number(card && card.damage) > 0) {
                                            preyColor = '#3dd68c';
                                            preyText = '회피 실패';
                                        } else {
                                            preyColor = '#aaa';
                                            preyText = '회피 자세';
                                        }
                                    } else if (log.preyActionType === 'peek') {
                                        preyColor = '#aaa';
                                        preyText = '눈치 보기 👁️ (회피 못 함)';
                                    } else {
                                        preyText = log.preyAction || '—';
                                    }

                                    return (
                                        <div key={i} style={{
                                            marginBottom: '8px',
                                            paddingLeft: '8px',
                                            borderLeft: `3px solid ${playerColor}`,
                                            lineHeight: 1.45
                                        }}>
                                            <div style={{ color: playerColor, fontWeight: 600 }}>
                                                <span style={{ color: '#888', fontWeight: 400, marginRight: '4px' }}>T{log.turn}</span>
                                                👤 {playerText}
                                            </div>
                                            <div style={{ color: preyColor, fontSize: '10.5px' }}>
                                                <span style={{ marginRight: '4px' }}>{preyEmoji}</span>
                                                {preyText}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* 내 손패 */}
                        {phase === 'select' && (
                            <div>
                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>내 손패</div>
                                {hand.length === 0 ? (
                                    <div style={{ color: '#666', fontSize: '11px', padding: '10px' }}>
                                        사용할 수 있는 전투 카드가 없다.
                                    </div>
                                ) : (
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px' }}>
                                        {hand.map(card => {
                                            // D-64: 실시간 재고 기반 비활성 판정. canPlaceCard가 requirements
                                            //   모두에 대해 remainingByReq 체크 — slotLimit보다 정확.
                                            const exhausted = !canPlaceCard(card);
                                            // D-51/D-64: 무기 요구 카드면 현재 잔여 내구도 표시.
                                            //   슬롯에 이미 배치된 해당 무기 카드 수만큼 실시간 차감.
                                            let durBadge = null;
                                            if (card.weaponId) {
                                                const items = (inventory && inventory.items) || [];
                                                const instances = items.filter(it => it.type === card.weaponId);
                                                const durMaxInitial = instances.reduce((s, it) =>
                                                    s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                                                const usedInSlots = slots.filter(s => s && s.weaponId === card.weaponId).length;
                                                const durLeft = Math.max(0, durMaxInitial - usedInSlots);
                                                if (durMaxInitial > 0) durBadge = `내구 ${durLeft}/${durMaxInitial}`;
                                            }
                                            // D-66: 잔여 × 표시는 requirements 기반 실시간 min.
                                            //   서로 다른 카드가 같은 재료를 공유할 때도 차감이 공유됨.
                                            //   예: 돌던지기(돌맹이)·새총쏘기(새총+돌맹이) 모두 '돌맹이' 소비.
                                            //   한쪽을 슬롯에 올리면 다른 쪽의 × 표시도 실시간 감소.
                                            const reqRemaining = (Array.isArray(card.requirements) && card.requirements.length > 0)
                                                ? Math.max(0, Math.min(...card.requirements.map(r => remainingByReq[r] ?? 0)))
                                                : null;
                                            return (
                                                <div key={card.uid}
                                                    onClick={() => handleHandClick(card)}
                                                    style={{
                                                        padding: '8px 4px',
                                                        background: exhausted ? '#1a1a2a' : '#2a2a4e',
                                                        border: `1px solid ${exhausted ? '#333' : '#555'}`,
                                                        borderRadius: '6px',
                                                        fontSize: '11px',
                                                        textAlign: 'center',
                                                        cursor: exhausted ? 'not-allowed' : 'pointer',
                                                        minHeight: '44px',
                                                        opacity: exhausted ? 0.45 : 1
                                                    }}>
                                                    <div style={{ fontWeight: '600' }}>
                                                        {card.name}
                                                        {card.infinite && (
                                                            <span style={{ color: '#3dd68c', marginLeft: '4px' }}>∞</span>
                                                        )}
                                                        {card.slotLimit && reqRemaining !== null && (
                                                            <span style={{ color: '#d4b84a', marginLeft: '4px' }}>
                                                                ×{reqRemaining}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div style={{ fontSize: '10px' }}>
                                                        <StatBadges card={card} />
                                                    </div>
                                                    {durBadge && (
                                                        <div style={{ fontSize: '10px', color: '#d4b84a' }}>
                                                            {durBadge}
                                                        </div>
                                                    )}
                                                    {/* D-97: 분실 확률 안내 (창던지기 등). full_loss=Y면 "분실", 확률이면 "N% 분실". */}
                                                    {(() => {
                                                        const fl = String(card.full_loss || '').toUpperCase() === 'Y';
                                                        const lc = Number(card.loss_chance) || 0;
                                                        if (fl) return <div style={{ fontSize: '10px', color: '#ff9999' }}>⚠ 100% 분실</div>;
                                                        if (lc > 0) return <div style={{ fontSize: '10px', color: '#ff9999' }}>⚠ {lc}% 분실</div>;
                                                        return null;
                                                    })()}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // 메인 게임 컴포넌트
        // ============================================

        // 손패 상한 — 요한 지시(2026-04-22): 3장 → 5장으로 증가.
        // 손패 보충 로직·초기 드로우·HandCards 그리드가 모두 이 상수 기준으로 동작한다.
        const HAND_SIZE = 5;

        // D-76: 사냥감 스폰 수량 상수 — 요한이 시트 이관 전까진 여기서 조정.
        //   level1/level2 각각 별도 풀에서 `spawnPrey`가 뽑아 배치.
        const PREY_SPAWN = { level1: 5, level2: 5 };

        // D-46 (2026-04-23, 9차 세션): 사냥감 전투 1단계.
        // PREY_HABITAT — 각 prey id의 서식 region 폴백.
        //   시트 `사냥감` 탭에 habitat 컬럼이 추가되면 prey.habitat가 우선, 없으면 이 상수.
        //   (SSOT 원칙: 편집은 시트 쪽에서. 이 상수는 파이프라인 승격 전 런타임 안전망.)
        const PREY_HABITAT = {
            rabbit:      ['덤불'],
            mouse:       ['덤불'],
            snake:       ['덤불'],
            frog:        ['덤불'],
            squirrel:    ['숲'],
            salamander:  ['숲'],
            bird:        ['평원'],
            grasshopper: ['평원'],
            crab:        ['시냇물']
        };
        // D-92 (2026-04-25 요한 지시): 1단계 재료 아이콘 매핑.
        //   가방/조합/요리 등 텍스트로 노출되던 1단계 재료를 이모지로 통일.
        //   2단계 이상은 매핑 부재 → 자동 텍스트 폴백(기존 동작 유지).
        //   slingshot(1단계 무기)은 제외 — 무기/도구는 별도 ID 표기 유지.
        const ITEM_EMOJI = {
            stone: '🪨',
            branch: '🪵',  // 작은 가지 — 통나무 emoji 차용(1단계 안에서 wood와 충돌 없음)
            stem: '🌿',
            mushroom: '🍄',
            berry: '🍓',
            meat: '🥩',
            big_meat: '🍖',
            water: '💧',
            fish: '🐟',
            crab_whole: '🦀',
            grasshopper_whole: '🦗',
            // D-94: 거대한 먹이 — 1단계 아니지만 보스 유인 시각 일관성을 위해 매핑.
            giant_bait: '🍖',
            grilled_giant_bait: '🍗'
        };
        // 1단계 재료면 emoji 반환, 아니면 null.
        const itemEmoji = (typeOrId) => ITEM_EMOJI[typeOrId] || null;

        // PREY_EMOJI — 런타임 UI 매핑 (SSOT와 무관, 아이콘만).
        const PREY_EMOJI = {
            // Level 1
            rabbit: '🐰', mouse: '🐭', squirrel: '🐿️', bird: '🐦', salamander: '🦎',
            snake: '🐍', frog: '🐸', crab: '🦀', grasshopper: '🦗',
            // Level 2 (D-76)
            boar: '🐗', dinosaur: '🦕', deer: '🦌', badger: '🦡',
            fox: '🦊', turkey: '🦃', armadillo: '🦔'
        };
        // 사냥시작 카드 — 사냥감 타일 진입 시 손패에 자동 추가되는 overflow 카드.
        //   `overflow:true` 플래그로 HAND_SIZE 카운트에서 제외(손패가 5장이어도 이 카드는 추가됨).
        //   클릭 시 useCard('hunt_start')에서 즉시 소모 + 전투 모달 오픈.
        const HUNT_START_CARD = {
            id: 'hunt_start',
            name: '사냥시작',
            time: 1,
            detection: 2,
            effect: '사냥감과의 전투를 시작한다',
            overflow: true,
            count: 1
        };

        // D-113: initialInventory — 탐험 시작 시 가방(pack)에서 넘겨받은 InventorySystem 인스턴스.
        //   undefined면 빈 5x5 기본 가방으로 시작(이전 동작).
        function Game({ onRunEnd, initialInventory, activeQuests } = {}) {
            // 상태 관리
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(8);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            // D-54: 사망 사유 — GameEndModal이 감성 문구·가이드를 선택하는 키.
            const [deathReason, setDeathReason] = useState(null);
            const [message, setMessage] = useState('눈을 뜨자 낯선 숲이 펼쳐졌다.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            // D-27 HUD 리뉴얼: 덱/무덤 목록 모달 표시 플래그.
            const [showDeckList, setShowDeckList] = useState(false);
            const [showGraveyardList, setShowGraveyardList] = useState(false);
            // D-48: 무덤 버튼 펄스 트리거 — moveTo에서 증가 → key remount로 CSS 애니메이션 재생.
            const [graveyardFlashKey, setGraveyardFlashKey] = useState(0);
            // D-53: 인게임 [플레이방법] 모달.
            const [showHelp, setShowHelp] = useState(false);
            const [eventTile, setEventTile] = useState(null);
            // 전투 임시 카드(아이템 사용으로 생성) — 전투 진입 시 combat 덱에 병합, 사용 후 소멸.
            // 구조: [{ id:'throw', count:N }, ...]
            const [combatExtraCards, setCombatExtraCards] = useState([]);
            // D-23 "카드로 아이템 사용" 프레임워크 — 대기 중 consume 요청.
            // 구조: { card, consume, filter, titleText, emptyText } | null
            // 모달 활성 판정도 이 state의 truthy로 통일.
            const [pendingConsume, setPendingConsume] = useState(null);
            // D-57 (2026-04-24): 요리 모달 오픈 플래그. 휴식 카드 → [🔥 요리]에서 true.
            //   휴식 모달은 백그라운드 유지(zIndex 1100), 요리 모달(1200)이 위에 덮임.
            const [cookingOpen, setCookingOpen] = useState(false);
            // D-28 획득 토스트 — 현재 노출 중인 토스트 1개만 유지.
            // 구조: { id: number, entries: [{ name, count, grade? }] } | null
            const [lootToast, setLootToast] = useState(null);
            // D-114: 뒤져보기 다중 드롭 시 챙길 항목 선택 모달 데이터.
            // 구조: { id, drops: [itemType, ...], region } | null
            const [lootPickup, setLootPickup] = useState(null);
            // D-52: 풍족한 땅(구 좋은 곳) 등 타일 이벤트는 토스트로 안내.
            const [tileEventToast, setTileEventToast] = useState(null);
            // D-42 (2026-04-23 요한 지시): 보스 위치 가시성은 "지형 revealed"와 분리.
            // - listen 1칸 분기에서만 bossVisible=true 로 set (그 순간 보스 아이콘 노출)
            // - 플레이어가 이동하면 즉시 false (지형 revealed는 유지)
            // 공포 원칙: "한 번 본 보스 위치"가 아니라 "방금 귀기울인 위치"만 신뢰 가능.
            const [bossVisible, setBossVisible] = useState(false);

            // 보스 점프스케어 active flag (listen 거리=1 트리거). onDone에서 false.
            const [bossJumpscare, setBossJumpscare] = useState(false);

            // 플레이어 이동 경로 기록. 맵 보기 모드에서 방문 순서를 숫자로 표시.
            // 초기값은 게임 시작 시 setTiles 직후 [startTileId]로 채운다.
            const [moveHistory, setMoveHistory] = useState([]);

            // D-110: 런 점수 산출용 누적 통계. 사냥 승리·보스 근접 진입 시 갱신.
            //   - l1PreyKills/l2PreyKills: 사냥 victory 분기에서 prey.level 기반 +1.
            //   - bossDangerEntered: 매 이동 후 보스와 거리 ≤2 진입 시 +1 (같은 타일 재진입은
            //     bossDangerSeenTiles로 dedup — 동일 타일에서 여러 번 카운트되지 않음).
            const [runStats, setRunStats] = useState({ l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 });
            const bossDangerSeenTilesRef = useRef(new Set());

            // D-53 (2026-04-24): 보스 이동 경로 기록. 결과 화면 [맵 보기]에서 빨간 동그라미
            // + B1, B2... 라벨로 표시. 초기값은 initializeGame에서 [bossStart].
            // 인접 중복(보스가 같은 자리 유지)은 push 안 함.
            const [bossMoveHistory, setBossMoveHistory] = useState([]);

            // 승리 후 [맵 보기] 모드. true면 GameEndModal 숨기고 맵에 경로 숫자 표시.
            const [showPathView, setShowPathView] = useState(false);
            // D-46/D-48: 사냥감 전투 상태.
            //   preys          — 맵에 살아있는 사냥감 배열 [{id, tileId, preyType, hpCurrent?}].
            //   preyTraceTiles — listen/도망 결과로 감지된 "기척" 타일 id Set (visited 무관 표시).
            //   activeHunt     — 전투 모달 활성화 시 {prey}, 미활성 null.
            //   D-48: 발자국 방향 화살표(preyFootprints) 제거 — 흔적(👣)만으로 단서 제공.
            const [preys, setPreys] = useState([]);
            const [preyTraceTiles, setPreyTraceTiles] = useState(new Set());
            const [activeHunt, setActiveHunt] = useState(null);
            // D-77/D-78: 동물 사체 타일. 보스 포식 완료 시 여기에 tileId가 추가됨.
            //   carcassMeatTaken은 이미 생고기 보너스 1회 소진한 타일(뒤져보기 보상용).
            // D-90 (2026-04-25): carcassTiles는 Set→Map. value={preyType} 보존 → 사체
            //   타일 도착 시 "거대한 짐승이 OOO을 뜯어먹은 흔적" 메시지에 사냥감 이름 사용.
            //   .has(tileId) 체크는 Map도 동일 — 기존 사용처 무회귀.
            const [carcassTiles, setCarcassTiles] = useState(new Map());
            const [carcassMeatTaken, setCarcassMeatTaken] = useState(new Set());
            // D-90: 사체 타일 첫 도착 시 알림 표시 마커. 이미 도착한 타일은 재방문해도 침묵.
            const [carcassVisitedTiles, setCarcassVisitedTiles] = useState(new Set());
            // D-90: 제자리 [시간 보내기] 확인 모달.
            const [waitConfirmOpen, setWaitConfirmOpen] = useState(false);
            // D-90: listen 시 인접 포식중 보스 발견 모달 데이터 ({preyType, preyName}|null).
            const [predationListenInfo, setPredationListenInfo] = useState(null);
            // D-94 (2026-04-25 요한 지시): 거대한 먹이 유인 — 타일에 놓인 먹이 tileId Set.
            //   보스의 predation 후보로 prey와 동일하게 처리(synthetic prey 객체로 onPlayerMove에 전달).
            //   보스가 도달 시 onPredationStart가 isBait 분기로 baitTiles에서 제거.
            const [baitTiles, setBaitTiles] = useState(new Set());
            // D-78: listen 카드로 감지된 사체 trace 타일 — 👣 대신 🦴 표시.
            const [carcassTraceTiles, setCarcassTraceTiles] = useState(new Set());
            const mapRef = useRef(null);

            // 토스트 발사 — entries는 묶음 표시 대상.
            // id는 컴포넌트가 phase 타이머를 재시작하기 위한 key 역할.
            const showLootToast = (entries) => {
                if (!entries || entries.length === 0) return;
                setLootToast({ id: Date.now() + Math.random(), entries });
            };

            // 타일 이벤트 토스트 발사 — emoji/title/message/color 사양.
            const showTileEventToast = (payload) => {
                if (!payload) return;
                setTileEventToast({ id: Date.now() + Math.random(), ...payload });
            };

            // D-46 (2026-04-23) — 전투 결과 후처리.
            //   victory: preys 제거 + preyTraceTiles 해당 tileId 삭제 + meat 인벤 추가(overflow 집계)
            //            + LootToast(z-index 충돌 방지로 setTimeout 100ms) + 메시지.
            //   prey_fled: habitat 맞는 인접 타일 중 reserved(보스/탈출구/다른 prey) 제외하고 랜덤 이동.
            //              없으면 제자리. 이동 시 preyFootprints[원]={fromTile:원, toTile:새},
            //              preyTraceTiles에서 원 타일 제거. 메시지: "사냥감이 도망쳤다. 발자국이 남아있다."
            //   player_fled: prey 제자리. 메시지: "사냥을 포기하고 물러섰다."
            const handleHuntResolve = (result) => {
                if (!activeHunt || !activeHunt.prey) {
                    setActiveHunt(null);
                    return;
                }
                const prey = activeHunt.prey;
                const outcome = result && result.outcome;

                // D-47/D-51: 사용된 카드의 요구 재료를 인벤에서 차감.
                //   - 일반 재료(돌맹이 등): 1개씩 removeItem.
                //   - 무기 재료: result.weaponUsage에서 이미 계산된 used/fullLossCount로 차감
                //     (consumeWeaponUse — durabilityLeft 감소, 0이면 제거).
                //   autoFail 턴은 실제 사용이 없었으므로 제외.
                //   consumedSummary는 victory 메시지에 "소모: 돌맹이 2개" 형태로 덧붙임.
                const consumedSummary = [];
                if (inventory && Array.isArray(result && result.turns)) {
                    // 1) 비무기 재료 집계 — requirement 이름 중 weapon이 아닌 것만.
                    const TTD = window.TTD_DATA || {};
                    const WEAPONS = Array.isArray(TTD.WEAPONS) ? TTD.WEAPONS : [];
                    const weaponNameSet = new Set(WEAPONS.map(w => w && w.name).filter(Boolean));

                    const consumeByName = {};
                    for (const turn of result.turns) {
                        if (turn && turn.autoFail) continue; // 무기 없어서 실패한 턴은 소모 없음
                        const uc = turn && turn.userCard;
                        if (!uc) continue;
                        const reqs = CombatDeck.parseRequirement(uc.requirement);
                        for (const rName of reqs) {
                            if (weaponNameSet.has(rName)) continue; // 무기는 weaponUsage 경로로
                            // D-73: 카테고리 토큰(shield/armor)은 소비 대상 아님 — 방어구는 내구 개념 없음.
                            if (CombatDeck.CATEGORY_REQ_TOKENS && CombatDeck.CATEGORY_REQ_TOKENS.has(rName)) continue;
                            consumeByName[rName] = (consumeByName[rName] || 0) + 1;
                        }
                    }
                    for (const [reqName, count] of Object.entries(consumeByName)) {
                        let remaining = count;
                        const keep = [];
                        for (const it of inventory.items) {
                            if (remaining > 0) {
                                const def = InventorySystem.resolveDef(it.type) || {};
                                if ((def.name || '') === reqName) {
                                    inventory.removeItem(it);
                                    remaining -= 1;
                                    continue;
                                }
                            }
                            keep.push(it);
                        }
                        inventory.items = keep;
                        const actuallyConsumed = count - remaining;
                        if (actuallyConsumed > 0) {
                            consumedSummary.push(`${reqName} ${actuallyConsumed}개`);
                        }
                    }

                    // 2) 무기 차감 — weaponUsage {weaponId: {used, fullLossCount}}.
                    //   used는 내구도 총 차감량. 동일 weaponId 인스턴스들을 순회하며
                    //   durabilityLeft가 많은 순으로 차감(한 자루 기준 설계지만 여러 자루도 안전).
                    //   fullLoss 턴은 한 자루를 통째로 날림 — 인스턴스 1자루를 0으로.
                    const usage = (result && result.weaponUsage) || {};
                    for (const [weaponId, info] of Object.entries(usage)) {
                        const def = InventorySystem.resolveDef(weaponId) || {};
                        const displayName = def.name || weaponId;
                        const instances = inventory.items
                            .filter(it => it.type === weaponId)
                            .sort((a, b) => (b.durabilityLeft || 0) - (a.durabilityLeft || 0));

                        let fullLossLeft = Number(info.fullLossCount) || 0;
                        // 우선 full_loss 카운트만큼 자루를 통째로 소멸.
                        for (let i = 0; i < fullLossLeft && instances.length > 0; i++) {
                            const inst = instances[0];
                            inventory.consumeWeaponUse(inst, 0, true);
                            // instances 배열 동기화 (제거됐으므로 pop)
                            instances.shift();
                        }
                        // 남은 일반 차감량 = used - (full_loss로 날린 durability 합계) 계산이 복잡하니,
                        // weaponUsage.used는 이미 fullLoss를 포함한 총량이므로 일반 차감분만 분리.
                        //   일반 = used - (fullLossCount 동안 소멸한 durability의 합).
                        //   fullLoss에서 소멸한 durability는 그 자루의 durabilityLeft였음 — 추적이 번거롭다.
                        //   간단화: combat의 weaponState를 그대로 믿고, fullLossCount만큼 자루를 소멸하는
                        //   것으로 끝난다면(인스턴스 1자루라는 공통 케이스에서 정확), 남은 일반 차감은
                        //   "used - fullLoss로 날린 durability"를 수동 계산. 하지만 combat 쪽이 단일
                        //   weaponState 덩어리로 처리하므로, 여기선 'fullLossCount'가 1이면 그 자루를 태운 것으로
                        //   종료. 나머지 턴은 일반 차감.
                        //   → 더 단순한 해석: used에서 fullLoss로 이미 소모된 durability(instances[0]의 원래 값)를
                        //     빼고 남은 만큼 일반 차감. 그러나 현 모델은 '무기 1자루' 기준이므로
                        //     fullLossCount≥1이면 그 자루 소멸로 끝나고 나머지 턴은 auto-fail이 됐을 것이다.
                        //   결론: fullLossCount≥1이면 일반 차감은 건너뜀.
                        if ((Number(info.fullLossCount) || 0) === 0) {
                            let decLeft = Number(info.used) || 0;
                            for (const inst of instances) {
                                if (decLeft <= 0) break;
                                const canDec = Math.min(decLeft, (inst.durabilityLeft || 0));
                                if (canDec > 0) {
                                    inventory.consumeWeaponUse(inst, canDec, false);
                                    decLeft -= canDec;
                                }
                            }
                        }
                        const usedTotal = Number(info.used) || 0;
                        if (usedTotal > 0) {
                            consumedSummary.push(`${displayName} 내구 ${usedTotal}`);
                        }
                        if (info.broken) {
                            consumedSummary.push(`${displayName} 파손`);
                        }
                    }
                }
                // D-124 (요한 지시): 시스템스러운 (소모: ...) 부가 텍스트 제거 — 메시지엔
                //   1인칭 자연어만. 잃어버린 자원은 인벤·내구도 표시로 인지 가능.
                const withConsumed = (msg) => msg;

                // D-74: 플레이어 HP 차감 — prey.attack과 유저 카드 defense 대결 결과 누적 대미지.
                //   HP 0이면 게임오버('health'). 기존 체력 사망 경로 재사용.
                //   사망 체크는 victory 보상 등과 독립적으로 적용(전투에서 잡았어도 0 HP면 사망).
                const dmgTaken = Math.max(0, Number(result && result.playerDamageTaken) || 0);
                if (dmgTaken > 0) {
                    setHealth(h => {
                        const nh = Math.max(0, h - dmgTaken);
                        if (nh <= 0) {
                            setGameOver(true);
                            setDeathReason('health');
                        }
                        return nh;
                    });
                }

                if (outcome === 'victory') {
                    // preys 제거
                    setPreys(prev => prev.filter(p => p.id !== prey.id));
                    // trace 제거
                    setPreyTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(prey.tileId);
                        return next;
                    });
                    // D-110: 사냥 처치 카운트 누적. prey 정의의 level로 분기.
                    const preyDataArrKill = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const killDef = preyDataArrKill.find(p => p && p.id === prey.preyType) || {};
                    const lvl = Number(killDef.level) || 1;
                    setRunStats(s => ({
                        ...s,
                        l1PreyKills: s.l1PreyKills + (lvl === 1 ? 1 : 0),
                        l2PreyKills: s.l2PreyKills + (lvl === 2 ? 1 : 0)
                    }));
                    // D-71: prey.drop_item 우선, 없으면 'meat' 폴백. 이름·등급은 resolveDef로 동적 조회.
                    const dropId = (prey.drop_item && String(prey.drop_item).trim()) || 'meat';
                    const dropDef = InventorySystem.resolveDef(dropId) || {};
                    const dropName = dropDef.name || dropId;
                    const dropGrade = Number(dropDef.grade) || 1;
                    const dropCount = prey.meat || 0;
                    let added = 0;
                    let overflow = 0;
                    for (let i = 0; i < dropCount; i++) {
                        const ok = inventory.addItem(dropId);
                        if (ok) added += 1;
                        else overflow += 1;
                    }
                    let msg = `사냥에 성공했다. ${dropName} ${added}을(를) 얻었다.`;
                    if (overflow > 0) msg += ` (가방이 가득 차 ${overflow}개는 두고 왔다.)`;
                    setMessage(withConsumed(msg));
                    setActiveHunt(null);
                    if (added > 0) {
                        // z-index 충돌 방지 — 모달 unmount 후 토스트 띄움.
                        setTimeout(() => showLootToast([{ name: dropName, count: added, grade: dropGrade }]), 100);
                    }
                } else if (outcome === 'prey_fled') {
                    // D-47: 반드시 다른 타일로 이동 — 3단계 fallback.
                    //   1차: habitat 매칭 + 인접 + reserved(빈/보스/탈출구/다른prey) 제외
                    //   2차: habitat 무관 인접 + reserved 제외
                    //   3차: 인접 무관 (맵 전체 non-reserved) — "멀리 놓친 것처럼" 이동
                    // 그리고 도망간 새 타일에 trace(👣) 추가 — 플레이어에게 단서 제공.
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    const habitat = (Array.isArray(preyDef.habitat) && preyDef.habitat.length > 0)
                        ? preyDef.habitat
                        : (PREY_HABITAT[prey.preyType] || []);
                    const bossPos = boss ? boss.getPosition() : -1;
                    const occupiedByOther = new Set(
                        (preys || []).filter(p => p.id !== prey.id).map(p => p.tileId)
                    );
                    const notReserved = (nid) => {
                        if (nid === prey.tileId) return false;
                        const t = tiles[nid];
                        if (!t || t.isEmpty) return false;
                        if (nid === bossPos) return false;
                        if (t.type === 'exit') return false;
                        if (occupiedByOther.has(nid)) return false;
                        return true;
                    };
                    const currentPreyTile = tiles[prey.tileId];
                    const neighborIds = (currentPreyTile && currentPreyTile.connections) || [];
                    let candidates = neighborIds.filter(nid => {
                        if (!notReserved(nid)) return false;
                        if (habitat.length > 0 && !habitat.includes(tiles[nid].region)) return false;
                        return true;
                    });
                    if (candidates.length === 0) {
                        candidates = neighborIds.filter(notReserved);
                    }
                    if (candidates.length === 0) {
                        candidates = tiles.map((_, i) => i).filter(notReserved);
                    }

                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    // D-60: 이 prey 개체의 도주 횟수 누적. 다음 재조우 시 턴별 회피율에서 *10 차감.
                    if (candidates.length > 0) {
                        const dest = candidates[Math.floor(Math.random() * candidates.length)];
                        const fromTile = prey.tileId;
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, tileId: dest, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                        // 원 타일 trace 제거 + 도망간 새 타일에 trace 추가.
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            next.delete(fromTile);
                            next.add(dest);
                            return next;
                        });
                    } else {
                        // 이론상 도달 불가 (맵 전체에 non-reserved 타일이 하나도 없는 경우). 안전망.
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                    }
                    setMessage(withConsumed('사냥감이 도망쳤다. 발자국이 남아있다.'));
                    setActiveHunt(null);
                } else if (outcome === 'player_fled') {
                    // 플레이어 도주 — prey는 제자리지만 준 데미지는 유지.
                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    setPreys(prev => prev.map(p =>
                        p.id === prey.id ? { ...p, hpCurrent: hpFinal } : p
                    ));
                    setMessage(withConsumed('사냥을 포기하고 물러섰다.'));
                    setActiveHunt(null);
                } else {
                    setActiveHunt(null);
                }
            };

            // 게임 초기화
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(MAP_SIZE);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                // 경로 기록 초기화 — 시작 타일이 첫 방문지.
                setMoveHistory([playerStart]);

                // 카드 데이터는 구글 시트 '베이스탐험카드' 탭이 SSOT.
                // data/data.js의 TTD_DATA.BASE_CARDS를 읽어 런타임 필드(time 기본값 1)만 덧붙인다.
                // 시트 갱신 시: 시트 수정 → `make data` 실행 → 새로고침.
                //
                // D-23: consume/extra_effect 컬럼은 시트 헤더에 존재. 값 없으면 빈 문자열.
                // 데이터 로드 실패 시에만 아래 else 폴백(안전망)이 사용된다.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0
                    ? sheetBaseCards.map(c => ({
                          id: c.id,
                          name: c.name,
                          count: Number(c.count) || 0,
                          effect: c.effect || '',
                          detection: Number(c.detection) || 0,
                          time: Number(c.time) || 1,
                          consume: c.consume || '',
                          extra_effect: c.extra_effect || ''
                      }))
                    : [
                          // 폴백(데이터 로드 실패 시) — 시트가 SSOT이므로 정상 경로에선 사용 안 됨.
                          { id: 'search', name: '뒤져보기', count: 5, effect: '아이템 획득', detection: 5, time: 1 },
                          { id: 'listen', name: '귀 기울이기', count: 2, effect: '몬스터 감지', detection: -5, time: 1 },
                          { id: 'find_food', name: '음식 찾기', count: 1, effect: '음식 획득', detection: 5, time: 1 },
                          { id: 'hide', name: '숨기', count: 1, effect: '은신', detection: -15, time: 1 },
                          { id: 'rest', name: '휴식', count: 1, effect: '체력/배고픔 소폭 회복, 소음 최소', detection: -13, time: 1,
                            consume: 'category:음식;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                // D-47: 기본 가방 모양(5x5, 위 2행 구석 4칸 disabled) — InventorySystem 기본값 사용.
                // D-113: initialInventory가 있으면 그것을 시작 인벤으로 사용(캠프 가방 인계).
                //   App에서 탐험 시작 시점에 pack을 비우고 인스턴스를 그대로 넘긴다.
                const inv = initialInventory || new InventorySystem();
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                // D-62: setPosition은 visitedTiles에도 bossPos 동기화 — 잘못된 스폰 기록 방지.
                newBoss.setPosition(bossPos);
                // D-77: 포식 콜백 연결.
                //   onPredationStart  — 타겟 L2 prey를 preys에서 제거(보스가 잡아먹기 시작).
                //   onPredationComplete — 보스가 그 타일에서 2턴 정지를 끝낼 때 사체 타일 생성.
                newBoss.onPredationStart = (targetPreyId, tileId, prey) => {
                    // D-94: prey가 isBait면 baitTiles에서 제거. 그 외(L2 prey)는 기존대로 setPreys.
                    if (prey && prey.isBait) {
                        setBaitTiles(prev => {
                            const next = new Set(prev);
                            next.delete(tileId);
                            return next;
                        });
                    } else {
                        setPreys(prev => prev.filter(p => p.id !== targetPreyId));
                    }
                };
                // D-90: 콜백 3번째 인자 preyType 추가 — 사체 도착 메시지에 사냥감 이름 사용.
                // D-94: preyType='__bait__'이면 사체 메시지가 다른 톤으로 분기.
                newBoss.onPredationComplete = (tileId, _targetPreyId, preyType) => {
                    setCarcassTiles(prev => {
                        const next = new Map(prev);
                        next.set(tileId, { preyType: preyType || null });
                        return next;
                    });
                };
                setBoss(newBoss);
                // D-53: 보스 이동 history 초기화 (시작 위치가 B1).
                setBossMoveHistory([bossPos]);

                // D-46/D-76: 사냥감 스폰. level1/level2 각각 PREY_SPAWN 만큼.
                //   reserved = 플레이어 시작/보스/탈출구. preyData는 TTD_DATA.PREY.
                //   habitatFallback은 prey.habitat 없을 때만 사용.
                const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const spawned = (typeof window.spawnPrey === 'function')
                    ? window.spawnPrey(newTiles, preyData, PREY_SPAWN, {
                        playerStartId: playerStart,
                        bossPosId: bossPos,
                        exitPosId: exitPos
                    }, PREY_HABITAT)
                    : [];
                setPreys(spawned);
                setPreyTraceTiles(new Set());
                setCarcassTiles(new Map());
                setCarcassMeatTaken(new Set());
                setCarcassVisitedTiles(new Set());
                setCarcassTraceTiles(new Set());
                setActiveHunt(null);
                setWaitConfirmOpen(false);
                setPredationListenInfo(null);
                setBaitTiles(new Set());
                // 콘솔 검증용 — 릴리스 시 제거해도 무방.
                if (typeof window !== 'undefined') window.__preys = spawned;
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // 게임 오버/승리 체크
            // D-54: 사유 구분 — 체력이 먼저 0이면 'health', 배고픔 먼저면 'starvation'.
            useEffect(() => {
                if (health <= 0) {
                    setGameOver(true);
                    setDeathReason('health');
                    setMessage('생명력이 다했다...');
                } else if (hunger <= 0) {
                    setGameOver(true);
                    setDeathReason('starvation');
                    setMessage('배고픔을 이기지 못했다...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('탈출에 성공했다!');
                }
            }, [currentTile, tiles]);

            // hunt_start 카드 자동 정리 — 사냥감이 처치되거나 도망으로 현재 타일을
            // 떠난 순간 손패에 남는 사냥시작 카드를 즉시 무덤으로 보낸다.
            // 이동 시점의 손패 교체(moveTo)로도 정리되지만, 그 타일에 머물며 전투가
            // 끝난 경우엔 잡을 길이 없어 별도 감시가 필요.
            useEffect(() => {
                const orphan = (hand || []).filter(c => {
                    if (c.id !== 'hunt_start') return false;
                    const t = c.target;
                    if (!t) return true;
                    return !(preys || []).some(p => p.id === t.preyId && p.tileId === currentTile);
                });
                if (orphan.length === 0) return;
                const orphanUids = new Set(orphan.map(c => c.uid));
                // D-65: hunt_start는 무덤이 아니라 소멸 (요한 원문). setGraveyard 호출 제거.
                setHand(prev => prev.filter(c => !orphanUids.has(c.uid)));
            }, [preys, currentTile]);

            // D-63 (2026-04-24): D-59 revert.
            // 손패 자동 보충은 요한 의도 반대였다. 올바른 규칙:
            //   - 타일 이동 시에만 덱에서 5장 새로 드로우 (moveTo에서 처리, D-48).
            //   - 카드 사용으로 손패가 줄면 보충 없음 (플레이어가 적게 쓰면 다음 타일에서 리필).
            //   - hunt_start는 사냥감 조우 시 overflow로 추가 (카운터 제외, 이동 시 소멸).
            // 따라서 카드 사용 직후 자동 보충 useEffect는 제거.

            // D-67 (2026-04-24): 배고픔 1 이하 직접 알림.
            //   D-55 게이지 점멸만으로는 경고가 약하다는 요한 피드백. hunger <= 1로 떨어지면
            //   메시지로 '배고파서 쓰러질 것 같다...' 를 덮어씌워 유저가 즉시 인지하도록.
            //   hunger 변화 시마다 재평가 — 회복되면 다른 action이 덮어쓰면서 자연 해제.
            useEffect(() => {
                if (gameOver || victory) return;
                if (hunger <= 1) {
                    setMessage('배고파서 쓰러질 것 같다...');
                }
            }, [hunger, gameOver, victory]);

            // 아이템 사용 — 인벤토리 정보창에서 '사용' 버튼을 누를 때 호출.
            // EffectParser가 파싱한 Notion '사용 효과' DSL을 런타임에 적용하고,
            // 소비형(consumed) 판정은 effectParser가 내려준 값을 그대로 따른다.
            //
            // spawn_card:throw 는 '전투 카드 덱에 던지기 카드 추가'로 해석한다.
            // 기획 근거(요한 지시): "전투모드시에 등장하는 카드에 추가된다".
            // 사용 시점에 카드가 생성되어 임시 풀(combatExtraCards)에 쌓이고,
            // 다음 전투 시작 때 기본 덱과 병합되며, 그 전투 내에서 카드를 쓰면 소멸한다.
            // (영구 추가가 아닌 근거: 현재 아이템이 일회용 판정이 아니어도 재탐색/머지 가능 재료이므로
            //  덱에 영구 편입시키면 밸런스가 쉽게 무너지고, 요한 말 "전투 종료 시 소멸"이 자연스러움.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || item.name));
                const parsed = (notionItem && notionItem.effect) || null;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('이 아이템은 아직 사용할 수 없다.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        if (name === 'hunger') setHunger(val);
                        else if (name === 'health') setHealth(val);
                    },
                    addThrowCard: (cardId) => {
                        // 같은 cardId를 여러 번 써서 여러 장을 쌓을 수도 있음.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
                            return next;
                        });
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}을(를) 사용했다. (${label})`);
                }
                return result;
            };

            // D-94 (2026-04-25 요한 지시): 거대한 먹이 [먹이로 유인하기] 핸들러.
            //   현재 타일에 먹이 placeholder를 등록(baitTiles Set). 보스가 다음 onPlayerMove에서
            //   synthetic prey로 인식해 BFS 추격 → 도달 시 포식(=먹이 소진 + 사체 타일 생성).
            //   인벤에서 1개 차감 + 가방 모달 닫기 + 토스트.
            const handleLureBait = (item) => {
                if (!inventory || !item) return;
                inventory.removeItem(item);
                inventory.items = inventory.items.filter(i => i.id !== item.id);
                setBaitTiles(prev => {
                    const next = new Set(prev);
                    next.add(currentTile);
                    return next;
                });
                setShowInventory(false);
                setMessage('이곳에 먹이를 놔두었다. 멀리서부터 발소리가 가까워지는 기분이 든다…');
                showTileEventToast({
                    emoji: '🍖',
                    title: '먹이를 놔두었다',
                    message: '거대한 짐승이 곧 이곳으로 향할 것이다…',
                    color: '#7a3a1f'
                });
            };

            // D-23: "카드로 아이템 사용" 프레임워크의 공통 진입점.
            // 카드가 아이템을 소비해야 하는 경우(consume 스펙 보유) 이 함수가 모달을 띄우고,
            // 유저가 아이템을 고른 뒤 확정되면 finalizeCardUse로 실제 효과를 적용한다.
            // 카드 자체(손패 → 무덤, 시간·발각 증가)는 선결 조건 통과 후에만 소모.
            //
            // consume 파싱은 effectParser.parseCardConsume에 위임. 필터는 matchesConsumeFilter.
            // consume 통과 아이템이 0개면 "쓸 수 없다" 메시지로 조용히 종료(카드도 미소모).
            const finalizeCardUse = (card, extraMsg) => {
                // 손패 → 무덤, 시간·발각 처리.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}을(를) 사용했다.`;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume 카드 → 아이템 선택 모달 오픈.
            // 필터 통과 아이템이 없으면 조용히 스킵(카드 미소모).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('아이템 사용 프레임워크가 로드되지 않았다.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {
                    setMessage('이 카드는 아이템을 소비하지 않는다.');
                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                // D-81: 선택(floating) 중인 아이템은 사용 가능 대상에서 제외 — 모달 candidates와 일치시켜
                //   "리스트는 비었지만 hasAny=true"로 모달이 뜨는 부정합 방지.
                const selectedId = inventory?.selectedItem?.id;
                const hasAny = (inventory?.items || []).some(invItem => {
                    if (selectedId && invItem.id === selectedId) return false;
                    const def = InventorySystem.ITEMS[invItem.type] || {};
                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                // D-57 (2026-04-24): 바베큐 가상 선택지 제거 → 휴식 카드 요리 모달로 대체.
                //   [🔥 요리하기] 버튼은 CardItemConsumeModal 내부에서 노출.
                //   재료(meat_skewer/fish_skewer) 보유 시 활성, 없으면 회색 비활성.
                if (!hasAny) {
                    setMessage(`${card.name}: 지금 쓸 수 있는 아이템이 없다.`);
                    return;
                }
                // D-36: 휴식 등 scale이 걸린 카드는 모달이 "효과 증폭"을 시각적으로 강조해야 함.
                // scales(예: {recover: 2})를 그대로 넘겨 모달이 아이템 효과를 미리보기로 스케일.
                // 카드 이름/효과 텍스트는 카드별 안내 문구의 기본값으로 사용.
                const scaleHint = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `음식의 효과가 ${consume.scales.recover}배`
                    : null;
                const bonusHint = (consume.bonuses && consume.bonuses.recover && consume.bonuses.recover !== 0)
                    ? `음식의 효과에 +${consume.bonuses.recover}`
                    : null;
                const hintText = (scaleHint || bonusHint)
                    ? `${card.name}으로 인해 ${[scaleHint, bonusHint].filter(Boolean).join(' 및 ')}가 됩니다`
                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    bonuses: consume.bonuses || {},
                    hintText,
                    titleText: card.name + ' — 사용할 아이템',
                    emptyText: '쓸 만한 아이템이 없다.',
                });
            };

            // D-57: 요리 모달에서 레시피 확정 시 호출.
            //   inventory.craftRecipe로 재료 소비 + 결과물 배치. 휴식 카드는 소모하지 않음
            //   (요리 자체로는 시간/발각 진행 없음 — 휴식 모달로 복귀 후 식사까지 이어지면
            //    그때 카드가 소비됨). 메시지는 "X을(를) 구웠다." 포맷.
            const handleCookRecipe = (recipe) => {
                if (!inventory) return;
                const res = inventory.craftRecipe(recipe);
                if (!res.ok) {
                    if (res.reason === 'no_space') setMessage('가방이 가득 차 요리 결과를 둘 곳이 없다.');
                    else if (res.reason === 'short_ingredients') setMessage('요리 재료가 부족하다.');
                    else setMessage('요리에 실패했다.');
                    return;
                }
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const resultMeta = notionItems.find(it => it && it.id === res.resultType);
                const resultName = (resultMeta && resultMeta['이름'])
                    || (InventorySystem.ITEMS[res.resultType] && InventorySystem.ITEMS[res.resultType].name)
                    || res.resultType;
                setMessage(`${resultName}을(를) 구웠다.`);
                setCookingOpen(false);
            };

            // consume 모달에서 아이템 하나 선택 → 실제 효과 적용.
            // 1) 아이템의 파싱된 effect를 scaleEffect로 변형 (예: 회복 x2)
            // 2) applyItemEffect로 스탯/카드 액션 디스패치
            // 3) 아이템 1개 인벤에서 제거 (일회용·비일회용 무관: 카드가 소비하는 맥락)
            // 4) 카드 본체 소모 + 시간/발각 반영
            const resolveConsumeChoice = (invItem) => {
                if (!pendingConsume) return;
                const Parser = window.EffectParser;
                const { card, consume } = pendingConsume;

                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || invItem.name));
                const parsedEffect = (notionItem && notionItem.effect) || null;

                let appliedMsg = '';
                if (parsedEffect && parsedEffect.usable && Parser) {
                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {}, consume.bonuses || {});
                    Parser.applyItemEffect(scaled, {
                        getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                        setStat: (name, val) => {
                            if (name === 'hunger') setHunger(val);
                            else if (name === 'health') setHealth(val);
                        },
                        addThrowCard: (cardId) => {
                            setCombatExtraCards(prev => {
                                const next = [...prev];
                                const idx = next.findIndex(c => c.id === cardId);
                                if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                                else next.push({ id: cardId, count: 1 });
                                return next;
                            });
                        },
                        setMessage
                    });
                    appliedMsg = `${def.name || invItem.name}을(를) 소모하고 ${Parser.describeEffect(scaled)}.`;
                } else {
                    appliedMsg = `${def.name || invItem.name}을(를) 소모했지만 별 효과는 없었다.`;
                }

                // 아이템 1개 소비
                if (inventory) {
                    inventory.removeItem(invItem);
                    inventory.items = inventory.items.filter(i => i.id !== invItem.id);
                }

                setPendingConsume(null);
                finalizeCardUse(card, appliedMsg);
            };

            const cancelConsume = () => {
                setPendingConsume(null);
                // D-57: 요리 모달도 함께 닫아 루즈한 상태 잔존 방지.
                setCookingOpen(false);
            };

            // 카드 사용
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('시간이 부족합니다!');
                    return;
                }

                // D-46 (2026-04-23): hunt_start 카드 분기.
                //   현재 preys에서 target.preyId로 prey 찾기. 없으면 "사라졌다" 메시지 + 자원 미소모.
                //   있으면 즉시 소모(time+1/detection+2/손패 제거/무덤 추가) 후 activeHunt set.
                if (card.id === 'hunt_start') {
                    const targetId = card.target && card.target.preyId;
                    const prey = (preys || []).find(p => p.id === targetId);
                    if (!prey) {
                        // D-65: hunt_start는 무덤으로 가지 않고 소멸.
                        setMessage('사냥감이 사라졌다.');
                        setHand(prev => prev.filter(c => c.uid !== card.uid));
                        return;
                    }
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    // D-65: hunt_start는 무덤으로 가지 않고 소멸.
                    setHand(hand.filter(c => c.uid !== card.uid));
                    setTime(time + card.time);
                    const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                    setDetection(newDetection);
                    setActiveHunt({
                        prey: {
                            id: prey.id,
                            tileId: prey.tileId,
                            preyType: prey.preyType,
                            name: preyDef.name || prey.preyType,
                            // D-47: 이전 전투에서 준 데미지 누적 유지. hpCurrent가 있으면 그 값으로 시작.
                            hp: (typeof prey.hpCurrent === 'number') ? prey.hpCurrent : (preyDef.hp || 1),
                            meat: preyDef.meat || 1,
                            // D-71: prey 전용 드롭 아이템 id. 시트 `사냥감.drop_item` 컬럼.
                            //   빈값이면 handleHuntResolve에서 'meat' 폴백.
                            drop_item: preyDef.drop_item || '',
                            evade_rate: preyDef.evade_rate || 20,
                            // D-60: 턴별 회피율 CSV ("30,30,20") — 빈값이면 resolveHunt/UI에서 evade_rate로 폴백.
                            evade_per_turn: preyDef.evade_per_turn || '',
                            // D-60: 이 prey 개체가 그동안 몇 번 도망쳤는지 — 턴별 회피율에서 *10 차감.
                            fleeCount: prey.fleeCount || 0,
                            // D-74/D-75: Level 2 prey 4턴 시스템.
                            //   level=2면 HuntCombatModal이 4슬롯으로 구성, resolveHunt가 4턴 actions DSL 적용.
                            //   attack: prey 공격력 (유저가 받는 대미지 - 유저 카드 defense).
                            //   defense: prey 'defend' 턴의 방어값 (유저 공격 감쇄).
                            //   actions_per_turn: 4턴 행동 CSV.
                            level: Number(preyDef.level) || 1,
                            attack: Number(preyDef.attack) || 0,
                            defense: Number(preyDef.defense) || 0,
                            actions_per_turn: preyDef.actions_per_turn || ''
                        }
                    });
                    setMessage(`${preyDef.name || '사냥감'}과 전투를 시작한다.`);
                    return;
                }

                // D-23: consume 스펙이 있는 카드는 모달을 띄우고 선택 후 효과 적용.
                // 카드 본체 소모·시간·발각은 finalizeCardUse에서만 발생.
                if (card.consume) {
                    openConsumeForCard(card);
                    return;
                }

                // D-114: 뒤져보기·음식찾기는 가방 빈칸이 0이면 사용 불가(카드 미소모).
                //   findEmptySpace([[1]]) null = 1x1 들어갈 자리도 없음 → 가득.
                //   1칸이라도 있으면 통과. 결과가 다중일 때는 LootPickupModal로 분기(다음 단계).
                if ((card.id === 'search' || card.id === 'find_food')
                    && inventory && !inventory.findEmptySpace([[1]])) {
                    setMessage('가방이 꽉 차서 사용할 수 없다.');
                    return;
                }

                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);

                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);

                let msg = `${card.name}을(를) 사용했다.`;

                if (card.id === 'search') {
                    // D-28(2026-04-22, 요한 지시): 뒤져보기는 3슬롯 독립 추첨(100/20/20).
                    // 슬롯 확률/개수 자체는 비공개. 결과만 메시지+토스트로 노출.
                    // 여러 개 획득 시 같은 아이템은 개수 누적, 묶음 토스트 1개.
                    //
                    // D-34: 타일 type === 'good'이면 슬롯 확률이 상향(100/80/80).
                    // D-35: 같은 타일 반복·복귀 뒤져보기에는 페널티 곱수가 붙는다
                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLoot가
                    //       tile 객체를 받아 안에서 처리한다.
                    //
                    // D-114: 결과 길이 ≥ 2면 자동 인입 안 하고 LootPickupModal로.
                    //   유저가 챙길 항목을 직접 선택. 카드 자체는 이미 소모된 상태(시간/발각 정상).
                    //   결과 1개면 기존대로 자동 인입 + LootToast.
                    const tile = tiles[currentTile];
                    const currentRegion = tile?.region;
                    // D-78: 사체 타일 첫 뒤져보기 → 일반 region 드롭풀 + 생고기 +1 보너스.
                    //   이미 1회 뽑았으면(carcassMeatTaken에 등록) 보너스 없이 일반 드롭만.
                    const onCarcass = carcassTiles.has(currentTile);
                    const carcassBonus = onCarcass && !carcassMeatTaken.has(currentTile);
                    if (currentRegion) {
                        const drops = rollSearchLoot(currentRegion, tile);
                        // 모든 드롭 후보를 단일 배열로 합치기 (search + carcass 보너스).
                        const allDrops = drops.map(d => d.item);
                        if (carcassBonus) allDrops.push('meat');

                        // D-114 (D-115 정정): 다중 드롭이면 모달 — 단 가방 빈칸이 부족할 때만.
                        //   요한 정정: "1개만 드롭이면 자동, 2개 이상이라도 가방 공간 충분이면 자동.
                        //   빈칸 < 드롭 수일 때 어떤 걸 챙길지 선택 모달."
                        //   carcass 보너스 소진은 모달 마운트 시점 미리 처리(결과 확정 후라 1회 소진 간주).
                        let occupiedCells = 0;
                        for (const it of (inventory.items || [])) {
                            const idef = InventorySystem.resolveDef(it.type) || {};
                            const shape = idef.shape || [[1]];
                            for (const row of shape) for (const v of row) if (v) occupiedCells += 1;
                        }
                        const totalCells = inventory.rows * inventory.cols - (inventory.disabled ? inventory.disabled.size : 0);
                        const emptyCells = Math.max(0, totalCells - occupiedCells);
                        const needsPickup = allDrops.length >= 2 && allDrops.length > emptyCells;
                        if (needsPickup) {
                            if (carcassBonus) {
                                setCarcassMeatTaken(prev => {
                                    const next = new Set(prev);
                                    next.add(currentTile);
                                    return next;
                                });
                            }
                            // 타일 카운터는 자동 인입 분기와 동일하게 갱신.
                            setTiles(prev => prev.map(t =>
                                t.id === currentTile
                                    ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                    : t
                            ));
                            setLootPickup({
                                id: Date.now() + Math.random(),
                                drops: allDrops,
                                region: currentRegion
                            });
                            msg += `무언가를 발견했다. 챙길 것을 골라라.`;
                        } else {
                            // 단일 드롭(또는 0개) — 기존 자동 인입 흐름.
                            const counter = new Map();
                            let overflow = 0;
                            allDrops.forEach(item => {
                                const added = inventory.addItem(item);
                                if (added) {
                                    counter.set(item, (counter.get(item) || 0) + 1);
                                } else {
                                    overflow += 1;
                                }
                            });

                            if (carcassBonus) {
                                setCarcassMeatTaken(prev => {
                                    const next = new Set(prev);
                                    next.add(currentTile);
                                    return next;
                                });
                            }

                            if (counter.size > 0) {
                                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                const entries = [];
                                const nameParts = [];
                                counter.forEach((count, item) => {
                                    const def = InventorySystem.ITEMS[item] || {};
                                    const displayName = def.name || item;
                                    const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                    const grade = notionItem && notionItem['아이템 등급'];
                                    entries.push({ name: displayName, count, grade });
                                    nameParts.push(count > 1 ? `${displayName} ×${count}` : displayName);
                                });
                                msg += `${nameParts.join(', ')}을(를) 발견했다.`;
                                if (overflow > 0) msg += ` (가방이 가득 차 ${overflow}개는 두고 왔다.)`;
                                showLootToast(entries);
                            } else if (overflow > 0) {
                                msg += `쓸 만한 걸 찾았지만 가방이 가득 차 들고 오지 못했다.`;
                            } else {
                                msg += `이 근처에는 쓸만한 게 없다.`;
                            }

                            setTiles(prev => prev.map(t =>
                                t.id === currentTile
                                    ? { ...t, searchedCount: (t.searchedCount || 0) + 1 }
                                    : t
                            ));
                        }
                    } else {
                        // 안전망: region 없는 타일(구버전 세이브 등)은 레거시 동작
                        inventory.addItem('material_low');
                        msg += `재료를 발견했다.`;
                    }
                } else if (card.id === 'find_food') {
                    // '음식 찾기' 카드 — food 카테고리 강제 드롭(요한 지시 2026-04-22).
                    // 'food' 독립 아이템은 제거됐으므로, 지역의 음식재료 풀에서 직접 추첨.
                    // 지역에 food 풀이 비어있으면(시냇물 등) 폴백 메시지.
                    //
                    // D-40 (2026-04-23 요한 지시): search와 동일하게 LootToast 노출.
                    // 단일 아이템이라 entries 배열에 원소 1개. 가방이 찬 경우(added=false)는
                    // 토스트 생략(기존 search 분기와 동일한 규칙: 실제 획득한 것만).
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item } = rollTileDrop(currentRegion, { forceCategory: 'food' });
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            if (added) {
                                msg += `${def?.name || item}을(를) 찾아냈다.`;
                                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                const displayName = def?.name || item;
                                const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                const grade = notionItem && notionItem['아이템 등급'];
                                showLootToast([{ name: displayName, count: 1, grade }]);
                            } else {
                                msg += `${def?.name || item}을(를) 찾았지만 가방이 가득 찼다.`;
                            }
                        } else {
                            msg += `먹을 만한 건 보이지 않는다.`;
                        }
                    } else {
                        msg += '먹을 만한 건 보이지 않는다.';
                    }
                } else if (card.id === 'listen') {
                    // D-31 (2026-04-22 보강):
                    //   listen 카드의 기본 효과는 "인접 타일 revealed" — 거리와 무관하게 항상 실행.
                    //   그 위에 거리별 청각 메시지(보스와의 BFS 거리)가 중첩된다.
                    //   1칸  → 보스 위치 노출 + 인접 revealed
                    //   2칸  → "숨쉬는 소리가 꽤 가까이..." + 인접 revealed
                    //   3칸  → "발걸음 소리가 가까워진듯..." + 인접 revealed
                    //   ≥4칸 → "발걸음 소리가 아주 멀리서..." + 인접 revealed
                    // (직전 버전에서 2칸 이상일 때 revealed를 끊었으나, 이는 listen의 핵심 기능을
                    //  제거한 회귀였음. 요한 QA 2026-04-22 지시로 복구.)
                    const bossPos = boss.getPosition();
                    // D-55 (2026-04-23 요한 지시): 청각 거리는 physical hex 거리 사용.
                    // calculateDistance(path-BFS)는 빈 슬롯·비육각 이웃 영향으로
                    // 공간적으로 가까워도 "멀다"고 말할 수 있어 listen 용도엔 부적합.
                    const bossDist = boss.calculateHexDistance(currentTile, bossPos);

                    // 인접 타일 revealed — 거리 무관하게 항상 실행되는 listen의 기본 효과.
                    let newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    // D-80 (2026-04-24 요한 지시): 길찾기 난이도 하향 — 정보가 밝혀진 타일의
                    // connections 중 아직 공개 전인 타일을 silhouette으로 마킹. HexTile이 맵보기의
                    // dim 색상(#444 / opacity 0.22)으로 윤곽만 노출. 영구 유지(이후 revealed/visited 되면
                    // 자연스럽게 상위 스타일로 승격). 이동 가능 여부는 기존대로 canMove 판정.
                    const silhouetteIds = new Set();
                    newTiles.forEach(t => {
                        if (!t.revealed && !t.visited) return;
                        (t.connections || []).forEach(cid => {
                            const target = newTiles[cid];
                            if (!target) return;
                            if (target.revealed || target.visited) return;
                            silhouetteIds.add(cid);
                        });
                    });
                    if (silhouetteIds.size > 0) {
                        newTiles = newTiles.map(t =>
                            silhouetteIds.has(t.id) ? { ...t, silhouette: true } : t
                        );
                    }
                    setTiles(newTiles);

                    // listen 보스 감지 → TileEventToast로 시각화 (공룡 아이콘 + 단계별 테두리 색).
                    // 색 코드: 빨강(인접 1칸, 즉사 경고) / 노랑(2~3칸, 경계) / 초록(≥4칸, 안심).
                    // 1칸은 추가로 점프스케어 오버레이를 터뜨려 공포감 강화.
                    // (기존 하단 메시지 패널은 서사적 톤과 어울리지 않아 시인성 떨어진다는 요한 피드백.)
                    if (bossDist === 1) {
                        // D-42: 보스 위치 노출은 이 순간만. 이동 시 moveTo에서 다시 false로.
                        setBossVisible(true);
                        setBossJumpscare(true);
                        // D-90 (2026-04-25 요한 지시): 인접 1칸 + 보스 포식중이면 점프스케어
                        // 직후 "포식중인 짐승" 모달. 일반 토스트 대신 모달 한 장만 띄움.
                        if (boss.predationStay > 0) {
                            const preyType = boss.predationPreyType;
                            // D-94: bait 포식 시 prey 이름/이모지 분기.
                            let preyName, preyEmoji;
                            if (preyType === '__bait__') {
                                preyName = '거대한 먹이';
                                preyEmoji = '🍖';
                            } else {
                                const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                                const preyDef = preyDataArr.find(p => p.id === preyType);
                                preyName = (preyDef && preyDef.name) || '사냥감';
                                preyEmoji = PREY_EMOJI[preyType] || '🐾';
                            }
                            // 점프스케어 길이 ~0.8s 후에 모달 마운트해 시퀀스 분리.
                            setTimeout(() => {
                                setPredationListenInfo({ preyType, preyName, preyEmoji });
                            }, 800);
                        } else {
                            showTileEventToast({
                                emoji: '🦖',
                                title: '보스 근접',
                                message: `가쁜 숨소리가 바로 곁에서 들려온다. 보스는 타일 #${bossPos}에 있다.`,
                                color: '#ff3b3b'
                            });
                        }
                    } else if (bossDist === 2) {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 경계',
                            message: '숨쉬는 소리가 꽤 가까이 들리는 듯 하여 소름이 돋는다.',
                            color: '#ffb300'
                        });
                    } else if (bossDist === 3) {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 감지',
                            message: '발걸음 소리가 가까워진듯 하다.',
                            color: '#ffb300'
                        });
                    } else {
                        showTileEventToast({
                            emoji: '🦖',
                            title: '보스 탐지',
                            message: '발걸음 소리가 아주 멀리서 들린다, 당분간은 안심해도 될 것 같다.',
                            color: '#4CAF50'
                        });
                    }

                    // D-46 (2026-04-23): listen 인접 사냥감 흔적 감지.
                    //   현재 타일의 인접 타일 ∩ preys tileId = "기척이 느껴지는 타일".
                    //   종류는 비공개(👣 마커만). preyTraceTiles Set에 해당 tileId 누적.
                    //   보스 내레이션·D-42 bossVisible과 독립된 섹션 — 기존 로직 건드리지 않음.
                    const neighborIds = tiles[currentTile].connections;
                    const traceHits = (preys || [])
                        .filter(p => neighborIds.includes(p.tileId))
                        .map(p => p.tileId);
                    if (traceHits.length > 0) {
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            traceHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\n근처에서 희미한 기척이 느껴진다.';
                    }

                    // D-78: 인접 사체 타일 감지 — 👣 대신 🦴 trace.
                    //   carcassTiles ∩ 인접 = "사체 냄새가 나는 타일".
                    const carcassHits = neighborIds.filter(nid => carcassTiles.has(nid));
                    if (carcassHits.length > 0) {
                        setCarcassTraceTiles(prev => {
                            const next = new Set(prev);
                            carcassHits.forEach(id => next.add(id));
                            return next;
                        });
                        msg += '\n어디선가 짐승의 사체 냄새가 풍긴다.';
                    }
                } else if (card.id === 'hide') {
                    msg += '조용히 몸을 숨겼다.';
                }
                
                setMessage(msg);
            };

            // 타일 이동 (D-90: targetId === currentTile이면 "제자리에서 시간 보내기" — 다른
            //   타일로 이동한 것과 동일한 규칙 적용. 모든 부수 효과(시간/배고픔/발각률/보스
            //   이동/손패 사이클 등)가 그대로 흐른다. HexTile onClick에서 isCurrent면 별도
            //   확인 모달을 거쳐 이 함수에 self target을 넘기도록 한다).
            const moveTo = (targetId) => {
                const isWaitInPlace = targetId === currentTile;
                if (!isWaitInPlace && !tiles[currentTile].connections.includes(targetId)) {
                    setMessage('그곳으로는 갈 수 없습니다!');
                    return;
                }

                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                setHunger(hunger - 1);
                setTime(0);

                // D-42: 이동하는 순간 보스 위치 다시 안개 속으로.
                // 지형 revealed는 그대로 두고 보스 아이콘만 숨긴다.
                // (공포 원칙: 한 번 본 위치를 계속 신뢰하지 못하도록.)
                setBossVisible(false);

                // 이동마다 발각률 +5% (요한 지시 2026-04-22).
                // 카드의 detection 가중치와 별개로, 단순 이동 자체가 보스에게 드러나는 기본 위험.
                // 상한 100. detection state는 이후 chaseMode 전환 판정(>=80)에 그대로 쓰임.
                const movedDetection = Math.min(100, detection + 5);
                setDetection(movedDetection);
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const mapGen = new MapGenerator(MAP_SIZE);
                const positions = mapGen.generateHexPositions();
                const targetNeighbors = mapGen.getHexNeighbors(targetId, positions);
                
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        // 도착한 타일은 즉시 모든 정보 공개
                        return { ...t, visited: true, discovered: true, revealed: true };
                    }
                    // D-35: 플레이어가 직전 타일을 '떠났다'는 사실 기록.
                    // 이후 돌아오더라도 true로 유지되어 반복 페널티의 초기 0.5 곱수가 적용된다.
                    if (t.id === currentTile) {
                        return {
                            ...t,
                            hasBeenLeft: true,
                            // 같은 속성의 인접 타일도 discovered 유지
                            discovered: targetNeighbors.includes(t.id) ? true : t.discovered
                        };
                    }
                    // 새로운 위치의 물리적 인접 타일들을 discovered로 설정
                    if (targetNeighbors.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                setMoveHistory(prev => [...prev, targetId]);

                // D-125: 도착 지역 1인칭 내레이션. 카드 액션 후속 메시지가 없으면
                //   이 텍스트가 화면에 남는다. 후속 카드 사용 시 자연 덮어쓰기.
                {
                    const arrivedTile = newTiles[targetId];
                    const region = arrivedTile && arrivedTile.region;
                    const narrative = (region && REGION_ARRIVE_NARRATIVE[region]) || null;
                    if (narrative) setMessage(narrative);
                }

                // D-78: 방문한 타일이 carcassTrace에 있었다면 정리 (이제 visited → 중앙 🦴로 표시).
                if (carcassTraceTiles.has(targetId)) {
                    setCarcassTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(targetId);
                        return next;
                    });
                }

                // D-90 (2026-04-25 요한 지시): 사체 타일 첫 도착 시 경고 메시지.
                //   "거대한 짐승이 무자비하게 (사냥감 이름)을 뜯어먹은 흔적이다, 조심하자."
                //   재방문/제자리 대기에는 침묵. carcassTiles는 Map<tileId, {preyType}>.
                // D-94: bait 포식 흔적은 다른 톤 — 이름이 아니라 "거대한 먹이가 사라졌다"로 분기.
                if (!isWaitInPlace && carcassTiles.has(targetId) && !carcassVisitedTiles.has(targetId)) {
                    const carcassInfo = carcassTiles.get(targetId) || {};
                    let baitMessage;
                    if (carcassInfo.preyType === '__bait__') {
                        baitMessage = '놓아둔 먹이가 깨끗이 사라졌다. 거대한 짐승의 식사 흔적이다. 조심하자.';
                    } else {
                        const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                        const preyDef = preyDataArr.find(p => p.id === carcassInfo.preyType);
                        const preyName = (preyDef && preyDef.name) || '사냥감';
                        baitMessage = `거대한 짐승이 무자비하게 ${preyName}을(를) 뜯어먹은 흔적이다. 조심하자.`;
                    }
                    showTileEventToast({
                        emoji: '🦴',
                        title: '짐승의 식사 자리',
                        message: baitMessage,
                        color: '#a83232'
                    });
                    setCarcassVisitedTiles(prev => {
                        const next = new Set(prev);
                        next.add(targetId);
