        }

        // D-57 (2026-04-24 мЪФнХЬ мІАмЛЬ): мЪФл¶ђ л™®лЛђ.
        //   - нЬімЛЭ мєілУЬмЭШ [рЯФ• мЪФл¶ђнХШкЄ∞] л≤ДнКЉмЧРмДЬлІМ нШЄмґЬ.
        //   - 1мЮђл£М мЪФл¶ђ л†ИмЛЬнФЉ(ingredients.length===1 && result.startsWith('grilled_'))лІМ лЕЄмґЬ.
        //   - к∞Б л†ИмЛЬнФЉ мєілУЬ: мЮђл£М вЖТ к≤∞к≥ЉлђЉ лѓЄл¶ђл≥ікЄ∞ + [рЯФ• мЪФл¶ђнХШкЄ∞] л≤ДнКЉ.
        //     мЮђл£М л≥імЬ† мЛЬлІМ нЩЬмД±. нБіл¶≠ мЛЬ inventory.craftRecipe нШЄмґЬ вЖТ к≤∞к≥ЉлђЉ мГЭмД±.
        //   - нЬімЛЭ л™®лЛђмЭА л∞±кЈЄлЭЉмЪілУЬмЧР мЬ†мІА вАФ мЩДмД±лРЬ кµђмЭіл•Љ л∞Фл°Ь мЛЭмВђ нЫДл≥іл°Ь мД†нГЭ к∞АлК•.
        function CookingModal({ inventory, onCook, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byId = (id) => notionItems.find(it => it && it.id === id);
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => {
                const nDef = byId(type);
                if (nDef && nDef['мЭіл¶Д']) return nDef['мЭіл¶Д'];
                return defOf(type).name || type;
            };

            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                ? window.TTD_DATA.COMBOS : [];
            const recipes = combos.filter(r =>
                r && Array.isArray(r.ingredients)
                && r.ingredients.length === 1
                && typeof r.result === 'string'
                && r.result.startsWith('grilled_')

            const items = (inventory && inventory.items) || [];
            const countOf = (type) => items.filter(i => i.type === type).length;

            return (

                    <div

                        {recipes.length === 0 ? (

                                {recipes.map((recipe, idx) => {

                                    const canDo = has >= 1;
                                    const ingName = nameOf(ingType);
                                    const resultName = nameOf(recipe.result);
                                    const resultMeta = byId(recipe.result);
                                    const summary = resultMeta && resultMeta['нЪ®к≥Љ мЪФмХљ'];
                                    return (
                                        <div
                                            key={`cook:${idx}:${recipe.result}`}
                                            style={{
                                                padding: '10px 12px',
                                                background: canDo ? '#2a1f14' : '#1a1f2e',
                                                border: `1px solid ${canDo ? '#5a3a1f' : '#333'}`,

                                            }}
                                        >
                                            <div style={{ fontSize: '13px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                {/* D-92: 1лЛ®к≥Д мЮђл£МлКФ emojiл°Ь. к≤∞к≥Љ(2лЛ®к≥Д+)лКФ мЭіл¶Д кЈЄлМАл°Ь. */}
                                                <span style={{ color: canDo ? '#ffd79e' : '#888', display: 'inline-flex', alignItems: 'center' }}>
                                                    {(() => {
                                                        const e = itemEmoji(ingType);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : ingName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#666', margin: '0 4px' }}>вЖТ</span>
                                                <span style={{ color: canDo ? '#fff' : '#888', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
                                                    {(() => {
                                                        const e = itemEmoji(recipe.result);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : resultName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#888', marginLeft: 'auto', fontSize: '11px' }}>
                                                    (л≥імЬ† {has})
                                                </span>
                                            </div>
                                            {summary && (
                                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '6px' }}>
                                                    {summary}
                                                </div>
                                            )}
                                            <button
                                                onClick={() => canDo && onCook(recipe)}
                                                disabled={!canDo}
                                                style={{
                                                    width: '100%',
                                                    padding: '8px',
                                                    background: canDo ? '#5a3a1f' : '#2a2a2e',
                                                    border: `1px solid ${canDo ? '#d4883a' : '#444'}`,
                                                    color: canDo ? '#ffd79e' : '#888',
                                                    fontSize: '12px',
                                                    fontWeight: 600,
                                                    cursor: canDo ? 'pointer' : 'not-allowed'
                                                }}
                                            >
                                                {canDo ? 'рЯФ• мЪФл¶ђнХШкЄ∞' : 'мЮђл£МлґАм°±'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-47 нХ©мД± нМ®лДР вАФ мЭЄл≤§ л™®лЛђ нХШлЛ®мЧР к≥†м†ХлРЬ л∞Ф нШХнГЬ.
        //   - лУЬл°≠лРЬ лСР мЮђл£М(pair) м§С нХШлВШ мЭімГБ нПђнХ®лРЬ л™®лУ† л†ИмЛЬнФЉ мєілУЬ лЕЄмґЬ.
        //   - к∞Б мєілУЬ: мЮђл£М(нХДмЪФ мИШлЯЙ) + к≤∞к≥Љ, л≥імЬ†лЯЙмЬЉл°Ь мЩДмД± к∞АлК• мЧђлґА¬ЈлґАм°± мЮђл£М нСЬкЄ∞.
        //   - [лІМлУ§кЄ∞] л≤ДнКЉ: мЮђл£М мґ©лґД + к≤∞к≥ЉлђЉ лЖУмЭД лєИ мКђл°ѓ мЮИмЭД лХМлІМ нЩЬмД±.
        //   - к∞ЩмЭА мЮђл£М л®ЄмІАлКФ мЭі нМ®лДРмЧР мХИ лЬЄ (м¶ЙмЛЬ мЛ§нЦЙ к≤љл°Ь).
        //   D-104 (2026-04-27 мЪФнХЬ мІАмЛЬ): нХ≠мГБ л†МлНФ. лєДмД†нГЭ мЛЬ мєінЕМк≥†л¶ђ нГ≠ 5мҐЕ лЕЄмґЬ.
        //     showCategoryTabs=trueл©і [м†Дм≤і][мЭМмЛЭ][лђікЄ∞][л∞©мЦікµђ][мЮђл£М] нГ≠, onCategoryChangeл°Ь л≥Ак≤љ.
        //     onCloseк∞А nullмЭіл©і нЧ§лНФ лЛЂкЄ∞ л≤ДнКЉ мИ®кєА(лєДмД†нГЭ мГБнГЬ = к∞Ал∞© лЛЂкЄ∞л°ЬлІМ мҐЕл£М).
        function CraftPanel({ recipes, inventory, onCraft, onClose, showCategoryTabs, category, onCategoryChange }) {
            const items = (inventory && inventory.items) || [];
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => defOf(type).name || type;

            // к∞Б л†ИмЛЬнФЉ мГБнГЬ к≥ДмВ∞: мЮђл£М мґ©лґД + к≤∞к≥Љ л∞∞мєШ к≥µк∞Д мЧђлґА.
            const cards = recipes.map(recipe => {
                const evalR = InventorySystem.evaluateRecipe(recipe, items);
                const resultDef = defOf(recipe.result);
                const hasSpace = !!inventory.findEmptySpace(resultDef.shape || [[1]]);
                let disabledReason = null;
                if (!evalR.canCraft) disabledReason = 'short';
                else if (!hasSpace) disabledReason = 'no_space';
                return { recipe, evalR, hasSpace, disabledReason };
            });
            // лІМлУ§ мИШ мЮИлКФ к≤Г л®Љм†А, к≥µк∞ДлґАм°±, мЮђл£МлґАм°± мИЬ.
            cards.sort((a, b) => {
                const rank = { null: 0, 'no_space': 1, 'short': 2 };
                return (rank[a.disabledReason] ?? 0) - (rank[b.disabledReason] ?? 0);
            });

            const CATEGORY_TABS = [
                { id: 'all', label: 'м†Дм≤і' },
                { id: 'food', label: 'мЭМмЛЭ' },
                { id: 'weapon', label: 'лђікЄ∞' },
                { id: 'armor', label: 'л∞©мЦікµђ' },
                { id: 'material', label: 'мЮђл£М' },
            ];

            return (
                <div style={{
                    position: 'sticky',
                    bottom: 0,
                    background: '#0f1a2e',
                    border: '1px solid #2a3a5e',
                    borderRadius: '8px',
                    padding: '10px',
                    marginTop: '8px',
                    maxHeight: '55vh',
                    overflowY: 'auto',
                    WebkitOverflowScrolling: 'touch'
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                        <div style={{ fontSize: '13px', fontWeight: 600, color: '#d4b84a' }}>
                            рЯФ® лІМлУ§ мИШ мЮИлКФ м°∞нХ©
                        </div>
                        {onClose && (
                            <button

                                style={{ padding: '3px 8px', fontSize: '11px' }}

                            </button>

                    </div>
                    {showCategoryTabs && (
                        <div style={{
                            display: 'flex',
                            gap: '4px',
                            marginBottom: '8px',
                            flexWrap: 'wrap'
                        }}>

                                const active = category === tab.id;
                                return (
                                    <button

                                            fontSize: '11px',
                                            background: active ? '#d4b84a' : '#1a2f3e',
                                            color: active ? '#1a1a2e' : '#aaa',
                                            border: `1px solid ${active ? '#d4b84a' : '#2e5a6e'}`,
                                            fontWeight: active ? 700 : 500,

                                    </button>

                            })}

                        <div style={{ fontSize: '11px', color: '#666', padding: '12px 4px', textAlign: 'center' }}>
                            мЭі мєінЕМк≥†л¶ђмЧР лІМлУ§ мИШ мЮИлКФ м°∞нХ©мЭі мЧЖлЛ§.
                        </div>
                    )}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                        {cards.map(({ recipe, evalR, disabledReason }, idx) => {
                            const need = evalR.need;
                            const shortage = evalR.shortage;
                            const buttonDisabled = disabledReason !== null;
                            const buttonLabel = disabledReason === 'no_space'
                                ? 'к≥µк∞ДлґАм°±'
                                : disabledReason === 'short'
                                    ? 'мЮђл£МлґАм°±'
                                    : 'лІМлУ§кЄ∞';
                            return (
                                <div
                                    key={`recipe:${idx}:${recipe.result}`}
                                    style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '6px',
                                        padding: '8px',
                                        background: buttonDisabled ? '#1a1f2e' : '#1a2f3e',
                                        borderRadius: '6px',
                                        border: `1px solid ${buttonDisabled ? '#333' : '#2e5a6e'}`
                                    }}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flex: 1, flexWrap: 'wrap' }}>
                                        {Object.entries(need).map(([type, count], i) => {
                                            const short = shortage[type] || 0;
                                            const has = (evalR.have[type] || 0);
                                            // D-92: 1лЛ®к≥Д мЮђл£МлКФ emojiл°Ь лЕЄмґЬ.
                                            const emoji = itemEmoji(type);
                                            return (
                                                <React.Fragment key={`${type}:${i}`}>
                                                    {i > 0 && <span style={{ color: '#666' }}>+</span>}
                                                    <span style={{
                                                        fontSize: '12px',
                                                        color: short > 0 ? '#ff7777' : '#fff',
                                                        fontWeight: 500,
                                                        display: 'inline-flex',
                                                        alignItems: 'center',
                                                        gap: '2px'
                                                    }}>
                                                        {emoji
                                                            ? <span style={{ fontSize: '18px', lineHeight: 1 }}>{emoji}</span>
                                                            : nameOf(type)}
                                                        <span style={{ fontSize: '10px', color: short > 0 ? '#ff9999' : '#aaa', marginLeft: '2px' }}>
                                                            {has}/{count}
                                                        </span>
                                                    </span>
                                                </React.Fragment>
                                            );
                                        })}
                                        <span style={{ color: '#666', margin: '0 4px' }}>=</span>
                                        <span style={{ fontSize: '12px', fontWeight: 600, color: '#d4b84a', display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
                                            {(() => {
                                                const e = itemEmoji(recipe.result);
                                                return e
                                                    ? <span style={{ fontSize: '18px', lineHeight: 1 }}>{e}</span>
                                                    : nameOf(recipe.result);
                                            })()}
                                        </span>
                                    </div>
                                    <button
                                        onClick={() => onCraft(recipe)}
                                        disabled={buttonDisabled}

                                            padding: '6px 10px',
                                            fontSize: '12px',
                                            fontWeight: 600,
                                            background: buttonDisabled ? '#333' : '#4CAF50',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: buttonDisabled ? 'not-allowed' : 'pointer'
                                        }}
                                    >
                                        {buttonLabel}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>

                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            <button
                                onClick={onCancel}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '8px 18px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}
                            >
                                мЈ®мЖМ
                            </button>
                            <button
                                onClick={onConfirm}
                                style={{
                                    background: '#8B0000',
                                    color: '#fff',
                                    border: 'none',
                                    padding: '8px 22px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px',
                                    fontWeight: 700
                                }}
                            >
                                нЩХмЭЄ
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // мЇ†нФД мЭЄл≤§ кЈЄл¶ђлУЬ (12x8 лУ±). InventoryModalк≥Љ лПЩмЭЉ л£©.
        //   D-113: cellSize¬ЈonItemClick¬ЈselectedIds¬ЈonCellLongPress мШµмЕШ мґФк∞А.
        //     - мЕА нБђкЄ∞л•Љ нШЄмґЬлґАмЧРмДЬ м°∞м†И(мЮСмЭА лѓЄл¶ђл≥ікЄ∞ / PackTransferModalмЧРмДЬ лНФ мЮСк≤М).
        //     - selectedIds: Set лШРлКФ л∞∞мЧі. нПђнХ®лРЬ item.idлКФ 'selected' нБілЮШмК§ лґАмЧђ.
        //     - onItemClick(item): мХДмЭінЕЬ мШБмЧ≠ нГ≠ вАФ лЛ§м§СмД†нГЭ нЖ†кЄА лУ±мЧР мВђмЪ©.
        //     - onItemLongPress(item): кЄЄк≤М лИДл•іл©і ItemInfoModal мЧікЄ∞ лУ±.
        //   кЄ∞л≥ЄмЭА м†Хм†Б нСЬмЛЬ(нБіл¶≠ нХЄлУ§лЯђ мЧЖмЭМ).
        function CampInventoryGrid({ inventory, cellSize, selectedIds, onItemClick, onItemLongPress }) {
            if (!inventory) return null;
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = Number(cellSize) > 0 ? Number(cellSize) : 36;
            const PAD = 3;
            const selSet = selectedIds instanceof Set
                ? selectedIds
                : (Array.isArray(selectedIds) ? new Set(selectedIds) : null);

            // кЄЄк≤М лИДл•ікЄ∞(л°±нФДл†ИмК§) к∞РмІА вАФ 500ms.
            const pressTimerRef = React.useRef(null);
            const longFiredRef = React.useRef(false);
            const startPress = (item) => {
                longFiredRef.current = false;
                if (typeof onItemLongPress !== 'function') return;
                pressTimerRef.current = setTimeout(() => {
                    longFiredRef.current = true;
                    onItemLongPress(item);
                }, 500);
            };
            const cancelPress = () => {
                if (pressTimerRef.current) {
                    clearTimeout(pressTimerRef.current);
                    pressTimerRef.current = null;
                }
            };
            const handleClick = (item) => {
                if (longFiredRef.current) return;
                if (typeof onItemClick === 'function') onItemClick(item);
            };

            return (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                        gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                        gap: '2px',
                        background: '#0f3460',
                        padding: `${PAD}px`,
                        borderRadius: '8px'
                    }}>
                        {Array(ROWS).fill(null).map((_, row) =>
                            Array(COLS).fill(null).map((_, col) => {
                                const occupied = !!inventory.grid[row][col];
                                const disabled = inventory.isDisabled && inventory.isDisabled(col, row);
                                return (
                                    <div
                                        key={`${row}-${col}`}
                                        className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                        style={disabled ? { background: '#0a1a2a', opacity: 0.35 } : undefined}
                                    />
                                );
                            })
                        )}
                    </div>
                    {inventory.items.map(item => {
                        const w = item.shape[0].length;
                        const h = item.shape.length;
                        const emoji = itemEmoji(item.type);
                        const selected = selSet && selSet.has(item.id);
                        const interactive = typeof onItemClick === 'function' || typeof onItemLongPress === 'function';
                        return (
                            <div
                                key={item.id}
                                className={`inventory-item${selected ? ' selected' : ''}`}
                                style={{
                                    left: `${item.x * CELL + PAD}px`,
                                    top: `${item.y * CELL + PAD}px`,
                                    width: `${w * CELL - PAD}px`,
                                    height: `${h * CELL - PAD}px`,
                                    fontSize: '9px',
                                    cursor: interactive ? 'pointer' : 'default',
                                    pointerEvents: interactive ? 'auto' : 'none',
                                    outline: selected ? '2px solid #4dd0e1' : undefined,
                                    boxShadow: selected ? '0 0 8px rgba(77,208,225,0.55)' : undefined,
                                    zIndex: selected ? 2 : 1
                                }}
                                onClick={() => handleClick(item)}
                                onMouseDown={() => startPress(item)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onTouchStart={() => startPress(item)}
                                onTouchEnd={cancelPress}
                                onTouchCancel={cancelPress}
                            >
                                {emoji
                                    ? <span style={{ fontSize: Math.round(CELL * 0.55) + 'px', lineHeight: 1 }}>{emoji}</span>
                                    : item.name}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // D-113: л≥ікіАнХ® лЛ®лПЕ нТАмК§нБђл¶∞ нМЭмЧЕ.
        //   мЇ†нФД [л≥ікіАнХ®] л≤ДнКЉмЧРмДЬ мЧіл¶Љ. 12x8 кЈЄл¶ђлУЬл•Љ нХЬлИИмЧР.
        //   мХДмЭінЕЬ кЄЄк≤М лИДл•іл©і ItemInfoModalл°Ь м†Хл≥і нСЬмЛЬ.
        function StorageModal({ inventory, onClose }) {
            const [infoItem, setInfoItem] = React.useState(null);
            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px 18px 24px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(94vw, 460px)',
                        margin: '24px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>рЯУ¶ л≥ікіАнХ®</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >лЛЂкЄ∞</button>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'center' }}>
                            <CampInventoryGrid
                                inventory={inventory}
                                cellSize={40}
                                onItemLongPress={(it) => setInfoItem(it)}
                            />
                        </div>
                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', marginTop: '10px' }}>
                            мХДмЭінЕЬмЭД кЄЄк≤М лИДл•іл©і м†Хл≥іл•Љ л≥Љ мИШ мЮИлЛ§.
                        </div>
                    </div>
                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={() => setInfoItem(null)}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // D-113: мЭЄл≤§ к∞Д мХДмЭінЕЬ мЭім†Д вАФ мЭЄмК§нДімК§ мІБм†С placement (durability/rotation л≥ім°і).
        //   selectedIds: мШЃкЄЄ source мХДмЭінЕЬ id л∞∞мЧі.
        //   src/dst: InventorySystem мЭЄмК§нДімК§. dstмЧР лєИ мЮРл¶ђ мЧЖмЬЉл©і лґАлґД мЭім†Д(лУ§мЦік∞Д лІМнБЉлІМ).
        //   л∞ШнЩШ: { moved: [item...], failed: [item...] } вАФ нШЄмґЬлґА нЖ†мК§нКЄ л©ФмЛЬмІАмЧР мВђмЪ©.
        //   srcмЧРмДЬ м†Ьк±∞ + dstмЧР мГИ мҐМнСЬл°Ь placeItem. idлКФ dst мЄ°мЧРмДЬ мГИл°Ь л∞ЬкЄЙ(к∞ЩмЭА id мґ©лПМ л∞©мІА).
        function transferItems(src, dst, selectedIds) {
            const idSet = new Set(selectedIds || []);
            const moved = [];
            const failed = [];
            // src.itemsл•Љ л≥µмВђ нЫД мИЬнЪМ вАФ removeItem мЛЬ src.itemsлПД к∞±мЛ†лРШлѓАл°Ь лѓЄл¶ђ лЦ†лСРкЄ∞.
            const targets = src.items.filter(it => idSet.has(it.id));
            for (const it of targets) {
                const shape = it.shape;
                const pos = dst.findEmptySpace(shape);
                if (!pos) { failed.push(it); continue; }
                const placed = {
                    ...it,
                    id: Date.now() + Math.random(),
                    x: pos.x,
                    y: pos.y
                };
                // srcмЧРмДЬ кЈЄл¶ђлУЬ лєДмЪ∞к≥† itemsмЧРмДЬ м†Ьк±∞.
                src.removeItem(it);
                src.items = src.items.filter(x => x.id !== it.id);
                // dstмЧР л∞∞мєШ.
                dst.placeItem(placed);
                dst.items.push(placed);
                moved.push(placed);
            }
            return { moved, failed };
        }

        // D-113: л≥ікіАнХ® вЖФ к∞Ал∞© лЛ§м§СмД†нГЭ¬ЈмШЃкЄ∞кЄ∞¬ЈмДЬл°Ь л∞ФкЊЄкЄ∞ нТАмК§нБђл¶∞ л™®лЛђ.
        //   props.storage / props.pack вАФ InventorySystem мЭЄмК§нДімК§.
        //   props.onChange() вАФ л≥Ак≤љ нЫД лґАл™®мЧР мЮђл†МлНФ нКЄл¶ђк±∞ мХМл¶Љ (campState к∞Эм≤і мГИл°Ь лІМлУ§кЄ∞).
        //   props.onClose вАФ лЛЂкЄ∞.
        //   мГБнГЬ: selectedFromStorage / selectedFromPack (к∞Бк∞Б Set<itemId>).
        //   л≤ДнКЉ нЩЬмД±:
        //     - storageлІМ мД†нГЭ вЖТ [к∞Ал∞©мЬЉл°Ь]
        //     - packлІМ мД†нГЭ вЖТ [л≥ікіАнХ®мЬЉл°Ь]
        //     - мЦСм™љ мД†нГЭ вЖТ [мДЬл°Ь л∞ФкЊЄкЄ∞]
        function PackTransferModal({ storage, pack, onChange, onClose }) {
            const [selStorage, setSelStorage] = React.useState(() => new Set());
            const [selPack, setSelPack] = React.useState(() => new Set());
            const [toast, setToast] = React.useState(null);

            const toggle = (which, id) => {
                const setter = which === 'storage' ? setSelStorage : setSelPack;
                setter(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 1800);
            };

            const onlyStorage = selStorage.size > 0 && selPack.size === 0;
            const onlyPack = selPack.size > 0 && selStorage.size === 0;
            const both = selStorage.size > 0 && selPack.size > 0;

            // [к∞Ал∞©мЬЉл°Ь мШЃкЄ∞кЄ∞]
            const moveToPack = () => {
                const ids = Array.from(selStorage);
                const r = transferItems(storage, pack, ids);
                if (r.failed.length > 0) {
                    showToast(`к∞Ал∞©мЭі к∞АлУЭ вАФ ${r.moved.length}к∞ЬлІМ мШЃкєА`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}к∞Ьл•Љ к∞Ал∞©мЬЉл°Ь`);
                }
                setSelStorage(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [л≥ікіАнХ®мЬЉл°Ь мШЃкЄ∞кЄ∞]
            const moveToStorage = () => {
                const ids = Array.from(selPack);
                const r = transferItems(pack, storage, ids);
                if (r.failed.length > 0) {
                    showToast(`л≥ікіАнХ®мЭі к∞АлУЭ вАФ ${r.moved.length}к∞ЬлІМ мШЃкєА`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}к∞Ьл•Љ л≥ікіАнХ®мЬЉл°Ь`);
                }
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [мДЬл°Ь л∞ФкЊЄкЄ∞] вАФ лПЩмЛЬмЧР мЦСм™љмЬЉл°Ь л≥ілВЄлЛ§.
            //   л®Љм†А мЦСм™љмЧРмДЬ мД†нГЭ мХДмЭінЕЬмЭД src.itemsмЧРмДЬ лЦЉмЦілВік≥†(gridлПД лєДмЫА),
            //   к∞Бк∞Б мГБлМАнОЄ dstмЧР лєИ мЮРл¶ђмЧР л∞∞мєШ. к≥µк∞Д лґАм°± мЛЬ лґАлґДлІМ мД±к≥µ.
            //   лґАлґД мД±к≥µ мЛЬ мЛ§нМ®нХЬ м™љмЭА мЫРлЮШ мЭЄл≤§мЧР лЛ§мЛЬ лєИ мЮРл¶ђл°Ь нПіл∞±.
            const swapBoth = () => {
                const sIds = Array.from(selStorage);
                const pIds = Array.from(selPack);
                const sItems = storage.items.filter(it => selStorage.has(it.id));
                const pItems = pack.items.filter(it => selPack.has(it.id));
                // 1) srcмЧРмДЬ лґДл¶ђ (мЦСм™љ л™®лСР).
                for (const it of sItems) {
                    storage.removeItem(it);
                    storage.items = storage.items.filter(x => x.id !== it.id);
                }
                for (const it of pItems) {
                    pack.removeItem(it);
                    pack.items = pack.items.filter(x => x.id !== it.id);
                }
                // 2) мГБлМАнОЄ dstмЧР л∞∞мєШ мЛЬлПД. мЛ§нМ® мЛЬ мЫРлЮШ мЭЄл≤§мЬЉл°Ь л≥µмЫР.
                let movedToPack = 0, movedToStorage = 0, failedBack = 0;
                const place = (item, dst) => {
                    const pos = dst.findEmptySpace(item.shape);
                    if (!pos) return false;
                    const placed = { ...item, id: Date.now() + Math.random(), x: pos.x, y: pos.y };
                    dst.placeItem(placed);
                    dst.items.push(placed);
                    return true;
                };
                for (const it of sItems) {
                    if (place(it, pack)) movedToPack += 1;
                    else {
                        // мЫРлЮШ storageл°Ь нПіл∞±.
                        if (!place(it, storage)) failedBack += 1;
                    }
                }
                for (const it of pItems) {
                    if (place(it, storage)) movedToStorage += 1;
                    else {
                        if (!place(it, pack)) failedBack += 1;
                    }
                }
                if (movedToPack + movedToStorage === 0) {
                    showToast('к≥µк∞ДмЭі лґАм°±нХі л∞ФкЊЄмІА л™їнХ®');
                } else if (sItems.length + pItems.length > movedToPack + movedToStorage) {
                    showToast(`мЭЉлґАлІМ кµРнЩШ (к∞Ал∞© ${movedToPack} / л≥ікіАнХ® ${movedToStorage})`);
                } else {
                    showToast(`кµРнЩШ мЩДл£М (к∞Ал∞© ${movedToPack} / л≥ікіАнХ® ${movedToStorage})`);
                }
                setSelStorage(new Set());
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };

            const btnStyle = (active) => ({
                background: active ? '#d4b84a' : '#2a2a3e',
                color: active ? '#1a1a2e' : '#666',
                border: 'none',
                padding: '10px 14px',
                borderRadius: '6px',
                cursor: active ? 'pointer' : 'not-allowed',
                fontSize: '12px',
                fontWeight: 700,
                flex: 1,
                minWidth: 0
            });

            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '18px 14px 22px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(96vw, 540px)',
                        margin: '16px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>рЯОТ лђЉк±і м±ЩкЄ∞кЄ∞</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >лЛЂкЄ∞</button>
                        </div>

                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            gap: '14px',
                            alignItems: 'center'
                        }}>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    рЯУ¶ л≥ікіАнХ® ({storage.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={storage}
                                        cellSize={32}
                                        selectedIds={selStorage}
                                        onItemClick={(it) => toggle('storage', it.id)}
                                    />
                                </div>
                            </div>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    рЯОТ к∞Ал∞© ({pack.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={pack}
                                        cellSize={36}
                                        selectedIds={selPack}
                                        onItemClick={(it) => toggle('pack', it.id)}
                                    />
                                </div>
                            </div>
                        </div>

                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', margin: '12px 0' }}>
                            мХДмЭінЕЬмЭД нГ≠нХімДЬ мД†нГЭ. мЦСм™љмЧРмДЬ мД†нГЭнХШл©і [мДЬл°Ь л∞ФкЊЄкЄ∞].
                        </div>

                        <div style={{ display: 'flex', gap: '6px' }}>
                            <button
                                onClick={moveToPack}
                                disabled={!onlyStorage}
                                style={btnStyle(onlyStorage)}
                            >
                                к∞Ал∞©мЬЉл°Ь
                            </button>
                            <button
                                onClick={moveToStorage}
                                disabled={!onlyPack}
                                style={btnStyle(onlyPack)}
                            >
                                л≥ікіАнХ®мЬЉл°Ь
                            </button>
                            <button
                                onClick={swapBoth}
                                disabled={!both}
                                style={btnStyle(both)}
                            >
                                мДЬл°Ь л∞ФкЊЄкЄ∞
                            </button>
                        </div>

                        {toast && (
                            <div style={{
                                position: 'fixed',
                                left: '50%',
                                bottom: '40px',
                                transform: 'translateX(-50%)',
                                background: 'rgba(0,0,0,0.8)',
                                color: '#fff',
                                padding: '10px 18px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                zIndex: 3401
                            }}>
                                {toast}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // мЇ†нФД л©ФмЭЄ нЩФл©і.
        //   props.campState вАФ мШБмЖНнЩФ мГБнГЬ. quests/inventory(InventorySystem мЭЄмК§нДімК§)/pack/runs.
        //   props.onDepart вАФ [нГРнЧШ лЦ†лВШкЄ∞] нБіл¶≠.
        //   props.onCompleteQuest(questId) вАФ [мЩДмИШ] нБіл¶≠.
        //   props.onResetData вАФ [лН∞мЭінД∞ міИкЄ∞нЩФ] нЩХм†Х.
        //   props.onInventoryChange вАФ л≥ікіАнХ®/к∞Ал∞© л≥Ак≤љ нЫД лґАл™® мЮђл†МлНФ нКЄл¶ђк±∞ (campState к∞Эм≤і мГИл°Ь лІМлУ§кЄ∞).
        // D-113: л†ИмЭімХДмЫГ мЮђкµђмД±.
        //   мГБлЛ®: м†РмИШ вЖТ [л≥ікіАнХ®] л≤ДнКЉ вЖТ [нАШмК§нКЄ л™©л°Э] вЖТ [нШДмЮђ мІДнЦЙ м§С нАШмК§нКЄ] вЖТ к±імД§.
        //   нХШлЛ®: [лђЉк±і м±ЩкЄ∞кЄ∞] [нГРнЧШ лЦ†лВШкЄ∞] лСР л≤ДнКЉ.
        function CampScreen({ campState, onDepart, onCompleteQuest, onResetData, onInventoryChange }) {
            const [resetOpen, setResetOpen] = React.useState(false);
            const [storageOpen, setStorageOpen] = React.useState(false);
            const [packOpen, setPackOpen] = React.useState(false);
            const inv = campState && campState.inventory;
            const pack = campState && campState.pack;
            const runs = (campState && campState.runs) || { total: 0, victories: 0, deaths: 0 };
            const activeQuests = (campState && campState.quests && campState.quests.active) || [];
            const completedQuests = (campState && campState.quests && campState.quests.completed) || [];

            // мЭЄл≤§мЧРмДЬ typeл≥Д л≥імЬ†лЯЙ к≥ДмВ∞ (мЛ§мЛЬк∞Д). м†АмЮ•лРЬ progressл≥ілЛ§ м†ХнЩХ.
            const countOfType = (type) => {
                if (!inv || !Array.isArray(inv.items)) return 0;
                return inv.items.filter(it => it.type === type).length;
            };

            const renderQuestCard = (quest) => {
                const def = quest.id === TENT_QUEST.id ? TENT_QUEST : null;
                if (!def) return null;
                const reqs = def.requirements || {};
                const progress = Object.entries(reqs).map(([type, need]) => {
                    const have = countOfType(type);
                    const dispDef = InventorySystem.resolveDef(type) || {};
                    const name = dispDef.name || type;
                    return { type, name, have, need, ok: have >= need };
                });
                const canComplete = progress.every(p => p.ok);
                return (
                    <div key={quest.id} style={{
                        background: '#16213e',
                        border: '1px solid #2a3a5e',
                        borderRadius: '8px',
                        padding: '12px 14px',
                        marginBottom: '10px'
                    }}>
                        <div style={{
                            fontSize: '14px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '8px'
                        }}>
                            {def.icon} {def.name}
                        </div>
                        <div style={{ fontSize: '12px', lineHeight: 1.7, color: '#ddd', marginBottom: '10px' }}>
                            {progress.map(p => (
                                <div key={p.type} style={{ color: p.ok ? '#8bd17c' : '#ddd' }}>
                                    ¬Ј {p.name} {p.have}/{p.need}
                                </div>
                            ))}
                        </div>
                        <button
                            onClick={() => canComplete && onCompleteQuest && onCompleteQuest(quest.id)}
                            disabled={!canComplete}
                            style={{
                                background: canComplete ? '#d4b84a' : '#2a2a3e',
                                color: canComplete ? '#1a1a2e' : '#666',
                                border: 'none',
                                padding: '7px 18px',
                                borderRadius: '5px',
                                cursor: canComplete ? 'pointer' : 'not-allowed',
                                fontSize: '12px',
                                fontWeight: 700
                            }}
                        >
                            мЩДмИШ
                        </button>
                    </div>
                );
            };

            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    overflowY: 'auto',
                    background: '#0d0d18',
                    color: '#eee',
                    padding: '20px 16px 80px',
                    boxSizing: 'border-box',
                    zIndex: 100
                }}>
                    <div style={{ maxWidth: '720px', margin: '0 auto' }}>
                        <div style={{
                            fontSize: '22px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '4px',
                            textAlign: 'center',
                            letterSpacing: '0.06em'
                        }}>
                            рЯПХпЄП л≤†мЭімК§мЇ†нФД
                        </div>
                        <div style={{
                            fontSize: '11px',
                            color: '#888',
                            textAlign: 'center',
                            marginBottom: '12px'
                        }}>
                            нГРнЧШ {runs.total} ¬Ј мГЭнЩШ {runs.victories} ¬Ј мВђлІЭ {runs.deaths}
                        </div>

                        {/* D-110: м†РмИШ нЖµк≥Д вАФ мµЬк≥†/лИДм†Б/нПЙкЈ† + лІИмІАлІЙ лЯ∞. */}
                        {runs.total > 0 && (
                            <div style={{
                                display: 'flex',
                                justifyContent: 'center',
                                marginBottom: '20px'
                            }}>
                                <div className="score-badge" style={{ minWidth: '220px' }}>
                                    <div className="score-value">рЯПЖ м†РмИШ</div>
                                    <div className="score-row">
                                        <span className="lbl">мµЬк≥†</span>
                                        <span>{Number(runs.bestScore) || 0}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">лИДм†Б</span>
                                        <span>{(Number(runs.totalScore) || 0).toLocaleString()}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">нПЙкЈ†</span>
                                        <span>
                                            {Math.round((Number(runs.totalScore) || 0) / Math.max(1, runs.total))}
                                        </span>
                                    </div>
                                    {runs.lastScore != null && (
                                        <div className="score-row" style={{ opacity: 0.75 }}>
                                            <span className="lbl">лІИмІАлІЙ лЯ∞</span>
                                            <span>{Number(runs.lastScore) || 0}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* D-113: [л≥ікіАнХ®] л≤ДнКЉ вАФ StorageModal нКЄл¶ђк±∞. мЭЄл≤§ лѓЄл¶ђл≥ікЄ∞лКФ л™®лЛђмЧРмДЬ. */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                            <button
                                onClick={() => setStorageOpen(true)}
                                style={{
                                    background: '#1a1a2e',
                                    color: '#d4b84a',
                                    border: '1px solid #4a4a6e',
                                    padding: '11px 28px',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: 700
                                }}
                            >
                                рЯУ¶ л≥ікіАнХ® ({(inv && inv.items && inv.items.length) || 0})
                            </button>
                        </div>

                        {/* D-113: нАШмК§нКЄ л™©л°Э вАФ л™®лУ† нАШмК§нКЄ (active + completed) нХЬлИИмЧР. */}
                        <div style={{
                            background: '#1a1a2e',
                            border: '1px solid #2a3a5e',
                            borderRadius: '10px',
                            padding: '14px',
                            marginBottom: '16px'
                        }}>
                            <div style={{ fontSize: '13px', fontWeight: 700, color: '#bbb', marginBottom: '10px' }}>
                                нАШмК§нКЄ л™©л°Э
                            </div>
                            {activeQuests.length === 0 && completedQuests.length === 0 && (
                                <div style={{ fontSize: '12px', color: '#777' }}>
                                    мХДмІБ л∞ЫмЭА нАШмК§нКЄк∞А мЧЖлЛ§.
                                </div>
                            )}
                            {activeQuests.map(quest => {
                                const def = quest.id === TENT_QUEST.id ? TENT_QUEST : null;
                                if (!def) return null;
                                return (
                                    <div key={quest.id} style={{ fontSize: '12px', color: '#ddd', lineHeight: 1.7 }}>
                                        {def.icon} {def.name} <span style={{ color: '#888' }}>(мІДнЦЙ м§С)</span>
                                    </div>
                                );
                            })}
                            {completedQuests.map(q => {
                                const def = q.id === TENT_QUEST.id ? TENT_QUEST : null;
                                if (!def) return null;
                                return (
                                    <div key={q.id} style={{ fontSize: '12px', color: '#8bd17c', lineHeight: 1.7 }}>
                                        вЬЕ {def.name} <span style={{ color: '#666' }}>(мЩДмИШ)</span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* нШДмЮђ мІДнЦЙ м§С нАШмК§нКЄ вАФ мєілУЬ нШХнГЬл°Ь мЮђл£М мІДнЦЙ + [мЩДмИШ] л≤ДнКЉ */}
                        {activeQuests.length > 0 && (
                            <div style={{
                                background: '#1a1a2e',
                                border: '1px solid #2a3a5e',
                                borderRadius: '10px',
                                padding: '14px',
                                marginBottom: '16px'
                            }}>
                                <div style={{ fontSize: '13px', fontWeight: 700, color: '#bbb', marginBottom: '10px' }}>
                                    мІДнЦЙ м§СмЭЄ нАШмК§нКЄ
                                </div>
                                {activeQuests.map(renderQuestCard)}
                            </div>
                        )}

                        {/* к±імД§ placeholder */}
                        <div style={{
                            background: '#1a1a2e',
                            border: '1px dashed #2a3a5e',
                            borderRadius: '10px',
                            padding: '14px',
                            marginBottom: '20px',
                            textAlign: 'center',
                            color: '#666',
                            fontSize: '12px'
                        }}>
                            к±імД§ (мґФнЫД лЛ®к≥ДмЧРмДЬ мЧіл¶Љ)
                        </div>

                        {/* D-113: нХШлЛ® вАФ [лђЉк±і м±ЩкЄ∞кЄ∞] [нГРнЧШ лЦ†лВШкЄ∞] */}
                        <div style={{
                            display: 'flex',
                            gap: '10px',
                            justifyContent: 'center',
                            marginBottom: '20px'
                        }}>
                            <button
                                onClick={() => setPackOpen(true)}
                                style={{
                                    background: '#1a1a2e',
                                    color: '#d4b84a',
                                    border: '1px solid #d4b84a',
                                    padding: '14px 22px',
                                    fontSize: '15px',
                                    fontWeight: 700,
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    flex: 1,
                                    maxWidth: '200px'
                                }}
                            >
                                рЯОТ лђЉк±і м±ЩкЄ∞кЄ∞
                            </button>
                            <button
                                onClick={onDepart}
                                style={{
                                    background: '#4CAF50',
                                    color: 'white',
                                    border: 'none',
                                    padding: '14px 22px',
                                    fontSize: '15px',
                                    fontWeight: 700,
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    boxShadow: '0 4px 12px rgba(76,175,80,0.3)',
                                    flex: 1,
                                    maxWidth: '200px'
                                }}
                            >
                                рЯМ≤ нГРнЧШ лЦ†лВШкЄ∞
                            </button>
                        </div>
                    </div>

                    {storageOpen && inv && (
                        <StorageModal
                            inventory={inv}
                            onClose={() => setStorageOpen(false)}
                        />
                    )}
                    {packOpen && inv && pack && (
                        <PackTransferModal
                            storage={inv}
                            pack={pack}
                            onChange={onInventoryChange}
                            onClose={() => setPackOpen(false)}
                        />
                    )}

                    {/* лН∞мЭінД∞ міИкЄ∞нЩФ вАФ мЪ∞нХШлЛ® */}
                    <div style={{
                        position: 'fixed',
                        right: '12px',
                        bottom: '12px',
                        zIndex: 100
                    }}>
                        <button
                            onClick={() => setResetOpen(true)}
                            style={{
                                background: 'transparent',
                                color: '#666',
                                border: '1px solid #333',
                                padding: '6px 12px',
                                borderRadius: '4px',
                                cursor: 'pointer',
                                fontSize: '11px'
                            }}
                        >
                            лН∞мЭінД∞ міИкЄ∞нЩФ
                        </button>
                    </div>

                    {resetOpen && (
                        <ResetConfirmModal
                            onCancel={() => setResetOpen(false)}
                            onConfirm={() => {
                                setResetOpen(false);
                                onResetData && onResetData();
                            }}
                        />
                    )}
                </div>
            );
        }

        // ============================================
        // D-110 (2026-04-24): м†РмИШ л∞∞мІА вАФ м†РмИШмЩА мВ∞мґЬ нХ≠л™©мЭД лѓЄлЛИ л¶ђмК§нКЄл°Ь нСЬмЛЬ.
        //   props.score      вАФ мµЬмҐЕ м†РмИШ.
        //   props.breakdown  вАФ [{ label, value }] мЦСмИШлІМ (0мЭА нШЄмґЬмЮРк∞А к±ЄлЯђ лДШкєА).
        //   GameEndModal/LootResultScreen/CampScreenмЧРмДЬ к≥µнЖµ мВђмЪ©.
        // ============================================
        function ScoreBadge({ score, breakdown }) {
            const rows = Array.isArray(breakdown) ? breakdown.filter(r => r && r.value) : [];
            return (
                <div className="score-badge">
                    <div className="score-value">рЯПЖ м†РмИШ: {score}</div>
                    {rows.map((r, i) => (
                        <div key={i} className="score-row">
                            <span className="lbl">{r.label}</span>
                            <span>+{r.value}</span>
                        </div>
                    ))}
                </div>
            );
        }

        // м†РмИШ мВ∞мґЬ лВімЧ≠ вАФ calculateRunScoreмЩА к∞ЩмЭА кЈЬмєЩмЬЉл°Ь нХ≠л™©л≥Д к∞АмВ∞к∞Т мВ∞мґЬ.
        //   selectedListк∞А nullмЭіл©і items м†Дм≤і кЄ∞м§А.
        function buildScoreBreakdown({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return [];
            const rows = [];
            rows.push({ label: 'мГЭм°і', value: 100 });
            const tiles = Math.max(0, Number(uniqueTilesVisited) || 0);
            if (tiles > 0) rows.push({ label: `мЭілПЩк±∞л¶ђ(${tiles})`, value: tiles * 3 });
            if ((Number(detection) || 0) < 80) rows.push({ label: 'мЭАл∞А(л∞Ьк∞Б<80)', value: 30 });

            const stats = runStats || {};
            const l1 = Number(stats.l1PreyKills) || 0;
            const l2 = Number(stats.l2PreyKills) || 0;
            const bd = Number(stats.bossDangerEntered) || 0;
            if (l1) rows.push({ label: `мВђлГ• L1 √Ч${l1}`, value: l1 * 5 });
            if (l2) rows.push({ label: `мВђлГ• L2 √Ч${l2}`, value: l2 * 20 });
            if (bd) rows.push({ label: `л≥імК§ мЬДнШСкґМ √Ч${bd}`, value: bd * 15 });

            // мЮРмЫР вАФ gradeл≥Д нХ©мВ∞.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            let weapons = 0, armorShield = 0, g1 = 0, g2 = 0, g3 = 0;
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === 'лђікЄ∞') { weapons += 1; continue; }
                if (cat === 'shield' || cat === 'armor') { armorShield += 1; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) g1 += 1;
                else if (grade === 2) g2 += 1;
                else if (grade === 3) g3 += 1;
            }
            if (weapons) rows.push({ label: `лђікЄ∞ √Ч${weapons}`, value: weapons * 5 });
            if (armorShield) rows.push({ label: `л∞©мЦікµђ √Ч${armorShield}`, value: armorShield * 8 });
            if (g1) rows.push({ label: `мЮРмЫР 1лЛ®к≥Д √Ч${g1}`, value: g1 * 1 });
            if (g2) rows.push({ label: `мЮРмЫР 2лЛ®к≥Д √Ч${g2}`, value: g2 * 3 });
            if (g3) rows.push({ label: `мЮРмЫР 3лЛ®к≥Д √Ч${g3}`, value: g3 * 6 });
            return rows;
        }

        // ============================================
        // D-110 (2026-04-24): м†Дл¶ђнТИ к≤∞к≥Љм∞љ.
        //   props.runFinal     вАФ { victory, items, runStats, uniqueTilesVisited, detection }
        //   props.onConfirm(selectedItemIds[]) вАФ мД†нГЭ нХ≠л™© мЇ†нФД мЭЄмЮЕ.
        //   props.onCancel     вАФ л™®лЛђ лЛЂкЄ∞ (GameEndModal л≥µкЈА).
        //
        //   - мЭЄл≤§ кЈЄл¶ђлУЬ(rows √Ч cols, 8x12 мЛЬк∞Б) вАФ items.x/y/shape кЈЄлМАл°Ь л∞∞мєШ.
        //   - мЕА(мХДмЭінЕЬ) нГ≠ = мД†нГЭ/нХім†Ь. міИкЄ∞к∞Т: л™®лУ† items мД†нГЭ.
        //   - м†РмИШлКФ selectedIds л≥АлПЩмЧР лФ∞лЭЉ мЛ§мЛЬк∞Д мЮђк≥ДмВ∞(мЮРмЫР м†РмИШлІМ л≥АлПЩ).
        //   - л≤ДнКЉ: [м†ДлґА м±ЩкЄ∞кЄ∞] / [мД†нГЭлІМ м±ЩкЄ∞кЄ∞] / [мЈ®мЖМ].
        // ============================================
        function LootResultScreen({ runFinal, onConfirm, onCancel }) {
            const items = (runFinal && Array.isArray(runFinal.items)) ? runFinal.items : [];
            const [selectedIds, setSelectedIds] = React.useState(() => {
                const s = new Set();
                for (const it of items) { if (it && it.id != null) s.add(it.id); }
                return s;
            });

            const toggleId = (id) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const selectedItems = items.filter(it => it && selectedIds.has(it.id));
            const score = calculateRunScore({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });
            const breakdown = buildScoreBreakdown({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });

            // кЈЄл¶ђлУЬ мВђмЭім¶И вАФ itemsмЭШ мµЬлМА мҐМнСЬл°ЬлґАнД∞ мґФм†Х. кЄ∞л≥Є 8x12.
            const ROWS = 8, COLS = 12, CELL = 36, PAD = 3;

            return (
                <div className="modal" style={{
                    zIndex: 1800,
                    background: 'rgba(8,10,18,0.92)',
                    alignItems: 'flex-start',
                    overflowY: 'auto',
                    padding: '24px 16px'
                }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        border: '1px solid #2a3a5e',
                        borderRadius: '10px',
                        padding: '20px 18px',
                        maxWidth: '560px',
                        width: '100%',
                        boxSizing: 'border-box'
                    }}>
                        {/* нЧ§лНФ */}
                        <div style={{
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'flex-start',
                            gap: '12px',
                            marginBottom: '14px',
                            flexWrap: 'wrap'
                        }}>
                            <div style={{
                                fontSize: '18px',
                                fontWeight: 700,
                                color: '#d4b84a'
                            }}>
                                рЯУ¶ нГРнЧШ к≤∞к≥Љ
                            </div>
                            <ScoreBadge score={score} breakdown={breakdown} />
                        </div>

                        {/* мЭЄл≤§ кЈЄл¶ђлУЬ */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '12px' }}>
                            <div style={{ position: 'relative', display: 'inline-block' }}>
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                                    gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                                    gap: '2px',
                                    background: '#0f3460',
                                    padding: `${PAD}px`,
                                    borderRadius: '8px'
                                }}>
                                    {Array(ROWS).fill(null).map((_, row) =>
                                        Array(COLS).fill(null).map((_, col) => (
                                            <div key={`${row}-${col}`} className="inventory-cell" />
                                        ))
                                    )}
                                </div>
                                {items.map(item => {
                                    if (!item || !item.shape) return null;
                                    const w = item.shape[0].length;
                                    const h = item.shape.length;
                                    const emoji = itemEmoji(item.type);
                                    const selected = selectedIds.has(item.id);
                                    return (
                                        <div
                                            key={item.id}
                                            className={`inventory-item loot-item ${selected ? 'selected' : ''}`}
                                            onClick={() => toggleId(item.id)}
                                            style={{
                                                left: `${item.x * CELL + PAD}px`,
                                                top: `${item.y * CELL + PAD}px`,
                                                width: `${w * CELL - PAD}px`,
                                                height: `${h * CELL - PAD}px`,
                                                fontSize: '9px',
                                                cursor: 'pointer',
                                                opacity: selected ? 1 : 0.4
                                            }}
                                            title={item.name || item.type}
                                        >
                                            {emoji
                                                ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{emoji}</span>
                                                : (item.name || item.type)}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* мХИлВі */}
                        <div style={{
                            fontSize: '12px',
                            color: '#aaa',
                            textAlign: 'center',
                            marginBottom: '14px',
                            lineHeight: 1.5
                        }}>

        // ============================================
        // мВђлГ• м†ДнИђ л™®лЛђ (D-46, 2026-04-23)
        // ============================================
        //
        // кµђм°∞:
        //   - мГБлЛ®: prey мЭіл¶Д + HP л∞Ф + meat нСЬмЛЬ
        //   - м†Б нМ®нДі 3мКђл°ѓ(readonly): нЪМнФЉ / нЪМнФЉ / лє†л•ік≤М лПДлІЭ
        //   - лВі мКђл°ѓ 3мєЄ: лєДмЧИмЬЉл©і "лєДмЧИмЭМ", мєілУЬ мЮИмЬЉл©і мєілУЬ л†МлНФ(нГ≠вЖТмЖРнМ® л≥µкЈА)
        //   - нЩХм†Х л≤ДнКЉ: 3мКђл°ѓ л™®лСР м∞®мХЉ нЩЬмД±
        //   - лВі мЖРнМ®: buildHuntDeck к≤∞к≥Љ. нГ≠ мЛЬ к∞АмЮ• мЩЉм™љ лєИ мКђл°ѓмЧР л∞∞мєШ.
        //
        // мКђл°ѓвЖФмЖРнМ® мЭілПЩмЭА uid кЄ∞м§А. "лТ§ мКђл°ѓ к≥†м†Х" мЫРмєЩ вАФ мКђл°ѓвЖТмЖРнМ® л≥µкЈА мЛЬ лЛ§л•Є мКђл°ѓ мЬДмєШ мЬ†мІА.
        // нЩХм†Х мЛЬ resolveHunt(prey, slots) вЖТ нДі л°ЬкЈЄ мИЬм∞® нСЬмЛЬ(500ms) вЖТ onResolve(result) мљЬл∞±.
        // D-58/D-74: HuntCombatModal мИШмєШ л∞∞мІА нЖµмЭЉ.
        //   - рЯЧ°пЄП+N / N% / рЯПє+N / рЯЫ°пЄП+N мИЬмДЬ к≥†м†Х, м§Дл∞ФкњИ мЧЖмЭМ.
        //   - damage=0 && defense>0 вЖТ рЯЧ°пЄП мИ®кЄ∞к≥† рЯЫ°пЄП нСЬмЛЬ (нБђмХД мЫЕнБђл¶ђкЄ∞/л∞©нМ® лІЙкЄ∞).
        //   - damage=0 && defense=0 (dodge/run_away) вЖТ рЯЧ°пЄП¬ЈрЯПє мГЭлЮµ, N%лІМ.
        //   - лЭЉл≤® нЕНмК§нКЄ м†ДлґА м†Ьк±∞ вАФ мХДмЭімљШ + мИЂмЮРл°Ь нЖµмЭЉ.
        const STAT_ICONS = { damage: 'рЯЧ°пЄП', accuracy: 'рЯПє', defense: 'рЯЫ°пЄП', evade: 'рЯТ®' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff', evade: '#d4b84a' };
        function StatBadges({ card }) {
            const dmg = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const def = Number(card.defense) || 0;
            const eva = Number(card.evade) || 0;
            const sr = card.success_rate;
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap' }}>
                    {dmg > 0 && (
                        <span style={{ color: STAT_COLORS.damage }}>{STAT_ICONS.damage}+{dmg}</span>
                    )}
                    {/* D-113: success_rate=100мЭА л™®лУ† к≥µк≤©/нЪМнФЉ мєілУЬмЭШ кЄ∞л≥Єк∞Т вАФ м†Хл≥і к∞АмєШ мЧЖмЦі мИ®кєА.
                        run_away лУ± 100 лѓЄлІМ мєілУЬлІМ % нСЬмЛЬ. */}
                    {(sr !== undefined && sr !== null && Number(sr) !== 100) && (
                        <span style={{ color: '#aaa' }}>{sr}%</span>
                    )}
                    {dmg > 0 && acc > 0 && (
                        <span style={{ color: STAT_COLORS.accuracy }}>{STAT_ICONS.accuracy}+{acc}</span>
                    )}
                    {def > 0 && (
                        <span style={{ color: STAT_COLORS.defense }}>{STAT_ICONS.defense}+{def}</span>
                    )}
                    {eva > 0 && (
                        <span style={{ color: STAT_COLORS.evade }}>{STAT_ICONS.evade}+{eva}</span>
                    )}
                </span>
            );
        }

        // D-58: м†Б мКђл°ѓ мµЬмҐЕ нЪМнФЉмЬ® л∞∞мІА.
        //   - damage>0 мєілУЬ л∞∞мєШ + finalEvade < baseEvade вЖТ міИл°Э + bold.
        //   - кЈЄ мЩЄ(лєИ мКђл°ѓ / damage=0 мєілУЬ / к∞РмЖМ мЧЖмЭМ) вЖТ кЄ∞л≥ЄмГЙ.
        function EvadeBadge({ baseEvade, finalEvade, consumed }) {
            const reduced = finalEvade < baseEvade;
            return (
                <span
                    className={reduced ? 'evade-changed' : undefined}
                    style={{
                        color: reduced ? '#8bd17c' : '#ddd',
                        fontWeight: reduced ? 700 : 400,
                        opacity: consumed ? 0.5 : 1,
                        transition: 'color 0.2s, opacity 0.2s'
                    }}>
                    нЪМнФЉ {finalEvade}
                </span>
            );
        }

        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel }) {
            // D-75: Level 2 preyлКФ 4нДі. Level 1мЭА кЄ∞м°і 3нДі.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // нСЬмЛЬлРЬ нДі л°ЬкЈЄ
            const [result, setResult] = useState(null);

            // D-58/D-60/D-96: мКђл°ѓл≥Д мµЬмҐЕ нЪМнФЉ к≥ДмВ∞ (нДіл≥Д base л∞ШмШБ).
            //   SSOT: combatDeck.js::resolveHunt к≥µмЛЭк≥Љ лПЩмЭЉ.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount)
            //     finalEvade = baseEvadeT (л™Ем§С vs нЪМнФЉлКФ к≤∞м†Хл°† лєДкµР вАФ UIмЧРмД† base нСЬмЛЬ).
            //   damage=0 мєілУЬ / лєИ мКђл°ѓ вЖТ base(нДіл≥Д) кЈЄлМАл°Ь.
            //   card.accuracy(л™Ем§С)лКФ buildHuntDeck мЭі мЭілѓЄ мєілУЬ+лђікЄ∞ нХ©мВ∞(D-50).
            // D-75/D-98/D-108: actions_per_turn CSV нММмЛ± вЖТ нДіл≥Д actionDef л∞∞мЧі.
            //   SSOTлКФ combatDeck.js::parsePreyActions + findPreyAction.
            //   slotActions[i] = { id, name, type, damage, accuracy, defense } вАФ UI л∞∞мІАмЧР мІБм†С мВђмЪ©.
            const slotActions = React.useMemo(() => {
                const ids = CombatDeck.parsePreyActions(prey, SLOT_COUNT);
                return ids.map(id => CombatDeck.findPreyAction(id));
            }, [prey.actions_per_turn, prey.level, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    // D-96: % вЖТ м†ХмИШ. лПДм£Љ лИДм†Б нМ®лДРнЛ∞лКФ 1лЛє нЪМнФЉ -1.
                    const base = Math.max(0, (byTurn[i] ?? 1) - fleeCount);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    // D-96: к≤∞м†Хл°† вАФ л™Ем§С вЙ• нЪМнФЉ вЖТ лђім°∞к±і л™Ем§С(final=0). нЪМнФЉ > л™Ем§С вЖТ лђінЪ®(final=base).
                    const acc = Number(card.accuracy) || 0;
                    const final = (acc >= base) ? 0 : base;
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));
            // м†ДнИђ мЛЬмЮС мЛЬ hpCurrent = prey.hp. мЭінЫД нСЬмЛЬмЪ©мЬЉл°ЬлІМ мВђмЪ©.
            const [hpCurrent, setHpCurrent] = useState(prey.hp);

            const allFilled = slots.every(s => s !== null);

            // D-64 (2026-04-24): мКђл°ѓ л∞∞мєШ мЛ§мЛЬк∞Д мЮђк≥† л∞ШмШБ.
            //   buildHuntDeckмЭШ slotLimitмЭА м†ДнИђ мЛЬмЮС мЛЬм†Р 1нЪМ к≥ДмВ∞мЭілЭЉ л∞∞мєШл°Ь м∞®к∞Р мХИ лР®.
            //   requirement мЭіл¶Д кЄ∞л∞Ш capacityл•Љ мЛ§мЛЬк∞ДмЬЉл°Ь к≥ДмВ∞нХі мЖРнМ® лєДнЩЬмД±¬ЈмКђл°ѓ лВікµђлПД нСЬмЛЬ.
            //   лђікЄ∞(category='лђікЄ∞')лКФ durabilityLeft нХ©мЭі capacity, мЭЉл∞Ш мЮђл£МлКФ мЭЄмК§нДімК§ мИШ.
            const reqCapacityByName = React.useMemo(() => {
                const cap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    const name = def.name || it.name;
                    if (!name) continue;
                    const isWeapon = def.category === 'лђікЄ∞';
                    const contribute = isWeapon
                        ? (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0)
                        : 1;
                    cap[name] = (cap[name] || 0) + contribute;
                }
                return cap;
            }, [inventory]);

            // мКђл°ѓмЧР мЭілѓЄ л∞∞мєШлРЬ мєілУЬмЭШ requirementsлІМнБЉ м∞®к∞РнХЬ мЮФлЯЙ.
            const remainingByReq = React.useMemo(() => {
                const rem = { ...reqCapacityByName };
                for (const c of slots) {
                    if (!c || !Array.isArray(c.requirements)) continue;
                    for (const r of c.requirements) {
                        rem[r] = (rem[r] || 0) - 1;
                    }
                }
                return rem;
            }, [slots, reqCapacityByName]);

            const canPlaceCard = (card) => {
                if (!Array.isArray(card.requirements) || card.requirements.length === 0) return true;
                for (const r of card.requirements) {
                    if ((remainingByReq[r] || 0) <= 0) return false;
                }
                return true;
            };

            // мКђл°ѓл≥Д лђікЄ∞ лВікµђлПД к≥ДмВ∞ (weaponIdл≥Д мИЬм∞® м∞®к∞Р).
            //   before: мЭі мКђл°ѓ мВђмЪ© мІБм†Д лВікµђ, after: мВђмЪ© мІБнЫД лВікµђ.
            //   лђікЄ∞ мХДлЛМ мєілУЬ(лПМ лНШмІАкЄ∞ лУ±)мЩА лєИ мКђл°ѓмЭА null.
            const slotWeaponDur = React.useMemo(() => {
                const weaponCap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    if (def.category !== 'лђікЄ∞') continue;
                    weaponCap[it.type] = (weaponCap[it.type] || 0)
                        + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0);
                }
                const remain = { ...weaponCap };
                return slots.map(card => {
                    if (!card || !card.weaponId) return null;
                    const before = remain[card.weaponId] || 0;
                    const loss = (card.full_loss === 'Y' || card.fullLoss === true) ? before : 1;
                    const after = Math.max(0, before - loss);
                    remain[card.weaponId] = after;
                    return { before, after };
                });
            }, [slots, inventory]);

            // D-46/D-47: мєілУЬ мЮђмВђмЪ© кЈЬмєЩ.
            //   - infinite мєілУЬ(м£Љл®є/нЪМнФЉ/лПДлІЭ): мЖРнМ® 1мЮ•, мКђл°ѓ лђім†ЬнХЬ л∞∞мєШ.
            //   - slotLimit мєілУЬ(лПМ лНШмІАкЄ∞/м∞љ лУ±): мЖРнМ® 1мЮ•, мКђл°ѓ л∞∞мєШлКФ к∞Ал∞© лВі мХДмЭінЕЬ к∞ЬмИШлІМнБЉ.
            //   - D-64: мЛ§мЛЬк∞Д мЮђк≥† м≤інБђл°Ь нЖµнХ© вАФ canPlaceCardл°Ь нМРм†Х.
            const handleHandClick = (card) => {
                if (phase !== 'select') return;
                const emptyIdx = slots.findIndex(s => s === null);
                if (emptyIdx < 0) return;
                if (!canPlaceCard(card)) return;
                const isReusable = !!(card.infinite || card.slotLimit);
                const newSlots = [...slots];
                newSlots[emptyIdx] = isReusable
                    ? { ...card, uid: `${card.uid}:slot:${emptyIdx}:${Date.now()}` }
                    : card;
                setSlots(newSlots);
                if (!isReusable) {
                    setHand(hand.filter(c => c.uid !== card.uid));
                }
            };

            const handleSlotClick = (slotIdx) => {
                if (phase !== 'select') return;
                const card = slots[slotIdx];
                if (!card) return;
                const newSlots = [...slots];
