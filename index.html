                        return next;
                    });
                }

                // D-48: 카드 규칙 개정 — 타일 이동 시 손패 전부 무덤으로 보내고 덱에서
                //   HAND_SIZE(5)장 새로 드로우. 덱 소진 시 무덤 셔플해서 덱 재구성.
                //   이전 '미사용 카드 유지' 규칙 폐기. hunt_start 카드도 자연 소멸 (손패에
                //   있던 hunt_start가 무덤행 — 재조우 시 새로 생성되므로 무덤 쪽에서 빼둘 필요 없음).
                //   단, hunt_start는 overflow로 HAND_SIZE 카운트에서 제외.
                const preyHere = (preys || []).find(p => p.tileId === targetId);

                // 1) 손패 전부 무덤으로. 단, hunt_start(overflow)는 아예 소멸 — 무덤/덱 풀에
                //    포함되면 안 됨 (D-65 요한 원문). 기존 graveyard에 섞여 있던 hunt_start도 청소.
                let newGraveyard = [...graveyard, ...hand]
                    .filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newDeck = [...deck].filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newHand = [];

                // 2) 덱에서 HAND_SIZE 드로우. 덱 소진 시 무덤 셔플.
                while (newHand.length < HAND_SIZE) {
                    if (newDeck.length === 0) {
                        if (newGraveyard.length === 0) break;
                        newDeck = shuffleDeck(newGraveyard);
                        newGraveyard = [];
                    }
                    newHand.push(newDeck.shift());
                }

                // 3) hunt_start 카드 push는 보스 이동 이후로 미룬다 (D-93).
                //    이유: 같은 턴에 보스가 같은 타일 prey를 포식 시작하면 prey가 즉시 사라지므로
                //    hunt_start를 손패에 넣어도 더 이상 유효한 대상이 없다(유저가 카드 못 씀).
                //    setHand/Deck/Graveyard도 보스 이동 후로 이관 — 동일 프레임이라 시각 차이 없음.
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                setGraveyardFlashKey(k => k + 1);
                
                // 보스 이동 로직
                // D-62: 일반 모드 랜덤 이동을 boss.moveRandom() 위임 —
                //   미방문 타일 우선 로직이 자연히 적용된다(전맵 순회 강화).
                //   boss.tiles 참조는 초기화 시 주입된 tiles — moveTo에서 만든 newTiles와
                //   동일 객체(참조 공유). 안전을 위해 호출 전 최신 tiles 반영.
                // D-77: 포식 이동 우선권 — boss.onPlayerMove에 L2 preys를 넘기면
                //   타일거리 2 이내 L2 prey가 있으면 포식 경로가 우선 실행된다.
                //   포식 중이 아니면 chase/일반 기존 경로 그대로.
                boss.tiles = newTiles;
                const bossStartPos = boss.position;
                let newBossPos = boss.position;

                if (movedDetection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }

                // D-77: L2 prey만 추려서 보스에 전달 (포식 후보).
                const preyDataArrBossMove = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const l2Preys = (preys || []).filter(p => {
                    const def = preyDataArrBossMove.find(pd => pd && pd.id === p.preyType);
                    return def && def.level === 2;
                });
                // D-94 (2026-04-25): 거대한 먹이가 놓인 타일을 synthetic prey로 변환해 동일 경로로 처리.
                //   level=2 + isBait 플래그. boss는 prey와 구분 없이 BFS 추격→포식 시작.
                //   onPredationStart 콜백에서 prey.isBait 분기로 baitTiles 제거.
                const baitAsPreys = Array.from(baitTiles).map(tid => ({
                    id: 'bait:' + tid,
                    tileId: tid,
                    level: 2,
                    preyType: '__bait__',
                    isBait: true
                }));
                const allTargets = [...l2Preys, ...baitAsPreys];

                // D-86 (2026-04-24 요한 지시): 플레이어 1이동 = 보스 1이동.
                // 기존 caller 게이트(`chaseMode || newMoveCount % 2 === 0`)를 제거.
                // 보스 클래스 내부도 1턴=1칸 고정이므로(이전 D-86 boss.js) 매 호출마다
                // 정확히 1칸. 일반/추격 무관하게 동기화된 템포 유지.
                boss.onPlayerMove(targetId, movedDetection, allTargets);
                newBossPos = boss.position;

                // D-110: 보스 근접(거리 ≤2) 진입 카운트. 같은 플레이어 타일에서 재진입은 dedup.
                //   bossDangerSeenTilesRef는 useRef Set — 첫 진입 시 add + score+1.
                //   조우 자체(거리 0)는 게임오버라 별도 처리 안 해도 됨(dist≤2 카운트엔 포함).
                if (typeof boss.calculateDistance === 'function') {
                    const dist = boss.calculateDistance(targetId, newBossPos);
                    if (dist <= 2 && !bossDangerSeenTilesRef.current.has(targetId)) {
                        bossDangerSeenTilesRef.current.add(targetId);
                        setRunStats(s => ({ ...s, bossDangerEntered: s.bossDangerEntered + 1 }));
                    }
                }

                // D-53: 보스가 실제로 이동한 경우에만 history에 push. 같은 자리 유지면 skip.
                if (newBossPos !== bossStartPos) {
                    setBossMoveHistory(prev => (
                        prev.length > 0 && prev[prev.length - 1] === newBossPos
                            ? prev
                            : [...prev, newBossPos]
                    ));
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';

                // D-93 (2026-04-25 요한 지시): 보스가 포식 중인 타일에 유저가 도착하면
                //   게임 오버 대신 "정신없이 식사 중" 안내. D-90 모달 톤과 일관 — 보스는
                //   먹이에 정신 팔려 플레이어를 알아차리지 못함. 식사가 끝나는 다음 턴부터는
                //   다시 위협이라 빠져나가야 함(별도 분기 없이 일반 onPlayerMove 흐름이 처리).
                const inPredationSafe = encounter && boss.predationStay > 0;

                // D-93: hunt_start 카드 push 시점 — 보스 이동 이후. 같은 턴에 보스가
                //   prey를 포식 시작했다면(boss.position===targetId && stay>0) prey가 사라져
                //   카드가 무용지물 → push 생략. 그 외 케이스는 기존 동작 유지.
                if (preyHere && !inPredationSafe) {
                    newHand.push({
                        ...HUNT_START_CARD,
                        uid: `hunt_start_${preyHere.id}_${Date.now()}`,
                        target: {
                            tileId: targetId,
                            preyId: preyHere.id,
                            preyType: preyHere.preyType
                        }
                    });
                    if (!isWaitInPlace) {
                        const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                        const foundDef = preyDataArr.find(p => p.id === preyHere.preyType) || {};
                        const hpNote = (typeof preyHere.hpCurrent === 'number' && preyHere.hpCurrent < (foundDef.hp || 0))
                            ? ` (HP ${preyHere.hpCurrent}/${foundDef.hp})`
                            : '';
                        showTileEventToast({
                            emoji: PREY_EMOJI[preyHere.preyType] || '❓',
                            title: '사냥감 발견',
                            message: (foundDef.name || preyHere.preyType) + hpNote,
                            color: '#3dd68c'
                        });
                    }
                }
                setHand(newHand);

                if (encounter && !inPredationSafe) {
                    // D-56 (2026-04-24 요한 지시): 보스 조우 시 점프스케어 선재생 → 0.55s 뒤
                    // 게임오버 모달. 같은 타일 진입 기준(listen 인접 1칸 연출과는 별개 경로).
                    setBossJumpscare(true);
                    setTimeout(() => {
                        setBossJumpscare(false);
                        setGameOver(true);
                        setDeathReason('boss');
                    }, 550);
                    msg = '보스 몬스터와 조우했다! 게임 오버...';
                } else if (inPredationSafe) {
                    // 같은 타일이지만 보스가 식사에 정신없음 — 사체 + 보스 + 유저 한 칸에 공존.
                    // bossVisible은 자연히 true(같은 타일 시각). 별도 jumpscare 없음.
                    setBossVisible(true);
                    showTileEventToast({
                        emoji: '🦖',
                        title: '아슬아슬한 조우',
                        message: '거대한 짐승이 식사에 정신이 팔려있다. 들키기 전에 빠져나가자!',
                        color: '#a83232'
                    });
                    msg = '보스가 정신없이 사냥감을 뜯고 있다. 살금살금 움직여야 한다…';
                } else if (tile.type === 'normal') {
                    msg = '평범한 숲길이다.';
                } else if (tile.type === 'good') {
                    // D-52 (2026-04-23 요한 지시): '좋은 곳' → '풍족한 땅'으로 의미 재정의.
                    // 팝업 모달 → 토스트 알림으로 전환(흐름 끊김 완화).
                    msg = '풍족한 땅을 발견했다!';
                    showTileEventToast({
                        emoji: '🌾',
                        title: '풍족한 땅',
                        message: '자원과 먹거리가 풍부한 곳이다.',
                        color: '#FFC107'
                    });
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `함정! 생명력 -${damage}`;
                    // 이벤트 모달 표시 (데미지 정보 포함)
                    setEventTile({ ...tile, damage });
                } else if (tile.type === 'exit') {
                    msg = '탈출구다!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [⚠️ 보스 추격중!]`;
                }
                
                setMessage(msg);
            };

            // D-109: 베이스캠프 귀환 — GameEndModal/맵 보기 footer에서 호출.
            //   payload는 App.handleRunEnd가 인벤 자원 인입(승리만)·runs 카운팅에 사용.
            //   호출 후 App이 view='camp'로 전환 → Game은 자동 unmount(다음 탐험 시 fresh state).
            // D-110: selectedItems(LootResult에서 선택한 itemId 배열)도 함께 전달.
            //   미지정이면 기존처럼 전체 인입(GameEndModal에서 [전리품 확인] 안 누르고 직접 귀환).
            //   요한 지시 (2026-04-24): 시간 잔여 점수 → 이동거리(고유 타일) 점수로 교체.
            //   uniqueTilesVisited는 moveHistory(플레이어가 실제 위치한 타일 id 누적)의 Set 크기.
            const returnToCamp = (selectedIds = null) => {
                const outcome = victory ? 'victory' : 'death';
                if (typeof onRunEnd === 'function') {
                    const uniqueTilesVisited = new Set(moveHistory).size;
                    onRunEnd({
                        outcome,
                        runInventory: inventory,  // 승리 시 App에서 인입 처리(selectedIds 반영), 사망 시 폐기.
                        selectedIds,
                        runStats,
                        runFinal: {
                            health, hunger, time, maxTime, detection, uniqueTilesVisited
                        }
                    });
                }
            };

            // D-110: 전리품 결과창 토글. GameEndModal [📦 전리품 확인]에서 setShowLoot(true).
            //   LootResultScreen confirm → returnToCamp(selectedIds) → App이 인입 + view 전환.
            //   cancel → setShowLoot(false) → GameEndModal 복귀.
            const [showLoot, setShowLoot] = useState(false);
            // GameEndModal·LootResultScreen 양쪽이 참조하는 런 스냅샷.
            //   gameOver/victory 직후 시점의 인벤 + 카운터 + runStats를 묶어서 전달.
            const runFinalForUi = {
                victory: !!victory,
                items: (inventory && Array.isArray(inventory.items)) ? inventory.items : [],
                // D-144: LootResultScreen 그리드를 실제 런 가방 사이즈로 그릴 수 있게 inventory 전체 전달.
                inventory,
                runStats,
                uniqueTilesVisited: new Set(moveHistory).size,
                detection
            };

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100dvh' }}>게임 로딩 중...</div>;
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100dvh' }}>
                    {/* D-114: 게임 화면 우상단 진행 퀘스트 HUD. activeQuests 비어있으면 자체 미렌더. */}
                    <ActiveQuestHUDPanel
                        activeQuests={activeQuests}
                        inventoryItems={(inventory && inventory.items) || []}
                    />
                    {/* D-117 (요한 지시): 화면을 3구역으로 분리.
                        ① 상단 ui-panel — Stat + 메시지(고정)
                        ② 중앙 GameMap — flex:1 stretch
                        ③ 하단 ui-panel — 카드 자원/손패 영역(고정)
                        기존엔 카드 영역이 상단 ui-panel에 통합되어 맵보다 위에 있었음. */}
                    <div className="ui-panel">
                        <StatPanel
                            health={health}
                            hunger={hunger}
                            time={time}
                            maxTime={maxTime}
                            boss={boss}
                            detection={detection}
                            message={message}
                        />
                    </div>

                    <GameMap
                        tiles={tiles}
                        currentTile={currentTile}
                        boss={boss}
                        bossVisible={bossVisible}
                        gameOver={gameOver}
                        victory={victory}
                        moveTo={moveTo}
                        requestWait={() => setWaitConfirmOpen(true)}
                        lootToast={lootToast}
                        onLootToastDone={() => setLootToast(null)}
                        tileEventToast={tileEventToast}
                        onTileEventToastDone={() => setTileEventToast(null)}
                        preys={preys}
                        preyTraceTiles={preyTraceTiles}
                        carcassTiles={carcassTiles}
                        carcassTraceTiles={carcassTraceTiles}
                        baitTiles={baitTiles}
                        moveHistory={moveHistory}
                        bossMoveHistory={bossMoveHistory}
                        showPathView={showPathView}
                        message={message}
                    />

                    {/* D-117: 하단 ui-panel — 카드 자원/손패. 맵 아래에 배치. */}
                    <div className="ui-panel">
                        {/* D-27 HUD 리뉴얼 → D-28 재배치 (요한 지시 2026-04-22):
                            - 가방 버튼은 좌측 고정.
                            - 덱/무덤 버튼은 '손패 N/5' 카운터 쪽(우측 끝)으로 묶는다.
                              근거: "카드 자원 관리 UI는 한 곳에"라는 요한 의도. 손패·덱·무덤은
                              같은 카드 자원이므로 시선이 분리되지 않도록 묶음.
                            - 손패는 하단에 항상 표시되므로 숫자만 간결히. */}
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', alignItems: 'center' }}>
                            {/* D-114: 가방 빈칸 0개면 빨간색 강조 — 1x1 들어갈 자리 없음 = 가득. */}
                            {(() => {
                                const bagFull = !!(inventory && !inventory.findEmptySpace([[1]]));
                                return (
                                    <button
                                        className={bagFull ? 'bag-button-full' : undefined}
                                        onClick={() => setShowInventory(!showInventory)}
                                        style={bagFull ? {
                                            background: '#e94560',
                                            color: '#fff',
                                            borderColor: '#ff5566'
                                        } : undefined}
                                    >
                                        {showInventory ? '가방 닫기' : '가방 열기'}
                                    </button>
                                );
                            })()}
                            <button
                                onClick={() => setShowHelp(true)}
                                style={{ marginLeft: 'auto', marginRight: 'auto' }}
                            >
                                플레이방법
                            </button>
                            <div style={{
                                display: 'flex',
                                gap: '6px',
                                alignItems: 'center'
                            }}>
                                <div style={{ fontSize: '12px', color: '#aaa' }}>
                                    손패 {hand.filter(c => !c.overflow).length}/{HAND_SIZE}
                                </div>
                                <button onClick={() => setShowDeckList(true)}>
                                    덱 {deck.length}
                                </button>
                                <button
                                    key={`graveyard-${graveyardFlashKey}`}
                                    className={graveyardFlashKey > 0 ? 'graveyard-flash' : ''}
                                    onClick={() => setShowGraveyardList(true)}
                                >
                                    무덤 {graveyard.length}
                                </button>
                            </div>
                        </div>

                        <HandCards
                            hand={hand}
                            gameOver={gameOver}
                            victory={victory}
                            useCard={useCard}
                        />
                    </div>

                    {eventTile && (
                        <TileEventModal 
                            tile={eventTile} 
                            onClose={() => setEventTile(null)} 
                        />
                    )}

                    {showInventory && inventory && (
                        <InventoryModal
                            inventory={inventory}
                            selectedItem={selectedInventoryItem}
                            setSelectedItem={setSelectedInventoryItem}
                            closeInventory={() => setShowInventory(false)}
                            onUseItem={handleUseItem}
                            onLureBait={handleLureBait}
                            onFlashMessage={setMessage}
                        />
                    )}

                    {showHelp && (
                        <HelpModal onClose={() => setShowHelp(false)} />
                    )}

                    {showDeckList && (
                        <CardListModal
                            title="남은 덱"
                            cards={deck}
                            emptyText="덱이 비었다. 무덤이 셔플될 차례다."
                            onClose={() => setShowDeckList(false)}
                        />
                    )}

                    {showGraveyardList && (
                        <CardListModal
                            title="무덤"
                            cards={graveyard}
                            emptyText="아직 사용한 카드가 없다."
                            onClose={() => setShowGraveyardList(false)}
                        />
                    )}

                    {pendingConsume && inventory && (() => {
                        // D-57: 휴식 카드(id='rest')에서만 [🔥 요리하기] 버튼 노출.
                        //   canCook: 요리 가능 재료(meat_skewer/fish_skewer 등 1재료 grilled_ 레시피
                        //   재료) 보유 여부. 없으면 버튼은 회색 비활성.
                        const isRest = pendingConsume.card && pendingConsume.card.id === 'rest';
                        let canCook = false;
                        let onCookClick = undefined;
                        if (isRest) {
                            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                                ? window.TTD_DATA.COMBOS : [];
                            const cookIngs = new Set(
                                combos
                                    .filter(r => r && Array.isArray(r.ingredients)
                                        && r.ingredients.length === 1
                                        && typeof r.result === 'string'
                                        && r.result.startsWith('grilled_'))
                                    .map(r => r.ingredients[0])
                            );
                            canCook = (inventory.items || []).some(it => cookIngs.has(it.type));
                            onCookClick = () => setCookingOpen(true);
                        }
                        return (
                            <CardItemConsumeModal
                                inventory={inventory}
                                filter={pendingConsume.filter}
                                scales={pendingConsume.scales}
                                bonuses={pendingConsume.bonuses}
                                hintText={pendingConsume.hintText}
                                titleText={pendingConsume.titleText}
                                emptyText={pendingConsume.emptyText}
                                onSelect={resolveConsumeChoice}
                                onClose={cancelConsume}
                                onCookClick={onCookClick}
                                canCook={canCook}
                            />
                        );
                    })()}

                    {/* D-57: 요리 모달 — 휴식 모달 위에 덮인다. 닫으면 휴식 모달로 복귀. */}
                    {cookingOpen && inventory && (
                        <CookingModal
                            inventory={inventory}
                            onCook={handleCookRecipe}
                            onClose={() => setCookingOpen(false)}
                        />
                    )}

                    {/* D-114: 뒤져보기 다중 드롭 시 챙길 항목 선택 모달.
                        search 분기에서 setLootPickup({drops, region})로 노출.
                        - 챙기기: 선택된 인덱스만 inventory.addItem. 부분 인입은 토스트 노출.
                        - 모두 버리기: 인입 없이 모달만 닫음. */}
                    {lootPickup && inventory && (
                        <LootPickupModal
                            drops={lootPickup.drops}
                            region={lootPickup.region}
                            inventory={inventory}
                            onConfirm={(selectedIndices) => {
                                const drops = lootPickup.drops || [];
                                const counter = new Map();
                                let overflow = 0;
                                for (const idx of selectedIndices) {
                                    const t = drops[idx];
                                    if (!t) continue;
                                    const ok = inventory.addItem(t);
                                    if (ok) counter.set(t, (counter.get(t) || 0) + 1);
                                    else overflow += 1;
                                }
                                if (counter.size > 0) {
                                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                                    const entries = [];
                                    counter.forEach((count, item) => {
                                        const def = InventorySystem.ITEMS[item] || {};
                                        const displayName = def.name || item;
                                        const notionItem = notionItems.find(it => it && it['이름'] === displayName);
                                        const grade = notionItem && notionItem['아이템 등급'];
                                        entries.push({ name: displayName, count, grade });
                                    });
                                    showLootToast(entries);
                                }
                                if (overflow > 0) {
                                    setMessage(`가방이 가득 차 ${overflow}개는 두고 왔다.`);
                                }
                                setLootPickup(null);
                            }}
                            onDiscardAll={() => setLootPickup(null)}
                        />
                    )}

                    {/* D-42 (2026-04-23): 최상위 LootToast 제거.
                        이미 GameMap 내부에서 렌더되므로 중복 마운트였음.
                        맵 컨테이너 기준 top:12px 하나만 유지. */}

                    {/* D-46 (2026-04-23): 사냥 전투 모달. activeHunt 설정되면 마운트. */}
                    {activeHunt && (
                        <HuntCombatModal
                            prey={activeHunt.prey}
                            inventory={inventory}
                            combatCards={(window.TTD_DATA && window.TTD_DATA.COMBAT_CARDS) || []}
                            onResolve={handleHuntResolve}
                            onCancel={() => setActiveHunt(null)}
                        />
                    )}

                    {/* D-90: 제자리 [시간 보내기] 확인. confirm 시 moveTo(currentTile)
                        호출로 모든 부수 효과(시간/배고픔/발각률/보스 이동/손패 사이클) 그대로 흐름. */}
                    {waitConfirmOpen && (
                        <WaitConfirmModal
                            onCancel={() => setWaitConfirmOpen(false)}
                            onConfirm={() => {
                                setWaitConfirmOpen(false);
                                moveTo(currentTile);
                            }}
                        />
                    )}

                    {/* D-90: 인접 포식중 보스 listen 모달. 점프스케어 직후 자동 마운트. */}
                    {predationListenInfo && (
                        <PredationListenModal
                            info={predationListenInfo}
                            onClose={() => setPredationListenInfo(null)}
                        />
                    )}

                    {/* D-110: 전리품 결과창 — showLoot=true이면 GameEndModal 위에 풀스크린 모달.
                        confirm 시 returnToCamp(selectedIds) → App handleRunEnd → view 전환. */}
                    {showLoot && (
                        <LootResultScreen
                            runFinal={runFinalForUi}
                            onConfirm={(ids) => {
                                setShowLoot(false);
                                returnToCamp(ids);
                            }}
                            onCancel={() => setShowLoot(false)}
                        />
                    )}

                    <GameEndModal
                        gameOver={gameOver}
                        victory={victory}
                        deathReason={deathReason}
                        showPathView={showPathView || showLoot}
                        onViewPath={() => setShowPathView(true)}
                        onReturnCamp={returnToCamp}
                        onShowLoot={() => setShowLoot(true)}
                        runFinal={runFinalForUi}
                    />

                    <BossJumpscare active={bossJumpscare} onDone={() => setBossJumpscare(false)} />

                    {/* 맵 보기 모드 플로팅 컨트롤 — 승리 후 경로를 들여다볼 때 */}
                    {showPathView && (
                        <div style={{
                            position: 'fixed',
                            bottom: '20px',
                            left: '50%',
                            transform: 'translateX(-50%)',
                            zIndex: 200,
                            display: 'flex',
                            gap: '10px'
                        }}>
                            <button
                                onClick={() => setShowPathView(false)}
                                style={{
                                    background: '#2a2a3e',
                                    color: '#d4b84a',
                                    border: '1px solid #d4b84a',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600
                                }}
                            >
                                {victory ? '← 승리 화면' : '← 결과 화면'}
                            </button>
                            <button
                                onClick={returnToCamp}
                                style={{
                                    background: '#4CAF50',
                                    color: 'white',
                                    border: 'none',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600
                                }}
                            >
                                🏕️ 베이스캠프로 귀환
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // D-109 (2026-04-24): App — 게임 흐름 컨트롤러.
        //   view: 'intro' | 'play' | 'camp'
        //   campState 영속화(localStorage 'ttd:campState:v1') — load on mount, save on change.
        //   첫 마운트:
        //     - localStorage 없음 → view='intro'
        //     - localStorage 있음 → view='camp' (시나리오 스킵, 새로고침은 항상 캠프)
        //   진행 중 런(view='play')은 새로고침 시 폐기됨 (의도된 동작).
        // ============================================

        const CAMP_STATE_KEY = 'ttd:campState:v1';

        // D-148: 가방(pack) 생성 헬퍼 — bonusSlots 만큼 disabled 줄임.
        //   기본 disabled: (0,0), (4,0), (0,1), (4,1) — 좌우 위 구석 4칸.
        //   bonusSlots=1이면 (0,0) 풀어 좌측 위 1칸 활성. 텐트 완수 보상.
        function makePackInventory(bonusSlots) {
            const n = Math.max(0, Math.min(4, Number(bonusSlots) || 0));
            const fullDisabled = [
                { x: 0, y: 0 }, { x: 4, y: 0 },
                { x: 0, y: 1 }, { x: 4, y: 1 }
            ];
            return new InventorySystem(5, 5, { disabled: fullDisabled.slice(n) });
        }

        // 빈 상태(첫 신규 유저).
        // D-113: 보관함은 12x8(rows=12, cols=8 — 세로로 김). 탐험용 가방(pack)은 5x5(D-47 모양).
        // D-147 (2026-04-27 요한): 보관함 12x6로 좁힘 — 세로 모바일에서 더 깔끔.
        // D-148 (2026-04-27 요한): tentBuilt 플래그 — true면 가방 좌측 위 1칸 추가 활성(텐트 보상).
        function makeInitialCampState() {
            return {
                version: 1,
                seenIntro: false,
                firstReturnDone: false,
                tentBuilt: false,
                inventory: new InventorySystem(12, 6, { disabled: [] }),
                pack: makePackInventory(0),  // D-113/D-148: 탐험 시 들고 가는 가방. 기본 disabled 패턴.
                quests: { active: [], completed: [] },
                // D-110: bestScore(최고 점수) / totalScore(누적합) / lastScore(마지막 런).
                runs: { total: 0, victories: 0, deaths: 0, bestScore: 0, totalScore: 0, lastScore: 0 }
            };
        }

        // 직렬화 — InventorySystem.items만 {type,x,y,rotation,durabilityLeft} 배열로 보존.
        //   InventorySystem 인스턴스 자체를 JSON.stringify하면 grid 2D배열·class 메타가 따라가
        //   복원 시 메서드가 없어진다. items만 저장 → 로드 시 새 인스턴스 + placeItem 복원.
        // D-113: 무기 durabilityLeft 포함. pack(가방) 인벤도 함께 직렬화.
        function serializeInvItems(inv) {
            if (!inv || !Array.isArray(inv.items)) return [];
            return inv.items.map(it => ({
                type: it.type,
                x: it.x,
                y: it.y,
                rotation: it.rotation || 0,
                ...(typeof it.durabilityLeft === 'number' ? { durabilityLeft: it.durabilityLeft } : {})
            }));
        }
        function serializeCampState(state) {
            if (!state) return null;
            return {
                version: 2,
                seenIntro: !!state.seenIntro,
                firstReturnDone: !!state.firstReturnDone,
                tentBuilt: !!state.tentBuilt,
                inventory: serializeInvItems(state.inventory),
                pack: serializeInvItems(state.pack),
                quests: {
                    active: (state.quests && state.quests.active) || [],
                    completed: (state.quests && state.quests.completed) || []
                },
                runs: {
                    total: Number((state.runs && state.runs.total) || 0),
                    victories: Number((state.runs && state.runs.victories) || 0),
                    deaths: Number((state.runs && state.runs.deaths) || 0),
                    bestScore: Number((state.runs && state.runs.bestScore) || 0),
                    totalScore: Number((state.runs && state.runs.totalScore) || 0),
                    lastScore: Number((state.runs && state.runs.lastScore) || 0)
                }
            };
        }

        // 아이템 항목을 InventorySystem 인스턴스에 복원.
        //   좌표가 유효하면 placeItem으로, 아니면 addItem(type)으로 폴백.
        //   D-113: durabilityLeft 보존. 인스턴스 직접 placement (rotation·durability 모두 유지).
        function restoreItemEntry(inv, entry) {
            if (!entry || !entry.type) return;
            const def = InventorySystem.resolveDef(entry.type) || InventorySystem.ITEMS[entry.type];
            if (!def || !def.shape) return;
            let shape = def.shape;
            const rot = Number(entry.rotation) || 0;
            for (let r = 0; r < (rot / 90) % 4; r++) {
                shape = inv.rotate90(shape);
            }
            const item = {
                id: Date.now() + Math.random(),
                type: entry.type,
                ...InventorySystem.ITEMS[entry.type],
                shape,
                rotation: rot,
                x: Number(entry.x) || 0,
                y: Number(entry.y) || 0
            };
            const resolved = InventorySystem.resolveDef(entry.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0)
                ? resolved.durability : null;
            if (maxDur != null) {
                item.durabilityLeft = (typeof entry.durabilityLeft === 'number')
                    ? Math.max(0, Math.min(maxDur, entry.durabilityLeft))
                    : maxDur;
            }
            if (inv.canPlace(shape, item.x, item.y)) {
                inv.placeItem(item);
                inv.items.push(item);
            } else {
                // 좌표 충돌·범위 초과(예: 8x12→12x8 마이그레이션) → 빈 자리로 재배치.
                const pos = inv.findEmptySpace(shape);
                if (pos) {
                    item.x = pos.x;
                    item.y = pos.y;
                    inv.placeItem(item);
                    inv.items.push(item);
                }
            }
        }

        // 역직렬화 — items 배열을 새 12x6 InventorySystem에 복원.
        //   D-113: 기존 8x12 → 12x8 마이그레이션. 좌표 충돌 시 빈 자리로 자동 재배치.
        //   D-147: 12x8 → 12x6. 기존 저장본의 cols=7 이상 아이템은 좌표 부적합 → restoreItemEntry가
        //     placeItem 실패 시 빈자리로 재배치 fallback (있다면).
        function deserializeCampState(raw) {
            if (!raw || typeof raw !== 'object') return null;
            const inv = new InventorySystem(12, 6, { disabled: [] });
            const itemsRaw = Array.isArray(raw.inventory) ? raw.inventory : [];
            for (const entry of itemsRaw) restoreItemEntry(inv, entry);

            // pack — 신규 필드. 기존 저장본엔 없을 수 있으니 빈 인벤으로 시작.
            // D-148: tentBuilt면 좌측 위 1칸 활성 — pack은 그 disabled 패턴으로 생성.
            const tentBuiltRestored = !!raw.tentBuilt;
            const pack = makePackInventory(tentBuiltRestored ? 1 : 0);
            const packRaw = Array.isArray(raw.pack) ? raw.pack : [];
            for (const entry of packRaw) restoreItemEntry(pack, entry);

            return {
                version: 2,
                seenIntro: !!raw.seenIntro,
                firstReturnDone: !!raw.firstReturnDone,
                tentBuilt: tentBuiltRestored,
                inventory: inv,
                pack,
                quests: {
                    active: (raw.quests && Array.isArray(raw.quests.active)) ? raw.quests.active : [],
                    completed: (raw.quests && Array.isArray(raw.quests.completed)) ? raw.quests.completed : []
                },
                runs: {
                    total: Number((raw.runs && raw.runs.total) || 0),
                    victories: Number((raw.runs && raw.runs.victories) || 0),
                    deaths: Number((raw.runs && raw.runs.deaths) || 0),
                    bestScore: Number((raw.runs && raw.runs.bestScore) || 0),
                    totalScore: Number((raw.runs && raw.runs.totalScore) || 0),
                    lastScore: Number((raw.runs && raw.runs.lastScore) || 0)
                }
            };
        }

        // localStorage I/O — 실패해도 게임은 굴러가야 함(시크릿 모드 등).
        function loadCampStateFromStorage() {
            try {
                const raw = localStorage.getItem(CAMP_STATE_KEY);
                if (!raw) return null;
                return deserializeCampState(JSON.parse(raw));
            } catch (e) {
                console.warn('campState load failed', e);
                return null;
            }
        }
        function saveCampStateToStorage(state) {
            try {
                localStorage.setItem(CAMP_STATE_KEY, JSON.stringify(serializeCampState(state)));
            } catch (e) {
                console.warn('campState save failed', e);
            }
        }

        function App() {
            // 첫 마운트: localStorage 있으면 캠프, 없으면 인트로.
            //   loaded는 useRef-like 한 번만 평가 — 두 useState lazy initializer가 동일 값을 참조.
            const initialLoadedRef = useRef(undefined);
            const getInitialLoaded = () => {
                if (initialLoadedRef.current === undefined) {
                    initialLoadedRef.current = loadCampStateFromStorage();
                }
                return initialLoadedRef.current;
            };
            const [campState, setCampState] = useState(() => getInitialLoaded() || makeInitialCampState());
            const [view, setView] = useState(() => (getInitialLoaded() ? 'camp' : 'intro'));
            // 첫 캠프 도착 모달용 outcome ('victory'|'death'|null).
            const [pendingTentModal, setPendingTentModal] = useState(null);

            // campState 변화 시마다 저장.
            useEffect(() => {
                saveCampStateToStorage(campState);
            }, [campState]);

            // [정신을 차린다] — 시나리오 → 첫 탐험.
            const handleIntroDismiss = () => {
                setCampState(prev => ({ ...prev, seenIntro: true }));
                setView('play');
            };

            // 탐험 결과 처리 — Game이 returnToCamp에서 호출.
            //   payload: { outcome, runInventory, selectedIds?, runStats?, runFinal? }.
            //   - 승리: runInventory.items 중 selectedIds(있으면)만 캠프 인벤에 addItem, 없으면 전체.
            //   - 사망: 인벤 0 인입.
            //   - 첫 캠프 복귀(firstReturnDone=false)면 텐트 퀘스트 부여 + TentQuestModal.
            //   D-110: runStats + runFinal로 calculateRunScore → bestScore/totalScore/lastScore 갱신.
            const handleRunEnd = (payload) => {
                const outcome = (payload && payload.outcome) || 'death';
                const runInv = payload && payload.runInventory;
                const selectedIds = payload && payload.selectedIds;  // null|undefined → 전체
                const runStats = (payload && payload.runStats) || { l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 };
                const runFinal = (payload && payload.runFinal) || {};
                const isFirstReturn = !campState.firstReturnDone;

                // D-110: 인입할 아이템 목록 결정. selectedIds가 배열이면 필터링, 그 외엔 전체.
                const itemsAll = (runInv && Array.isArray(runInv.items)) ? runInv.items : [];
                const itemsToTransfer = (outcome === 'victory')
                    ? (Array.isArray(selectedIds)
                        ? itemsAll.filter(it => it && selectedIds.includes(it.id))
                        : itemsAll)
                    : [];

                // 점수 계산 — 인입한 아이템 기준.
                const score = calculateRunScore({
                    victory: outcome === 'victory',
                    uniqueTilesVisited: runFinal.uniqueTilesVisited,
                    detection: runFinal.detection,
                    items: itemsAll,
                    runStats,
                    selectedItems: itemsToTransfer
                });

                setCampState(prev => {
                    // 캠프 인벤 인스턴스 직접 변형(같은 참조 유지). React 재렌더는 ...prev 객체 새로 만들어서 트리거.
                    // D-113: 인스턴스 직접 placement — durabilityLeft / rotation 보존.
                    //   캠프 인벤은 disabled 셀 없음 → 빈 자리 찾아 새 좌표로 재배치.
                    const camp = prev.inventory;
                    for (const it of itemsToTransfer) {
                        if (!it || !it.type) continue;
                        const def = InventorySystem.resolveDef(it.type) || InventorySystem.ITEMS[it.type] || {};
                        const shape = it.shape || (def.shape ? def.shape : null);
                        if (!shape) { camp.addItem(it.type); continue; }
                        const pos = camp.findEmptySpace(shape);
                        if (!pos) continue; // 캠프 인벤 가득 — 무시(추후: 안내).
                        const placed = {
                            ...it,
                            id: Date.now() + Math.random(), // 캠프 측 새 id로(전 런과 충돌 방지).
                            x: pos.x,
                            y: pos.y
                        };
                        camp.placeItem(placed);
                        camp.items.push(placed);
                    }
                    const next = {
                        ...prev,
                        runs: {
                            total: prev.runs.total + 1,
                            victories: prev.runs.victories + (outcome === 'victory' ? 1 : 0),
                            deaths: prev.runs.deaths + (outcome === 'death' ? 1 : 0),
                            bestScore: Math.max(Number(prev.runs.bestScore) || 0, score),
                            totalScore: (Number(prev.runs.totalScore) || 0) + score,
                            lastScore: score
                        }
                    };
                    if (isFirstReturn) {
                        // D-148: 자동 퀘스트 부여 제거. 캠프에서 [받기] 버튼으로 명시 수령.
                        next.firstReturnDone = true;
                    }
                    return next;
                });
                setView('camp');
            };

            // [탐험 떠나기]
            // D-113: 캠프 pack(가방) → 탐험 인벤 인계.
            //   pack의 InventorySystem 인스턴스를 그대로 Game에 넘긴다(아이템 객체 전체 보존 = durabilityLeft/rotation 유지).
            //   campState.pack은 새 빈 인벤으로 교체 — 들고 갔으니 캠프엔 비움.
            //   탐험 중 인벤이 곧 가방의 후속(탐험에서 획득한 아이템들이 추가됨).
            //   handleRunEnd가 승리 시 그 인벤을 보관함으로 인입. 사망 시 폐기.
            const [departInv, setDepartInv] = useState(null);
            const handleDepart = () => {
                const carried = campState.pack;
                setDepartInv(carried || null);
                // D-148: 새 빈 pack은 tentBuilt 보너스 반영.
                setCampState(prev => ({ ...prev, pack: makePackInventory(prev.tentBuilt ? 1 : 0) }));
                setView('play');
            };

            // 텐트 퀘스트 완료 알림 메시지 — App 레벨 토스트 대신 가벼운 모달.
            const [questCompleteMsg, setQuestCompleteMsg] = useState(null);

            // [완수] — 재료 차감 + completed 이동 + 알림.
            //   재료 보유량 재확인(레이스 가드). 부족하면 무시(버튼은 disabled여야 함).
            const handleCompleteQuest = (questId) => {
                const def = questId === TENT_QUEST.id ? TENT_QUEST : null;
                if (!def) return;
                const inv = campState.inventory;
                if (!inv) return;
                // 재확인.
                const reqs = def.requirements || {};
                for (const [type, need] of Object.entries(reqs)) {
                    const have = inv.items.filter(it => it.type === type).length;
                    if (have < need) return; // disabled여야 했지만 가드.
                }
                // 차감 — 각 type 앞에서부터 need개 removeItem + items 배열 갱신.
                for (const [type, need] of Object.entries(reqs)) {
                    let remaining = need;
                    const keep = [];
                    for (const it of inv.items) {
                        if (remaining > 0 && it.type === type) {
                            inv.removeItem(it);
                            remaining -= 1;
                            continue;
                        }
                        keep.push(it);
                    }
                    inv.items = keep;
                }
                setCampState(prev => {
                    const active = prev.quests.active.filter(q => q.id !== questId);
                    const moved = prev.quests.active.find(q => q.id === questId);
                    return {
                        ...prev,
                        quests: {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : prev.quests.completed
                        }
                    };
                });
                if (questId === TENT_QUEST.id) {
                    // D-148: 텐트 보상 — tentBuilt=true → 다음 탐험부터 가방 좌측 위 1칸 추가 활성.
                    setCampState(prev => ({ ...prev, tentBuilt: true }));
                    setQuestCompleteMsg('텐트 자리를 잡았다. 가방 한 칸이 더 생겼다 (좌측 위).');
                }
            };

            // [데이터 초기화] — localStorage 삭제 + 초기 상태 + 시나리오부터.
            const handleResetData = () => {
                try { localStorage.removeItem(CAMP_STATE_KEY); } catch {}
                setCampState(makeInitialCampState());
                setPendingTentModal(null);
                setQuestCompleteMsg(null);
                setDepartInv(null);
                setView('intro');
            };

            if (view === 'intro') {
                return <IntroScenarioScreen onDismiss={handleIntroDismiss} />;
            }
            if (view === 'play') {
                return (
                    <Game
                        onRunEnd={handleRunEnd}
                        initialInventory={departInv}
                        activeQuests={(campState && campState.quests && campState.quests.active) || []}
                    />
                );
            }
            // camp
            return (
                <>
                    <CampScreen
                        campState={campState}
                        onDepart={handleDepart}
                        onCompleteQuest={handleCompleteQuest}
                        onTakeQuest={(questId) => {
                            // D-148: [받기] — quests.active에 추가. 이미 active/completed면 무시.
                            setCampState(prev => {
                                const taken = new Set([
                                    ...((prev.quests && prev.quests.active) || []).map(q => q.id),
                                    ...((prev.quests && prev.quests.completed) || []).map(q => q.id)
                                ]);
                                if (taken.has(questId)) return prev;
                                return {
                                    ...prev,
                                    quests: {
                                        active: [...(prev.quests.active || []), { id: questId, progress: { branch: 0, stone: 0, stem: 0 } }],
                                        completed: prev.quests.completed || []
                                    }
                                };
                            });
                        }}
                        onResetData={handleResetData}
                        onInventoryChange={() => setCampState(prev => ({ ...prev }))}
                    />
                    {pendingTentModal && (
                        <TentQuestModal
                            outcome={pendingTentModal}
                            onDismiss={() => setPendingTentModal(null)}
                        />
                    )}
                    {questCompleteMsg && (
                        <div className="modal" style={{ zIndex: 3400 }}>
                            <div style={{
                                background: '#1a1a2e',
                                color: '#eee',
                                padding: '24px 22px',
                                borderRadius: '10px',
                                border: '1px solid #d4b84a',
                                maxWidth: '360px',
                                width: '90vw',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', marginBottom: '10px' }}>🏕️</div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, marginBottom: '18px' }}>
                                    {questCompleteMsg}
                                </div>
                                <button
                                    onClick={() => setQuestCompleteMsg(null)}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    확인
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));

        // D-41 (2026-04-23 요한 지시): 게임 영역 내부의 contextmenu(우클릭/롱프레스)
        // 기본 동작 차단. CSS user-select:none만으로는 iOS Safari 롱프레스 복사 메뉴가
        // 뜨는 경우가 있어 JS 레벨에서도 막는다.
        // input/textarea/contentEditable은 제외 — 텍스트 선택·붙여넣기 컨텍스트가 필요.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
