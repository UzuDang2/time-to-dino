        // 캠프 인벤 그리드 (12x8 등). InventoryModal과 동일 룩.
        //   D-113: cellSize·onItemClick·selectedIds·onCellLongPress 옵션 추가.
        //     - 셀 크기를 호출부에서 조절(작은 미리보기 / PackTransferModal에서 더 작게).
        //     - selectedIds: Set 또는 배열. 포함된 item.id는 'selected' 클래스 부여.
        //     - onItemClick(item): 아이템 영역 탭 — 다중선택 토글 등에 사용.
        //     - onItemLongPress(item): 길게 누르면 ItemInfoModal 열기 등.
        //   기본은 정적 표시(클릭 핸들러 없음).
        function CampInventoryGrid({ inventory, cellSize, selectedIds, onItemClick, onItemLongPress }) {
            if (!inventory) return null;
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = Number(cellSize) > 0 ? Number(cellSize) : 36;
            const PAD = 3;
            const selSet = selectedIds instanceof Set
                ? selectedIds
                : (Array.isArray(selectedIds) ? new Set(selectedIds) : null);

            // 길게 누르기(롱프레스) 감지 — 500ms.
            const pressTimerRef = React.useRef(null);
            const longFiredRef = React.useRef(false);
            const startPress = (item) => {
                longFiredRef.current = false;
                if (typeof onItemLongPress !== 'function') return;
                pressTimerRef.current = setTimeout(() => {
                    longFiredRef.current = true;
                    onItemLongPress(item);
                }, 500);
            };
            const cancelPress = () => {
                if (pressTimerRef.current) {
                    clearTimeout(pressTimerRef.current);
                    pressTimerRef.current = null;
                }
            };
            const handleClick = (item) => {
                if (longFiredRef.current) return;
                if (typeof onItemClick === 'function') onItemClick(item);
            };

            return (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                        gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                        gap: '2px',
                        background: '#0f3460',
                        padding: `${PAD}px`,
                        borderRadius: '8px'
                    }}>
                        {Array(ROWS).fill(null).map((_, row) =>
                            Array(COLS).fill(null).map((_, col) => {
                                const occupied = !!inventory.grid[row][col];
                                const disabled = inventory.isDisabled && inventory.isDisabled(col, row);
                                return (
                                    <div
                                        key={`${row}-${col}`}
                                        className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                        style={disabled ? { background: '#0a1a2a', opacity: 0.35 } : undefined}
                                    />
                                );
                            })
                        )}
                    </div>
                    {inventory.items.map(item => {
                        const w = item.shape[0].length;
                        const h = item.shape.length;
                        const emoji = itemEmoji(item.type);
                        const selected = selSet && selSet.has(item.id);
                        const interactive = typeof onItemClick === 'function' || typeof onItemLongPress === 'function';
                        return (
                            <div
                                key={item.id}
                                className={`inventory-item${selected ? ' selected' : ''}`}
                                style={{
                                    left: `${item.x * CELL + PAD}px`,
                                    top: `${item.y * CELL + PAD}px`,
                                    width: `${w * CELL - PAD}px`,
                                    height: `${h * CELL - PAD}px`,
                                    fontSize: '9px',
                                    cursor: interactive ? 'pointer' : 'default',
                                    pointerEvents: interactive ? 'auto' : 'none',
                                    outline: selected ? '2px solid #4dd0e1' : undefined,
                                    boxShadow: selected ? '0 0 8px rgba(77,208,225,0.55)' : undefined,
                                    zIndex: selected ? 2 : 1
                                }}
                                onClick={() => handleClick(item)}
                                onMouseDown={() => startPress(item)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onTouchStart={() => startPress(item)}
                                onTouchEnd={cancelPress}
                                onTouchCancel={cancelPress}
                            >
                                {emoji
                                    ? <span style={{ fontSize: Math.round(CELL * 0.55) + 'px', lineHeight: 1 }}>{emoji}</span>
                                    : item.name}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // D-113: 보관함 단독 풀스크린 팝업.
        //   캠프 [보관함] 버튼에서 열림. 12x8 그리드를 한눈에.
        //   아이템 길게 누르면 ItemInfoModal로 정보 표시.
        function StorageModal({ inventory, onClose }) {
            const [infoItem, setInfoItem] = React.useState(null);
            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px 18px 24px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(94vw, 460px)',
                        margin: '24px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>📦 보관함</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >닫기</button>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'center' }}>
                            <CampInventoryGrid
                                inventory={inventory}
                                cellSize={40}
                                onItemLongPress={(it) => setInfoItem(it)}
                            />
                        </div>
                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', marginTop: '10px' }}>
                            아이템을 길게 누르면 정보를 볼 수 있다.
                        </div>
                    </div>
                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={() => setInfoItem(null)}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // D-113: 인벤 간 아이템 이전 — 인스턴스 직접 placement (durability/rotation 보존).
        //   selectedIds: 옮길 source 아이템 id 배열.
        //   src/dst: InventorySystem 인스턴스. dst에 빈 자리 없으면 부분 이전(들어간 만큼만).
        //   반환: { moved: [item...], failed: [item...] } — 호출부 토스트 메시지에 사용.
        //   src에서 제거 + dst에 새 좌표로 placeItem. id는 dst 측에서 새로 발급(같은 id 충돌 방지).
        function transferItems(src, dst, selectedIds) {
            const idSet = new Set(selectedIds || []);
            const moved = [];
            const failed = [];
            // src.items를 복사 후 순회 — removeItem 시 src.items도 갱신되므로 미리 떠두기.
            const targets = src.items.filter(it => idSet.has(it.id));
            for (const it of targets) {
                const shape = it.shape;
                const pos = dst.findEmptySpace(shape);
                if (!pos) { failed.push(it); continue; }
                const placed = {
                    ...it,
                    id: Date.now() + Math.random(),
                    x: pos.x,
                    y: pos.y
                };
                // src에서 그리드 비우고 items에서 제거.
                src.removeItem(it);
                src.items = src.items.filter(x => x.id !== it.id);
                // dst에 배치.
                dst.placeItem(placed);
                dst.items.push(placed);
                moved.push(placed);
            }
            return { moved, failed };
        }

        // D-113: 보관함 ↔ 가방 다중선택·옮기기·서로 바꾸기 풀스크린 모달.
        //   props.storage / props.pack — InventorySystem 인스턴스.
        //   props.onChange() — 변경 후 부모에 재렌더 트리거 알림 (campState 객체 새로 만들기).
        //   props.onClose — 닫기.
        //   상태: selectedFromStorage / selectedFromPack (각각 Set<itemId>).
        //   버튼 활성:
        //     - storage만 선택 → [가방으로]
        //     - pack만 선택 → [보관함으로]
        //     - 양쪽 선택 → [서로 바꾸기]
        function PackTransferModal({ storage, pack, onChange, onClose }) {
            const [selStorage, setSelStorage] = React.useState(() => new Set());
            const [selPack, setSelPack] = React.useState(() => new Set());
            const [toast, setToast] = React.useState(null);

            const toggle = (which, id) => {
                const setter = which === 'storage' ? setSelStorage : setSelPack;
                setter(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 1800);
            };

            const onlyStorage = selStorage.size > 0 && selPack.size === 0;
            const onlyPack = selPack.size > 0 && selStorage.size === 0;
            const both = selStorage.size > 0 && selPack.size > 0;

            // [가방으로 옮기기]
            const moveToPack = () => {
                const ids = Array.from(selStorage);
                const r = transferItems(storage, pack, ids);
                if (r.failed.length > 0) {
                    showToast(`가방이 가득 — ${r.moved.length}개만 옮김`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}개를 가방으로`);
                }
                setSelStorage(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [보관함으로 옮기기]
            const moveToStorage = () => {
                const ids = Array.from(selPack);
                const r = transferItems(pack, storage, ids);
                if (r.failed.length > 0) {
                    showToast(`보관함이 가득 — ${r.moved.length}개만 옮김`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}개를 보관함으로`);
                }
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [서로 바꾸기] — 동시에 양쪽으로 보낸다.
            //   먼저 양쪽에서 선택 아이템을 src.items에서 떼어내고(grid도 비움),
            //   각각 상대편 dst에 빈 자리에 배치. 공간 부족 시 부분만 성공.
            //   부분 성공 시 실패한 쪽은 원래 인벤에 다시 빈 자리로 폴백.
            const swapBoth = () => {
                const sIds = Array.from(selStorage);
                const pIds = Array.from(selPack);
                const sItems = storage.items.filter(it => selStorage.has(it.id));
                const pItems = pack.items.filter(it => selPack.has(it.id));
                // 1) src에서 분리 (양쪽 모두).
                for (const it of sItems) {
                    storage.removeItem(it);
                    storage.items = storage.items.filter(x => x.id !== it.id);
                }
                for (const it of pItems) {
                    pack.removeItem(it);
                    pack.items = pack.items.filter(x => x.id !== it.id);
                }
                // 2) 상대편 dst에 배치 시도. 실패 시 원래 인벤으로 복원.
                let movedToPack = 0, movedToStorage = 0, failedBack = 0;
                const place = (item, dst) => {
                    const pos = dst.findEmptySpace(item.shape);
                    if (!pos) return false;
                    const placed = { ...item, id: Date.now() + Math.random(), x: pos.x, y: pos.y };
                    dst.placeItem(placed);
                    dst.items.push(placed);
                    return true;
                };
                for (const it of sItems) {
                    if (place(it, pack)) movedToPack += 1;
                    else {
                        // 원래 storage로 폴백.
                        if (!place(it, storage)) failedBack += 1;
                    }
                }
                for (const it of pItems) {
                    if (place(it, storage)) movedToStorage += 1;
                    else {
                        if (!place(it, pack)) failedBack += 1;
                    }
                }
                if (movedToPack + movedToStorage === 0) {
                    showToast('공간이 부족해 바꾸지 못함');
                } else if (sItems.length + pItems.length > movedToPack + movedToStorage) {
                    showToast(`일부만 교환 (가방 ${movedToPack} / 보관함 ${movedToStorage})`);
                } else {
                    showToast(`교환 완료 (가방 ${movedToPack} / 보관함 ${movedToStorage})`);
                }
                setSelStorage(new Set());
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };

            const btnStyle = (active) => ({
                background: active ? '#d4b84a' : '#2a2a3e',
                color: active ? '#1a1a2e' : '#666',
                border: 'none',
                padding: '10px 14px',
                borderRadius: '6px',
                cursor: active ? 'pointer' : 'not-allowed',
                fontSize: '12px',
                fontWeight: 700,
                flex: 1,
                minWidth: 0
            });

            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '18px 14px 22px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(96vw, 540px)',
                        margin: '16px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>🎒 물건 챙기기</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >닫기</button>
                        </div>

                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            gap: '14px',
                            alignItems: 'center'
                        }}>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    📦 보관함 ({storage.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={storage}
                                        cellSize={32}
                                        selectedIds={selStorage}
                                        onItemClick={(it) => toggle('storage', it.id)}
                                    />
                                </div>
                            </div>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    🎒 가방 ({pack.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={pack}
                                        cellSize={36}
                                        selectedIds={selPack}
                                        onItemClick={(it) => toggle('pack', it.id)}
                                    />
                                </div>
                            </div>
                        </div>

                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', margin: '12px 0' }}>
                            아이템을 탭해서 선택. 양쪽에서 선택하면 [서로 바꾸기].
                        </div>

                        <div style={{ display: 'flex', gap: '6px' }}>
                            <button
                                onClick={moveToPack}
                                disabled={!onlyStorage}
                                style={btnStyle(onlyStorage)}
                            >
                                가방으로
                            </button>
                            <button
                                onClick={moveToStorage}
                                disabled={!onlyPack}
                                style={btnStyle(onlyPack)}
                            >
                                보관함으로
                            </button>
                            <button
                                onClick={swapBoth}
                                disabled={!both}
                                style={btnStyle(both)}
                            >
                                서로 바꾸기
                            </button>
                        </div>

                        {toast && (
                            <div style={{
                                position: 'fixed',
                                left: '50%',
                                bottom: '40px',
                                transform: 'translateX(-50%)',
                                background: 'rgba(0,0,0,0.8)',
                                color: '#fff',
                                padding: '10px 18px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                zIndex: 3401
                            }}>
                                {toast}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 캠프 메인 화면.
        //   props.campState — 영속화 상태. quests/inventory(InventorySystem 인스턴스)/pack/runs.
        //   props.onDepart — [탐험 떠나기] 클릭.
        //   props.onCompleteQuest(questId) — [완수] 클릭.
        //   props.onResetData — [데이터 초기화] 확정.
        //   props.onInventoryChange — 보관함/가방 변경 후 부모 재렌더 트리거 (campState 객체 새로 만들기).
        // D-113: 레이아웃 재구성.
        //   상단: 점수 → [보관함] 버튼 → [퀘스트 목록] → [현재 진행 중 퀘스트] → 건설.
        //   하단: [물건 챙기기] [탐험 떠나기] 두 버튼.
        function CampScreen({ campState, onDepart, onCompleteQuest, onTakeQuest, onResetData, onInventoryChange }) {
            const [resetOpen, setResetOpen] = React.useState(false);
            const [storageOpen, setStorageOpen] = React.useState(false);
            const [packOpen, setPackOpen] = React.useState(false);
            // D-145: 보관함을 InventoryModal로 재사용 — 선택모드/머지/조합/레시피 패널 동작.
            const [storageSelectedItem, setStorageSelectedItem] = React.useState(null);
            const inv = campState && campState.inventory;
            const pack = campState && campState.pack;
            const runs = (campState && campState.runs) || { total: 0, victories: 0, deaths: 0 };
            const activeQuests = (campState && campState.quests && campState.quests.active) || [];
            const completedQuests = (campState && campState.quests && campState.quests.completed) || [];

            // 인벤에서 type별 보유량 계산 (실시간). 저장된 progress보다 정확.
            const countOfType = (type) => {
                if (!inv || !Array.isArray(inv.items)) return 0;
                return inv.items.filter(it => it.type === type).length;
            };

            const renderQuestCard = (quest) => {
                const def = quest.id === TENT_QUEST.id ? TENT_QUEST : null;
                if (!def) return null;
                const reqs = def.requirements || {};
                const progress = Object.entries(reqs).map(([type, need]) => {
                    const have = countOfType(type);
                    const dispDef = InventorySystem.resolveDef(type) || {};
                    const name = dispDef.name || type;
                    return { type, name, have, need, ok: have >= need };
                });
                const canComplete = progress.every(p => p.ok);
                return (
                    <div key={quest.id} style={{
                        background: '#16213e',
                        border: '1px solid #2a3a5e',
                        borderRadius: '8px',
                        padding: '12px 14px',
                        marginBottom: '10px'
                    }}>
                        <div style={{
                            fontSize: '14px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '8px'
                        }}>
                            {def.icon} {def.name}
                        </div>
                        <div style={{ fontSize: '12px', lineHeight: 1.7, color: '#ddd', marginBottom: '10px' }}>
                            {progress.map(p => (
                                <div key={p.type} style={{ color: p.ok ? '#8bd17c' : '#ddd' }}>
                                    · {p.name} {p.have}/{p.need}
                                </div>
                            ))}
                        </div>
                        <button
                            onClick={() => canComplete && onCompleteQuest && onCompleteQuest(quest.id)}
                            disabled={!canComplete}
                            style={{
                                background: canComplete ? '#d4b84a' : '#2a2a3e',
                                color: canComplete ? '#1a1a2e' : '#666',
                                border: 'none',
                                padding: '7px 18px',
                                borderRadius: '5px',
                                cursor: canComplete ? 'pointer' : 'not-allowed',
                                fontSize: '12px',
                                fontWeight: 700
                            }}
                        >
                            완수
                        </button>
                    </div>
                );
            };

            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    overflowY: 'auto',
                    background: '#0d0d18',
                    color: '#eee',
                    padding: '20px 16px 80px',
                    boxSizing: 'border-box',
                    zIndex: 100
                }}>
                    <div style={{ maxWidth: '720px', margin: '0 auto' }}>
                        <div style={{
                            fontSize: '22px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '4px',
                            textAlign: 'center',
                            letterSpacing: '0.06em'
                        }}>
                            🏕️ 베이스캠프
                        </div>
                        <div style={{
                            fontSize: '11px',
                            color: '#888',
                            textAlign: 'center',
                            marginBottom: '12px'
                        }}>
                            탐험 {runs.total} · 생환 {runs.victories} · 사망 {runs.deaths}
                        </div>

                        {/* D-110: 점수 통계 — 최고/누적/평균 + 마지막 런. */}
                        {runs.total > 0 && (
                            <div style={{
                                display: 'flex',
                                justifyContent: 'center',
                                marginBottom: '20px'
                            }}>
                                <div className="score-badge" style={{ minWidth: '220px' }}>
                                    <div className="score-value">🏆 점수</div>
                                    <div className="score-row">
                                        <span className="lbl">최고</span>
                                        <span>{Number(runs.bestScore) || 0}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">누적</span>
                                        <span>{(Number(runs.totalScore) || 0).toLocaleString()}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">평균</span>
                                        <span>
                                            {Math.round((Number(runs.totalScore) || 0) / Math.max(1, runs.total))}
                                        </span>
                                    </div>
                                    {runs.lastScore != null && (
                                        <div className="score-row" style={{ opacity: 0.75 }}>
                                            <span className="lbl">마지막 런</span>
                                            <span>{Number(runs.lastScore) || 0}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* D-113: [보관함] 버튼 — StorageModal 트리거. 인벤 미리보기는 모달에서. */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                            <button
                                onClick={() => setStorageOpen(true)}
                                style={{
                                    background: '#1a1a2e',
                                    color: '#d4b84a',
                                    border: '1px solid #4a4a6e',
                                    padding: '11px 28px',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: 700
                                }}
                            >
                                📦 보관함 ({(inv && inv.items && inv.items.length) || 0})
                            </button>
                        </div>

                        {/* D-113/D-148: 퀘스트 목록 — 받기 가능 / 진행 중 / 완수 한눈에. */}
                        <div style={{
                            background: '#1a1a2e',
                            border: '1px solid #2a3a5e',
                            borderRadius: '10px',
                            padding: '14px',
                            marginBottom: '16px'
                        }}>
                            <div style={{ fontSize: '13px', fontWeight: 700, color: '#bbb', marginBottom: '10px' }}>
                                퀘스트 목록
                            </div>
                            {(() => {
                                // D-148: 받을 수 있는 퀘스트 — active/completed 어디에도 없는 정의.
                                const taken = new Set([
                                    ...activeQuests.map(q => q.id),
                                    ...completedQuests.map(q => q.id)
                                ]);
                                const available = [TENT_QUEST].filter(q => !taken.has(q.id));
                                if (available.length === 0 && activeQuests.length === 0 && completedQuests.length === 0) {
                                    return (
                                        <div style={{ fontSize: '12px', color: '#777' }}>
                                            받을 수 있는 퀘스트가 없다.
                                        </div>
                                    );
                                }
                                return available.map(def => (
                                    <div key={`avail:${def.id}`} style={{
                                        display: 'flex',
                                        justifyContent: 'space-between',
                                        alignItems: 'center',
                                        gap: '8px',
                                        padding: '6px 0',
                                        borderBottom: '1px dashed #2a3a5e'
                                    }}>
                                        <span style={{ fontSize: '12px', color: '#d4b84a' }}>
                                            ✨ {def.icon} {def.name} <span style={{ color: '#888' }}>(받기 가능)</span>
                                        </span>
                                        <button
                                            onClick={() => onTakeQuest && onTakeQuest(def.id)}
                                            style={{
                                                background: '#d4b84a',
                                                color: '#1a1a2e',
                                                border: 'none',
                                                padding: '4px 10px',
                                                borderRadius: '4px',
                                                cursor: 'pointer',
                                                fontSize: '11px',
                                                fontWeight: 700
                                            }}
                                        >
                                            받기
                                        </button>
                                    </div>
                                ));
                            })()}
                            {activeQuests.map(quest => {
                                const def = quest.id === TENT_QUEST.id ? TENT_QUEST : null;
                                if (!def) return null;
                                return (
                                    <div key={quest.id} style={{ fontSize: '12px', color: '#ddd', lineHeight: 1.7 }}>
                                        {def.icon} {def.name} <span style={{ color: '#888' }}>(진행 중)</span>
                                    </div>
                                );
                            })}
                            {completedQuests.map(q => {
                                const def = q.id === TENT_QUEST.id ? TENT_QUEST : null;
                                if (!def) return null;
                                return (
                                    <div key={q.id} style={{ fontSize: '12px', color: '#8bd17c', lineHeight: 1.7 }}>
                                        ✅ {def.name} <span style={{ color: '#666' }}>(완수)</span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* 현재 진행 중 퀘스트 — 카드 형태로 재료 진행 + [완수] 버튼 */}
                        {activeQuests.length > 0 && (
                            <div style={{
                                background: '#1a1a2e',
                                border: '1px solid #2a3a5e',
                                borderRadius: '10px',
                                padding: '14px',
                                marginBottom: '16px'
                            }}>
                                <div style={{ fontSize: '13px', fontWeight: 700, color: '#bbb', marginBottom: '10px' }}>
                                    진행 중인 퀘스트
                                </div>
                                {activeQuests.map(renderQuestCard)}
                            </div>
                        )}

                        {/* 건설 placeholder */}
                        <div style={{
                            background: '#1a1a2e',
                            border: '1px dashed #2a3a5e',
                            borderRadius: '10px',
                            padding: '14px',
                            marginBottom: '20px',
                            textAlign: 'center',
                            color: '#666',
                            fontSize: '12px'
                        }}>
                            건설 (추후 단계에서 열림)
                        </div>

                        {/* D-113: 하단 — [물건 챙기기] [탐험 떠나기] */}
                        <div style={{
                            display: 'flex',
                            gap: '10px',
                            justifyContent: 'center',
                            marginBottom: '20px'
                        }}>
                            <button
                                onClick={() => setPackOpen(true)}
                                style={{
                                    background: '#1a1a2e',
                                    color: '#d4b84a',
                                    border: '1px solid #d4b84a',
                                    padding: '14px 22px',
                                    fontSize: '15px',
                                    fontWeight: 700,
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    flex: 1,
                                    maxWidth: '200px'
                                }}
                            >
                                🎒 물건 챙기기
                            </button>
                            <button
                                onClick={onDepart}
                                style={{
                                    background: '#4CAF50',
                                    color: 'white',
                                    border: 'none',
                                    padding: '14px 22px',
                                    fontSize: '15px',
                                    fontWeight: 700,
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    boxShadow: '0 4px 12px rgba(76,175,80,0.3)',
                                    flex: 1,
                                    maxWidth: '200px'
                                }}
                            >
                                🌲 탐험 떠나기
                            </button>
                        </div>
                    </div>

                    {storageOpen && inv && (
                        <InventoryModal
                            inventory={inv}
                            selectedItem={storageSelectedItem}
                            setSelectedItem={setStorageSelectedItem}
                            closeInventory={() => {
                                setStorageSelectedItem(null);
                                setStorageOpen(false);
                                if (typeof onInventoryChange === 'function') onInventoryChange();
                            }}
                            title="📦 보관함"
                            mode="storage"
                        />
                    )}
                    {packOpen && inv && pack && (
                        <PackTransferModal
                            storage={inv}
                            pack={pack}
                            onChange={onInventoryChange}
                            onClose={() => setPackOpen(false)}
                        />
                    )}

                    {/* 데이터 초기화 — 우하단 */}
                    <div style={{
                        position: 'fixed',
                        right: '12px',
                        bottom: '12px',
                        zIndex: 100
                    }}>
                        <button
                            onClick={() => setResetOpen(true)}
                            style={{
                                background: 'transparent',
                                color: '#666',
                                border: '1px solid #333',
                                padding: '6px 12px',
                                borderRadius: '4px',
                                cursor: 'pointer',
                                fontSize: '11px'
                            }}
                        >
                            데이터 초기화
                        </button>
                    </div>

                    {resetOpen && (
                        <ResetConfirmModal
                            onCancel={() => setResetOpen(false)}
                            onConfirm={() => {
                                setResetOpen(false);
                                onResetData && onResetData();
                            }}
                        />
                    )}
                </div>
            );
        }

        // ============================================
        // D-110 (2026-04-24): 점수 배지 — 점수와 산출 항목을 미니 리스트로 표시.
        //   props.score      — 최종 점수.
        //   props.breakdown  — [{ label, value }] 양수만 (0은 호출자가 걸러 넘김).
        //   GameEndModal/LootResultScreen/CampScreen에서 공통 사용.
        // ============================================
        function ScoreBadge({ score, breakdown }) {
            const rows = Array.isArray(breakdown) ? breakdown.filter(r => r && r.value) : [];
            return (
                <div className="score-badge">
                    <div className="score-value">🏆 점수: {score}</div>
                    {rows.map((r, i) => (
                        <div key={i} className="score-row">
                            <span className="lbl">{r.label}</span>
                            <span>+{r.value}</span>
                        </div>
                    ))}
                </div>
            );
        }

        // 점수 산출 내역 — calculateRunScore와 같은 규칙으로 항목별 가산값 산출.
        //   selectedList가 null이면 items 전체 기준.
        function buildScoreBreakdown({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return [];
            const rows = [];
            rows.push({ label: '생존', value: 100 });
            const tiles = Math.max(0, Number(uniqueTilesVisited) || 0);
            if (tiles > 0) rows.push({ label: `이동거리(${tiles})`, value: tiles * 3 });
            if ((Number(detection) || 0) < 80) rows.push({ label: '은밀(발각<80)', value: 30 });

            const stats = runStats || {};
            const l1 = Number(stats.l1PreyKills) || 0;
            const l2 = Number(stats.l2PreyKills) || 0;
            const bd = Number(stats.bossDangerEntered) || 0;
            if (l1) rows.push({ label: `사냥 L1 ×${l1}`, value: l1 * 5 });
            if (l2) rows.push({ label: `사냥 L2 ×${l2}`, value: l2 * 20 });
            if (bd) rows.push({ label: `보스 위협권 ×${bd}`, value: bd * 15 });

            // 자원 — grade별 합산.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            let weapons = 0, armorShield = 0, g1 = 0, g2 = 0, g3 = 0;
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === '무기') { weapons += 1; continue; }
                if (cat === 'shield' || cat === 'armor') { armorShield += 1; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) g1 += 1;
                else if (grade === 2) g2 += 1;
                else if (grade === 3) g3 += 1;
            }
            if (weapons) rows.push({ label: `무기 ×${weapons}`, value: weapons * 5 });
            if (armorShield) rows.push({ label: `방어구 ×${armorShield}`, value: armorShield * 8 });
            if (g1) rows.push({ label: `자원 1단계 ×${g1}`, value: g1 * 1 });
            if (g2) rows.push({ label: `자원 2단계 ×${g2}`, value: g2 * 3 });
            if (g3) rows.push({ label: `자원 3단계 ×${g3}`, value: g3 * 6 });
            return rows;
        }

        // ============================================
        // D-110 (2026-04-24): 전리품 결과창.
        //   props.runFinal     — { victory, items, runStats, uniqueTilesVisited, detection }
        //   props.onConfirm(selectedItemIds[]) — 선택 항목 캠프 인입.
        //   props.onCancel     — 모달 닫기 (GameEndModal 복귀).
        //
        //   - 인벤 그리드(rows × cols, 8x12 시각) — items.x/y/shape 그대로 배치.
        //   - 셀(아이템) 탭 = 선택/해제. 초기값: 모든 items 선택.
        //   - 점수는 selectedIds 변동에 따라 실시간 재계산(자원 점수만 변동).
        //   - 버튼: [전부 챙기기] / [선택만 챙기기] / [취소].
        // ============================================
        function LootResultScreen({ runFinal, onConfirm, onCancel }) {
            const items = (runFinal && Array.isArray(runFinal.items)) ? runFinal.items : [];
            const [selectedIds, setSelectedIds] = React.useState(() => {
                const s = new Set();
                for (const it of items) { if (it && it.id != null) s.add(it.id); }
                return s;
            });

            const toggleId = (id) => {
                setSelectedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const selectedItems = items.filter(it => it && selectedIds.has(it.id));
            const score = calculateRunScore({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });
            const breakdown = buildScoreBreakdown({
                victory: !!(runFinal && runFinal.victory),
                uniqueTilesVisited: runFinal && runFinal.uniqueTilesVisited,
                detection: runFinal && runFinal.detection,
                items,
                runStats: runFinal && runFinal.runStats,
                selectedItems
            });

            // D-144: 그리드 사이즈는 실제 런 가방(inventory.rows/cols) 기준. fallback 5x5.
            //   가방 disabled 셀(좌우 상단 구석)도 동일하게 비활성 표시 — 시각 일관성.
            const lootInv = runFinal && runFinal.inventory;
            const ROWS = (lootInv && Number(lootInv.rows)) || 5;
            const COLS = (lootInv && Number(lootInv.cols)) || 5;
            const CELL = 44, PAD = 3;

            return (
                <div className="modal" style={{
                    zIndex: 1800,
                    background: 'rgba(8,10,18,0.92)',
                    alignItems: 'flex-start',
                    overflowY: 'auto',
                    padding: '24px 16px'
                }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        border: '1px solid #2a3a5e',
                        borderRadius: '10px',
                        padding: '20px 18px',
                        maxWidth: '560px',
                        width: '100%',
                        boxSizing: 'border-box'
                    }}>
                        {/* 헤더 */}
                        <div style={{
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'flex-start',
                            gap: '12px',
                            marginBottom: '14px',
                            flexWrap: 'wrap'
                        }}>
                            <div style={{
                                fontSize: '18px',
                                fontWeight: 700,
                                color: '#d4b84a'
                            }}>
                                📦 탐험 결과
                            </div>
                            <ScoreBadge score={score} breakdown={breakdown} />
                        </div>

                        {/* 인벤 그리드 */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '12px' }}>
                            <div style={{ position: 'relative', display: 'inline-block' }}>
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                                    gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                                    gap: '2px',
                                    background: '#0f3460',
                                    padding: `${PAD}px`,
                                    borderRadius: '8px'
                                }}>
                                    {Array(ROWS).fill(null).map((_, row) =>
                                        Array(COLS).fill(null).map((_, col) => {
                                            const disabled = lootInv && typeof lootInv.isDisabled === 'function'
                                                ? lootInv.isDisabled(col, row) : false;
                                            return (
                                                <div
                                                    key={`${row}-${col}`}
                                                    className={`inventory-cell ${disabled ? 'disabled' : ''}`}
                                                />
                                            );
                                        })
                                    )}
                                </div>
                                {items.map(item => {
                                    if (!item || !item.shape) return null;
                                    const w = item.shape[0].length;
                                    const h = item.shape.length;
                                    const emoji = itemEmoji(item.type);
                                    const selected = selectedIds.has(item.id);
                                    return (
                                        <div
                                            key={item.id}
                                            className={`inventory-item loot-item ${selected ? 'selected' : ''}`}
                                            onClick={() => toggleId(item.id)}
                                            style={{
                                                left: `${item.x * CELL + PAD}px`,
                                                top: `${item.y * CELL + PAD}px`,
                                                width: `${w * CELL - PAD}px`,
                                                height: `${h * CELL - PAD}px`,
                                                fontSize: '9px',
                                                cursor: 'pointer',
                                                opacity: selected ? 1 : 0.4
                                            }}
                                            title={item.name || item.type}
                                        >
                                            {emoji
                                                ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{emoji}</span>
                                                : (item.name || item.type)}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* 안내 */}
                        <div style={{
                            fontSize: '12px',
                            color: '#aaa',
                            textAlign: 'center',
                            marginBottom: '14px',
                            lineHeight: 1.5
                        }}>

        // ============================================
        // 사냥 전투 모달 (D-46, 2026-04-23)
        // ============================================
        //
        // 구조:
        //   - 상단: prey 이름 + HP 바 + meat 표시
        //   - 적 패턴 3슬롯(readonly): 회피 / 회피 / 빠르게 도망
        //   - 내 슬롯 3칸: 비었으면 "비었음", 카드 있으면 카드 렌더(탭→손패 복귀)
        //   - 확정 버튼: 3슬롯 모두 차야 활성
        //   - 내 손패: buildHuntDeck 결과. 탭 시 가장 왼쪽 빈 슬롯에 배치.
        //
        // 슬롯↔손패 이동은 uid 기준. "뒤 슬롯 고정" 원칙 — 슬롯→손패 복귀 시 다른 슬롯 위치 유지.
        // 확정 시 resolveHunt(prey, slots) → 턴 로그 순차 표시(500ms) → onResolve(result) 콜백.
        // D-58/D-74: HuntCombatModal 수치 배지 통일.
        //   - 🗡️+N / N% / 🏹+N / 🛡️+N 순서 고정, 줄바꿈 없음.
        //   - damage=0 && defense>0 → 🗡️ 숨기고 🛡️ 표시 (크아 웅크리기/방패 막기).
        //   - damage=0 && defense=0 (dodge/run_away) → 🗡️·🏹 생략, N%만.
        //   - 라벨 텍스트 전부 제거 — 아이콘 + 숫자로 통일.
        const STAT_ICONS = { damage: '🗡️', accuracy: '🏹', defense: '🛡️', evade: '💨' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff', evade: '#d4b84a' };
        function StatBadges({ card }) {
            const dmg = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const def = Number(card.defense) || 0;
            const eva = Number(card.evade) || 0;
            const sr = card.success_rate;
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap' }}>
                    {dmg > 0 && (
                        <span style={{ color: STAT_COLORS.damage }}>{STAT_ICONS.damage}+{dmg}</span>
                    )}
                    {/* D-113: success_rate=100은 모든 공격/회피 카드의 기본값 — 정보 가치 없어 숨김.
                        run_away 등 100 미만 카드만 % 표시. */}
                    {(sr !== undefined && sr !== null && Number(sr) !== 100) && (
                        <span style={{ color: '#aaa' }}>{sr}%</span>
                    )}
                    {dmg > 0 && acc > 0 && (
                        <span style={{ color: STAT_COLORS.accuracy }}>{STAT_ICONS.accuracy}+{acc}</span>
                    )}
                    {def > 0 && (
                        <span style={{ color: STAT_COLORS.defense }}>{STAT_ICONS.defense}+{def}</span>
                    )}
                    {eva > 0 && (
                        <span style={{ color: STAT_COLORS.evade }}>{STAT_ICONS.evade}+{eva}</span>
                    )}
                </span>
            );
        }

        // D-58: 적 슬롯 최종 회피율 배지.
        //   - damage>0 카드 배치 + finalEvade < baseEvade → 초록 + bold.
        //   - 그 외(빈 슬롯 / damage=0 카드 / 감소 없음) → 기본색.
        function EvadeBadge({ baseEvade, finalEvade, consumed }) {
            const reduced = finalEvade < baseEvade;
            return (
                <span
                    className={reduced ? 'evade-changed' : undefined}
                    style={{
                        color: reduced ? '#8bd17c' : '#ddd',
                        fontWeight: reduced ? 700 : 400,
                        opacity: consumed ? 0.5 : 1,
                        transition: 'color 0.2s, opacity 0.2s'
                    }}>
                    회피 {finalEvade}
                </span>
            );
        }

        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel }) {
            // D-75: Level 2 prey는 4턴. Level 1은 기존 3턴.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // 표시된 턴 로그
            const [result, setResult] = useState(null);

            // D-58/D-60/D-96: 슬롯별 최종 회피 계산 (턴별 base 반영).
            //   SSOT: combatDeck.js::resolveHunt 공식과 동일.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount)
            //     finalEvade = baseEvadeT (명중 vs 회피는 결정론 비교 — UI에선 base 표시).
            //   damage=0 카드 / 빈 슬롯 → base(턴별) 그대로.
            //   card.accuracy(명중)는 buildHuntDeck 이 이미 카드+무기 합산(D-50).
            // D-75/D-98/D-108: actions_per_turn CSV 파싱 → 턴별 actionDef 배열.
            //   SSOT는 combatDeck.js::parsePreyActions + findPreyAction.
            //   slotActions[i] = { id, name, type, damage, accuracy, defense } — UI 배지에 직접 사용.
            const slotActions = React.useMemo(() => {
                const ids = CombatDeck.parsePreyActions(prey, SLOT_COUNT);
                return ids.map(id => CombatDeck.findPreyAction(id));
            }, [prey.actions_per_turn, prey.level, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    // D-96: % → 정수. 도주 누적 패널티는 1당 회피 -1.
                    const base = Math.max(0, (byTurn[i] ?? 1) - fleeCount);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    // D-96: 결정론 — 명중 ≥ 회피 → 무조건 명중(final=0). 회피 > 명중 → 무효(final=base).
                    const acc = Number(card.accuracy) || 0;
                    const final = (acc >= base) ? 0 : base;
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));
            // 전투 시작 시 hpCurrent = prey.hp. 이후 표시용으로만 사용.
            const [hpCurrent, setHpCurrent] = useState(prey.hp);

            const allFilled = slots.every(s => s !== null);

            // D-64 (2026-04-24): 슬롯 배치 실시간 재고 반영.
            //   buildHuntDeck의 slotLimit은 전투 시작 시점 1회 계산이라 배치로 차감 안 됨.
            //   requirement 이름 기반 capacity를 실시간으로 계산해 손패 비활성·슬롯 내구도 표시.
            //   무기(category='무기')는 durabilityLeft 합이 capacity, 일반 재료는 인스턴스 수.
            const reqCapacityByName = React.useMemo(() => {
                const cap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    const name = def.name || it.name;
                    if (!name) continue;
                    const isWeapon = def.category === '무기';
                    const contribute = isWeapon
                        ? (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0)
                        : 1;
                    cap[name] = (cap[name] || 0) + contribute;
                }
                return cap;
            }, [inventory]);

            // 슬롯에 이미 배치된 카드의 requirements만큼 차감한 잔량.
            const remainingByReq = React.useMemo(() => {
                const rem = { ...reqCapacityByName };
                for (const c of slots) {
                    if (!c || !Array.isArray(c.requirements)) continue;
                    for (const r of c.requirements) {
                        rem[r] = (rem[r] || 0) - 1;
                    }
                }
                return rem;
            }, [slots, reqCapacityByName]);

            const canPlaceCard = (card) => {
                if (!Array.isArray(card.requirements) || card.requirements.length === 0) return true;
                for (const r of card.requirements) {
                    if ((remainingByReq[r] || 0) <= 0) return false;
                }
                return true;
            };

            // 슬롯별 무기 내구도 계산 (weaponId별 순차 차감).
            //   before: 이 슬롯 사용 직전 내구, after: 사용 직후 내구.
            //   무기 아닌 카드(돌 던지기 등)와 빈 슬롯은 null.
            const slotWeaponDur = React.useMemo(() => {
                const weaponCap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    if (def.category !== '무기') continue;
                    weaponCap[it.type] = (weaponCap[it.type] || 0)
                        + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0);
                }
                const remain = { ...weaponCap };
                return slots.map(card => {
                    if (!card || !card.weaponId) return null;
                    const before = remain[card.weaponId] || 0;
                    const loss = (card.full_loss === 'Y' || card.fullLoss === true) ? before : 1;
                    const after = Math.max(0, before - loss);
                    remain[card.weaponId] = after;
                    return { before, after };
                });
            }, [slots, inventory]);

            // D-46/D-47: 카드 재사용 규칙.
            //   - infinite 카드(주먹/회피/도망): 손패 1장, 슬롯 무제한 배치.
            //   - slotLimit 카드(돌 던지기/창 등): 손패 1장, 슬롯 배치는 가방 내 아이템 개수만큼.
            //   - D-64: 실시간 재고 체크로 통합 — canPlaceCard로 판정.
            const handleHandClick = (card) => {
                if (phase !== 'select') return;
                const emptyIdx = slots.findIndex(s => s === null);
                if (emptyIdx < 0) return;
                if (!canPlaceCard(card)) return;
                const isReusable = !!(card.infinite || card.slotLimit);
                const newSlots = [...slots];
                newSlots[emptyIdx] = isReusable
                    ? { ...card, uid: `${card.uid}:slot:${emptyIdx}:${Date.now()}` }
                    : card;
                setSlots(newSlots);
                if (!isReusable) {
                    setHand(hand.filter(c => c.uid !== card.uid));
                }
            };

            const handleSlotClick = (slotIdx) => {
                if (phase !== 'select') return;
                const card = slots[slotIdx];
                if (!card) return;
                const newSlots = [...slots];
                newSlots[slotIdx] = null;
                setSlots(newSlots);
                const isReusable = !!(card.infinite || card.slotLimit);
                if (!isReusable) {
                    setHand([...hand, card]);
                }
            };

            const handleConfirm = () => {
                if (!allFilled || phase !== 'select') return;
                // D-51: weaponState 구성 — 슬롯에 배치된 무기 요구 카드의 owning weapon
                //   인스턴스 1자루(가장 내구 높은 순)의 durabilityLeft를 추적.
                //   동일 weaponId에 대해 여러 자루를 동시 추적하진 않음(현재 1자루 전제).
                const weaponState = {};
                const seenWeaponIds = new Set();
                for (const c of slots) {
                    if (!c || !c.weaponId || seenWeaponIds.has(c.weaponId)) continue;
                    seenWeaponIds.add(c.weaponId);
                    // inventory에서 해당 type의 아이템 중 durabilityLeft 최댓값 사용.
                    const items = (inventory && inventory.items) || [];
                    const instances = items.filter(it => it.type === c.weaponId);
                    const total = instances.reduce((s, it) =>
                        s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                    weaponState[c.weaponId] = { durabilityLeft: total };
                }
                const res = CombatDeck.resolveHunt(prey, slots, { weaponState });
                setResult(res);
                setPhase('resolve');

                // 턴 로그 500ms 간격 순차 표시.
                res.turns.forEach((turn, idx) => {
                    setTimeout(() => {
                        setLogs(prev => [...prev, turn]);
                        if (typeof turn.preyHpAfter === 'number') setHpCurrent(turn.preyHpAfter);
                    }, 500 * (idx + 1));
                });
                // 마지막 로그 후 결과 페이즈 전환. onResolve는 '결과 확인' 버튼에서 호출.
                setTimeout(() => {
                    setPhase('done');
                }, 500 * (res.turns.length + 1));
            };

            // D-48: '결과 확인' 버튼 — 유저가 결과를 읽고 수동으로 닫을 때 onResolve 호출.
            const handleCloseResult = () => {
                if (phase !== 'done' || !result) return;
                onResolve(result);
            };

            const hpDisplayPct = Math.max(0, Math.min(100, (hpCurrent / prey.hp) * 100));
            const preyName = prey.name || prey.preyType;

            // D-48: 결과 메시지 — 한글 조사(을/를, 이/가) 받침 유무로 자동 선택.
            const hasBatchim = (word) => {
                if (!word) return false;
                const code = word.charCodeAt(word.length - 1);
                if (code < 0xAC00 || code > 0xD7A3) return false;
                return (code - 0xAC00) % 28 !== 0;
            };
            const particleEul = hasBatchim(preyName) ? '을' : '를';
            const particleI = hasBatchim(preyName) ? '이' : '가';
            const resultMessage = result ? (
                result.outcome === 'victory' ? `${preyName}${particleEul} 잡았다!`
                : result.outcome === 'prey_fled' ? `${preyName}${particleI} 도망치고 말았다...!`
                : result.outcome === 'player_fled' ? '사냥을 포기하고 물러섰다.'
                : ''
            ) : '';
            const resultTone = result && result.outcome === 'victory' ? 'victory' : 'fail';

            return (
                <div className="modal">
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px',
                        borderRadius: '12px',
                        width: '92%',
                        maxWidth: '480px',
                        maxHeight: '90vh',
                        overflowY: 'auto'
                    }}>
                        {/* 상단: prey 정보 */}
                        {/* D-91 (2026-04-25 요한 지시): L2 사냥감 공격력/방어력 배지 노출.
                            기존엔 evade 배지만 표시되어 prey가 어느 정도 위협인지 가늠 어려움.
                            🗡️ attack / 🛡️ defense를 HP 옆에 함께 표시. 0이면 배지 생략. */}
                        <div style={{ marginBottom: '14px' }}>
                            <div style={{ fontSize: '18px', fontWeight: '600', marginBottom: '6px' }}>
                                사냥: {preyName} 🥩×{prey.meat}
                            </div>
                            <div style={{
                                height: '14px',
                                background: '#333',
                                borderRadius: '7px',
                                overflow: 'hidden'
                            }}>
                                <div style={{
                                    width: `${hpDisplayPct}%`,
                                    height: '100%',
                                    background: '#b24656',
                                    transition: 'width 0.3s ease'
                                }} />
                            </div>
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '3px', display: 'flex', gap: '10px', alignItems: 'center' }}>
                                <span>HP {hpCurrent}/{prey.hp}</span>
                                {Number(prey.attack) > 0 && (
                                    <span style={{ color: '#ff9999' }}>🗡️ 공격력 {prey.attack}</span>
                                )}
                                {Number(prey.defense) > 0 && (
                                    <span style={{ color: '#4db8ff' }}>🛡️ 방어력 {prey.defense}</span>
                                )}
                            </div>
                        </div>

                        {/* D-48: 전투 결과 배너 — phase='done'에서만 노출. */}
                        {phase === 'done' && resultMessage && (
                            <div style={{
                                padding: '14px 12px',
                                marginBottom: '12px',
                                background: resultTone === 'victory' ? '#1f3a24' : '#3a1f24',
                                border: `1px solid ${resultTone === 'victory' ? '#4CAF50' : '#b24656'}`,
                                borderRadius: '8px',
                                textAlign: 'center',
                                fontSize: '16px',
                                fontWeight: 700,
                                color: resultTone === 'victory' ? '#a5d18f' : '#ff9999'
                            }}>
                                {resultMessage}
                            </div>
                        )}

                        {/* D-48/D-75: 내 슬롯 — L1 3칸 / L2 4칸. */}
                        <div style={{ marginBottom: '10px' }}>
                            <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>내 슬롯</div>
                            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: '6px' }}>
                                {slots.map((card, i) => (
                                    <div key={i}
                                        onClick={() => handleSlotClick(i)}
                                        style={{
                                            padding: '10px 4px',
                                            background: card ? '#3a3a5e' : '#222',
                                            border: card ? '1px solid #6a6aaa' : '1px dashed #444',
                                            borderRadius: '6px',
                                            fontSize: '12px',
                                            textAlign: 'center',
                                            cursor: phase === 'select' && card ? 'pointer' : 'default',
                                            minHeight: '48px'
                                        }}>
                                        {card ? (
                                            <div>
                                                <div style={{ fontWeight: '600' }}>{card.name}</div>
                                                <div style={{ fontSize: '10px' }}>
                                                    <StatBadges card={card} />
                                                </div>
                                                {slotWeaponDur[i] && (
                                                    <div style={{ fontSize: '10px', color: '#aaa', marginTop: '2px' }}>
                                                        내구 {slotWeaponDur[i].before}/{slotWeaponDur[i].after}
                                                    </div>
                                                )}
                                                {/* D-97: 분실 확률 안내 — 슬롯에 배치된 카드도 동일 표기. */}
                                                {(() => {
                                                    const fl = String(card.full_loss || '').toUpperCase() === 'Y';
                                                    const lc = Number(card.loss_chance) || 0;
                                                    if (fl) return <div style={{ fontSize: '10px', color: '#ff9999' }}>⚠ 100% 분실</div>;
                                                    if (lc > 0) return <div style={{ fontSize: '10px', color: '#ff9999' }}>⚠ {lc}% 분실</div>;
                                                    return null;
                                                })()}
                                            </div>
                                        ) : <span style={{ color: '#666' }}>비었음</span>}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 적 패턴 슬롯 — D-48/D-75/D-108: 행동 풀 SSOT(사냥감행동 시트) 기반.
                            slotActions[i]에 actionDef 들어있음 — type별 배지 + 행동명 직접 표시.
                            D-108 (2026-04-24 요한 지시):
                              - peek/attack/defend 슬롯엔 회피% 표시하지 않음(어색함 제거).
                              - evade 슬롯이라도 finalEvade <= 0이면 회피 배지 숨김(회피 1 이상일 때만).
                              - actionDef.damage/defense 우선, 0이면 prey.attack/defense 폴백.
                              - 행동명은 actionDef.name (예: 어금니 돌진, 강철 말기). */}
                        <div style={{ marginBottom: '10px' }}>
                            <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>적 행동</div>
                            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: '6px' }}>
                                {Array.from({ length: SLOT_COUNT }, (_, i) => {
                                    const ev = computedEvades[i] || { base: 0, final: 0 };
                                    const consumed = !!logs.find(l => l.turn === i + 1);
                                    const actionDef = slotActions[i] || { name: '?', type: 'peek', damage: 0, accuracy: 0, defense: 0 };
                                    const type = actionDef.type;
                                    const preyAtkFallback = Number(prey.attack) || 0;
                                    const preyDefFallback = Number(prey.defense) || 0;
                                    const dmg = (actionDef.damage > 0) ? actionDef.damage : preyAtkFallback;
                                    const def = (actionDef.defense > 0) ? actionDef.defense : preyDefFallback;
                                    const acc = Number(actionDef.accuracy) || 0;
                                    return (
                                        <div key={i} style={{
                                            padding: '8px 4px',
                                            background: '#2a2a3e',
                                            border: '1px solid #444',
                                            borderRadius: '6px',
                                            fontSize: '11px',
                                            textAlign: 'center',
                                            opacity: consumed ? 0.5 : 1,
                                            lineHeight: 1.4
                                        }}>
                                            <div style={{ color: '#888', fontSize: '10px' }}>T{i + 1}</div>
                                            <div style={{ color: '#ddd', fontWeight: 600 }}>{actionDef.name}</div>
                                            <div style={{ marginTop: '2px', display: 'inline-flex', gap: '4px', justifyContent: 'center', flexWrap: 'wrap' }}>
                                                {type === 'attack' && dmg > 0 && (
                                                    <span style={{ color: '#ff9999' }}>🗡️+{dmg}</span>
                                                )}
                                                {type === 'attack' && acc > 0 && (
                                                    <span style={{ color: '#8bd17c' }}>🏹+{acc}</span>
                                                )}
                                                {type === 'defend' && def > 0 && (
                                                    <span style={{ color: '#4db8ff' }}>🛡️+{def}</span>
                                                )}
                                                {/* D-111 (요한 지시): evade 행동 슬롯엔 회피 수치 항상 노출.
                                                    이전 가드 ev.final > 0은 player 카드 acc≥base로 final=0 된 경우
                                                    회피 0이 숨어 "회피 기술인데 수치가 안 보인다" 문제 발생.
                                                    회피 행동 = 회피 수치 항상 보이게. attack/defend/peek은 그대로 미노출. */}
                                                {type === 'evade' && (
                                                    <EvadeBadge baseEvade={ev.base} finalEvade={ev.final} consumed={consumed} />
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* D-48: 확정 / 결과 확인 버튼 — phase에 따라 분기.
                            select: 슬롯 모두 채워지면 확정(전투 시작).
                            resolve: 애니메이션 중 비활성.
                            done:  결과 확인 → onResolve 호출, 모달 닫힘. */}
                        <button
                            disabled={
                                (phase === 'select' && !allFilled)
                                || phase === 'resolve'
                            }
                            onClick={() => {
                                if (phase === 'select') handleConfirm();
                                else if (phase === 'done') handleCloseResult();
                            }}
                            style={{
                                width: '100%',
                                padding: '10px',
                                marginBottom: '10px',
                                background: ((phase === 'select' && allFilled) || phase === 'done')
                                    ? '#4CAF50' : '#444',
                                color: '#fff',
                                border: 'none',
                                borderRadius: '6px',
                                fontSize: '14px',
                                fontWeight: '600',
                                cursor: ((phase === 'select' && allFilled) || phase === 'done')
                                    ? 'pointer' : 'not-allowed'
                            }}
                        >
                            {phase === 'select' ? '확정' : phase === 'resolve' ? '전투 중...' : '결과 확인'}
                        </button>

                        {/* D-91 (2026-04-25 요한 지시): 턴 로그 직관적 재설계.
                            한 줄 요약 → 2줄(내 행동 / 적 행동) 카드 형식.
                            결과별 색상 분기로 명중/회피/방어/피해를 한눈에 식별. */}
                        {logs.length > 0 && (
                            <div style={{
                                background: '#0f0f1a',
                                padding: '8px',
                                borderRadius: '6px',
                                marginBottom: '10px',
                                fontSize: '11px',
                                maxHeight: '180px',
                                overflowY: 'auto'
                            }}>
                                {logs.map((log, i) => {
                                    const card = log.userCard;
                                    const preyEmoji = PREY_EMOJI[prey.preyType] || '🐾';

                                    // 내 라인 — 색상 + 텍스트 결정
                                    let playerColor = '#ddd';
                                    let playerText;
                                    if (log.outcome === 'flee_signal') {
                                        playerColor = '#aaa';
                                        playerText = '— (사냥감이 먼저 도망)';
                                    } else if (log.outcome === 'player_flee') {
                                        playerColor = '#d4b84a';
                                        playerText = `${card ? card.name + ' → ' : ''}도망 성공 ✓`;
                                    } else if (!card) {
                                        playerColor = '#666';
                                        playerText = '— (빈 슬롯)';
                                    } else if (log.autoFail) {
                                        playerColor = '#ff9999';
                                        playerText = `${card.name} → ${log.reason === 'weapon_missing' ? '무기 부재로 무산' : '행동 무산'}`;
                                    } else if (Number(card.damage) > 0) {
                                        // 공격 카드
                                        if (!log.hit) {
                                            playerColor = '#aaa';
                                            playerText = `${card.name} → 빗나감 ✗`;
                                        } else if (log.preyEvaded) {
                                            playerColor = '#d4b84a';
                                            const evNote = (typeof log.effectiveEvade === 'number') ? ` (회피 ${log.effectiveEvade})` : '';
                                            playerText = `${card.name} → 회피당함 〰️${evNote}`;
                                        } else if (Number(log.preyDefended) > 0) {
                                            playerColor = '#9bd6ff';
                                            playerText = `${card.name} → 명중하지만 -${log.damage} (방어 감쇄 ${log.preyDefended})`;
                                        } else {
                                            playerColor = '#3dd68c';
                                            playerText = `${card.name} → 명중! -${log.damage} HP`;
                                        }
                                    } else if (card.id === 'run_away') {
                                        playerColor = '#aaa';
                                        playerText = `${card.name} → 도망 시도 실패`;
                                    } else if (Number(card.defense) > 0) {
                                        playerColor = '#9bd6ff';
                                        playerText = `${card.name} → 방어 자세 🛡️ +${card.defense}`;
                                    } else {
