                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-47 합성 패널 — 인벤 모달 하단에 고정된 바 형태.
        //   - 드롭된 두 재료(pair) 중 하나 이상 포함된 모든 레시피 카드 노출.
        //   - 각 카드: 재료(필요 수량) + 결과, 보유량으로 완성 가능 여부·부족 재료 표기.
        //   - [만들기] 버튼: 재료 충분 + 결과물 놓을 빈 슬롯 있을 때만 활성.
        //   - 같은 재료 머지는 이 패널에 안 뜸 (즉시 실행 경로).
        function CraftPanel({ recipes, inventory, onCraft, onClose }) {
            if (!recipes || recipes.length === 0) return null;
            const items = (inventory && inventory.items) || [];
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => defOf(type).name || type;

            // 각 레시피 상태 계산: 재료 충분 + 결과 배치 공간 여부.
            const cards = recipes.map(recipe => {
                const evalR = InventorySystem.evaluateRecipe(recipe, items);
                const resultDef = defOf(recipe.result);
                const hasSpace = !!inventory.findEmptySpace(resultDef.shape || [[1]]);
                let disabledReason = null;
                if (!evalR.canCraft) disabledReason = 'short';
                else if (!hasSpace) disabledReason = 'no_space';
                return { recipe, evalR, hasSpace, disabledReason };
            });
            // 만들 수 있는 것 먼저, 공간부족, 재료부족 순.
            cards.sort((a, b) => {
                const rank = { null: 0, 'no_space': 1, 'short': 2 };
                return (rank[a.disabledReason] ?? 0) - (rank[b.disabledReason] ?? 0);
            });

            return (
                <div style={{
                    position: 'sticky',
                    bottom: 0,
                    background: '#0f1a2e',
                    border: '1px solid #2a3a5e',
                    borderRadius: '8px',
                    padding: '10px',
                    marginTop: '8px',
                    maxHeight: '55vh',
                    overflowY: 'auto',
                    WebkitOverflowScrolling: 'touch'
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                        <div style={{ fontSize: '13px', fontWeight: 600, color: '#d4b84a' }}>
                            🔨 만들 수 있는 조합
                        </div>
                        <button
                            onClick={onClose}
                            style={{ padding: '3px 8px', fontSize: '11px' }}
                        >
                            닫기
                        </button>
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                        {cards.map(({ recipe, evalR, disabledReason }, idx) => {
                            const need = evalR.need;
                            const shortage = evalR.shortage;
                            const buttonDisabled = disabledReason !== null;
                            const buttonLabel = disabledReason === 'no_space'
                                ? '공간부족'
                                : disabledReason === 'short'
                                    ? '재료부족'
                                    : '만들기';
                            return (
                                <div
                                    key={`recipe:${idx}:${recipe.result}`}
                                    style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '6px',
                                        padding: '8px',
                                        background: buttonDisabled ? '#1a1f2e' : '#1a2f3e',
                                        borderRadius: '6px',
                                        border: `1px solid ${buttonDisabled ? '#333' : '#2e5a6e'}`
                                    }}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flex: 1, flexWrap: 'wrap' }}>
                                        {Object.entries(need).map(([type, count], i) => {
                                            const short = shortage[type] || 0;
                                            const has = (evalR.have[type] || 0);
                                            return (
                                                <React.Fragment key={`${type}:${i}`}>
                                                    {i > 0 && <span style={{ color: '#666' }}>+</span>}
                                                    <span style={{
                                                        fontSize: '12px',
                                                        color: short > 0 ? '#ff7777' : '#fff',
                                                        fontWeight: 500
                                                    }}>
                                                        {nameOf(type)}
                                                        <span style={{ fontSize: '10px', color: short > 0 ? '#ff9999' : '#aaa', marginLeft: '2px' }}>
                                                            {has}/{count}
                                                        </span>
                                                    </span>
                                                </React.Fragment>
                                            );
                                        })}
                                        <span style={{ color: '#666', margin: '0 4px' }}>=</span>
                                        <span style={{ fontSize: '12px', fontWeight: 600, color: '#d4b84a' }}>
                                            {nameOf(recipe.result)}
                                        </span>
                                    </div>
                                    <button
                                        onClick={() => onCraft(recipe)}
                                        disabled={buttonDisabled}
                                        style={{
                                            padding: '6px 10px',
                                            fontSize: '12px',
                                            fontWeight: 600,
                                            background: buttonDisabled ? '#333' : '#4CAF50',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: buttonDisabled ? 'not-allowed' : 'pointer'
                                        }}
                                    >
                                        {buttonLabel}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // 획득 알림 토스트 — 뒤져보기 등으로 아이템을 얻을 때 강조용으로 띄운다.
        //
        // D-28(2026-04-22, 요한 지시):
        // - 팝업과 다르게 버튼 없음. 반투명 배경.
        // - 페이드 인(빠르게) → 1초 노출 → 2초 페이드 아웃.
        // - 여러 아이템 동시 획득 시 하나의 토스트에 목록으로.
        // - 기존 메시지 로그는 유지 (토스트는 보조 강조).
        // D-46(2026-04-22, 요한 지시): 위치를 .map-area(HUD 바로 아래 영역)
        // 상단 중앙에 absolute로 고정. 이전엔 .map-container(스크롤 영역) 안이라
        // 맵을 스크롤하면 토스트가 시야 밖으로 밀렸음.
        // .map-area는 스크롤하지 않으므로 토스트는 항상 같은 위치(HUD 직하단)에 노출되고,
        // 좌·우·상단 모두 다른 상태 UI(HUD 패널, 카드, 인벤 버튼)와 겹치지 않는다.
        // z-index는 기존 modal(.modal=100, ItemInfoModal=1000, CardListModal=1100)보다
        // 위에 두어 조우 모달 중에도 가려지지 않게 1500.
        // 배경 불투명도 0.8 (D-39, 이전 0.5).
        function LootToast({ toast, onDone }) {
            const [phase, setPhase] = React.useState('in'); // in → hold → out → done
            React.useEffect(() => {
                if (!toast) return;
                setPhase('in');
                const t1 = setTimeout(() => setPhase('hold'), 200);   // 페이드 인 0.2s
                const t2 = setTimeout(() => setPhase('out'), 200 + 2000); // 유지 2s
                const t3 = setTimeout(() => {                         // 페이드 아웃 0.25s (easeOutCirc)
                    setPhase('done');
                    onDone && onDone();
                }, 200 + 2000 + 250);
                return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
            }, [toast && toast.id]);

            if (!toast || phase === 'done') return null;

            const opacity = phase === 'in' ? 0 : phase === 'hold' ? 1 : 0;
            const transition = phase === 'in' ? 'opacity 0.2s ease-out'
                             : phase === 'out' ? 'opacity 0.25s cubic-bezier(0.075, 0.82, 0.165, 1)'
                             : 'opacity 0.2s';

            return (
                <div
                    style={{
                        position: 'absolute',
                        top: '12px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        zIndex: 1500,
                        pointerEvents: 'none',
                        opacity,
                        transition,
                        background: 'rgba(22, 33, 62, 0.8)',
                        border: '1px solid rgba(233, 69, 96, 0.55)',
                        padding: '14px 18px',
                        borderRadius: '10px',
                        minWidth: '220px',
                        maxWidth: '80%',
                        boxShadow: '0 6px 20px rgba(0,0,0,0.45)',
                        color: '#fff',
                        textAlign: 'center'
                    }}
                >
                    <div style={{ fontSize: '12px', color: '#d4b84a', letterSpacing: '1px', marginBottom: '6px' }}>
                        획득
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                        {toast.entries.map((entry, i) => (
                            <div key={i} style={{ fontSize: '15px', fontWeight: 600 }}>
                                {entry.name}
                                {entry.count > 1 && (
                                    <span style={{ fontSize: '12px', color: '#aaa', marginLeft: '6px' }}>
                                        ×{entry.count}
                                    </span>
                                )}
                                {entry.grade && (
                                    <span style={{
                                        fontSize: '10px',
                                        color: '#d4b84a',
                                        marginLeft: '8px',
                                        border: '1px solid #d4b84a',
                                        borderRadius: '3px',
                                        padding: '1px 5px',
                                        verticalAlign: 'middle'
                                    }}>
                                        {entry.grade}
                                    </span>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // 타일 이벤트 토스트 — 풍족한 땅 등 타일 발견 시 팝업 대신 토스트로 안내.
        // D-52 (2026-04-23 요한 지시): TileEventModal의 'good' 케이스를 이관.
        // LootToast와 동일한 페이드 타이밍(in 0.2s → hold 1s → out 2s).
        // 함정은 피해 정보 확인이 필요하므로 모달 유지 (이 토스트는 'good' 전용).
        function TileEventToast({ toast, onDone }) {
            const [phase, setPhase] = React.useState('in');
            React.useEffect(() => {
                if (!toast) return;
                setPhase('in');
                const t1 = setTimeout(() => setPhase('hold'), 200);
                const t2 = setTimeout(() => setPhase('out'), 200 + 2000);
                const t3 = setTimeout(() => {
                    setPhase('done');
                    onDone && onDone();
                }, 200 + 2000 + 250);
                return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
            }, [toast && toast.id]);

            if (!toast || phase === 'done') return null;

            const opacity = phase === 'in' ? 0 : phase === 'hold' ? 1 : 0;
            const transition = phase === 'in' ? 'opacity 0.2s ease-out'
                             : phase === 'out' ? 'opacity 0.25s cubic-bezier(0.075, 0.82, 0.165, 1)'
                             : 'opacity 0.2s';

            return (
                <div
                    style={{
                        position: 'absolute',
                        top: '12px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        zIndex: 1500,
                        pointerEvents: 'none',
                        opacity,
                        transition,
                        background: 'rgba(22, 33, 62, 0.85)',
                        border: `1px solid ${toast.color || '#FFC107'}`,
                        padding: '14px 18px',
                        borderRadius: '10px',
                        minWidth: '240px',
                        maxWidth: '80%',
                        boxShadow: '0 6px 20px rgba(0,0,0,0.45)',
                        color: '#fff',
                        textAlign: 'center'
                    }}
                >
                    <div style={{ fontSize: '22px', marginBottom: '4px' }}>
                        {toast.emoji}
                    </div>
                    <div style={{ fontSize: '15px', fontWeight: 700, color: toast.color || '#FFC107', marginBottom: '4px' }}>
                        {toast.title}
                    </div>
                    <div style={{ fontSize: '13px', color: '#ddd' }}>
                        {toast.message}
                    </div>
                </div>
            );
        }

        // 보스 점프스케어 — listen 거리=1 감지 시 화면 전체 공룡 아이콘이 빠르게 확대/소실.
        // 의도: 공포 원칙 강화. 테두리 색(빨강) 토스트만으로는 인접 경고가 약하다는 판단.
        // CSS animation 0.55s 단일 재생. active=false로 내려주면 즉시 제거.
        function BossJumpscare({ active, onDone }) {
            React.useEffect(() => {
                if (!active) return;
                const t = setTimeout(() => { onDone && onDone(); }, 550);
                return () => clearTimeout(t);
            }, [active]);
            if (!active) return null;
            return (
                <div className="boss-jumpscare-overlay">
                    <div className="boss-jumpscare-icon">🦖</div>
                </div>
            );
        }

        // 플레이 가이드 모달 — 인게임 [플레이방법] 버튼으로 호출.
        // D-53 (2026-04-23 요한 지시): 게임을 처음 만나는 사람도 바로 이해할 수 있는
        // 간소화 가이드. GUIDE.md(외부 공유용 상세본)와 별도로, 인게임에서는 핵심만.
        function HelpModal({ onClose }) {
            const sectionTitle = {
                fontSize: '14px',
                fontWeight: 700,
                color: '#d4b84a',
                marginTop: '14px',
                marginBottom: '6px',
                letterSpacing: '0.5px'
            };
            const para = { fontSize: '13px', lineHeight: 1.55, color: '#ddd', marginBottom: '6px' };
            const list = { fontSize: '13px', lineHeight: 1.6, color: '#ddd', paddingLeft: '18px', marginBottom: '6px' };
            const link = { color: '#4CAF50', textDecoration: 'none', fontWeight: 600 };

            return (
                <div className="modal" onClick={onClose}>
                    <div

                            <div style={{ fontSize: '18px', fontWeight: 700 }}>타임 투 다이노</div>
                            <button onClick={onClose} style={{ fontSize: '12px', padding: '4px 10px' }}>닫기</button>
                        </div>

                        <div style={para}>
                            카드로 행동하며 숲에서 살아남아 탈출구를 찾는 생존 게임입니다.
                        </div>
                        <div style={para}>
                            <a href="https://uzudang2.github.io/time-to-dino/" target="_blank" rel="noopener" style={link}>
                                플레이하기 ↗
                            </a>
                        </div>

                        <div style={sectionTitle}>🎯 목표</div>
                        <div style={para}>
                            지도 어딘가의 <b style={{ color: '#2196F3' }}>파란 탈출구 타일</b>에 도착하면 승리.
                        </div>
                        <div style={para}>다만,</div>

                            <li>체력이 0이 되거나</li>

                        <div style={sectionTitle}>🃏 기본 흐름</div>
                        <div style={para}>한 턴마다 카드를 써서 행동합니다.</div>
                        <div style={para}>주로 하는 일은 세 가지:</div>
                        <ul style={list}>
                            <li>이동하기</li>
                            <li>아이템 모으기</li>
                            <li>보스에게 들키지 않기</li>
                        </ul>

                        <div style={sectionTitle}>⚠️ 꼭 알아야 할 3가지</div>
                        <ul style={list}>
                            <li><b>배고픔</b>은 이동할 때마다 줄어듭니다.</li>
                            <li><b>발각률 80% 이상</b>이 되면 보스가 추격합니다.</li>
                            <li>귀 기울이기 / 숨기 / 휴식으로 위험을 낮출 수 있습니다.</li>

                        <div style={sectionTitle}>🎴 카드 설명</div>
                        <ul style={list}>
                            <li><b>뒤져보기</b>: 현재 위치에서 아이템 탐색</li>
                            <li><b>귀 기울이기</b>: 주변 타일 확인, 보스 거리 파악, 발각률 감소</li>
                            <li><b>음식 찾기</b>: 음식 획득 시도</li>
                            <li><b>숨기</b>: 발각률 크게 감소</li>

                        <div style={sectionTitle}>🎒 아이템</div>
                        <div style={para}>

                        </div>
                        <ul style={list}>
                            <li><b>같은 아이템 2개</b>: 머지</li>
                            <li><b>다른 재료 2개</b>: 조합</li>
                        </ul>

                        <div style={sectionTitle}>💡 생존 팁</div>
                        <ul style={list}>
                            <li>이동 전에 <b>귀 기울이기</b>를 먼저 쓰세요.</li>

                        <div style={sectionTitle}>🛠️ 곧 추가될 요소</div>

                            <li><b>사냥감 시스템</b> — 지도에 동물이 나타남</li>
                            <li><b>재료 아이템 용도</b> — 돌멩이·나뭇가지 등으로 무기·덫·거처 제작</li>
                            <li><b>빌딩/거점</b> — 임시 거처로 회복 거점 운영</li>
                        </ul>

                        <div style={{ ...para, marginTop: '12px', fontStyle: 'italic', color: '#aaa' }}>

                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>

        // ============================================
        // 사냥 전투 모달 (D-46, 2026-04-23)
        // ============================================
        //
        // 구조:
        //   - 상단: prey 이름 + HP 바 + meat 표시
        //   - 적 패턴 3슬롯(readonly): 회피 / 회피 / 빠르게 도망
        //   - 내 슬롯 3칸: 비었으면 "비었음", 카드 있으면 카드 렌더(탭→손패 복귀)
        //   - 확정 버튼: 3슬롯 모두 차야 활성
        //   - 내 손패: buildHuntDeck 결과. 탭 시 가장 왼쪽 빈 슬롯에 배치.
        //
        // 슬롯↔손패 이동은 uid 기준. "뒤 슬롯 고정" 원칙 — 슬롯→손패 복귀 시 다른 슬롯 위치 유지.
        // 확정 시 resolveHunt(prey, slots) → 턴 로그 순차 표시(500ms) → onResolve(result) 콜백.
        // D-58/D-74: HuntCombatModal 수치 배지 통일.
        //   - 🗡️+N / N% / 🏹+N / 🛡️+N 순서 고정, 줄바꿈 없음.
        //   - damage=0 && defense>0 → 🗡️ 숨기고 🛡️ 표시 (크아 웅크리기/방패 막기).
        //   - damage=0 && defense=0 (dodge/run_away) → 🗡️·🏹 생략, N%만.
        //   - 라벨 텍스트 전부 제거 — 아이콘 + 숫자로 통일.
        const STAT_ICONS = { damage: '🗡️', accuracy: '🏹', defense: '🛡️' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff' };
        function StatBadges({ card }) {
            const dmg = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const def = Number(card.defense) || 0;
            const sr = card.success_rate;
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap' }}>
                    {dmg > 0 && (
                        <span style={{ color: STAT_COLORS.damage }}>{STAT_ICONS.damage}+{dmg}</span>
                    )}
                    {(sr !== undefined && sr !== null) && (
                        <span style={{ color: '#aaa' }}>{sr}%</span>
                    )}
                    {dmg > 0 && acc > 0 && (
                        <span style={{ color: STAT_COLORS.accuracy }}>{STAT_ICONS.accuracy}+{acc}</span>
                    )}
                    {def > 0 && (
                        <span style={{ color: STAT_COLORS.defense }}>{STAT_ICONS.defense}+{def}</span>
                    )}
                </span>
            );
        }

        // D-58: 적 슬롯 최종 회피율 배지.
        //   - damage>0 카드 배치 + finalEvade < baseEvade → 초록 + bold.
        //   - 그 외(빈 슬롯 / damage=0 카드 / 감소 없음) → 기본색.
        function EvadeBadge({ baseEvade, finalEvade, consumed }) {
            const reduced = finalEvade < baseEvade;
            return (
                <span
                    className={reduced ? 'evade-changed' : undefined}
                    style={{
                        color: reduced ? '#8bd17c' : '#ddd',
                        fontWeight: reduced ? 700 : 400,
                        opacity: consumed ? 0.5 : 1,
                        transition: 'color 0.2s, opacity 0.2s'
                    }}>
                    회피 {finalEvade}%
                </span>
            );
        }

        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel }) {
            // D-75: Level 2 prey는 4턴. Level 1은 기존 3턴.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // 표시된 턴 로그
            const [result, setResult] = useState(null);

            // D-58/D-60: 슬롯별 최종 회피율 계산 (턴별 base 반영).
            //   SSOT: combatDeck.js::resolveHunt effectiveEvade 공식과 동일.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount*10)
            //     finalEvade = max(0, baseEvadeT - card.accuracy)
            //   damage=0 카드 / 빈 슬롯 → base(턴별) 그대로.
            //   card.accuracy 는 buildHuntDeck 이 이미 카드+무기 합산한 값(D-50). 이중 합산 금지.
            // D-75: Level 2 prey — actions_per_turn CSV 파싱. 적 행동 슬롯 라벨에 사용.
            const preyActions = React.useMemo(() => {
                if (SLOT_COUNT !== 4) return null;
                const raw = prey && prey.actions_per_turn;
                const defaults = ['attack', 'evade', 'attack', 'peek'];
                const allowed = new Set(['attack','defend','evade','peek']);
                const parts = (raw == null || raw === '')
                    ? defaults
                    : String(raw).split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
                const out = [];
                for (let i = 0; i < 4; i++) {
                    const tok = parts[i] != null ? parts[i] : parts[parts.length - 1] || 'evade';
                    out.push(allowed.has(tok) ? tok : 'evade');
                }
                return out;
            }, [prey.actions_per_turn, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    const base = Math.max(0, (byTurn[i] ?? 20) - fleeCount * 10);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    const final = Math.max(0, base - (Number(card.accuracy) || 0));
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));
            // 전투 시작 시 hpCurrent = prey.hp. 이후 표시용으로만 사용.
            const [hpCurrent, setHpCurrent] = useState(prey.hp);

            const allFilled = slots.every(s => s !== null);

            // D-64 (2026-04-24): 슬롯 배치 실시간 재고 반영.
            //   buildHuntDeck의 slotLimit은 전투 시작 시점 1회 계산이라 배치로 차감 안 됨.
            //   requirement 이름 기반 capacity를 실시간으로 계산해 손패 비활성·슬롯 내구도 표시.
            //   무기(category='무기')는 durabilityLeft 합이 capacity, 일반 재료는 인스턴스 수.
            const reqCapacityByName = React.useMemo(() => {
                const cap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    const name = def.name || it.name;
                    if (!name) continue;
                    const isWeapon = def.category === '무기';
                    const contribute = isWeapon
                        ? (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0)
                        : 1;
                    cap[name] = (cap[name] || 0) + contribute;
                }
                return cap;
            }, [inventory]);

            // 슬롯에 이미 배치된 카드의 requirements만큼 차감한 잔량.
            const remainingByReq = React.useMemo(() => {
                const rem = { ...reqCapacityByName };
                for (const c of slots) {
                    if (!c || !Array.isArray(c.requirements)) continue;
                    for (const r of c.requirements) {
                        rem[r] = (rem[r] || 0) - 1;
                    }
                }
                return rem;
            }, [slots, reqCapacityByName]);

            const canPlaceCard = (card) => {
                if (!Array.isArray(card.requirements) || card.requirements.length === 0) return true;
                for (const r of card.requirements) {
                    if ((remainingByReq[r] || 0) <= 0) return false;
                }
                return true;
            };

            // 슬롯별 무기 내구도 계산 (weaponId별 순차 차감).
            //   before: 이 슬롯 사용 직전 내구, after: 사용 직후 내구.
            //   무기 아닌 카드(돌 던지기 등)와 빈 슬롯은 null.
            const slotWeaponDur = React.useMemo(() => {
                const weaponCap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    if (def.category !== '무기') continue;
                    weaponCap[it.type] = (weaponCap[it.type] || 0)
                        + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0);
                }
                const remain = { ...weaponCap };
                return slots.map(card => {
                    if (!card || !card.weaponId) return null;
                    const before = remain[card.weaponId] || 0;
                    const loss = (card.full_loss === 'Y' || card.fullLoss === true) ? before : 1;
                    const after = Math.max(0, before - loss);
                    remain[card.weaponId] = after;
                    return { before, after };
                });
            }, [slots, inventory]);

            // D-46/D-47: 카드 재사용 규칙.
            //   - infinite 카드(주먹/회피/도망): 손패 1장, 슬롯 무제한 배치.
            //   - slotLimit 카드(돌 던지기/창 등): 손패 1장, 슬롯 배치는 가방 내 아이템 개수만큼.
            //   - D-64: 실시간 재고 체크로 통합 — canPlaceCard로 판정.
            const handleHandClick = (card) => {
                if (phase !== 'select') return;
                const emptyIdx = slots.findIndex(s => s === null);
                if (emptyIdx < 0) return;
                if (!canPlaceCard(card)) return;
                const isReusable = !!(card.infinite || card.slotLimit);
                const newSlots = [...slots];
                newSlots[emptyIdx] = isReusable
                    ? { ...card, uid: `${card.uid}:slot:${emptyIdx}:${Date.now()}` }
                    : card;
                setSlots(newSlots);
                if (!isReusable) {
                    setHand(hand.filter(c => c.uid !== card.uid));
                }
            };

            const handleSlotClick = (slotIdx) => {
                if (phase !== 'select') return;
                const card = slots[slotIdx];
                if (!card) return;
                const newSlots = [...slots];
                newSlots[slotIdx] = null;
                setSlots(newSlots);
                const isReusable = !!(card.infinite || card.slotLimit);
                if (!isReusable) {
                    setHand([...hand, card]);
                }
            };

            const handleConfirm = () => {
                if (!allFilled || phase !== 'select') return;
                // D-51: weaponState 구성 — 슬롯에 배치된 무기 요구 카드의 owning weapon
                //   인스턴스 1자루(가장 내구 높은 순)의 durabilityLeft를 추적.
                //   동일 weaponId에 대해 여러 자루를 동시 추적하진 않음(현재 1자루 전제).
                const weaponState = {};
                const seenWeaponIds = new Set();
                for (const c of slots) {
                    if (!c || !c.weaponId || seenWeaponIds.has(c.weaponId)) continue;
                    seenWeaponIds.add(c.weaponId);
                    // inventory에서 해당 type의 아이템 중 durabilityLeft 최댓값 사용.
                    const items = (inventory && inventory.items) || [];
                    const instances = items.filter(it => it.type === c.weaponId);
                    const total = instances.reduce((s, it) =>
                        s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                    weaponState[c.weaponId] = { durabilityLeft: total };
                }
                const res = CombatDeck.resolveHunt(prey, slots, { weaponState });
                setResult(res);
                setPhase('resolve');

                // 턴 로그 500ms 간격 순차 표시.
                res.turns.forEach((turn, idx) => {
                    setTimeout(() => {
                        setLogs(prev => [...prev, turn]);
                        if (typeof turn.preyHpAfter === 'number') setHpCurrent(turn.preyHpAfter);
                    }, 500 * (idx + 1));
                });
                // 마지막 로그 후 결과 페이즈 전환. onResolve는 '결과 확인' 버튼에서 호출.
                setTimeout(() => {
                    setPhase('done');
                }, 500 * (res.turns.length + 1));
            };

            // D-48: '결과 확인' 버튼 — 유저가 결과를 읽고 수동으로 닫을 때 onResolve 호출.
            const handleCloseResult = () => {
                if (phase !== 'done' || !result) return;
                onResolve(result);
            };

            const hpDisplayPct = Math.max(0, Math.min(100, (hpCurrent / prey.hp) * 100));
            const preyName = prey.name || prey.preyType;

            // D-48: 결과 메시지 — 한글 조사(을/를, 이/가) 받침 유무로 자동 선택.
            const hasBatchim = (word) => {
                if (!word) return false;
                const code = word.charCodeAt(word.length - 1);
                if (code < 0xAC00 || code > 0xD7A3) return false;
                return (code - 0xAC00) % 28 !== 0;
            };
            const particleEul = hasBatchim(preyName) ? '을' : '를';
            const particleI = hasBatchim(preyName) ? '이' : '가';
            const resultMessage = result ? (
                result.outcome === 'victory' ? `${preyName}${particleEul} 잡았다!`
                : result.outcome === 'prey_fled' ? `${preyName}${particleI} 도망치고 말았다...!`
                : result.outcome === 'player_fled' ? '사냥을 포기하고 물러섰다.'
                : ''
            ) : '';
            const resultTone = result && result.outcome === 'victory' ? 'victory' : 'fail';

            return (
                <div className="modal">
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px',
                        borderRadius: '12px',
                        width: '92%',
                        maxWidth: '480px',
                        maxHeight: '90vh',
                        overflowY: 'auto'
                    }}>
                        {/* 상단: prey 정보 */}
                        <div style={{ marginBottom: '14px' }}>
                            <div style={{ fontSize: '18px', fontWeight: '600', marginBottom: '6px' }}>
                                사냥: {preyName} 🥩×{prey.meat}
                            </div>
                            <div style={{
                                height: '14px',
                                background: '#333',
                                borderRadius: '7px',
                                overflow: 'hidden'
                            }}>
                                <div style={{
                                    width: `${hpDisplayPct}%`,
                                    height: '100%',
                                    background: '#b24656',
                                    transition: 'width 0.3s ease'
                                }} />
                            </div>
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '3px' }}>
                                HP {hpCurrent}/{prey.hp}
                            </div>
                        </div>

                        {/* D-48: 전투 결과 배너 — phase='done'에서만 노출. */}
                        {phase === 'done' && resultMessage && (
                            <div style={{
                                padding: '14px 12px',
                                marginBottom: '12px',
                                background: resultTone === 'victory' ? '#1f3a24' : '#3a1f24',
                                border: `1px solid ${resultTone === 'victory' ? '#4CAF50' : '#b24656'}`,
                                borderRadius: '8px',
                                textAlign: 'center',
                                fontSize: '16px',
                                fontWeight: 700,
                                color: resultTone === 'victory' ? '#a5d18f' : '#ff9999'
                            }}>
                                {resultMessage}
                            </div>
                        )}

                        {/* D-48/D-75: 내 슬롯 — L1 3칸 / L2 4칸. */}
                        <div style={{ marginBottom: '10px' }}>
                            <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>내 슬롯</div>
                            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: '6px' }}>
                                {slots.map((card, i) => (
                                    <div key={i}
                                        onClick={() => handleSlotClick(i)}
                                        style={{
                                            padding: '10px 4px',
                                            background: card ? '#3a3a5e' : '#222',
                                            border: card ? '1px solid #6a6aaa' : '1px dashed #444',
                                            borderRadius: '6px',
                                            fontSize: '12px',
                                            textAlign: 'center',
                                            cursor: phase === 'select' && card ? 'pointer' : 'default',
                                            minHeight: '48px'
                                        }}>
                                        {card ? (
                                            <div>
                                                <div style={{ fontWeight: '600' }}>{card.name}</div>
                                                <div style={{ fontSize: '10px' }}>
                                                    <StatBadges card={card} />
                                                </div>
                                                {slotWeaponDur[i] && (
                                                    <div style={{ fontSize: '10px', color: '#aaa', marginTop: '2px' }}>
                                                        내구 {slotWeaponDur[i].before}/{slotWeaponDur[i].after}
                                                    </div>
                                                )}
                                            </div>
                                        ) : <span style={{ color: '#666' }}>비었음</span>}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 적 패턴 슬롯 — D-48/D-75: 3턴(L1) 또는 4턴(L2). L2는 preyActions로 턴별 행동 라벨.
                            턴 소진 후 hp>0이면 자동 도망. */}
                        <div style={{ marginBottom: '10px' }}>
                            <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>적 행동</div>
                            <div style={{ display: 'grid', gridTemplateColumns: `repeat(${SLOT_COUNT}, 1fr)`, gap: '6px' }}>
                                {Array.from({ length: SLOT_COUNT }, (_, i) => {
                                    const ev = computedEvades[i] || { base: 20, final: 20 };
                                    const consumed = !!logs.find(l => l.turn === i + 1);
                                    const action = preyActions ? preyActions[i] : 'evade';
                                    const actionLabel = (
                                        action === 'attack' ? '공격'
                                        : action === 'defend' ? '방어'
                                        : action === 'peek' ? '눈치'
                                        : '회피'
                                    );
                                    return (
                                        <div key={i} style={{
                                            padding: '8px 4px',
                                            background: '#2a2a3e',
                                            border: '1px solid #444',
                                            borderRadius: '6px',
                                            fontSize: '11px',
                                            textAlign: 'center',
                                            opacity: consumed ? 0.5 : 1
                                        }}>
                                            T{i + 1}<br/>
                                            {/* L2: 턴별 행동 라벨 + (evade 턴만) 회피율 배지 */}
                                            {SLOT_COUNT === 4 ? (
                                                <>
                                                    <span style={{ color: '#ddd' }}>{actionLabel}</span>
                                                    {action === 'evade' && (
                                                        <><br/><EvadeBadge baseEvade={ev.base} finalEvade={ev.final} consumed={consumed} /></>
                                                    )}
                                                </>
                                            ) : (
                                                <EvadeBadge baseEvade={ev.base} finalEvade={ev.final} consumed={consumed} />
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* D-48: 확정 / 결과 확인 버튼 — phase에 따라 분기.
                            select: 슬롯 모두 채워지면 확정(전투 시작).
                            resolve: 애니메이션 중 비활성.
                            done:  결과 확인 → onResolve 호출, 모달 닫힘. */}
                        <button
                            disabled={
                                (phase === 'select' && !allFilled)
                                || phase === 'resolve'
                            }
                            onClick={() => {
                                if (phase === 'select') handleConfirm();
                                else if (phase === 'done') handleCloseResult();
                            }}
                            style={{
                                width: '100%',
                                padding: '10px',
                                marginBottom: '10px',
                                background: ((phase === 'select' && allFilled) || phase === 'done')
                                    ? '#4CAF50' : '#444',
                                color: '#fff',
                                border: 'none',
                                borderRadius: '6px',
                                fontSize: '14px',
                                fontWeight: '600',
                                cursor: ((phase === 'select' && allFilled) || phase === 'done')
                                    ? 'pointer' : 'not-allowed'
                            }}
                        >
                            {phase === 'select' ? '확정' : phase === 'resolve' ? '전투 중...' : '결과 확인'}
                        </button>

                        {/* 턴 로그 (resolve/done 페이즈) */}
                        {logs.length > 0 && (
                            <div style={{
                                background: '#0f0f1a',
                                padding: '8px',
                                borderRadius: '6px',
                                marginBottom: '10px',
                                fontSize: '11px',
                                maxHeight: '110px',
                                overflowY: 'auto'
                            }}>
                                {logs.map((log, i) => (
                                    <div key={i} style={{ marginBottom: '3px' }}>
                                        T{log.turn}: {log.userCard ? `${log.userCard.name} → ` : '빈 슬롯 → '}
                                        {log.outcome === 'flee_signal' && '사냥감이 빠르게 도망친다!'}
                                        {log.outcome === 'player_flee' && '물러섰다.'}
                                        {log.outcome === undefined && (
                                            log.autoFail ? (log.reason === 'weapon_missing'
                                                    ? '무기가 없어 실패'
                                                    : '실패')
                                            : log.userCard == null ? `prey ${log.preyAction}`
                                            : !log.hit ? '빗나감'
                                            : log.preyEvaded ? `명중했지만 회피당함`
                                            : `데미지 ${log.damage} (HP ${log.preyHpAfter})`
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 내 손패 */}
                        {phase === 'select' && (
                            <div>
                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '5px' }}>내 손패</div>
                                {hand.length === 0 ? (
                                    <div style={{ color: '#666', fontSize: '11px', padding: '10px' }}>
                                        사용할 수 있는 전투 카드가 없다.
                                    </div>
                                ) : (
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px' }}>
                                        {hand.map(card => {
                                            // D-64: 실시간 재고 기반 비활성 판정. canPlaceCard가 requirements
                                            //   모두에 대해 remainingByReq 체크 — slotLimit보다 정확.
                                            const exhausted = !canPlaceCard(card);
                                            // D-51/D-64: 무기 요구 카드면 현재 잔여 내구도 표시.
                                            //   슬롯에 이미 배치된 해당 무기 카드 수만큼 실시간 차감.
                                            let durBadge = null;
                                            if (card.weaponId) {
                                                const items = (inventory && inventory.items) || [];
                                                const instances = items.filter(it => it.type === card.weaponId);
                                                const durMaxInitial = instances.reduce((s, it) =>
                                                    s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                                                const usedInSlots = slots.filter(s => s && s.weaponId === card.weaponId).length;
                                                const durLeft = Math.max(0, durMaxInitial - usedInSlots);
                                                if (durMaxInitial > 0) durBadge = `내구 ${durLeft}/${durMaxInitial}`;
                                            }
                                            // D-66: 잔여 × 표시는 requirements 기반 실시간 min.
                                            //   서로 다른 카드가 같은 재료를 공유할 때도 차감이 공유됨.
                                            //   예: 돌던지기(돌맹이)·새총쏘기(새총+돌맹이) 모두 '돌맹이' 소비.
                                            //   한쪽을 슬롯에 올리면 다른 쪽의 × 표시도 실시간 감소.
                                            const reqRemaining = (Array.isArray(card.requirements) && card.requirements.length > 0)
                                                ? Math.max(0, Math.min(...card.requirements.map(r => remainingByReq[r] ?? 0)))
                                                : null;
                                            return (
                                                <div key={card.uid}
                                                    onClick={() => handleHandClick(card)}
                                                    style={{
                                                        padding: '8px 4px',
                                                        background: exhausted ? '#1a1a2a' : '#2a2a4e',
                                                        border: `1px solid ${exhausted ? '#333' : '#555'}`,
                                                        borderRadius: '6px',
                                                        fontSize: '11px',
                                                        textAlign: 'center',
                                                        cursor: exhausted ? 'not-allowed' : 'pointer',
                                                        minHeight: '44px',
                                                        opacity: exhausted ? 0.45 : 1
                                                    }}>
                                                    <div style={{ fontWeight: '600' }}>
                                                        {card.name}
                                                        {card.infinite && (
                                                            <span style={{ color: '#3dd68c', marginLeft: '4px' }}>∞</span>
                                                        )}
                                                        {card.slotLimit && reqRemaining !== null && (
                                                            <span style={{ color: '#d4b84a', marginLeft: '4px' }}>
                                                                ×{reqRemaining}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div style={{ fontSize: '10px' }}>
                                                        <StatBadges card={card} />
                                                    </div>
                                                    {durBadge && (
                                                        <div style={{ fontSize: '10px', color: '#d4b84a' }}>
                                                            {durBadge}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ============================================
        // 메인 게임 컴포넌트
        // ============================================

        // 손패 상한 — 요한 지시(2026-04-22): 3장 → 5장으로 증가.
        // 손패 보충 로직·초기 드로우·HandCards 그리드가 모두 이 상수 기준으로 동작한다.
        const HAND_SIZE = 5;

        // D-76: 사냥감 스폰 수량 상수 — 요한이 시트 이관 전까진 여기서 조정.
        //   level1/level2 각각 별도 풀에서 `spawnPrey`가 뽑아 배치.
        const PREY_SPAWN = { level1: 5, level2: 5 };

        // D-46 (2026-04-23, 9차 세션): 사냥감 전투 1단계.
        // PREY_HABITAT — 각 prey id의 서식 region 폴백.
        //   시트 `사냥감` 탭에 habitat 컬럼이 추가되면 prey.habitat가 우선, 없으면 이 상수.
        //   (SSOT 원칙: 편집은 시트 쪽에서. 이 상수는 파이프라인 승격 전 런타임 안전망.)
        const PREY_HABITAT = {
            rabbit:      ['덤불'],
            mouse:       ['덤불'],
            snake:       ['덤불'],
            frog:        ['덤불'],
            squirrel:    ['숲'],
            salamander:  ['숲'],
            bird:        ['평원'],
            grasshopper: ['평원'],
            crab:        ['시냇물']
        };
        // PREY_EMOJI — 런타임 UI 매핑 (SSOT와 무관, 아이콘만).
        const PREY_EMOJI = {
            // Level 1
            rabbit: '🐰', mouse: '🐭', squirrel: '🐿️', bird: '🐦', salamander: '🦎',
            snake: '🐍', frog: '🐸', crab: '🦀', grasshopper: '🦗',
            // Level 2 (D-76)
            boar: '🐗', dinosaur: '🦕', deer: '🦌', badger: '🦡',
            fox: '🦊', turkey: '🦃', armadillo: '🦔'
        };
        // 사냥시작 카드 — 사냥감 타일 진입 시 손패에 자동 추가되는 overflow 카드.
        //   `overflow:true` 플래그로 HAND_SIZE 카운트에서 제외(손패가 5장이어도 이 카드는 추가됨).
        //   클릭 시 useCard('hunt_start')에서 즉시 소모 + 전투 모달 오픈.
        const HUNT_START_CARD = {
            id: 'hunt_start',
            name: '사냥시작',
            time: 1,
            detection: 2,
            effect: '사냥감과의 전투를 시작한다',
            overflow: true,
            count: 1
        };

        function Game() {
            // 상태 관리
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(8);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            // D-54: 사망 사유 — GameEndModal이 감성 문구·가이드를 선택하는 키.
            const [deathReason, setDeathReason] = useState(null);
            const [message, setMessage] = useState('눈을 뜨자 낯선 숲이 펼쳐졌다.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            // D-27 HUD 리뉴얼: 덱/무덤 목록 모달 표시 플래그.
            const [showDeckList, setShowDeckList] = useState(false);
            const [showGraveyardList, setShowGraveyardList] = useState(false);
            // D-48: 무덤 버튼 펄스 트리거 — moveTo에서 증가 → key remount로 CSS 애니메이션 재생.
            const [graveyardFlashKey, setGraveyardFlashKey] = useState(0);
            // D-53: 인게임 [플레이방법] 모달.
            const [showHelp, setShowHelp] = useState(false);
            const [eventTile, setEventTile] = useState(null);
            // 전투 임시 카드(아이템 사용으로 생성) — 전투 진입 시 combat 덱에 병합, 사용 후 소멸.
            // 구조: [{ id:'throw', count:N }, ...]
            const [combatExtraCards, setCombatExtraCards] = useState([]);
            // D-23 "카드로 아이템 사용" 프레임워크 — 대기 중 consume 요청.
            // 구조: { card, consume, filter, titleText, emptyText } | null
            // 모달 활성 판정도 이 state의 truthy로 통일.
            const [pendingConsume, setPendingConsume] = useState(null);
            // D-57 (2026-04-24): 요리 모달 오픈 플래그. 휴식 카드 → [🔥 요리]에서 true.
            //   휴식 모달은 백그라운드 유지(zIndex 1100), 요리 모달(1200)이 위에 덮임.
            const [cookingOpen, setCookingOpen] = useState(false);
            // D-28 획득 토스트 — 현재 노출 중인 토스트 1개만 유지.
            // 구조: { id: number, entries: [{ name, count, grade? }] } | null
            const [lootToast, setLootToast] = useState(null);
            // D-52: 풍족한 땅(구 좋은 곳) 등 타일 이벤트는 토스트로 안내.
            const [tileEventToast, setTileEventToast] = useState(null);
            // D-42 (2026-04-23 요한 지시): 보스 위치 가시성은 "지형 revealed"와 분리.
            // - listen 1칸 분기에서만 bossVisible=true 로 set (그 순간 보스 아이콘 노출)
            // - 플레이어가 이동하면 즉시 false (지형 revealed는 유지)
            // 공포 원칙: "한 번 본 보스 위치"가 아니라 "방금 귀기울인 위치"만 신뢰 가능.
            const [bossVisible, setBossVisible] = useState(false);

            // 보스 점프스케어 active flag (listen 거리=1 트리거). onDone에서 false.
            const [bossJumpscare, setBossJumpscare] = useState(false);

            // 플레이어 이동 경로 기록. 맵 보기 모드에서 방문 순서를 숫자로 표시.
            // 초기값은 게임 시작 시 setTiles 직후 [startTileId]로 채운다.
            const [moveHistory, setMoveHistory] = useState([]);

            // D-53 (2026-04-24): 보스 이동 경로 기록. 결과 화면 [맵 보기]에서 빨간 동그라미
            // + B1, B2... 라벨로 표시. 초기값은 initializeGame에서 [bossStart].
            // 인접 중복(보스가 같은 자리 유지)은 push 안 함.
            const [bossMoveHistory, setBossMoveHistory] = useState([]);

            // 승리 후 [맵 보기] 모드. true면 GameEndModal 숨기고 맵에 경로 숫자 표시.
            const [showPathView, setShowPathView] = useState(false);
            // D-46/D-48: 사냥감 전투 상태.
            //   preys          — 맵에 살아있는 사냥감 배열 [{id, tileId, preyType, hpCurrent?}].
            //   preyTraceTiles — listen/도망 결과로 감지된 "기척" 타일 id Set (visited 무관 표시).
            //   activeHunt     — 전투 모달 활성화 시 {prey}, 미활성 null.
            //   D-48: 발자국 방향 화살표(preyFootprints) 제거 — 흔적(👣)만으로 단서 제공.
            const [preys, setPreys] = useState([]);
            const [preyTraceTiles, setPreyTraceTiles] = useState(new Set());
            const [activeHunt, setActiveHunt] = useState(null);
            // D-77/D-78: 동물 사체 타일. 보스 포식 완료 시 여기에 tileId가 추가됨.
            //   carcassMeatTaken은 이미 생고기 보너스 1회 소진한 타일(뒤져보기 보상용).
            const [carcassTiles, setCarcassTiles] = useState(new Set());
            const [carcassMeatTaken, setCarcassMeatTaken] = useState(new Set());
            // D-78: listen 카드로 감지된 사체 trace 타일 — 👣 대신 🦴 표시.
            const [carcassTraceTiles, setCarcassTraceTiles] = useState(new Set());
            const mapRef = useRef(null);

            // 토스트 발사 — entries는 묶음 표시 대상.
            // id는 컴포넌트가 phase 타이머를 재시작하기 위한 key 역할.
            const showLootToast = (entries) => {
                if (!entries || entries.length === 0) return;
                setLootToast({ id: Date.now() + Math.random(), entries });
            };

            // 타일 이벤트 토스트 발사 — emoji/title/message/color 사양.
            const showTileEventToast = (payload) => {
                if (!payload) return;
                setTileEventToast({ id: Date.now() + Math.random(), ...payload });
            };

            // D-46 (2026-04-23) — 전투 결과 후처리.
            //   victory: preys 제거 + preyTraceTiles 해당 tileId 삭제 + meat 인벤 추가(overflow 집계)
            //            + LootToast(z-index 충돌 방지로 setTimeout 100ms) + 메시지.
            //   prey_fled: habitat 맞는 인접 타일 중 reserved(보스/탈출구/다른 prey) 제외하고 랜덤 이동.
            //              없으면 제자리. 이동 시 preyFootprints[원]={fromTile:원, toTile:새},
            //              preyTraceTiles에서 원 타일 제거. 메시지: "사냥감이 도망쳤다. 발자국이 남아있다."
            //   player_fled: prey 제자리. 메시지: "사냥을 포기하고 물러섰다."
            const handleHuntResolve = (result) => {
                if (!activeHunt || !activeHunt.prey) {
                    setActiveHunt(null);
                    return;
                }
                const prey = activeHunt.prey;
                const outcome = result && result.outcome;

                // D-47/D-51: 사용된 카드의 요구 재료를 인벤에서 차감.
                //   - 일반 재료(돌맹이 등): 1개씩 removeItem.
                //   - 무기 재료: result.weaponUsage에서 이미 계산된 used/fullLossCount로 차감
                //     (consumeWeaponUse — durabilityLeft 감소, 0이면 제거).
                //   autoFail 턴은 실제 사용이 없었으므로 제외.
                //   consumedSummary는 victory 메시지에 "소모: 돌맹이 2개" 형태로 덧붙임.
                const consumedSummary = [];
                if (inventory && Array.isArray(result && result.turns)) {
                    // 1) 비무기 재료 집계 — requirement 이름 중 weapon이 아닌 것만.
                    const TTD = window.TTD_DATA || {};
                    const WEAPONS = Array.isArray(TTD.WEAPONS) ? TTD.WEAPONS : [];
                    const weaponNameSet = new Set(WEAPONS.map(w => w && w.name).filter(Boolean));

                    const consumeByName = {};
                    for (const turn of result.turns) {
                        if (turn && turn.autoFail) continue; // 무기 없어서 실패한 턴은 소모 없음
                        const uc = turn && turn.userCard;
                        if (!uc) continue;
                        const reqs = CombatDeck.parseRequirement(uc.requirement);
                        for (const rName of reqs) {
                            if (weaponNameSet.has(rName)) continue; // 무기는 weaponUsage 경로로
                            // D-73: 카테고리 토큰(shield/armor)은 소비 대상 아님 — 방어구는 내구 개념 없음.
                            if (CombatDeck.CATEGORY_REQ_TOKENS && CombatDeck.CATEGORY_REQ_TOKENS.has(rName)) continue;
                            consumeByName[rName] = (consumeByName[rName] || 0) + 1;
                        }
                    }
                    for (const [reqName, count] of Object.entries(consumeByName)) {
                        let remaining = count;
                        const keep = [];
                        for (const it of inventory.items) {
                            if (remaining > 0) {
                                const def = InventorySystem.resolveDef(it.type) || {};
                                if ((def.name || '') === reqName) {
                                    inventory.removeItem(it);
                                    remaining -= 1;
                                    continue;
                                }
                            }
                            keep.push(it);
                        }
                        inventory.items = keep;
                        const actuallyConsumed = count - remaining;
                        if (actuallyConsumed > 0) {
                            consumedSummary.push(`${reqName} ${actuallyConsumed}개`);
                        }
                    }

                    // 2) 무기 차감 — weaponUsage {weaponId: {used, fullLossCount}}.
                    //   used는 내구도 총 차감량. 동일 weaponId 인스턴스들을 순회하며
                    //   durabilityLeft가 많은 순으로 차감(한 자루 기준 설계지만 여러 자루도 안전).
                    //   fullLoss 턴은 한 자루를 통째로 날림 — 인스턴스 1자루를 0으로.
                    const usage = (result && result.weaponUsage) || {};
                    for (const [weaponId, info] of Object.entries(usage)) {
                        const def = InventorySystem.resolveDef(weaponId) || {};
                        const displayName = def.name || weaponId;
                        const instances = inventory.items
                            .filter(it => it.type === weaponId)
                            .sort((a, b) => (b.durabilityLeft || 0) - (a.durabilityLeft || 0));

                        let fullLossLeft = Number(info.fullLossCount) || 0;
                        // 우선 full_loss 카운트만큼 자루를 통째로 소멸.
                        for (let i = 0; i < fullLossLeft && instances.length > 0; i++) {
                            const inst = instances[0];
                            inventory.consumeWeaponUse(inst, 0, true);
                            // instances 배열 동기화 (제거됐으므로 pop)
                            instances.shift();
                        }
                        // 남은 일반 차감량 = used - (full_loss로 날린 durability 합계) 계산이 복잡하니,
                        // weaponUsage.used는 이미 fullLoss를 포함한 총량이므로 일반 차감분만 분리.
                        //   일반 = used - (fullLossCount 동안 소멸한 durability의 합).
                        //   fullLoss에서 소멸한 durability는 그 자루의 durabilityLeft였음 — 추적이 번거롭다.
                        //   간단화: combat의 weaponState를 그대로 믿고, fullLossCount만큼 자루를 소멸하는
                        //   것으로 끝난다면(인스턴스 1자루라는 공통 케이스에서 정확), 남은 일반 차감은
                        //   "used - fullLoss로 날린 durability"를 수동 계산. 하지만 combat 쪽이 단일
                        //   weaponState 덩어리로 처리하므로, 여기선 'fullLossCount'가 1이면 그 자루를 태운 것으로
                        //   종료. 나머지 턴은 일반 차감.
                        //   → 더 단순한 해석: used에서 fullLoss로 이미 소모된 durability(instances[0]의 원래 값)를
                        //     빼고 남은 만큼 일반 차감. 그러나 현 모델은 '무기 1자루' 기준이므로
                        //     fullLossCount≥1이면 그 자루 소멸로 끝나고 나머지 턴은 auto-fail이 됐을 것이다.
                        //   결론: fullLossCount≥1이면 일반 차감은 건너뜀.
                        if ((Number(info.fullLossCount) || 0) === 0) {
                            let decLeft = Number(info.used) || 0;
                            for (const inst of instances) {
                                if (decLeft <= 0) break;
                                const canDec = Math.min(decLeft, (inst.durabilityLeft || 0));
                                if (canDec > 0) {
                                    inventory.consumeWeaponUse(inst, canDec, false);
                                    decLeft -= canDec;
                                }
                            }
                        }
                        const usedTotal = Number(info.used) || 0;
                        if (usedTotal > 0) {
                            consumedSummary.push(`${displayName} 내구 ${usedTotal}`);
                        }
                        if (info.broken) {
                            consumedSummary.push(`${displayName} 파손`);
                        }
                    }
                }
                const withConsumed = (msg) =>
                    consumedSummary.length > 0 ? `${msg} (소모: ${consumedSummary.join(', ')})` : msg;

                // D-74: 플레이어 HP 차감 — prey.attack과 유저 카드 defense 대결 결과 누적 대미지.
                //   HP 0이면 게임오버('health'). 기존 체력 사망 경로 재사용.
                //   사망 체크는 victory 보상 등과 독립적으로 적용(전투에서 잡았어도 0 HP면 사망).
                const dmgTaken = Math.max(0, Number(result && result.playerDamageTaken) || 0);
                if (dmgTaken > 0) {
                    setHealth(h => {
                        const nh = Math.max(0, h - dmgTaken);
                        if (nh <= 0) {
                            setGameOver(true);
                            setDeathReason('health');
                        }
                        return nh;
                    });
                }

                if (outcome === 'victory') {
                    // preys 제거
                    setPreys(prev => prev.filter(p => p.id !== prey.id));
                    // trace 제거
                    setPreyTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(prey.tileId);
                        return next;
                    });
                    // D-71: prey.drop_item 우선, 없으면 'meat' 폴백. 이름·등급은 resolveDef로 동적 조회.
                    const dropId = (prey.drop_item && String(prey.drop_item).trim()) || 'meat';
                    const dropDef = InventorySystem.resolveDef(dropId) || {};
                    const dropName = dropDef.name || dropId;
                    const dropGrade = Number(dropDef.grade) || 1;
                    const dropCount = prey.meat || 0;
                    let added = 0;
                    let overflow = 0;
                    for (let i = 0; i < dropCount; i++) {
                        const ok = inventory.addItem(dropId);
                        if (ok) added += 1;
                        else overflow += 1;
                    }
                    let msg = `사냥에 성공했다. ${dropName} ${added}을(를) 얻었다.`;
                    if (overflow > 0) msg += ` (가방이 가득 차 ${overflow}개는 두고 왔다.)`;
                    setMessage(withConsumed(msg));
                    setActiveHunt(null);
                    if (added > 0) {
                        // z-index 충돌 방지 — 모달 unmount 후 토스트 띄움.
                        setTimeout(() => showLootToast([{ name: dropName, count: added, grade: dropGrade }]), 100);
                    }
                } else if (outcome === 'prey_fled') {
                    // D-47: 반드시 다른 타일로 이동 — 3단계 fallback.
                    //   1차: habitat 매칭 + 인접 + reserved(빈/보스/탈출구/다른prey) 제외
                    //   2차: habitat 무관 인접 + reserved 제외
                    //   3차: 인접 무관 (맵 전체 non-reserved) — "멀리 놓친 것처럼" 이동
                    // 그리고 도망간 새 타일에 trace(👣) 추가 — 플레이어에게 단서 제공.
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    const habitat = (Array.isArray(preyDef.habitat) && preyDef.habitat.length > 0)
                        ? preyDef.habitat
                        : (PREY_HABITAT[prey.preyType] || []);
                    const bossPos = boss ? boss.getPosition() : -1;
                    const occupiedByOther = new Set(
                        (preys || []).filter(p => p.id !== prey.id).map(p => p.tileId)
                    );
                    const notReserved = (nid) => {
                        if (nid === prey.tileId) return false;
                        const t = tiles[nid];
                        if (!t || t.isEmpty) return false;
                        if (nid === bossPos) return false;
                        if (t.type === 'exit') return false;
                        if (occupiedByOther.has(nid)) return false;
                        return true;
                    };
                    const currentPreyTile = tiles[prey.tileId];
                    const neighborIds = (currentPreyTile && currentPreyTile.connections) || [];
                    let candidates = neighborIds.filter(nid => {
                        if (!notReserved(nid)) return false;
                        if (habitat.length > 0 && !habitat.includes(tiles[nid].region)) return false;
                        return true;
                    });
                    if (candidates.length === 0) {
                        candidates = neighborIds.filter(notReserved);
                    }
                    if (candidates.length === 0) {
                        candidates = tiles.map((_, i) => i).filter(notReserved);
                    }

                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    // D-60: 이 prey 개체의 도주 횟수 누적. 다음 재조우 시 턴별 회피율에서 *10 차감.
                    if (candidates.length > 0) {
                        const dest = candidates[Math.floor(Math.random() * candidates.length)];
                        const fromTile = prey.tileId;
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, tileId: dest, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                        // 원 타일 trace 제거 + 도망간 새 타일에 trace 추가.
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            next.delete(fromTile);
                            next.add(dest);
                            return next;
                        });
                    } else {
                        // 이론상 도달 불가 (맵 전체에 non-reserved 타일이 하나도 없는 경우). 안전망.
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                    }
                    setMessage(withConsumed('사냥감이 도망쳤다. 발자국이 남아있다.'));
                    setActiveHunt(null);
                } else if (outcome === 'player_fled') {
                    // 플레이어 도주 — prey는 제자리지만 준 데미지는 유지.
                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    setPreys(prev => prev.map(p =>
                        p.id === prey.id ? { ...p, hpCurrent: hpFinal } : p
                    ));
                    setMessage(withConsumed('사냥을 포기하고 물러섰다.'));
                    setActiveHunt(null);
                } else {
                    setActiveHunt(null);
                }
            };

            // 게임 초기화
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(MAP_SIZE);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                // 경로 기록 초기화 — 시작 타일이 첫 방문지.
                setMoveHistory([playerStart]);

                // 카드 데이터는 구글 시트 '베이스탐험카드' 탭이 SSOT.
                // data/data.js의 TTD_DATA.BASE_CARDS를 읽어 런타임 필드(time 기본값 1)만 덧붙인다.
                // 시트 갱신 시: 시트 수정 → `make data` 실행 → 새로고침.
                //
                // D-23: consume/extra_effect 컬럼은 시트 헤더에 존재. 값 없으면 빈 문자열.
                // 데이터 로드 실패 시에만 아래 else 폴백(안전망)이 사용된다.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0
                    ? sheetBaseCards.map(c => ({
                          id: c.id,
                          name: c.name,
                          count: Number(c.count) || 0,
                          effect: c.effect || '',
                          detection: Number(c.detection) || 0,
                          time: Number(c.time) || 1,
                          consume: c.consume || '',
                          extra_effect: c.extra_effect || ''
                      }))
                    : [
                          // 폴백(데이터 로드 실패 시) — 시트가 SSOT이므로 정상 경로에선 사용 안 됨.
                          { id: 'search', name: '뒤져보기', count: 5, effect: '아이템 획득', detection: 5, time: 1 },
                          { id: 'listen', name: '귀 기울이기', count: 2, effect: '몬스터 감지', detection: -5, time: 1 },
                          { id: 'find_food', name: '음식 찾기', count: 1, effect: '음식 획득', detection: 5, time: 1 },
                          { id: 'hide', name: '숨기', count: 1, effect: '은신', detection: -15, time: 1 },
                          { id: 'rest', name: '휴식', count: 1, effect: '체력/배고픔 소폭 회복, 소음 최소', detection: -13, time: 1,
                            consume: 'category:음식;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                // D-47: 기본 가방 모양(5x5, 위 2행 구석 4칸 disabled) — InventorySystem 기본값 사용.
                const inv = new InventorySystem();
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                // D-62: setPosition은 visitedTiles에도 bossPos 동기화 — 잘못된 스폰 기록 방지.
                newBoss.setPosition(bossPos);
                // D-77: 포식 콜백 연결.
                //   onPredationStart  — 타겟 L2 prey를 preys에서 제거(보스가 잡아먹기 시작).
                //   onPredationComplete — 보스가 그 타일에서 2턴 정지를 끝낼 때 사체 타일 생성.
                newBoss.onPredationStart = (targetPreyId, /*tileId*/) => {
                    setPreys(prev => prev.filter(p => p.id !== targetPreyId));
                    setPreyTraceTiles(prev => {
                        // prey 제거 후 해당 tileId는 carcassTraceTiles로 옮길 수도 있지만,
                        // 포식 완료 시점까진 아직 "사체"로 보이지 않으므로 기존 trace만 삭제.
                        const next = new Set(prev);
                        return next;
                    });
                };
                newBoss.onPredationComplete = (tileId /*, targetPreyId */) => {
                    setCarcassTiles(prev => {
                        const next = new Set(prev);
                        next.add(tileId);
                        return next;
                    });
                };
                setBoss(newBoss);
                // D-53: 보스 이동 history 초기화 (시작 위치가 B1).
                setBossMoveHistory([bossPos]);

                // D-46/D-76: 사냥감 스폰. level1/level2 각각 PREY_SPAWN 만큼.
                //   reserved = 플레이어 시작/보스/탈출구. preyData는 TTD_DATA.PREY.
                //   habitatFallback은 prey.habitat 없을 때만 사용.
                const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const spawned = (typeof window.spawnPrey === 'function')
                    ? window.spawnPrey(newTiles, preyData, PREY_SPAWN, {
                        playerStartId: playerStart,
                        bossPosId: bossPos,
                        exitPosId: exitPos
                    }, PREY_HABITAT)
                    : [];
                setPreys(spawned);
                setPreyTraceTiles(new Set());
                setActiveHunt(null);
                // 콘솔 검증용 — 릴리스 시 제거해도 무방.
                if (typeof window !== 'undefined') window.__preys = spawned;
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // 게임 오버/승리 체크
            // D-54: 사유 구분 — 체력이 먼저 0이면 'health', 배고픔 먼저면 'starvation'.
            useEffect(() => {
                if (health <= 0) {
                    setGameOver(true);
                    setDeathReason('health');
                    setMessage('생명력이 다했다...');
                } else if (hunger <= 0) {
                    setGameOver(true);
                    setDeathReason('starvation');
                    setMessage('배고픔을 이기지 못했다...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('탈출에 성공했다!');
                }
            }, [currentTile, tiles]);

            // hunt_start 카드 자동 정리 — 사냥감이 처치되거나 도망으로 현재 타일을
            // 떠난 순간 손패에 남는 사냥시작 카드를 즉시 무덤으로 보낸다.
            // 이동 시점의 손패 교체(moveTo)로도 정리되지만, 그 타일에 머물며 전투가
            // 끝난 경우엔 잡을 길이 없어 별도 감시가 필요.
            useEffect(() => {
                const orphan = (hand || []).filter(c => {
                    if (c.id !== 'hunt_start') return false;
                    const t = c.target;
                    if (!t) return true;
                    return !(preys || []).some(p => p.id === t.preyId && p.tileId === currentTile);
                });
                if (orphan.length === 0) return;
                const orphanUids = new Set(orphan.map(c => c.uid));
                // D-65: hunt_start는 무덤이 아니라 소멸 (요한 원문). setGraveyard 호출 제거.
                setHand(prev => prev.filter(c => !orphanUids.has(c.uid)));
            }, [preys, currentTile]);

            // D-63 (2026-04-24): D-59 revert.
            // 손패 자동 보충은 요한 의도 반대였다. 올바른 규칙:
            //   - 타일 이동 시에만 덱에서 5장 새로 드로우 (moveTo에서 처리, D-48).
            //   - 카드 사용으로 손패가 줄면 보충 없음 (플레이어가 적게 쓰면 다음 타일에서 리필).
            //   - hunt_start는 사냥감 조우 시 overflow로 추가 (카운터 제외, 이동 시 소멸).
            // 따라서 카드 사용 직후 자동 보충 useEffect는 제거.

            // D-67 (2026-04-24): 배고픔 1 이하 직접 알림.
            //   D-55 게이지 점멸만으로는 경고가 약하다는 요한 피드백. hunger <= 1로 떨어지면
            //   메시지로 '배고파서 쓰러질 것 같다...' 를 덮어씌워 유저가 즉시 인지하도록.
            //   hunger 변화 시마다 재평가 — 회복되면 다른 action이 덮어쓰면서 자연 해제.
            useEffect(() => {
                if (gameOver || victory) return;
                if (hunger <= 1) {
                    setMessage('배고파서 쓰러질 것 같다...');
                }
            }, [hunger, gameOver, victory]);

            // 아이템 사용 — 인벤토리 정보창에서 '사용' 버튼을 누를 때 호출.
            // EffectParser가 파싱한 Notion '사용 효과' DSL을 런타임에 적용하고,
            // 소비형(consumed) 판정은 effectParser가 내려준 값을 그대로 따른다.
            //
            // spawn_card:throw 는 '전투 카드 덱에 던지기 카드 추가'로 해석한다.
            // 기획 근거(요한 지시): "전투모드시에 등장하는 카드에 추가된다".
            // 사용 시점에 카드가 생성되어 임시 풀(combatExtraCards)에 쌓이고,
            // 다음 전투 시작 때 기본 덱과 병합되며, 그 전투 내에서 카드를 쓰면 소멸한다.
            // (영구 추가가 아닌 근거: 현재 아이템이 일회용 판정이 아니어도 재탐색/머지 가능 재료이므로
            //  덱에 영구 편입시키면 밸런스가 쉽게 무너지고, 요한 말 "전투 종료 시 소멸"이 자연스러움.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['이름'] === (def.name || item.name));
                const parsed = (notionItem && notionItem.effect) || null;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('이 아이템은 아직 사용할 수 없다.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        if (name === 'hunger') setHunger(val);
                        else if (name === 'health') setHealth(val);
                    },
                    addThrowCard: (cardId) => {
                        // 같은 cardId를 여러 번 써서 여러 장을 쌓을 수도 있음.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
