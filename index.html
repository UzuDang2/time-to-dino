<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>рҹҰ– нғҖмһ„нҲ¬лӢӨмқҙл…ё</title>
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .stat-box {
            background: #16213e;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .stat-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: 600; }
        button {
            background: #0f3460;
            color: #eee;
            border: 1px solid #16213e;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        button:hover { background: #16213e; border-color: #e94560; }
        button:active { transform: scale(0.95); }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .card:active { 
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }
        .map-container {
            flex: 1;
            overflow: auto;
            background: #0a0e27;
            position: relative;
        }
        .map-svg { display: block; }
        .hex-tile {
            cursor: pointer;
            transition: all 0.2s;
        }
        .hex-tile:hover { filter: brightness(1.2); }
        .hex-tile.current { filter: drop-shadow(0 0 8px #e94560); }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 45px);
            grid-template-rows: repeat(6, 45px);
            gap: 2px;
            background: #0f3460;
            padding: 4px;
            border-radius: 8px;
        }
        .inventory-cell {
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .inventory-cell.occupied { background: #2a4365; }
        .inventory-item {
            position: absolute;
            background: #4a5568;
            border: 2px solid #e94560;
            border-radius: 4px;
            padding: 4px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .inventory-item.selected {
            background: #e94560;
            z-index: 10;
        }
        .ui-panel {
            background: #16213e;
            padding: 10px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Game() {
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(6);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            const [message, setMessage] = useState('лҲҲмқ„ лңЁмһҗ лӮҜм„  мҲІмқҙ нҺјміҗмЎҢлӢӨ.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            const mapRef = useRef(null);

            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(7);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // мӢңмһ‘ нғҖмқјмқҳ мқём ‘ нғҖмқјл“Өмқ„ discoveredлЎң м„Өм • (л¬јмқҢн‘ңлЎң ліҙмқҙкІҢ)
                newTiles[playerStart].connections.forEach(conn => {
                    newTiles[conn].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                
                const cards = [
                    { id: 'search', name: 'л’Өм ёліҙкё°', count: 5, effect: 'м•„мқҙн…ң нҡҚл“қ', detection: 5, time: 1 },
                    { id: 'listen', name: 'к·Җ кё°мҡёмқҙкё°', count: 2, effect: 'лӘ¬мҠӨн„° к°җм§Җ', detection: -5, time: 1 },
                    { id: 'find_food', name: 'мқҢмӢқ м°ҫкё°', count: 1, effect: 'мқҢмӢқ нҡҚл“қ', detection: 5, time: 1 },
                    { id: 'find_weapon', name: 'л¬ҙкё° мһҘл№„ м°ҫкё°', count: 1, effect: 'л¬ҙкё°/мһҘл№„', detection: 10, time: 1 },
                    { id: 'hide', name: 'мҲЁкё°', count: 1, effect: 'мқҖмӢ ', detection: -15, time: 1 }
                ];
                
                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(3));
                setHand(newDeck.slice(0, 3));
                
                const inv = new InventorySystem(6, 5);
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                newBoss.position = bossPos;
                setBoss(newBoss);
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            useEffect(() => {
                if (health <= 0 || hunger <= 0) {
                    setGameOver(true);
                    setMessage(health <= 0 ? 'мғқлӘ…л Ҙмқҙ лӢӨн–ҲлӢӨ...' : 'л°°кі н””мқ„ мқҙкё°м§Җ лӘ»н–ҲлӢӨ...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('нғҲм¶ңм—җ м„ұкіөн–ҲлӢӨ!');
                }
            }, [currentTile, tiles]);

            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('мӢңк°„мқҙ л¶ҖмЎұн•©лӢҲлӢӨ!');
                    return;
                }
                
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                
                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);
                
                let msg = `${card.name}мқ„(лҘј) мӮ¬мҡ©н–ҲлӢӨ. (мӢңк°„ +${card.time}) `;
                
                if (card.id === 'search') {
                    inventory.addItem('material_low');
                    msg += `мһ¬лЈҢлҘј л°ңкІ¬н–ҲлӢӨ.`;
                } else if (card.id === 'find_food') {
                    inventory.addItem('food');
                    msg += `мқҢмӢқмқ„ л°ңкІ¬н–ҲлӢӨ.`;
                } else if (card.id === 'listen') {
                    // к·Җ кё°мҡёмқҙкё°: мқём ‘ нғҖмқј мҳҒкө¬ кіөк°ң
                    const newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    setTiles(newTiles);
                    msg += `мЈјліҖ мҶҢлҰ¬лҘј л“Өм—ҲлӢӨ. ліҙмҠӨлҠ” нғҖмқј #${boss.getPosition()}м—җ мһҲлӢӨ.`;
                } else if (card.id === 'hide') {
                    msg += 'мЎ°мҡ©нһҲ лӘёмқ„ мҲЁкІјлӢӨ.';
                } else if (card.id === 'find_weapon') {
                    inventory.addItem('weapon_basic');
                    msg += 'лӮҳл¬ҙм°Ҫмқ„ л°ңкІ¬н–ҲлӢӨ!';
                }
                
                setMessage(msg);
            };

            const moveTo = (targetId) => {
                if (!tiles[currentTile].connections.includes(targetId)) {
                    setMessage('к·ёкіімңјлЎңлҠ” к°Ҳ мҲҳ м—ҶмҠөлӢҲлӢӨ!');
                    return;
                }
                
                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                
                setHunger(hunger - 1);
                setTime(0);
                
                // мқҙлҸҷн•ң нғҖмқј л°©л¬ё мІҳлҰ¬ + мқём ‘ нғҖмқјл“Ө discoveredлЎң м„Өм •
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        return { ...t, visited: true, discovered: true };
                    }
                    // мғҲлЎңмҡҙ мң„м№ҳмқҳ мқём ‘ нғҖмқјл“Өмқ„ discoveredлЎң м„Өм •
                    if (tiles[targetId].connections.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                
                // мҶҗнҢЁ ліҙм¶©
                let newHand = [...hand];
                let newDeck = [...deck];
                let newGraveyard = [...graveyard];
                
                while (newHand.length < 3 && newDeck.length > 0) {
                    newHand.push(newDeck.shift());
                }
                
                if (newHand.length < 3 && newGraveyard.length > 0) {
                    newDeck = shuffleDeck(newGraveyard);
                    newGraveyard = [];
                    while (newHand.length < 3 && newDeck.length > 0) {
                        newHand.push(newDeck.shift());
                    }
                }
                
                setHand(newHand);
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                
                // ліҙмҠӨ мқҙлҸҷ
                let newBossPos = boss.position;
                if (newMoveCount % 2 === 0 && !boss.chaseMode) {
                    const bossConnections = newTiles[boss.position].connections;
                    if (bossConnections.length > 0) {
                        newBossPos = bossConnections[Math.floor(Math.random() * bossConnections.length)];
                        boss.position = newBossPos;
                    }
                }
                
                if (detection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }
                
                if (boss.chaseMode) {
                    boss.onPlayerMove(targetId, detection);
                    newBossPos = boss.position;
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';
                
                if (encounter) {
                    setGameOver(true);
                    msg = 'ліҙмҠӨ лӘ¬мҠӨн„°мҷҖ мЎ°мҡ°н–ҲлӢӨ! кІҢмһ„ мҳӨлІ„...';
                } else if (tile.type === 'normal') {
                    msg = 'нҸүлІ”н•ң мҲІкёёмқҙлӢӨ.';
                } else if (tile.type === 'good') {
                    msg = 'мўӢмқҖ кіімқ„ л°ңкІ¬н–ҲлӢӨ!';
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `н•Ём •! мғқлӘ…л Ҙ -${damage}`;
                } else if (tile.type === 'exit') {
                    msg = 'нғҲм¶ңкө¬лӢӨ!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [вҡ пёҸ ліҙмҠӨ м¶”кІ©мӨ‘!]`;
                }
                
                setMessage(msg);
            };

            const getTileColor = (tile) => {
                if (!tile.discovered && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (boss && tile.id === boss.position && tile.revealed) return '#8B0000';
                return '#2d3561';
            };

            const detectionColor = detection < 30 ? '#4CAF50' : 
                                   detection < 60 ? '#FFC107' : '#e94560';

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>кІҢмһ„ лЎңл”© мӨ‘...</div>;
            }

            // л°ңкІ¬лҗҳм—Ҳкұ°лӮҳ л°©л¬ён•ң нғҖмқјл§Ң н‘ңмӢң
            const visibleTiles = tiles.filter(t => t.visited || t.discovered || t.revealed);

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    <div className="ui-panel">
                        <div style={{ marginBottom: '8px', fontSize: '18px', fontWeight: '600' }}>рҹҰ– нғҖмһ„нҲ¬лӢӨмқҙл…ё</div>
                        
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '6px', marginBottom: '8px' }}>
                            <div className="stat-box">
                                <div className="stat-label">мғқлӘ…л Ҙ</div>
                                <div className="stat-value">вқӨпёҸ {health}/6</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">л°°кі н””</div>
                                <div className="stat-value">рҹҚ– {hunger}/12</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">мӢңк°„</div>
                                <div className="stat-value">вҸ° {time}/{maxTime}</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">ліҙмҠӨ</div>
                                <div className="stat-value" style={{ fontSize: '13px' }}>
                                    {boss?.chaseMode ? 'рҹ”ҙ м¶”кІ©' : 'рҹҹў мҲңм°°'}
                                </div>
                            </div>
                        </div>
                        
                        <div className="stat-box" style={{ marginBottom: '8px' }}>
                            <div className="stat-label">рҹҡЁ л°ңк°ҒлҘ </div>
                            <div style={{ background: '#0f3460', height: '20px', borderRadius: '10px', overflow: 'hidden', marginTop: '4px' }}>
                                <div style={{ 
                                    width: `${detection}%`, 
                                    height: '100%', 
                                    background: detectionColor, 
                                    transition: 'all 0.3s',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '11px',
                                    fontWeight: '600',
                                    color: '#fff'
                                }}>
                                    {detection > 10 ? `${detection}%` : ''}
                                </div>
                            </div>
                        </div>

                        <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px' }}>{message}</div>
                        
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
                            <button onClick={() => setShowInventory(!showInventory)}>
                                {showInventory ? 'к°Җл°© лӢ«кё°' : 'к°Җл°© м—ҙкё°'}
                            </button>
                            <div style={{ fontSize: '12px', color: '#aaa', display: 'flex', alignItems: 'center', marginLeft: 'auto' }}>
                                мҶҗнҢЁ {hand.length}/3 В· лҚұ {deck.length} В· л¬ҙлҚӨ {graveyard.length}
                            </div>
                        </div>

                        {!gameOver && !victory && hand.length > 0 && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px' }}>
                                {hand.map(card => (
                                    <div key={card.uid} className="card" onClick={() => useCard(card)}>
                                        <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>{card.name}</div>
                                        <div style={{ fontSize: '10px', color: '#aaa' }}>{card.effect}</div>
                                        <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                            л°ңк°Ғ {card.detection > 0 ? '+' : ''}{card.detection}% В· вҸ°{card.time}h
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="map-container" ref={mapRef}>
                        <svg className="map-svg" width="1100" height="1000">
                            {visibleTiles.map((tile) => {
                                const { x, y } = tile.position;
                                const isCurrent = tile.id === currentTile;
                                const canMove = tiles[currentTile].connections.includes(tile.id);
                                const isBoss = boss && tile.id === boss.position && tile.revealed;
                                const isRevealed = tile.revealed || tile.visited;
                                
                                return (
                                    <g key={tile.id}>
                                        <polygon
                                            className={`hex-tile ${isCurrent ? 'current' : ''}`}
                                            points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                                            fill={getTileColor(tile)}
                                            stroke={isCurrent ? '#e94560' : canMove ? '#4CAF50' : '#0f3460'}
                                            strokeWidth={isCurrent ? '4' : canMove ? '3' : '2'}
                                            opacity={isRevealed ? 1 : 0.6}
                                            onClick={() => !gameOver && !victory && canMove && moveTo(tile.id)}
                                        />
                                        {isRevealed ? (
                                            <>
                                                <text x={x} y={y} textAnchor="middle" fill="#fff" fontSize="13" fontWeight="600">
                                                    {isCurrent ? 'лӮҙмң„м№ҳ' :
                                                     tile.type === 'exit' ? 'нғҲм¶ңкө¬' : 
                                                     isBoss ? 'рҹҰ–' :
                                                     tile.type === 'good' ? 'рҹ‘Қ' :
                                                     tile.type === 'trap' ? 'вҡ пёҸ' : ''}
                                                </text>
                                            </>
                                        ) : (
                                            <text x={x} y={y + 5} textAnchor="middle" fill="#666" fontSize="24" fontWeight="bold">
                                                ?
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    {showInventory && inventory && (
                        <div className="modal">
                            <div className="modal-content">
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                                    <h3>к°Җл°© (5x6)</h3>
                                    <button onClick={() => setShowInventory(false)}>лӢ«кё°</button>
                                </div>
                                <div style={{ position: 'relative' }}>
                                    <div className="inventory-grid">
                                        {Array(6).fill(null).map((_, row) => 
                                            Array(5).fill(null).map((_, col) => (
                                                <div 
                                                    key={`${row}-${col}`} 
                                                    className={`inventory-cell ${inventory.grid[row][col] ? 'occupied' : ''}`}
                                                />
                                            ))
                                        )}
                                    </div>
                                    {inventory.items.map(item => (
                                        <div
                                            key={item.id}
                                            className={`inventory-item ${selectedInventoryItem?.id === item.id ? 'selected' : ''}`}
                                            style={{
                                                left: `${item.x * 47 + 4}px`,
                                                top: `${item.y * 47 + 4}px`,
                                                width: `${item.shape[0].length * 47 - 4}px`,
                                                height: `${item.shape.length * 47 - 4}px`
                                            }}
                                            onClick={() => setSelectedInventoryItem(item)}
                                        >
                                            {item.name}
                                        </div>
                                    ))}
                                </div>
                                {selectedInventoryItem && (
                                    <div style={{ marginTop: '10px' }}>
                                        <button onClick={() => {
                                            inventory.rotateItem(selectedInventoryItem);
                                            setInventory({...inventory});
                                        }}>нҡҢм „</button>
                                        <button onClick={() => setSelectedInventoryItem(null)} style={{ marginLeft: '8px' }}>нҷ•м •</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {(gameOver || victory) && (
                        <div className="modal">
                            <div style={{ 
                                background: victory ? '#4CAF50' : '#e94560', 
                                color: 'white',
                                padding: '40px', 
                                borderRadius: '12px', 
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '28px', fontWeight: '600', marginBottom: '20px' }}>
                                    {victory ? 'рҹҺү мҠ№лҰ¬!' : 'рҹ’Җ кІҢмһ„ мҳӨлІ„'}
                                </div>
                                <button 
                                    onClick={() => window.location.reload()}
                                    style={{ 
                                        background: 'white',
                                        color: '#333',
                                        border: 'none',
                                        padding: '15px 30px',
                                        fontSize: '16px',
                                        fontWeight: '600'
                                    }}
                                >
