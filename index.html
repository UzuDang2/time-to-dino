                                수락
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 데이터 초기화 경고.
        function ResetConfirmModal({ onConfirm, onCancel }) {
            return (
                <div className="modal" style={{ zIndex: 3600 }}>
                    <div style={{
                        background: '#2a1a1e',
                        color: '#fff',
                        padding: '24px 22px',
                        borderRadius: '10px',
                        border: '1px solid #8B0000',
                        maxWidth: '340px',
                        width: '90vw',
                        textAlign: 'center'
                    }}>
                        <div style={{ fontSize: '16px', fontWeight: 700, marginBottom: '12px', color: '#ff8a8a' }}>
                            데이터 초기화
                        </div>
                        <div style={{ fontSize: '13px', lineHeight: 1.6, marginBottom: '20px', color: '#ddd' }}>
                            정말 모든 진행을 초기화? 되돌릴 수 없다.
                        </div>
                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            <button
                                onClick={onCancel}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '8px 18px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}
                            >
                                취소
                            </button>
                            <button
                                onClick={onConfirm}
                                style={{
                                    background: '#8B0000',
                                    color: '#fff',
                                    border: 'none',
                                    padding: '8px 22px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px',
                                    fontWeight: 700
                                }}
                            >
                                확인
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // 캠프 인벤 그리드 (12x8 등). InventoryModal과 동일 룩.
        //   D-113: cellSize·onItemClick·selectedIds·onCellLongPress 옵션 추가.
        //     - 셀 크기를 호출부에서 조절(작은 미리보기 / PackTransferModal에서 더 작게).
        //     - selectedIds: Set 또는 배열. 포함된 item.id는 'selected' 클래스 부여.
        //     - onItemClick(item): 아이템 영역 탭 — 다중선택 토글 등에 사용.
        //     - onItemLongPress(item): 길게 누르면 ItemInfoModal 열기 등.
        //   기본은 정적 표시(클릭 핸들러 없음).
        function CampInventoryGrid({ inventory, cellSize, selectedIds, onItemClick, onItemLongPress }) {
            if (!inventory) return null;
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = Number(cellSize) > 0 ? Number(cellSize) : 36;
            const PAD = 3;
            const selSet = selectedIds instanceof Set
                ? selectedIds
                : (Array.isArray(selectedIds) ? new Set(selectedIds) : null);

            // 길게 누르기(롱프레스) 감지 — 500ms.
            const pressTimerRef = React.useRef(null);
            const longFiredRef = React.useRef(false);
            const startPress = (item) => {
                longFiredRef.current = false;
                if (typeof onItemLongPress !== 'function') return;
                pressTimerRef.current = setTimeout(() => {
                    longFiredRef.current = true;
                    onItemLongPress(item);
                }, 500);
            };
            const cancelPress = () => {
                if (pressTimerRef.current) {
                    clearTimeout(pressTimerRef.current);
                    pressTimerRef.current = null;
                }
            };
            const handleClick = (item) => {
                if (longFiredRef.current) return;
                if (typeof onItemClick === 'function') onItemClick(item);
            };

            return (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                        gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                        gap: '2px',
                        background: '#0f3460',
                        padding: `${PAD}px`,
                        borderRadius: '8px'
                    }}>
                        {Array(ROWS).fill(null).map((_, row) =>
                            Array(COLS).fill(null).map((_, col) => {
                                const occupied = !!inventory.grid[row][col];
                                const disabled = inventory.isDisabled && inventory.isDisabled(col, row);
                                return (
                                    <div
                                        key={`${row}-${col}`}
                                        className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                        style={disabled ? { background: '#0a1a2a', opacity: 0.35 } : undefined}
                                    />
                                );
                            })
                        )}
                    </div>
                    {inventory.items.map(item => {
                        const w = item.shape[0].length;
                        const h = item.shape.length;
                        const emoji = itemEmoji(item.type);
                        const selected = selSet && selSet.has(item.id);
                        const interactive = typeof onItemClick === 'function' || typeof onItemLongPress === 'function';
                        return (
                            <div
                                key={item.id}
                                className={`inventory-item${selected ? ' selected' : ''}`}
                                style={{
                                    left: `${item.x * CELL + PAD}px`,
                                    top: `${item.y * CELL + PAD}px`,
                                    width: `${w * CELL - PAD}px`,
                                    height: `${h * CELL - PAD}px`,
                                    fontSize: '9px',
                                    cursor: interactive ? 'pointer' : 'default',
                                    pointerEvents: interactive ? 'auto' : 'none',
                                    outline: selected ? '2px solid #4dd0e1' : undefined,
                                    boxShadow: selected ? '0 0 8px rgba(77,208,225,0.55)' : undefined,
                                    zIndex: selected ? 2 : 1
                                }}
                                onClick={() => handleClick(item)}
                                onMouseDown={() => startPress(item)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onTouchStart={() => startPress(item)}
                                onTouchEnd={cancelPress}
                                onTouchCancel={cancelPress}
                            >
                                {emoji
                                    ? <span style={{ fontSize: Math.round(CELL * 0.55) + 'px', lineHeight: 1 }}>{emoji}</span>
                                    : item.name}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // D-113: 보관함 단독 풀스크린 팝업.
        //   캠프 [보관함] 버튼에서 열림. 12x8 그리드를 한눈에.
        //   아이템 길게 누르면 ItemInfoModal로 정보 표시.
        function StorageModal({ inventory, onClose }) {
            const [infoItem, setInfoItem] = React.useState(null);
            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px 18px 24px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(94vw, 460px)',
                        margin: '24px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>📦 보관함</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >닫기</button>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'center' }}>
                            <CampInventoryGrid
                                inventory={inventory}
                                cellSize={40}
                                onItemLongPress={(it) => setInfoItem(it)}
                            />
                        </div>
                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', marginTop: '10px' }}>
                            아이템을 길게 누르면 정보를 볼 수 있다.
                        </div>
                    </div>
                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={() => setInfoItem(null)}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // D-113: 인벤 간 아이템 이전 — 인스턴스 직접 placement (durability/rotation 보존).
        //   selectedIds: 옮길 source 아이템 id 배열.
        //   src/dst: InventorySystem 인스턴스. dst에 빈 자리 없으면 부분 이전(들어간 만큼만).
        //   반환: { moved: [item...], failed: [item...] } — 호출부 토스트 메시지에 사용.
        //   src에서 제거 + dst에 새 좌표로 placeItem. id는 dst 측에서 새로 발급(같은 id 충돌 방지).
        function transferItems(src, dst, selectedIds) {
            const idSet = new Set(selectedIds || []);
            const moved = [];
            const failed = [];
            // src.items를 복사 후 순회 — removeItem 시 src.items도 갱신되므로 미리 떠두기.
            const targets = src.items.filter(it => idSet.has(it.id));
            for (const it of targets) {
                const shape = it.shape;
                const pos = dst.findEmptySpace(shape);
                if (!pos) { failed.push(it); continue; }
                const placed = {
                    ...it,
                    id: Date.now() + Math.random(),
                    x: pos.x,
                    y: pos.y
                };
                // src에서 그리드 비우고 items에서 제거.
                src.removeItem(it);
                src.items = src.items.filter(x => x.id !== it.id);
                // dst에 배치.
                dst.placeItem(placed);
                dst.items.push(placed);
                moved.push(placed);
            }
            return { moved, failed };
        }

        // D-113: 보관함 ↔ 가방 다중선택·옮기기·서로 바꾸기 풀스크린 모달.
        //   props.storage / props.pack — InventorySystem 인스턴스.
        //   props.onChange() — 변경 후 부모에 재렌더 트리거 알림 (campState 객체 새로 만들기).
        //   props.onClose — 닫기.
        //   상태: selectedFromStorage / selectedFromPack (각각 Set<itemId>).
        //   버튼 활성:
        //     - storage만 선택 → [가방으로]
        //     - pack만 선택 → [보관함으로]
        //     - 양쪽 선택 → [서로 바꾸기]
        function PackTransferModal({ storage, pack, onChange, onClose }) {
            const [selStorage, setSelStorage] = React.useState(() => new Set());
            const [selPack, setSelPack] = React.useState(() => new Set());
            const [toast, setToast] = React.useState(null);

            const toggle = (which, id) => {
                const setter = which === 'storage' ? setSelStorage : setSelPack;
                setter(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 1800);
            };

            const onlyStorage = selStorage.size > 0 && selPack.size === 0;
            const onlyPack = selPack.size > 0 && selStorage.size === 0;
            const both = selStorage.size > 0 && selPack.size > 0;

            // [가방으로 옮기기]
            const moveToPack = () => {
                const ids = Array.from(selStorage);
                const r = transferItems(storage, pack, ids);
                if (r.failed.length > 0) {
                    showToast(`가방이 가득 — ${r.moved.length}개만 옮김`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}개를 가방으로`);
                }
                setSelStorage(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [보관함으로 옮기기]
            const moveToStorage = () => {
                const ids = Array.from(selPack);
                const r = transferItems(pack, storage, ids);
                if (r.failed.length > 0) {
                    showToast(`보관함이 가득 — ${r.moved.length}개만 옮김`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}개를 보관함으로`);
                }
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [서로 바꾸기] — 동시에 양쪽으로 보낸다.
            //   먼저 양쪽에서 선택 아이템을 src.items에서 떼어내고(grid도 비움),
            //   각각 상대편 dst에 빈 자리에 배치. 공간 부족 시 부분만 성공.
            //   부분 성공 시 실패한 쪽은 원래 인벤에 다시 빈 자리로 폴백.
            const swapBoth = () => {
                const sIds = Array.from(selStorage);
                const pIds = Array.from(selPack);
                const sItems = storage.items.filter(it => selStorage.has(it.id));
                const pItems = pack.items.filter(it => selPack.has(it.id));
                // 1) src에서 분리 (양쪽 모두).
                for (const it of sItems) {
                    storage.removeItem(it);
                    storage.items = storage.items.filter(x => x.id !== it.id);
                }
                for (const it of pItems) {
                    pack.removeItem(it);
                    pack.items = pack.items.filter(x => x.id !== it.id);
                }
                // 2) 상대편 dst에 배치 시도. 실패 시 원래 인벤으로 복원.
                let movedToPack = 0, movedToStorage = 0, failedBack = 0;
                const place = (item, dst) => {
                    const pos = dst.findEmptySpace(item.shape);
                    if (!pos) return false;
                    const placed = { ...item, id: Date.now() + Math.random(), x: pos.x, y: pos.y };
                    dst.placeItem(placed);
                    dst.items.push(placed);
                    return true;
                };
                for (const it of sItems) {
                    if (place(it, pack)) movedToPack += 1;
                    else {
                        // 원래 storage로 폴백.
                        if (!place(it, storage)) failedBack += 1;
                    }
                }
                for (const it of pItems) {
                    if (place(it, storage)) movedToStorage += 1;
                    else {
                        if (!place(it, pack)) failedBack += 1;
                    }
                }
                if (movedToPack + movedToStorage === 0) {
                    showToast('공간이 부족해 바꾸지 못함');
                } else if (sItems.length + pItems.length > movedToPack + movedToStorage) {
                    showToast(`일부만 교환 (가방 ${movedToPack} / 보관함 ${movedToStorage})`);
                } else {
                    showToast(`교환 완료 (가방 ${movedToPack} / 보관함 ${movedToStorage})`);
                }
                setSelStorage(new Set());
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };

            const btnStyle = (active) => ({
                background: active ? '#d4b84a' : '#2a2a3e',
                color: active ? '#1a1a2e' : '#666',
                border: 'none',
                padding: '10px 14px',
                borderRadius: '6px',
                cursor: active ? 'pointer' : 'not-allowed',
                fontSize: '12px',
                fontWeight: 700,
                flex: 1,
                minWidth: 0
            });

            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '18px 14px 22px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(96vw, 540px)',
                        margin: '16px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>🎒 물건 챙기기</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >닫기</button>
                        </div>

                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            gap: '14px',
                            alignItems: 'center'
                        }}>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    📦 보관함 ({storage.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={storage}
                                        cellSize={32}
                                        selectedIds={selStorage}
                                        onItemClick={(it) => toggle('storage', it.id)}
                                    />
                                </div>
                            </div>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    🎒 가방 ({pack.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={pack}
                                        cellSize={36}
                                        selectedIds={selPack}
                                        onItemClick={(it) => toggle('pack', it.id)}
                                    />
                                </div>
                            </div>
                        </div>

                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', margin: '12px 0' }}>
                            아이템을 탭해서 선택. 양쪽에서 선택하면 [서로 바꾸기].
                        </div>

                        <div style={{ display: 'flex', gap: '6px' }}>
                            <button
                                onClick={moveToPack}
                                disabled={!onlyStorage}
                                style={btnStyle(onlyStorage)}
                            >
                                가방으로
                            </button>
                            <button
                                onClick={moveToStorage}
                                disabled={!onlyPack}
                                style={btnStyle(onlyPack)}
                            >
                                보관함으로
                            </button>
                            <button
                                onClick={swapBoth}
                                disabled={!both}
                                style={btnStyle(both)}
                            >
                                서로 바꾸기
                            </button>
                        </div>

                        {toast && (
                            <div style={{
                                position: 'fixed',
                                left: '50%',
                                bottom: '40px',
                                transform: 'translateX(-50%)',
                                background: 'rgba(0,0,0,0.8)',
                                color: '#fff',
                                padding: '10px 18px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                zIndex: 3401
                            }}>
                                {toast}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-168 (2026-04-29 요한): 베이스캠프 빌딩 그리드 — 3x3.
        //   첫 슬롯은 텐트(활성). 나머지 8개는 placeholder(추후 공개). 카드 클릭 → 모달.
        //   텐트는 tentLevel에 따라 30%/100% 투명도, Lv.N 라벨 표시.
        // D-174 (2026-04-30): 시트 SSOT 통합 — 빌딩 6종 + 텐트 + 잠금 2칸 = 9칸.
        //   slots: { id, kind } — kind: 'tent' | 'sheet' | 'locked'.
        //   라벨 통일 — Lv.{stage}/{maxStage}. stage=0이면 30% 투명도.
        const BUILDING_SLOTS = [
            { id: 'tent',       kind: 'tent' },
            { id: 'clinic',     kind: 'sheet' },
            { id: 'kitchen',    kind: 'sheet' },
            { id: 'workshop',   kind: 'sheet' },
            { id: 'storage',    kind: 'sheet' },
            { id: 'training',   kind: 'sheet' },
            { id: 'watchtower', kind: 'sheet' },
            { id: 'locked_1',   kind: 'locked' },
            { id: 'locked_2',   kind: 'locked' }
        ];

        function BuildingsGrid({ campState, activeQuests, onClickBuilding }) {
            const tentLevel = (campState && campState.tentLevel) || 0;
            const buildingLevels = (campState && campState.buildingLevels) || {};
            // D-177: "수락 가능"(다음 단계 존재 + active 미등록) 빌딩에 빨간 점 — 신규 인지 강화.
            //   텐트도 동일 규칙으로 표시.
            const activeIds = new Set((Array.isArray(activeQuests) ? activeQuests : []).map(q => q && q.id).filter(Boolean));
            const isTakeable = (b) => {
                if (b.kind === 'tent') {
                    const next = getNextTentQuest(Number(tentLevel) || 0);
                    return !!next && !activeIds.has(next.id);
                }
                if (b.kind === 'sheet') {
                    const cur = Number(buildingLevels[b.id]) || 0;
                    const next = getNextBuildingStage(b.id, cur);
                    return !!next && !activeIds.has(`bld_${b.id}_${next.stage}`);
                }
                return false;
            };
            return (
                <div style={{
                    marginBottom: '16px',
                    background: '#0f0f1a',
                    border: '1px solid #2a3a5e',
                    borderRadius: '10px',
                    padding: '12px'
                }}>
                    <div style={{ fontSize: '13px', fontWeight: 700, color: '#bbb', marginBottom: '8px' }}>
                        🏘️ 베이스캠프
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px' }}>
                        {BUILDING_SLOTS.map(b => {
                            let stage = 0, maxStage = 0, name = '', emoji = '🔒';
                            if (b.kind === 'tent') {
                                stage = Number(tentLevel) || 0;
                                maxStage = TENT_MAX_LEVEL;
                                name = '텐트';
                                emoji = BUILDING_ICON.tent;
                            } else if (b.kind === 'sheet') {
                                stage = Number(buildingLevels[b.id]) || 0;
                                maxStage = getMaxStage(b.id) || 3;
                                // 시트에서 한글 name 1단계 행 기준 — 표시용.
                                const def0 = getBuildingDef(b.id, 1);
                                name = (def0 && def0.name) || b.id;
                                emoji = BUILDING_ICON[b.id] || '🏗️';
                            } else {
                                // locked
                                stage = 0;
                                maxStage = 0;
                                name = '잠금';
                                emoji = '🔒';
                            }
                            // D-177: 카드 전체 dim → 아이콘만 dim 으로 분리.
                            //   미빌드 일반 빌딩(stage===0): 배경/이름/Lv 텍스트는 정상, 아이콘만 흐림 + 빨간 점은 그대로 밝게.
                            //   locked: 카드 전체 흐림(잠금 의도 유지) — takeable=false라 빨간 점 없음.
                            const isLocked = b.kind === 'locked';
                            const isUnbuilt = !isLocked && stage === 0;
                            const cardOpacity = isLocked ? 0.3 : 1;
                            const iconOpacity = isUnbuilt ? 0.45 : 1;
                            const lvColor = isLocked ? '#666' : (stage > 0 ? '#d4b84a' : '#888');
                            const takeable = isTakeable(b);
                            return (
                                <button
                                    key={b.id}
                                    onClick={() => onClickBuilding && onClickBuilding(b)}
                                    style={{
                                        background: '#1a1a2e',
                                        border: '1px solid #2a3a5e',
                                        borderRadius: '8px',
                                        padding: '10px 4px',
                                        cursor: 'pointer',
                                        color: '#eee',
                                        opacity: cardOpacity,
                                        position: 'relative',
                                        display: 'flex',
                                        flexDirection: 'column',
                                        alignItems: 'center',
                                        gap: '3px',
                                        transition: 'opacity 0.2s, transform 0.1s'
                                    }}
                                >
                                    {takeable && <span className="building-takeable-dot" />}
                                    <div style={{ fontSize: '30px', lineHeight: 1, opacity: iconOpacity }}>{emoji}</div>
                                    <div style={{ fontSize: '11px', fontWeight: 600 }}>{name}</div>
                                    <div style={{ fontSize: '10px', color: lvColor }}>
                                        {isLocked ? '추후' : `Lv.${stage}/${maxStage}`}
                                    </div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // D-174: 빌딩 카드 클릭 시 띄우는 상세 모달.
        //   - locked: "추후 공개" 안내.
        //   - tent: 현재 레벨 + 다음 레벨 퀘스트(요구재료 + 보상). [받기]/[완수].
        //   - sheet: 시트 빌딩 6종. 다음 stage cost(한글 자원) 카운트 + 4종 보상 표시. [완수](재료 충족 시 즉시).
        function BuildingDetailModal({ building, campState, activeQuests, completedQuests, onClose, onTakeQuest, onCompleteQuest }) {
            if (!building) return null;
            const cardStyle = {
                background: '#1a1a2e',
                color: '#eee',
                padding: '24px 22px',
                borderRadius: '10px',
                border: '1px solid #4a4a6e',
                maxWidth: '420px',
                width: '90vw',
                boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
            };
            const closeBtn = (
                <button
                    onClick={onClose}
                    style={{
                        background: 'transparent',
                        color: '#bbb',
                        border: '1px solid #4a4a6e',
                        padding: '8px 18px',
                        borderRadius: '6px',
                        cursor: 'pointer',
                        fontSize: '13px'
                    }}
                >
                    닫기
                </button>
            );
            if (building.kind === 'locked') {
                return (
                    <div className="modal" style={{ zIndex: 3500 }}>
                        <div style={{ ...cardStyle, textAlign: 'center' }}>
                            <div style={{ fontSize: '48px', marginBottom: '8px', opacity: 0.5 }}>🔒</div>
                            <div style={{ fontSize: '16px', fontWeight: 700, marginBottom: '6px' }}>잠금</div>
                            <div style={{ color: '#888', fontSize: '13px', marginBottom: '20px', lineHeight: 1.6 }}>
                                추후 공개 예정.<br />베이스캠프가 더 커지면 잠금이 풀린다.
                            </div>
                            {closeBtn}
                        </div>
                    </div>
                );
            }
            // 시트 빌딩 분기 ── kind === 'sheet'.
            if (building.kind === 'sheet') {
                const buildingLevels = (campState && campState.buildingLevels) || {};
                const curStage = Number(buildingLevels[building.id]) || 0;
                const maxStage = getMaxStage(building.id) || 3;
                const def0 = getBuildingDef(building.id, Math.max(1, curStage));
                const headerName = (def0 && def0.name) || building.id;
                const nextDef = getNextBuildingStage(building.id, curStage);
                // D-177: 텐트와 동일한 [받기] → [완수] 2단계 흐름 도입.
                //   active 등록되지 않았으면 시나리오 노출 + [받기] 노출.
                //   active 등록되면 진행도 + [완수] (재료 충족 시) 노출.
                //   handleCompleteQuest 빌딩 분기는 active/non-active 양쪽 호환(9541-9546).
                const buildingQuestId = nextDef ? `bld_${building.id}_${nextDef.stage}` : null;
                const inActive = nextDef && (activeQuests || []).find(q => q.id === buildingQuestId);
                const inv = campState && campState.inventory;
                const countOfId = (idEn) => (inv && Array.isArray(inv.items)) ? inv.items.filter(it => it.type === idEn).length : 0;
                // cost 행 — 한글 자원명을 영문 id로 매핑해 카운트. 매핑 실패는 not-ok로 표시.
                const costRows = nextDef ? (nextDef.cost || []).map(c => {
                    const idEn = InventorySystem.findIdByKoreanName(c.material);
                    const have = idEn ? countOfId(idEn) : 0;
                    const need = Number(c.count) || 0;
                    return { koName: c.material, idEn, have, need, ok: !!idEn && have >= need };
                }) : [];
                const canComplete = !!nextDef && !!inActive && costRows.length > 0 && costRows.every(r => r.ok);
                const passive = nextDef ? parsePassive(nextDef.reward_passive || '') : [];
                const runStart = nextDef ? parseRewardItems(nextDef.reward_run_start || '') : [];
                const items = nextDef ? parseRewardItems(nextDef.reward_items || '') : [];
                const oneShot = nextDef ? parseOneShot(nextDef.reward_one_shot || '') : [];
                const renderItemList = (entries) => entries.map(e => {
                    const d = InventorySystem.resolveDef(e.type) || {};
                    return `${d.name || e.type} x${e.count}`;
                }).join(', ');
                return (
                    <div className="modal" style={{ zIndex: 3500 }}>
                        <div style={cardStyle}>
                            <div style={{ textAlign: 'center', marginBottom: '12px' }}>
                                <div style={{ fontSize: '48px', lineHeight: 1 }}>{BUILDING_ICON[building.id] || '🏗️'}</div>
                                <div style={{ fontSize: '16px', fontWeight: 700, marginTop: '4px' }}>
                                    {headerName} <span style={{ color: '#d4b84a' }}>Lv.{curStage}/{maxStage}</span>
                                </div>
                            </div>
                            {!nextDef ? (
                                <div style={{ textAlign: 'center', color: '#8bd17c', padding: '16px 0' }}>
                                    최고 단계에 도달했다.
                                </div>
                            ) : (
                                <div style={{
                                    background: 'rgba(0,0,0,0.25)',
                                    padding: '12px 14px',
                                    borderRadius: '6px',
                                    marginBottom: '16px',
                                    fontSize: '13px',
                                    lineHeight: 1.6
                                }}>
                                    <div style={{ color: '#d4b84a', fontWeight: 700, marginBottom: '4px' }}>
                                        {nextDef.icon} {nextDef.name} <span style={{ color: '#888', fontSize: '11px', fontWeight: 400 }}>(Lv.{nextDef.stage})</span>
                                    </div>
                                    {nextDef.effect_raw && (
                                        <div style={{ color: '#bbb', fontSize: '12px', fontStyle: 'italic', marginTop: '4px', marginBottom: '6px' }}>
                                            {String(nextDef.effect_raw).replace(/^"|"$/g, '')}
                                        </div>
                                    )}
                                    <div style={{ marginTop: '6px' }}>
                                        {costRows.map((r, i) => (
                                            <div key={i} style={{ color: r.ok ? '#8bd17c' : '#ddd' }}>
                                                · {r.koName} {inActive ? `${r.have}/${r.need}` : r.need}{!r.idEn && ' (자원 매핑 실패)'}
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ color: '#8bd17c', marginTop: '10px', fontSize: '12px', lineHeight: 1.6 }}>
                                        {passive.length > 0 && <div>· 패시브: {passive.map(p => `${p.key}${p.delta >= 0 ? '+' : ''}${p.delta}`).join(', ')}</div>}
                                        {items.length > 0 && <div>· 즉시: {renderItemList(items)}</div>}
                                        {runStart.length > 0 && <div>· 매-탐험 시작: {renderItemList(runStart)}</div>}
                                        {oneShot.length > 0 && <div>· 일회성: {oneShot.map(o => `${o.key}+${o.count}`).join(', ')}</div>}
                                    </div>
                                </div>
                            )}
                            <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                                {closeBtn}
                                {/* D-177: active 등록 전 → [받기], 등록 후 → [완수]. 텐트 패턴 동일. */}
                                {nextDef && !inActive && (
                                    <button
                                        onClick={() => { onTakeQuest && onTakeQuest(buildingQuestId); onClose && onClose(); }}
                                        style={{
                                            background: '#d4b84a',
                                            color: '#1a1a2e',
                                            border: 'none',
                                            padding: '8px 22px',
                                            borderRadius: '6px',
                                            cursor: 'pointer',
                                            fontSize: '13px',
                                            fontWeight: 700
                                        }}
                                    >
                                        받기
                                    </button>
                                )}
                                {nextDef && inActive && (
                                    <button
                                        disabled={!canComplete}
                                        onClick={() => { onCompleteQuest && onCompleteQuest(buildingQuestId); onClose && onClose(); }}
                                        style={{
                                            background: canComplete ? '#4CAF50' : '#444',
                                            color: '#fff',
                                            border: 'none',
                                            padding: '8px 22px',
                                            borderRadius: '6px',
                                            cursor: canComplete ? 'pointer' : 'not-allowed',
                                            fontSize: '13px',
                                            fontWeight: 700
                                        }}
                                    >
                                        완수
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }
            // 텐트 분기 (kind === 'tent').
            const lv = Number((campState && campState.tentLevel) || 0);
            const nextDef = getNextTentQuest(lv);
            const inActive = nextDef && (activeQuests || []).find(q => q.id === nextDef.id);
            const inv = campState && campState.inventory;
            const countOf = (type) => (inv && Array.isArray(inv.items)) ? inv.items.filter(it => it.type === type).length : 0;
            const reqRows = nextDef
                ? Object.entries(nextDef.requirements || {}).map(([type, need]) => {
                    const have = countOf(type);
                    const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                        ? (InventorySystem.resolveDef(type) || {}) : {};
                    return { type, name: dispDef.name || type, have, need, ok: have >= need };
                })
                : [];
            const canComplete = nextDef && reqRows.every(r => r.ok);
            return (
                <div className="modal" style={{ zIndex: 3500 }}>
                    <div style={cardStyle}>
                        <div style={{ textAlign: 'center', marginBottom: '12px' }}>
                            <div style={{ fontSize: '48px', lineHeight: 1 }}>🏕️</div>
                            <div style={{ fontSize: '16px', fontWeight: 700, marginTop: '4px' }}>
                                텐트 <span style={{ color: '#d4b84a' }}>Lv.{lv}/{TENT_MAX_LEVEL}</span>
                            </div>
                        </div>
                        {!nextDef ? (
                            <div style={{ textAlign: 'center', color: '#8bd17c', padding: '16px 0' }}>
                                최고 레벨에 도달했다. 텐트는 더 이상 강화할 수 없다.
                            </div>
                        ) : (
                            <div style={{
                                background: 'rgba(0,0,0,0.25)',
                                padding: '12px 14px',
                                borderRadius: '6px',
                                marginBottom: '16px',
                                fontSize: '13px',
                                lineHeight: 1.6
                            }}>
                                <div style={{ color: '#d4b84a', fontWeight: 700, marginBottom: '4px' }}>
                                    {nextDef.icon} {nextDef.name} <span style={{ color: '#888', fontSize: '11px', fontWeight: 400 }}>(Lv.{nextDef.level})</span>
                                </div>
                                <div style={{ marginTop: '6px' }}>
                                    {reqRows.map(r => (
                                        <div key={r.type} style={{ color: r.ok ? '#8bd17c' : '#ddd' }}>
                                            · {r.name} {inActive ? `${r.have}/${r.need}` : r.need}
                                        </div>
                                    ))}
                                </div>
                                <div style={{ color: '#8bd17c', marginTop: '10px', fontSize: '12px' }}>
                                    보상: {nextDef.rewardLabel}
                                </div>
                            </div>
                        )}
                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            {closeBtn}
                            {nextDef && !inActive && (
                                <button
                                    onClick={() => { onTakeQuest && onTakeQuest(nextDef.id); onClose && onClose(); }}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    받기
                                </button>
                            )}
                            {nextDef && inActive && (
                                <button
                                    disabled={!canComplete}
                                    onClick={() => { onCompleteQuest && onCompleteQuest(nextDef.id); onClose && onClose(); }}
                                    style={{
                                        background: canComplete ? '#4CAF50' : '#444',
                                        color: '#fff',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: canComplete ? 'pointer' : 'not-allowed',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    완수
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // 캠프 메인 화면.
        //   props.campState — 영속화 상태. quests/inventory(InventorySystem 인스턴스)/pack/runs.
        //   props.onDepart — [탐험 떠나기] 클릭.
        //   props.onCompleteQuest(questId) — [완수] 클릭.
        //   props.onResetData — [데이터 초기화] 확정.
        //   props.onInventoryChange — 보관함/가방 변경 후 부모 재렌더 트리거 (campState 객체 새로 만들기).
        // D-113: 레이아웃 재구성.
        //   상단: 점수 → [보관함] 버튼 → [퀘스트 목록] → [현재 진행 중 퀘스트] → 건설.
        //   하단: [물건 챙기기] [탐험 떠나기] 두 버튼.
        // D-168: 빌딩 그리드 추가 — 보관함 버튼 아래.
        function CampScreen({ campState, onDepart, onCompleteQuest, onTakeQuest, onResetData, onInventoryChange }) {
            const [resetOpen, setResetOpen] = React.useState(false);
            const [storageOpen, setStorageOpen] = React.useState(false);
            const [packOpen, setPackOpen] = React.useState(false);
            // D-145: 보관함을 InventoryModal로 재사용 — 선택모드/머지/조합/레시피 패널 동작.
            const [storageSelectedItem, setStorageSelectedItem] = React.useState(null);
            // D-151: 퀘스트 [받기] 클릭 시 스토리·정보 모달 → [수락]에서 active push.
            const [offerQuestId, setOfferQuestId] = React.useState(null);
            // D-168: 빌딩 그리드 카드 클릭 시 띄울 상세 모달 — 선택된 빌딩 객체.
            const [selectedBuilding, setSelectedBuilding] = React.useState(null);
            // D-154: 퀘스트 목록 모달 + 진행 중 상세 모달 토글.
            const [questListOpen, setQuestListOpen] = React.useState(false);
            const [activeDetailQuestId, setActiveDetailQuestId] = React.useState(null);
            const inv = campState && campState.inventory;
            const pack = campState && campState.pack;
            const runs = (campState && campState.runs) || { total: 0, victories: 0, deaths: 0 };
            const activeQuests = (campState && campState.quests && campState.quests.active) || [];
            const completedQuests = (campState && campState.quests && campState.quests.completed) || [];

            // 인벤에서 type별 보유량 계산 (실시간). 저장된 progress보다 정확.
            const countOfType = (type) => {
                if (!inv || !Array.isArray(inv.items)) return 0;
                return inv.items.filter(it => it.type === type).length;
            };

            const renderQuestCard = (quest) => {
                const def = getTentQuestDef(quest.id);
                if (!def) return null;
                const reqs = def.requirements || {};
                const progress = Object.entries(reqs).map(([type, need]) => {
                    const have = countOfType(type);
                    const dispDef = InventorySystem.resolveDef(type) || {};
                    const name = dispDef.name || type;
                    return { type, name, have, need, ok: have >= need };
                });
                const canComplete = progress.every(p => p.ok);
                return (
                    <div key={quest.id} style={{
                        background: '#16213e',
                        border: '1px solid #2a3a5e',
                        borderRadius: '8px',
                        padding: '12px 14px',
                        marginBottom: '10px'
                    }}>
                        <div style={{
                            fontSize: '14px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '8px'
                        }}>
                            {def.icon} {def.name}
                        </div>
                        <div style={{ fontSize: '12px', lineHeight: 1.7, color: '#ddd', marginBottom: '10px' }}>
                            {progress.map(p => (
                                <div key={p.type} style={{ color: p.ok ? '#8bd17c' : '#ddd' }}>
                                    · {p.name} {p.have}/{p.need}
                                </div>
                            ))}
                        </div>
                        <button
                            onClick={() => canComplete && onCompleteQuest && onCompleteQuest(quest.id)}
                            disabled={!canComplete}
                            style={{
                                background: canComplete ? '#d4b84a' : '#2a2a3e',
                                color: canComplete ? '#1a1a2e' : '#666',
                                border: 'none',
                                padding: '7px 18px',
                                borderRadius: '5px',
                                cursor: canComplete ? 'pointer' : 'not-allowed',
                                fontSize: '12px',
                                fontWeight: 700
                            }}
                        >
                            완수
                        </button>
                    </div>
                );
            };

            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    overflowY: 'auto',
                    background: '#0d0d18',
                    color: '#eee',
                    padding: '20px 16px 80px',
                    boxSizing: 'border-box',
                    zIndex: 100
                }}>
                    <div style={{ maxWidth: '720px', margin: '0 auto' }}>
                        <div style={{
                            fontSize: '22px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '4px',
                            textAlign: 'center',
                            letterSpacing: '0.06em'
                        }}>
                            🏕️ 베이스캠프
                        </div>
                        <div style={{
                            fontSize: '11px',
                            color: '#888',
                            textAlign: 'center',
                            marginBottom: '12px'
                        }}>
                            탐험 {runs.total} · 생환 {runs.victories} · 사망 {runs.deaths}
                        </div>

                        {/* D-110: 점수 통계 — 최고/누적/평균 + 마지막 런. */}
                        {runs.total > 0 && (
                            <div style={{
                                display: 'flex',
                                justifyContent: 'center',
                                marginBottom: '20px'
                            }}>
                                <div className="score-badge" style={{ minWidth: '220px' }}>
                                    <div className="score-value">🏆 점수</div>
                                    <div className="score-row">
                                        <span className="lbl">최고</span>
                                        <span>{Number(runs.bestScore) || 0}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">누적</span>
                                        <span>{(Number(runs.totalScore) || 0).toLocaleString()}</span>
                                    </div>
                                    <div className="score-row">
                                        <span className="lbl">평균</span>
                                        <span>
                                            {Math.round((Number(runs.totalScore) || 0) / Math.max(1, runs.total))}
                                        </span>
                                    </div>
                                    {runs.lastScore != null && (
                                        <div className="score-row" style={{ opacity: 0.75 }}>
                                            <span className="lbl">마지막 런</span>
                                            <span>{Number(runs.lastScore) || 0}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* D-113: [보관함] 버튼 — StorageModal 트리거. 인벤 미리보기는 모달에서. */}
                        <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '16px' }}>
                            <button
                                onClick={() => setStorageOpen(true)}
                                style={{
                                    background: '#1a1a2e',
                                    color: '#d4b84a',
                                    border: '1px solid #4a4a6e',
                                    padding: '11px 28px',
                                    borderRadius: '8px',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: 700
                                }}
                            >
                                📦 보관함 ({(inv && inv.items && inv.items.length) || 0})
                            </button>
                        </div>

                        {/* D-168/D-174: 베이스캠프 빌딩 그리드 (3x3). 카드 클릭 → 상세 모달. */}
                        <BuildingsGrid
                            campState={campState}
                            activeQuests={(campState && campState.quests && campState.quests.active) || []}
                            onClickBuilding={(b) => setSelectedBuilding(b)}
                        />

                        {/* D-154: 퀘스트 목록 — 패널 자체를 버튼화. 클릭 시 모달.
                           모달 행 클릭 → 상세 모달 (받기 가능: TentQuestModal, 진행 중: 진행 카드).
                           스크롤로 향후 항목 다수 대비. */}
                        {(() => {
                            const taken = new Set([
                                ...activeQuests.map(q => q.id),
                                ...completedQuests.map(q => q.id)
                            ]);
                            // D-168: 텐트 다단계 — 다음 미달성 레벨 한 종만 노출.
                            const curTentLv = Number((campState && (campState.tentLevel != null ? campState.tentLevel : (campState.tentBuilt ? 1 : 0))) || 0);
                            const nextTent = getNextTentQuest(curTentLv);
                            const available = (nextTent && !taken.has(nextTent.id)) ? [nextTent] : [];
                            const totalCount = available.length + activeQuests.length + completedQuests.length;
                            return (
                                <button
                                    onClick={() => setQuestListOpen(true)}
                                    style={{
                                        display: 'block',
                                        width: '100%',
                                        background: '#1a1a2e',
                                        border: '1px solid #2a3a5e',
                                        borderRadius: '10px',
                                        padding: '14px',
                                        marginBottom: '16px',
                                        textAlign: 'left',
                                        cursor: 'pointer',
                                        color: '#eee'
                                    }}
                                >

                                    maxWidth: '200px'
                                }}
                            >
                                🌲 탐험 떠나기
                            </button>
                        </div>

                        {/* D-171: 데이터 초기화 / 최신버전 업데이트 — 인라인 하단 행.
                              기존 position:fixed (D-166)는 스크롤과 무관해 캠프 콘텐츠와 겹쳤다(요한 보고).
                              스크롤 흐름 안으로 흡수해 자연스럽게 맨 아래에서만 노출되게 한다. */}
                        <div style={{
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center',
                            marginTop: '40px',
                            paddingTop: '20px',
                            borderTop: '1px solid #1a1a2e',
                            gap: '12px',
                            flexWrap: 'wrap'
                        }}>
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: '3px' }}>
                                <button
                                    onClick={async () => {
                                        try {
                                            if ('serviceWorker' in navigator) {
                                                const regs = await navigator.serviceWorker.getRegistrations();
                                                for (const r of regs) { try { await r.unregister(); } catch {} }
                                            }
                                            if (typeof caches !== 'undefined' && caches.keys) {
                                                const keys = await caches.keys();
                                                for (const k of keys) { try { await caches.delete(k); } catch {} }
                                            }
                                        } catch {}
                                        const url = new URL(window.location.href);
                                        url.searchParams.set('v', String(Date.now()));
                                        window.location.replace(url.toString());
                                    }}
                                    style={{
                                        background: 'transparent',
                                        color: '#7da3c8',
                                        border: '1px solid #3a4d63',
                                        padding: '6px 12px',
                                        borderRadius: '4px',
                                        cursor: 'pointer',
                                        fontSize: '11px'
                                    }}
                                >
                                    🔄 최신버전 업데이트
                                </button>
                                <span style={{
                                    color: '#555',
                                    fontSize: '10px',
                                    fontFamily: 'monospace',
                                    paddingLeft: '2px'
                                }}>
                                    빌드: {(() => {
                                        try {
                                            const d = new Date(document.lastModified);
                                            if (isNaN(d.getTime())) return '?';
                                            const pad = (n) => String(n).padStart(2, '0');
                                            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                                        } catch { return '?'; }
                                    })()}
                                </span>
                            </div>
                            <button
                                onClick={() => setResetOpen(true)}
                                style={{
                                    background: 'transparent',
                                    color: '#666',
                                    border: '1px solid #333',
                                    padding: '6px 12px',
                                    borderRadius: '4px',
                                    cursor: 'pointer',
                                    fontSize: '11px'
                                }}
                            >
                                데이터 초기화
                            </button>
                        </div>
                    </div>

                    {storageOpen && inv && (
                        <InventoryModal
                            inventory={inv}
                            selectedItem={storageSelectedItem}
                            setSelectedItem={setStorageSelectedItem}
                            closeInventory={() => {
                                setStorageSelectedItem(null);
                                setStorageOpen(false);
                                if (typeof onInventoryChange === 'function') onInventoryChange();

                            activeQuests={activeQuests}
