<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 타임투다이노</title>
    
    <!-- 스타일 -->
    <link rel="stylesheet" href="gameStyles.css">
    
    <!-- 외부 라이브러리 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 게임 모듈 -->
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script src="dropTable.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // React 컴포넌트들
        // ============================================

        // 상단 스탯 패널 컴포넌트
        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' : 
                                  detection < 60 ? '#FFC107' : '#e94560';
            
            return (
                <div>
                    <div style={{ marginBottom: '8px', fontSize: '18px', fontWeight: '600' }}>
                        🦖 타임투다이노
                    </div>
                    
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '6px', marginBottom: '8px' }}>
                        <div className="stat-box">
                            <div className="stat-label">생명력</div>
                            <div className="stat-value">❤️ {health}/6</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">배고픔</div>
                            <div className="stat-value">🍖 {hunger}/12</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">시간</div>
                            <div className="stat-value">⏰ {time}/{maxTime}</div>
                        </div>
                        <div className="stat-box">
                            <div className="stat-label">보스</div>
                            <div className="stat-value" style={{ fontSize: '13px' }}>
                                {boss?.chaseMode ? '🔴 추격' : '🟢 순찰'}
                            </div>
                        </div>
                    </div>
                    
                    <div className="stat-box" style={{ marginBottom: '8px' }}>
                        <div className="stat-label">🚨 발각률</div>
                        <div style={{ background: '#0f3460', height: '20px', borderRadius: '10px', overflow: 'hidden', marginTop: '4px' }}>
                            <div style={{ 
                                width: `${detection}%`, 
                                height: '100%', 
                                background: detectionColor, 
                                transition: 'all 0.3s',
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontSize: '11px',
                                fontWeight: '600',
                                color: '#fff'
                            }}>
                                {detection > 10 ? `${detection}%` : ''}
                            </div>
                        </div>
                    </div>

                    <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px' }}>
                        {message}
                    </div>
                </div>
            );
        }

        // 손패 카드 컴포넌트
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;
            
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px' }}>
                    {hand.map(card => (
                        <div key={card.uid} className="card" onClick={() => useCard(card)}>
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                발각 {card.detection > 0 ? '+' : ''}{card.detection}% · ⏰{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 육각형 타일 컴포넌트
        function HexTile({ tile, currentTile, tiles, boss, gameOver, victory, moveTo }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && tile.revealed;
            const isRevealed = tile.revealed || tile.visited;
            
            // 길이 없는 타일 (connections 없음) 판별
            const hasNoConnections = tile.connections.length === 0 && 
                                    tile.type !== 'start' && 
                                    tile.type !== 'exit';
            
            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (boss && tile.id === boss.position && tile.revealed) return '#8B0000';
                return '#2d3561';
            };
            
            const getTileLabel = () => {
                if (!isRevealed && !isCurrent) return '?';
                if (isCurrent) return '내위치';
                if (tile.type === 'exit') return '탈출구';
                if (isBoss) return '🦖';
                if (tile.type === 'good') return '👍';
                if (tile.type === 'trap') return '⚠️';
                return '';
            };
            
            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile ${isCurrent ? 'current' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={isCurrent ? '#f5f5f5' : getTileColor(tile)}
                        stroke={isCurrent ? 'none' : canMove ? '#4CAF50' : '#0f3460'}
                        strokeWidth={canMove ? '3' : '2'}
                        opacity={isRevealed || isCurrent ? 1 : 0.6}
                        onClick={() => !gameOver && !victory && canMove && moveTo(tile.id)}
                    />
                    <text 
                        x={x} 
                        y={y + 5} 
                        textAnchor="middle" 
                        fill={isCurrent ? '#1a1a2e' : isRevealed ? '#fff' : '#666'} 
                        fontSize={isRevealed || isCurrent ? '14' : '24'} 
                        fontWeight={isRevealed || isCurrent ? '700' : 'bold'}
                    >
                        {getTileLabel()}
                    </text>
                </g>
            );
        }

        // 게임 맵 컴포넌트
        function GameMap({ tiles, currentTile, boss, gameOver, victory, moveTo }) {
            const visibleTiles = tiles.filter(t => t.visited || t.discovered || t.revealed);
            
            return (
                <div className="map-container">
                    <svg className="map-svg" width="1100" height="1000">
                        {visibleTiles.map(tile => (
                            <HexTile
                                key={tile.id}
                                tile={tile}
                                currentTile={currentTile}
                                tiles={tiles}
                                boss={boss}
                                gameOver={gameOver}
                                victory={victory}
                                moveTo={moveTo}
                            />
                        ))}
                    </svg>
                </div>
            );
        }

        // 타일 이벤트 모달 컴포넌트
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;
            
            const getEventInfo = () => {
                switch(tile.type) {
                    case 'good':
                        return {
                            emoji: '✨',
                            title: '좋은 곳 발견!',
                            message: '이곳은 휴식하기 좋은 장소입니다.',
                            color: '#FFC107'
                        };
                    case 'trap':
                        return {
                            emoji: '⚠️',
                            title: '함정!',
                            message: tile.damage ? `생명력이 ${tile.damage} 감소했습니다!` : '위험한 함정이 있습니다!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
                            {eventInfo.emoji}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: '600', marginBottom: '15px' }}>
                            {eventInfo.title}
                        </div>
                        <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                            {eventInfo.message}
                        </div>
                        <button 
                            onClick={onClose}
                            style={{ 
                                background: 'white',
                                color: eventInfo.color,
                                border: 'none',
                                padding: '12px 30px',
                                fontSize: '16px',
                                fontWeight: '600',
                                borderRadius: '6px',
                                cursor: 'pointer'
                            }}
                        >
                            확인
                        </button>
                    </div>
                </div>
            );
        }

        // 인벤토리 모달 컴포넌트
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // 확정 대기 위치 (그리드 셀을 눌러 지정)
            const [pendingPos, setPendingPos] = React.useState(null);

            const ROWS = 6, COLS = 5, CELL = 47, PAD = 4;

            const handleItemClick = (item) => {
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                if (selectedItem.id === item.id) {
                    // 같은 아이템 다시 클릭 — 원위치 되돌림
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                }
                // 다른 아이템 클릭은 셀 클릭 경로에서 처리 (교체/머지)
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                if (!res.ok) {
                    bump();
                    return;
                }
                if (res.action === 'swap') {
                    // 새로 공중에 뜬 아이템으로 선택 전환
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                } else {
                    setSelectedItem(null);
                    setPendingPos(null);
                }
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // 미리보기 가능 여부 (현재 pendingPos에 selectedItem이 들어갈 수 있는가)
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    if (inventory.canMerge(selectedItem, overlap[0])) return { ok: true, kind: 'merge' };
                    return { ok: true, kind: 'swap' };
                }
                return { ok: false, kind: 'blocked' };
            })();

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                            <h3>가방 (5x6)</h3>
                            <button onClick={closeInventory}>닫기</button>
                        </div>
                        <div style={{ position: 'relative' }}>
                            <div className="inventory-grid">
                                {Array(ROWS).fill(null).map((_, row) =>
                                    Array(COLS).fill(null).map((_, col) => (
                                        <div
                                            key={`${row}-${col}`}
                                            className={`inventory-cell ${inventory.grid[row][col] ? 'occupied' : ''}`}
                                            onClick={() => handleCellClick(row, col)}
                                        />
                                    ))
                                )}
                            </div>

                            {/* 확정 대기 미리보기 */}
                            {selectedItem && pendingPos && previewInfo && (
                                <div
                                    className={`inventory-preview ${previewInfo.ok ? 'ok' : 'bad'} ${previewInfo.kind}`}
                                    style={{
                                        position: 'absolute',
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                        pointerEvents: 'none'
                                    }}
                                />
                            )}

                            {/* 그리드에 배치된 아이템들 */}
                            {inventory.items.filter(i => !selectedItem || i.id !== selectedItem.id).map(item => (
                                <div
                                    key={item.id}
                                    className="inventory-item"
                                    style={{
                                        left: `${item.x * CELL + PAD}px`,
                                        top: `${item.y * CELL + PAD}px`,
                                        width: `${item.shape[0].length * CELL - PAD}px`,
                                        height: `${item.shape.length * CELL - PAD}px`
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(item); }}
                                >
                                    {item.name}
                                </div>
                            ))}

                            {/* 공중에 뜬 선택 아이템 (pendingPos를 따라감) */}
                            {selectedItem && pendingPos && (
                                <div
                                    className="inventory-item floating selected"
                                    style={{
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(selectedItem); }}
                                >
                                    {selectedItem.name}
                                </div>
                            )}
                        </div>

                        {selectedItem ? (
                            <div style={{ marginTop: '10px', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                <button onClick={handleRotate}>회전</button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={!previewInfo || !previewInfo.ok}
                                >
                                    확정{previewInfo && previewInfo.ok && previewInfo.kind !== 'place'
                                        ? ` (${previewInfo.kind === 'merge' ? '머지' : '교체'})`
                                        : ''}
                                </button>
                                <button onClick={handleCancel}>취소</button>
                            </div>
                        ) : (
                            <div style={{ marginTop: '10px', fontSize: '11px', color: '#aaa' }}>
                                아이템을 눌러 선택 → 칸을 눌러 위치 지정 → 확정
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 게임 오버/승리 모달
        function GameEndModal({ gameOver, victory }) {
            if (!gameOver && !victory) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: victory ? '#4CAF50' : '#e94560', 
                        color: 'white',
                        padding: '40px', 
                        borderRadius: '12px', 
                        textAlign: 'center'
                    }}>
                        <div style={{ fontSize: '28px', fontWeight: '600', marginBottom: '20px' }}>
                            {victory ? '🎉 승리!' : '💀 게임 오버'}
                        </div>
                        <button 
                            onClick={() => window.location.reload()}
                            style={{ 
                                background: 'white',
                                color: '#333',
                                border: 'none',
                                padding: '15px 30px',
                                fontSize: '16px',
                                fontWeight: '600'
                            }}
                        >
                            다시 시작
                        </button>
                    </div>
                </div>
            );
        }

        // ============================================
        // 메인 게임 컴포넌트
        // ============================================

        function Game() {
            // 상태 관리
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(6);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            const [message, setMessage] = useState('눈을 뜨자 낯선 숲이 펼쳐졌다.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            const [eventTile, setEventTile] = useState(null);
            const mapRef = useRef(null);

            // 게임 초기화
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(7);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                
                const cards = [
                    { id: 'search', name: '뒤져보기', count: 5, effect: '아이템 획득', detection: 5, time: 1 },
                    { id: 'listen', name: '귀 기울이기', count: 2, effect: '몬스터 감지', detection: -5, time: 1 },
                    { id: 'find_food', name: '음식 찾기', count: 1, effect: '음식 획득', detection: 5, time: 1 },
                    { id: 'find_weapon', name: '무기 장비 찾기', count: 1, effect: '무기/장비', detection: 10, time: 1 },
                    { id: 'hide', name: '숨기', count: 1, effect: '은신', detection: -15, time: 1 }
                ];
                
                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(3));
                setHand(newDeck.slice(0, 3));
                
                const inv = new InventorySystem(6, 5);
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                newBoss.position = bossPos;
                setBoss(newBoss);
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // 게임 오버/승리 체크
            useEffect(() => {
                if (health <= 0 || hunger <= 0) {
                    setGameOver(true);
                    setMessage(health <= 0 ? '생명력이 다했다...' : '배고픔을 이기지 못했다...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('탈출에 성공했다!');
                }
            }, [currentTile, tiles]);

            // 카드 사용
            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('시간이 부족합니다!');
                    return;
                }
                
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                
                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);
                
                let msg = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;
                
                if (card.id === 'search') {
                    // 2단계 드롭: 현재 타일의 region → 드롭 테이블 추첨
                    const currentRegion = tiles[currentTile]?.region;
                    if (currentRegion) {
                        const { item, category } = rollTileDrop(currentRegion);
                        if (item) {
                            const def = InventorySystem.ITEMS[item];
                            const added = inventory.addItem(item);
                            if (added) {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 발견했다.`;
                            } else {
                                msg += `[${currentRegion}] ${def?.name || item}을(를) 발견했지만 가방이 가득 찼다.`;
                            }
                        } else {
                            msg += `[${currentRegion}] 이 근처에는 쓸만한 게 없다.`;
                        }
                    } else {
                        // 안전망: region 없는 타일(구버전 세이브 등)은 레거시 동작
                        inventory.addItem('material_low');
                        msg += `재료를 발견했다.`;
                    }
                } else if (card.id === 'find_food') {
                    inventory.addItem('food');
                    msg += `음식을 발견했다.`;
                } else if (card.id === 'listen') {
                    const newTiles = tiles.map(t => {
                        if (tiles[currentTile].connections.includes(t.id)) {
                            return { ...t, revealed: true };
                        }
                        return t;
                    });
                    setTiles(newTiles);
                    msg += `주변 소리를 들었다. 보스는 타일 #${boss.getPosition()}에 있다.`;
                } else if (card.id === 'hide') {
                    msg += '조용히 몸을 숨겼다.';
                } else if (card.id === 'find_weapon') {
                    inventory.addItem('weapon_basic');
                    msg += '나무창을 발견했다!';
                }
                
                setMessage(msg);
            };

            // 타일 이동
            const moveTo = (targetId) => {
                if (!tiles[currentTile].connections.includes(targetId)) {
                    setMessage('그곳으로는 갈 수 없습니다!');
                    return;
                }
                
                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                setHunger(hunger - 1);
                setTime(0);
                
                // getHexNeighbors를 사용하여 물리적으로 인접한 모든 타일을 discovered로 설정
                const mapGen = new MapGenerator(7);
                const positions = mapGen.generateHexPositions();
                const targetNeighbors = mapGen.getHexNeighbors(targetId, positions);
                
                const newTiles = tiles.map(t => {
                    if (t.id === targetId) {
                        // 도착한 타일은 즉시 모든 정보 공개
                        return { ...t, visited: true, discovered: true, revealed: true };
                    }
                    // 새로운 위치의 물리적 인접 타일들을 discovered로 설정
                    if (targetNeighbors.includes(t.id)) {
                        return { ...t, discovered: true };
                    }
                    return t;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                
                // 손패 보충
                let newHand = [...hand];
                let newDeck = [...deck];
                let newGraveyard = [...graveyard];
                
                while (newHand.length < 3 && newDeck.length > 0) {
                    newHand.push(newDeck.shift());
                }
                
                if (newHand.length < 3 && newGraveyard.length > 0) {
                    newDeck = shuffleDeck(newGraveyard);
                    newGraveyard = [];
                    while (newHand.length < 3 && newDeck.length > 0) {
                        newHand.push(newDeck.shift());
                    }
                }
                
                setHand(newHand);
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                
                // 보스 이동 로직
                let newBossPos = boss.position;
                if (newMoveCount % 2 === 0 && !boss.chaseMode) {
                    const bossConnections = newTiles[boss.position].connections;
                    if (bossConnections.length > 0) {
                        newBossPos = bossConnections[Math.floor(Math.random() * bossConnections.length)];
                        boss.position = newBossPos;
                    }
                }
                
                if (detection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }
                
                if (boss.chaseMode) {
                    boss.onPlayerMove(targetId, detection);
                    newBossPos = boss.position;
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';
                
                if (encounter) {
                    setGameOver(true);
                    msg = '보스 몬스터와 조우했다! 게임 오버...';
                } else if (tile.type === 'normal') {
                    msg = '평범한 숲길이다.';
                } else if (tile.type === 'good') {
                    msg = '좋은 곳을 발견했다!';
                    // 이벤트 모달 표시
                    setEventTile({ ...tile });
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `함정! 생명력 -${damage}`;
                    // 이벤트 모달 표시 (데미지 정보 포함)
                    setEventTile({ ...tile, damage });
                } else if (tile.type === 'exit') {
                    msg = '탈출구다!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [⚠️ 보스 추격중!]`;
                }
                
                setMessage(msg);
            };

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>게임 로딩 중...</div>;
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    <div className="ui-panel">
                        <StatPanel 
                            health={health}
                            hunger={hunger}
                            time={time}
                            maxTime={maxTime}
                            boss={boss}
                            detection={detection}
                            message={message}
                        />
                        
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
                            <button onClick={() => setShowInventory(!showInventory)}>
                                {showInventory ? '가방 닫기' : '가방 열기'}
                            </button>
                            <div style={{ fontSize: '12px', color: '#aaa', display: 'flex', alignItems: 'center', marginLeft: 'auto' }}>
                                손패 {hand.length}/3 · 덱 {deck.length} · 무덤 {graveyard.length}
                            </div>
                        </div>

                        <HandCards 
                            hand={hand}
                            gameOver={gameOver}
                            victory={victory}
                            useCard={useCard}
                        />
                    </div>

                    <GameMap 
                        tiles={tiles}
                        currentTile={currentTile}
                        boss={boss}
                        gameOver={gameOver}
                        victory={victory}
                        moveTo={moveTo}
                    />

                    {eventTile && (
                        <TileEventModal 
                            tile={eventTile} 
                            onClose={() => setEventTile(null)} 
                        />
                    )}

                    {showInventory && inventory && (
                        <InventoryModal
                            inventory={inventory}
                            selectedItem={selectedInventoryItem}
                            setSelectedItem={setSelectedInventoryItem}
                            closeInventory={() => setShowInventory(false)}
                        />
                    )}

                    <GameEndModal gameOver={gameOver} victory={victory} />
                </div>
            );
        }

        ReactDOM.render(<Game />, document.getElementById('root'));
    </script>
</body>
</html>
