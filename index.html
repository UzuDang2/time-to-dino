<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 타임투다이노</title>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }
        #root { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .stat-box {
            background: #16213e;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .stat-label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: 600; }
        button {
            background: #0f3460;
            color: #eee;
            border: 1px solid #16213e;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        button:hover { background: #16213e; border-color: #e94560; }
        button:active { transform: scale(0.95); }
        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .card:active { 
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }
        .map-container {
            flex: 1;
            overflow: auto;
            background: #0a0e27;
            position: relative;
        }
        .map-svg {
            display: block;
        }
        .hex-tile {
            cursor: pointer;
            transition: all 0.2s;
        }
        .hex-tile:hover {
            filter: brightness(1.2);
        }
        .hex-tile.current {
            filter: drop-shadow(0 0 8px #e94560);
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 45px);
            grid-template-rows: repeat(6, 45px);
            gap: 2px;
            background: #0f3460;
            padding: 4px;
            border-radius: 8px;
        }
        .inventory-cell {
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .inventory-cell.occupied {
            background: #2a4365;
        }
        .inventory-item {
            position: absolute;
            background: #4a5568;
            border: 2px solid #e94560;
            border-radius: 4px;
            padding: 4px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .inventory-item.selected {
            background: #e94560;
            z-index: 10;
        }
        .ui-panel {
            background: #16213e;
            padding: 10px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Game() {
            const [tiles, setTiles] = useState([]);
            const [currentTile, setCurrentTile] = useState(0);
            const [playerMoveCount, setPlayerMoveCount] = useState(0);
            const [health, setHealth] = useState(6);
            const [hunger, setHunger] = useState(12);
            const [time, setTime] = useState(0);
            const [maxTime, setMaxTime] = useState(3);
            const [detection, setDetection] = useState(0);
            const [hand, setHand] = useState([]);
            const [deck, setDeck] = useState([]);
            const [graveyard, setGraveyard] = useState([]);
            const [inventory, setInventory] = useState(null);
            const [boss, setBoss] = useState(null);
            const [gameOver, setGameOver] = useState(false);
            const [victory, setVictory] = useState(false);
            const [message, setMessage] = useState('눈을 뜨자 낯선 숲이 펼쳐졌다.');
            const [showInventory, setShowInventory] = useState(false);
            const [selectedInventoryItem, setSelectedInventoryItem] = useState(null);
            const mapRef = useRef(null);

            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const { tiles: newTiles, playerStart, bossPos, exitPos } = generateHexMap();
                setTiles(newTiles);
                setCurrentTile(playerStart);
                
                const cards = [
                    { id: 'search', name: '뒤져보기', count: 5, effect: '아이템 획득', detection: 5, time: 1 },
                    { id: 'listen', name: '귀 기울이기', count: 2, effect: '몬스터 감지', detection: -5, time: 1 },
                    { id: 'find_food', name: '음식 찾기', count: 1, effect: '음식 획득', detection: 5, time: 1 },
                    { id: 'find_weapon', name: '무기 장비 찾기', count: 1, effect: '무기/장비', detection: 10, time: 1 },
                    { id: 'hide', name: '숨기', count: 1, effect: '은신', detection: -15, time: 1 }
                ];
                
                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(3));
                setHand(newDeck.slice(0, 3));
                
                const inv = new InventorySystem(6, 5);
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                newBoss.position = bossPos;
                setBoss(newBoss);
            }

            function generateHexMap() {
                const gridSize = 7;
                const tiles = [];
                const positions = [];
                
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const index = row * gridSize + col;
                        const x = col * 150 + (row % 2) * 75 + 100; // 세이프 에어리어 추가
                        const y = row * 130 + 100; // 세이프 에어리어 추가
                        
                        positions.push({ x, y, row, col });
                        
                        tiles.push({
                            id: index,
                            type: 'normal',
                            connections: [],
                            visited: false,
                            discovered: false,
                            position: { x, y, row, col }
                        });
                    }
                }
                
                // 육각형 면 기준 연결
                for (let i = 0; i < tiles.length; i++) {
                    const { row, col } = positions[i];
                    const connections = [];
                    
                    if (row % 2 === 0) {
                        if (row > 0) {
                            connections.push((row - 1) * gridSize + col);
                            if (col > 0) connections.push((row - 1) * gridSize + col - 1);
                        }
                        if (col > 0) connections.push(row * gridSize + col - 1);
                        if (col < gridSize - 1) connections.push(row * gridSize + col + 1);
                        if (row < gridSize - 1) {
                            connections.push((row + 1) * gridSize + col);
                            if (col > 0) connections.push((row + 1) * gridSize + col - 1);
                        }
                    } else {
                        if (row > 0) {
                            connections.push((row - 1) * gridSize + col);
                            if (col < gridSize - 1) connections.push((row - 1) * gridSize + col + 1);
                        }
                        if (col > 0) connections.push(row * gridSize + col - 1);
                        if (col < gridSize - 1) connections.push(row * gridSize + col + 1);
                        if (row < gridSize - 1) {
                            connections.push((row + 1) * gridSize + col);
                            if (col < gridSize - 1) connections.push((row + 1) * gridSize + col + 1);
                        }
                    }
                    
                    tiles[i].connections = connections.filter(c => c >= 0 && c < tiles.length);
                }
                
                // 플레이어 시작점
                const cornerCandidates = [0, 6, 42, 48, 3, 45];
                const playerStart = cornerCandidates[Math.floor(Math.random() * cornerCandidates.length)];
                tiles[playerStart].type = 'start';
                tiles[playerStart].visited = true;
                tiles[playerStart].discovered = true;
                
                tiles[playerStart].connections.forEach(conn => {
                    tiles[conn].discovered = true;
                });
                
                // 보스 생성
                const distances = tiles.map((tile, index) => ({
                    index,
                    distance: calculateDistance(tiles, playerStart, index),
                    angle: calculateAngle(positions[playerStart], positions[index])
                }));
                
                distances.sort((a, b) => b.distance - a.distance);
                const farTiles = distances.filter(d => d.distance >= 5);
                
                const bossCandidates = [];
                const sectors = [0, 120, 240];
                
                for (const sector of sectors) {
                    const inSector = farTiles.filter(d => {
                        const normalizedAngle = ((d.angle - sector) + 360) % 360;
                        return normalizedAngle >= 0 && normalizedAngle < 120;
                    });
                    
                    if (inSector.length > 0) {
                        bossCandidates.push(inSector[0].index);
                    }
                }
                
                while (bossCandidates.length < 3) {
                    const edgeTiles = [0, 6, 42, 48, 21, 27];
                    const available = edgeTiles.filter(e => 
                        !bossCandidates.includes(e) && 
                        e !== playerStart &&
                        calculateDistance(tiles, playerStart, e) >= 5
                    );
                    if (available.length > 0) {
                        bossCandidates.push(available[0]);
                    } else {
                        break;
                    }
                }
                
                const bossPos = bossCandidates[Math.floor(Math.random() * bossCandidates.length)];
                tiles[bossPos].type = 'boss';
                
                // 탈출구
                const exitCandidates = farTiles.filter(d => 
                    d.index !== playerStart && 
                    d.index !== bossPos &&
                    d.distance >= 4
                );
                
                const exitPos = exitCandidates.length > 0 
                    ? exitCandidates[Math.floor(Math.random() * Math.min(5, exitCandidates.length))].index
                    : farTiles[farTiles.length - 1].index;
                
                tiles[exitPos].type = 'exit';
                
                // 특수 타일
                const specialTiles = { good: 4, trap: 2 };
                const availableIndices = tiles
                    .map((t, i) => i)
                    .filter(i => tiles[i].type === 'normal');
                
                for (const [type, count] of Object.entries(specialTiles)) {
                    for (let i = 0; i < count && availableIndices.length > 0; i++) {
                        const randomIndex = Math.floor(Math.random() * availableIndices.length);
                        const tileIndex = availableIndices.splice(randomIndex, 1)[0];
                        tiles[tileIndex].type = type;
                    }
                }
                
                return { tiles, playerStart, bossPos, exitPos };
            }

            function calculateDistance(tiles, from, to) {
                const queue = [{ tile: from, dist: 0 }];
                const visited = new Set([from]);
                
                while (queue.length > 0) {
                    const { tile, dist } = queue.shift();
                    if (tile === to) return dist;
                    
                    for (const conn of tiles[tile].connections) {
                        if (!visited.has(conn)) {
                            visited.add(conn);
                            queue.push({ tile: conn, dist: dist + 1 });
                        }
                    }
                }
                return Infinity;
            }

            function calculateAngle(pos1, pos2) {
                const dx = pos2.x - pos1.x;
                const dy = pos2.y - pos1.y;
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;
                return (angle + 360) % 360;
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            useEffect(() => {
                if (health <= 0 || hunger <= 0) {
                    setGameOver(true);
                    setMessage(health <= 0 ? '생명력이 다했다...' : '배고픔을 이기지 못했다...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('탈출에 성공했다!');
                }
            }, [currentTile, tiles]);

            const useCard = (card) => {
                if (time + card.time > maxTime) {
                    setMessage('시간이 부족합니다!');
                    return;
                }
                
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                
                const newDetection = Math.min(100, Math.max(0, detection + card.detection));
                setDetection(newDetection);
                
                let msg = `${card.name}을(를) 사용했다. (시간 +${card.time}) `;
                
                if (card.id === 'search') {
                    inventory.addItem('material_low');
                    msg += `재료를 발견했다.`;
                } else if (card.id === 'find_food') {
                    inventory.addItem('food');
                    msg += `음식을 발견했다.`;
                } else if (card.id === 'listen') {
                    msg += `보스는 타일 #${boss.getPosition()}에 있다.`;
                } else if (card.id === 'hide') {
                    msg += '조용히 몸을 숨겼다.';
                } else if (card.id === 'find_weapon') {
                    inventory.addItem('weapon_basic');
                    msg += '나무창을 발견했다!';
                }
                
                setMessage(msg);
            };

            const moveTo = (targetId) => {
                if (!tiles[currentTile].connections.includes(targetId)) {
                    setMessage('인접한 타일로만 이동할 수 있습니다!');
                    return;
                }
                
                // 플레이어 이동 카운트 증가
                const newMoveCount = playerMoveCount + 1;
                setPlayerMoveCount(newMoveCount);
                
                setHunger(hunger - 1);
                setTime(0);
                
                const newTiles = tiles.map(t => 
                    t.id === targetId ? { ...t, visited: true, discovered: true } : t
                );
                
                tiles[targetId].connections.forEach(connId => {
                    newTiles[connId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(targetId);
                
                // 손패 3장 보충
                let newHand = [...hand];
                let newDeck = [...deck];
                let newGraveyard = [...graveyard];
                
                while (newHand.length < 3 && newDeck.length > 0) {
                    newHand.push(newDeck.shift());
                }
                
                if (newHand.length < 3 && newGraveyard.length > 0) {
                    newDeck = shuffleDeck(newGraveyard);
                    newGraveyard = [];
                    while (newHand.length < 3 && newDeck.length > 0) {
                        newHand.push(newDeck.shift());
                    }
                }
                
                setHand(newHand);
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                
                // 보스 이동 (2칸마다 1번)
                let newBossPos = boss.position;
                if (newMoveCount % 2 === 0 && !boss.isChasing()) {
                    // 일반 모드: 랜덤 이동
                    const bossConnections = newTiles[boss.position].connections;
                    if (bossConnections.length > 0) {
                        newBossPos = bossConnections[Math.floor(Math.random() * bossConnections.length)];
                        boss.position = newBossPos;
                    }
                }
                
                // 추격 모드
                if (detection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                    boss.playerMoveCount = 0;
                }
                
                if (boss.chaseMode) {
                    boss.onPlayerMove(targetId, detection);
                    newBossPos = boss.position;
                }
                
                // 조우 확인
                const encounter = newBossPos === targetId;
                
                const tile = newTiles[targetId];
                let msg = '';
                
                if (encounter) {
                    setGameOver(true);
                    msg = '보스 몬스터와 조우했다! 게임 오버...';
                } else if (tile.type === 'normal') {
                    msg = '평범한 숲길이다.';
                } else if (tile.type === 'good') {
                    msg = '좋은 곳을 발견했다!';
                } else if (tile.type === 'trap') {
                    const damage = Math.floor(Math.random() * 2) + 1;
                    setHealth(health - damage);
                    msg = `함정! 생명력 -${damage}`;
                } else if (tile.type === 'exit') {
                    msg = '탈출구다!';
                }
                
                if (boss.chaseMode && !encounter) {
                    msg += ` [⚠️ 보스 추격중! 위치: #${newBossPos}]`;
                }
                
                setMessage(msg);
            };

            const getTileColor = (tile) => {
                if (!tile.discovered) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit') return '#2196F3';
                if (tile.type === 'good') return '#FFC107';
                if (tile.type === 'trap') return '#e94560';
                if (boss && tile.id === boss.position) return '#8B0000';
                return '#2d3561';
            };

            const detectionColor = detection < 30 ? '#4CAF50' : 
                                   detection < 60 ? '#FFC107' : '#e94560';

            if (tiles.length === 0) {
                return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh' }}>게임 로딩 중...</div>;
            }

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
                    {/* 상단 UI 패널 */}
                    <div className="ui-panel">
                        <div style={{ marginBottom: '8px', fontSize: '18px', fontWeight: '600' }}>🦖 타임투다이노</div>
                        
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '6px', marginBottom: '8px' }}>
                            <div className="stat-box">
                                <div className="stat-label">생명력</div>
                                <div className="stat-value">❤️ {health}/6</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">배고픔</div>
                                <div className="stat-value">🍖 {hunger}/12</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">시간</div>
                                <div className="stat-value">⏰ {time}/{maxTime}</div>
                            </div>
                            <div className="stat-box">
                                <div className="stat-label">보스</div>
                                <div className="stat-value" style={{ fontSize: '13px' }}>
                                    {boss?.chaseMode ? '🔴 추격' : '🟢 순찰'}
                                </div>
                            </div>
                        </div>
                        
                        <div className="stat-box" style={{ marginBottom: '8px' }}>
                            <div className="stat-label">🚨 발각률</div>
                            <div style={{ background: '#0f3460', height: '20px', borderRadius: '10px', overflow: 'hidden', marginTop: '4px' }}>
                                <div style={{ 
                                    width: `${detection}%`, 
                                    height: '100%', 
                                    background: detectionColor, 
                                    transition: 'all 0.3s',
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '11px',
                                    fontWeight: '600',
                                    color: '#fff'
                                }}>
                                    {detection > 10 ? `${detection}%` : ''}
                                </div>
                            </div>
                        </div>

                        <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px' }}>{message}</div>
                        
                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
                            <button onClick={() => setShowInventory(!showInventory)}>
                                {showInventory ? '가방 닫기' : '가방 열기'}
                            </button>
                            <div style={{ fontSize: '12px', color: '#aaa', display: 'flex', alignItems: 'center', marginLeft: 'auto' }}>
                                손패 {hand.length}/3 · 덱 {deck.length} · 무덤 {graveyard.length}
                            </div>
                        </div>

                        {!gameOver && !victory && hand.length > 0 && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '6px' }}>
                                {hand.map(card => (
                                    <div key={card.uid} className="card" onClick={() => useCard(card)}>
                                        <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>{card.name}</div>
                                        <div style={{ fontSize: '10px', color: '#aaa' }}>{card.effect}</div>
                                        <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                            발각 {card.detection > 0 ? '+' : ''}{card.detection}% · ⏰{card.time}h
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* 맵 영역 (세이프 에어리어 추가) */}
                    <div className="map-container" ref={mapRef}>
                        <svg className="map-svg" width="1300" height="1200">
                            {tiles.map((tile) => {
                                const { x, y } = tile.position;
                                const isCurrent = tile.id === currentTile;
                                const canMove = tiles[currentTile].connections.includes(tile.id);
                                const isBoss = boss && tile.id === boss.position;
                                
                                return (
                                    <g key={tile.id}>
                                        <polygon
                                            className={`hex-tile ${isCurrent ? 'current' : ''}`}
                                            points={`${x},${y-60} ${x+52},${y-30} ${x+52},${y+30} ${x},${y+60} ${x-52},${y+30} ${x-52},${y-30}`}
                                            fill={getTileColor(tile)}
                                            stroke={isCurrent ? '#e94560' : isBoss && tile.discovered ? '#FF0000' : '#0f3460'}
                                            strokeWidth={isCurrent || (isBoss && tile.discovered) ? '4' : '2'}
                                            opacity={tile.discovered ? 1 : 0.5}
                                            onClick={() => !gameOver && !victory && moveTo(tile.id)}
                                        />
                                        {tile.discovered && (
                                            <>
                                                <text x={x} y={y - 10} textAnchor="middle" fill="#fff" fontSize="14" fontWeight="600">
                                                    {tile.type === 'start' ? '내위치' : 
                                                     tile.type === 'exit' ? '탈출구' : 
                                                     isCurrent ? '현재' :
                                                     isBoss ? '🦖' :
                                                     tile.type === 'good' ? '👍' :
                                                     tile.type === 'trap' ? '⚠️' : ''}
                                                </text>
                                                {!isCurrent && !isBoss && (
                                                    <text x={x} y={y + 10} textAnchor="middle" fill="#aaa" fontSize="11">
                                                        #{tile.id}
                                                    </text>
                                                )}
                                                {canMove && !isCurrent && (
                                                    <text x={x} y={y + 30} textAnchor="middle" fill="#4CAF50" fontSize="10">
                                                        이동가능
                                                    </text>
                                                )}
                                            </>
                                        )}
                                        {!tile.discovered && (
                                            <text x={x} y={y + 5} textAnchor="middle" fill="#666" fontSize="24">
                                                ?
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    {/* 가방 모달 */}
                    {showInventory && inventory && (
                        <div className="modal">
                            <div className="modal-content">
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                                    <h3>가방 (5x6)</h3>
                                    <button onClick={() => setShowInventory(false)}>닫기</button>
                                </div>
                                <div style={{ position: 'relative' }}>
                                    <div className="inventory-grid">
                                        {Array(6).fill(null).map((_, row) => 
                                            Array(5).fill(null).map((_, col) => (
                                                <div 
                                                    key={`${row}-${col}`} 
                                                    className={`inventory-cell ${inventory.grid[row][col] ? 'occupied' : ''}`}
                                                />
                                            ))
                                        )}
                                    </div>
                                    {inventory.items.map(item => (
                                        <div
                                            key={item.id}
                                            className={`inventory-item ${selectedInventoryItem?.id === item.id ? 'selected' : ''}`}
                                            style={{
                                                left: `${item.x * 47 + 4}px`,
                                                top: `${item.y * 47 + 4}px`,
                                                width: `${item.shape[0].length * 47 - 4}px`,
                                                height: `${item.shape.length * 47 - 4}px`
                                            }}
                                            onClick={() => setSelectedInventoryItem(item)}
                                        >
                                            {item.name}
                                        </div>
                                    ))}
                                </div>
                                {selectedInventoryItem && (
                                    <div style={{ marginTop: '10px' }}>
                                        <button onClick={() => {
                                            inventory.rotateItem(selectedInventoryItem);
                                            setInventory({...inventory});
                                        }}>회전</button>
                                        <button onClick={() => setSelectedInventoryItem(null)} style={{ marginLeft: '8px' }}>확정</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 게임 오버/승리 */}
                    {(gameOver || victory) && (
                        <div className="modal">
                            <div style={{ 
                                background: victory ? '#4CAF50' : '#e94560', 
                                color: 'white',
                                padding: '40px', 
                                borderRadius: '12px', 
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '28px', fontWeight: '600', marginBottom: '20px' }}>
                                    {victory ? '🎉 승리!' : '💀 게임 오버'}
                                </div>
                                <button 
                                    onClick={() => window.location.reload()}
                                    style={{ 
                                        background: 'white',
                                        color: '#333',
                                        border: 'none',
                                        padding: '15px 30px',
                                        fontSize: '16px',
                                        fontWeight: '600'
                                    }}
                                >
                                    다시 시작
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<Game />, document.getElementById('root'));
    </script>
</body>
</html>
