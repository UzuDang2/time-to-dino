                    isBait: true
                }));
                const allTargets = [...l2Preys, ...baitAsPreys];

                // D-86 (2026-04-24 мҡ”н•ң м§ҖмӢң): н”Ңл Ҳмқҙм–ҙ 1мқҙлҸҷ = ліҙмҠӨ 1мқҙлҸҷ.
                // кё°мЎҙ caller кІҢмқҙнҠё(`chaseMode || newMoveCount % 2 === 0`)лҘј м ңкұ°.
                // ліҙмҠӨ нҒҙлһҳмҠӨ лӮҙл¶ҖлҸ„ 1н„ҙ=1м№ё кі м •мқҙлҜҖлЎң(мқҙм „ D-86 boss.js) л§Ө нҳём¶ңл§ҲлӢӨ
                // м •нҷ•нһҲ 1м№ё. мқјл°ҳ/м¶”кІ© л¬ҙкҙҖн•ҳкІҢ лҸҷкё°нҷ”лҗң н…ңнҸ¬ мң м§Җ.
                boss.onPlayerMove(targetId, movedDetection, allTargets);
                newBossPos = boss.position;

                // D-165: нҸ¬мӢқ ліҙмҠӨ нқ”м Ғ нҒҙлҰ¬м–ҙ вҖ” ліҙмҠӨк°Җ к·ё нғҖмқјмқ„ л– лӮ¬мңјл©ҙ нқ”м Ғ н•ҙм ң.
                //   мң м§Җ мЎ°кұҙ: feedingBossTraceTile === newBossPos (к·ё мһҗлҰ¬м—җ м•„м§Ғ мһҲмқҢ).
                if (feedingBossTraceTile != null && feedingBossTraceTile !== newBossPos) {
                    setFeedingBossTraceTile(null);
                }

                // D-157: м„Өм№ҳлҗң лҚ« л°ңлҸҷ мІҙнҒ¬. ліҙмҠӨк°Җ placedTrapмқҙ мһҲлҠ” нғҖмқјм—җ л“Өм–ҙмҳӨл©ҙ
                //   1н„ҙ м •м§Җ(predationStay мһ¬нҷңмҡ©) + лҚ« л§Ҳм»Ө м ңкұ° + мӢңл„Өл§ҲнӢұ нҢЁлӢқ + ліҙмҠӨ к°ҖмӢңнҷ”.
                //   нҸ¬мӢқ мӨ‘(predationStay>0)мқҖ мқҙлҜё м •м§Җ мғҒнғңмқҙлҜҖлЎң лҚ§лҢҖм§Җ м•ҠлҠ”лӢӨ.
                {
                    const bossTile = newTiles[newBossPos];
                    const tileMoved = newBossPos !== bossStartPos;
                    if (bossTile && bossTile.placedTrap && bossTile.placedTrap.type === 'snare' && tileMoved && boss.predationStay <= 0) {
                        // 1) лҚ« л°ңлҸҷ вҖ” ліҙмҠӨ 1н„ҙ м •м§Җ(predationStay=1лЎң лӢӨмқҢ onPlayerMoveм—җм„ң -=1 нӣ„ 0мқҙ лҗҳм–ҙ мһҗлҸҷ н•ҙм ң).
                        //    predationStayлҠ” ліёлһҳ нҸ¬мӢқмҡ©мқҙм§Җл§Ң predationTargetмқҙ nullмқҙл©ҙ лӢЁмҲң м •м§ҖлЎң лҸҷмһ‘н•ңлӢӨ(onPlayerMove л¶„кё° м°ёмЎ°).
                        //    нҸ¬мӢқ мҪңл°ұмқ„ мһ„мӢңлЎң л–јл‘җм§Җ м•Ҡмңјл©ҙ onPredationCompleteк°Җ нҳём¶ңлҗҳм–ҙ мӮ¬мІҙ нғҖмқјмқҙ мһҳлӘ» л§Ңл“Өм–ҙм§ҖлҜҖлЎң,
                        //    predationStay 1н„ҙ + predationTarget=null мғҒнғңмқҙл©ҙ onPlayerMoveмқҳ if(predationStay>0) лё”лЎқ м•Ҳм—җм„ң
                        //    completedAt callbackмқҖ нҳём¶ңлҗҳм§Җл§Ң мҪңл°ұ ліёл¬ёмқҖ preyк°Җ м—Ҷмқ„ л•Ң м•Ҳм „. к·ёлһҳлҸ„ мӮ¬мқҙл“ң мқҙнҺҷ л°©м§ҖлҘј мң„н•ҙ
                        //    onPredationComplete к°Җл“ңм—җм„ң targetIdк°Җ nullмқҙл©ҙ мӮ¬мІҙ мғқм„ұ skipн•ҳлҸ„лЎқ л”°лЎң л¶„кё°.
                        boss.predationStay = 1;
                        boss.predationTarget = null;
                        boss.predationPreyType = null;

                        // 2) лҚ« л§Ҳм»Ө м ңкұ°.
                        const trapTileId = newBossPos;
                        setTiles(prev => prev.map(t => t.id === trapTileId ? { ...t, placedTrap: null } : t));

                        // 3) D-161: нҶ мҠӨнҠё нҸҗкё° вҖ” л©”мӢңм§Җм—җ н•©м„ұ. carcassNarration мһҗлҰ¬мҷҖ к°ҷмқҖ н•©м„ұ мӮ¬мқҙнҒҙмқҙм§Җл§Ң,
                        //    лҚ« л°ңлҸҷмқҖ ліҙмҠӨ мқҙлҸҷ нӣ„ мҰүмӢң м•Ңл Өм•ј н•Ё вҶ’ л©”мӢңм§Җм—җ м§Ғм ‘ prepend.
                        setMessage(prev => composeNarration([prev, 'рҹӘӨ м Җ л©ҖлҰ¬м„ң лҚ«м—җ кұёлҰ° м§җмҠ№мқҳ мҡёл¶Җм§–мқҢмқҙ л“Өл ӨмҳЁлӢӨ.']));

                        // 4) мӢңл„Өл§ҲнӢұ вҖ” ліҙмҠӨ мң„м№ҳлЎң нҢЁлӢқ вҶ’ 1.2мҙҲ м •м§Җ вҶ’ мӣҗмң„м№ҳ ліөк·Җ.
                        //    мӨ‘к°„м—җ ліҙмҠӨ к°ҖмӢңнҷ”. мӢңл„Өл§ҲнӢұ лӘЁл“Ҳ лҜёлЎңл“ң мӢң fallback(мҰүмӢң к°ҖмӢңнҷ”).
                        const trapTile = newTiles[trapTileId];
                        const tilePixel = trapTile && trapTile.position ? { x: trapTile.position.x, y: trapTile.position.y } : null;
                        const scrollEl = document.querySelector('.map-container');
                        if (window.CameraCinematic && tilePixel && scrollEl) {
                            window.CameraCinematic.panToTile({
                                scrollEl,
                                tilePixelXY: tilePixel,
                                panMs: 800,
                                holdMs: 1200,
                                returnMs: 600,
                                onMidway: () => { setBossVisible(true); },
                                onDone: () => { /* мӢңл„Өл§ҲнӢұ мў…лЈҢ вҖ” ліҙмҠӨ к°ҖмӢңнҷ”лҠ” лӢӨмқҢ мқҙлҸҷк№Ңм§Җ мң м§Җ. */ }
                            });
                        } else {
                            setBossVisible(true);
                        }
                    }
                }

                // D-110: ліҙмҠӨ к·јм ‘(кұ°лҰ¬ вүӨ2) м§„мһ… м№ҙмҡҙнҠё. к°ҷмқҖ н”Ңл Ҳмқҙм–ҙ нғҖмқјм—җм„ң мһ¬м§„мһ…мқҖ dedup.
                //   bossDangerSeenTilesRefлҠ” useRef Set вҖ” мІ« м§„мһ… мӢң add + score+1.
                //   мЎ°мҡ° мһҗмІҙ(кұ°лҰ¬ 0)лҠ” кІҢмһ„мҳӨлІ„лқј лі„лҸ„ мІҳлҰ¬ м•Ҳ н•ҙлҸ„ лҗЁ(distвүӨ2 м№ҙмҡҙнҠём—” нҸ¬н•Ё).
                if (typeof boss.calculateDistance === 'function') {
                    const dist = boss.calculateDistance(targetId, newBossPos);
                    if (dist <= 2 && !bossDangerSeenTilesRef.current.has(targetId)) {
                        bossDangerSeenTilesRef.current.add(targetId);
                        setRunStats(s => ({ ...s, bossDangerEntered: s.bossDangerEntered + 1 }));
                    }
                }

                // D-53: ліҙмҠӨк°Җ мӢӨм ңлЎң мқҙлҸҷн•ң кІҪмҡ°м—җл§Ң historyм—җ push. к°ҷмқҖ мһҗлҰ¬ мң м§Җл©ҙ skip.
                if (newBossPos !== bossStartPos) {
                    setBossMoveHistory(prev => (
                        prev.length > 0 && prev[prev.length - 1] === newBossPos
                            ? prev
                            : [...prev, newBossPos]
                    ));
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';

                // D-93 (2026-04-25 мҡ”н•ң м§ҖмӢң): ліҙмҠӨк°Җ нҸ¬мӢқ мӨ‘мқё нғҖмқјм—җ мң м Җк°Җ лҸ„м°©н•ҳл©ҙ
                //   кІҢмһ„ мҳӨлІ„ лҢҖмӢ  "м •мӢ м—Ҷмқҙ мӢқмӮ¬ мӨ‘" м•ҲлӮҙ. D-90 лӘЁлӢ¬ нҶӨкіј мқјкҙҖ вҖ” ліҙмҠӨлҠ”
                //   лЁ№мқҙм—җ м •мӢ  нҢ”л Ө н”Ңл Ҳмқҙм–ҙлҘј м•Ңм•„м°ЁлҰ¬м§Җ лӘ»н•Ё. мӢқмӮ¬к°Җ лҒқлӮҳлҠ” лӢӨмқҢ н„ҙл¶Җн„°лҠ”
                //   лӢӨмӢң мң„нҳ‘мқҙлқј л№ м ёлӮҳк°Җм•ј н•Ё(лі„лҸ„ л¶„кё° м—Ҷмқҙ мқјл°ҳ onPlayerMove нқҗлҰ„мқҙ мІҳлҰ¬).
                const inPredationSafe = encounter && boss.predationStay > 0;

                // D-161: н•©м„ұ мЎ°к°Ғ вҖ” мӮ¬лғҘк°җ л°ңкІ¬. мқҙлӘЁм§Җ + мқҙлҰ„ + (HP л¶Җл¶„ л…ём¶ң) мқёлқјмқё.
                let preyNarration = '';
                if (preyHere && !inPredationSafe) {
                    newHand.push({
                        ...HUNT_START_CARD,
                        uid: `hunt_start_${preyHere.id}_${Date.now()}`,
                        target: {
                            tileId: targetId,
                            preyId: preyHere.id,
                            preyType: preyHere.preyType
                        }
                    });
                    if (!isWaitInPlace) {
                        const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                        const foundDef = preyDataArr.find(p => p.id === preyHere.preyType) || {};
                        const hpNote = (typeof preyHere.hpCurrent === 'number' && preyHere.hpCurrent < (foundDef.hp || 0))
                            ? ` (HP ${preyHere.hpCurrent}/${foundDef.hp})`
                            : '';
                        const emj = PREY_EMOJI[preyHere.preyType] || 'вқ“';
                        preyNarration = `${emj} ${foundDef.name || preyHere.preyType}мқ„(лҘј) л°ңкІ¬н–ҲлӢӨ${hpNote}.`;
                    }
                }
                setHand(newHand);

                // D-161: нғҖмқј type / ліҙмҠӨ мЎ°мҡ°В·нҸ¬мӢқ / н•Ём • л¶„кё° вҖ” лӘЁл‘җ лӮҙл Ҳмқҙм…ҳ мЎ°к°ҒмңјлЎң н•©м„ұ.
                //   tileNarration : нғҖмқј мқҙлІӨнҠё(н’ҚмЎұн•ң л•…/н•Ём • нҡҢн”ј/мқҙлІӨнҠё м§„мһ…/нғҲм¶ңкө¬) 1мӨ„.
                //   bossEncounterNarration : ліҙмҠӨ мЎ°мҡ°/нҸ¬мӢқ 1мӨ„(мһҲмңјл©ҙ лӢӨлҘё мЎ°к°Ғ лҚ®м–ҙм“°кё° мҡ°м„ мҲңмң„).
                let tileNarration = '';
                let bossEncounterNarration = '';

                if (encounter && !inPredationSafe) {
                    // D-56: ліҙмҠӨ мЎ°мҡ° мӢң м җн”„мҠӨмјҖм–ҙ м„ мһ¬мғқ вҶ’ 0.55s л’Ө кІҢмһ„мҳӨлІ„.
                    setBossJumpscare(true);
                    setTimeout(() => {
                        setBossJumpscare(false);
                        setGameOver(true);
                        setDeathReason('boss');
                    }, 550);
                    bossEncounterNarration = 'рҹҰ– кұ°лҢҖн•ң м§җмҠ№кіј м •л©ҙмңјлЎң л§ҲмЈјміӨлӢӨвҖҰ л°ңмқҙ м–јм–ҙл¶ҷлҠ”лӢӨ.';
                } else if (inPredationSafe) {
                    // к°ҷмқҖ нғҖмқјмқҙм§Җл§Ң ліҙмҠӨк°Җ мӢқмӮ¬м—җ м •мӢ м—ҶмқҢ вҖ” мӮ¬мІҙ + ліҙмҠӨ + мң м Җ н•ң м№ём—җ кіөмЎҙ.
                    setBossVisible(true);
                    // D-165: мқҙ нғҖмқјм—җ нҸ¬мӢқ мӨ‘ ліҙмҠӨк°Җ мһҲм—ҲмқҢмқ„ кё°лЎқ.
                    //   мң м Җк°Җ лҸ„л§қміҗ лӢӨмқҢ н„ҙм—җ л– лӮҳлҸ„ нқ”м Ғ л§Ҳм»Өк°Җ мң м§ҖлҗңлӢӨ.
                    //   ліҙмҠӨк°Җ к·ё нғҖмқјмқ„ л– лӮҳл©ҙ м•„лһҳ нҒҙлҰ¬м–ҙ лЎңм§Ғм—җм„ң мһҗлҸҷ н•ҙм ң.
                    setFeedingBossTraceTile(targetId);
                    bossEncounterNarration = 'рҹҰ– кұ°лҢҖн•ң м§җмҠ№мқҙ мӢқмӮ¬м—җ м •мӢ мқҙ нҢ”л ӨмһҲлӢӨ. л“ӨнӮӨкё° м „м—җ л№ м ёлӮҳк°Җмһҗ!';
                } else if (tile.type === 'normal') {
                    // нҸүлІ”н•ң нғҖмқјмқҖ лі„лҸ„ л©ҳнҠё м—ҶмқҢ вҖ” мқёнҠёлЎң/мһ¬л°©л¬ё + мӮ¬лғҘк°җ/мӮ¬мІҙ мЎ°к°Ғл§ҢмңјлЎң м¶©л¶„.
                    tileNarration = '';
                } else if (tile.type === 'good') {
                    // D-52: 'н’ҚмЎұн•ң л•…'.
                    tileNarration = 'рҹҢҫ мһҗмӣҗкіј лЁ№кұ°лҰ¬к°Җ н’Қл¶Җн•ң кіімқҙлӢӨ. н’ҚмЎұн•ң л•…мқ„ л°ңкІ¬н–ҲлӢӨ!';
                } else if (tile.type === 'trap') {
                    // D-156: wood_shard мһҗлҸҷ м°ЁлӢЁ к°Җл“ң.
                    let shardItem = null;
                    if (inventory && Array.isArray(inventory.items)) {
                        shardItem = inventory.items.find(it => it && it.type === 'wood_shard');
                    }
                    if (shardItem) {
                        inventory.removeItem(shardItem);
                        inventory.items = inventory.items.filter(i => i.id !== shardItem.id);
                        setInventory(Object.create(Object.getPrototypeOf(inventory), Object.getOwnPropertyDescriptors(inventory)));
                        tileNarration = 'рҹӘө лӮҳл¬ҙ мЎ°к°Ғмқҙ л¶Җлҹ¬м§Җл©° л°ң л°‘мқҳ мҮ лҚ«мқҙ нҠ•кІЁ мҳ¬лқјк°”лӢӨ.';
                        // н•Ём • нғҖмқјмқҖ normalлЎң к°•л“ұ.
                        setTiles(prev => prev.map(t => t.id === targetId ? { ...t, type: 'normal' } : t));
                    } else {
                        const damage = Math.floor(Math.random() * 2) + 1;
                        setHealth(health - damage);
                        tileNarration = `вҡ пёҸ н•Ём •! мғқлӘ…л Ҙ -${damage}.`;
                        // мқҙлІӨнҠё лӘЁлӢ¬ н‘ңмӢң (лҚ°лҜём§Җ м •ліҙ нҸ¬н•Ё)
                        setEventTile({ ...tile, damage });
                    }
                } else if (tile.type === 'event') {
                    // D-126: мқҙлІӨнҠё нғҖмқј вҖ” лӘЁлӢ¬ нҠёлҰ¬кұ°. лӘЁлӢ¬мқҙ м§Ғм ‘ н…ҚмҠӨнҠёлҘј ліҙм—¬мЈјлҜҖлЎң
                    //   м—¬кё° л©”мӢңм§ҖлҠ” м§§мқҖ лҸ„мһ… н•ң мӨ„.
                    const eventId = eventTileAssignments[tile.id];
                    if (eventId) {
                        tileNarration = 'лӮҜм„  н’ҚкІҪмқҙ л°ңкұёмқҢмқ„ л¶ҷмһЎлҠ”лӢӨ.';
                        setEventChoice({ tileId: tile.id, eventId });
                    }
                } else if (tile.type === 'exit') {
                    tileNarration = 'рҹҡӘ нғҲм¶ңкө¬лӢӨ!';
                }

                // D-161: ліҙмҠӨ м¶”кІ© лӘЁл“ң мқёлқјмқё к°•мЎ°.
                let chaseNarration = '';
                if (boss.chaseMode && !encounter) {
                    chaseNarration = 'вҡ пёҸ кұ°лҢҖн•ң м§җмҠ№мқҳ л°ңмҶҢлҰ¬к°Җ л“ұ л’ӨлЎң м«“м•„мҳЁлӢӨ.';
                }

                // D-126: мғҒнғңмқҙмғҒ tick вҖ” л§Ө мқҙлҸҷ нӣ„ 1нҡҢ. tick_effect + лқјмқё лҲ„м Ғ.
                let statusLines = [];
                if (window.StatusEffects && playerStatuses.length > 0) {
                    const tickCtx = {
                        applyStat: (stat, delta) => {
                            if (stat === 'hunger') setHunger(p => Math.max(0, Math.min(MAX_HUNGER, p + delta)));
                            else if (stat === 'health') setHealth(p => Math.max(0, Math.min(MAX_HEALTH, p + delta)));
                        },
                        addLogLine: (l) => { if (l) statusLines.push(l); }
                    };
                    const { list, lines } = window.StatusEffects.tick(playerStatuses, tickCtx);
                    setPlayerStatuses(list);
                    if (lines.length > 0) statusLines.push(...lines);
                }

                // D-161: HP/л°°кі н”” мһ„кі„м№ҳ вҖ” HUD кІҢмқҙм§Җл°” warningкіј лҸҷмқјн•ң мһ„кі„.
                //   м§„мһ… 1нҡҢ к°•н•ң н•ң мӨ„ + мһ„кі„м№ҳ м•Ҳм—җм„ңлҠ” N(STAT_WARN_REMIND_TURNS)н„ҙл§ҲлӢӨ лҰ¬л§Ҳмқёл“ң.
                //   мҳҲмёЎ к°’(мқҙ мқҙлҸҷм—җм„ң м°Ёк°җ нӣ„ к°’)мңјлЎң нҢҗм • вҖ” мқҙлІҲ мқҙлҸҷмқҳ hunger/health м Ғмҡ© нӣ„ мғҒнғң.
                //   нҳ„мһ¬ мӢңм җм—җм„ң hungerлҠ” hunger-1 мІҳлҰ¬лҗҗкі , healthлҠ” н•Ём •В·tickмңјлЎң ліҖлҸҷ к°ҖлҠҘ.
                //   м—¬кё°м„ңлҠ” setter м§Ғнӣ„ лҸҷкё° к°’мқ„ лӘЁлҘҙлҜҖлЎң "мқҙм „ н„ҙк№Ңм§Җмқҳ мһ„кі„ м§„мһ…"мқ„ кё°мӨҖмңјлЎң refл§Ң мң м§Җн•ҳкі ,
                //   лӢӨмқҢ turn(лӢӨмқҢ moveTo)м—җм„ң м§„мһ… кІҖмӮ¬. нҳ„мһ¬ н„ҙмқҳ enter кІҖм¶ңл§ҢмқҖ health/hunger л§Ҳм§Җл§ү set кІ°кіјлҘј кё°лӢӨл Өм•ј н•ҳм§Җл§Ң,
                //   useEffect м—ҶмқҙлҸ„ мӢ лў° к°ҖлҠҘн•ң мӢңм җмқҖ мқҙ н•ЁмҲҳмқҳ м§Ғм „ state. вҶ’ useEffectлЎң лі„лҸ„ мІҳлҰ¬.
                //   м—¬кё° moveTo н•©м„ұм—җм„ңлҠ” statWarnRefмқҳ "нҳ„мһ¬ мӮ¬мқҙнҒҙ лқјмқё"л§Ң лҒҢм–ҙмҷҖ н•©м„ұ.
                const warnLines = [];
                {
                    const sw = statWarnRef.current;
                    if (sw.inHealth) {
                        sw.sinceHealth += 1;
                        if (sw.sinceHealth % STAT_WARN_REMIND_TURNS === 0) warnLines.push(STAT_WARN_LINES.healthRemind);
                    }
                    if (sw.inHunger) {
                        sw.sinceHunger += 1;
                        if (sw.sinceHunger % STAT_WARN_REMIND_TURNS === 0) warnLines.push(STAT_WARN_LINES.hungerRemind);
                    }
                }

                // н•©м„ұ: [м§Җм—ӯ мқёнҠёлЎң] [мӮ¬мІҙ] [мӮ¬лғҘк°җ л°ңкІ¬] [нғҖмқј/ліҙмҠӨ] [м¶”кІ©] [мғҒнғңмқҙмғҒ лқјмқёвҖҰ] [мһ„кі„м№ҳ лҰ¬л§Ҳмқёл“ңвҖҰ].
                //   bossEncounterNarrationмқҙ мһҲмңјл©ҙ tileNarration л¬ҙмӢң (мЎ°мҡ°к°Җ мҡ°м„ ).
                const finalMsg = composeNarration([
                    narrationIntro,
                    carcassNarration,
                    preyNarration,
                    bossEncounterNarration || tileNarration,
                    chaseNarration,
                    ...statusLines,
                    ...warnLines
                ]);

                setMessage(finalMsg);
            };

            // D-109: лІ мқҙмҠӨмә н”„ к·Җнҷҳ вҖ” GameEndModal/л§ө ліҙкё° footerм—җм„ң нҳём¶ң.
            //   payloadлҠ” App.handleRunEndк°Җ мқёлІӨ мһҗмӣҗ мқёмһ…(мҠ№лҰ¬л§Ң)В·runs м№ҙмҡҙнҢ…м—җ мӮ¬мҡ©.
            //   нҳём¶ң нӣ„ Appмқҙ view='camp'лЎң м „нҷҳ вҶ’ GameмқҖ мһҗлҸҷ unmount(лӢӨмқҢ нғҗн—ҳ мӢң fresh state).
            // D-110: selectedItems(LootResultм—җм„ң м„ нғқн•ң itemId л°°м—ҙ)лҸ„ н•Ёк»ҳ м „лӢ¬.
            //   лҜём§Җм •мқҙл©ҙ кё°мЎҙмІҳлҹј м „мІҙ мқёмһ…(GameEndModalм—җм„ң [м „лҰ¬н’Ҳ нҷ•мқё] м•Ҳ лҲ„лҘҙкі  м§Ғм ‘ к·Җнҷҳ).

            const returnToCamp = (selectedIds = null) => {

            // D-110: м „лҰ¬н’Ҳ кІ°кіјм°Ҫ нҶ кёҖ. GameEndModal [рҹ“Ұ м „лҰ¬н’Ҳ нҷ•мқё]м—җм„ң setShowLoot(true).

                        inventoryItems={(inventory && inventory.items) || []}
                    />
                    {/* D-117 (мҡ”н•ң м§ҖмӢң): нҷ”л©ҙмқ„ 3кө¬м—ӯмңјлЎң л¶„лҰ¬.
                        в‘  мғҒлӢЁ ui-panel вҖ” Stat + л©”мӢңм§Җ(кі м •)
                        в‘Ў мӨ‘м•ҷ GameMap вҖ” flex:1 stretch
                        в‘ў н•ҳлӢЁ ui-panel вҖ” м№ҙл“ң мһҗмӣҗ/мҶҗнҢЁ мҳҒм—ӯ(кі м •)

                    <div className="ui-panel">
                        <StatPanel
                            health={health}
                            hunger={hunger}
                            maxHealth={MAX_HEALTH}
                            maxHunger={MAX_HUNGER}
                            time={time}
                            maxTime={maxTime}

                            detection={detection}
                            message={message}
                            statuses={playerStatuses}
                        />
                    </div>

                    <GameMap
                        tiles={tiles}
                        currentTile={currentTile}
                        boss={boss}
                        bossVisible={bossVisible}
                        feedingBossTraceTile={feedingBossTraceTile}
                        gameOver={gameOver}
                        victory={victory}
                        moveTo={moveTo}
                        requestWait={() => setWaitConfirmOpen(true)}
                        preys={preys}
                        preyTraceTiles={preyTraceTiles}
                        carcassTiles={carcassTiles}
                        carcassTraceTiles={carcassTraceTiles}
                        baitTiles={baitTiles}

                        bossMoveHistory={bossMoveHistory}

                    />

                    {/* D-117: н•ҳлӢЁ ui-panel вҖ” м№ҙл“ң мһҗмӣҗ/мҶҗнҢЁ. л§ө м•„лһҳм—җ л°°м№ҳ. */}
                    <div className="ui-panel">
                        {/* D-27 HUD лҰ¬лүҙм–ј вҶ’ D-28 мһ¬л°°м№ҳ (мҡ”н•ң м§ҖмӢң 2026-04-22):
                            - к°Җл°© лІ„нҠјмқҖ мўҢмёЎ кі м •.
                            - лҚұ/л¬ҙлҚӨ лІ„нҠјмқҖ 'мҶҗнҢЁ N/5' м№ҙмҡҙн„° мӘҪ(мҡ°мёЎ лҒқ)мңјлЎң л¬¶лҠ”лӢӨ.

                              к°ҷмқҖ м№ҙл“ң мһҗмӣҗмқҙлҜҖлЎң мӢңм„ мқҙ л¶„лҰ¬лҗҳм§Җ м•ҠлҸ„лЎқ л¬¶мқҢ.

                        return (

                    {eventResult && (

                            </div>
                        </div>
                    )}

                    {showInventory && inventory && (
                        <InventoryModal

                    {showDeckList && (
                        <CardListModal

                            emptyText="лҚұмқҙ л№„м—ҲлӢӨ. л¬ҙлҚӨмқҙ м…”н”Ңлҗ  м°ЁлЎҖлӢӨ."
                            onClose={() => setShowDeckList(false)}
                        />
                    )}

                    {showGraveyardList && (
                        <CardListModal
                            title="л¬ҙлҚӨ"
                            cards={graveyard}
                            emptyText="м•„м§Ғ мӮ¬мҡ©н•ң м№ҙл“ңк°Җ м—ҶлӢӨ."
                            onClose={() => setShowGraveyardList(false)}
                        />
                    )}

                    {pendingConsume && inventory && (() => {
                        // D-57: нңҙмӢқ м№ҙл“ң(id='rest')м—җм„ңл§Ң [рҹ”Ҙ мҡ”лҰ¬н•ҳкё°] лІ„нҠј л…ём¶ң.
                        //   canCook: мҡ”лҰ¬ к°ҖлҠҘ мһ¬лЈҢ(meat_skewer/fish_skewer л“ұ 1мһ¬лЈҢ grilled_ л ҲмӢңн”ј
                        //   мһ¬лЈҢ) ліҙмң  м—¬л¶Җ. м—Ҷмңјл©ҙ лІ„нҠјмқҖ нҡҢмғү л№„нҷңм„ұ.
                        const isRest = pendingConsume.card && pendingConsume.card.id === 'rest';
                        let canCook = false;
                        let onCookClick = undefined;
                        if (isRest) {
                            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                                ? window.TTD_DATA.COMBOS : [];
                            const cookIngs = new Set(
                                combos
                                    .filter(r => r && Array.isArray(r.ingredients)
                                        && r.ingredients.length === 1
                                        && typeof r.result === 'string'
                                        && r.result.startsWith('grilled_'))
                                    .map(r => r.ingredients[0])
                            );
                            canCook = (inventory.items || []).some(it => cookIngs.has(it.type));
                            onCookClick = () => setCookingOpen(true);
                        }
                        return (
                            <CardItemConsumeModal
                                inventory={inventory}
                                filter={pendingConsume.filter}
                                scales={pendingConsume.scales}
                                bonuses={pendingConsume.bonuses}
                                hintText={pendingConsume.hintText}
                                titleText={pendingConsume.titleText}
                                emptyText={pendingConsume.emptyText}
                                onSelect={resolveConsumeChoice}
                                onClose={cancelConsume}
                                onCookClick={onCookClick}
                                canCook={canCook}
                            />
                        );
                    })()}

                    {/* D-57: мҡ”лҰ¬ лӘЁлӢ¬ вҖ” нңҙмӢқ лӘЁлӢ¬ мң„м—җ лҚ®мқёлӢӨ. лӢ«мңјл©ҙ нңҙмӢқ лӘЁлӢ¬лЎң ліөк·Җ. */}
                    {cookingOpen && inventory && (
                        <CookingModal
                            inventory={inventory}
                            onCook={handleCookRecipe}
                            onClose={() => setCookingOpen(false)}
                        />
                    )}

                    {/* D-114: л’Өм ёліҙкё° лӢӨмӨ‘ л“ңлЎӯ мӢң мұҷкёё н•ӯлӘ© м„ нғқ лӘЁлӢ¬.
                        search л¶„кё°м—җм„ң setLootPickup({drops, region})лЎң л…ём¶ң.
                        - мұҷкё°кё°: м„ нғқлҗң мқёлҚұмҠӨл§Ң inventory.addItem. л¶Җл¶„ мқёмһ…мқҖ нҶ мҠӨнҠё л…ём¶ң.
                        - лӘЁл‘җ лІ„лҰ¬кё°: мқёмһ… м—Ҷмқҙ лӘЁлӢ¬л§Ң лӢ«мқҢ. */}
                    {lootPickup && inventory && (
                        <LootPickupModal
                            drops={lootPickup.drops}
                            region={lootPickup.region}
                            inventory={inventory}
                            onConfirm={(selectedIndices) => {
                                const drops = lootPickup.drops || [];
                                const counter = new Map();
                                let overflow = 0;
                                for (const idx of selectedIndices) {
                                    const t = drops[idx];
                                    if (!t) continue;
                                    const ok = inventory.addItem(t);
                                    if (ok) counter.set(t, (counter.get(t) || 0) + 1);
                                    else overflow += 1;
                                }
                                // D-161: LootToast нҸҗкё° вҖ” л©”мӢңм§Җм—җ мқҙлӘЁм§Җ + мқҙлҰ„ мқёлқјмқё н•©м„ұ.
                                const nameParts = [];
                                counter.forEach((count, item) => {
                                    const def = InventorySystem.ITEMS[item] || {};
                                    const displayName = def.name || item;
                                    const emj = (typeof itemEmoji === 'function') ? itemEmoji(item) : '';
                                    const namePart = `${emj ? emj + ' ' : ''}${displayName}`;
                                    nameParts.push(count > 1 ? `${namePart} Г—${count}` : namePart);
                                });
                                let pickupMsg = '';
                                if (nameParts.length > 0) pickupMsg += `${nameParts.join(', ')}мқ„(лҘј) мұҷкІјлӢӨ.`;
                                if (overflow > 0) pickupMsg += `${pickupMsg ? ' ' : ''}к°Җл°©мқҙ к°Җл“қ м°Ё ${overflow}к°ңлҠ” л‘җкі  мҷ”лӢӨ.`;
                                if (pickupMsg) setMessage(prev => composeNarration([prev, pickupMsg]));
                                setLootPickup(null);
                            }}
                            onDiscardAll={() => setLootPickup(null)}
                        />
                    )}

                    {/* D-42 (2026-04-23): мөңмғҒмң„ LootToast м ңкұ°.
                        мқҙлҜё GameMap лӮҙл¶Җм—җм„ң л ҢлҚ”лҗҳлҜҖлЎң мӨ‘ліө л§ҲмҡҙнҠёмҳҖмқҢ.
                        л§ө м»Ён…Ңмқҙл„Ҳ кё°мӨҖ top:12px н•ҳлӮҳл§Ң мң м§Җ. */}

                    {/* D-46 (2026-04-23): мӮ¬лғҘ м „нҲ¬ лӘЁлӢ¬. activeHunt м„Өм •лҗҳл©ҙ л§ҲмҡҙнҠё. */}

                        <HuntCombatModal

                        нҳём¶ңлЎң лӘЁл“  л¶ҖмҲҳ нҡЁкіј(мӢңк°„/л°°кі н””/л°ңк°ҒлҘ /ліҙмҠӨ мқҙлҸҷ/мҶҗнҢЁ мӮ¬мқҙнҒҙ) к·ёлҢҖлЎң нқҗлҰ„. */}
                    {waitConfirmOpen && (
                        <WaitConfirmModal
                            onCancel={() => setWaitConfirmOpen(false)}
                            onConfirm={() => {

                                moveTo(currentTile);

                    {/* D-90: мқём ‘ нҸ¬мӢқмӨ‘ ліҙмҠӨ listen лӘЁлӢ¬. м җн”„мҠӨмјҖм–ҙ м§Ғнӣ„ мһҗлҸҷ л§ҲмҡҙнҠё. */}
                    {predationListenInfo && (

                            info={predationListenInfo}

                        />

                    {/* D-110: м „лҰ¬н’Ҳ кІ°кіјм°Ҫ вҖ” showLoot=trueмқҙл©ҙ GameEndModal мң„м—җ н’ҖмҠӨнҒ¬лҰ° лӘЁлӢ¬.

                    {showLoot && (

                    <GameEndModal

                    <BossJumpscare active={bossJumpscare} onDone={() => setBossJumpscare(false)} />

                    {showPathView && (
                        <div style={{
                            position: 'fixed',
                            bottom: '20px',
                            left: '50%',
                            transform: 'translateX(-50%)',

                            gap: '10px'
                        }}>
                            <button
                                onClick={() => setShowPathView(false)}
                                style={{
                                    background: '#2a2a3e',
                                    color: '#d4b84a',
                                    border: '1px solid #d4b84a',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600

                            </button>
                            <button
                                onClick={returnToCamp}
                                style={{
                                    background: '#4CAF50',
                                    color: 'white',
                                    border: 'none',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontWeight: 600
                                }}
                            >
                                рҹҸ•пёҸ лІ мқҙмҠӨмә н”„лЎң к·Җнҷҳ
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // D-109 (2026-04-24): App вҖ” кІҢмһ„ нқҗлҰ„ м»ЁнҠёлЎӨлҹ¬.
        //   view: 'intro' | 'play' | 'camp'
        //   campState мҳҒмҶҚнҷ”(localStorage 'ttd:campState:v1') вҖ” load on mount, save on change.
        //   мІ« л§ҲмҡҙнҠё:
        //     - localStorage м—ҶмқҢ вҶ’ view='intro'
        //     - localStorage мһҲмқҢ вҶ’ view='camp' (мӢңлӮҳлҰ¬мҳӨ мҠӨнӮө, мғҲлЎңкі м№ЁмқҖ н•ӯмғҒ мә н”„)
        //   м§„н–ү мӨ‘ лҹ°(view='play')мқҖ мғҲлЎңкі м№Ё мӢң нҸҗкё°лҗЁ (мқҳлҸ„лҗң лҸҷмһ‘).
        // ============================================

        const CAMP_STATE_KEY = 'ttd:campState:v1';
        // D-163 (2026-04-29 мҡ”н•ң): л©”мқё мҠ¬лЎҜ м§Ғм „к°’ 1лӢЁ л°ұм—….
        //   м ҖмһҘ мӢң м§Ғм „ м •мғҒк°’мқ„ backup мҠ¬лЎҜмңјлЎң нҡҢм „ вҶ’ л©”мқё нҢҢмӢұ мӢӨнҢЁ мӢң fallback.
        //   "лҚ°мқҙн„° мҙҲкё°нҷ”"м—җм„ңл§Ң л‘ҳ лӢӨ м§ҖмӣҖ.
        const CAMP_STATE_BACKUP_KEY = 'ttd:campState:v1:backup';

        // D-148: к°Җл°©(pack) мғқм„ұ н—¬нҚј вҖ” bonusSlots л§ҢнҒј disabled мӨ„мһ„.
        //   кё°ліё disabled: (0,0), (4,0), (0,1), (4,1) вҖ” мўҢмҡ° мң„ кө¬м„қ 4м№ё.
        //   bonusSlots=1мқҙл©ҙ (0,0) н’Җм–ҙ мўҢмёЎ мң„ 1м№ё нҷңм„ұ. н…җнҠё мҷ„мҲҳ ліҙмғҒ.
        function makePackInventory(bonusSlots) {
            const n = Math.max(0, Math.min(4, Number(bonusSlots) || 0));
            const fullDisabled = [
                { x: 0, y: 0 }, { x: 4, y: 0 },
                { x: 0, y: 1 }, { x: 4, y: 1 }
            ];
            return new InventorySystem(5, 5, { disabled: fullDisabled.slice(n) });
        }

        // л№Ҳ мғҒнғң(мІ« мӢ к·ң мң м Җ).
        // D-113: ліҙкҙҖн•ЁмқҖ 12x8(rows=12, cols=8 вҖ” м„ёлЎңлЎң к№Җ). нғҗн—ҳмҡ© к°Җл°©(pack)мқҖ 5x5(D-47 лӘЁм–‘).
        // D-147 (2026-04-27 мҡ”н•ң): ліҙкҙҖн•Ё 12x6лЎң мўҒнһҳ вҖ” м„ёлЎң лӘЁл°”мқјм—җм„ң лҚ” к№”лҒ”.
        // D-148 (2026-04-27 мҡ”н•ң): tentBuilt н”Ңлһҳк·ё вҖ” trueл©ҙ к°Җл°© мўҢмёЎ мң„ 1м№ё м¶”к°Җ нҷңм„ұ(н…җнҠё ліҙмғҒ).
        // D-174 v3 (2026-04-30 мҡ”н•ң): ліҙкҙҖн•Ё 7x20 вҖ” row 0-9 BASE нҷңм„ұ(70м№ё) + row 10-19 н…җнҠё мҠ¬лЎҜ(лӢЁкі„л§ҲлӢӨ row 1мӨ„=7м№ё н’ҖлҰј). лӘЁл°”мқј к°ҖлЎң 7м№ё м Ғн•© + н—ӨлҚ” sticky.
        //   buildingLevels вҖ” { [id]: stage } л№Ңл”© 6мў… + tent м§„н–үлҸ„. н…җнҠёлҠ” tentLevelкіј лҸҷкё°.
        //   oneShotInventory вҖ” { [key]: count } heal_on_return л“ұ лҲ„м Ғ мқјнҡҢм„ұ нҡЁкіј(D-176+ мӮ¬мҡ©).
        function makeInitialCampState() {
            return {
                version: 1,
                seenIntro: false,
                firstReturnDone: false,
                tentLevel: 0,
                buildingLevels: {},        // D-174
                oneShotInventory: {},      // D-174
                inventory: makeCampStorageInventory(0),  // D-174 v3: 7x20 + row 10-19 disabled.
                pack: makePackInventory(0),
                quests: { active: [], completed: [] },
                runs: { total: 0, victories: 0, deaths: 0, bestScore: 0, totalScore: 0, lastScore: 0 }
            };
        }

        // D-174 v3 (2026-04-30 мҡ”н•ң): мә н”„ ліҙкҙҖн•Ё 7x20 к·ёлҰ¬л“ң вҖ” лӘЁл°”мқј м„ёлЎң нҸӯ 7 м Ғн•© + м•„лһҳлЎң нҷ•мһҘ.
        //   row 0-9 BASE нҷңм„ұ(70м№ё). row 10-19(н…җнҠё мҠ¬лЎҜ) м „мІҙ disabledлЎң мӢңмһ‘, лӢЁкі„л§ҲлӢӨ row 1мӨ„(=7м№ё) н’ҖлҰј.
        //   н’Җ н…җнҠё(Lv.10): нҷңм„ұ 70(BASE) + 70(н…җнҠё row 10мӨ„) = 140. мҳҒкө¬ disabled 0.
        function makeCampStorageInventory(tentLevel) {
            const ROWS = 20, COLS = 7;
            const TENT_ROW_START = 10;
            const tentDisabled = [];
            for (let y = TENT_ROW_START; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    tentDisabled.push({ x, y });
                }
            }
            const inv = new InventorySystem(ROWS, COLS, { disabled: tentDisabled });
            const lv = Math.max(0, Math.min(TENT_MAX_LEVEL, Number(tentLevel) || 0));
            if (lv > 0) inv.expandStorage(lv * 7);
            return inv;
        }

        // м§Ғл ¬нҷ” вҖ” InventorySystem.itemsл§Ң {type,x,y,rotation,durabilityLeft} л°°м—ҙлЎң ліҙмЎҙ.
        //   InventorySystem мқёмҠӨн„ҙмҠӨ мһҗмІҙлҘј JSON.stringifyн•ҳл©ҙ grid 2Dл°°м—ҙВ·class л©”нғҖк°Җ л”°лқјк°Җ
        //   ліөмӣҗ мӢң л©”м„ңл“ңк°Җ м—Ҷм–ҙм§„лӢӨ. itemsл§Ң м ҖмһҘ вҶ’ лЎңл“ң мӢң мғҲ мқёмҠӨн„ҙмҠӨ + placeItem ліөмӣҗ.
        // D-113: л¬ҙкё° durabilityLeft нҸ¬н•Ё. pack(к°Җл°©) мқёлІӨлҸ„ н•Ёк»ҳ м§Ғл ¬нҷ”.
        function serializeInvItems(inv) {
            if (!inv || !Array.isArray(inv.items)) return [];
            return inv.items.map(it => ({
                type: it.type,
                x: it.x,
                y: it.y,
                rotation: it.rotation || 0,
                ...(typeof it.durabilityLeft === 'number' ? { durabilityLeft: it.durabilityLeft } : {})
            }));
        }
        function serializeCampState(state) {
            if (!state) return null;
            // D-168: tentLevel мҡ°м„ , нҸҙл°ұмңјлЎң tentBuilt(boolean) ліҖнҷҳ. м–‘мӘҪ лҸҷмӢң м ҖмһҘмңјлЎң лӢӨмҡҙк·ёл Ҳмқҙл“ң нҳёнҷҳ.
            const tentLevel = (typeof state.tentLevel === 'number')
                ? Math.max(0, Math.min(TENT_MAX_LEVEL, state.tentLevel))
                : (state.tentBuilt ? 1 : 0);
            // D-174: buildingLevels { [id]: stage } + oneShotInventory { [key]: count }.
            const buildingLevels = (state.buildingLevels && typeof state.buildingLevels === 'object')
                ? { ...state.buildingLevels } : {};
            const oneShotInventory = (state.oneShotInventory && typeof state.oneShotInventory === 'object')
                ? { ...state.oneShotInventory } : {};
            return {
                version: 4,
                seenIntro: !!state.seenIntro,
                firstReturnDone: !!state.firstReturnDone,
                tentLevel,
                tentBuilt: tentLevel >= 1,
                buildingLevels,         // D-174
                oneShotInventory,       // D-174
                inventory: serializeInvItems(state.inventory),
                pack: serializeInvItems(state.pack),
                quests: {
                    active: (state.quests && state.quests.active) || [],
                    completed: (state.quests && state.quests.completed) || []
                },
                runs: {
                    total: Number((state.runs && state.runs.total) || 0),
                    victories: Number((state.runs && state.runs.victories) || 0),
                    deaths: Number((state.runs && state.runs.deaths) || 0),
                    bestScore: Number((state.runs && state.runs.bestScore) || 0),
                    totalScore: Number((state.runs && state.runs.totalScore) || 0),
                    lastScore: Number((state.runs && state.runs.lastScore) || 0)
                }
            };
        }

        // м•„мқҙн…ң н•ӯлӘ©мқ„ InventorySystem мқёмҠӨн„ҙмҠӨм—җ ліөмӣҗ.
        //   мўҢн‘ңк°Җ мң нҡЁн•ҳл©ҙ placeItemмңјлЎң, м•„лӢҲл©ҙ addItem(type)мңјлЎң нҸҙл°ұ.
        //   D-113: durabilityLeft ліҙмЎҙ. мқёмҠӨн„ҙмҠӨ м§Ғм ‘ placement (rotationВ·durability лӘЁл‘җ мң м§Җ).
        function restoreItemEntry(inv, entry) {
            if (!entry || !entry.type) return;
            const def = InventorySystem.resolveDef(entry.type) || InventorySystem.ITEMS[entry.type];
            if (!def || !def.shape) return;
            let shape = def.shape;
            const rot = Number(entry.rotation) || 0;
            for (let r = 0; r < (rot / 90) % 4; r++) {
                shape = inv.rotate90(shape);
            }
            const item = {
                id: Date.now() + Math.random(),
                type: entry.type,
                ...InventorySystem.ITEMS[entry.type],
                shape,
                rotation: rot,
                x: Number(entry.x) || 0,
                y: Number(entry.y) || 0
            };
            const resolved = InventorySystem.resolveDef(entry.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0)
                ? resolved.durability : null;
            if (maxDur != null) {
                item.durabilityLeft = (typeof entry.durabilityLeft === 'number')
                    ? Math.max(0, Math.min(maxDur, entry.durabilityLeft))
                    : maxDur;
            }
            if (inv.canPlace(shape, item.x, item.y)) {
                inv.placeItem(item);
                inv.items.push(item);
            } else {
                // мўҢн‘ң м¶©лҸҢВ·лІ”мң„ мҙҲкіј(мҳҲ: 8x12вҶ’12x8 л§Ҳмқҙк·ёл Ҳмқҙм…ҳ) вҶ’ л№Ҳ мһҗлҰ¬лЎң мһ¬л°°м№ҳ.
                const pos = inv.findEmptySpace(shape);
                if (pos) {
                    item.x = pos.x;
                    item.y = pos.y;
                    inv.placeItem(item);
                    inv.items.push(item);
                }
            }
        }

        // м—ӯм§Ғл ¬нҷ” вҖ” items л°°м—ҙмқ„ мғҲ 12x6 InventorySystemм—җ ліөмӣҗ.
        //   D-113: кё°мЎҙ 8x12 вҶ’ 12x8 л§Ҳмқҙк·ёл Ҳмқҙм…ҳ. мўҢн‘ң м¶©лҸҢ мӢң л№Ҳ мһҗлҰ¬лЎң мһҗлҸҷ мһ¬л°°м№ҳ.
        //   D-147: 12x8 вҶ’ 12x6. кё°мЎҙ м ҖмһҘліёмқҳ cols=7 мқҙмғҒ м•„мқҙн…ңмқҖ мўҢн‘ң л¶Җм Ғн•© вҶ’ restoreItemEntryк°Җ
        //     placeItem мӢӨнҢЁ мӢң л№ҲмһҗлҰ¬лЎң мһ¬л°°м№ҳ fallback (мһҲлӢӨл©ҙ).
        function deserializeCampState(raw) {
            if (!raw || typeof raw !== 'object') return null;
            // D-168: tentLevel мҡ°м„  ліөмӣҗ, м—Ҷмңјл©ҙ tentBuilt(boolean) нҸҙл°ұ.
            const tentLevelRestored = (typeof raw.tentLevel === 'number')
                ? Math.max(0, Math.min(TENT_MAX_LEVEL, raw.tentLevel))
                : (raw.tentBuilt ? 1 : 0);
            // D-174: buildingLevels / oneShotInventory ліөмӣҗ вҖ” v3 мқҙн•ҳ нҸҙл°ұ {}.
            const buildingLevels = (raw.buildingLevels && typeof raw.buildingLevels === 'object')
                ? { ...raw.buildingLevels } : {};
            const oneShotInventory = (raw.oneShotInventory && typeof raw.oneShotInventory === 'object')
                ? { ...raw.oneShotInventory } : {};

            // D-174: мә н”„ ліҙкҙҖн•Ё 12x7 + л§Ҳм§Җл§ү rowк°Җ н…җнҠё мҠ¬лЎҜ.
            //   кё°мЎҙ v3 12x6 м„ёмқҙлёҢ вҶ’ 12x7лЎң л§Ҳмқҙк·ёл Ҳмқҙм…ҳ. мўҢн‘ң к·ёлҢҖлЎң ліөмӣҗ к°ҖлҠҘ
            //   (cols=12 лҸҷмқј, rowsл§Ң 6вҶ’7лЎң лҠҳм–ҙлӮЁ, 0~5 rowлҠ” к·ёлҢҖлЎң мң нҡЁ).
            const inv = makeCampStorageInventory(tentLevelRestored);
            const itemsRaw = Array.isArray(raw.inventory) ? raw.inventory : [];
            for (const entry of itemsRaw) restoreItemEntry(inv, entry);

            // pack вҖ” л№Ңл”© ліҙл„ҲмҠӨ л°ҳмҳҒ(allCampBonuses).
            const stateForPack = { tentLevel: tentLevelRestored, buildingLevels };
            const pack = makePackInventory(getPackBonusSlots(stateForPack));
            const packRaw = Array.isArray(raw.pack) ? raw.pack : [];
            for (const entry of packRaw) restoreItemEntry(pack, entry);

            return {
                version: 4,
                seenIntro: !!raw.seenIntro,
                firstReturnDone: !!raw.firstReturnDone,
                tentLevel: tentLevelRestored,
                tentBuilt: tentLevelRestored >= 1,
                buildingLevels,
                oneShotInventory,
                inventory: inv,
                pack,
                quests: {
                    active: (raw.quests && Array.isArray(raw.quests.active)) ? raw.quests.active : [],
                    completed: (raw.quests && Array.isArray(raw.quests.completed)) ? raw.quests.completed : []
                },
                runs: {
                    total: Number((raw.runs && raw.runs.total) || 0),
                    victories: Number((raw.runs && raw.runs.victories) || 0),
                    deaths: Number((raw.runs && raw.runs.deaths) || 0),
                    bestScore: Number((raw.runs && raw.runs.bestScore) || 0),
                    totalScore: Number((raw.runs && raw.runs.totalScore) || 0),
                    lastScore: Number((raw.runs && raw.runs.lastScore) || 0)
                }
            };
        }

        // localStorage I/O вҖ” мӢӨнҢЁн•ҙлҸ„ кІҢмһ„мқҖ көҙлҹ¬к°Җм•ј н•Ё(мӢңнҒ¬лҰҝ лӘЁл“ң л“ұ).
        // D-163: л©”мқё вҶ’ л°ұм—… мҲңмңјлЎң мӢңлҸ„. л©”мқёмқҙ к№Ём ёлҸ„ м§Ғм „ м •мғҒк°’мңјлЎң ліөкө¬.
        function loadCampStateFromStorage() {
            try {
                const raw = localStorage.getItem(CAMP_STATE_KEY);
                if (raw) {
                    const result = deserializeCampState(JSON.parse(raw));
                    if (result) return result;
                }
            } catch (e) {
                console.warn('campState main load failed', e);
            }
            try {
                const rawBackup = localStorage.getItem(CAMP_STATE_BACKUP_KEY);
                if (rawBackup) {
                    const result = deserializeCampState(JSON.parse(rawBackup));
                    if (result) {
                        console.warn('campState restored from backup');
                        return result;
                    }
                }
            } catch (e) {
                console.warn('campState backup load failed', e);
            }
            return null;
        }
        function saveCampStateToStorage(state) {
            try {
                const next = JSON.stringify(serializeCampState(state));
                // м§Ғм „ л©”мқё к°’мқ„ л°ұм—…мңјлЎң нҡҢм „(к°ҷмқҖ к°’мқҙл©ҙ нҢЁмҠӨ).
                const prev = localStorage.getItem(CAMP_STATE_KEY);
                if (prev && prev !== next) {
                    try { localStorage.setItem(CAMP_STATE_BACKUP_KEY, prev); } catch {}
                }
                localStorage.setItem(CAMP_STATE_KEY, next);
            } catch (e) {
                console.warn('campState save failed', e);
            }
        }

        function App() {
            // мІ« л§ҲмҡҙнҠё: localStorage мһҲмңјл©ҙ мә н”„, м—Ҷмңјл©ҙ мқёнҠёлЎң.
            //   loadedлҠ” useRef-like н•ң лІҲл§Ң нҸүк°Җ вҖ” л‘җ useState lazy initializerк°Җ лҸҷмқј к°’мқ„ м°ёмЎ°.
            const initialLoadedRef = useRef(undefined);
            const getInitialLoaded = () => {
                if (initialLoadedRef.current === undefined) {
                    initialLoadedRef.current = loadCampStateFromStorage();
                }
                return initialLoadedRef.current;
            };
            const [campState, setCampState] = useState(() => getInitialLoaded() || makeInitialCampState());
            const [view, setView] = useState(() => (getInitialLoaded() ? 'camp' : 'intro'));
            // мІ« мә н”„ лҸ„м°© лӘЁлӢ¬мҡ© outcome ('victory'|'death'|null).
            const [pendingTentModal, setPendingTentModal] = useState(null);

            // campState ліҖнҷ” мӢңл§ҲлӢӨ м ҖмһҘ.
            useEffect(() => {
                saveCampStateToStorage(campState);
            }, [campState]);

            // [м •мӢ мқ„ м°ЁлҰ°лӢӨ] вҖ” мӢңлӮҳлҰ¬мҳӨ вҶ’ мІ« нғҗн—ҳ.
            const handleIntroDismiss = () => {
                setCampState(prev => ({ ...prev, seenIntro: true }));
                setView('play');
            };

            // нғҗн—ҳ кІ°кіј мІҳлҰ¬ вҖ” Gameмқҙ returnToCampм—җм„ң нҳём¶ң.
            //   payload: { outcome, runInventory, selectedIds?, runStats?, runFinal? }.
            //   - мҠ№лҰ¬: runInventory.items мӨ‘ selectedIds(мһҲмңјл©ҙ)л§Ң мә н”„ мқёлІӨм—җ addItem, м—Ҷмңјл©ҙ м „мІҙ.
            //   - мӮ¬л§қ: мқёлІӨ 0 мқёмһ….
            //   - мІ« мә н”„ ліөк·Җ(firstReturnDone=false)л©ҙ н…җнҠё нҖҳмҠӨнҠё л¶Җм—¬ + TentQuestModal.
            //   D-110: runStats + runFinalлЎң calculateRunScore вҶ’ bestScore/totalScore/lastScore к°ұмӢ .
            const handleRunEnd = (payload) => {
                const outcome = (payload && payload.outcome) || 'death';
                const runInv = payload && payload.runInventory;
                const selectedIds = payload && payload.selectedIds;  // null|undefined вҶ’ м „мІҙ
                const runStats = (payload && payload.runStats) || { l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 };
                const runFinal = (payload && payload.runFinal) || {};
                const isFirstReturn = !campState.firstReturnDone;

                // D-110: мқёмһ…н•  м•„мқҙн…ң лӘ©лЎқ кІ°м •. selectedIdsк°Җ л°°м—ҙмқҙл©ҙ н•„н„°л§Ғ, к·ё мҷём—” м „мІҙ.
                const itemsAll = (runInv && Array.isArray(runInv.items)) ? runInv.items : [];
                const itemsToTransfer = (outcome === 'victory')
                    ? (Array.isArray(selectedIds)
                        ? itemsAll.filter(it => it && selectedIds.includes(it.id))
                        : itemsAll)
                    : [];

                // м җмҲҳ кі„мӮ° вҖ” мқёмһ…н•ң м•„мқҙн…ң кё°мӨҖ.
                const score = calculateRunScore({
                    victory: outcome === 'victory',
                    uniqueTilesVisited: runFinal.uniqueTilesVisited,
                    detection: runFinal.detection,
                    items: itemsAll,
                    runStats,
                    selectedItems: itemsToTransfer
                });

                setCampState(prev => {
                    // мә н”„ мқёлІӨ мқёмҠӨн„ҙмҠӨ м§Ғм ‘ ліҖнҳ•(к°ҷмқҖ м°ёмЎ° мң м§Җ). React мһ¬л ҢлҚ”лҠ” ...prev к°қмІҙ мғҲлЎң л§Ңл“Өм–ҙм„ң нҠёлҰ¬кұ°.
                    // D-113: мқёмҠӨн„ҙмҠӨ м§Ғм ‘ placement вҖ” durabilityLeft / rotation ліҙмЎҙ.
                    //   мә н”„ мқёлІӨмқҖ disabled м…Җ м—ҶмқҢ вҶ’ л№Ҳ мһҗлҰ¬ м°ҫм•„ мғҲ мўҢн‘ңлЎң мһ¬л°°м№ҳ.
                    const camp = prev.inventory;
                    for (const it of itemsToTransfer) {
                        if (!it || !it.type) continue;
                        const def = InventorySystem.resolveDef(it.type) || InventorySystem.ITEMS[it.type] || {};
                        const shape = it.shape || (def.shape ? def.shape : null);
                        if (!shape) { camp.addItem(it.type); continue; }
                        const pos = camp.findEmptySpace(shape);
                        if (!pos) continue; // мә н”„ мқёлІӨ к°Җл“қ вҖ” л¬ҙмӢң(м¶”нӣ„: м•ҲлӮҙ).
                        const placed = {
                            ...it,
                            id: Date.now() + Math.random(), // мә н”„ мёЎ мғҲ idлЎң(м „ лҹ°кіј м¶©лҸҢ л°©м§Җ).
                            x: pos.x,
                            y: pos.y
                        };
                        camp.placeItem(placed);
                        camp.items.push(placed);
                    }
                    const next = {
                        ...prev,
                        runs: {
                            total: prev.runs.total + 1,
                            victories: prev.runs.victories + (outcome === 'victory' ? 1 : 0),
                            deaths: prev.runs.deaths + (outcome === 'death' ? 1 : 0),
                            bestScore: Math.max(Number(prev.runs.bestScore) || 0, score),
                            totalScore: (Number(prev.runs.totalScore) || 0) + score,
                            lastScore: score
                        }
                    };
                    if (isFirstReturn) {
                        // D-148: мһҗлҸҷ нҖҳмҠӨнҠё л¶Җм—¬ м ңкұ°. мә н”„м—җм„ң [л°ӣкё°] лІ„нҠјмңјлЎң лӘ…мӢң мҲҳл №.
                        next.firstReturnDone = true;
                    }
                    return next;
                });
                setView('camp');
            };

            // [нғҗн—ҳ л– лӮҳкё°]
            // D-113: мә н”„ pack(к°Җл°©) вҶ’ нғҗн—ҳ мқёлІӨ мқёкі„.
            //   packмқҳ InventorySystem мқёмҠӨн„ҙмҠӨлҘј к·ёлҢҖлЎң Gameм—җ л„ҳкёҙлӢӨ(м•„мқҙн…ң к°қмІҙ м „мІҙ ліҙмЎҙ = durabilityLeft/rotation мң м§Җ).
            //   campState.packмқҖ мғҲ л№Ҳ мқёлІӨмңјлЎң көҗмІҙ вҖ” л“Өкі  к°”мңјлӢҲ мә н”„м—” л№„мӣҖ.
            //   нғҗн—ҳ мӨ‘ мқёлІӨмқҙ кі§ к°Җл°©мқҳ нӣ„мҶҚ(нғҗн—ҳм—җм„ң нҡҚл“қн•ң м•„мқҙн…ңл“Өмқҙ м¶”к°ҖлҗЁ).
            //   handleRunEndк°Җ мҠ№лҰ¬ мӢң к·ё мқёлІӨмқ„ ліҙкҙҖн•ЁмңјлЎң мқёмһ…. мӮ¬л§қ мӢң нҸҗкё°.
            const [departInv, setDepartInv] = useState(null);
            const handleDepart = () => {
                const carried = campState.pack;
                // D-174: reward_run_start вҖ” мҷ„м„ұлҗң л№Ңл”©л“Өмқҳ л§Ө-нғҗн—ҳ мӢңмһ‘ мһҗлҸҷ мқёмһ… м•„мқҙн…ң.
                //   к°Ғ л№Ңл”©мқҳ нҳ„мһ¬ stage reward_run_startлҘј н•©мӮ°н•ҙ к°Җл°© л№ҲмһҗлҰ¬м—җ мқёмһ….
                //   к°Җл“қмқҙл©ҙ л“Өм–ҙк°Ҳ л§ҢнҒјл§Ң(лӮҳлЁём§ҖлҠ” л¬ҙмӢң вҖ” мӮ¬мҡ©мһҗ мҶҗмӢӨ л©”мӢңм§ҖлҠ” нҶ мҠӨнҠё X, D-176+м—җм„ң ліҙк°•).
                if (carried) {
                    const runStart = collectRunStartItems(campState.buildingLevels || {});
                    for (const { type, count } of runStart) {
                        for (let i = 0; i < count; i++) {
                            const ok = carried.addItem(type);
                            if (!ok) break;
                        }
                    }
                }
                setDepartInv(carried || null);
                // D-148/D-168/D-174: мғҲ л№Ҳ packмқҖ buildingLevels+tentLevel н•©мӮ° ліҙл„ҲмҠӨ л°ҳмҳҒ.
                setCampState(prev => ({ ...prev, pack: makePackInventory(getPackBonusSlots(prev)) }));
                setView('play');
            };

            // н…җнҠё нҖҳмҠӨнҠё мҷ„лЈҢ м•ҢлҰј л©”мӢңм§Җ вҖ” App л ҲлІЁ нҶ мҠӨнҠё лҢҖмӢ  к°ҖлІјмҡҙ лӘЁлӢ¬.
            const [questCompleteMsg, setQuestCompleteMsg] = useState(null);

            // [мҷ„мҲҳ] вҖ” мһ¬лЈҢ м°Ёк°җ + completed мқҙлҸҷ + м•ҢлҰј.
            //   мһ¬лЈҢ ліҙмң лҹү мһ¬нҷ•мқё(л ҲмқҙмҠӨ к°Җл“ң). л¶ҖмЎұн•ҳл©ҙ л¬ҙмӢң(лІ„нҠјмқҖ disabledм—¬м•ј н•Ё).
            // D-174: л№Ңл”© 6мў… 'bld_<id>_<stage>' л¶„кё° вҖ” мӢңнҠё cost(н•ңкёҖ) м°Ёк°җ + buildingLevels к°ұмӢ 
            //        + reward_items(ліҙкҙҖн•Ё мқёмһ…) + reward_one_shot(лҲ„м Ғ). reward_passive/run_startлҠ” лҸҷм Ғ мӮ°м¶ң.
            const handleCompleteQuest = (questId) => {
                if (typeof questId !== 'string') return;
                const inv = campState.inventory;
                if (!inv) return;

                // л№Ңл”© л¶„кё° в”Җв”Җ 'bld_<id>_<stage>'
                if (questId.startsWith('bld_')) {
                    const m = questId.match(/^bld_([a-z_]+)_(\d+)$/);
                    if (!m) return;
                    const bId = m[1];
                    const bStage = Number(m[2]) || 0;
                    const bDef = getBuildingDef(bId, bStage);
                    if (!bDef) return;

                    // мӢңнҠё cost(н•ңкёҖ) вҶ’ мҳҒл¬ё id ліҖнҷҳ + м°Ёк°җ к°Җл“ң.
                    const costEntries = []; // [{id, count, koName}]
                    for (const c of (bDef.cost || [])) {
                        const koName = c && c.material;
                        const cnt = Number(c && c.count) || 0;
                        if (!koName || cnt <= 0) continue;
                        const idEn = InventorySystem.findIdByKoreanName(koName);
                        if (!idEn) {
                            console.warn(`[handleCompleteQuest] л№Ңл”© cost лҜёл§Өм№ӯ: "${koName}" (${questId})`);
                            return; // л§Өн•‘ мӢӨнҢЁл©ҙ м§„н–ү кұ°л¶Җ вҖ” кІҢмһ„ нҒ¬лһҳмӢң нҡҢн”ј.
                        }
                        costEntries.push({ id: idEn, count: cnt, koName });
                    }
                    // ліҙмң лҹү к°Җл“ң (л ҲмқҙмҠӨ).
                    for (const e of costEntries) {
                        const have = inv.items.filter(it => it.type === e.id).length;
                        if (have < e.count) return;
                    }
                    // м°Ёк°җ.
                    for (const e of costEntries) {
                        let remaining = e.count;
                        const keep = [];
                        for (const it of inv.items) {
                            if (remaining > 0 && it.type === e.id) {
                                inv.removeItem(it);
                                remaining -= 1;
                                continue;
                            }
                            keep.push(it);
                        }
                        inv.items = keep;
                    }
                    // reward_items вҖ” ліҙкҙҖн•Ём—җ мқёмһ…(к°Җл“қмқҙл©ҙ нҶ мҠӨнҠёлЎңл§Ң м•ҢлҰј).
                    let overflowed = 0;
                    for (const { type, count } of parseRewardItems(bDef.reward_items || '')) {
                        for (let i = 0; i < count; i++) {
                            const ok = inv.addItem(type);
                            if (!ok) overflowed += 1;
                        }
                    }

                    setCampState(prev => {
                        const next = { ...prev };
                        next.buildingLevels = { ...(prev.buildingLevels || {}), [bId]: bStage };
                        // reward_one_shot вҖ” лҲ„м Ғ м ҖмһҘл§Ң (мӮ¬мҡ© мӢңм җмқҖ D-176+).
                        const oneShotAdds = parseOneShot(bDef.reward_one_shot || '');
                        if (oneShotAdds.length > 0) {
                            const merged = { ...(prev.oneShotInventory || {}) };
                            for (const { key, count } of oneShotAdds) {
                                merged[key] = (Number(merged[key]) || 0) + count;
                            }
                            next.oneShotInventory = merged;
                        }
                        // pack ліҙл„ҲмҠӨ ліҖкІҪ к°ҖлҠҘм„ұ вҖ” pack+ нҡЁкіј мҰүмӢң л°ҳмҳҒ.
                        const newBonus = getPackBonusSlots(next);
                        const prevBonus = getPackBonusSlots(prev);
                        if (newBonus !== prevBonus) {
                            const newPack = makePackInventory(newBonus);
                            const oldItems = (prev.pack && Array.isArray(prev.pack.items)) ? prev.pack.items.slice() : [];
                            for (const it of oldItems) {
                                if (newPack.canPlace(it.shape, it.x, it.y)) {
                                    newPack.placeItem(it);
                                    newPack.items.push(it);
                                } else {
                                    const pos = newPack.findEmptySpace(it.shape);
                                    if (pos) {
                                        it.x = pos.x; it.y = pos.y;
                                        newPack.placeItem(it);
                                        newPack.items.push(it);
                                    }
                                }
                            }
                            next.pack = newPack;
                        }
                        // л№Ңл”© л¶„кё°лҠ” quests.activeм—җ м•Ҳ л“Өм–ҙк°ҖлҠ” лӢЁл°ң м•Ўм…ҳ(нҳ„мһ¬ нқҗлҰ„) вҖ” moved мІҳлҰ¬ м—ҶмқҢ.
                        // лӢЁ, н–Ҙнӣ„ questsм—җ л“ұлЎқлҗң кІҪмҡ° нҳёнҷҳмқ„ мң„н•ҙ active/completed мқҙлҸҷ мӢңлҸ„.
                        const active = (prev.quests && prev.quests.active || []).filter(q => q.id !== questId);
                        const moved = (prev.quests && prev.quests.active || []).find(q => q.id === questId);
                        next.quests = {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : (prev.quests && prev.quests.completed) || []
                        };
                        return next;
                    });

                    const baseMsg = `${bDef.icon || ''} ${bDef.name} Lv.${bStage} мҷ„м„ұ.`;
                    setQuestCompleteMsg(overflowed > 0 ? `${baseMsg} (ліҙкҙҖн•Ёмқҙ к°Җл“қ м°Ё ${overflowed}к°ң л¶„мӢӨ)` : baseMsg);
                    return;
                }

                // н…җнҠё л¶„кё° в”Җв”Җ 'tent_N' (D-168 нҳёнҷҳ).
                const def = getTentQuestDef(questId);
                if (!def) return;
                const reqs = def.requirements || {};
                for (const [type, need] of Object.entries(reqs)) {
                    const have = inv.items.filter(it => it.type === type).length;
                    if (have < need) return;
                }
                for (const [type, need] of Object.entries(reqs)) {
                    let remaining = need;
                    const keep = [];
                    for (const it of inv.items) {
                        if (remaining > 0 && it.type === type) {
                            inv.removeItem(it);
                            remaining -= 1;
                            continue;
                        }
                        keep.push(it);
                    }
                    inv.items = keep;
                }
                // D-174 v3: н…җнҠё лӢЁкі„ вҶ’ ліҙкҙҖн•Ё row 1мӨ„(7м№ё) н’Җкё°.
                inv.expandStorage(7);
                setCampState(prev => {
                    const active = prev.quests.active.filter(q => q.id !== questId);
                    const moved = prev.quests.active.find(q => q.id === questId);
                    const next = {
                        ...prev,
                        quests: {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : prev.quests.completed
                        }
                    };
                    next.tentLevel = Math.max(prev.tentLevel || 0, def.level);
                    next.tentBuilt = next.tentLevel >= 1;
                    // D-174: н…җнҠёлҠ” buildingLevelsм—җлҸ„ лҸҷкё° л°ҳмҳҒ(allCampBonusesм—җм„ң мқҪм§Җ м•Ҡм§Җл§Ң нҶөмқјм„ұ).
                    next.buildingLevels = { ...(prev.buildingLevels || {}), tent: next.tentLevel };
                    return next;
                });
                // D-174 v3: н…җнҠё ліҙмғҒмқҖ ліҙкҙҖн•Ё н•ң мӨ„(7м№ё)лЎң лӢЁмқјнҷ”.
                let msg = `н…җнҠё Lv.${def.level} мҷ„м„ұ. ${def.rewardLabel}.`;
                if (def.level === 1) msg = 'н…җнҠё мһҗлҰ¬лҘј мһЎм•ҳлӢӨ. ліҙкҙҖн•Ёмқҙ н•ң мӨ„ лҚ” к№Ҡм–ҙмЎҢлӢӨ.';
                setQuestCompleteMsg(msg);
            };

            // [лҚ°мқҙн„° мҙҲкё°нҷ”] вҖ” localStorage л©”мқё+л°ұм—… мӮӯм ң + мҙҲкё° мғҒнғң + мӢңлӮҳлҰ¬мҳӨл¶Җн„°.
            const handleResetData = () => {
                try {
                    localStorage.removeItem(CAMP_STATE_KEY);
                    localStorage.removeItem(CAMP_STATE_BACKUP_KEY);
                } catch {}
                setCampState(makeInitialCampState());
                setPendingTentModal(null);
                setQuestCompleteMsg(null);
                setDepartInv(null);
                setView('intro');
            };

            if (view === 'intro') {
                return <IntroScenarioScreen onDismiss={handleIntroDismiss} />;
            }
            if (view === 'play') {
                return (
                    <Game
                        onRunEnd={handleRunEnd}
                        initialInventory={departInv}
                        activeQuests={(campState && campState.quests && campState.quests.active) || []}
                        campState={campState}
                    />
                );
            }
            // camp
            return (
                <>
                    <CampScreen
                        campState={campState}
                        onDepart={handleDepart}
                        onCompleteQuest={handleCompleteQuest}
                        onTakeQuest={(questId) => {
                            // D-148: [л°ӣкё°] вҖ” quests.activeм—җ м¶”к°Җ. мқҙлҜё active/completedл©ҙ л¬ҙмӢң.
                            setCampState(prev => {
                                const taken = new Set([
                                    ...((prev.quests && prev.quests.active) || []).map(q => q.id),
                                    ...((prev.quests && prev.quests.completed) || []).map(q => q.id)
                                ]);
                                if (taken.has(questId)) return prev;
                                return {
                                    ...prev,
                                    quests: {
                                        active: [...(prev.quests.active || []), { id: questId, progress: {} }],
                                        completed: prev.quests.completed || []
                                    }
                                };
                            });
                        }}
                        onResetData={handleResetData}
                        onInventoryChange={() => setCampState(prev => ({ ...prev }))}
                    />
                    {pendingTentModal && (
                        <TentQuestModal
                            outcome={pendingTentModal}
                            onDismiss={() => setPendingTentModal(null)}
                        />
                    )}
                    {questCompleteMsg && (
                        <div className="modal" style={{ zIndex: 3400 }}>
                            <div style={{
                                background: '#1a1a2e',
                                color: '#eee',
                                padding: '24px 22px',
                                borderRadius: '10px',
                                border: '1px solid #d4b84a',
                                maxWidth: '360px',
                                width: '90vw',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', marginBottom: '10px' }}>рҹҸ•пёҸ</div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, marginBottom: '18px' }}>
                                    {questCompleteMsg}
                                </div>
                                <button
                                    onClick={() => setQuestCompleteMsg(null)}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    нҷ•мқё
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));

        // D-41 (2026-04-23 мҡ”н•ң м§ҖмӢң): кІҢмһ„ мҳҒм—ӯ лӮҙл¶Җмқҳ contextmenu(мҡ°нҒҙлҰӯ/лЎұн”„л ҲмҠӨ)
        // кё°ліё лҸҷмһ‘ м°ЁлӢЁ. CSS user-select:noneл§ҢмңјлЎңлҠ” iOS Safari лЎұн”„л ҲмҠӨ ліөмӮ¬ л©”лүҙк°Җ
        // лңЁлҠ” кІҪмҡ°к°Җ мһҲм–ҙ JS л ҲлІЁм—җм„ңлҸ„ л§үлҠ”лӢӨ.
        // input/textarea/contentEditableмқҖ м ңмҷё вҖ” н…ҚмҠӨнҠё м„ нғқВ·л¶ҷм—¬л„Јкё° м»Ён…ҚмҠӨнҠёк°Җ н•„мҡ”.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
