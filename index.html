        // D-168 (2026-04-29 요한): 텐트 레벨 시스템 (Lv.1~10).
        // D-174 (2026-04-30): 텐트는 "보관함 슬롯 확장" 단일 역할로 환원.
        //   모든 단계 rewardType='camp_storage' (보관함 +7칸 = row 1줄). health/hunger/pack 보너스는 빌딩 6종으로 이관.
        //   questId 'tent_N' → 빌딩 어댑터에서 id='tent', stage=N으로 매핑. (`bld_tent_<N>`도 호환 — 신규 표기.)
        const TENT_LEVEL_DEFS = [
            null,
            { level: 1,  name: '텐트 세우기',              icon: '🏕️', rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 6,  stone: 4, stem: 4 } },
            { level: 2,  name: '텐트 보강 — 깔개 깔기',     icon: '🛌',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 8,  stone: 6, stem: 5 } },
            { level: 3,  name: '텐트 보강 — 식료 칸 잇기',  icon: '🍱',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 6,  stem: 4,  stone_block: 1 } },
            { level: 4,  name: '텐트 확장 — 짐칸 증축',     icon: '🎒',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { stem: 6,    branch: 4, stone_block: 2 } },
            { level: 5,  name: '텐트 보강 — 골조 보수',     icon: '🔧',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 8,  stem: 6,   stone_block: 2 } },
            { level: 6,  name: '텐트 보강 — 저장창 만들기', icon: '📦',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { stem: 8,    stone_block: 3 } },
            { level: 7,  name: '텐트 확장 — 외벽 두르기',   icon: '🧱',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 10, stone_block: 4 } },
            { level: 8,  name: '텐트 보강 — 침소 정비',     icon: '🛏️', rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { stem: 8,    stone_block: 5 } },
            { level: 9,  name: '텐트 보강 — 식량창 확장',   icon: '🥘',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { branch: 12, stone_block: 6 } },
            { level: 10, name: '텐트 완성 — 영구 거점',     icon: '🏠',  rewardType: 'camp_storage', rewardLabel: '보관함 +7칸', requirements: { stem: 10,   stone_block: 8 } }
        ];
        const TENT_MAX_LEVEL = 10;
        const BASE_MAX_HEALTH = 6;
        const BASE_MAX_HUNGER = 10;
        // D-174 v3 (2026-04-30): 캠프 보관함 BASE — 7x20 그리드 (모바일 가로 7칸 적합).
        //   row 0-9(BASE 활성 70칸) + row 10-19(텐트 슬롯, 단계마다 row 1줄=7칸 풀림).
        //   tentLevel=10이면 활성 140, 영구 disabled 0.
        const BASE_CAMP_STORAGE_SLOTS = 70;

        // D-174: 단일 빌딩 단계 reward_passive를 키별 합산. 단계간 누적 X.
        //   id==='tent'면 단계당 camp_storage+7 (D-174 v3 — 폭 7 row 1줄).
        //   그 외는 시트 BUILDINGS reward_passive DSL 파싱.
        function buildingBonuses(id, stage) {
            const lv = Number(stage) || 0;
            if (lv <= 0) return {};
            if (id === 'tent') {
                // 텐트는 단계마다 camp_storage+7 (row 1줄) — TENT_LEVEL_DEFS 누적 = lv*7칸.
                return { camp_storage: 7 };
            }
            const def = getBuildingDef(id, lv);
            if (!def) return {};
            const out = {};
            for (const { key, delta } of parsePassive(def.reward_passive || '')) {
                out[key] = (out[key] || 0) + delta;
            }
            return out;
        }

        // D-174: 모든 빌딩(텐트 포함) 누적 보너스. 텐트는 1~tentLevel 합 = camp_storage:tentLevel.
        //   campState.buildingLevels: { [id]: stage } — id 'clinic'/'kitchen'/...
        //   campState.tentLevel: 텐트 단계 (0..10).
        function allCampBonuses(campState) {
            const out = {
                health_max: 0, hunger_max: 0, pack: 0, deck_size: 0,
                evade: 0, accuracy: 0, detection: 0, armor: 0, camp_storage: 0
            };
            if (!campState) return out;
            // 텐트: 1~tentLevel 누적 (단계마다 camp_storage+7 — D-174 v3 폭 7 row 1줄).
            const tentLv = Math.max(0, Math.min(TENT_MAX_LEVEL, Number(campState.tentLevel) || 0));
            out.camp_storage += tentLv * 7;
            // 빌딩 6종: 현재 stage 한 줄만 산출 (단계간 누적 X — 시트 정의가 누적값).
            const levels = (campState.buildingLevels && typeof campState.buildingLevels === 'object')
                ? campState.buildingLevels : {};
            for (const [id, stage] of Object.entries(levels)) {
                if (id === 'tent') continue; // 텐트는 위에서 처리.
                const lv = Number(stage) || 0;
                if (lv <= 0) continue;
                const b = buildingBonuses(id, lv);
                for (const [k, v] of Object.entries(b)) {
                    out[k] = (out[k] || 0) + v;
                }
            }
            return out;
        }

        function getMaxHealth(campState) { return BASE_MAX_HEALTH + allCampBonuses(campState).health_max; }
        function getMaxHunger(campState) { return BASE_MAX_HUNGER + allCampBonuses(campState).hunger_max; }
        function getPackBonusSlots(campState) { return allCampBonuses(campState).pack; }
        function getCampStorageSlots(campState) { return BASE_CAMP_STORAGE_SLOTS + allCampBonuses(campState).camp_storage; }

        // 'tent_N' questId 식별/조회 헬퍼 — campState.quests.active.id는 'tent_1' 같은 문자열.
        function isTentQuestId(qid) {
            return typeof qid === 'string' && qid.startsWith('tent_');
        }
        function tentLevelFromQuestId(qid) {
            if (!isTentQuestId(qid)) return null;
            const n = Number(qid.slice(5));
            return (Number.isFinite(n) && n >= 1 && n <= TENT_MAX_LEVEL) ? n : null;
        }
        function getTentQuestDef(qid) {
            const lv = tentLevelFromQuestId(qid);
            if (lv == null) return null;
            const base = TENT_LEVEL_DEFS[lv];
            if (!base) return null;
            return { ...base, id: qid };
        }

        // 다음 레벨업 퀘스트 정의(아직 시작 안 한 단계). currentTentLevel=0이면 Lv.1, 1이면 Lv.2…
        // 이미 max(10)이면 null. 이 헬퍼가 빌딩 카드 모달의 [수락] 대상 퀘스트를 결정한다.
        function getNextTentQuest(currentTentLevel) {
            const lv = (Number(currentTentLevel) || 0) + 1;
            if (lv > TENT_MAX_LEVEL) return null;
            const base = TENT_LEVEL_DEFS[lv];
            if (!base) return null;
            return { ...base, id: `tent_${lv}` };
        }

        // ── D-174 빌딩 시트 SSOT 통합 헬퍼 ────────────────────────────────
        //
        // 시트 산출 `data/buildings.json` (window.TTD_DATA.BUILDINGS) 18행을 코드에서 소비.
        // 빌딩 6종(clinic/kitchen/workshop/storage/training/watchtower) × 3단계 + 텐트(id='tent') × 10단계.

        // 빌딩 id → 카드 아이콘 매핑.
        const BUILDING_ICON = {
            tent: '🏕️',
            clinic: '🏥',
            kitchen: '🔥',
            workshop: '🛠️',
            storage: '🏚️',
            training: '🏹',
            watchtower: '🗼'
        };

        // 보상 패시브 키 화이트리스트 (9종). parsePassive에서 사용.
        const PASSIVE_KEYS = new Set([
            'health_max', 'hunger_max', 'pack', 'deck_size',
            'evade', 'accuracy', 'detection', 'armor', 'camp_storage'
        ]);
        // 일회성 효과 키 화이트리스트 (7종). parseOneShot에서 사용.
        const ONE_SHOT_KEYS = new Set([
            'peek_boss', 'weather_forecast', 'safe_move',
            'heal_on_return', 'feed_on_return', 'repair_kit', 'revive'
        ]);

        // "붕대 x1, 약초 x2" → [{type:'bandage',count:1}, {type:'herb',count:2}].
        // 미매칭 토큰은 console.warn + 스킵.
        function parseRewardItems(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^(.+?)\s*[xX×]\s*(\d+)$/);
                if (!m) continue;
                const koName = m[1].trim();
                const count = Number(m[2]) || 0;
                if (count <= 0) continue;
                const id = (typeof InventorySystem !== 'undefined' && typeof InventorySystem.findIdByKoreanName === 'function')
                    ? InventorySystem.findIdByKoreanName(koName) : null;
                if (!id) {
                    console.warn(`[parseRewardItems] 미매칭 한글 자원: "${koName}"`);
                    continue;
                }
                out.push({ type: id, count });
            }
            return out;
        }

        // "health_max+1, accuracy+2, detection-1" → [{key,delta}].
        function parsePassive(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^([a-z_]+)\s*([+-])\s*(\d+)$/);
                if (!m) continue;
                const key = m[1];
                const sign = m[2] === '-' ? -1 : 1;
                const delta = sign * (Number(m[3]) || 0);
                if (!PASSIVE_KEYS.has(key)) {
                    console.warn(`[parsePassive] 미허용 키: "${key}"`);
                    continue;
                }
                out.push({ key, delta });
            }
            return out;
        }

        // "heal_on_return+2, repair_kit+1" → [{key,count}].
        function parseOneShot(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^([a-z_]+)\s*\+\s*(\d+)$/);
                if (!m) continue;
                const key = m[1];
                const count = Number(m[2]) || 0;
                if (count <= 0) continue;
                if (!ONE_SHOT_KEYS.has(key)) {
                    console.warn(`[parseOneShot] 미허용 키: "${key}"`);
                    continue;
                }
                out.push({ key, count });
            }
            return out;
        }

        // 빌딩 1단계 정의. id==='tent'면 TENT_LEVEL_DEFS 기반 Def-shape 변환,
        // 그 외는 시트 BUILDINGS 행을 그대로(+icon 보강).
        // 반환: { id, name, stage, cost, cost_raw, effect_raw,
        //         reward_items, reward_passive, reward_run_start, reward_one_shot, icon } | null
        function getBuildingDef(id, stage) {
            const lv = Number(stage) || 0;
            if (!id || lv <= 0) return null;
            if (id === 'tent') {
                if (lv > TENT_MAX_LEVEL) return null;
                const base = TENT_LEVEL_DEFS[lv];
                if (!base) return null;
                // requirements(영문 id 기준) → cost-shape (한글) 변환은 없음 — 텐트는 별도 모달 분기.
                return {
                    id: 'tent',
                    name: base.name,
                    stage: lv,
                    cost: [], // 텐트는 requirements(영문 id) 사용 — bld_*_* 분기에서 미사용.
                    cost_raw: '',
                    effect_raw: '',
                    reward_items: '',
                    reward_passive: 'camp_storage+7',
                    reward_run_start: '',
                    reward_one_shot: '',
                    icon: base.icon || BUILDING_ICON.tent,
                    // 텐트 전용 — 한글 id 기반 requirements를 그대로 노출 (TentQuestModal 호환).
                    requirements: base.requirements || {},
                    rewardLabel: base.rewardLabel,
                    level: lv
                };
            }
            const bundle = (typeof window !== 'undefined' && window.TTD_DATA && Array.isArray(window.TTD_DATA.BUILDINGS))
                ? window.TTD_DATA.BUILDINGS : [];
            const row = bundle.find(b => b && b.id === id && Number(b.stage) === lv);
            if (!row) return null;
            return {
                id: row.id,
                name: row.name || id,
                stage: lv,
                cost: Array.isArray(row.cost) ? row.cost : [],
                cost_raw: row.cost_raw || '',
                effect_raw: row.effect_raw || '',
                reward_items: row.reward_items || '',
                reward_passive: row.reward_passive || '',
                reward_run_start: row.reward_run_start || '',
                reward_one_shot: row.reward_one_shot || '',
                icon: BUILDING_ICON[id] || '🏗️'
            };
        }

        // 다음 단계 빌딩 def. id==='tent'이면 getNextTentQuest 위임(+ id='tent' 보강).
        function getNextBuildingStage(id, currentStage) {
            const next = (Number(currentStage) || 0) + 1;
            if (id === 'tent') {
                if (next > TENT_MAX_LEVEL) return null;
                return getBuildingDef('tent', next);
            }
            return getBuildingDef(id, next);
        }

        // 빌딩 id의 max stage. tent=10, 시트 빌딩 = 매칭 행 개수(없으면 0).
        function getMaxStage(id) {
            if (id === 'tent') return TENT_MAX_LEVEL;
            const bundle = (typeof window !== 'undefined' && window.TTD_DATA && Array.isArray(window.TTD_DATA.BUILDINGS))
                ? window.TTD_DATA.BUILDINGS : [];
            let max = 0;
            for (const b of bundle) {
                if (b && b.id === id) {
                    const s = Number(b.stage) || 0;
                    if (s > max) max = s;
                }
            }
            return max;
        }

        // 모든 빌딩의 현재 stage reward_run_start 합산 → [{type, count}].
        // handleDepart에서 매 [탐험 떠나기] 시 가방에 자동 인입.
        function collectRunStartItems(buildingLevels) {
            const out = [];
            const levels = (buildingLevels && typeof buildingLevels === 'object') ? buildingLevels : {};
            for (const [id, stage] of Object.entries(levels)) {
                if (id === 'tent') continue; // 텐트는 reward_run_start 없음.
                const lv = Number(stage) || 0;
                if (lv <= 0) continue;
                const def = getBuildingDef(id, lv);
                if (!def) continue;
                for (const entry of parseRewardItems(def.reward_run_start || '')) {
                    out.push(entry);
                }
            }
            return out;
        }

        // 기존 TENT_QUEST 호환 — D-114 ActiveQuestHUDPanel/handleCompleteQuest 등에서 직접 참조 중인 곳을
        //   getTentQuestDef로 동적 조회하도록 점진 이행. 이 alias는 Lv.1 시드값으로만 사용.
        const TENT_QUEST = {
            id: 'tent_1',
            name: TENT_LEVEL_DEFS[1].name,
            icon: TENT_LEVEL_DEFS[1].icon,
            requirements: TENT_LEVEL_DEFS[1].requirements
        };

        // D-114 (2026-04-24): 게임 화면 우상단에 떠 있는 진행 중 퀘스트 HUD.
        //   - activeQuests: campState.quests.active (App→Game 전달).
        //   - inventoryItems: 현재 런 가방의 inventory.items.
        //   - 현 시점에 정의된 퀘스트는 TENT_QUEST 한 종이라 첫 번째만 표시.
        //   - 진행도는 캠프 인벤이 아니라 "탐험 중 가방"(현 런 인벤)으로 실시간 카운트.
        //     캠프 [완수] 버튼은 별도로 캠프 보관함을 본다(handleCompleteQuest).
        //   - active 비어있으면 null 반환 → 패널 자체 미마운트.
        function ActiveQuestHUDPanel({ activeQuests, inventoryItems }) {
            // D-142: 터치로 접기/펼치기 토글. 기본 펼침 상태.
            // D-177: 단일 active → 다중 active 표시(텐트+빌딩 동시). 상한은 정책상 텐트 1 + 빌딩 6 = 7개.
            //   각 quest를 아이콘+이름+요구재료 row 묶음으로 노출. 접힘 시 헤더만.
            const [collapsed, setCollapsed] = React.useState(false);
            if (!Array.isArray(activeQuests) || activeQuests.length === 0) return null;

            // 각 quest id를 통일된 형태로 변환 — 텐트와 빌딩 양쪽 처리.
            const items = Array.isArray(inventoryItems) ? inventoryItems : [];
            const countOfType = (type) => items.filter(it => it && it.type === type).length;
            const cards = activeQuests.map(quest => {
                if (!quest || !quest.id) return null;
                const id = String(quest.id);
                if (id.startsWith('bld_')) {
                    const m = id.match(/^bld_([a-z_]+)_(\d+)$/);
                    if (!m) return null;
                    const def = getBuildingDef(m[1], Number(m[2]));
                    if (!def) return null;
                    const rows = (def.cost || []).map(c => {
                        const idEn = InventorySystem.findIdByKoreanName(c.material);
                        const need = Number(c.count) || 0;
                        const have = idEn ? Math.min(need, countOfType(idEn)) : 0;
                        return { type: idEn || c.material, name: c.material, have, need, ok: !!idEn && have >= need };
                    });
                    return { key: id, icon: BUILDING_ICON[m[1]] || '🏗️', name: `${def.name} Lv.${def.stage}`, rows };
                }
                // 텐트(tent_N) 또는 호환 — 기존 getTentQuestDef.
                const def = getTentQuestDef(id);
                if (!def) return null;
                const rows = Object.entries(def.requirements || {}).map(([type, need]) => {
                    const have = Math.min(need, countOfType(type));
                    const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                        ? (InventorySystem.resolveDef(type) || {}) : {};
                    return { type, name: dispDef.name || type, have, need, ok: have >= need };
                });
                return { key: id, icon: def.icon, name: def.name, rows };
            }).filter(Boolean);
            if (cards.length === 0) return null;

            return (
                <div
                    onClick={() => setCollapsed(c => !c)}
                    style={{
                        position: 'fixed',
                        /* D-141: 12px → 110px. 상단 ui-panel(2줄 HUD 약 90px) 아래로 내려
                           맵 영역 우상단 모서리에 자리. 다른 UI 가림 방지.
                           D-155 (요한 지시): 110 → 80. 더 위로 30px — 위치가 애매. */
                        top: '80px',
                        right: '12px',
                        zIndex: 1400,
                        background: 'rgba(22, 33, 62, 0.78)',
                        border: '1px solid rgba(212, 184, 74, 0.45)',
                        borderRadius: '8px',
                        padding: '8px 10px',
                        minWidth: collapsed ? 0 : '160px',
                        maxWidth: '220px',
                        maxHeight: collapsed ? 'none' : '60vh',
                        overflowY: collapsed ? 'visible' : 'auto',
                        color: '#eee',
                        boxShadow: '0 4px 14px rgba(0,0,0,0.4)',
                        // D-142: pointerEvents:'none' 제거 — 탭으로 접기/펼치기.
                        cursor: 'pointer',
                        userSelect: 'none',
                        fontSize: '11px',
                        lineHeight: 1.5
                    }}
                >
                    {cards.map((c, i) => (
                        <div key={c.key} style={{ marginTop: i === 0 ? 0 : (collapsed ? 0 : '6px'),
                                                  paddingTop: i === 0 ? 0 : (collapsed ? 0 : '6px'),
                                                  borderTop: i === 0 || collapsed ? 'none' : '1px solid rgba(255,255,255,0.08)' }}>
                            <div style={{
                                fontSize: '12px',
                                fontWeight: 700,
                                color: '#d4b84a',
                                marginBottom: collapsed ? 0 : '2px',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '4px'
                            }}>
                                <span>{c.icon} {c.name}</span>
                                {i === 0 && (
                                    <span style={{ marginLeft: 'auto', color: '#888', fontSize: '10px' }}>
                                        {collapsed ? '▾' : '▴'}
                                    </span>
                                )}
                            </div>
                            {!collapsed && c.rows.map(r => (
                                <div key={r.type} style={{ color: r.ok ? '#8bd17c' : '#ddd' }}>
                                    · {r.name} {r.have}/{r.need}
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        // D-114 (2026-04-24): 뒤져보기 다중 드롭 시 챙길 항목 선택 모달.
        //   props:
        //     drops      — itemType 문자열 배열 (예: ['branch','stone','meat']).
        //     region     — 지역 표시용 라벨.
        //     inventory  — 현 런 InventorySystem (가용 칸 미리보기 + 실제 인입).
        //     onConfirm(selectedIndices) — 인덱스 배열을 받아 부모가 inventory.addItem 처리.
        //                                  (선택 항목이 빈칸보다 많으면 부분 인입.)
        //     onDiscardAll() — 선택 무시 + 모달 닫기.
        //   레이아웃: 좌(드롭 후보 그리드 — 셀 탭 토글) + 우(가방 5x5 미리보기).
        //   모바일 대응: 작은 화면에서는 위/아래로 쌓이는 flexWrap.
        function LootPickupModal({ drops, region, inventory, onConfirm, onDiscardAll }) {
            const list = Array.isArray(drops) ? drops : [];
            const [selected, setSelected] = React.useState(() => {
                // 디폴트 — 모두 선택. 가방 빈칸이 부족하면 들어갈 만큼만 들어가니 친절한 디폴트.
                const s = new Set();
                for (let i = 0; i < list.length; i++) s.add(i);
                return s;
            });

            const toggle = (i) => {
                setSelected(prev => {
                    const next = new Set(prev);
                    if (next.has(i)) next.delete(i);
                    else next.add(i);
                    return next;
                });
            };

            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const renderDropCell = (type, idx) => {
                const def = (InventorySystem.resolveDef && InventorySystem.resolveDef(type))
                    || InventorySystem.ITEMS[type] || {};
                const name = def.name || type;
                const notionItem = notionItems.find(it => it && it['이름'] === name);
                const grade = notionItem && notionItem['아이템 등급'];
                const emoji = itemEmoji(type);
                const isSel = selected.has(idx);
                return (
                    <div
                        key={idx}
                        onClick={() => toggle(idx)}
                        style={{
                            width: '64px',
                            height: '64px',
                            borderRadius: '8px',
                            background: isSel ? '#16213e' : '#0e1422',
                            border: isSel ? '2px solid #4dd0e1' : '1px solid #2a3a5e',
                            boxShadow: isSel ? '0 0 8px rgba(77,208,225,0.55)' : 'none',
                            display: 'flex',
                            flexDirection: 'column',
                            alignItems: 'center',
                            justifyContent: 'center',
                            cursor: 'pointer',
                            padding: '4px',
                            opacity: isSel ? 1 : 0.55,
                            position: 'relative'
                        }}
                        title={name}
                    >
                        <div style={{ fontSize: '24px', lineHeight: 1 }}>
                            {emoji || (name.length > 4 ? name.slice(0, 3) + '…' : name)}
                        </div>
                        <div style={{ fontSize: '9px', color: '#ccc', marginTop: '2px', textAlign: 'center', lineHeight: 1.1 }}>
                            {name}
                        </div>
                        {grade && (
                            <span style={{
                                position: 'absolute',
                                top: '2px',
                                right: '2px',
                                fontSize: '8px',
                                color: '#d4b84a',
                                border: '1px solid #d4b84a',
                                borderRadius: '3px',
                                padding: '0 3px',
                                background: 'rgba(0,0,0,0.5)'
                            }}>
                                {grade}
                            </span>
                        )}
                    </div>
                );
            };

            const emptyCount = inventory ? (() => {
                // 1x1 단위로 가용 칸 개수 추정 — 빈칸이 N개 있으면 1x1 아이템 N개까지는 확실히 들어감.
                // (모양 큰 아이템은 들어가는 만큼만 들어가는 부분 인입은 부모 onConfirm 측에서 처리.)
                let n = 0;
                for (let y = 0; y < inventory.rows; y++) {
                    for (let x = 0; x < inventory.cols; x++) {
                        if (inventory.isDisabled && inventory.isDisabled(x, y)) continue;
                        if (inventory.grid[y][x] === null) n += 1;
                    }
                }
                return n;
            })() : 0;

            return (
                <div className="modal" style={{ zIndex: 1700 }}>
                    <div className="modal-content" style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        border: '1px solid #2a3a5e',
                        borderRadius: '10px',
                        padding: '18px',
                        maxWidth: '560px',
                        width: '94vw',
                        boxSizing: 'border-box'
                    }}>
                        <div style={{
                            fontSize: '15px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '12px',
                            textAlign: 'center'
                        }}>
                            {region ? `[${region}] ` : ''}무엇을 챙길까
                        </div>

                        <div style={{
                            display: 'flex',
                            gap: '14px',
                            justifyContent: 'center',
                            flexWrap: 'wrap',
                            marginBottom: '12px'
                        }}>
                            {/* 좌: 드롭 후보 */}
                            <div>
                                <div style={{ fontSize: '11px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    발견 ({list.length})
                                </div>
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: `repeat(${Math.min(list.length, 3)}, 64px)`,
                                    gap: '6px',
                                    background: '#0f3460',
                                    padding: '8px',
                                    borderRadius: '8px'
                                }}>
                                    {list.map((t, i) => renderDropCell(t, i))}
                                </div>
                            </div>

                            {/* 우: 가방 미리보기 */}
                            <div>
                                <div style={{ fontSize: '11px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    가방 (빈칸 {emptyCount})
                                </div>
                                {inventory && (
                                    <CampInventoryGrid inventory={inventory} cellSize={28} />
                                )}
                            </div>
                        </div>

                        <div style={{
                            fontSize: '11px',
                            color: '#aaa',
                            textAlign: 'center',
                            marginBottom: '12px',
                            lineHeight: 1.5
                        }}>
                            챙길 항목을 탭. 가방 빈칸이 부족하면 그만큼만 들어간다.
                            <br />선택 {selected.size} / {list.length}
                        </div>

                        <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', flexWrap: 'wrap' }}>
                            <button
                                onClick={() => onConfirm && onConfirm(Array.from(selected))}
                                disabled={selected.size === 0}
                                style={{
                                    background: selected.size === 0 ? '#2a2a3e' : '#d4b84a',
                                    color: selected.size === 0 ? '#666' : '#1a1a2e',
                                    border: 'none',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: selected.size === 0 ? 'not-allowed' : 'pointer',
                                    fontSize: '13px',
                                    fontWeight: 700
                                }}
                            >
                                챙기기 ({selected.size})
                            </button>
                            <button
                                onClick={() => onDiscardAll && onDiscardAll()}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}
                            >
                                모두 버리기
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // D-110 (2026-04-24): 런 점수 계산 — 순수 함수.
        //   입력: 런 종료 시점 스냅샷 + runStats(누적 추적) + selectedItems(LootResult 선택).
        //   - victory=false → 0 (사망은 점수 무효).
        //   - 생존 100 + uniqueTilesVisited*3 + (detection<80 ? 30 : 0).
        //     ↑ 요한 지시 (2026-04-24): 시간 잔여 점수는 모호 → 이동거리(직접 밟은 고유 타일 수)로 교체.
        //   - L1 prey 5 / L2 prey 20 / 보스 거리≤2 진입 15 (각각 누적 카운트 * 가중치).
        //   - selectedItems: 무기 5, shield/armor 8, grade 1/2/3 → 1/3/6.
        //   selectedItems가 null이면 items 전체로 계산.
        // ============================================
        function calculateRunScore({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return 0;
            let score = 100;
            score += Math.max(0, Number(uniqueTilesVisited) || 0) * 3;
            if ((Number(detection) || 0) < 80) score += 30;

            const stats = runStats || {};
            score += (Number(stats.l1PreyKills) || 0) * 5;
            score += (Number(stats.l2PreyKills) || 0) * 20;
            score += (Number(stats.bossDangerEntered) || 0) * 15;

            // 자원 점수 — selectedItems가 배열이면 그것만, null이면 items 전체.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === '무기') { score += 5; continue; }
                if (cat === 'shield' || cat === 'armor') { score += 8; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) score += 1;
                else if (grade === 2) score += 3;
                else if (grade === 3) score += 6;
            }
            return score;
        }

        // 시나리오 풀스크린. [정신을 차린다] 클릭 시 onDismiss.
        function IntroScenarioScreen({ onDismiss }) {
            return (
                <div style={{
                    position: 'fixed',
                    inset: 0,
                    zIndex: 4000,
                    background: '#0a0a10',
                    color: '#eee',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    justifyContent: 'center',
                    padding: '32px 24px',

                    animation: 'ttdIntroFade 1.2s ease-out'
                }}>
                    <div style={{

                    }}>
                        {INTRO_SCENARIO_TEXT}
                    </div>
                    <button

                        style={{
                            background: '#1a1a2e',
                            color: '#d4b84a',
                            border: '1px solid #d4b84a',
                            padding: '12px 32px',
                            fontSize: '15px',
                            fontWeight: 600,
                            borderRadius: '6px',
                            cursor: 'pointer',
                            letterSpacing: '0.04em'
                        }}
                    >

                    </button>
                </div>

        // D-148/D-151: 텐트 퀘스트 제안 모달. 캠프 [받기] 클릭 시 노출 — 스토리 + 재료
        //   정보 + [수락]/[나중에] 버튼. [수락]만 active에 push. D-148 자동 부여 → 명시 수령
        //   흐름과 일관 + D-151로 스토리 단계 복원.
        // D-168: 텐트 다단계(Lv.1~10) — questId('tent_N')로 정의 동적 조회. Lv.1만 도입 서사,
        //   상위 레벨은 보강/확장 톤의 짧은 한 줄.
        function TentQuestModal({ questId, onAccept, onCancel }) {
            const def = getTentQuestDef(questId) || getTentQuestDef('tent_1');
            const lv = def.level;
            const story = lv === 1
                ? '이 빈터에 다시 서니 비로소 알겠다.\n밤이 되면 짐승은 이곳도 찾아온다.\n무방비한 풀숲 가운데서 잠을 청할 수는 없다.\n텐트가 필요하다.'
                : `텐트를 더 단단히 다듬을 때다.\n이번 단계(Lv.${lv})는 ${def.rewardLabel.toLowerCase()}을(를) 가져다 준다.`;
            const reqsList = Object.entries(def.requirements || {});
            return (
                <div className="modal" style={{ zIndex: 3500 }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '28px 26px',
                        borderRadius: '10px',
                        border: '1px solid #4a4a6e',
                        maxWidth: '440px',
                        width: '90vw',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{
                            fontSize: '15px',
                            lineHeight: 1.7,
                            marginBottom: '18px',
                            color: '#ddd',
                            whiteSpace: 'pre-line'
                        }}>
                            {story}
                        </div>
                        <div style={{
                            background: 'rgba(0,0,0,0.25)',
                            padding: '12px 14px',
                            borderRadius: '6px',
                            marginBottom: '20px',
                            fontSize: '13px',
                            lineHeight: 1.6
                        }}>
                            <div style={{ color: '#d4b84a', fontWeight: 700, marginBottom: '4px' }}>{def.icon} {def.name} <span style={{ color: '#888', fontSize: '11px', fontWeight: 400 }}>(Lv.{lv})</span></div>
                            {reqsList.map(([type, need]) => {
                                const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                                    ? (InventorySystem.resolveDef(type) || {}) : {};
                                const name = dispDef.name || type;
                                return <div key={type}>· {name} {need}</div>;

                            <div style={{ color: '#8bd17c', marginTop: '8px', fontSize: '12px' }}>보상: {def.rewardLabel}</div>
                        </div>
                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            <button
                                onClick={onCancel}
                                style={{
                                    background: 'transparent',

                                나중에
                            </button>
                            <button
                                onClick={onAccept}
                                style={{
                                    background: '#d4b84a',
                                    color: '#1a1a2e',
                                    border: 'none',
                                    padding: '10px 28px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '14px',
                                    fontWeight: 700
                                }}
