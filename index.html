            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);

            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);

            // D-45 (2026-04-23): м„ нғқн•ң м•„мқҙн…ңмқ„ мқёлІӨнҶ лҰ¬м—җм„ң мҳҒкө¬ м ңкұ°.
            // - 1нҡҢ нҷ•м •. лЎұн”„л ҲмҠӨлЎң мқҙлҜё м„ нғқлҗң мғҒнғңлқј мҳӨмЎ°мһ‘ нҷ•лҘ мқҙ лӮ®м•„ лі„лҸ„ нҷ•мқём°Ҫ м—ҶмқҢ.
            // - кіөк°„мқҙ кҪү м°јмқ„ л•Ң нғҲм¶ң мҲҳлӢЁмқҙмһҗ л¶Ҳн•„мҡ”н•ң 1лӢЁкі„ л¶ҖмӮ°л¬ј м •лҰ¬мҡ©.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();

                setPendingPos(null);

                    onFlashMessage(`${discarded.name}мқ„(лҘј) лІ„л ёлӢӨ.`);

            // лҜёлҰ¬ліҙкё° к°ҖлҠҘ м—¬л¶Җ (нҳ„мһ¬ pendingPosм—җ selectedItemмқҙ л“Өм–ҙк°Ҳ мҲҳ мһҲлҠ”к°Җ)
            //   D-47: 'combine' kind нҸҗкё° вҖ” мЎ°н•©мқҖ мқҙм ң н•©м„ұ нҢЁл„җ кІҪмң . лӢӨлҘё мһ¬лЈҢ +
            //         кҙҖл Ё л ҲмӢңн”ј мһҲмқҢ = 'craft' kind, м•„лӢҲл©ҙ 'swap'.
            //   disabled м…Җ(к°Җл°© кө¬м„қ л№„нҷңм„ұ)мқ„ н•ҳлӮҳлқјлҸ„ м№ЁлІ”н•ҳл©ҙ 'blocked'.
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                for (let dy = 0; dy < shape.length; dy++) {
                    for (let dx = 0; dx < shape[0].length; dx++) {
                        if (shape[dy][dx] === 1 && inventory.isDisabled(x + dx, y + dy)) {
                            return { ok: false, kind: 'blocked' };
                        }
                    }
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    const t = overlap[0];
                    if (inventory.canMerge(selectedItem, t)) return { ok: true, kind: 'merge' };

                return { ok: false, kind: 'blocked' };
            })();

            //   м„ нғқ н•ҙм ң мӢң nullмқҙ лҗҳм–ҙ нҢЁл„җлҸ„ мһҗлҸҷмңјлЎң лӢ«нһҳ.
            //   л§Ө л ҢлҚ”л§ҲлӢӨ кі„мӮ° (combos мҲҳк°Җ м Ғм–ҙ л№„мҡ© л¬ҙмӢң к°ҖлҠҘ).
            const pendingCraft = (() => {

            //   м„ нғқ мғҒнғң: н•ҙлӢ№ м•„мқҙн…ң нҸ¬н•Ё л ҲмӢңн”јл§Ң (кё°мЎҙ лҸҷмһ‘ мң м§Җ).

            //   м№ҙн…Ңкі лҰ¬ л¶„лҘҳлҠ” кІ°кіјл¬ј(result)мқҳ category н•„л“ң кё°л°ҳ.
            const allRecipes = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))

                return 'material'; // мһ¬лЈҢВ·мҶҢлӘЁн’Ҳ л“ұ лӮҳлЁём§Җ м „л¶Җ
            };
            const filteredAllRecipes = recipeCategory === 'all'

                              н—ӨлҚ” мҳҒм—ӯм—җ м№ЁлІ”н•ҳлҚҳ z-index нҶөкіј л¬ём ңлҸ„ к°ҷмқҙ н•ҙмҶҢ. к°ҖлЎң мҠӨнҒ¬лЎӨ м°ЁлӢЁмқҖ м…Җ нҒ¬кё°

                                D-171: м§„н–ү мӨ‘ нҖҳмҠӨнҠёк°Җ мҡ”кө¬н•ҳлҠ” typeмқҙл©ҙ мҡ°мғҒлӢЁ л…ёлһҖ вң“. */}

                               мҡ°мёЎ к°ҖлЎң мҠӨнҒ¬лЎӨ м—Ҷмқҙ к°ҖмҡҙлҚ° + мҠ¬лЎҜ к°Җк№Ңмқҙ л‘җ л§ҲлҰ¬ нҶ лҒј. */}

                                const item = infoItem;
                                setInfoItem(null);
                                onLureBait(item);
                            } : null}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // м№ҙл“ңлЎң м•„мқҙн…ң мӮ¬мҡ© вҖ” кіөнҶө лӘЁлӢ¬ (н”„л Ҳмһ„мӣҢнҒ¬ D-23мқҳ мІ« кө¬нҳ„мІҙ).
        //
        // м—ӯн• :
        //   м№ҙл“ң мӮ¬мҡ© мӢң consume мҠӨнҺҷмқҙ мһҲмңјл©ҙ, мқёлІӨнҶ лҰ¬м—җм„ң н•„н„°лҘј нҶөкіјн•ҳлҠ” м•„мқҙн…ң лӘ©лЎқмқ„
        //   к°„лһөнһҲ ліҙм—¬мЈјкі , мң м Җк°Җ н•ҳлӮҳлҘј кі лҘҙл©ҙ onSelect(item) мҪңл°ұ.
        //
        // мҷң InventoryModalмқ„ мһ¬мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ”к°Җ:
        //   - мқёлІӨ ліё UIлҠ” н…ҢнҠёлҰ¬мҠӨмӢқ л°°м№ҳ/лЁём§Җ/нҡҢм „/лЎұн”„л ҲмҠӨк№Ңм§Җ ліөмһЎ. м№ҙл“ң мӮ¬мҡ© л§ҘлқҪм—җм„ңлҠ”
        //     мҳӨлЎңм§Җ "н•„н„° нҶөкіј м•„мқҙн…ң м„ нғқ"л§Ң н•„мҡ”н•ҳлҜҖлЎң кІҪлҹү лҰ¬мҠӨнҠё UIк°Җ нҢҗлӢЁ л№„мҡ©мқҙ м ҒлӢӨ.
        //   - н–Ҙнӣ„ лҢҖмғҒ мҲҳк°Җ л§Һм•„м§Җл©ҙ мқҙ лӘЁлӢ¬мқ„ grid/spriteлЎң нҷ•мһҘн•ҳкұ°лӮҳ, кіөмң  м…Җл үн„° м»ҙнҸ¬л„ҢнҠёлЎң м¶”м¶ң.
        //
        // props:
        //   inventory:      InventorySystem мқёмҠӨн„ҙмҠӨ
        //   filter:         (invItem, notionItem) => bool
        //   titleText:      мғҒлӢЁ лқјлІЁ (мҳҲ: "нңҙмӢқн•  мқҢмӢқ кі лҘҙкё°")
        //   emptyText:      н•„н„° нҶөкіј м•„мқҙн…ң 0к°ңмқј л•Ң л©”мӢңм§Җ
        //   onSelect(item): нҷ•м •
        //   onClose():      м·ЁмҶҢ
        // D-36 (2026-04-22, мҡ”н•ң м§ҖмӢң):
        //   scales({recover: N})мқҙ мһҲмңјл©ҙ "нҡЁкіјк°Җ Nл°°" мһ„мқ„ мӢңк°Ғм ҒмңјлЎң к°•мЎ°н•ңлӢӨ.
        //   - м ңлӘ© м•„лһҳ м•ҲлӮҙ л¬ёкө¬ (л…ёлһҖмғү)
        //   - к°Ғ мқҢмӢқ нҡЁкіј мҡ”м•Ҫмқҳ "л°°кі н”” +1"мқ„ "л°°кі н”” +1 +1"лЎң ліҖнҳ•н•ҳкі 
        //     мҰқл¶„ "+1" л§Ң л…ёлһҖмғү(#d4b84a)мңјлЎң лқ„мҡҙлӢӨ. нҡЁкіјк°Җ 2к°ң мқҙмғҒмқё м•„мқҙн…ңмқҖ
        //     к°Ғ мҰқл¶„мқ„ к°ҷмқҖ л°©мӢқмңјлЎң мІҳлҰ¬. scaleмқҙ кұёлҰҙ мҲҳ мһҲлҠ” кұҙ м–‘мҲҳ delta statлҝҗ.
        //   - scaleмқҙ м—Ҷкұ°лӮҳ 1мқҙл©ҙ кё°мЎҙ UIмҷҖ лҸҷмқј.
        //   мқҙ н‘ңнҳ„мқҖ нңҙмӢқ мҷё н–Ҙнӣ„ consume м№ҙл“ңм—җлҸ„ мһ¬мӮ¬мҡ© к°ҖлҠҘн•ҳлҸ„лЎқ мқјл°ҳнҷ”.
        // D-57 (2026-04-24 мҡ”н•ң м§ҖмӢң): л°”лІ нҒҗ кІҪлЎң м ңкұ°, мҡ”лҰ¬ мӢңмҠӨн…ңмңјлЎң м „л©ҙ көҗмІҙ.
        //   - extraOptions/onExtraSelect м ңкұ°.
        //   - onCookClick + canCook prop м¶”к°Җ: нңҙмӢқ м№ҙл“ңм—җм„ңл§Ң [рҹ”Ҙ мҡ”лҰ¬] лІ„нҠј л…ём¶ң.
        //     hintText м•„лһҳм—җ н•ӯмғҒ н‘ңмӢң, canCook=falseл©ҙ нҡҢмғү л№„нҷңм„ұ.
        //   - нҒҙлҰӯ мӢң мқҙ лӘЁлӢ¬ лӢ«м§Җ м•Ҡкі  л¶ҖлӘЁк°Җ лі„лҸ„ CookingModalмқ„ лқ„мӣҢ лҚ®лҠ”лӢӨ.
        function CardItemConsumeModal({ inventory, filter, scales, bonuses, hintText, titleText, emptyText, onSelect, onClose, onCookClick, canCook }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['мқҙлҰ„'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const recoverBonus = (bonuses && typeof bonuses.recover === 'number') ? bonuses.recover : 0;
            const hasRecoverBoost = recoverScale !== 1 || recoverBonus !== 0;

            // D-81 (2026-04-24): к°Җл°© к·ёлҰ¬л“ңм—җ м—ҶлҠ” м•„мқҙн…ң(м„ нғқмңјлЎң кіөмӨ‘м—җ лң¬ мғҒнғң л“ұ)мқҖ
            //   лҰ¬мҠӨнҠём—җм„ң м ңмҷё. inventory.itemsлҠ” selectedItemлҸ„ нҸ¬н•Ён•ҳлҜҖлЎң, selectedлҠ” мӮ¬мҡ© л¶Ҳк°ҖлЎң к°„мЈј.
            //   к°Җл°© "лӢ«кё°" кІҪлЎңм—җм„ң cancelSelection ліҙмһҘмқҙ мЈј л°©м–ҙм„ , мқҙкІғмқҖ м—Јм§Җ мјҖмқҙмҠӨ мқҙмӨ‘ л°©м–ҙ.
            const selectedId = inventory?.selectedItem?.id;
            // D-91 (2026-04-25 мҡ”н•ң м§ҖмӢң): нҡЁкіј мҲҳм№ҳ лҶ’мқҖ мҲң лӮҙлҰјм°ЁмҲң м •л ¬.
            //   нңҙмӢқ м№ҙл“ң нҡҢліө м»Ён…ҚмҠӨнҠё(recoverScale л°ҳмҳҒ) нӣ„ stat delta н•©мӮ°.
            //   нҺҳл„җнӢ°(health-N)лҸ„ н•©м—җ нҸ¬н•Ё вҖ” "м•Ҳм „н•ң мқҢмӢқмқҙ мң„" мқҳлҸ„мҷҖ мқјм№ҳ.
            //   мғқкі кё° hunger+1/health-1 н•©=0ліҙлӢӨ мӮ°л”ёкё° hunger+1 н•©=1мқҙ мң„лЎң.
            const scoreItem = (notionItem) => {
                const parsed = notionItem && notionItem.effect;
                if (!parsed || !Array.isArray(parsed.actions)) return -Infinity;
                let s = 0;
                for (const a of parsed.actions) {
                    if (a.type !== 'stat') continue;
                    const d = Number(a.delta) || 0;
                    const scaled = d > 0 ? d * recoverScale + recoverBonus : d * recoverScale;
                    s += scaled;
                }
                return s;
            };
            const candidates = (inventory?.items || []).filter(invItem => {
                if (selectedId && invItem.id === selectedId) return false;
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            }).slice().sort((a, b) => {
                const aDef = InventorySystem.ITEMS[a.type] || {};
                const bDef = InventorySystem.ITEMS[b.type] || {};
                const aNotion = byName(aDef.name || a.name);
                const bNotion = byName(bDef.name || b.name);
                const sb = scoreItem(bNotion);
                const sa = scoreItem(aNotion);
                if (sb !== sa) return sb - sa;
                // лҸҷм җ вҶ’ мқҙлҰ„мҲң(к°ҖлҸ…м„ұ)
                return String(aDef.name || a.name || '').localeCompare(String(bDef.name || b.name || ''));
            });
            const hasAny = candidates.length > 0;
            const showCookBtn = typeof onCookClick === 'function';

            // м•„мқҙн…ң нҡЁкіј мҡ”м•Ҫ н‘ңмӢң вҖ” scaleмқҙ мһҲмңјл©ҙ мӣҗліё delta + мҰқл¶„мқ„ лӮҳлһҖнһҲ ліҙм—¬мӨҖлӢӨ.
            // л°ҳнҷҳ: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['нҡЁкіј мҡ”м•Ҫ'];
                const canScale = hasRecoverBoost && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // нҸҙл°ұ: мӣҗліё нҡЁкіј мҡ”м•Ҫл§Ң н‘ңмӢң (кё°мЎҙ лҸҷмһ‘)
                    return summary
                        ? (
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                                {summary}
                            </div>
                        )
                        : null;
                }

                // к°Ғ actionмқ„ "кё°ліё лқјлІЁ + (л…ёлһҖмғү мҰқл¶„)" нҳ•нғңлЎң л ҢлҚ”.
                // мҳҲ: action {stat:'hunger', delta:1}, recoverScale=2 вҶ’ 'л°°кі н”” +1 +1'
                //     л°°кі н””(нҡҢмғү) / '+1'(нҡҢмғү) / '+1'(л…ёлһҖмғү = мҰқл¶„)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scaleмқҙ м•Ҳ кұёлҰ¬лҠ” action(к°җмҶҢ/spawn_card л“ұ)мқҖ кё°ліё describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? 'л°°кі н””'
                                : a.stat === 'health' ? 'мғқлӘ…л Ҙ'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    // scale(кіұ) вҶ’ bonus(н•©) мҲңм„ңлЎң м Ғмҡ©н•ң мөңмў… delta - мӣҗліё delta
                    const scaledDelta = a.delta * recoverScale + recoverBonus;
                    const bonus = Math.round(scaledDelta - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || 'м•„мқҙн…ң м„ нғқ'}</h3>
                            <button onClick={onClose}>лӢ«кё°</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {/* D-57 мҡ”лҰ¬ лІ„нҠј вҖ” нңҙмӢқ м№ҙл“ңм—җм„ңл§Ң onCookClick мЈјмһ…. canCook=falseл©ҙ нҡҢмғү.
                            мң„м№ҳ: hintText л°”лЎң м•„лһҳ, м•„мқҙн…ң лӘ©лЎқ мң„. */}
                        {showCookBtn && (
                            <button
                                onClick={() => { if (canCook) onCookClick(); }}
                                disabled={!canCook}
                                style={{
                                    width: '100%',
                                    textAlign: 'center',
                                    padding: '10px 12px',
                                    marginBottom: '10px',
                                    background: canCook ? '#5a3a1f' : '#2a2a2e',
                                    border: `1px solid ${canCook ? '#d4883a' : '#444'}`,
                                    color: canCook ? '#ffd79e' : '#888',
                                    fontWeight: 600,
                                    fontSize: '14px',
                                    cursor: canCook ? 'pointer' : 'not-allowed'
                                }}
                            >
                                рҹ”Ҙ мҡ”лҰ¬н•ҳкё°
                            </button>
                        )}
                        {!hasAny ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || 'м“ё л§Ңн•ң м•„мқҙн…ңмқҙ м—ҶлӢӨ.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {
                                    const def = InventorySystem.ITEMS[invItem.type] || {};
                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}
                                            style={{
                                                textAlign: 'left',
                                                padding: '10px 12px',
                                                background: '#0f3460',
                                                border: '1px solid #16213e'
                                            }}
                                        >
                                            <div style={{ fontWeight: 600, fontSize: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                {/* D-92: 1лӢЁкі„ мһ¬лЈҢ(мқҢмӢқ)лҠ” emoji prefix + мқҙлҰ„. */}
                                                {(() => {
                                                    const e = itemEmoji(invItem.type);
                                                    return e
                                                        ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                        : null;
                                                })()}
                                                <span>{def.name || invItem.name}</span>
                                            </div>
                                            {renderEffectRow(notionItem)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-57 (2026-04-24 мҡ”н•ң м§ҖмӢң): мҡ”лҰ¬ лӘЁлӢ¬.
        //   - нңҙмӢқ м№ҙл“ңмқҳ [рҹ”Ҙ мҡ”лҰ¬н•ҳкё°] лІ„нҠјм—җм„ңл§Ң нҳём¶ң.
        //   - 1мһ¬лЈҢ мҡ”лҰ¬ л ҲмӢңн”ј(ingredients.length===1 && result.startsWith('grilled_'))л§Ң л…ём¶ң.
        //   - к°Ғ л ҲмӢңн”ј м№ҙл“ң: мһ¬лЈҢ вҶ’ кІ°кіјл¬ј лҜёлҰ¬ліҙкё° + [рҹ”Ҙ мҡ”лҰ¬н•ҳкё°] лІ„нҠј.
        //     мһ¬лЈҢ ліҙмң  мӢңл§Ң нҷңм„ұ. нҒҙлҰӯ мӢң inventory.craftRecipe нҳём¶ң вҶ’ кІ°кіјл¬ј мғқм„ұ.
        //   - нңҙмӢқ лӘЁлӢ¬мқҖ л°ұк·ёлқјмҡҙл“ңм—җ мң м§Җ вҖ” мҷ„м„ұлҗң кө¬мқҙлҘј л°”лЎң мӢқмӮ¬ нӣ„ліҙлЎң м„ нғқ к°ҖлҠҘ.
        function CookingModal({ inventory, onCook, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byId = (id) => notionItems.find(it => it && it.id === id);
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => {
                const nDef = byId(type);
                if (nDef && nDef['мқҙлҰ„']) return nDef['мқҙлҰ„'];
                return defOf(type).name || type;
            };

            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                ? window.TTD_DATA.COMBOS : [];
            const recipes = combos.filter(r =>
                r && Array.isArray(r.ingredients)
                && r.ingredients.length === 1
                && typeof r.result === 'string'
                && r.result.startsWith('grilled_')
            );

            const items = (inventory && inventory.items) || [];
            const countOf = (type) => items.filter(i => i.type === type).length;

            return (
                <div className="modal" style={{ zIndex: 1200 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>рҹ”Ҙ мҡ”лҰ¬</h3>
                            <button onClick={onClose}>лӢ«кё°</button>
                        </div>
                        <div style={{ fontSize: '12px', color: '#d4b84a', marginBottom: '10px' }}>
                            л¶Ҳм—җ мқөнһҲл©ҙ нӣЁм”¬ л“ л“ н•ҳлӢӨ.
                        </div>
                        {recipes.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                мҡ”лҰ¬н•  мҲҳ мһҲлҠ” л ҲмӢңн”јк°Җ м—ҶлӢӨ.
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                {recipes.map((recipe, idx) => {
                                    const ingType = recipe.ingredients[0];
                                    const has = countOf(ingType);
                                    const canDo = has >= 1;
                                    const ingName = nameOf(ingType);
                                    const resultName = nameOf(recipe.result);
                                    const resultMeta = byId(recipe.result);
                                    const summary = resultMeta && resultMeta['нҡЁкіј мҡ”м•Ҫ'];
                                    return (
                                        <div
                                            key={`cook:${idx}:${recipe.result}`}
                                            style={{
                                                padding: '10px 12px',
                                                background: canDo ? '#2a1f14' : '#1a1f2e',
                                                border: `1px solid ${canDo ? '#5a3a1f' : '#333'}`,
                                                borderRadius: '6px'
                                            }}
                                        >
                                            <div style={{ fontSize: '13px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                {/* D-92: 1лӢЁкі„ мһ¬лЈҢлҠ” emojiлЎң. кІ°кіј(2лӢЁкі„+)лҠ” мқҙлҰ„ к·ёлҢҖлЎң. */}
                                                <span style={{ color: canDo ? '#ffd79e' : '#888', display: 'inline-flex', alignItems: 'center' }}>
                                                    {(() => {
                                                        const e = itemEmoji(ingType);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : ingName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#666', margin: '0 4px' }}>вҶ’</span>
                                                <span style={{ color: canDo ? '#fff' : '#888', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
                                                    {(() => {
                                                        const e = itemEmoji(recipe.result);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : resultName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#888', marginLeft: 'auto', fontSize: '11px' }}>
                                                    (ліҙмң  {has})
                                                </span>
                                            </div>
                                            {summary && (
                                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '6px' }}>
                                                    {summary}
                                                </div>
                                            )}
                                            <button
                                                onClick={() => canDo && onCook(recipe)}
                                                disabled={!canDo}
                                                style={{
                                                    width: '100%',
                                                    padding: '8px',
                                                    background: canDo ? '#5a3a1f' : '#2a2a2e',
                                                    border: `1px solid ${canDo ? '#d4883a' : '#444'}`,

        // D-47 н•©м„ұ нҢЁл„җ вҖ” мқёлІӨ лӘЁлӢ¬ н•ҳлӢЁм—җ кі м •лҗң л°” нҳ•нғң.
        //   - л“ңлЎӯлҗң л‘җ мһ¬лЈҢ(pair) мӨ‘ н•ҳлӮҳ мқҙмғҒ нҸ¬н•Ёлҗң лӘЁл“  л ҲмӢңн”ј м№ҙл“ң л…ём¶ң.

        function CraftPanel({ recipes, inventory, onCraft, onClose, showCategoryTabs, category, onCategoryChange, allowCooking, floating }) {

            const isCookOnly = (recipe) => typeof recipe.result === 'string' && recipe.result.startsWith('grilled_');

            // к°Ғ л ҲмӢңн”ј мғҒнғң кі„мӮ°: мһ¬лЈҢ м¶©л¶„ + кІ°кіј л°°м№ҳ кіөк°„ м—¬л¶Җ.

        //   questId 'tent_N' вҶ’ л№Ңл”© м–ҙлҢ‘н„°м—җм„ң id='tent', stage=NмңјлЎң л§Өн•‘. (`bld_tent_<N>`лҸ„ нҳёнҷҳ вҖ” мӢ к·ң н‘ңкё°.)
        const TENT_LEVEL_DEFS = [
            null,
            { level: 1,  name: 'н…җнҠё м„ёмҡ°кё°',              icon: 'рҹҸ•пёҸ', rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 6,  stone: 4, stem: 4 } },
            { level: 2,  name: 'н…җнҠё ліҙк°• вҖ” к№”к°ң к№”кё°',     icon: 'рҹӣҢ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 8,  stone: 6, stem: 5 } },
            { level: 3,  name: 'н…җнҠё ліҙк°• вҖ” мӢқлЈҢ м№ё мһҮкё°',  icon: 'рҹҚұ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 6,  stem: 4,  stone_block: 1 } },
            { level: 4,  name: 'н…җнҠё нҷ•мһҘ вҖ” м§җм№ё мҰқм¶•',     icon: 'рҹҺ’',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { stem: 6,    branch: 4, stone_block: 2 } },
            { level: 5,  name: 'н…җнҠё ліҙк°• вҖ” кіЁмЎ° ліҙмҲҳ',     icon: 'рҹ”§',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 8,  stem: 6,   stone_block: 2 } },
            { level: 6,  name: 'н…җнҠё ліҙк°• вҖ” м ҖмһҘм°Ҫ л§Ңл“Өкё°', icon: 'рҹ“Ұ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { stem: 8,    stone_block: 3 } },
            { level: 7,  name: 'н…җнҠё нҷ•мһҘ вҖ” мҷёлІҪ л‘җлҘҙкё°',   icon: 'рҹ§ұ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 10, stone_block: 4 } },
            { level: 8,  name: 'н…җнҠё ліҙк°• вҖ” м№ЁмҶҢ м •л№„',     icon: 'рҹӣҸпёҸ', rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { stem: 8,    stone_block: 5 } },
            { level: 9,  name: 'н…җнҠё ліҙк°• вҖ” мӢқлҹүм°Ҫ нҷ•мһҘ',   icon: 'рҹҘҳ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { branch: 12, stone_block: 6 } },
            { level: 10, name: 'н…җнҠё мҷ„м„ұ вҖ” мҳҒкө¬ кұ°м җ',     icon: 'рҹҸ ',  rewardType: 'camp_storage', rewardLabel: 'ліҙкҙҖн•Ё +7м№ё', requirements: { stem: 10,   stone_block: 8 } }
        ];
        const TENT_MAX_LEVEL = 10;
        const BASE_MAX_HEALTH = 6;
        const BASE_MAX_HUNGER = 10;
        // D-174 v3 (2026-04-30): мә н”„ ліҙкҙҖн•Ё BASE вҖ” 7x20 к·ёлҰ¬л“ң (лӘЁл°”мқј к°ҖлЎң 7м№ё м Ғн•©).
        //   row 0-9(BASE нҷңм„ұ 70м№ё) + row 10-19(н…җнҠё мҠ¬лЎҜ, лӢЁкі„л§ҲлӢӨ row 1мӨ„=7м№ё н’ҖлҰј).
        //   tentLevel=10мқҙл©ҙ нҷңм„ұ 140, мҳҒкө¬ disabled 0.
        const BASE_CAMP_STORAGE_SLOTS = 70;

        // D-174: лӢЁмқј л№Ңл”© лӢЁкі„ reward_passiveлҘј нӮӨлі„ н•©мӮ°. лӢЁкі„к°„ лҲ„м Ғ X.
        //   id==='tent'л©ҙ лӢЁкі„лӢ№ camp_storage+7 (D-174 v3 вҖ” нҸӯ 7 row 1мӨ„).
        //   к·ё мҷёлҠ” мӢңнҠё BUILDINGS reward_passive DSL нҢҢмӢұ.
        function buildingBonuses(id, stage) {
            const lv = Number(stage) || 0;
            if (lv <= 0) return {};
            if (id === 'tent') {
                // н…җнҠёлҠ” лӢЁкі„л§ҲлӢӨ camp_storage+7 (row 1мӨ„) вҖ” TENT_LEVEL_DEFS лҲ„м Ғ = lv*7м№ё.
                return { camp_storage: 7 };
            }
            const def = getBuildingDef(id, lv);
            if (!def) return {};
            const out = {};
            for (const { key, delta } of parsePassive(def.reward_passive || '')) {
                out[key] = (out[key] || 0) + delta;
            }
            return out;
        }

        // D-174: лӘЁл“  л№Ңл”©(н…җнҠё нҸ¬н•Ё) лҲ„м Ғ ліҙл„ҲмҠӨ. н…җнҠёлҠ” 1~tentLevel н•© = camp_storage:tentLevel.
        //   campState.buildingLevels: { [id]: stage } вҖ” id 'clinic'/'kitchen'/...
        //   campState.tentLevel: н…җнҠё лӢЁкі„ (0..10).
        function allCampBonuses(campState) {
            const out = {
                health_max: 0, hunger_max: 0, pack: 0, deck_size: 0,
                evade: 0, accuracy: 0, detection: 0, armor: 0, camp_storage: 0
            };
            if (!campState) return out;
            // н…җнҠё: 1~tentLevel лҲ„м Ғ (лӢЁкі„л§ҲлӢӨ camp_storage+7 вҖ” D-174 v3 нҸӯ 7 row 1мӨ„).
            const tentLv = Math.max(0, Math.min(TENT_MAX_LEVEL, Number(campState.tentLevel) || 0));
            out.camp_storage += tentLv * 7;
            // л№Ңл”© 6мў…: нҳ„мһ¬ stage н•ң мӨ„л§Ң мӮ°м¶ң (лӢЁкі„к°„ лҲ„м Ғ X вҖ” мӢңнҠё м •мқҳк°Җ лҲ„м Ғк°’).
            const levels = (campState.buildingLevels && typeof campState.buildingLevels === 'object')
                ? campState.buildingLevels : {};
            for (const [id, stage] of Object.entries(levels)) {
                if (id === 'tent') continue; // н…җнҠёлҠ” мң„м—җм„ң мІҳлҰ¬.
                const lv = Number(stage) || 0;
                if (lv <= 0) continue;
                const b = buildingBonuses(id, lv);
                for (const [k, v] of Object.entries(b)) {
                    out[k] = (out[k] || 0) + v;
                }
            }
            return out;
        }

        function getMaxHealth(campState) { return BASE_MAX_HEALTH + allCampBonuses(campState).health_max; }
        function getMaxHunger(campState) { return BASE_MAX_HUNGER + allCampBonuses(campState).hunger_max; }
        function getPackBonusSlots(campState) { return allCampBonuses(campState).pack; }
        function getCampStorageSlots(campState) { return BASE_CAMP_STORAGE_SLOTS + allCampBonuses(campState).camp_storage; }

        // 'tent_N' questId мӢқлі„/мЎ°нҡҢ н—¬нҚј вҖ” campState.quests.active.idлҠ” 'tent_1' к°ҷмқҖ л¬ёмһҗм—ҙ.
        function isTentQuestId(qid) {
            return typeof qid === 'string' && qid.startsWith('tent_');
        }
        function tentLevelFromQuestId(qid) {
            if (!isTentQuestId(qid)) return null;
            const n = Number(qid.slice(5));
            return (Number.isFinite(n) && n >= 1 && n <= TENT_MAX_LEVEL) ? n : null;
        }
        function getTentQuestDef(qid) {
            const lv = tentLevelFromQuestId(qid);
            if (lv == null) return null;
            const base = TENT_LEVEL_DEFS[lv];
            if (!base) return null;
            return { ...base, id: qid };
        }

        // лӢӨмқҢ л ҲлІЁм—… нҖҳмҠӨнҠё м •мқҳ(м•„м§Ғ мӢңмһ‘ м•Ҳ н•ң лӢЁкі„). currentTentLevel=0мқҙл©ҙ Lv.1, 1мқҙл©ҙ Lv.2вҖҰ
        // мқҙлҜё max(10)мқҙл©ҙ null. мқҙ н—¬нҚјк°Җ л№Ңл”© м№ҙл“ң лӘЁлӢ¬мқҳ [мҲҳлқҪ] лҢҖмғҒ нҖҳмҠӨнҠёлҘј кІ°м •н•ңлӢӨ.
        function getNextTentQuest(currentTentLevel) {
            const lv = (Number(currentTentLevel) || 0) + 1;
            if (lv > TENT_MAX_LEVEL) return null;
            const base = TENT_LEVEL_DEFS[lv];
            if (!base) return null;
            return { ...base, id: `tent_${lv}` };
        }

        // в”Җв”Җ D-174 л№Ңл”© мӢңнҠё SSOT нҶөн•© н—¬нҚј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        //
        // мӢңнҠё мӮ°м¶ң `data/buildings.json` (window.TTD_DATA.BUILDINGS) 18н–үмқ„ мҪ”л“ңм—җм„ң мҶҢл№„.
        // л№Ңл”© 6мў…(clinic/kitchen/workshop/storage/training/watchtower) Г— 3лӢЁкі„ + н…җнҠё(id='tent') Г— 10лӢЁкі„.

        // л№Ңл”© id вҶ’ м№ҙл“ң м•„мқҙмҪҳ л§Өн•‘.
        const BUILDING_ICON = {
            tent: 'рҹҸ•пёҸ',
            clinic: 'рҹҸҘ',
            kitchen: 'рҹ”Ҙ',
            workshop: 'рҹӣ пёҸ',
            storage: 'рҹҸҡпёҸ',
            training: 'рҹҸ№',
            watchtower: 'рҹ—ј'
        };

        // ліҙмғҒ нҢЁмӢңлёҢ нӮӨ нҷ”мқҙнҠёлҰ¬мҠӨнҠё (9мў…). parsePassiveм—җм„ң мӮ¬мҡ©.
        const PASSIVE_KEYS = new Set([
            'health_max', 'hunger_max', 'pack', 'deck_size',
            'evade', 'accuracy', 'detection', 'armor', 'camp_storage'
        ]);
        // мқјнҡҢм„ұ нҡЁкіј нӮӨ нҷ”мқҙнҠёлҰ¬мҠӨнҠё (7мў…). parseOneShotм—җм„ң мӮ¬мҡ©.
        const ONE_SHOT_KEYS = new Set([
            'peek_boss', 'weather_forecast', 'safe_move',
            'heal_on_return', 'feed_on_return', 'repair_kit', 'revive'
        ]);

        // "л¶•лҢҖ x1, м•ҪмҙҲ x2" вҶ’ [{type:'bandage',count:1}, {type:'herb',count:2}].
        // лҜёл§Өм№ӯ нҶ нҒ°мқҖ console.warn + мҠӨнӮө.
        function parseRewardItems(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^(.+?)\s*[xXГ—]\s*(\d+)$/);
                if (!m) continue;
                const koName = m[1].trim();
                const count = Number(m[2]) || 0;
                if (count <= 0) continue;
                const id = (typeof InventorySystem !== 'undefined' && typeof InventorySystem.findIdByKoreanName === 'function')
                    ? InventorySystem.findIdByKoreanName(koName) : null;
                if (!id) {
                    console.warn(`[parseRewardItems] лҜёл§Өм№ӯ н•ңкёҖ мһҗмӣҗ: "${koName}"`);
                    continue;
                }
                out.push({ type: id, count });
            }
            return out;
        }

        // "health_max+1, accuracy+2, detection-1" вҶ’ [{key,delta}].
        function parsePassive(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^([a-z_]+)\s*([+-])\s*(\d+)$/);
                if (!m) continue;
                const key = m[1];
                const sign = m[2] === '-' ? -1 : 1;
                const delta = sign * (Number(m[3]) || 0);
                if (!PASSIVE_KEYS.has(key)) {
                    console.warn(`[parsePassive] лҜён—Ҳмҡ© нӮӨ: "${key}"`);
                    continue;
                }
                out.push({ key, delta });
            }
            return out;
        }

        // "heal_on_return+2, repair_kit+1" вҶ’ [{key,count}].
        function parseOneShot(dsl) {
            if (!dsl || typeof dsl !== 'string') return [];
            const out = [];
            for (const tok of dsl.split(',')) {
                const m = tok.trim().match(/^([a-z_]+)\s*\+\s*(\d+)$/);
                if (!m) continue;
                const key = m[1];
                const count = Number(m[2]) || 0;
                if (count <= 0) continue;
                if (!ONE_SHOT_KEYS.has(key)) {
                    console.warn(`[parseOneShot] лҜён—Ҳмҡ© нӮӨ: "${key}"`);
                    continue;
                }
                out.push({ key, count });
            }
            return out;
        }

        // л№Ңл”© 1лӢЁкі„ м •мқҳ. id==='tent'л©ҙ TENT_LEVEL_DEFS кё°л°ҳ Def-shape ліҖнҷҳ,
        // к·ё мҷёлҠ” мӢңнҠё BUILDINGS н–үмқ„ к·ёлҢҖлЎң(+icon ліҙк°•).
        // л°ҳнҷҳ: { id, name, stage, cost, cost_raw, effect_raw,
        //         reward_items, reward_passive, reward_run_start, reward_one_shot, icon } | null
        function getBuildingDef(id, stage) {
            const lv = Number(stage) || 0;
            if (!id || lv <= 0) return null;
            if (id === 'tent') {
                if (lv > TENT_MAX_LEVEL) return null;
                const base = TENT_LEVEL_DEFS[lv];
                if (!base) return null;
                // requirements(мҳҒл¬ё id кё°мӨҖ) вҶ’ cost-shape (н•ңкёҖ) ліҖнҷҳмқҖ м—ҶмқҢ вҖ” н…җнҠёлҠ” лі„лҸ„ лӘЁлӢ¬ л¶„кё°.
                return {
                    id: 'tent',
                    name: base.name,
                    stage: lv,
                    cost: [], // н…җнҠёлҠ” requirements(мҳҒл¬ё id) мӮ¬мҡ© вҖ” bld_*_* л¶„кё°м—җм„ң лҜёмӮ¬мҡ©.
                    cost_raw: '',
                    effect_raw: '',
                    reward_items: '',
                    reward_passive: 'camp_storage+7',
                    reward_run_start: '',
                    reward_one_shot: '',
                    icon: base.icon || BUILDING_ICON.tent,
                    // н…җнҠё м „мҡ© вҖ” н•ңкёҖ id кё°л°ҳ requirementsлҘј к·ёлҢҖлЎң л…ём¶ң (TentQuestModal нҳёнҷҳ).
                    requirements: base.requirements || {},
                    rewardLabel: base.rewardLabel,
                    level: lv
                };
            }
            const bundle = (typeof window !== 'undefined' && window.TTD_DATA && Array.isArray(window.TTD_DATA.BUILDINGS))
                ? window.TTD_DATA.BUILDINGS : [];
            const row = bundle.find(b => b && b.id === id && Number(b.stage) === lv);
            if (!row) return null;
            return {
                id: row.id,
                name: row.name || id,
                stage: lv,
                cost: Array.isArray(row.cost) ? row.cost : [],
                cost_raw: row.cost_raw || '',
                effect_raw: row.effect_raw || '',
                reward_items: row.reward_items || '',
                reward_passive: row.reward_passive || '',
                reward_run_start: row.reward_run_start || '',
                reward_one_shot: row.reward_one_shot || '',
                icon: BUILDING_ICON[id] || 'рҹҸ—пёҸ'
            };
        }

        // лӢӨмқҢ лӢЁкі„ л№Ңл”© def. id==='tent'мқҙл©ҙ getNextTentQuest мң„мһ„(+ id='tent' ліҙк°•).
        function getNextBuildingStage(id, currentStage) {
            const next = (Number(currentStage) || 0) + 1;
            if (id === 'tent') {
                if (next > TENT_MAX_LEVEL) return null;
                return getBuildingDef('tent', next);
            }
            return getBuildingDef(id, next);
        }

        // л№Ңл”© idмқҳ max stage. tent=10, мӢңнҠё л№Ңл”© = л§Өм№ӯ н–ү к°ңмҲҳ(м—Ҷмңјл©ҙ 0).
        function getMaxStage(id) {
            if (id === 'tent') return TENT_MAX_LEVEL;
            const bundle = (typeof window !== 'undefined' && window.TTD_DATA && Array.isArray(window.TTD_DATA.BUILDINGS))
                ? window.TTD_DATA.BUILDINGS : [];
            let max = 0;
            for (const b of bundle) {
                if (b && b.id === id) {
                    const s = Number(b.stage) || 0;
                    if (s > max) max = s;
                }
            }
            return max;
        }

        // лӘЁл“  л№Ңл”©мқҳ нҳ„мһ¬ stage reward_run_start н•©мӮ° вҶ’ [{type, count}].
        // handleDepartм—җм„ң л§Ө [нғҗн—ҳ л– лӮҳкё°] мӢң к°Җл°©м—җ мһҗлҸҷ мқёмһ….
        function collectRunStartItems(buildingLevels) {
            const out = [];
            const levels = (buildingLevels && typeof buildingLevels === 'object') ? buildingLevels : {};
            for (const [id, stage] of Object.entries(levels)) {
                if (id === 'tent') continue; // н…җнҠёлҠ” reward_run_start м—ҶмқҢ.
                const lv = Number(stage) || 0;
                if (lv <= 0) continue;
                const def = getBuildingDef(id, lv);
                if (!def) continue;
                for (const entry of parseRewardItems(def.reward_run_start || '')) {
                    out.push(entry);
                }
            }
            return out;
        }

        // кё°мЎҙ TENT_QUEST нҳёнҷҳ вҖ” D-114 ActiveQuestHUDPanel/handleCompleteQuest л“ұм—җм„ң м§Ғм ‘ м°ёмЎ° мӨ‘мқё кіімқ„
        //   getTentQuestDefлЎң лҸҷм Ғ мЎ°нҡҢн•ҳлҸ„лЎқ м җм§„ мқҙн–ү. мқҙ aliasлҠ” Lv.1 мӢңл“ңк°’мңјлЎңл§Ң мӮ¬мҡ©.
        const TENT_QUEST = {
            id: 'tent_1',
            name: TENT_LEVEL_DEFS[1].name,
            icon: TENT_LEVEL_DEFS[1].icon,
            requirements: TENT_LEVEL_DEFS[1].requirements
        };

        // D-114 (2026-04-24): кІҢмһ„ нҷ”л©ҙ мҡ°мғҒлӢЁм—җ л–  мһҲлҠ” м§„н–ү мӨ‘ нҖҳмҠӨнҠё HUD.
        //   - activeQuests: campState.quests.active (AppвҶ’Game м „лӢ¬).
        //   - inventoryItems: нҳ„мһ¬ лҹ° к°Җл°©мқҳ inventory.items.
        //   - нҳ„ мӢңм җм—җ м •мқҳлҗң нҖҳмҠӨнҠёлҠ” TENT_QUEST н•ң мў…мқҙлқј мІ« лІҲм§ёл§Ң н‘ңмӢң.
        //   - м§„н–үлҸ„лҠ” мә н”„ мқёлІӨмқҙ м•„лӢҲлқј "нғҗн—ҳ мӨ‘ к°Җл°©"(нҳ„ лҹ° мқёлІӨ)мңјлЎң мӢӨмӢңк°„ м№ҙмҡҙнҠё.
        //     мә н”„ [мҷ„мҲҳ] лІ„нҠјмқҖ лі„лҸ„лЎң мә н”„ ліҙкҙҖн•Ёмқ„ ліёлӢӨ(handleCompleteQuest).
        //   - active л№„м–ҙмһҲмңјл©ҙ null л°ҳнҷҳ вҶ’ нҢЁл„җ мһҗмІҙ лҜёл§ҲмҡҙнҠё.
        function ActiveQuestHUDPanel({ activeQuests, inventoryItems }) {
            // D-142: н„°м№ҳлЎң м ‘кё°/нҺјм№ҳкё° нҶ кёҖ. кё°ліё нҺјм№Ё мғҒнғң.
            const [collapsed, setCollapsed] = React.useState(false);
            if (!Array.isArray(activeQuests) || activeQuests.length === 0) return null;
            const quest = activeQuests[0];
            // D-168: лӢЁмқј TENT_QUEST вҶ’ tent_N лӢӨлӢЁкі„ нҖҳмҠӨнҠёлЎң нҷ•мһҘ. getTentQuestDefлЎң лҸҷм Ғ мЎ°нҡҢ.
            const def = quest && getTentQuestDef(quest.id);
            if (!def) return null;
            const reqs = def.requirements || {};
            const items = Array.isArray(inventoryItems) ? inventoryItems : [];
            const countOfType = (type) => items.filter(it => it && it.type === type).length;
            const rows = Object.entries(reqs).map(([type, need]) => {
                const have = Math.min(need, countOfType(type));
                const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(type) || {}) : {};
                return {
                    type,
                    name: dispDef.name || type,
                    have,
                    need,
                    ok: have >= need
                };
            });
            return (
                <div
                    onClick={() => setCollapsed(c => !c)}

                           л§ө мҳҒм—ӯ мҡ°мғҒлӢЁ лӘЁм„ңлҰ¬м—җ мһҗлҰ¬. лӢӨлҘё UI к°ҖлҰј л°©м§Җ.
                           D-155 (мҡ”н•ң м§ҖмӢң): 110 вҶ’ 80. лҚ” мң„лЎң 30px вҖ” мң„м№ҳк°Җ м• л§Ө. */

                        zIndex: 1400,

                        border: '1px solid rgba(212, 184, 74, 0.45)',
                        borderRadius: '8px',
                        padding: '8px 10px',
                        minWidth: collapsed ? 0 : '150px',
                        color: '#eee',
                        boxShadow: '0 4px 14px rgba(0,0,0,0.4)',
                        // D-142: pointerEvents:'none' м ңкұ° вҖ” нғӯмңјлЎң м ‘кё°/нҺјм№ҳкё°.
                        cursor: 'pointer',
                        userSelect: 'none',
                        fontSize: '11px',
                        lineHeight: 1.5
                    }}
                >
                    <div style={{
                        fontSize: '12px',
                        fontWeight: 700,
                        color: '#d4b84a',
                        marginBottom: collapsed ? 0 : '4px',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '4px'
                    }}>
                        <span>{def.icon} {def.name}</span>
                        <span style={{ marginLeft: 'auto', color: '#888', fontSize: '10px' }}>
                            {collapsed ? 'в–ҫ' : 'в–ҙ'}
                        </span>
                    </div>
                    {!collapsed && rows.map(r => (
                        <div key={r.type} style={{ color: r.ok ? '#8bd17c' : '#ddd' }}>
                            В· {r.name} {r.have}/{r.need}
                        </div>
                    ))}
                </div>
            );
        }

        // D-114 (2026-04-24): л’Өм ёліҙкё° лӢӨмӨ‘ л“ңлЎӯ мӢң мұҷкёё н•ӯлӘ© м„ нғқ лӘЁлӢ¬.
        //   props:
        //     drops      вҖ” itemType л¬ёмһҗм—ҙ л°°м—ҙ (мҳҲ: ['branch','stone','meat']).
        //     region     вҖ” м§Җм—ӯ н‘ңмӢңмҡ© лқјлІЁ.
        //     inventory  вҖ” нҳ„ лҹ° InventorySystem (к°Җмҡ© м№ё лҜёлҰ¬ліҙкё° + мӢӨм ң мқёмһ…).
        //     onConfirm(selectedIndices) вҖ” мқёлҚұмҠӨ л°°м—ҙмқ„ л°ӣм•„ л¶ҖлӘЁк°Җ inventory.addItem мІҳлҰ¬.
        //                                  (м„ нғқ н•ӯлӘ©мқҙ л№Ҳм№ёліҙлӢӨ л§Һмңјл©ҙ л¶Җл¶„ мқёмһ….)
        //     onDiscardAll() вҖ” м„ нғқ л¬ҙмӢң + лӘЁлӢ¬ лӢ«кё°.
        //   л Ҳмқҙм•„мӣғ: мўҢ(л“ңлЎӯ нӣ„ліҙ к·ёлҰ¬л“ң вҖ” м…Җ нғӯ нҶ кёҖ) + мҡ°(к°Җл°© 5x5 лҜёлҰ¬ліҙкё°).
        //   лӘЁл°”мқј лҢҖмқ‘: мһ‘мқҖ нҷ”л©ҙм—җм„ңлҠ” мң„/м•„лһҳлЎң мҢ“мқҙлҠ” flexWrap.
        function LootPickupModal({ drops, region, inventory, onConfirm, onDiscardAll }) {
            const list = Array.isArray(drops) ? drops : [];
            const [selected, setSelected] = React.useState(() => {
                // л””нҸҙнҠё вҖ” лӘЁл‘җ м„ нғқ. к°Җл°© л№Ҳм№ёмқҙ л¶ҖмЎұн•ҳл©ҙ л“Өм–ҙк°Ҳ л§ҢнҒјл§Ң л“Өм–ҙк°ҖлӢҲ м№ңм Ҳн•ң л””нҸҙнҠё.
                const s = new Set();
                for (let i = 0; i < list.length; i++) s.add(i);
                return s;
            });

            const toggle = (i) => {
                setSelected(prev => {
                    const next = new Set(prev);

                    else next.add(i);
                    return next;
                });
            };

            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const renderDropCell = (type, idx) => {
                const def = (InventorySystem.resolveDef && InventorySystem.resolveDef(type))
                    || InventorySystem.ITEMS[type] || {};
                const name = def.name || type;
                const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === name);
                const grade = notionItem && notionItem['м•„мқҙн…ң л“ұкёү'];

                    <div
                        key={idx}
                        onClick={() => toggle(idx)}
                        style={{
                            width: '64px',
                            height: '64px',
                            borderRadius: '8px',
                            background: isSel ? '#16213e' : '#0e1422',
                            border: isSel ? '2px solid #4dd0e1' : '1px solid #2a3a5e',
                            boxShadow: isSel ? '0 0 8px rgba(77,208,225,0.55)' : 'none',
                            display: 'flex',
                            flexDirection: 'column',
                            alignItems: 'center',
                            justifyContent: 'center',
                            cursor: 'pointer',
                            padding: '4px',
                            opacity: isSel ? 1 : 0.55,
                            position: 'relative'
                        }}
                        title={name}
                    >
                        <div style={{ fontSize: '24px', lineHeight: 1 }}>
                            {emoji || (name.length > 4 ? name.slice(0, 3) + 'вҖҰ' : name)}
                        </div>
                        <div style={{ fontSize: '9px', color: '#ccc', marginTop: '2px', textAlign: 'center', lineHeight: 1.1 }}>
                            {name}
                        </div>
                        {grade && (
                            <span style={{
                                position: 'absolute',
                                top: '2px',
                                right: '2px',
                                fontSize: '8px',
                                color: '#d4b84a',
                                border: '1px solid #d4b84a',
                                borderRadius: '3px',
                                padding: '0 3px',
                                background: 'rgba(0,0,0,0.5)'
                            }}>
                                {grade}
                            </span>
                        )}
                    </div>
                );
            };

            const emptyCount = inventory ? (() => {
                // 1x1 лӢЁмң„лЎң к°Җмҡ© м№ё к°ңмҲҳ м¶”м • вҖ” л№Ҳм№ёмқҙ Nк°ң мһҲмңјл©ҙ 1x1 м•„мқҙн…ң Nк°ңк№Ңм§ҖлҠ” нҷ•мӢӨнһҲ л“Өм–ҙк°җ.
                // (лӘЁм–‘ нҒ° м•„мқҙн…ңмқҖ л“Өм–ҙк°ҖлҠ” л§ҢнҒјл§Ң л“Өм–ҙк°ҖлҠ” л¶Җл¶„ мқёмһ…мқҖ л¶ҖлӘЁ onConfirm мёЎм—җм„ң мІҳлҰ¬.)
                let n = 0;
                for (let y = 0; y < inventory.rows; y++) {
                    for (let x = 0; x < inventory.cols; x++) {
                        if (inventory.isDisabled && inventory.isDisabled(x, y)) continue;
                        if (inventory.grid[y][x] === null) n += 1;
                    }
                }
                return n;
            })() : 0;

            return (
                <div className="modal" style={{ zIndex: 1700 }}>
                    <div className="modal-content" style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        border: '1px solid #2a3a5e',
                        borderRadius: '10px',
                        padding: '18px',
                        maxWidth: '560px',
                        width: '94vw',
                        boxSizing: 'border-box'
                    }}>
                        <div style={{
                            fontSize: '15px',
                            fontWeight: 700,
                            color: '#d4b84a',
                            marginBottom: '12px',
                            textAlign: 'center'
                        }}>
                            {region ? `[${region}] ` : ''}л¬ҙм—Үмқ„ мұҷкёёк№Ң
                        </div>

                        <div style={{
                            display: 'flex',
                            gap: '14px',
                            justifyContent: 'center',
                            flexWrap: 'wrap',
                            marginBottom: '12px'
                        }}>
                            {/* мўҢ: л“ңлЎӯ нӣ„ліҙ */}
                            <div>
                                <div style={{ fontSize: '11px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    л°ңкІ¬ ({list.length})
                                </div>
                                <div style={{

                                    gridTemplateColumns: `repeat(${Math.min(list.length, 3)}, 64px)`,

                            </div>

                            {/* мҡ°: к°Җл°© лҜёлҰ¬ліҙкё° */}

                        <div style={{
                            fontSize: '11px',
                            color: '#aaa',
                            textAlign: 'center',

                        }}>
                            мұҷкёё н•ӯлӘ©мқ„ нғӯ. к°Җл°© л№Ҳм№ёмқҙ л¶ҖмЎұн•ҳл©ҙ к·ёл§ҢнҒјл§Ң л“Өм–ҙк°„лӢӨ.
                            <br />м„ нғқ {selected.size} / {list.length}
                        </div>

                        <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', flexWrap: 'wrap' }}>
                            <button
                                onClick={() => onConfirm && onConfirm(Array.from(selected))}
                                disabled={selected.size === 0}
                                style={{
                                    background: selected.size === 0 ? '#2a2a3e' : '#d4b84a',
                                    color: selected.size === 0 ? '#666' : '#1a1a2e',
                                    border: 'none',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: selected.size === 0 ? 'not-allowed' : 'pointer',
                                    fontSize: '13px',
                                    fontWeight: 700

                            >
                                мұҷкё°кё° ({selected.size})
                            </button>
                            <button
                                onClick={() => onDiscardAll && onDiscardAll()}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '10px 20px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}

                                лӘЁл‘җ лІ„лҰ¬кё°
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // D-110 (2026-04-24): лҹ° м җмҲҳ кі„мӮ° вҖ” мҲңмҲҳ н•ЁмҲҳ.
        //   мһ…л Ҙ: лҹ° мў…лЈҢ мӢңм җ мҠӨлғ…мғ· + runStats(лҲ„м Ғ м¶”м Ғ) + selectedItems(LootResult м„ нғқ).
        //   - victory=false вҶ’ 0 (мӮ¬л§қмқҖ м җмҲҳ л¬ҙнҡЁ).
        //   - мғқмЎҙ 100 + uniqueTilesVisited*3 + (detection<80 ? 30 : 0).
        //     вҶ‘ мҡ”н•ң м§ҖмӢң (2026-04-24): мӢңк°„ мһ”м—¬ м җмҲҳлҠ” лӘЁнҳё вҶ’ мқҙлҸҷкұ°лҰ¬(м§Ғм ‘ л°ҹмқҖ кі мң  нғҖмқј мҲҳ)лЎң көҗмІҙ.
        //   - L1 prey 5 / L2 prey 20 / ліҙмҠӨ кұ°лҰ¬вүӨ2 м§„мһ… 15 (к°Ғк°Ғ лҲ„м Ғ м№ҙмҡҙнҠё * к°ҖмӨ‘м№ҳ).
        //   - selectedItems: л¬ҙкё° 5, shield/armor 8, grade 1/2/3 вҶ’ 1/3/6.
        //   selectedItemsк°Җ nullмқҙл©ҙ items м „мІҙлЎң кі„мӮ°.
        // ============================================
        function calculateRunScore({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return 0;
            let score = 100;
            score += Math.max(0, Number(uniqueTilesVisited) || 0) * 3;
            if ((Number(detection) || 0) < 80) score += 30;

            const stats = runStats || {};
            score += (Number(stats.l1PreyKills) || 0) * 5;
            score += (Number(stats.l2PreyKills) || 0) * 20;
            score += (Number(stats.bossDangerEntered) || 0) * 15;

            // мһҗмӣҗ м җмҲҳ вҖ” selectedItemsк°Җ л°°м—ҙмқҙл©ҙ к·ёкІғл§Ң, nullмқҙл©ҙ items м „мІҙ.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === 'л¬ҙкё°') { score += 5; continue; }
                if (cat === 'shield' || cat === 'armor') { score += 8; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) score += 1;
                else if (grade === 2) score += 3;
                else if (grade === 3) score += 6;
            }
            return score;
        }

        // мӢңлӮҳлҰ¬мҳӨ н’ҖмҠӨнҒ¬лҰ°. [м •мӢ мқ„ м°ЁлҰ°лӢӨ] нҒҙлҰӯ мӢң onDismiss.
        function IntroScenarioScreen({ onDismiss }) {
            return (

                    position: 'fixed',

                            fontSize: '15px',
                            fontWeight: 600,
                            borderRadius: '6px',
                            cursor: 'pointer',
                            letterSpacing: '0.04em'
                        }}
                    >
                        м •мӢ мқ„ м°ЁлҰ°лӢӨ
                    </button>
                </div>
            );
        }

        // D-148/D-151: н…җнҠё нҖҳмҠӨнҠё м ңм•Ҳ лӘЁлӢ¬. мә н”„ [л°ӣкё°] нҒҙлҰӯ мӢң л…ём¶ң вҖ” мҠӨнҶ лҰ¬ + мһ¬лЈҢ
        //   м •ліҙ + [мҲҳлқҪ]/[лӮҳмӨ‘м—җ] лІ„нҠј. [мҲҳлқҪ]л§Ң activeм—җ push. D-148 мһҗлҸҷ л¶Җм—¬ вҶ’ лӘ…мӢң мҲҳл №
        //   нқҗлҰ„кіј мқјкҙҖ + D-151лЎң мҠӨнҶ лҰ¬ лӢЁкі„ ліөмӣҗ.
        // D-168: н…җнҠё лӢӨлӢЁкі„(Lv.1~10) вҖ” questId('tent_N')лЎң м •мқҳ лҸҷм Ғ мЎ°нҡҢ. Lv.1л§Ң лҸ„мһ… м„ңмӮ¬,
        //   мғҒмң„ л ҲлІЁмқҖ ліҙк°•/нҷ•мһҘ нҶӨмқҳ м§§мқҖ н•ң мӨ„.
        function TentQuestModal({ questId, onAccept, onCancel }) {
            const def = getTentQuestDef(questId) || getTentQuestDef('tent_1');
            const lv = def.level;
            const story = lv === 1
                ? 'мқҙ л№Ҳн„°м—җ лӢӨмӢң м„ңлӢҲ л№„лЎңмҶҢ м•ҢкІ лӢӨ.\nл°Өмқҙ лҗҳл©ҙ м§җмҠ№мқҖ мқҙкіілҸ„ м°ҫм•„мҳЁлӢӨ.\nл¬ҙл°©л№„н•ң н’ҖмҲІ к°ҖмҡҙлҚ°м„ң мһ мқ„ мІӯн•  мҲҳлҠ” м—ҶлӢӨ.\nн…җнҠёк°Җ н•„мҡ”н•ҳлӢӨ.'
                : `н…җнҠёлҘј лҚ” лӢЁлӢЁнһҲ лӢӨл“¬мқ„ л•ҢлӢӨ.\nмқҙлІҲ лӢЁкі„(Lv.${lv})лҠ” ${def.rewardLabel.toLowerCase()}мқ„(лҘј) к°Җм ёлӢӨ мӨҖлӢӨ.`;
            const reqsList = Object.entries(def.requirements || {});
            return (
                <div className="modal" style={{ zIndex: 3500 }}>
                    <div style={{

                    }}>
                        <div style={{

                            lineHeight: 1.7,
                            marginBottom: '18px',
                            color: '#ddd',
                            whiteSpace: 'pre-line'
                        }}>
                            {story}
                        </div>
                        <div style={{
                            background: 'rgba(0,0,0,0.25)',
                            padding: '12px 14px',
                            borderRadius: '6px',
                            marginBottom: '20px',
                            fontSize: '13px',
                            lineHeight: 1.6
                        }}>
                            <div style={{ color: '#d4b84a', fontWeight: 700, marginBottom: '4px' }}>{def.icon} {def.name} <span style={{ color: '#888', fontSize: '11px', fontWeight: 400 }}>(Lv.{lv})</span></div>
                            {reqsList.map(([type, need]) => {
                                const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                                    ? (InventorySystem.resolveDef(type) || {}) : {};
                                const name = dispDef.name || type;
                                return <div key={type}>В· {name} {need}</div>;
                            })}
                            <div style={{ color: '#8bd17c', marginTop: '8px', fontSize: '12px' }}>ліҙмғҒ: {def.rewardLabel}</div>
                        </div>
                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            <button
                                onClick={onCancel}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '10px 18px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}
                            >
                                лӮҳмӨ‘м—җ
                            </button>
                            <button
                                onClick={onAccept}
                                style={{
                                    background: '#d4b84a',
