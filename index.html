    <!-- мҷёл¶Җ лқјмқҙлёҢлҹ¬лҰ¬ (CDN вҖ” лІ„м „ кі м • URLмқҙлқј лі„лҸ„ мәҗмӢң л¬ҙнҡЁнҷ” л¶Ҳн•„мҡ”) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- D-173 (мҡ”н•ң): лЎңм»¬ мһҗмӮ° мәҗмӢң л¬ҙнҡЁнҷ” лЎңлҚ”.
         "рҹ”„ мөңмӢ лІ„м „ м—…лҚ°мқҙнҠё" лІ„нҠјмқҙ HTML URLм—җ ?v=Date.now()л§Ң л¶ҷмқҙл©ҙ
         <link>/<script src> мқҳ м •м Ғ URLмқҖ мәҗмӢңлҗң мұ„лЎң лӮЁм•„ мғҲ л№Ңл“ңк°Җ м Ғмҡ©лҗҳм§Җ
         м•Ҡм•ҳлӢӨ. мқҙ мқёлқјмқё лЎңлҚ”к°Җ HTML URLмқҳ ?v= к°’мқ„ кәјлӮҙ лӘЁл“  лЎңм»¬ мһҗмӮ° URLм—җ
         к°ҷмқҖ ?v=лҘј м „нҢҢн•ңлӢӨ вҶ’ ?v= к°Җ л°”лҖҢл©ҙ лёҢлқјмҡ°м Җк°Җ мғҲ мһҗмӮ°мңјлЎң мқёмӢқн•ҙ fetch.
         мІ« л°©л¬ё(?v= м—ҶмқҢ)мқҖ к·ёлғҘ м •м Ғ URLлЎң лЎңл“ң(мәҗмӢң OK).
         document.writeлҠ” head лӮҙл¶Җ мқёлқјмқёмқҙлҜҖлЎң м•Ҳм „н•ҳкі  лЎңл“ң мҲңм„ңлҘј ліҙмһҘн•ңлӢӨ. -->
    <script>
        (function () {
            var v = '';
            try {
                v = new URL(location.href).searchParams.get('v') || '';
            } catch (e) {}
            var tag = v ? ('?v=' + encodeURIComponent(v)) : '';
            document.write('<link rel="stylesheet" href="gameStyles.css' + tag + '">');
            var scripts = [
                'data/data.js',
                'mapGenerator.js',
                'inventory.js',
                'boss.js',
                'dropTable.js',
                'effectParser.js',
                'statusEffects.js',
                'cameraCinematic.js',
                'combatDeck.js'
            ];
            for (var i = 0; i < scripts.length; i++) {
                document.write('<script src="' + scripts[i] + tag + '"><\/script>');
            }
        })();
    </script>

<body>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // D-61 (2026-04-24, 12м°Ё м„ём…ҳ): л§ө нҒ¬кё° лӢЁмқј м§„мӢӨмқҳ мӣҗмІң.
        //   7x7 вҶ’ 11x11 (1.5л°° мғҒн–Ҙ). MapGenerator лӘЁл“  нҳём¶ңл¶Җк°Җ мқҙ мғҒмҲҳлҘј мӮ¬мҡ©.
        //   mapGenerator.js лӮҙл¶ҖлҠ” gridSize мқёмһҗлЎң л°ӣм•„ мһҗлҸҷ мҠӨмјҖмқј(л№ҲмҠ¬лЎҜ/нҠ№мҲҳнғҖмқј/ліҙмҠӨкұ°лҰ¬).
        // D-87 (2026-04-24 мҡ”н•ң м§ҖмӢң): 11x11мқҙ л„Ҳл¬ҙ л„“лӢӨлҠ” н”јл“ңл°ұ. 8x8(64нғҖмқј)лЎң м¶•мҶҢ.
        //   ліҖ кёёмқҙ Г—0.73, л©ҙм Ғ м•Ҫ 47% к°җмҶҢ. mapGeneratorлҠ” gridSize л№„мңЁ мҠӨмјҖмқјмқҙлқј
        //   лі„лҸ„ мҲҳм • л¶Ҳн•„мҡ”(л№ҲмҠ¬лЎҜ 12~19, good=5, trap=3, minBossDist=5 мһҗлҸҷ м Ғмҡ©).
        const MAP_SIZE = 8;

        // ============================================
        // React м»ҙнҸ¬л„ҢнҠёл“Ө
        // ============================================

        // мғҒлӢЁ мҠӨнғҜ нҢЁл„җ м»ҙнҸ¬л„ҢнҠё
        //
        // D-27 HUD лҰ¬лүҙм–ј (мҡ”н•ң м§ҖмӢң 2026-04-22):
        // - мғқлӘ…л Ҙ/л°°кі мӣҖмқҖ кІҢмқҙм§Җ(л°”) вҖ” л°ңк°ҒлҘ  л°” мҠӨнғҖмқј лӢөмҠө, кІҢмһ„ лӢӨнҒ¬нҶӨ мң м§Җ.
        // - л°°кі н”” <= 3мқј л•Ң л…ёлһҖмғү(#d4b84a, мұ„лҸ„ лӮ®м¶Ө)мңјлЎң кІҪкі .
        // - мӢңк°„мқҖ мҲ«мһҗк°Җ м•„лӢҢ 'мӢңкі„ м•„мқҙмҪҳ'. maxTimeл§ҢнҒј н‘ңмӢңн•ҳкі  мҶҢлӘЁлҗң л§ҢнҒј м–ҙл‘ЎкІҢ.
        // - мӢңк°„ м „л¶Җ мҶҢлӘЁ(time >= maxTime) мӢң мҲ«мһҗ/м•„мқҙмҪҳ лӘЁл‘җ л№Ёк°•мңјлЎң кІҪкі .
        // - кІҢмһ„ лӢӨнҒ¬ л¶„мң„кё°мҷҖ мЎ°нҷ”лҘј мң„н•ҙ л№Ёк°•/л…ёлһ‘ мұ„лҸ„лҠ” лӮ®кІҢ мң м§Җ.
        //
        // D-37 HUD 2мӨ„ м••м¶• (мҡ”н•ң м§ҖмӢң 2026-04-22, 7м°Ё м„ём…ҳ):
        // - мғҒлӢЁ HUD м„ёлЎң кёёмқҙлҘј мӨ„м—¬ лӘЁл°”мқјм—җм„ң л§ө к°ҖмӢң мҳҒм—ӯ нҷ•ліҙ.
        // - 1мӨ„: [мғқлӘ…л Ҙ кІҢмқҙм§Җ][л°°кі н”” кІҢмқҙм§Җ][мӢңк°„ мӢңкі„]  (3к°ң н•ң мӨ„)
        // - 2мӨ„: [ліҙмҠӨ мҲңм°°/м¶”кІ©][л°ңк°ҒлҘ  л°”]             (2к°ң н•ң мӨ„, л°ңк°Ғ л°”лҠ” flex-grow)
        // - лқјлІЁ м ңкұ°, м•„мқҙмҪҳл§Ң н‘ңмӢң. мҲ«мһҗ нҸ°нҠё нҒ¬кё° м¶•мҶҢ.
        // - кІҢмқҙм§Җ лҶ’мқҙ 12 вҶ’ 10, л°ңк°Ғ л°” 20 вҶ’ 14.
        // - кё°мЎҙ stat-box padding м¶•мҶҢ н•„мҡ” мӢң мқёлқјмқёмңјлЎңл§Ң мҳӨлІ„лқјмқҙл“ң(м „м—ӯ .stat-boxлҠ” лӢӨлҘё кіім—җм„ң мһ¬мӮ¬мҡ©).
        // D-125 / D-161 (мҡ”н•ң м§ҖмӢң): м§Җм—ӯ лҸ„м°© 1мқём№ӯ лӮҙл Ҳмқҙм…ҳ ("лӮҙл Ҳмқҙм…ҳ л°”").
        //   мІ« л°©л¬ё = н’Җ мқёнҠёлЎң 1л¬ёмһҘ. мһ¬л°©л¬ё = м§§мқҖ нҸҙл°ұ 1~2л¬ёмһҘ.
        //   к°Ғ м§Җм—ӯлӢ№ 1к°ңм”©л§Ң л‘”лӢӨ (мҡ”н•ң Q2/Q3 лӢөліҖ).
        const REGION_INTRO_NARRATIVE = {
            'мҲІ':   'мҲІмқҳ м–ҙл‘‘н•ң к·ёлҠҳ м•„лһҳлЎң л°ңмқ„ лӮҙл””лҺ лӢӨ. м –мқҖ нқҷлғ„мғҲмҷҖ лӮҳлӯҮмһҺ л¶ҖмҠӨлҹӯмһ„мқҙ к·“к°ҖлҘј мҠӨм№ңлӢӨ.',
            'лҚӨл¶Ҳ': 'к°ҖмӢңлҚӨл¶Ҳ мӮ¬мқҙлЎң лӘёмқ„ л№„м§‘кі  л“Өм–ҙм„ лӢӨ. м–ҙл”ҳк°Җ мһ‘мқҖ м§җмҠ№мқҙ мҲЁмЈҪмқҙкі  мһҲлҠ” л“Ҝн•ҳлӢӨ.',
            'нҸүмӣҗ': 'лӮ®мқҖ н’Җкіј лҸҢл§№мқҙк°Җ л°ңм—җ м№ҳмқёлӢӨ. мӢңм•јк°Җ нҠёмқё нҸүмӣҗм—җ л“Өм–ҙм„°лӢӨ.',
            'мӢңлғҮл¬ј': 'л¬јмҶҢлҰ¬к°Җ к°Җк№ҢмӣҢм§„лӢӨ. мӢңлғҮк°Җм—җ м„ңлӢҲ л°ңлҒқмқҙ м°Ёк°‘кІҢ мӢқлҠ”лӢӨ.',
            'лҸҷкөҙ': 'лҸҷкөҙ мһ…кө¬мқҳ м„ңлҠҳн•ң кіөкё°к°Җ нҸҗлҘј мұ„мҡҙлӢӨ. л°”лӢҘм—” мһ”лҸҢмқҙ нқ©м–ҙм ё мһҲлӢӨ.'
        };
        const REGION_REVISIT_NARRATIVE = {
            'мҲІ':   'мқөмҲҷн•ң к·ёлҠҳмқҙлӢӨ.',
            'лҚӨл¶Ҳ': 'к°ҖмӢңлҚӨл¶Ҳ мӮ¬мқҙлЎң лӢӨмӢң л“Өм–ҙм„ лӢӨ.',
            'нҸүмӣҗ': 'н’Җмқҙ л°ңм—җ мҠӨм№ңлӢӨ.',
            'мӢңлғҮл¬ј': 'л¬јмҶҢлҰ¬к°Җ лӢӨмӢң л“Өл ӨмҳЁлӢӨ.',
            'лҸҷкөҙ': 'м„ңлҠҳн•ң кіөкё°к°Җ лӢӨмӢң к°җлҸҲлӢӨ.'
        };
        // н•ҳмң„ нҳёнҷҳ (D-125 нӮӨлҘј м°ёмЎ°н•ҳлҠ” мҷёл¶Җ мҪ”л“ңк°Җ мғқкё°л©ҙ м•Ҳм „л§қ). мІ« л°©л¬ё = REGION_ARRIVE_NARRATIVE мқҳлҜё.
        const REGION_ARRIVE_NARRATIVE = REGION_INTRO_NARRATIVE;

        // D-161 (мҡ”н•ң м§ҖмӢң): мһ„кі„м№ҳ(HUD кІҢмқҙм§Җл°” warningкіј лҸҷмқј) м§„мһ… мӢң к°•н•ң н•ң мӨ„,
        //   мһ„кі„м№ҳ м•Ҳм—җ мһҲмқ„ л•ҢлҠ” Nн„ҙл§ҲлӢӨ лҰ¬л§Ҳмқёл“ң н•ң мӨ„.
        //   - health вүӨ 2 (max 8, 25%): StatPanel warning л№Ёк°• м җл©ёкіј лҸҷмқј нҠёлҰ¬кұ°.
        //   - hunger вүӨ 3 (max 12, 25%): StatPanel warning л…ёлһ‘ м җл©ёкіј лҸҷмқј нҠёлҰ¬кұ°.
        //   нҶӨмқҖ 1мқём№ӯ мҳӨк°җ, кұҙмЎ°н•ҳм§Җ м•ҠкІҢ.
        const STAT_WARN_REMIND_TURNS = 4;
        const STAT_WARN_LINES = {
            healthEnter: 'лӘёмқҙ нҒ¬кІҢ нңҳмІӯмқёлӢӨ. мғҒмІҳм—җм„ң л”°лҒҲн•ң н”јк°Җ лІҲм§„лӢӨ.',
            healthRemind: 'мҳЁлӘёмқҙ л¬ҙкІҒлӢӨ. мғҒмІҳк°Җ мҡұмӢ кұ°лҰ°лӢӨ.',
            hungerEnter: 'лұғмҶҚмқҙ н…… л№„м–ҙ л°ңлҒқк№Ңм§Җ нһҳмқҙ л№ м§„лӢӨ.',
            hungerRemind: 'л°°к°Җ мһҗкҫё мҡёлҰ°лӢӨ. лӯ”к°Җ лЁ№м–ҙм•ј н•ңлӢӨ.'
        };

        // D-161: л©”мӢңм§Җ н•©м„ұ н—¬нҚј.
        //   кө¬мЎ°: [м§Җм—ӯ мқёнҠёлЎң] + [л°ңкІ¬/нҡҚл“қ] + [мғҒнғң кІҪкі ] + [нӣ„нҒ¬].
        //   к°Ғ мЎ°к°ҒмқҖ л№Ҳ л¬ёмһҗм—ҙ к°ҖлҠҘ. л№Ҳ мЎ°к°ҒмқҖ мҠӨнӮөн•ҳкі  мӮ¬мқҙлҘј кіөл°ұмңјлЎң мһҗм—°мҠӨлҹҪкІҢ мһҮлҠ”лӢӨ.
        //   к°ҷмқҖ мЎ°к°Ғмқҙ мқҙлҜё лӢӨмқҢ мЎ°к°Ғмқҳ prefixл©ҙ мӨ‘ліө л°©м§ҖлҘј мң„н•ҙ skip.
        function composeNarration(parts) {
            const out = [];
            for (let i = 0; i < parts.length; i++) {
                let p = parts[i];
                if (!p) continue;
                p = String(p).trim();
                if (!p) continue;
                if (out.length > 0) {
                    const last = out[out.length - 1];
                    // л§Ҳм§Җл§ү мЎ°к°Ғмқҙ л§Ҳм№Ён‘ң/л¬јмқҢн‘ң/лҠҗлӮҢн‘ң/мӨ„мһ„н‘ңлЎң лҒқлӮҳм§Җ м•Ҡмңјл©ҙ л§Ҳм№Ён‘ң ліҙк°•.
                    if (!/[.!?вҖҰ]$/.test(last)) out[out.length - 1] = last + '.';
                }
                out.push(p);
            }
            return out.join(' ');
        }

        // D-124 (мҡ”н•ң м§ҖмӢң): л©”мӢңм§Җ мқё-лқјмқё мғүмғҒ к°•мЎ°.
        //   - TTD_DATA.ITEMS н•ңкёҖ мқҙлҰ„(лҸҢл§№мқҙ/мғқкі кё°/...) вҶ’ мІӯлЎқ #8bd17c (л“қн…ң к°•мЎ°)
        //   л§Өм№ӯ мҷё л¶Җл¶„мқҖ к·ёлҢҖлЎң ліёл¬ё мғү.
        //   D-125: лҢҖкҙ„нҳё [м§Җм—ӯ] лқјлІЁмӢқ н‘ңкё°лҠ” л©”мӢңм§Җм—җм„ң м ңкұ°лҗҗлӢӨ вҖ” нҢЁн„ҙ л§Өм№ӯлҸ„ м ңмҷё.
        function MessageText({ text }) {
            if (!text) return '\u00A0';
            const TTD = (typeof window !== 'undefined' && window.TTD_DATA) ? window.TTD_DATA : {};
            const items = Array.isArray(TTD.ITEMS) ? TTD.ITEMS : [];
            // D-162 (2026-04-29 мҡ”н•ң): н•ң кёҖмһҗ м•„мқҙн…ңлӘ…("кІҢ")мқҙ м–ҙлҜё '~кІҢ'(м°Ёк°‘кІҢ/мүҪкІҢ)м—җ мҳӨмһ‘лҸҷ.
            //   - л§Өм№ҳ м§Ғм „мқҙ н•ңкёҖмқҙл©ҙ м–ҙм Ҳ мӨ‘к°„мңјлЎң ліҙкі  к°•мЎ° мҠӨнӮө.
            //   - "кІҢ" vs "л°ңлқјлӮё кІҢмӮҙ"мІҳлҹј м§§мқҖ мқҙлҰ„мқҙ кёҙ мқҙлҰ„мқҳ л¶Җл¶„мқј л•Ң кёҙ мӘҪ мҡ°м„  л§Өм№ӯ(кёёмқҙ лӮҙлҰјм°ЁмҲң).
            // D-164 (2026-04-29 мҡ”н•ң): мқҳмЎҙлӘ…мӮ¬ 'кІҢ'(=кІғмқҳ кө¬м–ҙнҳ•, мҳҲ: "м“ёл§Ңн•ң кІҢ м—ҶлӢӨ") м°ЁлӢЁ.
            //   - н•ң кёҖмһҗ н•ңкёҖ мқҙлҰ„мқҖ л’Өм—җ н•ңкөӯм–ҙ мЎ°мӮ¬к°Җ л”°лқјл¶ҷм–ҙм•јл§Ң к°•мЎ° мқём •.
            //   - л‘җ кёҖмһҗ мқҙмғҒ мқҙлҰ„мқҖ м¶©лҸҢ мң„н—ҳ лӮ®м•„ кё°мЎҙ лЈ°(м•һ н•ңкёҖ м°ЁлӢЁ) к·ёлҢҖлЎң.
            const itemNames = items
                .map(it => it && (it['мқҙлҰ„'] || it.name))
                .filter(Boolean)
                .sort((a, b) => b.length - a.length);
            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            if (itemNames.length === 0) return text;
            const re = new RegExp(itemNames.map(escape).join('|'), 'g');
            const isHangul = (ch) => !!ch && /[к°Җ-нһЈ]/.test(ch);
            // кёёмқҙ лӮҙлҰјм°ЁмҲң вҖ” 2кёҖмһҗ мЎ°мӮ¬к°Җ 1кёҖмһҗ мЎ°мӮ¬ prefixліҙлӢӨ лЁјм Җ л§Өм№ҳлҗҳлҸ„лЎқ.
            const PARTICLES_RE = /^(мңјлЎң|м—җм„ң|м—җкІҢ|н•ңн…Ң|к№Ңм§Җ|л§Ҳм Җ|мЎ°м°Ё|л¶Җн„°|мқҙлһ‘|н•ҳкі |мқҙ|к°Җ|мқ„|лҘј|лҠ”|мқҖ|лҸ„|л§Ң|мҷҖ|кіј|лЎң|м—җ|мқҳ|м•ј|м•„|м—¬|лһ‘|к»ҳ|лӮҳ)/;

            const parts = [];
            let lastIdx = 0;
            let m;
            while ((m = re.exec(text)) !== null) {
                const start = m.index;
                const matched = m[0];
                if (isHangul(text[start - 1])) continue;
                // н•ң кёҖмһҗ н•ңкёҖ мқҙлҰ„мқҖ л’Өм—җ н•ңкөӯм–ҙ мЎ°мӮ¬к°Җ мҷҖм•јл§Ң к°•мЎ°.
                if (matched.length === 1 && isHangul(matched)) {
                    const after = text.slice(start + 1);
                    if (!PARTICLES_RE.test(after)) continue;
                }
                if (start > lastIdx) parts.push({ text: text.slice(lastIdx, start), hl: false });
                parts.push({ text: matched, hl: true });
                lastIdx = start + matched.length;
            }
            if (lastIdx < text.length) parts.push({ text: text.slice(lastIdx), hl: false });

            return (
                <>
                    {parts.map((p, i) => p.hl
                        ? <span key={i} style={{ color: '#8bd17c' }}>{p.text}</span>
                        : <React.Fragment key={i}>{p.text}</React.Fragment>
                    )}
                </>
            );
        }

        // D-126: мғҒнғңмқҙмғҒ м№© к·ёлЈ№. StatBadges мҡ°мёЎм—җ к°ҖлЎң л°°м№ҳ (вҳҶ3 кІ°м • л””мһҗмқё).
        //   props.statuses: [{id, remainingTurns}] (window.StatusEffects м—°лҸҷ)
        //   к°Ғ м№©мқҖ мһ‘мқҖ м•Ңм•Ҫ нҳ•нғң. нҷҳк°Ғ/лҸ…/poison_biteлҠ” мқёмҠӨн„ҙмҠӨ лӢЁмң„лқј нҢЁмҠӨ(мқёлІӨм—җм„ңл§Ң л…ём¶ң).
        function StatusBadges({ statuses }) {
            if (!Array.isArray(statuses) || statuses.length === 0) return null;
            const badges = statuses

        function StatPanel({ health, hunger, time, maxTime, boss, detection, message, statuses, maxHealth, maxHunger }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            // D-168: maxлҠ” propsлЎң вҖ” н…җнҠё л ҲлІЁ ліҙл„ҲмҠӨ лҲ„м Ғмқҙ л°ҳмҳҒлҗң лҸҷм Ғ к°’. кё°ліёмқҖ лІ мқҙмҠӨ(6/10).
            const MAX_HEALTH = Number(maxHealth) > 0 ? Number(maxHealth) : 6;
            const MAX_HUNGER = Number(maxHunger) > 0 ? Number(maxHunger) : 10;

            const healthColor = health <= 0

            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // м»ҙнҢ©нҠё stat-box мҠӨнғҖмқј вҖ” 2мӨ„ HUDм—җм„ң лҶ’мқҙлҘј лӮ®м¶”кё° мң„н•ҙ padding м¶•мҶҢ.

            return (

                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>

                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): лӮЁмқҖ нҡҢмҲҳ н‘ңмӢңлЎң л°ҳм „.
                                    - л°қмқҖ м•„мқҙмҪҳ = м•„м§Ғ м“ё мҲҳ мһҲлҠ” нҡҢмҲҳ, м–ҙл‘җмҡҙ м•„мқҙмҪҳ = мҶҢлӘЁлҗЁ.
                                    - мӢңмһ‘ 3/3 вҶ’ м „л¶Җ мҶҢлӘЁ мӢң 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // iк°Җ мһ‘мқ„мҲҳлЎқ лЁјм Җ мҶҢлӘЁлҗЁ. лӮЁмқҖ к°ңмҲҳлҠ” (maxTime - time).

                    {/* 2мӨ„: ліҙмҠӨ мғҒнғң В· л°ңк°ҒлҘ  л°” (л°ңк°Ғ л°”к°Җ лӮЁмқҖ нҸӯ м°Ём§Җ) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',

                            }}
                            title={boss?.chaseMode ? 'м¶”кІ© мӨ‘' : 'мҲңм°° мӨ‘'}
                        >
                            {boss?.chaseMode ? 'рҹ”ҙ м¶”кІ©' : 'рҹҹў мҲңм°°'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>рҹҡЁ</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',

                                <div style={{

                        </div>
                        {/* D-126: мғҒнғңмқҙмғҒ м№© вҖ” л°ңк°ҒлҘ  л°” мҡ°мёЎ */}
                        <StatusBadges statuses={statuses} />
                    </div>

                    {/* D-120 (мҡ”н•ң м§ҖмӢң): л©”мӢңм§Җ м№ҙл“ңлҠ” ui-panelм—җм„ң л¶„лҰ¬.
                        StatPanelмқҖ мІҙл ҘВ·л°°кі н””В·мӢңк°„В·мҲңм°°В·л°ңк°ҒлҘ л§Ң. л©”мӢңм§ҖлҠ” GameMap мҳҒм—ӯ мң„м—җ
                        absolute float (н•ң лҺҒмҠӨ мң„м—җ л–  мһҲлҠ” лҠҗлӮҢ). м•„лһҳ GameMapм—җ message prop м „лӢ¬. */}
                </div>
            );
        }

        // мҠӨнғҜ кІҢмқҙм§Җ вҖ” л°ңк°ҒлҘ  л°”мҷҖ лҸҷмқј кө¬мЎ°. м•„мқҙмҪҳ + кІҢмқҙм§Җ + мҲ«мһҗ.
        // D-37: лқјлІЁ м ңкұ°В·м»ҙнҢ©нҠё padding. `flex` propмңјлЎң мҷёл¶Җм—җм„ң л„Ҳл№„ л°°л¶„ м ңм–ҙ.
        // D-55 (2026-04-24 мҡ”н•ң м§ҖмӢң): `warning` prop trueл©ҙ мұ„мӣҖ л¶Җл¶„м—җл§Ң л№Ёк°„ м җл©ё.
        //   StatPanelмқҙ health<=2 / hunger<=3 м—җм„ң мЈјмһ…. лқјлІЁ/мҲ«мһҗ/м•„мқҙмҪҳмқҖ м •мғҒ.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex, warning }) {
            return (
                <div className={`stat-box ${warning ? 'stat-warning' : ''}`} style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>

        // мҶҗнҢЁ м№ҙл“ң м»ҙнҸ¬л„ҢнҠё
        // мҶҗнҢЁ мғҒн•ң 5мһҘ(HAND_SIZE) вҖ” 5м—ҙ к·ёлҰ¬л“ңлЎң н•ң мӨ„м—җ н‘ңмӢңн•ңлӢӨ.
        // н•ң мӨ„м—җ лӘЁл“  м№ҙл“ңк°Җ л“Өм–ҙк°Җм•ј мғҒлӢЁ UIк°Җ мҠӨнҒ¬лЎӨ м—Ҷмқҙ мң м§ҖлҗЁ(кё°нҡҚ мӣҗм№ҷ: н•ҳлӢЁ л§ө мҠӨнҒ¬лЎӨл§Ң н—Ҳмҡ©).
        // мўҒмқҖ нҸӯм—җм„ңлҠ” нҸ°нҠё/нҢЁл”©мқҙ мқҙлҜё 10~13pxмқҙлқј 5м—ҙлҸ„ м•Ҳм •.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            // D-48: нғҖмқј мқҙлҸҷл§ҲлӢӨ handмқҙ м „л¶Җ көҗмІҙлҗҳлҜҖлЎң к°Ғ м№ҙл“ң uidк°Җ мғҲ к°’.
            //   мғҲлЎң л§ҲмҡҙнҠёлҗң м№ҙл“ңм—җ card-draw нҒҙлһҳмҠӨ + stagger delayлЎң мҲңм°Ё нҺҳмқҙл“ңмқё.
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map((card, i) => (
                        <div
                            key={card.uid}
                            className="card card-draw"
                            style={{ animationDelay: `${i * 60}ms` }}
                            onClick={() => useCard(card)}
                        >
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                л°ңк°Ғ {card.detection > 0 ? '+' : ''}{card.detection}% В· вҸ°{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // м§Җм—ӯ н•ңкёҖ лқјлІЁ (кё°нҡҚмғҒ regionмқҖ мқҙлҜё н•ңкёҖмқҙлқј л§Өн•‘ л¶Ҳн•„мҡ”н•ҳм§Җл§Ң,
        // м¶”нӣ„ мҳҒм–ҙ мҪ”л“ңлЎң л°”кҝҖ м—¬м§Җк°Җ мһҲм–ҙ л§өмқ„ л‘”лӢӨ. мқјм№ҳн•ҳл©ҙ к·ёлҢҖлЎң л…ём¶ң).
        const REGION_LABEL = {
            'мҲІ': 'мҲІ', 'лҚӨл¶Ҳ': 'лҚӨл¶Ҳ', 'нҸүмӣҗ': 'нҸүмӣҗ', 'мӢңлғҮл¬ј': 'мӢңлғҮл¬ј', 'лҸҷкөҙ': 'лҸҷкөҙ',
            forest: 'мҲІ', thicket: 'лҚӨл¶Ҳ', plain: 'нҸүмӣҗ', stream: 'мӢңлғҮл¬ј', cave: 'лҸҷкөҙ'
        };

        // D-89 (2026-04-25 мҡ”н•ң м§ҖмӢң): нғҖмқј м•„мқҙмҪҳ нҶөн•© мӨ‘м•ҷ мҠӨнғқ.
        //   мқҙм „м—” sound trace(рҹ‘Ј)к°Җ мҡ°мғҒлӢЁ, preyк°Җ мӨ‘м•ҷ, вҷҹ/рҹҰ–к°Җ лі„лҸ„ SVG text мҳӨлІ„л ҲмқҙлЎң
        //   л¶„мӮ°лҗҗлӢӨ. мҡ”н•ң: "м „л¶Җ мӨ‘м•ҷмӘҪм—җ н‘ңмӢңлҗҳмһ–м•„ вҖҰ мҠӨнғқлҗҳкІҢ н•ҙм„ң л‘җк°ңмқјл•җ г…Үг…Ү,
        //   м„ёк°ңл¶Җн„°лҠ” г…Үг…Ү/г…Ү, л„Өк°ңмқјл•җ г…Үг…Ү/г…Үг…Ү".
        //   лӢЁмҲң мҠ¬лЎҜ мўҢн‘ңн‘ң(нғҖмқј мӨ‘мӢ¬м—җ лҢҖн•ң dx/dy). нҸ°нҠё 24 кё°мӨҖ к°ҖлЎң Вұ15, м„ёлЎң н–үк°„ ~30.
        const TILE_STACK_LAYOUTS = {
            1: [{ dx: 0,   dy: 8 }],
            2: [{ dx: -16, dy: 8 }, { dx: 16, dy: 8 }],
            3: [{ dx: -16, dy: -6 }, { dx: 16, dy: -6 }, { dx: 0, dy: 24 }],
            4: [{ dx: -16, dy: -7 }, { dx: 16, dy: -7 }, { dx: -16, dy: 23 }, { dx: 16, dy: 23 }]
        };
        const TILE_STACK_MAX = 4;

        // нғҖмқј мң„м—җ н‘ңмӢңн•  м•„мқҙмҪҳ нӣ„ліҙ мӮ°м¶ң. нҳём¶ңмІҳк°Җ к°ҷмқҖ мһ…л ҘмңјлЎң лҸҷмқј кІ°кіјлҘј л°ӣлҸ„лЎқ мҲңмҲҳ н•ЁмҲҳ.
        //   мҡ”н•ң: "нқ”м ҒмқҖ м •мІҙк°Җ л°қнҳҖм§Җл©ҙ нқ”м Ғ м•„мқҙмҪҳмқҙ м—Ҷм–ҙм§Җкі  мӮ¬лғҘк°җ м•„мқҙмҪҳмңјлЎң лҢҖмІҙ"
        //   вҶ’ traceлҠ” preyлӮҳ carcassк°Җ к°ҷмқҖ нғҖмқјм—җ ліҙмқҙл©ҙ мһҗлҸҷ мғқлһө.
        //   isPlayer/isBoss н”Ңлһҳк·ёлҠ” HexTileм—җм„ң ліёмІҙ л ҢлҚ” мӢң skip(GameMapмқҙ лі„лҸ„ SVG textлЎң
        //   transition мҠ¬лқјмқҙл“ңлҘј мң„н•ҙ лӢЁмқј мқёмҠӨн„ҙмҠӨ мң м§Җ) н•ҳлҠ”лҚ° м“°мқёлӢӨ.
        function computeTileIcons(tile, ctx) {
            const isRevealed = tile.revealed || tile.visited;
            if (!isRevealed) return [];
            const list = [];
            if (tile.type === 'exit') {
                list.push({ kind: 'exit', text: 'нғҲм¶ңкө¬', fontSize: 14, fill: '#fff' });
            } else {
                if (tile.type === 'good') list.push({ kind: 'good', emoji: 'рҹҢҫ' });
                else if (tile.type === 'trap') list.push({ kind: 'trap', emoji: 'вҡ пёҸ' });
                // D-157: мң м Җк°Җ м„Өм№ҳн•ң лҚ«(snare_trap)мқҖ н•ӯмғҒ л…ём¶ң(visited л¬ҙкҙҖ, ліёмқёмқҙ м„Өм№ҳн–ҲмңјлӢҲ).
                if (tile.placedTrap && tile.placedTrap.type === 'snare') {
                    list.push({ kind: 'snare', emoji: 'рҹӘӨ' });
                }
                if (tile.visited && ctx.hasCarcass) list.push({ kind: 'carcass', emoji: 'рҹҰҙ' });
                if (ctx.showPrey) list.push({ kind: 'prey', emoji: ctx.preyEmoji });
                // D-94: мң м Җк°Җ лҶ“м•„л‘” кұ°лҢҖн•ң лЁ№мқҙ вҖ” visitedмҷҖ л¬ҙкҙҖ(м№ҙл“ң нҡЁкіјлЎң мһҗкё° нғҖмқјм—җ лҶ“м•„лҸ„
                //   visitedлҠ” мқҙлҜё trueмһ„). carcassмҷҖ лҸҷмӢңм—җ мһҲмқ„ мҲҳ м—ҶмқҢ(ліҙмҠӨк°Җ лЁ№мңјл©ҙ carcassлЎң м „нҷҳ).
                if (ctx.hasBait && !(tile.visited && ctx.hasCarcass)) {
                    list.push({ kind: 'bait', emoji: 'рҹҚ–' });
                }
                const traceVisible = (ctx.hasTrace || ctx.hasCarcassTrace)
                    && !ctx.showPrey
                    && !(tile.visited && ctx.hasCarcass)
                    && !ctx.hasBait;
                if (traceVisible) {
                    list.push({ kind: 'trace', emoji: ctx.hasCarcassTrace ? 'рҹҰҙ' : 'рҹ‘Ј' });
                }
            }
            if (ctx.isCurrent) list.push({ kind: 'player', emoji: 'вҷҹ', isPlayer: true });
            if (ctx.isBoss) list.push({ kind: 'boss', emoji: 'рҹҰ–', isBoss: true });
            // 4к°ң мҙҲкіј мӢң priority лӮ®мқҖ trace/м§Җнҳ• н‘ңм§Җл¶Җн„° мһҳлҰј(нҳ„мһ¬ listлҠ” push мҲңм„ңк°Җ
            // мҡ°м„ мҲңмң„ м—ӯмҲңмқҙлқј л§Ё м•һл¶Җн„° мһҳлқјм•ј player/bossк°Җ мӮҙм•„лӮЁмқҢ).
            if (list.length > TILE_STACK_MAX) {
                return list.slice(list.length - TILE_STACK_MAX);
            }
            return list;
        }

        // мңЎк°Ғнҳ• нғҖмқј м»ҙнҸ¬л„ҢнҠё
        //
        // D-42 (2026-04-23 мҡ”н•ң м§ҖмӢң): ліҙмҠӨ м•„мқҙмҪҳ л…ём¶ң мЎ°кұҙмқҙ "tile.revealed"м—җм„ң
        // "bossVisible"лЎң л¶„лҰ¬лҗЁ. м§Җнҳ• revealedмҷҖ л¬ҙкҙҖн•ҳкІҢ bossVisible=true мқј л•Ңл§Ң
        // ліҙмҠӨк°Җ мһҲлҠ” нғҖмқјм—җ рҹҰ– м•„мқҙмҪҳмқҙ лң¬лӢӨ. мқҙлҸҷн•ҳл©ҙ setBossVisible(false).
        //
        // D-50 (2026-04-23 мҡ”н•ң м§ҖмӢң): н”Ңл Ҳмқҙм–ҙВ·ліҙмҠӨлҘј нғҖмқј л°°кІҪ/лқјлІЁлЎң м„һм–ҙ
        // н‘ңнҳ„н•ҳлҚҳ л°©мӢқмқ„ нҸҗкё°н•ҳкі  SVG мҳӨлІ„л Ҳмқҙ "л§җ"(piece)лЎң л¶„лҰ¬. нғҖмқјмқҖ
        // м§Җнҳ• мҶҚм„ұл§Ң н‘ңнҳ„. л§җ л ҢлҚ”л§ҒмқҖ GameMapм—җм„ң HexTile мң„м—җ SVG textлЎң мҲҳн–ү.
        //
        // D-46/D-48: мӮ¬лғҘк°җ мҳӨлІ„л Ҳмқҙ.
        //   - prey м•„мқҙмҪҳ: visited нғҖмқј + preysм—җ мқҙ tileId мһҲмқ„ л•Ң. (ліҙмҠӨк°Җ мһҲмңјл©ҙ ліҙмҠӨ мҡ°м„ )
        //   - нқ”м Ғ(рҹ‘Ј мҡ°мғҒлӢЁ): preyTraceTiles.has(tile.id) вҖ” visited л¬ҙкҙҖ (мІӯк°Ғ лӢЁм„ң).
        //   - D-48: л°ңмһҗкөӯ л°©н–Ҙ нҷ”мӮҙн‘ң м ңкұ° вҖ” нқ”м Ғ(рҹ‘Ј)л§ҢмңјлЎң лӢЁм„ң м ңкіө.
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo, requestWait, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            const preyOnTile = (preys || []).find(p => p.tileId === tile.id);
            const showPrey = tile.visited && preyOnTile && !isBoss;
            const preyEmoji = showPrey ? (PREY_EMOJI[preyOnTile.preyType] || 'вқ“') : null;
            const hasTrace = preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tile.id);
            // D-78: мӮ¬мІҙ нғҖмқј. visited && carcassTiles.has(tile.id)л©ҙ рҹҰҙ мҳӨлІ„л Ҳмқҙ.
            //   listenмңјлЎң к°җм§Җлҗң мқём ‘ мӮ¬мІҙлҠ” carcassTraceTilesм—җ л“Өм–ҙк°Җ trace мң„м№ҳм—җ рҹҰҙ н‘ңмӢң(visited л¬ҙкҙҖ).
            const hasCarcass = carcassTiles && carcassTiles.has && carcassTiles.has(tile.id);
            const hasCarcassTrace = carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tile.id);
            // D-94: кұ°лҢҖн•ң лЁ№мқҙ вҖ” мң м Җк°Җ лҶ“м•„л‘” нғҖмқј.
            const hasBait = baitTiles && baitTiles.has && baitTiles.has(tile.id);

            // D-53: [л§ө ліҙкё°] лӘЁл“ңм—җм„ң лҜёл°©л¬ё нғҖмқјмқҖ л°ҳнҲ¬лӘ… нҡҢмғү мңӨкіҪл§Ң кіөк°ң.
            // м§Җм—ӯ мқҙлҰ„/л§Ҳм»Ө/prey/нқ”м ҒмқҖ мҲЁкёҙлӢӨ(мҠӨнҸ¬мқјлҹ¬ л°©м§Җ вҖ” л°©л¬ё м•Ҳ н•ң кіімқҖ м§Җнҳ•л§Ң к°җ).
            const pathUnvisited = showPathView && !tile.visited;
            // D-80 (2026-04-24 мҡ”н•ң м§ҖмӢң): listen мӢӨлЈЁм—Ј вҖ” м •ліҙк°Җ л°қнҳҖм§„ нғҖмқјм—җ
            // мқём ‘н•ҳм—¬ кёёмқҙ м—°кІ°лҗң к·ё лӢӨмқҢ 1м№ё нғҖмқјмқ„ л§өліҙкё°мҷҖ лҸҷмқјн•ң dim мғүмғҒмңјлЎң л…ём¶ң.
            // кёём°ҫкё° лӮңмқҙлҸ„ н•ҳн–Ҙ лӘ©м Ғ. кІҢмһ„ мӨ‘м—җлҸ„ мқҙлҸҷмқҖ к°ҖлҠҘ(canMoveл©ҙ нҒҙлҰӯ н—Ҳмҡ©).
            const silhouetteOnly = !showPathView && tile.silhouette && !tile.revealed && !tile.visited;
            const dimmed = pathUnvisited || silhouetteOnly;

            // кёёмқҙ м—ҶлҠ” нғҖмқј (connections м—ҶмқҢ) нҢҗлі„
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                return '#2d3561';
            };

            // D-89: getTileLabel нҸҗкё° вҖ” лӘЁл“  м•„мқҙмҪҳмқҙ computeTileIcons + мҠӨнғқ мҠ¬лЎҜ мң„м№ҳлЎң нҶөн•©.
            //   лҜёкіөк°ң нғҖмқјм—җл§Ң лӢЁлҸ… '?' лқјлІЁ мӮ¬мҡ©.
            const tileIcons = computeTileIcons(tile, {
                isCurrent, isBoss, showPrey, preyEmoji, hasCarcass, hasTrace, hasCarcassTrace, hasBait
            });
            const visibleIcons = dimmed ? [] : tileIcons;
            // н”Ңл Ҳмқҙм–ҙ/ліҙмҠӨлҠ” GameMapмқҙ лӢЁмқј SVG textлЎң к·ёл Ө transition мҠ¬лқјмқҙл“ң ліҙмЎҙ.
            // HexTileмқҖ к·ё мҷё м•„мқҙмҪҳл§Ң л ҢлҚ”н•ҳлҗҳ, мҠӨнғқ мҠ¬лЎҜ мқёлҚұмҠӨлҠ” player/boss мһҗлҰ¬лҸ„
            // м°Ём§Җн•ң мғҒнғңлЎң кі„мӮ° вҶ’ GameMapмқҳ кі„мӮ°кіј лҸҷмқјн•ҳкІҢ мқјм№ҳ.
            const stackLayout = TILE_STACK_LAYOUTS[Math.min(visibleIcons.length, TILE_STACK_MAX)] || [];

            // м§Җм—ӯ мқҙлҰ„ мҳӨлІ„л Ҳмқҙ.
            // D-51 (2026-04-23 мҡ”н•ң м§ҖмӢң): revealed(к·Җкё°мҡёмқҙкё° л“ұ)лҸ„ м§Җнҳ• мқҙлҰ„ л…ём¶ң.
            // мқҙм „(D-27~): visitedл§Ң н‘ңмӢң. мқҙм ң listenмңјлЎң мЈјліҖ м§Җнҳ• нҢҢм•…мқҙ к°ҖлҠҘн•ҙм§җ.
            // л°©л¬ё(visited)кіј м •м°°(revealed only) кө¬л¶„:
            // - visited: мҙҲлЎқ лҸҷк·ёлһҖ л§Ҳм»Ө + м§Җнҳ• мқҙлҰ„, нғҖмқј л°қмқҢ(opacity 1)
            // - revealed only: м§Җнҳ• мқҙлҰ„л§Ң (л§Ҳм»Ө м—ҶмқҢ), нғҖмқј м•Ҫк°„ м–ҙл‘җмӣҖ(opacity 0.7)
            // - лҜёкіөк°ң: м•„л¬ҙкІғлҸ„ м—ҶмқҢ, нғҖмқј л§Өмҡ° м–ҙл‘җмӣҖ(opacity 0.55)
            const regionLabel = !dimmed && (tile.visited || tile.revealed) && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;
            // D-80 ліҙк°• (2026-04-24 мҡ”н•ң м§ҖмӢң): revealed-only(л°қнҳҖмЎҢм§Җл§Ң м•Ҳ к°Җліё) нғҖмқјмқҖ
            // мғүмғҒл§Ң мӢӨлЈЁм—Јкіј лҸҷмқј(#444)лЎң лӮ®м¶”кі , opacityВ·strokeВ·л§Ҳм»ӨВ·м§Җм—ӯлӘ…мқҖ мң м§Җ.
            // visited(мғү мһҲмқҢ, opacity 1)мҷҖ н•ңлҲҲм—җ кө¬л¶„н•ҳкё° мң„н•ҙ.
            // D-80 ліҙк°• 3: fill/stroke opacity л¶„лҰ¬ вҖ” нғҖмқј лӮҙл¶ҖлҠ” "к°Җліё кіі vs м•Ҳ к°Җліё кіі"мқҳ
            // кө¬л¶„мқ„ мң„н•ҙ нқҗлҰҙ мҲҳ мһҲм§Җл§Ң, мқҙлҸҷ к°ҖлҠҘ(canMove) л…№мғү н…Ңл‘җлҰ¬лҠ” н•ӯмғҒ м„ лӘ…н•ҙм•ј
            // кёём°ҫкё°к°Җ мүҪлӢӨ. polygon opacity н•ң л°©мңјлЎңлҠ” л‘ҳмқ„ л¶„лҰ¬н•  мҲҳ м—Ҷм–ҙ fillOpacityмҷҖ
            // strokeOpacityлҘј л”°лЎң л‘”лӢӨ.
            // D-85 (2026-04-24 мҡ”н•ң м§ҖмӢң): нҳ„мһ¬ нғҖмқјмқҳ connectionsм—җ мҶҚн•ҳлҠ” нғҖмқјмқҖ
            // silhouette/dim мғҒнғңм—¬лҸ„ н•ӯмғҒ л…№мғү canMove н…Ңл‘җлҰ¬лҘј лқ„мӣҢм•ј н•ңлӢӨ. мқҙм „м—җлҠ”
            // dimmedмқј л•Ң stroke=#555/width=1лЎң лҚ®м–ҙмҚЁм„ң, listenмңјлЎң silhouette н”Ңлһҳк·ёк°Җ
            // л¶ҷмқҖ "к°Ҳ мҲҳ мһҲлҠ”" нғҖмқјмқҙ "лӘ» к°ҖлҠ” нғҖмқј"мІҳлҹј ліҙмқҙлҠ” лІ„к·ёк°Җ мһҲм—ҲлӢӨ.
            // вҶ’ canMoveк°Җ мөңмҡ°м„ , к·ё лӢӨмқҢм—җ dimmed, к·ё лӢӨмқҢ кё°ліё н…Ңл‘җлҰ¬.
            // лӢЁ, [л§ө ліҙкё°](showPathView)м—җм„ң pathUnvisitedмқҙл©ҙ мӢӨм ң нҒҙлҰӯмқҙ л§үнһҲлҜҖлЎң
            // л…№мғү мҠ№кІ©лҸ„ мғқлһөн•ҙм„ң "л…№мғүмқёлҚ° м•Ҳ лҲҢлҰј" лӘЁмҲңмқ„ н”јн•ңлӢӨ.
            const showCanMove = canMove && !pathUnvisited;
            const revealedOnly = !tile.visited && tile.revealed;
            const tileFillOpacity = dimmed ? 0.22 : (tile.visited ? 1 : tile.revealed ? 0.7 : 0.55);
            const tileStrokeOpacity = (dimmed && !showCanMove) ? 0.4 : 1;
            const tileFill = (dimmed || revealedOnly) ? '#444' : getTileColor(tile);
            const tileStroke = showCanMove ? '#4CAF50' : (dimmed ? '#555' : '#0f3460');
            const tileStrokeWidth = showCanMove ? '3' : (dimmed ? '1' : '2');

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile${dimmed ? ' path-unvisited' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={tileFill}
                        stroke={tileStroke}
                        strokeWidth={tileStrokeWidth}
                        fillOpacity={tileFillOpacity}
                        strokeOpacity={tileStrokeOpacity}
                        onClick={() => {
                            if (gameOver || victory || pathUnvisited || showPathView) return;
                            // D-90: мһҗкё° нғҖмқј нҒҙлҰӯ вҶ’ мӢңк°„ ліҙлӮҙкё° нҷ•мқё лӘЁлӢ¬.
                            if (isCurrent) {
                                if (typeof requestWait === 'function') requestWait();
                                return;
                            }
                            if (canMove) moveTo(tile.id);
                        }}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            {tile.visited && (
                                <circle cx={x - 22} cy={y - 36} r="3" fill="#4CAF50" />
                            )}
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    {/* лҜёкіөк°ң нғҖмқј вҖ” '?' лӢЁлҸ… лқјлІЁ. */}
                    {!dimmed && !isRevealed && (
                        <text x={x} y={y + 5} textAnchor="middle" fill="#666" fontSize="24" fontWeight="bold">?</text>
                    )}
                    {/* D-89: нҶөн•© мӨ‘м•ҷ мҠӨнғқ. player/bossлҠ” GameMap лӢЁмқј SVG text(transition ліҙмЎҙ)
                        к°Җ к·ёлҰ¬лҜҖлЎң м—¬кё°м„  skip. мҠӨнғқ мҠ¬лЎҜ мқёлҚұмҠӨлҠ” мқјм№ҳн•ңлӢӨ. */}
                    {visibleIcons.map((icon, idx) => {
                        if (icon.isPlayer || icon.isBoss) return null;
                        const slot = stackLayout[idx];
                        if (!slot) return null;
                        if (icon.text) {
                            return (
                                <text
                                    key={icon.kind}
                                    x={x + slot.dx}
                                    y={y + slot.dy}
                                    textAnchor="middle"
                                    fill={icon.fill || '#fff'}
                                    fontSize={icon.fontSize || 14}
                                    fontWeight="700"
                                    pointerEvents="none"
                                >
                                    {icon.text}
                                </text>
                            );
                        }
                        return (
                            <text
                                key={icon.kind}
                                x={x + slot.dx}
                                y={y + slot.dy}
                                textAnchor="middle"
                                dominantBaseline="middle"
                                fontSize="22"
                                pointerEvents="none"
                                stroke="#0a1020"
                                strokeWidth="3"
                                paintOrder="stroke"
                            >
                                {icon.emoji}
                            </text>
                        );
                    })}
                    {/* л§ө ліҙкё° лӘЁл“ң вҖ” н”Ңл Ҳмқҙм–ҙк°Җ л°©л¬ён•ң мҲңм„ң лІҲнҳё. мІ« л°©л¬ё кё°мӨҖ(indexOf). */}
                    {showPathView && moveHistory && (() => {
                        const pathIdx = moveHistory.indexOf(tile.id);
                        if (pathIdx < 0) return null;
                        return (
                            <g pointerEvents="none">
                                <circle cx={x - 28} cy={y - 2} r="11" fill="#d4b84a" stroke="#000" strokeWidth="0.8" />
                                <text
                                    x={x - 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#1a1a2e"
                                    fontSize="12"
                                    fontWeight="800"
                                >
                                    {pathIdx + 1}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-53: л§ө ліҙкё° лӘЁл“ң вҖ” ліҙмҠӨ мқҙлҸҷ кІҪлЎң. л№Ёк°„ лҸҷк·ёлқјлҜё + B{idx+1} лқјлІЁ. */}
                    {showPathView && bossMoveHistory && (() => {
                        const bIdx = bossMoveHistory.indexOf(tile.id);
                        if (bIdx < 0) return null;
                        return (
                            <g className="boss-path-dot" pointerEvents="none">
                                <circle cx={x + 28} cy={y - 2} r="12" fill="#e94560" stroke="#1a1a2e" strokeWidth="1" />
                                <text
                                    x={x + 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#fff"
                                    fontSize="10"
                                    fontWeight="800"
                                >
                                    {`B${bIdx + 1}`}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-70 (2026-04-24 мҡ”н•ң м§ҖмӢң): мӢӨнҢЁ мӢң нғҲм¶ңкө¬ мң„м№ҳ кіөк°ң.
                        showPathView лӘЁл“ңм—җм„ң tile.type==='exit'мқҙл©ҙ н•ӯмғҒ рҹҡӘ л§Ҳм»Ө л…ём¶ң.
                        мң м Җк°Җ 'м Җкё°к°Җ нғҲм¶ңкө¬мҳҖкө¬лӮҳ' ліөкё° к°ҖлҠҘ. */}
                    {showPathView && tile.type === 'exit' && (
                        <g className="exit-marker" pointerEvents="none">
                            <circle cx={x - 28} cy={y - 2} r="14" fill="#2196F3" stroke="#1a1a2e" strokeWidth="1.5" opacity="0.95" />
                            <text
                                x={x - 28}
                                y={y + 4}
                                textAnchor="middle"
                                fontSize="14"
                            >
                                рҹҡӘ
                            </text>
                        </g>
                    )}
                </g>
            );
        }

        // кІҢмһ„ л§ө м»ҙнҸ¬л„ҢнҠё
        //
        // D-46 (2026-04-22 мҡ”н•ң м§ҖмӢң): LootToastлҘј .map-container(мҠӨнҒ¬лЎӨ мҳҒм—ӯ)
        // л°–мңјлЎң л№јкі  .map-area лһҳнҚјмқҳ нҳ•м ңлЎң л‘”лӢӨ. мқҙм „(D-39)м—җлҠ” л§ө м•Ҳм—җ л„Јм–ҙ
        // "л§өм—җм„ң нҡҚл“қ" кіөк°„к°җмқ„ мӮҙл ём§Җл§Ң, лӘЁл°”мқјм—җм„ң л§өмқ„ мҠӨнҒ¬лЎӨн•ҳл©ҙ absolute
        // мһҗмӢқмқҙ мҪҳн…җмё мҷҖ н•Ёк»ҳ л°Җл Ө мӢңм•јм—җм„ң мӮ¬лқјм§ҖлҠ” л¬ём ңк°Җ мһҲм—ҲмқҢ.
        // .map-areaлҠ” HUD л°”лЎң м•„лһҳ мҳҒм—ӯмқҙлқј, нҶ мҠӨнҠёлҠ” мҠӨнҒ¬лЎӨкіј л¬ҙкҙҖн•ҳкІҢ
        // к·ё мғҒлӢЁм—җ кі м •мңјлЎң лңЁкі  HUD/м№ҙл“ңмҷҖлҸ„ кІ№м№ҳм§Җ м•ҠлҠ”лӢӨ.
        function GameMap({ tiles, currentTile, boss, bossVisible, feedingBossTraceTile, gameOver, victory, moveTo, requestWait, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView, message }) {
            // D-53: [л§ө ліҙкё°] лӘЁл“ңм—җм„ңлҠ” л°©л¬ё/л°ңкІ¬ м—¬л¶ҖмҷҖ л¬ҙкҙҖн•ҳкІҢ лӘЁл“  л№„м–ҙмһҲм§Җ м•ҠмқҖ нғҖмқј кіөк°ң.
            // лҜёл°©л¬ё нғҖмқјмқҖ HexTile лӮҙл¶Җм—җм„ң л°ҳнҲ¬лӘ… нҡҢмғүмңјлЎң к·ёлҰ°лӢӨ.
            // D-80 ліҙк°•(2026-04-24): silhouette н”Ңлһҳк·ёлҸ„ л ҢлҚ” лҢҖмғҒ вҖ” listen мӢңм җм—җ мҰүмӢң л…ём¶ң.
            //   (мқҙм „м—” discovered=falseл©ҙ filterм—җм„ң кұёл Ө мқҙлҸҷ нӣ„м—җм•ј л’ӨлҠҰкІҢ лӮҳнғҖлӮҳлҠ” лІ„к·ёк°Җ мһҲм—ҲмқҢ.)
            const visibleTiles = showPathView
                ? tiles.filter(t => !t.isEmpty)
                : tiles.filter(t => t.visited || t.discovered || t.revealed || t.silhouette);
            const containerRef = React.useRef(null);

            // D-54: н”Ңл Ҳмқҙ к·ёлҰ¬л“ң мЈјліҖм—җ л„үл„үн•ң л№Ҳ нҢЁл”©мқ„ л‘җм–ҙ мҠӨнҒ¬лЎӨн•ҙлҸ„ "лҒқ"мқҙ
            // м•Ҳ ліҙмқҙкІҢ н•ңлӢӨ. SVG мҙқ нҒ¬кё°лҠ” mapGeneratorк°Җ PADDING_HEXES л°ҳмҳҒн•ҙ мӮ°м¶ң.
            const mapExtent = React.useMemo(() => {
                const gen = new MapGenerator(MAP_SIZE);
                return gen.getMapExtent();
            }, []);

            // D-82 (2026-04-24 мҡ”н•ң м§ҖмӢң): л§ө мЎ°мһ‘ к°ңм„ .
            //   - кҫ№ лҲ„лҘё мұ„ л“ңлһҳк·ё вҶ’ л§ө pan (PC л§Ҳмҡ°мҠӨ + лӘЁл°”мқј 1 finger).
            //   - л§Ҳмҡ°мҠӨ нң  вҶ’ нҷ•лҢҖ/м¶•мҶҢ (PC).
            //   - л‘җ мҶҗк°ҖлқҪ н•Җм№ҳ вҶ’ нҷ•лҢҖ/м¶•мҶҢ (лӘЁл°”мқј).
            //   - л“ңлһҳк·ё мһ„кі„к°’ 4px л„ҳмңјл©ҙ к°ҷмқҖ м ңмҠӨмІҳмқҳ click(=hex tap) мқҙлІӨнҠёлҘј capture лӢЁкі„м—җм„ң м°ЁлӢЁ.
            const [zoom, setZoom] = React.useState(1);
            const zoomRef = React.useRef(1);
            React.useEffect(() => { zoomRef.current = zoom; }, [zoom]);
            const ZOOM_MIN = 0.5;
            const ZOOM_MAX = 2.5;

            // D-47 (2026-04-22 мҡ”н•ң м§ҖмӢң): кІҢмһ„ мӢңмһ‘ мӢң нҳ„мһ¬ мң„м№ҳ нғҖмқјмқҙ мҠӨнҒ¬лЎӨ
            // л·°нҸ¬нҠё мӨ‘м•ҷм—җ мҳӨлҸ„лЎқ 1нҡҢ м •л ¬. мқҙм „м—” н•ӯмғҒ (0,0)м—җм„ң мӢңмһ‘н•ҙ л§ӨлІҲ
            // мӢңмһ‘ мң„м№ҳлҘј м°ҫм•„м•ј н–ҲмқҢ.
            // useLayoutEffectлЎң paint м „м—җ мҠӨнҒ¬лЎӨмқ„ мһЎм•„ к№ңл№Ўмһ„ м—ҶмқҢ.
            // л§ҲмҡҙнҠё мӢң 1нҡҢл§Ң вҖ” мқҙнӣ„ мқҙлҸҷ мһҗмң , мһҗлҸҷ м¶”м ҒмқҖ D-135лЎң лі„лҸ„.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-135: currentTile ліҖкІҪ мӢң 1мҙҲ лҸҷм•Ҳ easeлЎң viewport мӨ‘м•ҷ м¶”м Ғ.
            //   - мІ« mountлҠ” D-47 useLayoutEffectк°Җ instant мІҳлҰ¬ вҶ’ skip.
            //   - tilesл§Ң л°”лҖҢкі  currentTile лҸҷмқјн•ҳл©ҙ skip(нңҙмӢқВ·мӮ¬лғҘ л“ұ мғҒнғң ліҖкІҪ мјҖмқҙмҠӨ).
            //   - мӮ¬мҡ©мһҗ л“ңлһҳк·ё/мӨҢ мӢңмһ‘ мӢң мҰүмӢң cancel вҖ” мһҗмң  мЎ°мһ‘ мҡ°м„ .
            //   - zoomмқҖ zoomRef.currentлЎң лҸҷкё° м°ёмЎ°(нҳ„мһ¬ нҷ”л©ҙ мўҢн‘ңкі„).
            const centerAnimRef = React.useRef({ cancel: () => {} });
            const isFirstCenterRef = React.useRef(true);
            const prevTileIdRef = React.useRef(null);
            React.useEffect(() => {
                if (isFirstCenterRef.current) {
                    isFirstCenterRef.current = false;
                    prevTileIdRef.current = currentTile;
                    return;
                }
                if (prevTileIdRef.current === currentTile) return;
                prevTileIdRef.current = currentTile;

                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;

                centerAnimRef.current.cancel();

                const z = zoomRef.current;
                const targetLeft = cur.position.x * z - el.clientWidth / 2;
                const targetTop = cur.position.y * z - el.clientHeight / 2;
                const startLeft = el.scrollLeft;
                const startTop = el.scrollTop;
                if (Math.abs(targetLeft - startLeft) < 1 && Math.abs(targetTop - startTop) < 1) return;

                const duration = 1000;
                const startTime = performance.now();
                let cancelled = false;
                let rafId = 0;
                const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                const step = (now) => {
                    if (cancelled) return;
                    const elapsed = now - startTime;
                    const t = Math.min(1, elapsed / duration);
                    const eased = ease(t);
                    el.scrollLeft = startLeft + (targetLeft - startLeft) * eased;
                    el.scrollTop = startTop + (targetTop - startTop) * eased;
                    if (t < 1) rafId = requestAnimationFrame(step);
                };
                rafId = requestAnimationFrame(step);

                centerAnimRef.current = {
                    cancel: () => {
                        cancelled = true;
                        cancelAnimationFrame(rafId);
                    },
                };

                return () => {
                    cancelled = true;
                    cancelAnimationFrame(rafId);
                };
            }, [currentTile, tiles]);

            // D-82: л“ңлһҳк·ё/мӨҢ мқҙлІӨнҠё л°”мқёл”©. л„ӨмқҙнӢ°лёҢ лҰ¬мҠӨл„ҲлЎң л¶ҷм—¬ wheelм—җм„ң preventDefault к°ҖлҠҘ.
            React.useEffect(() => {
                const el = containerRef.current;
                if (!el) return;

                const drag = { active: false, startX: 0, startY: 0, sL: 0, sT: 0, moved: false };
                const pinch = { active: false, dist: 0, zoomStart: 1 };
                let blockNextClick = false;

                // D-88 (2026-04-25): pinch мӨ‘мӢ¬м җ л“ңлҰ¬н”„нҠё мҲҳм •.
                // н•ң н”„л Ҳмһ„м—җ setZoom + rAFлЎң scrollLeftмқ„ м Ғмҡ©н•ҳлҠ” кө¬мЎ°м—җм„ң, touchmoveк°Җ
                // rAFліҙлӢӨ л№ лҘҙкІҢ м—°мҶҚ л°ңмғқн•ҳл©ҙ лӢӨмқҢ н”„л Ҳмһ„ кі„мӮ°мқҙ "мғҲ zoom + DOMмқҳ мҳӣ scrollLeft"
                // лҘј м„һм–ҙ cx кі„мӮ°мқҙ м–ҙкёӢлӮЁ(мӨ‘мӢ¬м җмқҙ мҶҗк°ҖлқҪм—җм„ң м җм җ л©Җм–ҙм§җ). мқҳлҸ„лҗң мҠӨнҒ¬лЎӨ
                // мң„м№ҳлҘј refм—җ лҸҷкё°лЎң кё°лЎқн•ҳкі  мӨҢ кі„мӮ°мқҖ м „л¶Җ мқҙ refл§Ң ліҙкІҢ н•ңлӢӨ.
                const scrollRef = { x: el.scrollLeft, y: el.scrollTop };
                const syncScrollFromDOM = () => {
                    scrollRef.x = el.scrollLeft;
                    scrollRef.y = el.scrollTop;
                };

                const getDist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

                const beginPan = (x, y) => {
                    // D-135: мӮ¬мҡ©мһҗ м§Ғм ‘ мЎ°мһ‘ мҡ°м„  вҖ” м§„н–ү мӨ‘мқё м№ҙл©”лқј м¶”м Ғ м·ЁмҶҢ.
                    centerAnimRef.current.cancel();
                    syncScrollFromDOM();
                    drag.active = true;
                    drag.startX = x;
                    drag.startY = y;
                    drag.sL = scrollRef.x;
                    drag.sT = scrollRef.y;
                    drag.moved = false;
                    el.classList.add('dragging');
                };
                const continuePan = (x, y) => {
                    if (!drag.active) return;
                    const dx = x - drag.startX;
                    const dy = y - drag.startY;
                    if (!drag.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                        drag.moved = true;
                    }
                    el.scrollLeft = drag.sL - dx;
                    el.scrollTop = drag.sT - dy;
                    syncScrollFromDOM();
                };
                const endPan = () => {
                    if (drag.moved) blockNextClick = true;
                    drag.active = false;
                    el.classList.remove('dragging');
                };

                // н•өмӢ¬: focusOffset(viewport лӮҙ н”Ҫм…Җ) кё°мӨҖмңјлЎң мҪҳн…җмё  мўҢн‘ңлҘј кі„мӮ°.
                // scrollRef.xлҠ” л§Ҳм§Җл§үмңјлЎң "мқҳлҸ„н•ң" мҠӨнҒ¬лЎӨмқҙлқј rAF лҢҖкё° мӨ‘м—җлҸ„ мқјкҙҖлҗЁ.
                const applyZoomAt = (ratio, focusClientX, focusClientY) => {
                    const prev = zoomRef.current;
                    const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, prev * ratio));
                    if (Math.abs(next - prev) < 0.001) return;
                    const rect = el.getBoundingClientRect();
                    const focusOffsetX = focusClientX - rect.left;
                    const focusOffsetY = focusClientY - rect.top;
                    const factor = next / prev;
                    const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                    const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                    zoomRef.current = next;
                    scrollRef.x = newScrollL;
                    scrollRef.y = newScrollT;
                    setZoom(next);
                    requestAnimationFrame(() => {
                        el.scrollLeft = newScrollL;
                        el.scrollTop = newScrollT;
                    });
                };

                // в”Җв”Җ Mouse в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
                const onMouseDown = (e) => {
                    if (e.button !== 0) return; // мўҢнҒҙлҰӯл§Ң
                    beginPan(e.clientX, e.clientY);
                };
                const onMouseMove = (e) => { continuePan(e.clientX, e.clientY); };
                const onMouseUp = () => { endPan(); };
                const onWheel = (e) => {
                    e.preventDefault();
                    centerAnimRef.current.cancel();
                    const ratio = e.deltaY > 0 ? 0.9 : 1.1;
                    applyZoomAt(ratio, e.clientX, e.clientY);
                };

                // в”Җв”Җ Touch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
                const onTouchStart = (e) => {
                    centerAnimRef.current.cancel();
                    if (e.touches.length === 2) {
                        // н•Җм№ҳ мӢңмһ‘ вҖ” pan мӨ‘лӢЁ.
                        if (drag.active) { drag.active = false; el.classList.remove('dragging'); }
                        pinch.active = true;
                        pinch.dist = getDist(e.touches[0], e.touches[1]);
                        pinch.zoomStart = zoomRef.current;
                    } else if (e.touches.length === 1) {
                        pinch.active = false;
                        beginPan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchMove = (e) => {
                    if (pinch.active && e.touches.length === 2) {
                        e.preventDefault();
                        const d = getDist(e.touches[0], e.touches[1]);
                        if (pinch.dist === 0) return;
                        const ratio = d / pinch.dist;
                        const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinch.zoomStart * ratio));
                        if (Math.abs(next - zoomRef.current) < 0.001) return;
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const factor = next / zoomRef.current;
                        const rect = el.getBoundingClientRect();
                        const focusOffsetX = midX - rect.left;
                        const focusOffsetY = midY - rect.top;
                        const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                        const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                        zoomRef.current = next;
                        scrollRef.x = newScrollL;
                        scrollRef.y = newScrollT;
                        setZoom(next);
                        requestAnimationFrame(() => {
                            el.scrollLeft = newScrollL;
                            el.scrollTop = newScrollT;
                        });
                    } else if (drag.active && e.touches.length === 1) {
                        e.preventDefault();
                        continuePan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchEnd = (e) => {
                    if (e.touches.length < 2) pinch.active = false;
                    if (e.touches.length === 0) endPan();
                };

                // в”Җв”Җ Click capture вҖ” л“ңлһҳк·ё нӣ„ л°ңмғқн•ң click м–өм ң в”Җв”Җв”Җв”Җв”Җ
                const onClickCapture = (e) => {
                    if (blockNextClick) {
                        e.stopPropagation();
                        e.preventDefault();
                        blockNextClick = false;
                    }
                };

                el.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                el.addEventListener('wheel', onWheel, { passive: false });
                el.addEventListener('touchstart', onTouchStart, { passive: false });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('touchcancel', onTouchEnd);
                el.addEventListener('click', onClickCapture, true);

                return () => {
                    el.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    el.removeEventListener('wheel', onWheel);
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('touchcancel', onTouchEnd);
                    el.removeEventListener('click', onClickCapture, true);
                };
            }, []);

            // D-50/D-89: м—”нӢ°нӢ° л§җ(piece) вҖ” нғҖмқј мң„м—җ м–№нһҲлҠ” SVG text мҳӨлІ„л Ҳмқҙ.
            //   transition мҠ¬лқјмқҙл“ң ліҙмЎҙмқ„ мң„н•ҙ лӢЁмқј SVG text мқёмҠӨн„ҙмҠӨлҘј мң м§Җ.
            //   D-89: нғҖмқј мӨ‘м•ҷ нҶөн•© мҠӨнғқ лҸ„мһ… вҶ’ player/bossлҸ„ к·ё мҠӨнғқмқҳ н•ң мҠ¬лЎҜмқ„ м°Ём§Җ.
            //   HexTile/GameMap л‘ҳ лӢӨ computeTileIconsлЎң к°ҷмқҖ мһ…л ҘвҶ’к°ҷмқҖ кІ°кіјлҘј л°ӣм•„
            //   мҠ¬лЎҜ мқёлҚұмҠӨк°Җ мһҗлҸҷ мқјм№ҳн•ңлӢӨ.
            const computeStackOffset = (tileObj, isPlayerTile, isBossTile) => {
                if (!tileObj) return null;
                const ctx = {
                    isCurrent: isPlayerTile,
                    isBoss: isBossTile,
                    showPrey: tileObj.visited && (preys || []).some(p => p.tileId === tileObj.id) && !isBossTile,
                    preyEmoji: (() => {
                        const p = (preys || []).find(pp => pp.tileId === tileObj.id);
                        return p ? (PREY_EMOJI[p.preyType] || 'вқ“') : null;
                    })(),
                    hasCarcass: carcassTiles && carcassTiles.has && carcassTiles.has(tileObj.id),
                    hasTrace: preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tileObj.id),
                    hasCarcassTrace: carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tileObj.id),
                    hasBait: baitTiles && baitTiles.has && baitTiles.has(tileObj.id)
                };
                const icons = computeTileIcons(tileObj, ctx);
                const layout = TILE_STACK_LAYOUTS[Math.min(icons.length, TILE_STACK_MAX)] || [];
                const idx = icons.findIndex(i => isPlayerTile ? i.isPlayer : i.isBoss);
                return (idx >= 0 && layout[idx]) ? layout[idx] : { dx: 0, dy: 8 };
            };
            const playerTile = tiles[currentTile];
            const playerPos = playerTile && playerTile.position;
            const playerStackOff = playerPos
                ? computeStackOffset(playerTile, true, !!(boss && bossVisible && boss.position === currentTile))
                : null;
            const bossTile = (boss && bossVisible && tiles[boss.position]) ? tiles[boss.position] : null;
            const bossPiecePos = bossTile ? bossTile.position : null;
            const bossStackOff = bossPiecePos
                ? computeStackOffset(bossTile, currentTile === boss.position, true)
                : null;

            // D-165 (2026-04-29 мҡ”н•ң): ліҙмҠӨ мң„нҳ‘ лӢЁкі„ н…Ңл‘җлҰ¬.
            //   л©”мӢңм§Җ мӢңмһ‘ prefix 'вҹҰbossThreat:1|2вҹ§' м¶”м¶ң нӣ„ ліёл¬ём—җм„ң м ңкұ°.
            //   1=imminent(мқём ‘ 1м№ё, л№Ёк°•), 2=near(2м№ё, л…ёлһ‘), к·ё мҷё=кё°ліё.
            let messageBody = message || '';
            let bossThreatLevel = 0;
            const __threatMatch = messageBody.match(/^вҹҰbossThreat:([12])вҹ§/);
            if (__threatMatch) {
                bossThreatLevel = Number(__threatMatch[1]);
                messageBody = messageBody.slice(__threatMatch[0].length);
            }
            const messageBorderColor = bossThreatLevel === 1 ? '#c34d4d'
                : bossThreatLevel === 2 ? '#d4a032' : '#2a2f4a';
            const messageBorderWidth = bossThreatLevel ? '2px' : '1px';
            const messageShadow = bossThreatLevel === 1
                ? '0 6px 22px rgba(195,77,77,0.45)'
                : bossThreatLevel === 2
                    ? '0 6px 22px rgba(212,160,50,0.38)'
                    : '0 6px 18px rgba(0,0,0,0.55)';

            return (
                <div className="map-area">
                    {/* D-120 вҶ’ D-121 (мҡ”н•ң м§ҖмӢң): л©”мӢңм§Җ м№ҙл“ң мң„м№ҳ ліҖкІҪ.
                        н•ҳлӢЁ ui-panel л°”лЎң мң„лЎң лқ„мӣҖ (bottom 10px), мўҢмҡ° 10px л§Ҳм§„ н’ҖмҠӨнҠёл Ҳм№ҳ.
                        н•ң лҺҒмҠӨ мң„м—җ л–  мһҲлҠ” лҠҗлӮҢ + м№ҙл“ң мҳҒм—ӯкіј к°Җк№Ңмқҙ.
                        rgba(0,0,0,0.95) + мһ‘мқҖл”°мҳҙн‘ң мқёмҡ© + к·ёлҰјмһҗ. */}
                    <div style={{
                        position: 'absolute',
                        bottom: '10px',
                        left: '10px',
                        right: '10px',
                        // D-122: z-index м ңкұ° вҖ” modal(.modal z-index:100, fixed) м•„лһҳлЎң мһҗм—° мҠӨнғқ.
                        //   .map-area лӮҙл¶Җ absoluteлқј к°ҷмқҖ м»Ён…ҚмҠӨнҠёмқҳ нҳ•м ңл§Ң мң„м—җ мһҲмқҢ.
                        zIndex: 1,
                        pointerEvents: 'none',

        // D-52 (2026-04-23 мҡ”н•ң м§ҖмӢң): 'н’ҚмЎұн•ң л•…(кө¬ мўӢмқҖ кіі)'мқҖ лӘЁлӢ¬ вҶ’ нҶ мҠӨнҠёлЎң мқҙкҙҖ.
        // н•Ём •мқҖ н”јн•ҙ м •ліҙк°Җ мһҲм–ҙ лӘ…мӢңм Ғ нҷ•мқёмқҙ н•„мҡ”н•ҳлҜҖлЎң лӘЁлӢ¬ мң м§Җ.

        // D-158 (2026-04-28): мқҳмӮ¬кІ°м • м»Ён…ҚмҠӨнҠё л…ём¶ң.
        //   - лӘЁлӢ¬ мғҒлӢЁ: мІҙл Ҙ/л°°кі н””/л°ңк°Ғ + нҷңм„ұ мғҒнғңмқҙмғҒ лҜёлӢҲ л°”.

        //   - л¶Ҳнҷ•м •(branches/chance_*) кІ°кіјлҠ” мҲҳм№ҳ л…ём¶ң X вҖ” кІҢмһ„ кёҙмһҘк°җ мң м§Җ.
        //   props:
        //     event       вҖ” { id, title, intro_text, choices: [{id, label, effect_dsl}] }
        //     onChoose(c) вҖ” м„ нғқм§Җ нҒҙлҰӯ н•ёл“Өлҹ¬. л¶ҖлӘЁк°Җ effect м Ғмҡ© + лӘЁлӢ¬ лӢ«кё°.

        function EventChoiceModal({ event, onChoose, stats, statuses, inventory, onFlash }) {

            // мқёлІӨнҶ лҰ¬ м№ҙн…Ңкі лҰ¬ ліҙмң  м№ҙмҡҙнҠё вҖ” 'мқҢмӢқ' л“ұ н•ңкёҖ м№ҙн…Ңкі лҰ¬.
            // InventorySystemмқҖ кёҖлЎңлІҢ мӢқлі„мһҗ(class). resolveDefлЎң л…ём…ҳ л©”нғҖк№Ңм§Җ н•©міҗ м№ҙн…Ңкі лҰ¬ мЎ°нҡҢ.
            const countByCategory = (cat) => {
                if (!inventory || !Array.isArray(inventory.items)) return 0;
                const want = String(cat || '').trim();
                let n = 0;
                for (const it of inventory.items) {
                    const def = (typeof InventorySystem !== 'undefined' && typeof InventorySystem.resolveDef === 'function')
                        ? InventorySystem.resolveDef(it.type) : null;
                    const got = (def && (def['м№ҙн…Ңкі лҰ¬'] || def.category)) || '';
                    if (got === want) n++;
                }
                return n;
            };

            const detectionColor = detection < 30 ? '#4CAF50' : detection < 60 ? '#FFC107' : '#e94560';

            return (

                    }}>
                        {/* D-158: лҜёлӢҲ мҠӨнғҜ н—ӨлҚ” вҖ” мқҳмӮ¬кІ°м •м—җ н•„мҡ”н•ң нҳ„мһ¬к°’ л…ём¶ң. */}
                        <div style={{

                            <span title="л°ңк°ҒлҘ ">рҹҡЁ <span style={{ color: detectionColor, fontWeight: 600 }}>{detection}%</span></span>

                        <div style={{ fontSize: '18px', fontWeight: 600, marginBottom: '12px', color: '#f4d28a' }}>

                                const parsed = (window.EffectParser && window.EffectParser.parseEventEffect)
                                    ? window.EffectParser.parseEventEffect(c.effect_dsl || '')
                                    : { actions: [] };
                                const summary = (window.EffectParser && window.EffectParser.summarizeEventEffects)
                                    ? window.EffectParser.summarizeEventEffects(parsed)
                                    : { labels: [], uncertain: false, itemConsume: [] };

                                // D-159: filterлҠ” мҳҒл¬ё мӢқлі„мһҗ(food/material/consumable). UI лқјлІЁмқҖ н•ңкөӯм–ҙ.
                                const FILTER_LABEL_KR = { food: 'мқҢмӢқ', material: 'мһ¬лЈҢ', consumable: 'мҶҢлӘЁн’Ҳ' };
                                let lackLabel = null;
                                for (const req of (summary.itemConsume || [])) {
                                    if (countByCategory(req.filter) < req.count) {
                                        const krLabel = FILTER_LABEL_KR[req.filter] || req.filter;
                                        lackLabel = `${krLabel} м—ҶмқҢ`;
                                        break;
                                    }
                                }
                                const disabled = !!lackLabel;

                                return (
                                    <button
                                        key={c.id}
                                        onClick={() => {
                                            if (disabled) {
                                                if (onFlash) onFlash(`${lackLabel.replace('м—ҶмқҢ', 'мқҙ(к°Җ) м—ҶлӢӨ.')}`);
                                                return;
                                            }
                                            onChoose(c);
                                        }}

                                            background: disabled ? 'rgba(60, 58, 80, 0.4)' : 'rgba(60, 58, 80, 0.85)',

        // D-159 (2026-04-28) мқҙлІӨнҠё м„ нғқ кІ°кіј нҢқм—….
        //
        // л””мһҗмқё мқҳлҸ„:
        //   - м„ нғқм§Җ нҒҙлҰӯ вҶ’ нҡЁкіј мҰүмӢң м Ғмҡ© вҶ’ лӘЁлӢ¬ лӢ«нһҳмқҳ кё°мЎҙ нқҗлҰ„мқҖ мӮ¬мҡ©мһҗк°Җ
        //     м Ғмҡ©лҗң кІ°кіјлҘј мқём§Җн•  мӢңк°„мқҙ л¶ҖмЎұн–ҲлӢӨ(нҠ№нһҲ л¶„кё°В·н’Җ м¶”мІЁ кІ°кіј).
        //   - нҡЁкіј кІ°кіј(line н…ҚмҠӨнҠё лҲ„м Ғ)лҘј лӘЁм•„ лі„лҸ„ нҢқм—…мңјлЎң л…ём¶ң. нҷ•мқё лҲ„лҘҙкё°
        //     м „к№Ңм§Җ нӣ„мҶҚ мІҳлҰ¬(мқҙлҸҷ/нҺҳмқҙл“ң)лҘј ліҙлҘҳн•ҙ кІ°кіјлҘј м¶©л¶„нһҲ мқҪлҸ„лЎқ.

        // м•„мқҙн…ң м •ліҙм°Ҫ вҖ” мқҙлҰ„/л“ұкёү/к°Җл°©м№ёмҲҳ/м„ұлҠҘ(effect)/мӮ¬мҡ© лІ„нҠј
        //
        // лҚ°мқҙн„° мҶҢмҠӨ мҡ°м„ мҲңмң„:
        //   1) window.TTD_DATA.ITEMS (Notion SSOT) вҖ” 'мқҙлҰ„'мңјлЎң мЎ°нҡҢ, effect нҸ¬н•Ё
        //   2) InventorySystem.ITEMS[item.type] вҖ” кө¬лІ„м „ нҸҙл°ұ
        function ItemInfoModal({ item, onUse, onLureBait, onClose }) {
            const invDef = InventorySystem.ITEMS[item.type] || {};
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (invDef.name || item.name));
            // D-51: л¬ҙкё° л©”нғҖ вҖ” TTD_DATA.WEAPONSм—җм„ң м§Ғм ‘ мЎ°нҡҢ (м•„мқҙн…ңл§ҲмҠӨн„° нғӯмқҙ м•„лӢҳ).
            const weaponsBundle = (window.TTD_DATA && Array.isArray(window.TTD_DATA.WEAPONS)) ? window.TTD_DATA.WEAPONS : [];
            const weaponDef = weaponsBundle.find(w => w && w.id === item.type);

            // D-156: л№Ңл“ң мәҗмӢң(notionItem.effect)лҠ” мӢ к·ң DSL нҶ нҒ°(hint:/place_snare/shield_trap)мқ„
            //   мқёмӢқн•ҳм§Җ лӘ»н•ң мұ„лЎң көім–ҙмһҲмқ„ мҲҳ мһҲлӢӨ. лҹ°нғҖмһ„м—җм„ң raw л¬ёмһҗм—ҙмқ„ EffectParserлЎң лӢӨмӢң
            //   нҢҢмӢұн•ҙ мӢ к·ң нҶ нҒ°к№Ңм§Җ л°ҳмҳҒ. rawк°Җ м—Ҷмңјл©ҙ мәҗмӢңлҗң effectлЎң нҸҙл°ұ.
            const cachedEffect = (notionItem && notionItem.effect) || null;
            const rawEffect = (notionItem && (notionItem['мӮ¬мҡ© нҡЁкіј'] || (cachedEffect && cachedEffect.raw))) || '';
            const effect = (window.EffectParser && rawEffect)
                ? window.EffectParser.parseItemEffect(rawEffect)
                : cachedEffect;
            const usable = !!(effect && effect.usable);
            const effectLabel = window.EffectParser
                ? window.EffectParser.describeEffect(effect)
                : (effect && effect.raw) || 'нҡЁкіј м—ҶмқҢ';

            const grade = (notionItem && notionItem['м•„мқҙн…ң л“ұкёү'])
                || (weaponDef && weaponDef['м•„мқҙн…ң л“ұкёү'])
                || null;
            const slot = (notionItem && notionItem['к°Җл°©м№ёмҲҳ'])
                || (weaponDef && weaponDef['к°Җл°©м№ёмҲҳ'])
                || '1x1';
            // D-51: л¬ҙкё° лӮҙкө¬лҸ„ н‘ңмӢң (мқёмҠӨн„ҙмҠӨ durabilityLeft / мөңлҢҖ durability).
            const resolved = InventorySystem.resolveDef(item.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0) ? resolved.durability : null;
            const durLeft = (typeof item.durabilityLeft === 'number') ? item.durabilityLeft : maxDur;
            const description = (notionItem && notionItem['м„ӨлӘ… н…ҚмҠӨнҠё'])
                || (weaponDef && weaponDef['м„ӨлӘ… н…ҚмҠӨнҠё'])
                || '';

            return (
                <div
                    className="modal"
                    style={{ zIndex: 1000 }}
                    onClick={onClose}
                >
                    <div
                        className="modal-content"
                        style={{ maxWidth: '320px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            {/* D-92 (2026-04-25 мҡ”н•ң м§ҖмӢң): м•„мқҙн…ң м„ӨлӘ… нҢқм—…м°Ҫм—” м•„мқҙмҪҳ + мқҙлҰ„ н•Ёк»ҳ. */}
                            <h3 style={{ margin: 0, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                {(() => {
                                    const e = itemEmoji(item.type);
                                    return e
                                        ? <span style={{ fontSize: '24px', lineHeight: 1 }}>{e}</span>
                                        : null;
                                })()}
                                <span>{invDef.name || item.name}</span>
                            </h3>
                            <button onClick={onClose}>лӢ«кё°</button>
                        </div>

                        <div style={{ fontSize: '13px', lineHeight: '1.7', color: '#ddd' }}>
                            {grade && <div>л“ұкёү: <span style={{ color: '#fff' }}>{grade}</span></div>}
                            <div>к°Җл°©м№ёмҲҳ: <span style={{ color: '#fff' }}>{slot}</span></div>
                            <div>м„ұлҠҘ: <span style={{ color: usable ? '#8bd17c' : '#888' }}>{effectLabel}</span></div>
                            {maxDur && (
                                <div>лӮҙкө¬лҸ„: <span style={{ color: '#d4b84a' }}>{durLeft}/{maxDur}</span></div>
                            )}
                            {description && (
                                <div style={{ marginTop: '8px', fontSize: '11px', color: '#aaa' }}>
                                    {description}
                                </div>
                            )}
                        </div>

                        <div style={{ marginTop: '14px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                            <button
                                onClick={onUse}
                                disabled={!usable}
                                style={{
                                    padding: '10px',
                                    background: usable ? '#4CAF50' : '#555',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? 'мӮ¬мҡ©н•ҳкё°' : 'мӮ¬мҡ© л¶Ҳк°Җ'}
                            </button>
                            {/* D-94 (2026-04-25 мҡ”н•ң м§ҖмӢң): is_bait н”Ңлһҳк·ё м•„мқҙн…ң вҖ” [лЁ№мқҙлЎң мң мқён•ҳкё°] лІ„нҠј.
                                нҳ„мһ¬ нғҖмқјм—җ лЁ№мқҙлҘј лҶ“м•„ ліҙмҠӨлҘј мң лҸ„. мқёлІӨм—җм„ң 1к°ң м°Ёк°җ. */}
                            {(resolved.is_bait || (notionItem && notionItem.is_bait)) && typeof onLureBait === 'function' && (
                                <button
                                    onClick={onLureBait}
                                    style={{
                                        padding: '10px',
                                        background: '#7a3a1f',
                                        color: '#ffd79e',
                                        border: '1px solid #d4883a',
                                        borderRadius: '4px',
                                        cursor: 'pointer',
                                        fontWeight: 600
                                    }}
                                >
                                    рҹҚ– лЁ№мқҙлЎң мң мқён•ҳкё°
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // мқёлІӨнҶ лҰ¬ лӘЁлӢ¬ м»ҙнҸ¬л„ҢнҠё
        //
        // м•„мқҙн…ң мқён„°лһҷм…ҳ л¶„кё°:
        //   - м§§мқҖ нғӯ (< 400ms лӮҙм—җ л–јл©ҙ) вҶ’ м •ліҙм°Ҫ лӘЁлӢ¬
        //   - кёҙ лҲ„лҰ„ (вүҘ 400ms мң м§Җ) вҶ’ кё°мЎҙ лҸҷмһ‘(м„ нғқ/мқҙлҸҷ/лЁём§Җ/нҡҢм „)
        // мһ„кі„к°’ 400ms мұ„нғқ к·јкұ°: Android н‘ңмӨҖ long-press(500ms)ліҙлӢӨ мӮҙм§қ л№ лҘҙкІҢ, iOS кё°ліё(вүҲ300ms)ліҙлӢӨлҠ” м—¬мң лЎӯкІҢ.
        // кІҢмһ„мқҖ м—°нғҖ/л“ңлһҳк·ёк°Җ мһҰм•„ м§§мқҖ мқҳлҸ„лҘј лҶ“м№ҳл©ҙ лӢөлӢөн•ҳкі , л°ҳлҢҖлЎң л„Ҳл¬ҙ м§§мңјл©ҙ мҠӨмҷҖмқҙн”„к°Җ мһҳлӘ» мқёмӢқлҗңлӢӨ.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onLureBait, onFlashMessage, title, mode, activeQuests }) {
            // D-171 (мҡ”н•ң): м§„н–ү мӨ‘ нҖҳмҠӨнҠёк°Җ мҡ”кө¬н•ҳлҠ” type м§‘н•© вҶ’ м•„мқҙн…ң мҡ°мғҒлӢЁ л…ёлһҖ вң“ л§Ҳм»Ө.
            //   нҖҳмҠӨнҠё м •мқҳлҠ” getTentQuestDef мӮ¬мҡ©. мқҙлҜё м¶©мЎұлҗң typeмқҖ л§Ҳм»Ө мғқлһө(мҶҢм§Җк°Җ мқҳлҜё м—Ҷмқ„ л•Ң мӢңк°Ғ мһЎмқҢ л°©м§Җ).
            const questRequiredTypes = React.useMemo(() => {
                const set = new Set();
                if (!Array.isArray(activeQuests) || activeQuests.length === 0) return set;
                for (const q of activeQuests) {
                    const def = (typeof getTentQuestDef === 'function') ? getTentQuestDef(q.id) : null;
                    if (!def || !def.requirements) continue;
                    const items = (inventory && Array.isArray(inventory.items)) ? inventory.items : [];
                    for (const [type, need] of Object.entries(def.requirements)) {
                        const have = items.filter(it => it.type === type).length;
                        if (have < Number(need)) set.add(type);
                    }
                }
                return set;
            }, [activeQuests, inventory && inventory.items && inventory.items.length]);
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // нҷ•м • лҢҖкё° мң„м№ҳ (к·ёлҰ¬л“ң м…Җмқ„ лҲҢлҹ¬ м§Җм •)
            const [pendingPos, setPendingPos] = React.useState(null);
            // м •ліҙм°ҪмңјлЎң лқ„мҡё м•„мқҙн…ң (nullмқҙл©ҙ м •ліҙм°Ҫ лӢ«нһҳ)
            const [infoItem, setInfoItem] = React.useState(null);

            // D-104 (2026-04-27 мҡ”н•ң м§ҖмӢң): н•©м„ұ нҢЁл„җ н•ӯмғҒ л ҢлҚ” + м№ҙн…Ңкі лҰ¬ нғӯ.
            //   л№„м„ нғқ мғҒнғңм—җм„ңлҸ„ лӘЁл“  л ҲмӢңн”јлҘј м№ҙн…Ңкі лҰ¬лі„лЎң н•„н„°л§Ғн•ҙ л…ём¶ң.
            //   мң м Җк°Җ л§Ҳм§Җл§үмңјлЎң кі лҘё м№ҙн…Ңкі лҰ¬лҠ” localStorageм—җ ліҙмЎҙ.
            const [recipeCategory, setRecipeCategory] = React.useState(() => {
                try {
                    const v = localStorage.getItem('ttd:invRecipeCategory');
                    return v && ['all', 'food', 'weapon', 'armor', 'material'].includes(v) ? v : 'all';
                } catch { return 'all'; }
            });
            const updateRecipeCategory = (cat) => {
                setRecipeCategory(cat);
                try { localStorage.setItem('ttd:invRecipeCategory', cat); } catch {}
            };

            // к°Җл°© лӢ«кё° вҖ” м„ нғқ лӘЁл“ңлҸ„ н•Ёк»ҳ м·ЁмҶҢ(D-104 мҡ”н•ң м§ҖмӢң: лӢ«кі  лӢӨмӢң м—ҙм–ҙлҸ„ м„ нғқлӘЁл“ң мң м§Җлҗҳл©ҙ м•Ҳ лҗЁ).
            const handleClose = () => {
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                closeInventory();
            };

            // D-47: к°Җл°© нҒ¬кё°лҠ” inventory мқёмҠӨн„ҙмҠӨ кё°мӨҖ. disabled м…ҖмқҖ inventory.isDisabledлЎң.
            // D-174 v4 (мҡ”н•ң): ліҙкҙҖн•Ё(storage)мқҖ 7м—ҙ лӘЁл°”мқј fitмқ„ мң„н•ҙ м…Җ 40pxлЎң м¶•мҶҢ.
            // D-174 v6 (мҡ”н•ң): CELLмқҖ "м…ҖнҸӯ + gap"(=лӢӨмқҢ м…Җ мӢңмһ‘ к°„кІ©), PADлҠ” к·ёлҰ¬л“ң мһҗмІҙ padding.
            //   - кІҢмһ„ мқёлІӨ: м…Җ 45 + gap 2 вҶ’ CELL=47, grid padding 4 вҶ’ PAD=4.
            //   - ліҙкҙҖн•Ё:   м…Җ 40 + gap 2 вҶ’ CELL=42, grid padding 4 вҶ’ PAD=4.
            //   v4мқҳ CELL=40/PAD=3мқҖ м…ҖнҸӯл§Ң ліё мҳӨлҘҳ вҖ” м•„мқҙн…ңВ·лҜёлҰ¬ліҙкё°В·floating мўҢн‘ңк°Җ
            //   н•ҳлӢЁмңјлЎң к°ҲмҲҳлЎқ лҲ„м Ғ 5~10px м–ҙкёӢлӮ¬мқҢ. мқҙлІҲм—җ м •м •.
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = mode === 'storage' ? 42 : 47;
            const PAD = 4;
            const LONG_PRESS_MS = 400;

            // н”„л ҲмҠӨ мғҒнғңлҘј refлЎң кҙҖлҰ¬н•ҙ мһ¬л ҢлҚ” м—Ҷмқҙ нғҖмқҙлЁё/к°Җл“ң к°ұмӢ .
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // D-83 (2026-04-24 мҡ”н•ң м§ҖмӢң): нғӯ вҶ” лЎұн”„л ҲмҠӨ м—ӯн•  мҠӨмҷ‘.
            //   мӢ к·ң UX:
            //     - м§§мқҖ нғӯ  = м„ нғқ лӘЁл“ң м§„мһ…/нҶ кёҖ/лЁём§Җ/swap (мЈј мЎ°мһ‘)
            //     - лЎұн”„л ҲмҠӨ = м•„мқҙн…ң м •ліҙм°Ҫ
            //     - мЎ°н•©мқҖ н•ҳлӢЁ н•©м„ұ нҢЁл„җмқҳ [л§Ңл“Өкё°] лІ„нҠј м „мҡ© вҖ” лӢӨлҘё мһ¬лЈҢ нғӯмқҖ swapл§Ң мҲҳн–ү.
            //   мқҙм „ UX(D-32)лҠ” лЎұн”„л ҲмҠӨ=м„ нғқ, нғӯ=м •ліҙм°Ҫ+мһҗлҸҷ мЎ°н•©мқҙм—ҲмңјлӮҳ,
            //   "мң„м№ҳ көҗмІҙн•ҳл ӨлӢӨ мқҳлҸ„м№ҳ м•ҠкІҢ мЎ°н•©мқҙ л°ңлҸҷ"лҗҳлҠ” мјҖмқҙмҠӨк°Җ мһҲм–ҙ мЈј мЎ°мһ‘мқ„ нғӯмңјлЎң
            //   л„ҳкё°кі  мЎ°н•©мқҖ лӘ…мӢңм Ғ лІ„нҠјмңјлЎңл§Ң л¶„лҰ¬.
            const onShortTap = (item) => {
                // м„ нғқ м—ҶмқҢ вҶ’ м„ нғқ м§„мһ…(л“Өм–ҙмҳ¬лҰј)
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                // к°ҷмқҖ м•„мқҙн…ң нғӯ вҶ’ м„ нғқ н•ҙм ң(нҶ кёҖ)
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                    return;
                }
                // лӢӨлҘё м•„мқҙн…ң нғӯ вҶ’ confirmPlacementлЎң мқјмһ„:
                //   В· к°ҷмқҖ мһ¬лЈҢ(canMerge) вҶ’ мҰүмӢң лЁём§Җ
                //   В· лӢӨлҘё мһ¬лЈҢ вҶ’ swap (мЎ°н•©мқҖ н•©м„ұ нҢЁл„җ м „мҡ©, мһҗлҸҷ л°ңлҸҷ м•Ҳ н•Ё)
                const res = inventory.confirmPlacement(item.x, item.y);
                applyDropResult(res);
                bump();
            };

            // лЎұн”„л ҲмҠӨ: м•„мқҙн…ң м •ліҙм°Ҫ.
            const onLongPressInfo = (item) => {
                setInfoItem(item);
            };

            // D-48: confirmPlacement кІ°кіј л°ҳмҳҒ кіөнҶө н—¬нҚј.
            //   - merge: мҰүмӢң мӢӨн–ү (кё°мЎҙ лҸҷмһ‘).
            //   - swap: мғҲ м•„мқҙн…ңмңјлЎң м„ нғқ м „нҷҳ.
            //   - place: л°°м№ҳ нӣ„ м„ нғқ н•ҙм ң.
            //   н•©м„ұ нҢЁл„җмқҖ 'м„ нғқлҗң м•„мқҙн…ң кё°мӨҖ'мңјлЎң мһҗлҸҷ л…ём¶ңлҗҳлҜҖлЎң craft_prompt кІҪлЎң м—ҶмқҢ.
            const applyDropResult = (res) => {
                if (!res || !res.ok) return false;
                if (res.action === 'swap') {
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                    return true;
                }
                setSelectedItem(null);
                setPendingPos(null);
                if (onFlashMessage && res.resultType && res.action === 'merge') {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    onFlashMessage(`л‘җ мһ¬лЈҢлҘј н•©міҗ ${resultName}мқ„(лҘј) м–»м—ҲлӢӨ.`);
                }
                return true;
            };

            // D-47 [л§Ңл“Өкё°] лІ„нҠј н•ёл“Өлҹ¬ вҖ” мӢӨм ң мһ¬лЈҢ мҶҢл№„В·кІ°кіј л°°м№ҳлҠ” inventory.craftRecipe.
            // D-48: м„ұкіө мӢң м„ нғқ н•ҙм ң (мһ¬лЈҢк°Җ м„ нғқлҗң м•„мқҙн…ңмқҙм—Ҳмқ„ мҲҳ мһҲмқҢ). нҢЁл„җмқҖ selectedItem
            //   кё°л°ҳмқҙлқј н•ҙм ңл§Ң н•ҙлҸ„ мһҗлҸҷмңјлЎң лӢ«нһҳ.
            const handleCraft = (recipe) => {
                const res = inventory.craftRecipe(recipe);
                if (res.ok) {
                    if (onFlashMessage) {
                        const resultDef = InventorySystem.ITEMS[res.resultType] || {};
                        const name = resultDef.name || res.resultType;
                        // D-71: count>1 л ҲмӢңн”ј вҖ” produced/overflow м•ҲлӮҙ.
                        const produced = Number(res.produced || 1);
                        let msg = produced > 1
                            ? `мһ¬лЈҢлҘј мЎ°н•©н•ҙ ${name} ${produced}к°ңлҘј л§Ңл“Өм—ҲлӢӨ.`
                            : `мһ¬лЈҢлҘј мЎ°н•©н•ҙ ${name}мқ„(лҘј) л§Ңл“Өм—ҲлӢӨ.`;
                        if (res.overflow > 0) msg += ` (к°Җл°©мқҙ к°Җл“қ м°Ё ${res.overflow}к°ңлҠ” л‘җкі  мҷ”лӢӨ.)`;
                        onFlashMessage(msg);
                    }
                    inventory.selectedItem = null;
                    setSelectedItem(null);
                    setPendingPos(null);
                } else if (res.reason === 'no_space') {
                    if (onFlashMessage) onFlashMessage('к°Җл°©мқҙ к°Җл“қ м°Ё л§Ңл“Ө мҲҳ м—ҶлӢӨ.');
                } else if (res.reason === 'short_ingredients') {
                    if (onFlashMessage) onFlashMessage('мһ¬лЈҢк°Җ л¶ҖмЎұн•ҳлӢӨ.');
                }
                bump();
            };

            // D-83: нҸ¬мқён„° н•ёл“Өлҹ¬ вҖ” м§§мқҖ нғӯ=onShortTap, лЎұн”„л ҲмҠӨ=onLongPressInfo.
            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // л§Ҳмҡ°мҠӨ мҡ°нҒҙлҰӯ/мӨ‘к°„нҒҙлҰӯ л¬ҙмӢң
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    onLongPressInfo(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) onShortTap(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // л Ҳкұ°мӢң: кё°мЎҙ onClick кІҪлЎң мң м§Җ (нӮӨліҙл“ң м ‘к·јм„ұ/кё°мЎҙ н…ҢмҠӨнҠё нҳёнҷҳ).
            // нҸ¬мқён„° кё°л°ҳ л¶„кё°к°Җ л°ңлҸҷн•ҳл©ҙ longFiredк°Җ trueк°Җ лҗҳм–ҙ мӨ‘ліө нҳём¶ңлҗҳм§Җ м•ҠлҸ„лЎқ к°Җл“ң.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // нҸ¬мқён„° мқҙлІӨнҠёк°Җ м“°мқҙм§Җ м•ҠлҠ” нҷҳкІҪм—җм„ңмқҳ нҸҙл°ұ
                onShortTap(item);
            };

            // мӮ¬мҡ© лІ„нҠј вҖ” нҡЁкіј м Ғмҡ© нӣ„ мқјнҡҢмҡ©мқҙл©ҙ мқёлІӨм—җм„ң м ңкұ°, м •ліҙм°Ҫ лӢ«кё°
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // м•„мқҙн…ң м ңкұ°
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };
