            //   preys          вАФ лІµмЧР мВімХДмЮИлКФ мВђлГ•к∞Р л∞∞мЧі [{id, tileId, preyType, hpCurrent?}].
            //   preyTraceTiles вАФ listen/лПДлІЭ к≤∞к≥Љл°Ь к∞РмІАлРЬ "кЄ∞м≤Щ" нГАмЭЉ id Set (visited лђікіА нСЬмЛЬ).
            //   activeHunt     вАФ м†ДнИђ л™®лЛђ нЩЬмД±нЩФ мЛЬ {prey}, лѓЄнЩЬмД± null.
            //   D-48: л∞ЬмЮРкµ≠ л∞©нЦ• нЩФмВінСЬ(preyFootprints) м†Ьк±∞ вАФ нЭФм†Б(рЯС£)лІМмЬЉл°Ь лЛ®мДЬ м†Ьк≥µ.
            const [preys, setPreys] = useState([]);
            const [preyTraceTiles, setPreyTraceTiles] = useState(new Set());
            const [activeHunt, setActiveHunt] = useState(null);
            // D-77/D-78: лПЩлђЉ мВђм≤і нГАмЭЉ. л≥імК§ нПђмЛЭ мЩДл£М мЛЬ мЧђкЄ∞мЧР tileIdк∞А мґФк∞АлР®.
            //   carcassMeatTakenмЭА мЭілѓЄ мГЭк≥†кЄ∞ л≥ілДИмК§ 1нЪМ мЖМмІДнХЬ нГАмЭЉ(лТ§м†Єл≥ікЄ∞ л≥імГБмЪ©).
            // D-90 (2026-04-25): carcassTilesлКФ SetвЖТMap. value={preyType} л≥ім°і вЖТ мВђм≤і
            //   нГАмЭЉ лПДм∞© мЛЬ "к±∞лМАнХЬ мІРмКємЭі OOOмЭД лЬѓмЦіл®ємЭА нЭФм†Б" л©ФмЛЬмІАмЧР мВђлГ•к∞Р мЭіл¶Д мВђмЪ©.
            //   .has(tileId) м≤інБђлКФ MapлПД лПЩмЭЉ вАФ кЄ∞м°і мВђмЪ©м≤Ш лђінЪМкЈА.
            const [carcassTiles, setCarcassTiles] = useState(new Map());
            const [carcassMeatTaken, setCarcassMeatTaken] = useState(new Set());
            // D-90: мВђм≤і нГАмЭЉ м≤Ђ лПДм∞© мЛЬ мХМл¶Љ нСЬмЛЬ лІИмї§. мЭілѓЄ лПДм∞©нХЬ нГАмЭЉмЭА мЮђл∞©лђЄнХілПД мє®лђµ.
            const [carcassVisitedTiles, setCarcassVisitedTiles] = useState(new Set());
            // D-90: м†ЬмЮРл¶ђ [мЛЬк∞Д л≥ілВікЄ∞] нЩХмЭЄ л™®лЛђ.
            const [waitConfirmOpen, setWaitConfirmOpen] = useState(false);
            // D-90: listen мЛЬ мЭЄм†С нПђмЛЭм§С л≥імК§ л∞Ьк≤ђ л™®лЛђ лН∞мЭінД∞ ({preyType, preyName}|null).
            const [predationListenInfo, setPredationListenInfo] = useState(null);
            // D-94 (2026-04-25 мЪФнХЬ мІАмЛЬ): к±∞лМАнХЬ л®ємЭі мЬ†мЭЄ вАФ нГАмЭЉмЧР лЖУмЭЄ л®ємЭі tileId Set.
            //   л≥імК§мЭШ predation нЫДл≥іл°Ь preyмЩА лПЩмЭЉнХШк≤М м≤Шл¶ђ(synthetic prey к∞Эм≤іл°Ь onPlayerMoveмЧР м†ДлЛђ).
            //   л≥імК§к∞А лПДлЛђ мЛЬ onPredationStartк∞А isBait лґДкЄ∞л°Ь baitTilesмЧРмДЬ м†Ьк±∞.
            const [baitTiles, setBaitTiles] = useState(new Set());
            // D-78: listen мєілУЬл°Ь к∞РмІАлРЬ мВђм≤і trace нГАмЭЉ вАФ рЯС£ лМАмЛ† рЯ¶і нСЬмЛЬ.
            const [carcassTraceTiles, setCarcassTraceTiles] = useState(new Set());
            const mapRef = useRef(null);

            // нЖ†мК§нКЄ л∞ЬмВђ вАФ entriesлКФ лђґмЭМ нСЬмЛЬ лМАмГБ.
            // idлКФ мїінПђлДМнКЄк∞А phase нГАмЭіл®Єл•Љ мЮђмЛЬмЮСнХШкЄ∞ мЬДнХЬ key мЧ≠нХ†.
            const showLootToast = (entries) => {
                if (!entries || entries.length === 0) return;
                setLootToast({ id: Date.now() + Math.random(), entries });
            };

            // нГАмЭЉ мЭіл≤§нКЄ нЖ†мК§нКЄ л∞ЬмВђ вАФ emoji/title/message/color мВђмЦС.
            const showTileEventToast = (payload) => {
                if (!payload) return;
                setTileEventToast({ id: Date.now() + Math.random(), ...payload });
            };

            // D-46 (2026-04-23) вАФ м†ДнИђ к≤∞к≥Љ нЫДм≤Шл¶ђ.
            //   victory: preys м†Ьк±∞ + preyTraceTiles нХілЛє tileId мВ≠м†Ь + meat мЭЄл≤§ мґФк∞А(overflow мІСк≥Д)
            //            + LootToast(z-index мґ©лПМ л∞©мІАл°Ь setTimeout 100ms) + л©ФмЛЬмІА.
            //   prey_fled: habitat лІЮлКФ мЭЄм†С нГАмЭЉ м§С reserved(л≥імК§/нГИмґЬкµђ/лЛ§л•Є prey) м†ЬмЩЄнХШк≥† лЮЬлН§ мЭілПЩ.
            //              мЧЖмЬЉл©і м†ЬмЮРл¶ђ. мЭілПЩ мЛЬ preyFootprints[мЫР]={fromTile:мЫР, toTile:мГИ},
            //              preyTraceTilesмЧРмДЬ мЫР нГАмЭЉ м†Ьк±∞. л©ФмЛЬмІА: "мВђлГ•к∞РмЭі лПДлІЭм≥§лЛ§. л∞ЬмЮРкµ≠мЭі лВ®мХДмЮИлЛ§."
            //   player_fled: prey м†ЬмЮРл¶ђ. л©ФмЛЬмІА: "мВђлГ•мЭД нПђкЄ∞нХШк≥† лђЉлЯђмД∞лЛ§."
            const handleHuntResolve = (result) => {
                if (!activeHunt || !activeHunt.prey) {
                    setActiveHunt(null);
                    return;
                }
                const prey = activeHunt.prey;
                const outcome = result && result.outcome;

                // D-47/D-51: мВђмЪ©лРЬ мєілУЬмЭШ мЪФкµђ мЮђл£Мл•Љ мЭЄл≤§мЧРмДЬ м∞®к∞Р.
                //   - мЭЉл∞Ш мЮђл£М(лПМлІємЭі лУ±): 1к∞ЬмФ© removeItem.
                //   - лђікЄ∞ мЮђл£М: result.weaponUsageмЧРмДЬ мЭілѓЄ к≥ДмВ∞лРЬ used/fullLossCountл°Ь м∞®к∞Р
                //     (consumeWeaponUse вАФ durabilityLeft к∞РмЖМ, 0мЭіл©і м†Ьк±∞).
                //   autoFail нДімЭА мЛ§м†Ь мВђмЪ©мЭі мЧЖмЧИмЬЉлѓАл°Ь м†ЬмЩЄ.
                //   consumedSummaryлКФ victory л©ФмЛЬмІАмЧР "мЖМл™®: лПМлІємЭі 2к∞Ь" нШХнГЬл°Ь лНІлґЩмЮД.
                const consumedSummary = [];
                if (inventory && Array.isArray(result && result.turns)) {
                    // 1) лєДлђікЄ∞ мЮђл£М мІСк≥Д вАФ requirement мЭіл¶Д м§С weaponмЭі мХДлЛМ к≤ГлІМ.
                    const TTD = window.TTD_DATA || {};
                    const WEAPONS = Array.isArray(TTD.WEAPONS) ? TTD.WEAPONS : [];
                    const weaponNameSet = new Set(WEAPONS.map(w => w && w.name).filter(Boolean));

                    const consumeByName = {};
                    for (const turn of result.turns) {
                        if (turn && turn.autoFail) continue; // лђікЄ∞ мЧЖмЦімДЬ мЛ§нМ®нХЬ нДімЭА мЖМл™® мЧЖмЭМ
                        const uc = turn && turn.userCard;
                        if (!uc) continue;
                        const reqs = CombatDeck.parseRequirement(uc.requirement);
                        for (const rName of reqs) {
                            if (weaponNameSet.has(rName)) continue; // лђікЄ∞лКФ weaponUsage к≤љл°Ьл°Ь
                            // D-73: мєінЕМк≥†л¶ђ нЖ†нБ∞(shield/armor)мЭА мЖМлєД лМАмГБ мХДлЛШ вАФ л∞©мЦікµђлКФ лВікµђ к∞ЬлЕР мЧЖмЭМ.
                            if (CombatDeck.CATEGORY_REQ_TOKENS && CombatDeck.CATEGORY_REQ_TOKENS.has(rName)) continue;
                            consumeByName[rName] = (consumeByName[rName] || 0) + 1;
                        }
                    }
                    for (const [reqName, count] of Object.entries(consumeByName)) {
                        let remaining = count;
                        const keep = [];
                        for (const it of inventory.items) {
                            if (remaining > 0) {
                                const def = InventorySystem.resolveDef(it.type) || {};
                                if ((def.name || '') === reqName) {
                                    inventory.removeItem(it);
                                    remaining -= 1;
                                    continue;
                                }
                            }
                            keep.push(it);
                        }
                        inventory.items = keep;
                        const actuallyConsumed = count - remaining;
                        if (actuallyConsumed > 0) {
                            consumedSummary.push(`${reqName} ${actuallyConsumed}к∞Ь`);
                        }
                    }

                    // 2) лђікЄ∞ м∞®к∞Р вАФ weaponUsage {weaponId: {used, fullLossCount}}.
                    //   usedлКФ лВікµђлПД міЭ м∞®к∞РлЯЙ. лПЩмЭЉ weaponId мЭЄмК§нДімК§лУ§мЭД мИЬнЪМнХШл©∞
                    //   durabilityLeftк∞А лІОмЭА мИЬмЬЉл°Ь м∞®к∞Р(нХЬ мЮРл£® кЄ∞м§А мД§к≥ДмІАлІМ мЧђлЯђ мЮРл£®лПД мХИм†Д).
                    //   fullLoss нДімЭА нХЬ мЮРл£®л•Љ нЖµмІЄл°Ь лВ†л¶Љ вАФ мЭЄмК§нДімК§ 1мЮРл£®л•Љ 0мЬЉл°Ь.
                    const usage = (result && result.weaponUsage) || {};
                    for (const [weaponId, info] of Object.entries(usage)) {
                        const def = InventorySystem.resolveDef(weaponId) || {};
                        const displayName = def.name || weaponId;
                        const instances = inventory.items
                            .filter(it => it.type === weaponId)
                            .sort((a, b) => (b.durabilityLeft || 0) - (a.durabilityLeft || 0));

                        let fullLossLeft = Number(info.fullLossCount) || 0;
                        // мЪ∞мД† full_loss мєімЪінКЄлІМнБЉ мЮРл£®л•Љ нЖµмІЄл°Ь мЖМл©Є.
                        for (let i = 0; i < fullLossLeft && instances.length > 0; i++) {
                            const inst = instances[0];
                            inventory.consumeWeaponUse(inst, 0, true);
                            // instances л∞∞мЧі лПЩкЄ∞нЩФ (м†Ьк±∞лРРмЬЉлѓАл°Ь pop)
                            instances.shift();
                        }
                        // лВ®мЭА мЭЉл∞Ш м∞®к∞РлЯЙ = used - (full_lossл°Ь лВ†л¶∞ durability нХ©к≥Д) к≥ДмВ∞мЭі л≥µмЮ°нХШлЛИ,
                        // weaponUsage.usedлКФ мЭілѓЄ fullLossл•Љ нПђнХ®нХЬ міЭлЯЙмЭілѓАл°Ь мЭЉл∞Ш м∞®к∞РлґДлІМ лґДл¶ђ.
                        //   мЭЉл∞Ш = used - (fullLossCount лПЩмХИ мЖМл©ЄнХЬ durabilityмЭШ нХ©).
                        //   fullLossмЧРмДЬ мЖМл©ЄнХЬ durabilityлКФ кЈЄ мЮРл£®мЭШ durabilityLeftмШАмЭМ вАФ мґФм†БмЭі л≤Ик±∞л°≠лЛ§.
                        //   к∞ДлЛ®нЩФ: combatмЭШ weaponStateл•Љ кЈЄлМАл°Ь лѓњк≥†, fullLossCountлІМнБЉ мЮРл£®л•Љ мЖМл©ЄнХШлКФ
                        //   к≤ГмЬЉл°Ь лБЭлВЬлЛ§л©і(мЭЄмК§нДімК§ 1мЮРл£®лЭЉлКФ к≥µнЖµ мЉАмЭімК§мЧРмДЬ м†ХнЩХ), лВ®мЭА мЭЉл∞Ш м∞®к∞РмЭА
                        //   "used - fullLossл°Ь лВ†л¶∞ durability"л•Љ мИШлПЩ к≥ДмВ∞. нХШмІАлІМ combat м™љмЭі лЛ®мЭЉ
                        //   weaponState лН©мЦіл¶ђл°Ь м≤Шл¶ђнХШлѓАл°Ь, мЧђкЄ∞мД† 'fullLossCount'к∞А 1мЭіл©і кЈЄ мЮРл£®л•Љ нГЬмЪі к≤ГмЬЉл°Ь
                        //   мҐЕл£М. лВШл®ЄмІА нДімЭА мЭЉл∞Ш м∞®к∞Р.
                        //   вЖТ лНФ лЛ®мИЬнХЬ нХімДЭ: usedмЧРмДЬ fullLossл°Ь мЭілѓЄ мЖМл™®лРЬ durability(instances[0]мЭШ мЫРлЮШ к∞Т)л•Љ
                        //     лєЉк≥† лВ®мЭА лІМнБЉ мЭЉл∞Ш м∞®к∞Р. кЈЄлЯђлВШ нШД л™®лНЄмЭА 'лђікЄ∞ 1мЮРл£®' кЄ∞м§АмЭілѓАл°Ь
                        //     fullLossCountвЙ•1мЭіл©і кЈЄ мЮРл£® мЖМл©Єл°Ь лБЭлВШк≥† лВШл®ЄмІА нДімЭА auto-failмЭі лРРмЭД к≤ГмЭілЛ§.
                        //   к≤∞л°†: fullLossCountвЙ•1мЭіл©і мЭЉл∞Ш м∞®к∞РмЭА к±ілДИлЬА.
                        if ((Number(info.fullLossCount) || 0) === 0) {
                            let decLeft = Number(info.used) || 0;
                            for (const inst of instances) {
                                if (decLeft <= 0) break;
                                const canDec = Math.min(decLeft, (inst.durabilityLeft || 0));
                                if (canDec > 0) {
                                    inventory.consumeWeaponUse(inst, canDec, false);
                                    decLeft -= canDec;
                                }
                            }
                        }
                        const usedTotal = Number(info.used) || 0;
                        if (usedTotal > 0) {
                            consumedSummary.push(`${displayName} лВікµђ ${usedTotal}`);
                        }
                        if (info.broken) {
                            consumedSummary.push(`${displayName} нММмЖР`);
                        }
                    }
                }
                const withConsumed = (msg) =>
                    consumedSummary.length > 0 ? `${msg} (мЖМл™®: ${consumedSummary.join(', ')})` : msg;

                // D-74: нФМл†ИмЭімЦі HP м∞®к∞Р вАФ prey.attackк≥Љ мЬ†м†А мєілУЬ defense лМАк≤∞ к≤∞к≥Љ лИДм†Б лМАлѓЄмІА.
                //   HP 0мЭіл©і к≤МмЮДмШ§л≤Д('health'). кЄ∞м°і м≤іл†• мВђлІЭ к≤љл°Ь мЮђмВђмЪ©.
                //   мВђлІЭ м≤інБђлКФ victory л≥імГБ лУ±к≥Љ лПЕл¶љм†БмЬЉл°Ь м†БмЪ©(м†ДнИђмЧРмДЬ мЮ°мХШмЦілПД 0 HPл©і мВђлІЭ).
                const dmgTaken = Math.max(0, Number(result && result.playerDamageTaken) || 0);
                if (dmgTaken > 0) {
                    setHealth(h => {
                        const nh = Math.max(0, h - dmgTaken);
                        if (nh <= 0) {
                            setGameOver(true);
                            setDeathReason('health');
                        }
                        return nh;
                    });
                }

                if (outcome === 'victory') {
                    // preys м†Ьк±∞
                    setPreys(prev => prev.filter(p => p.id !== prey.id));
                    // trace м†Ьк±∞
                    setPreyTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(prey.tileId);
                        return next;
                    });
                    // D-110: мВђлГ• м≤ШмєШ мєімЪінКЄ лИДм†Б. prey м†ХмЭШмЭШ levelл°Ь лґДкЄ∞.
                    const preyDataArrKill = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const killDef = preyDataArrKill.find(p => p && p.id === prey.preyType) || {};
                    const lvl = Number(killDef.level) || 1;
                    setRunStats(s => ({
                        ...s,
                        l1PreyKills: s.l1PreyKills + (lvl === 1 ? 1 : 0),
                        l2PreyKills: s.l2PreyKills + (lvl === 2 ? 1 : 0)
                    }));
                    // D-71: prey.drop_item мЪ∞мД†, мЧЖмЬЉл©і 'meat' нПіл∞±. мЭіл¶Д¬ЈлУ±кЄЙмЭА resolveDefл°Ь лПЩм†Б м°∞нЪМ.
                    const dropId = (prey.drop_item && String(prey.drop_item).trim()) || 'meat';
                    const dropDef = InventorySystem.resolveDef(dropId) || {};
                    const dropName = dropDef.name || dropId;
                    const dropGrade = Number(dropDef.grade) || 1;
                    const dropCount = prey.meat || 0;
                    let added = 0;
                    let overflow = 0;
                    for (let i = 0; i < dropCount; i++) {
                        const ok = inventory.addItem(dropId);
                        if (ok) added += 1;
                        else overflow += 1;
                    }
                    let msg = `мВђлГ•мЧР мД±к≥µнЦИлЛ§. ${dropName} ${added}мЭД(л•Љ) мЦїмЧИлЛ§.`;
                    if (overflow > 0) msg += ` (к∞Ал∞©мЭі к∞АлУЭ м∞® ${overflow}к∞ЬлКФ лСРк≥† мЩФлЛ§.)`;
                    setMessage(withConsumed(msg));
                    setActiveHunt(null);
                    if (added > 0) {
                        // z-index мґ©лПМ л∞©мІА вАФ л™®лЛђ unmount нЫД нЖ†мК§нКЄ лЭДмЫА.
                        setTimeout(() => showLootToast([{ name: dropName, count: added, grade: dropGrade }]), 100);
                    }
                } else if (outcome === 'prey_fled') {
                    // D-47: л∞ШлУЬмЛЬ лЛ§л•Є нГАмЭЉл°Ь мЭілПЩ вАФ 3лЛ®к≥Д fallback.
                    //   1м∞®: habitat лІ§мє≠ + мЭЄм†С + reserved(лєИ/л≥імК§/нГИмґЬкµђ/лЛ§л•Єprey) м†ЬмЩЄ
                    //   2м∞®: habitat лђікіА мЭЄм†С + reserved м†ЬмЩЄ
                    //   3м∞®: мЭЄм†С лђікіА (лІµ м†Дм≤і non-reserved) вАФ "л©Ал¶ђ лЖУмєЬ к≤Гм≤ШлЯЉ" мЭілПЩ
                    // кЈЄл¶ђк≥† лПДлІЭк∞Д мГИ нГАмЭЉмЧР trace(рЯС£) мґФк∞А вАФ нФМл†ИмЭімЦімЧРк≤М лЛ®мДЬ м†Ьк≥µ.
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    const habitat = (Array.isArray(preyDef.habitat) && preyDef.habitat.length > 0)
                        ? preyDef.habitat
                        : (PREY_HABITAT[prey.preyType] || []);
                    const bossPos = boss ? boss.getPosition() : -1;
                    const occupiedByOther = new Set(
                        (preys || []).filter(p => p.id !== prey.id).map(p => p.tileId)
                    );
                    const notReserved = (nid) => {
                        if (nid === prey.tileId) return false;
                        const t = tiles[nid];
                        if (!t || t.isEmpty) return false;
                        if (nid === bossPos) return false;
                        if (t.type === 'exit') return false;
                        if (occupiedByOther.has(nid)) return false;
                        return true;
                    };
                    const currentPreyTile = tiles[prey.tileId];
                    const neighborIds = (currentPreyTile && currentPreyTile.connections) || [];
                    let candidates = neighborIds.filter(nid => {
                        if (!notReserved(nid)) return false;
                        if (habitat.length > 0 && !habitat.includes(tiles[nid].region)) return false;
                        return true;
                    });
                    if (candidates.length === 0) {
                        candidates = neighborIds.filter(notReserved);
                    }
                    if (candidates.length === 0) {
                        candidates = tiles.map((_, i) => i).filter(notReserved);
                    }

                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    // D-60: мЭі prey к∞Ьм≤імЭШ лПДм£Љ нЪЯмИШ лИДм†Б. лЛ§мЭМ мЮђм°∞мЪ∞ мЛЬ нДіл≥Д нЪМнФЉмЬ®мЧРмДЬ *10 м∞®к∞Р.
                    if (candidates.length > 0) {
                        const dest = candidates[Math.floor(Math.random() * candidates.length)];
                        const fromTile = prey.tileId;
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, tileId: dest, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                        // мЫР нГАмЭЉ trace м†Ьк±∞ + лПДлІЭк∞Д мГИ нГАмЭЉмЧР trace мґФк∞А.
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            next.delete(fromTile);
                            next.add(dest);
                            return next;
                        });
                    } else {
                        // мЭіл°†мГБ лПДлЛђ лґИк∞А (лІµ м†Дм≤імЧР non-reserved нГАмЭЉмЭі нХШлВШлПД мЧЖлКФ к≤љмЪ∞). мХИм†ДлІЭ.
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                    }
                    setMessage(withConsumed('мВђлГ•к∞РмЭі лПДлІЭм≥§лЛ§. л∞ЬмЮРкµ≠мЭі лВ®мХДмЮИлЛ§.'));
                    setActiveHunt(null);
                } else if (outcome === 'player_fled') {
                    // нФМл†ИмЭімЦі лПДм£Љ вАФ preyлКФ м†ЬмЮРл¶ђмІАлІМ м§А лН∞лѓЄмІАлКФ мЬ†мІА.
                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    setPreys(prev => prev.map(p =>
                        p.id === prey.id ? { ...p, hpCurrent: hpFinal } : p
                    ));
                    setMessage(withConsumed('мВђлГ•мЭД нПђкЄ∞нХШк≥† лђЉлЯђмД∞лЛ§.'));
                    setActiveHunt(null);
                } else {
                    setActiveHunt(null);
                }
            };

            // к≤МмЮД міИкЄ∞нЩФ
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(MAP_SIZE);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighborsл•Љ мВђмЪ©нХШмЧђ лђЉл¶ђм†БмЬЉл°Ь мЭЄм†СнХЬ л™®лУ† нГАмЭЉмЭД discoveredл°Ь мД§м†Х
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                // к≤љл°Ь кЄ∞л°Э міИкЄ∞нЩФ вАФ мЛЬмЮС нГАмЭЉмЭі м≤Ђ л∞©лђЄмІА.
                setMoveHistory([playerStart]);

                // мєілУЬ лН∞мЭінД∞лКФ кµђкЄА мЛЬнКЄ 'л≤†мЭімК§нГРнЧШмєілУЬ' нГ≠мЭі SSOT.
                // data/data.jsмЭШ TTD_DATA.BASE_CARDSл•Љ мЭљмЦі лЯ∞нГАмЮД нХДлУЬ(time кЄ∞л≥Єк∞Т 1)лІМ лНІлґЩмЭЄлЛ§.
                // мЛЬнКЄ к∞±мЛ† мЛЬ: мЛЬнКЄ мИШм†Х вЖТ `make data` мЛ§нЦЙ вЖТ мГИл°Ьк≥†мє®.
                //
                // D-23: consume/extra_effect мїђлЯЉмЭА мЛЬнКЄ нЧ§лНФмЧР м°імЮђ. к∞Т мЧЖмЬЉл©і лєИ лђЄмЮРмЧі.
                // лН∞мЭінД∞ л°ЬлУЬ мЛ§нМ® мЛЬмЧРлІМ мХДлЮШ else нПіл∞±(мХИм†ДлІЭ)мЭі мВђмЪ©лРЬлЛ§.
                const sheetBaseCards = (window.TTD_DATA && window.TTD_DATA.BASE_CARDS) || [];

                const cards = (sheetBaseCards.length > 0

                    : [

                          { id: 'search', name: 'лТ§м†Єл≥ікЄ∞', count: 5, effect: 'мХДмЭінЕЬ нЪНлУЭ', detection: 5, time: 1 },
                          { id: 'listen', name: 'кЈА кЄ∞мЪЄмЭікЄ∞', count: 2, effect: 'л™ђмК§нД∞ к∞РмІА', detection: -5, time: 1 },
                          { id: 'find_food', name: 'мЭМмЛЭ м∞ЊкЄ∞', count: 1, effect: 'мЭМмЛЭ нЪНлУЭ', detection: 5, time: 1 },
                          { id: 'hide', name: 'мИ®кЄ∞', count: 1, effect: 'мЭАмЛ†', detection: -15, time: 1 },
                          { id: 'rest', name: 'нЬімЛЭ', count: 1, effect: 'м≤іл†•/л∞∞к≥†нФФ мЖМнП≠ нЪМл≥µ, мЖМмЭМ мµЬмЖМ', detection: -13, time: 1,
                            consume: 'category:мЭМмЛЭ;scale:recover=2', extra_effect: '' }
                      ]
                );

                const newDeck = initializeDeck(cards);
                setDeck(newDeck.slice(HAND_SIZE));
                setHand(newDeck.slice(0, HAND_SIZE));
                
                // D-47: кЄ∞л≥Є к∞Ал∞© л™®мЦС(5x5, мЬД 2нЦЙ кµђмДЭ 4мєЄ disabled) вАФ InventorySystem кЄ∞л≥Єк∞Т мВђмЪ©.
                // D-113: initialInventoryк∞А мЮИмЬЉл©і кЈЄк≤ГмЭД мЛЬмЮС мЭЄл≤§мЬЉл°Ь мВђмЪ©(мЇ†нФД к∞Ал∞© мЭЄк≥Д).
                //   AppмЧРмДЬ нГРнЧШ мЛЬмЮС мЛЬм†РмЧР packмЭД лєДмЪ∞к≥† мЭЄмК§нДімК§л•Љ кЈЄлМАл°Ь лДШкЄілЛ§.
                const inv = initialInventory || new InventorySystem();
                setInventory(inv);
                
                const newBoss = new BossMonster(newTiles, playerStart);
                // D-62: setPositionмЭА visitedTilesмЧРлПД bossPos лПЩкЄ∞нЩФ вАФ мЮШл™їлРЬ мК§нП∞ кЄ∞л°Э л∞©мІА.
                newBoss.setPosition(bossPos);
                // D-77: нПђмЛЭ мљЬл∞± мЧ∞к≤∞.
                //   onPredationStart  вАФ нГАк≤Я L2 preyл•Љ preysмЧРмДЬ м†Ьк±∞(л≥імК§к∞А мЮ°мХДл®єкЄ∞ мЛЬмЮС).
                //   onPredationComplete вАФ л≥імК§к∞А кЈЄ нГАмЭЉмЧРмДЬ 2нДі м†ХмІАл•Љ лБЭлВЉ лХМ мВђм≤і нГАмЭЉ мГЭмД±.
                newBoss.onPredationStart = (targetPreyId, tileId, prey) => {
                    // D-94: preyк∞А isBaitл©і baitTilesмЧРмДЬ м†Ьк±∞. кЈЄ мЩЄ(L2 prey)лКФ кЄ∞м°ілМАл°Ь setPreys.
                    if (prey && prey.isBait) {
                        setBaitTiles(prev => {
                            const next = new Set(prev);
                            next.delete(tileId);
                            return next;
                        });
                    } else {
                        setPreys(prev => prev.filter(p => p.id !== targetPreyId));
                    }
                };
                // D-90: мљЬл∞± 3л≤ИмІЄ мЭЄмЮР preyType мґФк∞А вАФ мВђм≤і лПДм∞© л©ФмЛЬмІАмЧР мВђлГ•к∞Р мЭіл¶Д мВђмЪ©.
                // D-94: preyType='__bait__'мЭіл©і мВђм≤і л©ФмЛЬмІАк∞А лЛ§л•Є нЖ§мЬЉл°Ь лґДкЄ∞.
                newBoss.onPredationComplete = (tileId, _targetPreyId, preyType) => {
                    setCarcassTiles(prev => {
                        const next = new Map(prev);
                        next.set(tileId, { preyType: preyType || null });
                        return next;
                    });
                };
                setBoss(newBoss);
                // D-53: л≥імК§ мЭілПЩ history міИкЄ∞нЩФ (мЛЬмЮС мЬДмєШк∞А B1).
                setBossMoveHistory([bossPos]);

                // D-46/D-76: мВђлГ•к∞Р мК§нП∞. level1/level2 к∞Бк∞Б PREY_SPAWN лІМнБЉ.
                //   reserved = нФМл†ИмЭімЦі мЛЬмЮС/л≥імК§/нГИмґЬкµђ. preyDataлКФ TTD_DATA.PREY.
                //   habitatFallbackмЭА prey.habitat мЧЖмЭД лХМлІМ мВђмЪ©.
                const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const spawned = (typeof window.spawnPrey === 'function')
                    ? window.spawnPrey(newTiles, preyData, PREY_SPAWN, {
                        playerStartId: playerStart,
                        bossPosId: bossPos,
                        exitPosId: exitPos
                    }, PREY_HABITAT)
                    : [];
                setPreys(spawned);
                setPreyTraceTiles(new Set());
                setCarcassTiles(new Map());
                setCarcassMeatTaken(new Set());
                setCarcassVisitedTiles(new Set());
                setCarcassTraceTiles(new Set());
                setActiveHunt(null);
                setWaitConfirmOpen(false);
                setPredationListenInfo(null);
                setBaitTiles(new Set());
                // мљШмЖФ к≤Ам¶ЭмЪ© вАФ л¶іл¶ђмК§ мЛЬ м†Ьк±∞нХілПД лђіл∞©.
                if (typeof window !== 'undefined') window.__preys = spawned;
            }

            function initializeDeck(cards) {
                const deck = [];
                cards.forEach(card => {
                    for (let i = 0; i < card.count; i++) {
                        deck.push({ ...card, uid: `${card.id}_${i}` });
                    }
                });
                return shuffleDeck(deck);
            }

            function shuffleDeck(deck) {
                const newDeck = [...deck];
                for (let i = newDeck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
                }
                return newDeck;
            }

            // к≤МмЮД мШ§л≤Д/мКєл¶ђ м≤інБђ
            // D-54: мВђмЬ† кµђлґД вАФ м≤іл†•мЭі л®Љм†А 0мЭіл©і 'health', л∞∞к≥†нФФ л®Љм†Ал©і 'starvation'.
            useEffect(() => {
                if (health <= 0) {
                    setGameOver(true);
                    setDeathReason('health');
                    setMessage('мГЭл™Ел†•мЭі лЛ§нЦИлЛ§...');
                } else if (hunger <= 0) {
                    setGameOver(true);
                    setDeathReason('starvation');
                    setMessage('л∞∞к≥†нФФмЭД мЭікЄ∞мІА л™їнЦИлЛ§...');
                }
            }, [health, hunger]);

            useEffect(() => {
                if (tiles.length > 0 && tiles[currentTile]?.type === 'exit') {
                    setVictory(true);
                    setMessage('нГИмґЬмЧР мД±к≥µнЦИлЛ§!');
                }
            }, [currentTile, tiles]);

            // hunt_start мєілУЬ мЮРлПЩ м†Хл¶ђ вАФ мВђлГ•к∞РмЭі м≤ШмєШлРШк±∞лВШ лПДлІЭмЬЉл°Ь нШДмЮђ нГАмЭЉмЭД
            // лЦ†лВЬ мИЬк∞Д мЖРнМ®мЧР лВ®лКФ мВђлГ•мЛЬмЮС мєілУЬл•Љ м¶ЙмЛЬ лђілН§мЬЉл°Ь л≥ілВЄлЛ§.
            // мЭілПЩ мЛЬм†РмЭШ мЖРнМ® кµРм≤і(moveTo)л°ЬлПД м†Хл¶ђлРШмІАлІМ, кЈЄ нГАмЭЉмЧР л®ЄлђЉл©∞ м†ДнИђк∞А
            // лБЭлВЬ к≤љмЪ∞мЧФ мЮ°мЭД кЄЄмЭі мЧЖмЦі л≥ДлПД к∞РмЛЬк∞А нХДмЪФ.
            useEffect(() => {
                const orphan = (hand || []).filter(c => {
                    if (c.id !== 'hunt_start') return false;
                    const t = c.target;
                    if (!t) return true;
                    return !(preys || []).some(p => p.id === t.preyId && p.tileId === currentTile);
                });
                if (orphan.length === 0) return;
                const orphanUids = new Set(orphan.map(c => c.uid));
                // D-65: hunt_startлКФ лђілН§мЭі мХДлЛИлЭЉ мЖМл©Є (мЪФнХЬ мЫРлђЄ). setGraveyard нШЄмґЬ м†Ьк±∞.
                setHand(prev => prev.filter(c => !orphanUids.has(c.uid)));
            }, [preys, currentTile]);

            // D-63 (2026-04-24): D-59 revert.
            // мЖРнМ® мЮРлПЩ л≥імґ©мЭА мЪФнХЬ мЭШлПД л∞ШлМАмШАлЛ§. мШђл∞Фл•Є кЈЬмєЩ:
            //   - нГАмЭЉ мЭілПЩ мЛЬмЧРлІМ лН±мЧРмДЬ 5мЮ• мГИл°Ь лУЬл°ЬмЪ∞ (moveToмЧРмДЬ м≤Шл¶ђ, D-48).
            //   - мєілУЬ мВђмЪ©мЬЉл°Ь мЖРнМ®к∞А м§Дл©і л≥імґ© мЧЖмЭМ (нФМл†ИмЭімЦік∞А м†Бк≤М мУ∞л©і лЛ§мЭМ нГАмЭЉмЧРмДЬ л¶ђнХД).
            //   - hunt_startлКФ мВђлГ•к∞Р м°∞мЪ∞ мЛЬ overflowл°Ь мґФк∞А (мєімЪінД∞ м†ЬмЩЄ, мЭілПЩ мЛЬ мЖМл©Є).
            // лФ∞лЭЉмДЬ мєілУЬ мВђмЪ© мІБнЫД мЮРлПЩ л≥імґ© useEffectлКФ м†Ьк±∞.

            // D-67 (2026-04-24): л∞∞к≥†нФФ 1 мЭінХШ мІБм†С мХМл¶Љ.
            //   D-55 к≤МмЭімІА м†Рл©ЄлІМмЬЉл°ЬлКФ к≤љк≥†к∞А мХљнХШлЛ§лКФ мЪФнХЬ нФЉлУЬл∞±. hunger <= 1л°Ь лЦ®мЦімІАл©і
            //   л©ФмЛЬмІАл°Ь 'л∞∞к≥†нММмДЬ мУ∞лЯђмІИ к≤Г к∞ЩлЛ§...' л•Љ лНЃмЦімФМмЫМ мЬ†м†Ак∞А м¶ЙмЛЬ мЭЄмІАнХШлПДл°Э.
            //   hunger л≥АнЩФ мЛЬлІИлЛ§ мЮђнПЙк∞А вАФ нЪМл≥µлРШл©і лЛ§л•Є actionмЭі лНЃмЦімУ∞л©імДЬ мЮРмЧ∞ нХім†Ь.
            useEffect(() => {
                if (gameOver || victory) return;
                if (hunger <= 1) {
                    setMessage('л∞∞к≥†нММмДЬ мУ∞лЯђмІИ к≤Г к∞ЩлЛ§...');
                }
            }, [hunger, gameOver, victory]);

            // мХДмЭінЕЬ мВђмЪ© вАФ мЭЄл≤§нЖ†л¶ђ м†Хл≥ім∞љмЧРмДЬ 'мВђмЪ©' л≤ДнКЉмЭД лИДл•Љ лХМ нШЄмґЬ.
            // EffectParserк∞А нММмЛ±нХЬ Notion 'мВђмЪ© нЪ®к≥Љ' DSLмЭД лЯ∞нГАмЮДмЧР м†БмЪ©нХШк≥†,
            // мЖМлєДнШХ(consumed) нМРм†ХмЭА effectParserк∞А лВіл†§м§А к∞ТмЭД кЈЄлМАл°Ь лФ∞л•ЄлЛ§.
            //
            // spawn_card:throw лКФ 'м†ДнИђ мєілУЬ лН±мЧР лНШмІАкЄ∞ мєілУЬ мґФк∞А'л°Ь нХімДЭнХЬлЛ§.
            // кЄ∞нЪН кЈЉк±∞(мЪФнХЬ мІАмЛЬ): "м†ДнИђл™®лУЬмЛЬмЧР лУ±мЮ•нХШлКФ мєілУЬмЧР мґФк∞АлРЬлЛ§".
            // мВђмЪ© мЛЬм†РмЧР мєілУЬк∞А мГЭмД±лРШмЦі мЮДмЛЬ нТА(combatExtraCards)мЧР мМУмЭік≥†,
            // лЛ§мЭМ м†ДнИђ мЛЬмЮС лХМ кЄ∞л≥Є лН±к≥Љ л≥СнХ©лРШл©∞, кЈЄ м†ДнИђ лВімЧРмДЬ мєілУЬл•Љ мУ∞л©і мЖМл©ЄнХЬлЛ§.
            // (мШБкµђ мґФк∞Ак∞А мХДлЛМ кЈЉк±∞: нШДмЮђ мХДмЭінЕЬмЭі мЭЉнЪМмЪ© нМРм†ХмЭі мХДлЛИмЦілПД мЮђнГРмГЙ/л®ЄмІА к∞АлК• мЮђл£МмЭілѓАл°Ь
            //  лН±мЧР мШБкµђ нОЄмЮЕмЛЬнВ§л©і л∞ЄлЯ∞мК§к∞А мЙљк≤М лђілДИмІАк≥†, мЪФнХЬ лІР "м†ДнИђ мҐЕл£М мЛЬ мЖМл©Є"мЭі мЮРмЧ∞мК§лЯђмЫА.)
            const handleUseItem = (item) => {
                const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                const def = InventorySystem.ITEMS[item.type] || {};
                const notionItem = notionItems.find(it => it && it['мЭіл¶Д'] === (def.name || item.name));
                const parsed = (notionItem && notionItem.effect) || null;
                if (!parsed || !parsed.usable || !window.EffectParser) {
                    setMessage('мЭі мХДмЭінЕЬмЭА мХДмІБ мВђмЪ©нХ† мИШ мЧЖлЛ§.');
                    return { ok: false };
                }

                const result = window.EffectParser.applyItemEffect(parsed, {
                    getStat: (name) => (name === 'hunger' ? hunger : name === 'health' ? health : null),
                    setStat: (name, val) => {
                        if (name === 'hunger') setHunger(val);
                        else if (name === 'health') setHealth(val);
                    },
                    addThrowCard: (cardId) => {
                        // к∞ЩмЭА cardIdл•Љ мЧђлЯђ л≤И мН®мДЬ мЧђлЯђ мЮ•мЭД мМУмЭД мИШлПД мЮИмЭМ.
                        setCombatExtraCards(prev => {
                            const next = [...prev];
                            const idx = next.findIndex(c => c.id === cardId);
                            if (idx >= 0) next[idx] = { ...next[idx], count: next[idx].count + 1 };
                            else next.push({ id: cardId, count: 1 });
                            return next;
                        });
                    },
                    setMessage
                });

                if (result.ok) {
                    const label = window.EffectParser.describeEffect(parsed);
                    setMessage(`${def.name || item.name}мЭД(л•Љ) мВђмЪ©нЦИлЛ§. (${label})`);
                }
                return result;
            };

            // D-94 (2026-04-25 мЪФнХЬ мІАмЛЬ): к±∞лМАнХЬ л®ємЭі [л®ємЭіл°Ь мЬ†мЭЄнХШкЄ∞] нХЄлУ§лЯђ.
            //   нШДмЮђ нГАмЭЉмЧР л®ємЭі placeholderл•Љ лУ±л°Э(baitTiles Set). л≥імК§к∞А лЛ§мЭМ onPlayerMoveмЧРмДЬ
            //   synthetic preyл°Ь мЭЄмЛЭнХі BFS мґФк≤© вЖТ лПДлЛђ мЛЬ нПђмЛЭ(=л®ємЭі мЖМмІД + мВђм≤і нГАмЭЉ мГЭмД±).

            // D-23: "мєілУЬл°Ь мХДмЭінЕЬ мВђмЪ©" нФДл†ИмЮДмЫМнБђмЭШ к≥µнЖµ мІДмЮЕм†Р.
            // мєілУЬк∞А мХДмЭінЕЬмЭД мЖМлєДнХімХЉ нХШлКФ к≤љмЪ∞(consume мК§нОЩ л≥імЬ†) мЭі нХ®мИШк∞А л™®лЛђмЭД лЭДмЪ∞к≥†,
            // мЬ†м†Ак∞А мХДмЭінЕЬмЭД к≥†л•Є лТ§ нЩХм†ХлРШл©і finalizeCardUseл°Ь мЛ§м†Ь нЪ®к≥Љл•Љ м†БмЪ©нХЬлЛ§.
            // мєілУЬ мЮРм≤і(мЖРнМ® вЖТ лђілН§, мЛЬк∞Д¬Јл∞Ьк∞Б м¶Эк∞А)лКФ мД†к≤∞ м°∞к±і нЖµк≥Љ нЫДмЧРлІМ мЖМл™®.
            //
            // consume нММмЛ±мЭА effectParser.parseCardConsumeмЧР мЬДмЮД. нХДнД∞лКФ matchesConsumeFilter.
            // consume нЖµк≥Љ мХДмЭінЕЬмЭі 0к∞Ьл©і "мУЄ мИШ мЧЖлЛ§" л©ФмЛЬмІАл°Ь м°∞мЪ©нЮИ мҐЕл£М(мєілУЬлПД лѓЄмЖМл™®).
            const finalizeCardUse = (card, extraMsg) => {
                // мЖРнМ® вЖТ лђілН§, мЛЬк∞Д¬Јл∞Ьк∞Б м≤Шл¶ђ.
                setHand(hand.filter(c => c.uid !== card.uid));
                setGraveyard([...graveyard, card]);
                setTime(time + card.time);
                const baseDetection = detection + (Number(card.detection) || 0);
                const newDetection = Math.min(100, Math.max(0, baseDetection));
                setDetection(newDetection);
                const prefix = `${card.name}мЭД(л•Љ) мВђмЪ©нЦИлЛ§. (мЛЬк∞Д +${card.time}) `;
                setMessage(prefix + (extraMsg || ''));
            };

            // consume мєілУЬ вЖТ мХДмЭінЕЬ мД†нГЭ л™®лЛђ мШ§нФИ.
            // нХДнД∞ нЖµк≥Љ мХДмЭінЕЬмЭі мЧЖмЬЉл©і м°∞мЪ©нЮИ мК§нВµ(мєілУЬ лѓЄмЖМл™®).
            const openConsumeForCard = (card) => {
                const Parser = window.EffectParser;
                if (!Parser || typeof Parser.parseCardConsume !== 'function') {
                    setMessage('мХДмЭінЕЬ мВђмЪ© нФДл†ИмЮДмЫМнБђк∞А л°ЬлУЬлРШмІА мХКмХШлЛ§.');
                    return;
                }
                const consume = Parser.parseCardConsume(card.consume);
                if (!consume) {

                    return;
                }
                const filterFn = (invItem, notionItem) =>
                    Parser.matchesConsumeFilter(consume, invItem, notionItem);
                // D-81: мД†нГЭ(floating) м§СмЭЄ мХДмЭінЕЬмЭА мВђмЪ© к∞АлК• лМАмГБмЧРмДЬ м†ЬмЩЄ вАФ л™®лЛђ candidatesмЩА мЭЉмєШмЛЬмЉЬ
                //   "л¶ђмК§нКЄлКФ лєДмЧИмІАлІМ hasAny=true"л°Ь л™®лЛђмЭі лЬ®лКФ лґАм†ХнХ© л∞©мІА.

                    const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
                    const notionItem = notionItems.find(it => it && it['мЭіл¶Д'] === (def.name || invItem.name));
                    return filterFn(invItem, notionItem);
                });
                // D-57 (2026-04-24): л∞Фл≤†нБР к∞АмГБ мД†нГЭмІА м†Ьк±∞ вЖТ нЬімЛЭ мєілУЬ мЪФл¶ђ л™®лЛђл°Ь лМАм≤і.

                //   мЮђл£М(meat_skewer/fish_skewer) л≥імЬ† мЛЬ нЩЬмД±, мЧЖмЬЉл©і нЪМмГЙ лєДнЩЬмД±.

                // D-36: нЬімЛЭ лУ± scaleмЭі к±Єл¶∞ мєілУЬлКФ л™®лЛђмЭі "нЪ®к≥Љ м¶ЭнП≠"мЭД мЛЬк∞Бм†БмЬЉл°Ь к∞Хм°∞нХімХЉ нХ®.

                // мєілУЬ мЭіл¶Д/нЪ®к≥Љ нЕНмК§нКЄлКФ мєілУЬл≥Д мХИлВі лђЄкµђмЭШ кЄ∞л≥Єк∞ТмЬЉл°Ь мВђмЪ©.
                const scaleHint = (consume.scales && consume.scales.recover && consume.scales.recover !== 1)
                    ? `мЭМмЛЭмЭШ нЪ®к≥Љк∞А ${consume.scales.recover}л∞∞`

                const bonusHint = (consume.bonuses && consume.bonuses.recover && consume.bonuses.recover !== 0)

                const hintText = (scaleHint || bonusHint)

                    : null;
                setPendingConsume({
                    card,
                    consume,
                    filter: filterFn,
                    scales: consume.scales || {},
                    bonuses: consume.bonuses || {},
                    hintText,
                    titleText: card.name + ' вАФ мВђмЪ©нХ† мХДмЭінЕЬ',

            // D-57: мЪФл¶ђ л™®лЛђмЧРмДЬ л†ИмЛЬнФЉ нЩХм†Х мЛЬ нШЄмґЬ.
            //   inventory.craftRecipeл°Ь мЮђл£М мЖМлєД + к≤∞к≥ЉлђЉ л∞∞мєШ. нЬімЛЭ мєілУЬлКФ мЖМл™®нХШмІА мХКмЭМ
            //   (мЪФл¶ђ мЮРм≤іл°ЬлКФ мЛЬк∞Д/л∞Ьк∞Б мІДнЦЙ мЧЖмЭМ вАФ нЬімЛЭ л™®лЛђл°Ь л≥µкЈА нЫД мЛЭмВђкєМмІА мЭімЦімІАл©і
            //    кЈЄлХМ мєілУЬк∞А мЖМлєДлР®). л©ФмЛЬмІАлКФ "XмЭД(л•Љ) кµђмЫ†лЛ§." нПђлІЈ.
            const handleCookRecipe = (recipe) => {

            // consume л™®лЛђмЧРмДЬ мХДмЭінЕЬ нХШлВШ мД†нГЭ вЖТ мЛ§м†Ь нЪ®к≥Љ м†БмЪ©.

                    const scaled = Parser.scaleEffect(parsedEffect, consume.scales || {}, consume.bonuses || {});
                    Parser.applyItemEffect(scaled, {

                } else {

            const cancelConsume = () => {
                setPendingConsume(null);
                // D-57: мЪФл¶ђ л™®лЛђлПД нХ®кїШ лЛЂмХД л£®м¶ИнХЬ мГБнГЬ мЮФм°і л∞©мІА.

                // D-46 (2026-04-23): hunt_start мєілУЬ лґДкЄ∞.

                if (card.id === 'hunt_start') {

                    setActiveHunt({

                            hp: (typeof prey.hpCurrent === 'number') ? prey.hpCurrent : (preyDef.hp || 1),

                            //   лєИк∞ТмЭіл©і handleHuntResolveмЧРмДЬ 'meat' нПіл∞±.
                            drop_item: preyDef.drop_item || '',

                            // D-60: нДіл≥Д нЪМнФЉмЬ® CSV ("30,30,20") вАФ лєИк∞ТмЭіл©і resolveHunt/UIмЧРмДЬ evade_rateл°Ь нПіл∞±.
                            evade_per_turn: preyDef.evade_per_turn || '',
                            // D-60: мЭі prey к∞Ьм≤ік∞А кЈЄлПЩмХИ л™З л≤И лПДлІЭм≥§лКФмІА вАФ нДіл≥Д нЪМнФЉмЬ®мЧРмДЬ *10 м∞®к∞Р.
                            fleeCount: prey.fleeCount || 0,
                            // D-74/D-75: Level 2 prey 4нДі мЛЬмК§нЕЬ.

                            //   attack: prey к≥µк≤©л†• (мЬ†м†Ак∞А л∞ЫлКФ лМАлѓЄмІА - мЬ†м†А мєілУЬ defense).
                            //   defense: prey 'defend' нДімЭШ л∞©мЦік∞Т (мЬ†м†А к≥µк≤© к∞РмЗД).
                            //   actions_per_turn: 4нДі нЦЙлПЩ CSV.
                            level: Number(preyDef.level) || 1,

                // D-23: consume мК§нОЩмЭі мЮИлКФ мєілУЬлКФ л™®лЛђмЭД лЭДмЪ∞к≥† мД†нГЭ нЫД нЪ®к≥Љ м†БмЪ©.

                setHand(hand.filter(c => c.uid !== card.uid));

                let msg = `${card.name}мЭД(л•Љ) мВђмЪ©нЦИлЛ§. (мЛЬк∞Д +${card.time}) `;

                if (card.id === 'search') {

                    // мКђл°ѓ нЩХл•†/к∞ЬмИШ мЮРм≤ілКФ лєДк≥µк∞Ь. к≤∞к≥ЉлІМ л©ФмЛЬмІА+нЖ†мК§нКЄл°Ь лЕЄмґЬ.
                    // мЧђлЯђ к∞Ь нЪНлУЭ мЛЬ к∞ЩмЭА мХДмЭінЕЬмЭА к∞ЬмИШ лИДм†Б, лђґмЭМ нЖ†мК§нКЄ 1к∞Ь.
                    //

                    //       (hasBeenLeft 0.5 * 0.5^searchedCount). rollSearchLootк∞А
                    //       tile к∞Эм≤іл•Љ л∞ЫмХД мХИмЧРмДЬ м≤Шл¶ђнХЬлЛ§.
                    const tile = tiles[currentTile];

                    //   мЭілѓЄ 1нЪМ лљСмХШмЬЉл©і(carcassMeatTakenмЧР лУ±л°Э) л≥ілДИмК§ мЧЖмЭі мЭЉл∞Ш лУЬл°≠лІМ.
                    const onCarcass = carcassTiles.has(currentTile);

                    //  м†Ьк±∞нХЬ нЪМкЈАмШАмЭМ. мЪФнХЬ QA 2026-04-22 мІАмЛЬл°Ь л≥µкµђ.)

                    // 1мєЄмЭА мґФк∞Ал°Ь м†РнФДмК§мЉАмЦі мШ§л≤Дл†ИмЭіл•Љ нД∞лЬ®л†§ к≥µнПђк∞Р к∞ХнЩФ.

                    //   мҐЕл•ШлКФ лєДк≥µк∞Ь(рЯС£ лІИмї§лІМ). preyTraceTiles SetмЧР нХілЛє tileId лИДм†Б.
                    //   л≥імК§ лВіл†ИмЭімЕШ¬ЈD-42 bossVisibleк≥Љ лПЕл¶љлРЬ мДємЕШ вАФ кЄ∞м°і л°ЬмІБ к±ілУЬл¶ђмІА мХКмЭМ.

            // нГАмЭЉ мЭілПЩ (D-90: targetId === currentTileмЭіл©і "м†ЬмЮРл¶ђмЧРмДЬ мЛЬк∞Д л≥ілВікЄ∞" вАФ лЛ§л•Є

            //   мЭілПЩ/мЖРнМ® мВђмЭінБі лУ±)к∞А кЈЄлМАл°Ь нЭРл•ЄлЛ§. HexTile onClickмЧРмДЬ isCurrentл©і л≥ДлПД
            //   нЩХмЭЄ л™®лЛђмЭД к±∞м≥Р мЭі нХ®мИШмЧР self targetмЭД лДШкЄ∞лПДл°Э нХЬлЛ§).

                setBossVisible(false);

                // мєілУЬмЭШ detection к∞Ам§СмєШмЩА л≥Дк∞Ьл°Ь, лЛ®мИЬ мЭілПЩ мЮРм≤ік∞А л≥імК§мЧРк≤М лУЬлЯђлВШлКФ кЄ∞л≥Є мЬДнЧШ.
                // мГБнХЬ 100. detection stateлКФ мЭінЫД chaseMode м†ДнЩШ нМРм†Х(>=80)мЧР кЈЄлМАл°Ь мУ∞мЮД.

                //   л®ємЭімЧР м†ХмЛ† нМФл†§ нФМл†ИмЭімЦіл•Љ мХМмХДм∞®л¶ђмІА л™їнХ®. мЛЭмВђк∞А лБЭлВШлКФ лЛ§мЭМ нДілґАнД∞лКФ

        // ============================================
        // D-109 (2026-04-24): App вАФ к≤МмЮД нЭРл¶Д мї®нКЄл°§лЯђ.
        //   view: 'intro' | 'play' | 'camp'
        //   campState мШБмЖНнЩФ(localStorage 'ttd:campState:v1') вАФ load on mount, save on change.
        //   м≤Ђ лІИмЪінКЄ:
        //     - localStorage мЧЖмЭМ вЖТ view='intro'
        //     - localStorage мЮИмЭМ вЖТ view='camp' (мЛЬлВШл¶ђмШ§ мК§нВµ, мГИл°Ьк≥†мє®мЭА нХ≠мГБ мЇ†нФД)
        //   мІДнЦЙ м§С лЯ∞(view='play')мЭА мГИл°Ьк≥†мє® мЛЬ нПРкЄ∞лР® (мЭШлПДлРЬ лПЩмЮС).
        // ============================================

        const CAMP_STATE_KEY = 'ttd:campState:v1';

        // лєИ мГБнГЬ(м≤Ђ мЛ†кЈЬ мЬ†м†А).
        // D-113: л≥ікіАнХ®мЭА 12x8(rows=12, cols=8 вАФ мДЄл°Ьл°Ь кєА). нГРнЧШмЪ© к∞Ал∞©(pack)мЭА 5x5(D-47 л™®мЦС).
        function makeInitialCampState() {
            return {
                version: 1,
                seenIntro: false,
                firstReturnDone: false,
                inventory: new InventorySystem(12, 8, { disabled: [] }),
                pack: new InventorySystem(5, 5),  // D-113: нГРнЧШ мЛЬ лУ§к≥† к∞АлКФ к∞Ал∞©. кЄ∞л≥Є disabled нМ®нДі.
                quests: { active: [], completed: [] },
                // D-110: bestScore(мµЬк≥† м†РмИШ) / totalScore(лИДм†БнХ©) / lastScore(лІИмІАлІЙ лЯ∞).
                runs: { total: 0, victories: 0, deaths: 0, bestScore: 0, totalScore: 0, lastScore: 0 }
            };
        }

        // мІБл†ђнЩФ вАФ InventorySystem.itemsлІМ {type,x,y,rotation,durabilityLeft} л∞∞мЧіл°Ь л≥ім°і.
        //   InventorySystem мЭЄмК§нДімК§ мЮРм≤іл•Љ JSON.stringifyнХШл©і grid 2Dл∞∞мЧі¬Јclass л©ФнГАк∞А лФ∞лЭЉк∞А
        //   л≥µмЫР мЛЬ л©ФмДЬлУЬк∞А мЧЖмЦімІДлЛ§. itemsлІМ м†АмЮ• вЖТ л°ЬлУЬ мЛЬ мГИ мЭЄмК§нДімК§ + placeItem л≥µмЫР.
        // D-113: лђікЄ∞ durabilityLeft нПђнХ®. pack(к∞Ал∞©) мЭЄл≤§лПД нХ®кїШ мІБл†ђнЩФ.
        function serializeInvItems(inv) {
            if (!inv || !Array.isArray(inv.items)) return [];
            return inv.items.map(it => ({
                type: it.type,
                x: it.x,
                y: it.y,
                rotation: it.rotation || 0,
                ...(typeof it.durabilityLeft === 'number' ? { durabilityLeft: it.durabilityLeft } : {})
            }));
        }
        function serializeCampState(state) {
            if (!state) return null;
            return {
                version: 2,
                seenIntro: !!state.seenIntro,
                firstReturnDone: !!state.firstReturnDone,
                inventory: serializeInvItems(state.inventory),
                pack: serializeInvItems(state.pack),
                quests: {
                    active: (state.quests && state.quests.active) || [],
                    completed: (state.quests && state.quests.completed) || []
                },
                runs: {
                    total: Number((state.runs && state.runs.total) || 0),
                    victories: Number((state.runs && state.runs.victories) || 0),
                    deaths: Number((state.runs && state.runs.deaths) || 0),
                    bestScore: Number((state.runs && state.runs.bestScore) || 0),
                    totalScore: Number((state.runs && state.runs.totalScore) || 0),
                    lastScore: Number((state.runs && state.runs.lastScore) || 0)
                }
            };
        }

        // мХДмЭінЕЬ нХ≠л™©мЭД InventorySystem мЭЄмК§нДімК§мЧР л≥µмЫР.
        //   мҐМнСЬк∞А мЬ†нЪ®нХШл©і placeItemмЬЉл°Ь, мХДлЛИл©і addItem(type)мЬЉл°Ь нПіл∞±.
        //   D-113: durabilityLeft л≥ім°і. мЭЄмК§нДімК§ мІБм†С placement (rotation¬Јdurability л™®лСР мЬ†мІА).
        function restoreItemEntry(inv, entry) {
            if (!entry || !entry.type) return;
            const def = InventorySystem.resolveDef(entry.type) || InventorySystem.ITEMS[entry.type];
            if (!def || !def.shape) return;
            let shape = def.shape;
            const rot = Number(entry.rotation) || 0;
            for (let r = 0; r < (rot / 90) % 4; r++) {
                shape = inv.rotate90(shape);
            }
            const item = {
                id: Date.now() + Math.random(),
                type: entry.type,
                ...InventorySystem.ITEMS[entry.type],
                shape,
                rotation: rot,
                x: Number(entry.x) || 0,
                y: Number(entry.y) || 0
            };
            const resolved = InventorySystem.resolveDef(entry.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0)
                ? resolved.durability : null;
            if (maxDur != null) {
                item.durabilityLeft = (typeof entry.durabilityLeft === 'number')
                    ? Math.max(0, Math.min(maxDur, entry.durabilityLeft))
                    : maxDur;
            }
            if (inv.canPlace(shape, item.x, item.y)) {
                inv.placeItem(item);
                inv.items.push(item);
            } else {
                // мҐМнСЬ мґ©лПМ¬Јл≤ФмЬД міИк≥Љ(мШИ: 8x12вЖТ12x8 лІИмЭікЈЄл†ИмЭімЕШ) вЖТ лєИ мЮРл¶ђл°Ь мЮђл∞∞мєШ.
                const pos = inv.findEmptySpace(shape);
                if (pos) {
                    item.x = pos.x;
                    item.y = pos.y;
                    inv.placeItem(item);
                    inv.items.push(item);
                }
            }
        }

        // мЧ≠мІБл†ђнЩФ вАФ items л∞∞мЧімЭД мГИ 12x8 InventorySystemмЧР л≥µмЫР.
        //   D-113: кЄ∞м°і 8x12 вЖТ 12x8 лІИмЭікЈЄл†ИмЭімЕШ. мҐМнСЬ мґ©лПМ мЛЬ лєИ мЮРл¶ђл°Ь мЮРлПЩ мЮђл∞∞мєШ.
        function deserializeCampState(raw) {
            if (!raw || typeof raw !== 'object') return null;
            const inv = new InventorySystem(12, 8, { disabled: [] });
            const itemsRaw = Array.isArray(raw.inventory) ? raw.inventory : [];
            for (const entry of itemsRaw) restoreItemEntry(inv, entry);

            // pack вАФ мЛ†кЈЬ нХДлУЬ. кЄ∞м°і м†АмЮ•л≥ЄмЧФ мЧЖмЭД мИШ мЮИмЬЉлЛИ лєИ мЭЄл≤§мЬЉл°Ь мЛЬмЮС.
            const pack = new InventorySystem(5, 5);
            const packRaw = Array.isArray(raw.pack) ? raw.pack : [];
            for (const entry of packRaw) restoreItemEntry(pack, entry);

            return {
                version: 2,
                seenIntro: !!raw.seenIntro,
                firstReturnDone: !!raw.firstReturnDone,
                inventory: inv,
                pack,
                quests: {
                    active: (raw.quests && Array.isArray(raw.quests.active)) ? raw.quests.active : [],
                    completed: (raw.quests && Array.isArray(raw.quests.completed)) ? raw.quests.completed : []
                },
                runs: {
                    total: Number((raw.runs && raw.runs.total) || 0),
                    victories: Number((raw.runs && raw.runs.victories) || 0),
                    deaths: Number((raw.runs && raw.runs.deaths) || 0),
                    bestScore: Number((raw.runs && raw.runs.bestScore) || 0),
                    totalScore: Number((raw.runs && raw.runs.totalScore) || 0),
                    lastScore: Number((raw.runs && raw.runs.lastScore) || 0)
                }
            };
        }

        // localStorage I/O вАФ мЛ§нМ®нХілПД к≤МмЮДмЭА кµілЯђк∞АмХЉ нХ®(мЛЬнБђл¶њ л™®лУЬ лУ±).
        function loadCampStateFromStorage() {
            try {
                const raw = localStorage.getItem(CAMP_STATE_KEY);
                if (!raw) return null;
                return deserializeCampState(JSON.parse(raw));
            } catch (e) {
                console.warn('campState load failed', e);
                return null;
            }
        }
        function saveCampStateToStorage(state) {
            try {
                localStorage.setItem(CAMP_STATE_KEY, JSON.stringify(serializeCampState(state)));
            } catch (e) {
                console.warn('campState save failed', e);
            }
        }

        function App() {
            // м≤Ђ лІИмЪінКЄ: localStorage мЮИмЬЉл©і мЇ†нФД, мЧЖмЬЉл©і мЭЄнКЄл°Ь.
            //   loadedлКФ useRef-like нХЬ л≤ИлІМ нПЙк∞А вАФ лСР useState lazy initializerк∞А лПЩмЭЉ к∞ТмЭД м∞Єм°∞.
            const initialLoadedRef = useRef(undefined);
            const getInitialLoaded = () => {
                if (initialLoadedRef.current === undefined) {
                    initialLoadedRef.current = loadCampStateFromStorage();
                }
                return initialLoadedRef.current;
            };
            const [campState, setCampState] = useState(() => getInitialLoaded() || makeInitialCampState());
            const [view, setView] = useState(() => (getInitialLoaded() ? 'camp' : 'intro'));
            // м≤Ђ мЇ†нФД лПДм∞© л™®лЛђмЪ© outcome ('victory'|'death'|null).
            const [pendingTentModal, setPendingTentModal] = useState(null);

            // campState л≥АнЩФ мЛЬлІИлЛ§ м†АмЮ•.
            useEffect(() => {
                saveCampStateToStorage(campState);
            }, [campState]);

            // [м†ХмЛ†мЭД м∞®л¶∞лЛ§] вАФ мЛЬлВШл¶ђмШ§ вЖТ м≤Ђ нГРнЧШ.
            const handleIntroDismiss = () => {
                setCampState(prev => ({ ...prev, seenIntro: true }));
                setView('play');
            };

            // нГРнЧШ к≤∞к≥Љ м≤Шл¶ђ вАФ GameмЭі returnToCampмЧРмДЬ нШЄмґЬ.
            //   payload: { outcome, runInventory, selectedIds?, runStats?, runFinal? }.
            //   - мКєл¶ђ: runInventory.items м§С selectedIds(мЮИмЬЉл©і)лІМ мЇ†нФД мЭЄл≤§мЧР addItem, мЧЖмЬЉл©і м†Дм≤і.
            //   - мВђлІЭ: мЭЄл≤§ 0 мЭЄмЮЕ.
            //   - м≤Ђ мЇ†нФД л≥µкЈА(firstReturnDone=false)л©і нЕРнКЄ нАШмК§нКЄ лґАмЧђ + TentQuestModal.
            //   D-110: runStats + runFinalл°Ь calculateRunScore вЖТ bestScore/totalScore/lastScore к∞±мЛ†.
            const handleRunEnd = (payload) => {
                const outcome = (payload && payload.outcome) || 'death';
                const runInv = payload && payload.runInventory;
                const selectedIds = payload && payload.selectedIds;  // null|undefined вЖТ м†Дм≤і
                const runStats = (payload && payload.runStats) || { l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 };
                const runFinal = (payload && payload.runFinal) || {};
                const isFirstReturn = !campState.firstReturnDone;

                // D-110: мЭЄмЮЕнХ† мХДмЭінЕЬ л™©л°Э к≤∞м†Х. selectedIdsк∞А л∞∞мЧімЭіл©і нХДнД∞лІБ, кЈЄ мЩЄмЧФ м†Дм≤і.
                const itemsAll = (runInv && Array.isArray(runInv.items)) ? runInv.items : [];
                const itemsToTransfer = (outcome === 'victory')
                    ? (Array.isArray(selectedIds)
                        ? itemsAll.filter(it => it && selectedIds.includes(it.id))
                        : itemsAll)
                    : [];

                // м†РмИШ к≥ДмВ∞ вАФ мЭЄмЮЕнХЬ мХДмЭінЕЬ кЄ∞м§А.
                const score = calculateRunScore({
                    victory: outcome === 'victory',
                    uniqueTilesVisited: runFinal.uniqueTilesVisited,
                    detection: runFinal.detection,
                    items: itemsAll,
                    runStats,
                    selectedItems: itemsToTransfer
                });

                setCampState(prev => {
                    // мЇ†нФД мЭЄл≤§ мЭЄмК§нДімК§ мІБм†С л≥АнШХ(к∞ЩмЭА м∞Єм°∞ мЬ†мІА). React мЮђл†МлНФлКФ ...prev к∞Эм≤і мГИл°Ь лІМлУ§мЦімДЬ нКЄл¶ђк±∞.
                    // D-113: мЭЄмК§нДімК§ мІБм†С placement вАФ durabilityLeft / rotation л≥ім°і.
                    //   мЇ†нФД мЭЄл≤§мЭА disabled мЕА мЧЖмЭМ вЖТ лєИ мЮРл¶ђ м∞ЊмХД мГИ мҐМнСЬл°Ь мЮђл∞∞мєШ.
                    const camp = prev.inventory;
                    for (const it of itemsToTransfer) {
                        if (!it || !it.type) continue;
                        const def = InventorySystem.resolveDef(it.type) || InventorySystem.ITEMS[it.type] || {};
                        const shape = it.shape || (def.shape ? def.shape : null);
                        if (!shape) { camp.addItem(it.type); continue; }
                        const pos = camp.findEmptySpace(shape);
                        if (!pos) continue; // мЇ†нФД мЭЄл≤§ к∞АлУЭ вАФ лђімЛЬ(мґФнЫД: мХИлВі).
                        const placed = {
                            ...it,
                            id: Date.now() + Math.random(), // мЇ†нФД мЄ° мГИ idл°Ь(м†Д лЯ∞к≥Љ мґ©лПМ л∞©мІА).
                            x: pos.x,
                            y: pos.y
                        };
                        camp.placeItem(placed);
                        camp.items.push(placed);
                    }
                    const next = {
                        ...prev,
                        runs: {
                            total: prev.runs.total + 1,
                            victories: prev.runs.victories + (outcome === 'victory' ? 1 : 0),
                            deaths: prev.runs.deaths + (outcome === 'death' ? 1 : 0),
                            bestScore: Math.max(Number(prev.runs.bestScore) || 0, score),
                            totalScore: (Number(prev.runs.totalScore) || 0) + score,
                            lastScore: score
                        }
                    };
                    if (isFirstReturn) {
                        next.firstReturnDone = true;
                        next.quests = {
                            active: [...(prev.quests.active || []), { id: TENT_QUEST.id, progress: { branch: 0, stone: 0, stem: 0 } }],
                            completed: prev.quests.completed || []
                        };
                    }
                    return next;
                });
                if (isFirstReturn) {
                    setPendingTentModal(outcome);
                }
                setView('camp');
            };

            // [нГРнЧШ лЦ†лВШкЄ∞]
            // D-113: мЇ†нФД pack(к∞Ал∞©) вЖТ нГРнЧШ мЭЄл≤§ мЭЄк≥Д.
            //   packмЭШ InventorySystem мЭЄмК§нДімК§л•Љ кЈЄлМАл°Ь GameмЧР лДШкЄілЛ§(мХДмЭінЕЬ к∞Эм≤і м†Дм≤і л≥ім°і = durabilityLeft/rotation мЬ†мІА).
            //   campState.packмЭА мГИ лєИ мЭЄл≤§мЬЉл°Ь кµРм≤і вАФ лУ§к≥† к∞ФмЬЉлЛИ мЇ†нФДмЧФ лєДмЫА.
            //   нГРнЧШ м§С мЭЄл≤§мЭі к≥І к∞Ал∞©мЭШ нЫДмЖН(нГРнЧШмЧРмДЬ нЪНлУЭнХЬ мХДмЭінЕЬлУ§мЭі мґФк∞АлР®).
            //   handleRunEndк∞А мКєл¶ђ мЛЬ кЈЄ мЭЄл≤§мЭД л≥ікіАнХ®мЬЉл°Ь мЭЄмЮЕ. мВђлІЭ мЛЬ нПРкЄ∞.
            const [departInv, setDepartInv] = useState(null);
            const handleDepart = () => {
                const carried = campState.pack;
                setDepartInv(carried || null);
                setCampState(prev => ({ ...prev, pack: new InventorySystem(5, 5) }));
                setView('play');
            };

            // нЕРнКЄ нАШмК§нКЄ мЩДл£М мХМл¶Љ л©ФмЛЬмІА вАФ App л†Ил≤® нЖ†мК§нКЄ лМАмЛ† к∞Ал≤ЉмЪі л™®лЛђ.
            const [questCompleteMsg, setQuestCompleteMsg] = useState(null);

            // [мЩДмИШ] вАФ мЮђл£М м∞®к∞Р + completed мЭілПЩ + мХМл¶Љ.
            //   мЮђл£М л≥імЬ†лЯЙ мЮђнЩХмЭЄ(л†ИмЭімК§ к∞АлУЬ). лґАм°±нХШл©і лђімЛЬ(л≤ДнКЉмЭА disabledмЧђмХЉ нХ®).
            const handleCompleteQuest = (questId) => {
                const def = questId === TENT_QUEST.id ? TENT_QUEST : null;
                if (!def) return;
                const inv = campState.inventory;
                if (!inv) return;
                // мЮђнЩХмЭЄ.
                const reqs = def.requirements || {};
                for (const [type, need] of Object.entries(reqs)) {
                    const have = inv.items.filter(it => it.type === type).length;
                    if (have < need) return; // disabledмЧђмХЉ нЦИмІАлІМ к∞АлУЬ.
                }
                // м∞®к∞Р вАФ к∞Б type мХЮмЧРмДЬлґАнД∞ needк∞Ь removeItem + items л∞∞мЧі к∞±мЛ†.
                for (const [type, need] of Object.entries(reqs)) {
                    let remaining = need;
                    const keep = [];
                    for (const it of inv.items) {
                        if (remaining > 0 && it.type === type) {
                            inv.removeItem(it);
                            remaining -= 1;
                            continue;
                        }
                        keep.push(it);
                    }
                    inv.items = keep;
                }
                setCampState(prev => {
                    const active = prev.quests.active.filter(q => q.id !== questId);
                    const moved = prev.quests.active.find(q => q.id === questId);
                    return {
                        ...prev,
                        quests: {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : prev.quests.completed
                        }
                    };
                });
                if (questId === TENT_QUEST.id) {
                    setQuestCompleteMsg('нЕРнКЄ мЮРл¶ђл•Љ мЮ°мХШлЛ§. мЭім†Ь л∞§мЭі м°∞кЄИмЭА к≤ђлФЬ лІМнХШлЛ§.');
                }
            };

            // [лН∞мЭінД∞ міИкЄ∞нЩФ] вАФ localStorage мВ≠м†Ь + міИкЄ∞ мГБнГЬ + мЛЬлВШл¶ђмШ§лґАнД∞.
            const handleResetData = () => {
                try { localStorage.removeItem(CAMP_STATE_KEY); } catch {}
                setCampState(makeInitialCampState());
                setPendingTentModal(null);
                setQuestCompleteMsg(null);
                setDepartInv(null);
                setView('intro');
            };

            if (view === 'intro') {
                return <IntroScenarioScreen onDismiss={handleIntroDismiss} />;
            }
            if (view === 'play') {
                return <Game onRunEnd={handleRunEnd} initialInventory={departInv} />;
            }
            // camp
            return (
                <>
                    <CampScreen
                        campState={campState}
                        onDepart={handleDepart}
                        onCompleteQuest={handleCompleteQuest}
                        onResetData={handleResetData}
                        onInventoryChange={() => setCampState(prev => ({ ...prev }))}
                    />
                    {pendingTentModal && (
                        <TentQuestModal
                            outcome={pendingTentModal}
                            onDismiss={() => setPendingTentModal(null)}
                        />
                    )}
                    {questCompleteMsg && (
                        <div className="modal" style={{ zIndex: 3400 }}>
                            <div style={{
                                background: '#1a1a2e',
                                color: '#eee',
                                padding: '24px 22px',
                                borderRadius: '10px',
                                border: '1px solid #d4b84a',
                                maxWidth: '360px',
                                width: '90vw',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', marginBottom: '10px' }}>рЯПХпЄП</div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, marginBottom: '18px' }}>
                                    {questCompleteMsg}
                                </div>
                                <button
                                    onClick={() => setQuestCompleteMsg(null)}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    нЩХмЭЄ
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));

        // D-41 (2026-04-23 мЪФнХЬ мІАмЛЬ): к≤МмЮД мШБмЧ≠ лВілґАмЭШ contextmenu(мЪ∞нБіл¶≠/л°±нФДл†ИмК§)
        // кЄ∞л≥Є лПЩмЮС м∞®лЛ®. CSS user-select:noneлІМмЬЉл°ЬлКФ iOS Safari л°±нФДл†ИмК§ л≥µмВђ л©ФлЙік∞А
        // лЬ®лКФ к≤љмЪ∞к∞А мЮИмЦі JS л†Ил≤®мЧРмДЬлПД лІЙлКФлЛ§.
        // input/textarea/contentEditableмЭА м†ЬмЩЄ вАФ нЕНмК§нКЄ мД†нГЭ¬ЈлґЩмЧђлД£кЄ∞ мї®нЕНмК§нКЄк∞А нХДмЪФ.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
