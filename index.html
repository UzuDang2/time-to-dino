    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // D-61 (2026-04-24, 12м∞® мДЄмЕШ): лІµ нБђкЄ∞ лЛ®мЭЉ мІДмЛ§мЭШ мЫРм≤Ь.
        //   7x7 вЖТ 11x11 (1.5л∞∞ мГБнЦ•). MapGenerator л™®лУ† нШЄмґЬлґАк∞А мЭі мГБмИШл•Љ мВђмЪ©.

        // D-87 (2026-04-24 мЪФнХЬ мІАмЛЬ): 11x11мЭі лДИлђі лДУлЛ§лКФ нФЉлУЬл∞±. 8x8(64нГАмЭЉ)л°Ь мґХмЖМ.
        //   л≥А кЄЄмЭі √Ч0.73, л©ім†Б мХљ 47% к∞РмЖМ. mapGeneratorлКФ gridSize лєДмЬ® мК§мЉАмЭЉмЭілЭЉ
        //   л≥ДлПД мИШм†Х лґИнХДмЪФ(лєИмКђл°ѓ 12~19, good=5, trap=3, minBossDist=5 мЮРлПЩ м†БмЪ©).
        const MAP_SIZE = 8;

        // ============================================
        // React мїінПђлДМнКЄлУ§
        // ============================================

        // мГБлЛ® мК§нГѓ нМ®лДР мїінПђлДМнКЄ
        //
        // D-27 HUD л¶ђлЙімЦЉ (мЪФнХЬ мІАмЛЬ 2026-04-22):
        // - мГЭл™Ел†•/л∞∞к≥†мЫАмЭА к≤МмЭімІА(л∞Ф) вАФ л∞Ьк∞Бл•† л∞Ф мК§нГАмЭЉ лЛµмКµ, к≤МмЮД лЛ§нБђнЖ§ мЬ†мІА.
        // - л∞∞к≥†нФФ <= 3мЭЉ лХМ лЕЄлЮАмГЙ(#d4b84a, м±ДлПД лВЃмґ§)мЬЉл°Ь к≤љк≥†.
        // - мЛЬк∞ДмЭА мИЂмЮРк∞А мХДлЛМ 'мЛЬк≥Д мХДмЭімљШ'. maxTimeлІМнБЉ нСЬмЛЬнХШк≥† мЖМл™®лРЬ лІМнБЉ мЦілС°к≤М.
        // - мЛЬк∞Д м†ДлґА мЖМл™®(time >= maxTime) мЛЬ мИЂмЮР/мХДмЭімљШ л™®лСР лє®к∞ХмЬЉл°Ь к≤љк≥†.
        // - к≤МмЮД лЛ§нБђ лґДмЬДкЄ∞мЩА м°∞нЩФл•Љ мЬДнХі лє®к∞Х/лЕЄлЮС м±ДлПДлКФ лВЃк≤М мЬ†мІА.
        //
        // D-37 HUD 2м§Д мХХмґХ (мЪФнХЬ мІАмЛЬ 2026-04-22, 7м∞® мДЄмЕШ):
        // - мГБлЛ® HUD мДЄл°Ь кЄЄмЭіл•Љ м§ДмЧђ л™®л∞ФмЭЉмЧРмДЬ лІµ к∞АмЛЬ мШБмЧ≠ нЩХл≥і.
        // - 1м§Д: [мГЭл™Ел†• к≤МмЭімІА][л∞∞к≥†нФФ к≤МмЭімІА][мЛЬк∞Д мЛЬк≥Д]  (3к∞Ь нХЬ м§Д)
        // - 2м§Д: [л≥імК§ мИЬм∞∞/мґФк≤©][л∞Ьк∞Бл•† л∞Ф]             (2к∞Ь нХЬ м§Д, л∞Ьк∞Б л∞ФлКФ flex-grow)
        // - лЭЉл≤® м†Ьк±∞, мХДмЭімљШлІМ нСЬмЛЬ. мИЂмЮР нП∞нКЄ нБђкЄ∞ мґХмЖМ.
        // - к≤МмЭімІА лЖТмЭі 12 вЖТ 10, л∞Ьк∞Б л∞Ф 20 вЖТ 14.
        // - кЄ∞м°і stat-box padding мґХмЖМ нХДмЪФ мЛЬ мЭЄлЭЉмЭЄмЬЉл°ЬлІМ мШ§л≤ДлЭЉмЭілУЬ(м†ДмЧ≠ .stat-boxлКФ лЛ§л•Є к≥≥мЧРмДЬ мЮђмВђмЪ©).
        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            const MAX_HEALTH = 8;
            const MAX_HUNGER = 12;
            const healthPct = Math.max(0, Math.min(100, (health / MAX_HEALTH) * 100));
            const hungerPct = Math.max(0, Math.min(100, (hunger / MAX_HUNGER) * 100));

            // м±ДлПД лВЃмґШ к≤љк≥†мГЙ (лЛ§нБђнЖ§ м°∞нЩФ). кЄ∞л≥ЄмЭА кЄ∞м°і нМФл†ИнКЄ мЬ†мІА.
            const healthColor = health <= 0
                ? '#8a2b3a'
                : health <= 2 ? '#c04a5e' : '#b24656';
            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // мїінМ©нКЄ stat-box мК§нГАмЭЉ вАФ 2м§Д HUDмЧРмДЬ лЖТмЭіл•Љ лВЃмґФкЄ∞ мЬДнХі padding мґХмЖМ.
            const compactBox = { padding: '5px 7px' };

            return (
                <div>
                    {/* 1м§Д: мГЭл™Ел†• ¬Ј л∞∞к≥†нФФ ¬Ј мЛЬк∞Д (3к∞Ь нХЬ м§Д) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>
                        <StatGauge
                            icon="вЭ§пЄП"
                            value={health}
                            max={MAX_HEALTH}
                            pct={healthPct}
                            color={healthColor}
                            valueColor="#eee"
                            flex={1}
                            warning={health <= 2}
                        />
                        <StatGauge
                            icon="рЯНЦ"
                            value={hunger}
                            max={MAX_HUNGER}
                            pct={hungerPct}
                            color={hungerColor}
                            valueColor={hungerLow ? '#d4b84a' : '#eee'}
                            flex={1}
                            warning={hunger <= 3}
                        />
                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): лВ®мЭА нЪМмИШ нСЬмЛЬл°Ь л∞Шм†Д.
                                    - л∞ЭмЭА мХДмЭімљШ = мХДмІБ мУЄ мИШ мЮИлКФ нЪМмИШ, мЦілСРмЪі мХДмЭімљШ = мЖМл™®лР®.
                                    - мЛЬмЮС 3/3 вЖТ м†ДлґА мЖМл™® мЛЬ 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // iк∞А мЮСмЭДмИШл°Э л®Љм†А мЖМл™®лР®. лВ®мЭА к∞ЬмИШлКФ (maxTime - time).
                                    const remaining = i < (maxTime - time);
                                    return (
                                        <span
                                            key={i}
                                            style={{
                                                fontSize: '14px',
                                                lineHeight: 1,
                                                opacity: remaining ? 1 : 0.25,
                                                filter: timeEmpty
                                                    ? 'grayscale(1) brightness(0.9)'
                                                    : remaining ? 'none' : 'grayscale(1) brightness(0.7)',
                                                color: timeEmpty ? '#c04a5e' : undefined,
                                                transition: 'all 0.2s'
                                            }}
                                        >
                                            рЯХ∞пЄП
                                        </span>
                                    );
                                })}
                            </div>
                            <span style={{
                                fontSize: '11px',
                                fontWeight: '600',
                                color: timeTextColor,
                            }}>
                                {maxTime - time}/{maxTime}
                            </span>
                        </div>
                    </div>

                    {/* 2м§Д: л≥імК§ мГБнГЬ ¬Ј л∞Ьк∞Бл•† л∞Ф (л∞Ьк∞Б л∞Фк∞А лВ®мЭА нП≠ м∞®мІА) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',

                                color: boss?.chaseMode ? '#e94560' : '#eee'

                            title={boss?.chaseMode ? 'мґФк≤© м§С' : 'мИЬм∞∞ м§С'}
                        >
                            {boss?.chaseMode ? 'рЯФі мґФк≤©' : 'рЯЯҐ мИЬм∞∞'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>рЯЪ®</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',
                                position: 'relative'

                                    width: `${detection}%`,
                                    height: '100%',

                                <div style={{

        // мК§нГѓ к≤МмЭімІА вАФ л∞Ьк∞Бл•† л∞ФмЩА лПЩмЭЉ кµђм°∞. мХДмЭімљШ + к≤МмЭімІА + мИЂмЮР.
        // D-37: лЭЉл≤® м†Ьк±∞¬ЈмїінМ©нКЄ padding. `flex` propмЬЉл°Ь мЩЄлґАмЧРмДЬ лДИлєД л∞∞лґД м†ЬмЦі.
        // D-55 (2026-04-24 мЪФнХЬ мІАмЛЬ): `warning` prop trueл©і м±ДмЫА лґАлґДмЧРлІМ лє®к∞Д м†Рл©Є.
        //   StatPanelмЭі health<=2 / hunger<=3 мЧРмДЬ м£ЉмЮЕ. лЭЉл≤®/мИЂмЮР/мХДмЭімљШмЭА м†ХмГБ.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex, warning }) {
            return (
                <div className={`stat-box ${warning ? 'stat-warning' : ''}`} style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>

        }

        // мЖРнМ® мєілУЬ мїінПђлДМнКЄ
        // мЖРнМ® мГБнХЬ 5мЮ•(HAND_SIZE) вАФ 5мЧі кЈЄл¶ђлУЬл°Ь нХЬ м§ДмЧР нСЬмЛЬнХЬлЛ§.
        // нХЬ м§ДмЧР л™®лУ† мєілУЬк∞А лУ§мЦік∞АмХЉ мГБлЛ® UIк∞А мК§нБђл°§ мЧЖмЭі мЬ†мІАлР®(кЄ∞нЪН мЫРмєЩ: нХШлЛ® лІµ мК§нБђл°§лІМ нЧИмЪ©).
        // мҐБмЭА нП≠мЧРмДЬлКФ нП∞нКЄ/нМ®лФ©мЭі мЭілѓЄ 10~13pxмЭілЭЉ 5мЧілПД мХИм†Х.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            // D-48: нГАмЭЉ мЭілПЩлІИлЛ§ handмЭі м†ДлґА кµРм≤ілРШлѓАл°Ь к∞Б мєілУЬ uidк∞А мГИ к∞Т.
            //   мГИл°Ь лІИмЪінКЄлРЬ мєілУЬмЧР card-draw нБілЮШмК§ + stagger delayл°Ь мИЬм∞® нОШмЭілУЬмЭЄ.
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map((card, i) => (
                        <div
                            key={card.uid}
                            className="card card-draw"
                            style={{ animationDelay: `${i * 60}ms` }}
                            onClick={() => useCard(card)}
                        >

                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                л∞Ьк∞Б {card.detection > 0 ? '+' : ''}{card.detection}% ¬Ј вП∞{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // мІАмЧ≠ нХЬкЄА лЭЉл≤® (кЄ∞нЪНмГБ regionмЭА мЭілѓЄ нХЬкЄАмЭілЭЉ лІ§нХС лґИнХДмЪФнХШмІАлІМ,
        // мґФнЫД мШБмЦі мљФлУЬл°Ь л∞ФкњА мЧђмІАк∞А мЮИмЦі лІµмЭД лСФлЛ§. мЭЉмєШнХШл©і кЈЄлМАл°Ь лЕЄмґЬ).
        const REGION_LABEL = {
            'мИ≤': 'мИ≤', 'лН§лґИ': 'лН§лґИ', 'нПЙмЫР': 'нПЙмЫР', 'мЛЬлГЗлђЉ': 'мЛЬлГЗлђЉ', 'лПЩкµі': 'лПЩкµі',
            forest: 'мИ≤', thicket: 'лН§лґИ', plain: 'нПЙмЫР', stream: 'мЛЬлГЗлђЉ', cave: 'лПЩкµі'
        };

        // D-89 (2026-04-25 мЪФнХЬ мІАмЛЬ): нГАмЭЉ мХДмЭімљШ нЖµнХ© м§СмХЩ мК§нГЭ.
        //   мЭім†ДмЧФ sound trace(рЯС£)к∞А мЪ∞мГБлЛ®, preyк∞А м§СмХЩ, вЩЯ/рЯ¶Цк∞А л≥ДлПД SVG text мШ§л≤Дл†ИмЭіл°Ь
        //   лґДмВ∞лРРлЛ§. мЪФнХЬ: "м†ДлґА м§СмХЩм™љмЧР нСЬмЛЬлРШмЮЦмХД вА¶ мК§нГЭлРШк≤М нХімДЬ лСРк∞ЬмЭЉлХР гЕЗгЕЗ,
        //   мДЄк∞ЬлґАнД∞лКФ гЕЗгЕЗ/гЕЗ, лД§к∞ЬмЭЉлХР гЕЗгЕЗ/гЕЗгЕЗ".
        //   лЛ®мИЬ мКђл°ѓ мҐМнСЬнСЬ(нГАмЭЉ м§СмЛђмЧР лМАнХЬ dx/dy). нП∞нКЄ 24 кЄ∞м§А к∞Ал°Ь ¬±15, мДЄл°Ь нЦЙк∞Д ~30.
        const TILE_STACK_LAYOUTS = {
            1: [{ dx: 0,   dy: 8 }],
            2: [{ dx: -16, dy: 8 }, { dx: 16, dy: 8 }],
            3: [{ dx: -16, dy: -6 }, { dx: 16, dy: -6 }, { dx: 0, dy: 24 }],
            4: [{ dx: -16, dy: -7 }, { dx: 16, dy: -7 }, { dx: -16, dy: 23 }, { dx: 16, dy: 23 }]
        };
        const TILE_STACK_MAX = 4;

        // нГАмЭЉ мЬДмЧР нСЬмЛЬнХ† мХДмЭімљШ нЫДл≥і мВ∞мґЬ. нШЄмґЬм≤Шк∞А к∞ЩмЭА мЮЕл†•мЬЉл°Ь лПЩмЭЉ к≤∞к≥Љл•Љ л∞ЫлПДл°Э мИЬмИШ нХ®мИШ.
        //   мЪФнХЬ: "нЭФм†БмЭА м†Хм≤ік∞А л∞ЭнШАмІАл©і нЭФм†Б мХДмЭімљШмЭі мЧЖмЦімІАк≥† мВђлГ•к∞Р мХДмЭімљШмЬЉл°Ь лМАм≤і"
        //   вЖТ traceлКФ preyлВШ carcassк∞А к∞ЩмЭА нГАмЭЉмЧР л≥імЭіл©і мЮРлПЩ мГЭлЮµ.
        //   isPlayer/isBoss нФМлЮШкЈЄлКФ HexTileмЧРмДЬ л≥Єм≤і л†МлНФ мЛЬ skip(GameMapмЭі л≥ДлПД SVG textл°Ь
        //   transition мКђлЭЉмЭілУЬл•Љ мЬДнХі лЛ®мЭЉ мЭЄмК§нДімК§ мЬ†мІА) нХШлКФлН∞ мУ∞мЭЄлЛ§.
        function computeTileIcons(tile, ctx) {
            const isRevealed = tile.revealed || tile.visited;
            if (!isRevealed) return [];
            const list = [];
            if (tile.type === 'exit') {
                list.push({ kind: 'exit', text: 'нГИмґЬкµђ', fontSize: 14, fill: '#fff' });
            } else {
                if (tile.type === 'good') list.push({ kind: 'good', emoji: 'рЯМЊ' });
                else if (tile.type === 'trap') list.push({ kind: 'trap', emoji: 'вЪ†пЄП' });
                if (tile.visited && ctx.hasCarcass) list.push({ kind: 'carcass', emoji: 'рЯ¶і' });
                if (ctx.showPrey) list.push({ kind: 'prey', emoji: ctx.preyEmoji });
                // D-94: мЬ†м†Ак∞А лЖУмХДлСФ к±∞лМАнХЬ л®ємЭі вАФ visitedмЩА лђікіА(мєілУЬ нЪ®к≥Љл°Ь мЮРкЄ∞ нГАмЭЉмЧР лЖУмХДлПД
                //   visitedлКФ мЭілѓЄ trueмЮД). carcassмЩА лПЩмЛЬмЧР мЮИмЭД мИШ мЧЖмЭМ(л≥імК§к∞А л®ємЬЉл©і carcassл°Ь м†ДнЩШ).
                if (ctx.hasBait && !(tile.visited && ctx.hasCarcass)) {
                    list.push({ kind: 'bait', emoji: 'рЯНЦ' });
                }
                const traceVisible = (ctx.hasTrace || ctx.hasCarcassTrace)
                    && !ctx.showPrey
                    && !(tile.visited && ctx.hasCarcass)
                    && !ctx.hasBait;
                if (traceVisible) {
                    list.push({ kind: 'trace', emoji: ctx.hasCarcassTrace ? 'рЯ¶і' : 'рЯС£' });
                }
            }
            if (ctx.isCurrent) list.push({ kind: 'player', emoji: 'вЩЯ', isPlayer: true });
            if (ctx.isBoss) list.push({ kind: 'boss', emoji: 'рЯ¶Ц', isBoss: true });
            // 4к∞Ь міИк≥Љ мЛЬ priority лВЃмЭА trace/мІАнШХ нСЬмІАлґАнД∞ мЮШл¶Љ(нШДмЮђ listлКФ push мИЬмДЬк∞А
            // мЪ∞мД†мИЬмЬД мЧ≠мИЬмЭілЭЉ лІ® мХЮлґАнД∞ мЮШлЭЉмХЉ player/bossк∞А мВімХДлВ®мЭМ).
            if (list.length > TILE_STACK_MAX) {
                return list.slice(list.length - TILE_STACK_MAX);
            }
            return list;
        }

        // мЬ°к∞БнШХ нГАмЭЉ мїінПђлДМнКЄ
        //
        // D-42 (2026-04-23 мЪФнХЬ мІАмЛЬ): л≥імК§ мХДмЭімљШ лЕЄмґЬ м°∞к±імЭі "tile.revealed"мЧРмДЬ
        // "bossVisible"л°Ь лґДл¶ђлР®. мІАнШХ revealedмЩА лђікіАнХШк≤М bossVisible=true мЭЉ лХМлІМ
        // л≥імК§к∞А мЮИлКФ нГАмЭЉмЧР рЯ¶Ц мХДмЭімљШмЭі лЬђлЛ§. мЭілПЩнХШл©і setBossVisible(false).
        //
        // D-50 (2026-04-23 мЪФнХЬ мІАмЛЬ): нФМл†ИмЭімЦі¬Јл≥імК§л•Љ нГАмЭЉ л∞∞к≤љ/лЭЉл≤®л°Ь мДЮмЦі
        // нСЬнШДнХШлНШ л∞©мЛЭмЭД нПРкЄ∞нХШк≥† SVG мШ§л≤Дл†ИмЭі "лІР"(piece)л°Ь лґДл¶ђ. нГАмЭЉмЭА
        // мІАнШХ мЖНмД±лІМ нСЬнШД. лІР л†МлНФлІБмЭА GameMapмЧРмДЬ HexTile мЬДмЧР SVG textл°Ь мИШнЦЙ.
        //
        // D-46/D-48: мВђлГ•к∞Р мШ§л≤Дл†ИмЭі.
        //   - prey мХДмЭімљШ: visited нГАмЭЉ + preysмЧР мЭі tileId мЮИмЭД лХМ. (л≥імК§к∞А мЮИмЬЉл©і л≥імК§ мЪ∞мД†)
        //   - нЭФм†Б(рЯС£ мЪ∞мГБлЛ®): preyTraceTiles.has(tile.id) вАФ visited лђікіА (м≤≠к∞Б лЛ®мДЬ).
        //   - D-48: л∞ЬмЮРкµ≠ л∞©нЦ• нЩФмВінСЬ м†Ьк±∞ вАФ нЭФм†Б(рЯС£)лІМмЬЉл°Ь лЛ®мДЬ м†Ьк≥µ.
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo, requestWait, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            const preyOnTile = (preys || []).find(p => p.tileId === tile.id);
            const showPrey = tile.visited && preyOnTile && !isBoss;
            const preyEmoji = showPrey ? (PREY_EMOJI[preyOnTile.preyType] || 'вЭУ') : null;
            const hasTrace = preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tile.id);
            // D-78: мВђм≤і нГАмЭЉ. visited && carcassTiles.has(tile.id)л©і рЯ¶і мШ§л≤Дл†ИмЭі.
            //   listenмЬЉл°Ь к∞РмІАлРЬ мЭЄм†С мВђм≤ілКФ carcassTraceTilesмЧР лУ§мЦік∞А trace мЬДмєШмЧР рЯ¶і нСЬмЛЬ(visited лђікіА).
            const hasCarcass = carcassTiles && carcassTiles.has && carcassTiles.has(tile.id);
            const hasCarcassTrace = carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tile.id);
            // D-94: к±∞лМАнХЬ л®ємЭі вАФ мЬ†м†Ак∞А лЖУмХДлСФ нГАмЭЉ.
            const hasBait = baitTiles && baitTiles.has && baitTiles.has(tile.id);

            // D-53: [лІµ л≥ікЄ∞] л™®лУЬмЧРмДЬ лѓЄл∞©лђЄ нГАмЭЉмЭА л∞ШнИђл™Е нЪМмГЙ мЬ§к≥љлІМ к≥µк∞Ь.
            // мІАмЧ≠ мЭіл¶Д/лІИмї§/prey/нЭФм†БмЭА мИ®кЄілЛ§(мК§нПђмЭЉлЯђ л∞©мІА вАФ л∞©лђЄ мХИ нХЬ к≥≥мЭА мІАнШХлІМ к∞Р).
            const pathUnvisited = showPathView && !tile.visited;
            // D-80 (2026-04-24 мЪФнХЬ мІАмЛЬ): listen мЛ§л£®мЧ£ вАФ м†Хл≥ік∞А л∞ЭнШАмІД нГАмЭЉмЧР
            // мЭЄм†СнХШмЧђ кЄЄмЭі мЧ∞к≤∞лРЬ кЈЄ лЛ§мЭМ 1мєЄ нГАмЭЉмЭД лІµл≥ікЄ∞мЩА лПЩмЭЉнХЬ dim мГЙмГБмЬЉл°Ь лЕЄмґЬ.
            // кЄЄм∞ЊкЄ∞ лВЬмЭілПД нХШнЦ• л™©м†Б. к≤МмЮД м§СмЧРлПД мЭілПЩмЭА к∞АлК•(canMoveл©і нБіл¶≠ нЧИмЪ©).
            const silhouetteOnly = !showPathView && tile.silhouette && !tile.revealed && !tile.visited;
            const dimmed = pathUnvisited || silhouetteOnly;

            // кЄЄмЭі мЧЖлКФ нГАмЭЉ (connections мЧЖмЭМ) нМРл≥Д
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                return '#2d3561';
            };

            // D-89: getTileLabel нПРкЄ∞ вАФ л™®лУ† мХДмЭімљШмЭі computeTileIcons + мК§нГЭ мКђл°ѓ мЬДмєШл°Ь нЖµнХ©.
            //   лѓЄк≥µк∞Ь нГАмЭЉмЧРлІМ лЛ®лПЕ '?' лЭЉл≤® мВђмЪ©.
            const tileIcons = computeTileIcons(tile, {
                isCurrent, isBoss, showPrey, preyEmoji, hasCarcass, hasTrace, hasCarcassTrace, hasBait
            });
            const visibleIcons = dimmed ? [] : tileIcons;
            // нФМл†ИмЭімЦі/л≥імК§лКФ GameMapмЭі лЛ®мЭЉ SVG textл°Ь кЈЄл†§ transition мКђлЭЉмЭілУЬ л≥ім°і.
            // HexTileмЭА кЈЄ мЩЄ мХДмЭімљШлІМ л†МлНФнХШлРШ, мК§нГЭ мКђл°ѓ мЭЄлН±мК§лКФ player/boss мЮРл¶ђлПД
            // м∞®мІАнХЬ мГБнГЬл°Ь к≥ДмВ∞ вЖТ GameMapмЭШ к≥ДмВ∞к≥Љ лПЩмЭЉнХШк≤М мЭЉмєШ.
            const stackLayout = TILE_STACK_LAYOUTS[Math.min(visibleIcons.length, TILE_STACK_MAX)] || [];

            // мІАмЧ≠ мЭіл¶Д мШ§л≤Дл†ИмЭі.
            // D-51 (2026-04-23 мЪФнХЬ мІАмЛЬ): revealed(кЈАкЄ∞мЪЄмЭікЄ∞ лУ±)лПД мІАнШХ мЭіл¶Д лЕЄмґЬ.
            // мЭім†Д(D-27~): visitedлІМ нСЬмЛЬ. мЭім†Ь listenмЬЉл°Ь м£Љл≥А мІАнШХ нММмХЕмЭі к∞АлК•нХімІР.
            // л∞©лђЄ(visited)к≥Љ м†Хм∞∞(revealed only) кµђлґД:
            // - visited: міИл°Э лПЩкЈЄлЮА лІИмї§ + мІАнШХ мЭіл¶Д, нГАмЭЉ л∞ЭмЭМ(opacity 1)
            // - revealed only: мІАнШХ мЭіл¶ДлІМ (лІИмї§ мЧЖмЭМ), нГАмЭЉ мХљк∞Д мЦілСРмЫА(opacity 0.7)
            // - лѓЄк≥µк∞Ь: мХДлђік≤ГлПД мЧЖмЭМ, нГАмЭЉ лІ§мЪ∞ мЦілСРмЫА(opacity 0.55)
            const regionLabel = !dimmed && (tile.visited || tile.revealed) && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;
            // D-80 л≥ік∞Х (2026-04-24 мЪФнХЬ мІАмЛЬ): revealed-only(л∞ЭнШАм°МмІАлІМ мХИ к∞Ал≥Є) нГАмЭЉмЭА
            // мГЙмГБлІМ мЛ§л£®мЧ£к≥Љ лПЩмЭЉ(#444)л°Ь лВЃмґФк≥†, opacity¬Јstroke¬ЈлІИмї§¬ЈмІАмЧ≠л™ЕмЭА мЬ†мІА.
            // visited(мГЙ мЮИмЭМ, opacity 1)мЩА нХЬлИИмЧР кµђлґДнХШкЄ∞ мЬДнХі.
            // D-80 л≥ік∞Х 3: fill/stroke opacity лґДл¶ђ вАФ нГАмЭЉ лВілґАлКФ "к∞Ал≥Є к≥≥ vs мХИ к∞Ал≥Є к≥≥"мЭШ
            // кµђлґДмЭД мЬДнХі нЭРл¶і мИШ мЮИмІАлІМ, мЭілПЩ к∞АлК•(canMove) лЕємГЙ нЕМлСРл¶ђлКФ нХ≠мГБ мД†л™ЕнХімХЉ
            // кЄЄм∞ЊкЄ∞к∞А мЙљлЛ§. polygon opacity нХЬ л∞©мЬЉл°ЬлКФ лСШмЭД лґДл¶ђнХ† мИШ мЧЖмЦі fillOpacityмЩА
            // strokeOpacityл•Љ лФ∞л°Ь лСФлЛ§.
            // D-85 (2026-04-24 мЪФнХЬ мІАмЛЬ): нШДмЮђ нГАмЭЉмЭШ connectionsмЧР мЖНнХШлКФ нГАмЭЉмЭА
            // silhouette/dim мГБнГЬмЧђлПД нХ≠мГБ лЕємГЙ canMove нЕМлСРл¶ђл•Љ лЭДмЫМмХЉ нХЬлЛ§. мЭім†ДмЧРлКФ
            // dimmedмЭЉ лХМ stroke=#555/width=1л°Ь лНЃмЦімН®мДЬ, listenмЬЉл°Ь silhouette нФМлЮШкЈЄк∞А
            // лґЩмЭА "к∞И мИШ мЮИлКФ" нГАмЭЉмЭі "л™ї к∞АлКФ нГАмЭЉ"м≤ШлЯЉ л≥імЭілКФ л≤ДкЈЄк∞А мЮИмЧИлЛ§.
            // вЖТ canMoveк∞А мµЬмЪ∞мД†, кЈЄ лЛ§мЭМмЧР dimmed, кЈЄ лЛ§мЭМ кЄ∞л≥Є нЕМлСРл¶ђ.
            // лЛ®, [лІµ л≥ікЄ∞](showPathView)мЧРмДЬ pathUnvisitedмЭіл©і мЛ§м†Ь нБіл¶≠мЭі лІЙнЮИлѓАл°Ь
            // лЕємГЙ мКєк≤©лПД мГЭлЮµнХімДЬ "лЕємГЙмЭЄлН∞ мХИ лИМл¶Љ" л™®мИЬмЭД нФЉнХЬлЛ§.
            const showCanMove = canMove && !pathUnvisited;
            const revealedOnly = !tile.visited && tile.revealed;
            const tileFillOpacity = dimmed ? 0.22 : (tile.visited ? 1 : tile.revealed ? 0.7 : 0.55);
            const tileStrokeOpacity = (dimmed && !showCanMove) ? 0.4 : 1;
            const tileFill = (dimmed || revealedOnly) ? '#444' : getTileColor(tile);
            const tileStroke = showCanMove ? '#4CAF50' : (dimmed ? '#555' : '#0f3460');
            const tileStrokeWidth = showCanMove ? '3' : (dimmed ? '1' : '2');

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile${dimmed ? ' path-unvisited' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={tileFill}
                        stroke={tileStroke}
                        strokeWidth={tileStrokeWidth}
                        fillOpacity={tileFillOpacity}
                        strokeOpacity={tileStrokeOpacity}
                        onClick={() => {
                            if (gameOver || victory || pathUnvisited || showPathView) return;
                            // D-90: мЮРкЄ∞ нГАмЭЉ нБіл¶≠ вЖТ мЛЬк∞Д л≥ілВікЄ∞ нЩХмЭЄ л™®лЛђ.
                            if (isCurrent) {
                                if (typeof requestWait === 'function') requestWait();
                                return;
                            }
                            if (canMove) moveTo(tile.id);
                        }}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            {tile.visited && (
                                <circle cx={x - 22} cy={y - 36} r="3" fill="#4CAF50" />
                            )}
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    {/* лѓЄк≥µк∞Ь нГАмЭЉ вАФ '?' лЛ®лПЕ лЭЉл≤®. */}
                    {!dimmed && !isRevealed && (
                        <text x={x} y={y + 5} textAnchor="middle" fill="#666" fontSize="24" fontWeight="bold">?</text>
                    )}
                    {/* D-89: нЖµнХ© м§СмХЩ мК§нГЭ. player/bossлКФ GameMap лЛ®мЭЉ SVG text(transition л≥ім°і)
                        к∞А кЈЄл¶ђлѓАл°Ь мЧђкЄ∞мД† skip. мК§нГЭ мКђл°ѓ мЭЄлН±мК§лКФ мЭЉмєШнХЬлЛ§. */}
                    {visibleIcons.map((icon, idx) => {
                        if (icon.isPlayer || icon.isBoss) return null;
                        const slot = stackLayout[idx];
                        if (!slot) return null;
                        if (icon.text) {
                            return (
                                <text
                                    key={icon.kind}
                                    x={x + slot.dx}
                                    y={y + slot.dy}
                                    textAnchor="middle"
                                    fill={icon.fill || '#fff'}
                                    fontSize={icon.fontSize || 14}
                                    fontWeight="700"
                                    pointerEvents="none"
                                >
                                    {icon.text}
                                </text>
                            );
                        }
                        return (
                            <text
                                key={icon.kind}
                                x={x + slot.dx}
                                y={y + slot.dy}
                                textAnchor="middle"
                                dominantBaseline="middle"
                                fontSize="22"
                                pointerEvents="none"
                                stroke="#0a1020"
                                strokeWidth="3"
                                paintOrder="stroke"
                            >
                                {icon.emoji}
                            </text>
                        );
                    })}
                    {/* лІµ л≥ікЄ∞ л™®лУЬ вАФ нФМл†ИмЭімЦік∞А л∞©лђЄнХЬ мИЬмДЬ л≤ИнШЄ. м≤Ђ л∞©лђЄ кЄ∞м§А(indexOf). */}
                    {showPathView && moveHistory && (() => {
                        const pathIdx = moveHistory.indexOf(tile.id);
                        if (pathIdx < 0) return null;
                        return (
                            <g pointerEvents="none">
                                <circle cx={x - 28} cy={y - 2} r="11" fill="#d4b84a" stroke="#000" strokeWidth="0.8" />
                                <text
                                    x={x - 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#1a1a2e"
                                    fontSize="12"
                                    fontWeight="800"
                                >
                                    {pathIdx + 1}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-53: лІµ л≥ікЄ∞ л™®лУЬ вАФ л≥імК§ мЭілПЩ к≤љл°Ь. лє®к∞Д лПЩкЈЄлЭЉлѓЄ + B{idx+1} лЭЉл≤®. */}
                    {showPathView && bossMoveHistory && (() => {
                        const bIdx = bossMoveHistory.indexOf(tile.id);
                        if (bIdx < 0) return null;
                        return (
                            <g className="boss-path-dot" pointerEvents="none">
                                <circle cx={x + 28} cy={y - 2} r="12" fill="#e94560" stroke="#1a1a2e" strokeWidth="1" />
                                <text
                                    x={x + 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#fff"
                                    fontSize="10"
                                    fontWeight="800"
                                >
                                    {`B${bIdx + 1}`}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-70 (2026-04-24 мЪФнХЬ мІАмЛЬ): мЛ§нМ® мЛЬ нГИмґЬкµђ мЬДмєШ к≥µк∞Ь.
                        showPathView л™®лУЬмЧРмДЬ tile.type==='exit'мЭіл©і нХ≠мГБ рЯЪ™ лІИмї§ лЕЄмґЬ.
                        мЬ†м†Ак∞А 'м†АкЄ∞к∞А нГИмґЬкµђмШАкµђлВШ' л≥µкЄ∞ к∞АлК•. */}
                    {showPathView && tile.type === 'exit' && (
                        <g className="exit-marker" pointerEvents="none">
                            <circle cx={x - 28} cy={y - 2} r="14" fill="#2196F3" stroke="#1a1a2e" strokeWidth="1.5" opacity="0.95" />
                            <text
                                x={x - 28}
                                y={y + 4}
                                textAnchor="middle"
                                fontSize="14"
                            >
                                рЯЪ™
                            </text>
                        </g>
                    )}
                </g>
            );
        }

        // к≤МмЮД лІµ мїінПђлДМнКЄ
        //
        // D-46 (2026-04-22 мЪФнХЬ мІАмЛЬ): LootToastл•Љ .map-container(мК§нБђл°§ мШБмЧ≠)
        // л∞ЦмЬЉл°Ь лєЉк≥† .map-area лЮШнНЉмЭШ нШХм†Ьл°Ь лСФлЛ§. мЭім†Д(D-39)мЧРлКФ лІµ мХИмЧР лД£мЦі
        // "лІµмЧРмДЬ нЪНлУЭ" к≥µк∞Дк∞РмЭД мВіл†ЄмІАлІМ, л™®л∞ФмЭЉмЧРмДЬ лІµмЭД мК§нБђл°§нХШл©і absolute
        // мЮРмЛЭмЭі мљШнЕРмЄ†мЩА нХ®кїШ л∞Ал†§ мЛЬмХЉмЧРмДЬ мВђлЭЉмІАлКФ лђЄм†Ьк∞А мЮИмЧИмЭМ.
        // .map-areaлКФ HUD л∞Фл°Ь мХДлЮШ мШБмЧ≠мЭілЭЉ, нЖ†мК§нКЄлКФ мК§нБђл°§к≥Љ лђікіАнХШк≤М
        // кЈЄ мГБлЛ®мЧР к≥†м†ХмЬЉл°Ь лЬ®к≥† HUD/мєілУЬмЩАлПД к≤ємєШмІА мХКлКФлЛ§.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, requestWait, lootToast, onLootToastDone, tileEventToast, onTileEventToastDone, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            // D-53: [лІµ л≥ікЄ∞] л™®лУЬмЧРмДЬлКФ л∞©лђЄ/л∞Ьк≤ђ мЧђлґАмЩА лђікіАнХШк≤М л™®лУ† лєДмЦімЮИмІА мХКмЭА нГАмЭЉ к≥µк∞Ь.
            // лѓЄл∞©лђЄ нГАмЭЉмЭА HexTile лВілґАмЧРмДЬ л∞ШнИђл™Е нЪМмГЙмЬЉл°Ь кЈЄл¶∞лЛ§.
            // D-80 л≥ік∞Х(2026-04-24): silhouette нФМлЮШкЈЄлПД л†МлНФ лМАмГБ вАФ listen мЛЬм†РмЧР м¶ЙмЛЬ лЕЄмґЬ.
            //   (мЭім†ДмЧФ discovered=falseл©і filterмЧРмДЬ к±Єл†§ мЭілПЩ нЫДмЧРмХЉ лТ§лК¶к≤М лВШнГАлВШлКФ л≤ДкЈЄк∞А мЮИмЧИмЭМ.)
            const visibleTiles = showPathView
                ? tiles.filter(t => !t.isEmpty)
                : tiles.filter(t => t.visited || t.discovered || t.revealed || t.silhouette);
            const containerRef = React.useRef(null);

            // D-54: нФМл†ИмЭі кЈЄл¶ђлУЬ м£Љл≥АмЧР лДЙлДЙнХЬ лєИ нМ®лФ©мЭД лСРмЦі мК§нБђл°§нХілПД "лБЭ"мЭі
            // мХИ л≥імЭік≤М нХЬлЛ§. SVG міЭ нБђкЄ∞лКФ mapGeneratorк∞А PADDING_HEXES л∞ШмШБнХі мВ∞мґЬ.
            const mapExtent = React.useMemo(() => {
                const gen = new MapGenerator(MAP_SIZE);
                return gen.getMapExtent();
            }, []);

            // D-82 (2026-04-24 мЪФнХЬ мІАмЛЬ): лІµ м°∞мЮС к∞ЬмД†.
            //   - кЊє лИДл•Є м±Д лУЬлЮШкЈЄ вЖТ лІµ pan (PC лІИмЪ∞мК§ + л™®л∞ФмЭЉ 1 finger).
            //   - лІИмЪ∞мК§ нЬ† вЖТ нЩХлМА/мґХмЖМ (PC).
            //   - лСР мЖРк∞АлЭљ нХАмєШ вЖТ нЩХлМА/мґХмЖМ (л™®л∞ФмЭЉ).
            //   - лУЬлЮШкЈЄ мЮДк≥Дк∞Т 4px лДШмЬЉл©і к∞ЩмЭА м†ЬмК§м≤ШмЭШ click(=hex tap) мЭіл≤§нКЄл•Љ capture лЛ®к≥ДмЧРмДЬ м∞®лЛ®.
            const [zoom, setZoom] = React.useState(1);
            const zoomRef = React.useRef(1);
            React.useEffect(() => { zoomRef.current = zoom; }, [zoom]);
            const ZOOM_MIN = 0.5;
            const ZOOM_MAX = 2.5;

            // D-47 (2026-04-22 мЪФнХЬ мІАмЛЬ): к≤МмЮД мЛЬмЮС мЛЬ нШДмЮђ мЬДмєШ нГАмЭЉмЭі мК§нБђл°§
            // лЈ∞нПђнКЄ м§СмХЩмЧР мШ§лПДл°Э 1нЪМ м†Хл†ђ. мЭім†ДмЧФ нХ≠мГБ (0,0)мЧРмДЬ мЛЬмЮСнХі лІ§л≤И
            // мЛЬмЮС мЬДмєШл•Љ м∞ЊмХДмХЉ нЦИмЭМ.
            // useLayoutEffectл°Ь paint м†ДмЧР мК§нБђл°§мЭД мЮ°мХД кєЬлє°мЮД мЧЖмЭМ.
            // лІИмЪінКЄ мЛЬ 1нЪМлІМ вАФ мЭінЫД мЭілПЩ мЮРмЬ†, мЮРлПЩ мґФм†БмЭА мХИ нХ®.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-82: лУЬлЮШкЈЄ/м§М мЭіл≤§нКЄ л∞ФмЭЄлФ©. лД§мЭінЛ∞лЄМ л¶ђмК§лДИл°Ь лґЩмЧђ wheelмЧРмДЬ preventDefault к∞АлК•.
            React.useEffect(() => {
                const el = containerRef.current;
                if (!el) return;

                const drag = { active: false, startX: 0, startY: 0, sL: 0, sT: 0, moved: false };
                const pinch = { active: false, dist: 0, zoomStart: 1 };
                let blockNextClick = false;

                // D-88 (2026-04-25): pinch м§СмЛђм†Р лУЬл¶ђнФДнКЄ мИШм†Х.
                // нХЬ нФДл†ИмЮДмЧР setZoom + rAFл°Ь scrollLeftмЭД м†БмЪ©нХШлКФ кµђм°∞мЧРмДЬ, touchmoveк∞А
                // rAFл≥ілЛ§ лє†л•ік≤М мЧ∞мЖН л∞ЬмГЭнХШл©і лЛ§мЭМ нФДл†ИмЮД к≥ДмВ∞мЭі "мГИ zoom + DOMмЭШ мШЫ scrollLeft"
                // л•Љ мДЮмЦі cx к≥ДмВ∞мЭі мЦікЄЛлВ®(м§СмЛђм†РмЭі мЖРк∞АлЭљмЧРмДЬ м†Рм†Р л©АмЦімІР). мЭШлПДлРЬ мК§нБђл°§
                // мЬДмєШл•Љ refмЧР лПЩкЄ∞л°Ь кЄ∞л°ЭнХШк≥† м§М к≥ДмВ∞мЭА м†ДлґА мЭі refлІМ л≥ік≤М нХЬлЛ§.
                const scrollRef = { x: el.scrollLeft, y: el.scrollTop };
                const syncScrollFromDOM = () => {
                    scrollRef.x = el.scrollLeft;
                    scrollRef.y = el.scrollTop;
                };

                const getDist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

                const beginPan = (x, y) => {
                    syncScrollFromDOM();
                    drag.active = true;
                    drag.startX = x;
                    drag.startY = y;
                    drag.sL = scrollRef.x;
                    drag.sT = scrollRef.y;
                    drag.moved = false;
                    el.classList.add('dragging');
                };
                const continuePan = (x, y) => {
                    if (!drag.active) return;
                    const dx = x - drag.startX;
                    const dy = y - drag.startY;
                    if (!drag.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                        drag.moved = true;
                    }
                    el.scrollLeft = drag.sL - dx;
                    el.scrollTop = drag.sT - dy;
                    syncScrollFromDOM();
                };
                const endPan = () => {
                    if (drag.moved) blockNextClick = true;
                    drag.active = false;
                    el.classList.remove('dragging');
                };

                // нХµмЛђ: focusOffset(viewport лВі нФљмЕА) кЄ∞м§АмЬЉл°Ь мљШнЕРмЄ† мҐМнСЬл•Љ к≥ДмВ∞.
                // scrollRef.xлКФ лІИмІАлІЙмЬЉл°Ь "мЭШлПДнХЬ" мК§нБђл°§мЭілЭЉ rAF лМАкЄ∞ м§СмЧРлПД мЭЉкіАлР®.
                const applyZoomAt = (ratio, focusClientX, focusClientY) => {
                    const prev = zoomRef.current;
                    const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, prev * ratio));
                    if (Math.abs(next - prev) < 0.001) return;
                    const rect = el.getBoundingClientRect();
                    const focusOffsetX = focusClientX - rect.left;
                    const focusOffsetY = focusClientY - rect.top;
                    const factor = next / prev;
                    const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                    const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                    zoomRef.current = next;
                    scrollRef.x = newScrollL;
                    scrollRef.y = newScrollT;
                    setZoom(next);
                    requestAnimationFrame(() => {
                        el.scrollLeft = newScrollL;
                        el.scrollTop = newScrollT;
                    });
                };

                // вФАвФА Mouse вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
                const onMouseDown = (e) => {
                    if (e.button !== 0) return; // мҐМнБіл¶≠лІМ
                    beginPan(e.clientX, e.clientY);
                };
                const onMouseMove = (e) => { continuePan(e.clientX, e.clientY); };
                const onMouseUp = () => { endPan(); };
                const onWheel = (e) => {
                    e.preventDefault();
                    const ratio = e.deltaY > 0 ? 0.9 : 1.1;
                    applyZoomAt(ratio, e.clientX, e.clientY);
                };

                // вФАвФА Touch вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
                const onTouchStart = (e) => {
                    if (e.touches.length === 2) {
                        // нХАмєШ мЛЬмЮС вАФ pan м§СлЛ®.
                        if (drag.active) { drag.active = false; el.classList.remove('dragging'); }
                        pinch.active = true;
                        pinch.dist = getDist(e.touches[0], e.touches[1]);
                        pinch.zoomStart = zoomRef.current;
                    } else if (e.touches.length === 1) {
                        pinch.active = false;
                        beginPan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchMove = (e) => {
                    if (pinch.active && e.touches.length === 2) {
                        e.preventDefault();
                        const d = getDist(e.touches[0], e.touches[1]);
                        if (pinch.dist === 0) return;
                        const ratio = d / pinch.dist;
                        const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinch.zoomStart * ratio));
                        if (Math.abs(next - zoomRef.current) < 0.001) return;
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const factor = next / zoomRef.current;
                        const rect = el.getBoundingClientRect();
                        const focusOffsetX = midX - rect.left;
                        const focusOffsetY = midY - rect.top;
                        const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                        const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                        zoomRef.current = next;
                        scrollRef.x = newScrollL;
                        scrollRef.y = newScrollT;
                        setZoom(next);
                        requestAnimationFrame(() => {
                            el.scrollLeft = newScrollL;
                            el.scrollTop = newScrollT;
                        });
                    } else if (drag.active && e.touches.length === 1) {
                        e.preventDefault();
                        continuePan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchEnd = (e) => {
                    if (e.touches.length < 2) pinch.active = false;
                    if (e.touches.length === 0) endPan();
                };

                // вФАвФА Click capture вАФ лУЬлЮШкЈЄ нЫД л∞ЬмГЭнХЬ click мЦµм†Ь вФАвФАвФАвФАвФА
                const onClickCapture = (e) => {
                    if (blockNextClick) {
                        e.stopPropagation();
                        e.preventDefault();
                        blockNextClick = false;
                    }
                };

                el.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                el.addEventListener('wheel', onWheel, { passive: false });
                el.addEventListener('touchstart', onTouchStart, { passive: false });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('touchcancel', onTouchEnd);
                el.addEventListener('click', onClickCapture, true);

                return () => {
                    el.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    el.removeEventListener('wheel', onWheel);
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('touchcancel', onTouchEnd);
                    el.removeEventListener('click', onClickCapture, true);
                };
            }, []);

            // D-50/D-89: мЧФнЛ∞нЛ∞ лІР(piece) вАФ нГАмЭЉ мЬДмЧР мЦєнЮИлКФ SVG text мШ§л≤Дл†ИмЭі.
            //   transition мКђлЭЉмЭілУЬ л≥ім°імЭД мЬДнХі лЛ®мЭЉ SVG text мЭЄмК§нДімК§л•Љ мЬ†мІА.
            //   D-89: нГАмЭЉ м§СмХЩ нЖµнХ© мК§нГЭ лПДмЮЕ вЖТ player/bossлПД кЈЄ мК§нГЭмЭШ нХЬ мКђл°ѓмЭД м∞®мІА.
            //   HexTile/GameMap лСШ лЛ§ computeTileIconsл°Ь к∞ЩмЭА мЮЕл†•вЖТк∞ЩмЭА к≤∞к≥Љл•Љ л∞ЫмХД
            //   мКђл°ѓ мЭЄлН±мК§к∞А мЮРлПЩ мЭЉмєШнХЬлЛ§.
            const computeStackOffset = (tileObj, isPlayerTile, isBossTile) => {
                if (!tileObj) return null;
                const ctx = {
                    isCurrent: isPlayerTile,
                    isBoss: isBossTile,
                    showPrey: tileObj.visited && (preys || []).some(p => p.tileId === tileObj.id) && !isBossTile,
                    preyEmoji: (() => {
                        const p = (preys || []).find(pp => pp.tileId === tileObj.id);
                        return p ? (PREY_EMOJI[p.preyType] || 'вЭУ') : null;
                    })(),
                    hasCarcass: carcassTiles && carcassTiles.has && carcassTiles.has(tileObj.id),
                    hasTrace: preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tileObj.id),
                    hasCarcassTrace: carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tileObj.id),
                    hasBait: baitTiles && baitTiles.has && baitTiles.has(tileObj.id)
                };
                const icons = computeTileIcons(tileObj, ctx);
                const layout = TILE_STACK_LAYOUTS[Math.min(icons.length, TILE_STACK_MAX)] || [];
                const idx = icons.findIndex(i => isPlayerTile ? i.isPlayer : i.isBoss);
                return (idx >= 0 && layout[idx]) ? layout[idx] : { dx: 0, dy: 8 };
            };
            const playerTile = tiles[currentTile];
            const playerPos = playerTile && playerTile.position;
            const playerStackOff = playerPos
                ? computeStackOffset(playerTile, true, !!(boss && bossVisible && boss.position === currentTile))
                : null;
            const bossTile = (boss && bossVisible && tiles[boss.position]) ? tiles[boss.position] : null;
            const bossPiecePos = bossTile ? bossTile.position : null;
            const bossStackOff = bossPiecePos
                ? computeStackOffset(bossTile, currentTile === boss.position, true)
                : null;

            return (
                <div className="map-area">
                    <div className="map-container" ref={containerRef}>
                        <svg
                            className="map-svg"
                            width={mapExtent.totalWidth * zoom}
                            height={mapExtent.totalHeight * zoom}
                            viewBox={`0 0 ${mapExtent.totalWidth} ${mapExtent.totalHeight}`}
                        >
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                    requestWait={requestWait}
                                    preys={preys}
                                    preyTraceTiles={preyTraceTiles}
                                    carcassTiles={carcassTiles}
                                    carcassTraceTiles={carcassTraceTiles}
                                    baitTiles={baitTiles}
                                    moveHistory={moveHistory}
                                    bossMoveHistory={bossMoveHistory}
                                    showPathView={showPathView}
                                />
                            ))}
                            {playerPos && playerStackOff && (
                                <text
                                    className="piece piece-player"
                                    x={playerPos.x + playerStackOff.dx}
                                    y={playerPos.y + playerStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                    fontWeight="700"
                                    fill="#fff"
                                    stroke="#1a1a2e"
                                    strokeWidth="1.5"
                                    paintOrder="stroke"
                                >
                                    вЩЯ
                                </text>
                            )}
                            {bossPiecePos && bossStackOff && (
                                <text
                                    className="piece piece-boss"
                                    x={bossPiecePos.x + bossStackOff.dx}
                                    y={bossPiecePos.y + bossStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                >
                                    рЯ¶Ц
                                </text>
                            )}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                    <TileEventToast toast={tileEventToast} onDone={onTileEventToastDone} />
                </div>
            );
        }

        // нГАмЭЉ мЭіл≤§нКЄ л™®лЛђ мїінПђлДМнКЄ вАФ нХ®м†ХлІМ мВђмЪ©.
        // D-52 (2026-04-23 мЪФнХЬ мІАмЛЬ): 'нТНм°±нХЬ лХЕ(кµђ мҐЛмЭА к≥≥)'мЭА л™®лЛђ вЖТ нЖ†мК§нКЄл°Ь мЭікіА.
        // нХ®м†ХмЭА нФЉнХі м†Хл≥ік∞А мЮИмЦі л™ЕмЛЬм†Б нЩХмЭЄмЭі нХДмЪФнХШлѓАл°Ь л™®лЛђ мЬ†мІА.
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;

            const getEventInfo = () => {
                switch(tile.type) {
                    case 'trap':
                        return {
                            emoji: 'вЪ†пЄП',
                            title: 'нХ®м†Х!',
                            message: tile.damage ? `мГЭл™Ел†•мЭі ${tile.damage} к∞РмЖМнЦИмКµлЛИлЛ§!` : 'мЬДнЧШнХЬ нХ®м†ХмЭі мЮИмКµлЛИлЛ§!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
                            {eventInfo.emoji}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: '600', marginBottom: '15px' }}>
                            {eventInfo.title}
                        </div>
                        <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                            {eventInfo.message}
                        </div>
                        <button 
                            onClick={onClose}
                            style={{ 
                                background: 'white',
                                color: eventInfo.color,
                                border: 'none',
                                padding: '12px 30px',
                                fontSize: '16px',
                                fontWeight: '600',
                                borderRadius: '6px',
                                cursor: 'pointer'
                            }}
                        >
                            нЩХмЭЄ
                        </button>
                    </div>
                </div>
            );
        }

        // мХДмЭінЕЬ м†Хл≥ім∞љ вАФ мЭіл¶Д/лУ±кЄЙ/к∞Ал∞©мєЄмИШ/мД±лК•(effect)/мВђмЪ© л≤ДнКЉ
        //
        // лН∞мЭінД∞ мЖМмК§ мЪ∞мД†мИЬмЬД:
        //   1) window.TTD_DATA.ITEMS (Notion SSOT) вАФ 'мЭіл¶Д'мЬЉл°Ь м°∞нЪМ, effect нПђнХ®
        //   2) InventorySystem.ITEMS[item.type] вАФ кµђл≤Дм†Д нПіл∞±
        function ItemInfoModal({ item, onUse, onLureBait, onClose }) {
            const invDef = InventorySystem.ITEMS[item.type] || {};
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const notionItem = notionItems.find(it => it && it['мЭіл¶Д'] === (invDef.name || item.name));
            // D-51: лђікЄ∞ л©ФнГА вАФ TTD_DATA.WEAPONSмЧРмДЬ мІБм†С м°∞нЪМ (мХДмЭінЕЬлІИмК§нД∞ нГ≠мЭі мХДлЛШ).
            const weaponsBundle = (window.TTD_DATA && Array.isArray(window.TTD_DATA.WEAPONS)) ? window.TTD_DATA.WEAPONS : [];
            const weaponDef = weaponsBundle.find(w => w && w.id === item.type);

            const effect = (notionItem && notionItem.effect) || null;
            const usable = !!(effect && effect.usable);
            const effectLabel = window.EffectParser
                ? window.EffectParser.describeEffect(effect)
                : (effect && effect.raw) || 'нЪ®к≥Љ мЧЖмЭМ';

            const grade = (notionItem && notionItem['мХДмЭінЕЬ лУ±кЄЙ'])
                || (weaponDef && weaponDef['мХДмЭінЕЬ лУ±кЄЙ'])
                || null;
            const slot = (notionItem && notionItem['к∞Ал∞©мєЄмИШ'])
                || (weaponDef && weaponDef['к∞Ал∞©мєЄмИШ'])
                || '1x1';
            // D-51: лђікЄ∞ лВікµђлПД нСЬмЛЬ (мЭЄмК§нДімК§ durabilityLeft / мµЬлМА durability).
            const resolved = InventorySystem.resolveDef(item.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0) ? resolved.durability : null;
            const durLeft = (typeof item.durabilityLeft === 'number') ? item.durabilityLeft : maxDur;
            const description = (notionItem && notionItem['мД§л™Е нЕНмК§нКЄ'])
                || (weaponDef && weaponDef['мД§л™Е нЕНмК§нКЄ'])
                || '';

            return (
                <div
                    className="modal"
                    style={{ zIndex: 1000 }}
                    onClick={onClose}
                >
                    <div
                        className="modal-content"
                        style={{ maxWidth: '320px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            {/* D-92 (2026-04-25 мЪФнХЬ мІАмЛЬ): мХДмЭінЕЬ мД§л™Е нМЭмЧЕм∞љмЧФ мХДмЭімљШ + мЭіл¶Д нХ®кїШ. */}
                            <h3 style={{ margin: 0, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                {(() => {
                                    const e = itemEmoji(item.type);
                                    return e
                                        ? <span style={{ fontSize: '24px', lineHeight: 1 }}>{e}</span>
                                        : null;
                                })()}
                                <span>{invDef.name || item.name}</span>
                            </h3>
                            <button onClick={onClose}>лЛЂкЄ∞</button>
                        </div>

                        <div style={{ fontSize: '13px', lineHeight: '1.7', color: '#ddd' }}>
                            {grade && <div>лУ±кЄЙ: <span style={{ color: '#fff' }}>{grade}</span></div>}
                            <div>к∞Ал∞©мєЄмИШ: <span style={{ color: '#fff' }}>{slot}</span></div>
                            <div>мД±лК•: <span style={{ color: usable ? '#8bd17c' : '#888' }}>{effectLabel}</span></div>
                            {maxDur && (
                                <div>лВікµђлПД: <span style={{ color: '#d4b84a' }}>{durLeft}/{maxDur}</span></div>
                            )}
                            {description && (
                                <div style={{ marginTop: '8px', fontSize: '11px', color: '#aaa' }}>
                                    {description}
                                </div>
                            )}
                        </div>

                        <div style={{ marginTop: '14px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                            <button
                                onClick={onUse}
                                disabled={!usable}
                                style={{
                                    padding: '10px',
                                    background: usable ? '#4CAF50' : '#555',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? 'мВђмЪ©нХШкЄ∞' : 'мВђмЪ© лґИк∞А'}
                            </button>
                            {/* D-94 (2026-04-25 мЪФнХЬ мІАмЛЬ): is_bait нФМлЮШкЈЄ мХДмЭінЕЬ вАФ [л®ємЭіл°Ь мЬ†мЭЄнХШкЄ∞] л≤ДнКЉ.
                                нШДмЮђ нГАмЭЉмЧР л®ємЭіл•Љ лЖУмХД л≥імК§л•Љ мЬ†лПД. мЭЄл≤§мЧРмДЬ 1к∞Ь м∞®к∞Р. */}
                            {(resolved.is_bait || (notionItem && notionItem.is_bait)) && typeof onLureBait === 'function' && (
                                <button
                                    onClick={onLureBait}
                                    style={{
                                        padding: '10px',
                                        background: '#7a3a1f',
                                        color: '#ffd79e',
                                        border: '1px solid #d4883a',
                                        borderRadius: '4px',
                                        cursor: 'pointer',
                                        fontWeight: 600
                                    }}
                                >
                                    рЯНЦ л®ємЭіл°Ь мЬ†мЭЄнХШкЄ∞
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // мЭЄл≤§нЖ†л¶ђ л™®лЛђ мїінПђлДМнКЄ
        //
        // мХДмЭінЕЬ мЭЄнД∞лЮЩмЕШ лґДкЄ∞:
        //   - мІІмЭА нГ≠ (< 400ms лВімЧР лЦЉл©і) вЖТ м†Хл≥ім∞љ л™®лЛђ
        //   - кЄі лИДл¶Д (вЙ• 400ms мЬ†мІА) вЖТ кЄ∞м°і лПЩмЮС(мД†нГЭ/мЭілПЩ/л®ЄмІА/нЪМм†Д)
        // мЮДк≥Дк∞Т 400ms м±ДнГЭ кЈЉк±∞: Android нСЬм§А long-press(500ms)л≥ілЛ§ мВімІЭ лє†л•ік≤М, iOS кЄ∞л≥Є(вЙИ300ms)л≥ілЛ§лКФ мЧђмЬ†л°≠к≤М.
        // к≤МмЮДмЭА мЧ∞нГА/лУЬлЮШкЈЄк∞А мЮ¶мХД мІІмЭА мЭШлПДл•Љ лЖУмєШл©і лЛµлЛµнХШк≥†, л∞ШлМАл°Ь лДИлђі мІІмЬЉл©і мК§мЩАмЭінФДк∞А мЮШл™ї мЭЄмЛЭлРЬлЛ§.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onLureBait, onFlashMessage }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // нЩХм†Х лМАкЄ∞ мЬДмєШ (кЈЄл¶ђлУЬ мЕАмЭД лИМлЯђ мІАм†Х)
            const [pendingPos, setPendingPos] = React.useState(null);
            // м†Хл≥ім∞љмЬЉл°Ь лЭДмЪЄ мХДмЭінЕЬ (nullмЭіл©і м†Хл≥ім∞љ лЛЂнЮШ)
            const [infoItem, setInfoItem] = React.useState(null);

            // D-104 (2026-04-27 мЪФнХЬ мІАмЛЬ): нХ©мД± нМ®лДР нХ≠мГБ л†МлНФ + мєінЕМк≥†л¶ђ нГ≠.
            //   лєДмД†нГЭ мГБнГЬмЧРмДЬлПД л™®лУ† л†ИмЛЬнФЉл•Љ мєінЕМк≥†л¶ђл≥Дл°Ь нХДнД∞лІБнХі лЕЄмґЬ.
            //   мЬ†м†Ак∞А лІИмІАлІЙмЬЉл°Ь к≥†л•Є мєінЕМк≥†л¶ђлКФ localStorageмЧР л≥ім°і.
            const [recipeCategory, setRecipeCategory] = React.useState(() => {
                try {
                    const v = localStorage.getItem('ttd:invRecipeCategory');
                    return v && ['all', 'food', 'weapon', 'armor', 'material'].includes(v) ? v : 'all';
                } catch { return 'all'; }
            });
            const updateRecipeCategory = (cat) => {
                setRecipeCategory(cat);
                try { localStorage.setItem('ttd:invRecipeCategory', cat); } catch {}
            };

            // к∞Ал∞© лЛЂкЄ∞ вАФ мД†нГЭ л™®лУЬлПД нХ®кїШ мЈ®мЖМ(D-104 мЪФнХЬ мІАмЛЬ: лЛЂк≥† лЛ§мЛЬ мЧімЦілПД мД†нГЭл™®лУЬ мЬ†мІАлРШл©і мХИ лР®).
            const handleClose = () => {
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                closeInventory();
            };

            // D-47: к∞Ал∞© нБђкЄ∞лКФ inventory мЭЄмК§нДімК§ кЄ∞м§А. disabled мЕАмЭА inventory.isDisabledл°Ь.
            const ROWS = inventory.rows, COLS = inventory.cols, CELL = 47, PAD = 4;
            const LONG_PRESS_MS = 400;

            // нФДл†ИмК§ мГБнГЬл•Љ refл°Ь кіАл¶ђнХі мЮђл†МлНФ мЧЖмЭі нГАмЭіл®Є/к∞АлУЬ к∞±мЛ†.
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // D-83 (2026-04-24 мЪФнХЬ мІАмЛЬ): нГ≠ вЖФ л°±нФДл†ИмК§ мЧ≠нХ† мК§мЩС.
            //   мЛ†кЈЬ UX:
            //     - мІІмЭА нГ≠  = мД†нГЭ л™®лУЬ мІДмЮЕ/нЖ†кЄА/л®ЄмІА/swap (м£Љ м°∞мЮС)
            //     - л°±нФДл†ИмК§ = мХДмЭінЕЬ м†Хл≥ім∞љ
            //     - м°∞нХ©мЭА нХШлЛ® нХ©мД± нМ®лДРмЭШ [лІМлУ§кЄ∞] л≤ДнКЉ м†ДмЪ© вАФ лЛ§л•Є мЮђл£М нГ≠мЭА swapлІМ мИШнЦЙ.
            //   мЭім†Д UX(D-32)лКФ л°±нФДл†ИмК§=мД†нГЭ, нГ≠=м†Хл≥ім∞љ+мЮРлПЩ м°∞нХ©мЭімЧИмЬЉлВШ,
            //   "мЬДмєШ кµРм≤інХШл†§лЛ§ мЭШлПДмєШ мХКк≤М м°∞нХ©мЭі л∞ЬлПЩ"лРШлКФ мЉАмЭімК§к∞А мЮИмЦі м£Љ м°∞мЮСмЭД нГ≠мЬЉл°Ь
            //   лДШкЄ∞к≥† м°∞нХ©мЭА л™ЕмЛЬм†Б л≤ДнКЉмЬЉл°ЬлІМ лґДл¶ђ.
            const onShortTap = (item) => {
                // мД†нГЭ мЧЖмЭМ вЖТ мД†нГЭ мІДмЮЕ(лУ§мЦімШђл¶Љ)
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                // к∞ЩмЭА мХДмЭінЕЬ нГ≠ вЖТ мД†нГЭ нХім†Ь(нЖ†кЄА)
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                    return;
                }
                // лЛ§л•Є мХДмЭінЕЬ нГ≠ вЖТ confirmPlacementл°Ь мЭЉмЮД:
                //   ¬Ј к∞ЩмЭА мЮђл£М(canMerge) вЖТ м¶ЙмЛЬ л®ЄмІА
                //   ¬Ј лЛ§л•Є мЮђл£М вЖТ swap (м°∞нХ©мЭА нХ©мД± нМ®лДР м†ДмЪ©, мЮРлПЩ л∞ЬлПЩ мХИ нХ®)
                const res = inventory.confirmPlacement(item.x, item.y);
                applyDropResult(res);
                bump();
            };

            // л°±нФДл†ИмК§: мХДмЭінЕЬ м†Хл≥ім∞љ.
            const onLongPressInfo = (item) => {
                setInfoItem(item);
            };

            // D-48: confirmPlacement к≤∞к≥Љ л∞ШмШБ к≥µнЖµ нЧђнНЉ.
            //   - merge: м¶ЙмЛЬ мЛ§нЦЙ (кЄ∞м°і лПЩмЮС).
            //   - swap: мГИ мХДмЭінЕЬмЬЉл°Ь мД†нГЭ м†ДнЩШ.
            //   - place: л∞∞мєШ нЫД мД†нГЭ нХім†Ь.
            //   нХ©мД± нМ®лДРмЭА 'мД†нГЭлРЬ мХДмЭінЕЬ кЄ∞м§А'мЬЉл°Ь мЮРлПЩ лЕЄмґЬлРШлѓАл°Ь craft_prompt к≤љл°Ь мЧЖмЭМ.
            const applyDropResult = (res) => {
                if (!res || !res.ok) return false;
                if (res.action === 'swap') {
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                    return true;
                }
                setSelectedItem(null);
                setPendingPos(null);
                if (onFlashMessage && res.resultType && res.action === 'merge') {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    onFlashMessage(`лСР мЮђл£Мл•Љ нХ©м≥Р ${resultName}мЭД(л•Љ) мЦїмЧИлЛ§.`);
                }
                return true;
            };

            // D-47 [лІМлУ§кЄ∞] л≤ДнКЉ нХЄлУ§лЯђ вАФ мЛ§м†Ь мЮђл£М мЖМлєД¬Јк≤∞к≥Љ л∞∞мєШлКФ inventory.craftRecipe.
            // D-48: мД±к≥µ мЛЬ мД†нГЭ нХім†Ь (мЮђл£Мк∞А мД†нГЭлРЬ мХДмЭінЕЬмЭімЧИмЭД мИШ мЮИмЭМ). нМ®лДРмЭА selectedItem
            //   кЄ∞л∞ШмЭілЭЉ нХім†ЬлІМ нХілПД мЮРлПЩмЬЉл°Ь лЛЂнЮШ.
            const handleCraft = (recipe) => {
                const res = inventory.craftRecipe(recipe);
                if (res.ok) {
                    if (onFlashMessage) {
                        const resultDef = InventorySystem.ITEMS[res.resultType] || {};
                        const name = resultDef.name || res.resultType;
                        // D-71: count>1 л†ИмЛЬнФЉ вАФ produced/overflow мХИлВі.
                        const produced = Number(res.produced || 1);
                        let msg = produced > 1
                            ? `мЮђл£Мл•Љ м°∞нХ©нХі ${name} ${produced}к∞Ьл•Љ лІМлУ§мЧИлЛ§.`
                            : `мЮђл£Мл•Љ м°∞нХ©нХі ${name}мЭД(л•Љ) лІМлУ§мЧИлЛ§.`;
                        if (res.overflow > 0) msg += ` (к∞Ал∞©мЭі к∞АлУЭ м∞® ${res.overflow}к∞ЬлКФ лСРк≥† мЩФлЛ§.)`;
                        onFlashMessage(msg);
                    }
                    inventory.selectedItem = null;
                    setSelectedItem(null);
                    setPendingPos(null);
                } else if (res.reason === 'no_space') {
                    if (onFlashMessage) onFlashMessage('к∞Ал∞©мЭі к∞АлУЭ м∞® лІМлУ§ мИШ мЧЖлЛ§.');
                } else if (res.reason === 'short_ingredients') {
                    if (onFlashMessage) onFlashMessage('мЮђл£Мк∞А лґАм°±нХШлЛ§.');
                }
                bump();
            };

            // D-83: нПђмЭЄнД∞ нХЄлУ§лЯђ вАФ мІІмЭА нГ≠=onShortTap, л°±нФДл†ИмК§=onLongPressInfo.
            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // лІИмЪ∞мК§ мЪ∞нБіл¶≠/м§Ск∞ДнБіл¶≠ лђімЛЬ
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    onLongPressInfo(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) onShortTap(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // л†Ик±∞мЛЬ: кЄ∞м°і onClick к≤љл°Ь мЬ†мІА (нВ§л≥ілУЬ м†СкЈЉмД±/кЄ∞м°і нЕМмК§нКЄ нШЄнЩШ).
            // нПђмЭЄнД∞ кЄ∞л∞Ш лґДкЄ∞к∞А л∞ЬлПЩнХШл©і longFiredк∞А trueк∞А лРШмЦі м§Сл≥µ нШЄмґЬлРШмІА мХКлПДл°Э к∞АлУЬ.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // нПђмЭЄнД∞ мЭіл≤§нКЄк∞А мУ∞мЭімІА мХКлКФ нЩШк≤љмЧРмДЬмЭШ нПіл∞±
                onShortTap(item);
            };

            // мВђмЪ© л≤ДнКЉ вАФ нЪ®к≥Љ м†БмЪ© нЫД мЭЉнЪМмЪ©мЭіл©і мЭЄл≤§мЧРмДЬ м†Ьк±∞, м†Хл≥ім∞љ лЛЂкЄ∞
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // мХДмЭінЕЬ м†Ьк±∞
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                applyDropResult(res);
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // D-45 (2026-04-23): мД†нГЭнХЬ мХДмЭінЕЬмЭД мЭЄл≤§нЖ†л¶ђмЧРмДЬ мШБкµђ м†Ьк±∞.
            // - 1нЪМ нЩХм†Х. л°±нФДл†ИмК§л°Ь мЭілѓЄ мД†нГЭлРЬ мГБнГЬлЭЉ мШ§м°∞мЮС нЩХл•†мЭі лВЃмХД л≥ДлПД нЩХмЭЄм∞љ мЧЖмЭМ.
            // - к≥µк∞ДмЭі кљЙ м∞ЉмЭД лХМ нГИмґЬ мИШлЛ®мЭімЮР лґИнХДмЪФнХЬ 1лЛ®к≥Д лґАмВ∞лђЉ м†Хл¶ђмЪ©.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();
                setSelectedItem(null);
                setPendingPos(null);
                if (discarded && onFlashMessage) {
                    onFlashMessage(`${discarded.name}мЭД(л•Љ) л≤Дл†ЄлЛ§.`);
                }

        // мєілУЬл°Ь мХДмЭінЕЬ мВђмЪ© вАФ к≥µнЖµ л™®лЛђ (нФДл†ИмЮДмЫМнБђ D-23мЭШ м≤Ђ кµђнШДм≤і).
        //

        //   мєілУЬ мВђмЪ© мЛЬ consume мК§нОЩмЭі мЮИмЬЉл©і, мЭЄл≤§нЖ†л¶ђмЧРмДЬ нХДнД∞л•Љ нЖµк≥ЉнХШлКФ мХДмЭінЕЬ л™©л°ЭмЭД
        //   к∞ДлЮµнЮИ л≥імЧђм£Љк≥†, мЬ†м†Ак∞А нХШлВШл•Љ к≥†л•іл©і onSelect(item) мљЬл∞±.
        //

        //   - мЭЄл≤§ л≥Є UIлКФ нЕМнКЄл¶ђмК§мЛЭ л∞∞мєШ/л®ЄмІА/нЪМм†Д/л°±нФДл†ИмК§кєМмІА л≥µмЮ°. мєілУЬ мВђмЪ© лІ•лЭљмЧРмДЬлКФ
        //     мШ§л°ЬмІА "нХДнД∞ нЖµк≥Љ мХДмЭінЕЬ мД†нГЭ"лІМ нХДмЪФнХШлѓАл°Ь к≤љлЯЙ л¶ђмК§нКЄ UIк∞А нМРлЛ® лєДмЪ©мЭі м†БлЛ§.
        //   - нЦ•нЫД лМАмГБ мИШк∞А лІОмХДмІАл©і мЭі л™®лЛђмЭД grid/spriteл°Ь нЩХмЮ•нХШк±∞лВШ, к≥µмЬ† мЕАл†ЙнД∞ мїінПђлДМнКЄл°Ь мґФмґЬ.
        //

        //   titleText:      мГБлЛ® лЭЉл≤® (мШИ: "нЬімЛЭнХ† мЭМмЛЭ к≥†л•ікЄ∞")
        //   emptyText:      нХДнД∞ нЖµк≥Љ мХДмЭінЕЬ 0к∞ЬмЭЉ лХМ л©ФмЛЬмІА
        //   onSelect(item): нЩХм†Х
        //   onClose():      мЈ®мЖМ
        // D-36 (2026-04-22, мЪФнХЬ мІАмЛЬ):
        //   scales({recover: N})мЭі мЮИмЬЉл©і "нЪ®к≥Љк∞А Nл∞∞" мЮДмЭД мЛЬк∞Бм†БмЬЉл°Ь к∞Хм°∞нХЬлЛ§.
        //   - м†Ьл™© мХДлЮШ мХИлВі лђЄкµђ (лЕЄлЮАмГЙ)
        //   - к∞Б мЭМмЛЭ нЪ®к≥Љ мЪФмХљмЭШ "л∞∞к≥†нФФ +1"мЭД "л∞∞к≥†нФФ +1 +1"л°Ь л≥АнШХнХШк≥†
        //     м¶ЭлґД "+1" лІМ лЕЄлЮАмГЙ(#d4b84a)мЬЉл°Ь лЭДмЪілЛ§. нЪ®к≥Љк∞А 2к∞Ь мЭімГБмЭЄ мХДмЭінЕЬмЭА
        //     к∞Б м¶ЭлґДмЭД к∞ЩмЭА л∞©мЛЭмЬЉл°Ь м≤Шл¶ђ. scaleмЭі к±Єл¶і мИШ мЮИлКФ к±і мЦСмИШ delta statлњР.

        // D-57 (2026-04-24 мЪФнХЬ мІАмЛЬ): л∞Фл≤†нБР к≤љл°Ь м†Ьк±∞, мЪФл¶ђ мЛЬмК§нЕЬмЬЉл°Ь м†Дл©і кµРм≤і.
        //   - extraOptions/onExtraSelect м†Ьк±∞.
        //   - onCookClick + canCook prop мґФк∞А: нЬімЛЭ мєілУЬмЧРмДЬлІМ [рЯФ• мЪФл¶ђ] л≤ДнКЉ лЕЄмґЬ.
        //     hintText мХДлЮШмЧР нХ≠мГБ нСЬмЛЬ, canCook=falseл©і нЪМмГЙ лєДнЩЬмД±.
        //   - нБіл¶≠ мЛЬ мЭі л™®лЛђ лЛЂмІА мХКк≥† лґАл™®к∞А л≥ДлПД CookingModalмЭД лЭДмЫМ лНЃлКФлЛ§.
        function CardItemConsumeModal({ inventory, filter, scales, bonuses, hintText, titleText, emptyText, onSelect, onClose, onCookClick, canCook }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['мЭіл¶Д'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const recoverBonus = (bonuses && typeof bonuses.recover === 'number') ? bonuses.recover : 0;
            const hasRecoverBoost = recoverScale !== 1 || recoverBonus !== 0;

            // D-81 (2026-04-24): к∞Ал∞© кЈЄл¶ђлУЬмЧР мЧЖлКФ мХДмЭінЕЬ(мД†нГЭмЬЉл°Ь к≥µм§СмЧР лЬђ мГБнГЬ лУ±)мЭА
            //   л¶ђмК§нКЄмЧРмДЬ м†ЬмЩЄ. inventory.itemsлКФ selectedItemлПД нПђнХ®нХШлѓАл°Ь, selectedлКФ мВђмЪ© лґИк∞Ал°Ь к∞Дм£Љ.

            const selectedId = inventory?.selectedItem?.id;
            // D-91 (2026-04-25 мЪФнХЬ мІАмЛЬ): нЪ®к≥Љ мИШмєШ лЖТмЭА мИЬ лВіл¶Љм∞®мИЬ м†Хл†ђ.
            //   нЬімЛЭ мєілУЬ нЪМл≥µ мї®нЕНмК§нКЄ(recoverScale л∞ШмШБ) нЫД stat delta нХ©мВ∞.
            //   нОШлДРнЛ∞(health-N)лПД нХ©мЧР нПђнХ® вАФ "мХИм†ДнХЬ мЭМмЛЭмЭі мЬД" мЭШлПДмЩА мЭЉмєШ.
            //   мГЭк≥†кЄ∞ hunger+1/health-1 нХ©=0л≥ілЛ§ мВ∞лФЄкЄ∞ hunger+1 нХ©=1мЭі мЬДл°Ь.
            const scoreItem = (notionItem) => {
                const parsed = notionItem && notionItem.effect;
                if (!parsed || !Array.isArray(parsed.actions)) return -Infinity;
                let s = 0;
                for (const a of parsed.actions) {
                    if (a.type !== 'stat') continue;
                    const d = Number(a.delta) || 0;
                    const scaled = d > 0 ? d * recoverScale + recoverBonus : d * recoverScale;
                    s += scaled;
                }
                return s;
            };
            const candidates = (inventory?.items || []).filter(invItem => {
                if (selectedId && invItem.id === selectedId) return false;
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            }).slice().sort((a, b) => {
                const aDef = InventorySystem.ITEMS[a.type] || {};
                const bDef = InventorySystem.ITEMS[b.type] || {};
                const aNotion = byName(aDef.name || a.name);
                const bNotion = byName(bDef.name || b.name);
                const sb = scoreItem(bNotion);
                const sa = scoreItem(aNotion);
                if (sb !== sa) return sb - sa;
                // лПЩм†Р вЖТ мЭіл¶ДмИЬ(к∞АлПЕмД±)
                return String(aDef.name || a.name || '').localeCompare(String(bDef.name || b.name || ''));

            const hasAny = candidates.length > 0;

            // л∞ШнЩШ: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['нЪ®к≥Љ мЪФмХљ'];
                const canScale = hasRecoverBoost && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // нПіл∞±: мЫРл≥Є нЪ®к≥Љ мЪФмХљлІМ нСЬмЛЬ (кЄ∞м°і лПЩмЮС)
                    return summary
                        ? (

                                {summary}
                            </div>
                        )
                        : null;
                }

                // к∞Б actionмЭД "кЄ∞л≥Є лЭЉл≤® + (лЕЄлЮАмГЙ м¶ЭлґД)" нШХнГЬл°Ь л†МлНФ.
                // мШИ: action {stat:'hunger', delta:1}, recoverScale=2 вЖТ 'л∞∞к≥†нФФ +1 +1'
                //     л∞∞к≥†нФФ(нЪМмГЙ) / '+1'(нЪМмГЙ) / '+1'(лЕЄлЮАмГЙ = м¶ЭлґД)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scaleмЭі мХИ к±Єл¶ђлКФ action(к∞РмЖМ/spawn_card лУ±)мЭА кЄ∞л≥Є describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? 'л∞∞к≥†нФФ'
                                : a.stat === 'health' ? 'мГЭл™Ел†•'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    // scale(к≥±) вЖТ bonus(нХ©) мИЬмДЬл°Ь м†БмЪ©нХЬ мµЬмҐЕ delta - мЫРл≥Є delta
                    const scaledDelta = a.delta * recoverScale + recoverBonus;
                    const bonus = Math.round(scaledDelta - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (

                    <div

                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || 'мХДмЭінЕЬ мД†нГЭ'}</h3>
                            <button onClick={onClose}>лЛЂкЄ∞</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {/* D-57 мЪФл¶ђ л≤ДнКЉ вАФ нЬімЛЭ мєілУЬмЧРмДЬлІМ onCookClick м£ЉмЮЕ. canCook=falseл©і нЪМмГЙ.
                            мЬДмєШ: hintText л∞Фл°Ь мХДлЮШ, мХДмЭінЕЬ л™©л°Э мЬД. */}
                        {showCookBtn && (
                            <button
                                onClick={() => { if (canCook) onCookClick(); }}
                                disabled={!canCook}
                                style={{
                                    width: '100%',
                                    textAlign: 'center',
                                    padding: '10px 12px',
                                    marginBottom: '10px',
                                    background: canCook ? '#5a3a1f' : '#2a2a2e',
                                    border: `1px solid ${canCook ? '#d4883a' : '#444'}`,
                                    color: canCook ? '#ffd79e' : '#888',
                                    fontWeight: 600,
                                    fontSize: '14px',
                                    cursor: canCook ? 'pointer' : 'not-allowed'
                                }}
                            >
                                рЯФ• мЪФл¶ђнХШкЄ∞
                            </button>
                        )}
                        {!hasAny ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || 'мУЄ лІМнХЬ мХДмЭінЕЬмЭі мЧЖлЛ§.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {

                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}

                                            <div style={{ fontWeight: 600, fontSize: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                {/* D-92: 1лЛ®к≥Д мЮђл£М(мЭМмЛЭ)лКФ emoji prefix + мЭіл¶Д. */}
                                                {(() => {
