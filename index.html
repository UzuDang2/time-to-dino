<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🦖 타임투다이노</title>
    
    <!-- 스타일 -->
    <link rel="stylesheet" href="gameStyles.css">
    
    <!-- 외부 라이브러리 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 데이터 번들 (시트 + Notion 아이템 SSOT 스냅샷, scripts/fetch_data.py로 재생성) -->
    <script src="data/data.js"></script>

    <!-- 게임 모듈 -->
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script src="dropTable.js"></script>
    <script src="effectParser.js"></script>
    <script src="combatDeck.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // D-61 (2026-04-24, 12차 세션): 맵 크기 단일 진실의 원천.
        //   7x7 → 11x11 (1.5배 상향). MapGenerator 모든 호출부가 이 상수를 사용.
        //   mapGenerator.js 내부는 gridSize 인자로 받아 자동 스케일(빈슬롯/특수타일/보스거리).
        // D-87 (2026-04-24 요한 지시): 11x11이 너무 넓다는 피드백. 8x8(64타일)로 축소.
        //   변 길이 ×0.73, 면적 약 47% 감소. mapGenerator는 gridSize 비율 스케일이라
        //   별도 수정 불필요(빈슬롯 12~19, good=5, trap=3, minBossDist=5 자동 적용).
        const MAP_SIZE = 8;

        // ============================================
        // React 컴포넌트들
        // ============================================

        // 상단 스탯 패널 컴포넌트
        //
        // D-27 HUD 리뉴얼 (요한 지시 2026-04-22):
        // - 생명력/배고움은 게이지(바) — 발각률 바 스타일 답습, 게임 다크톤 유지.
        // - 배고픔 <= 3일 때 노란색(#d4b84a, 채도 낮춤)으로 경고.
        // - 시간은 숫자가 아닌 '시계 아이콘'. maxTime만큼 표시하고 소모된 만큼 어둡게.
        // - 시간 전부 소모(time >= maxTime) 시 숫자/아이콘 모두 빨강으로 경고.
        // - 게임 다크 분위기와 조화를 위해 빨강/노랑 채도는 낮게 유지.
        //
        // D-37 HUD 2줄 압축 (요한 지시 2026-04-22, 7차 세션):
        // - 상단 HUD 세로 길이를 줄여 모바일에서 맵 가시 영역 확보.
        // - 1줄: [생명력 게이지][배고픔 게이지][시간 시계]  (3개 한 줄)
        // - 2줄: [보스 순찰/추격][발각률 바]             (2개 한 줄, 발각 바는 flex-grow)
        // - 라벨 제거, 아이콘만 표시. 숫자 폰트 크기 축소.
        // - 게이지 높이 12 → 10, 발각 바 20 → 14.
        // - 기존 stat-box padding 축소 필요 시 인라인으로만 오버라이드(전역 .stat-box는 다른 곳에서 재사용).
        // D-125 (요한 지시): 지역 도착 1인칭 내레이션.
        //   타일 진입 시 setMessage로 분위기 텍스트 노출. 시스템스러운 [지역명]
        //   대괄호 prefix는 제거하고, 도착 자체가 어디에 왔는지 알려주는 역할을 한다.
        const REGION_ARRIVE_NARRATIVE = {
            '숲':   '숲의 어둑한 그늘 아래로 발을 내디뎠다. 젖은 흙냄새와 나뭇잎 부스럭임.',
            '덤불': '가시덤불 사이로 몸을 비집고 들어선다. 어딘가 작은 짐승이 숨죽이고 있다.',
            '평원': '평원으로 이동했다. 낮은 풀과 돌맹이가 발에 치인다.',
            '시냇물': '물소리가 가까워진다. 시냇가에 서니 발끝이 차갑게 식는다.',
            '동굴': '동굴 입구의 서늘한 공기가 폐를 채운다. 바닥엔 잔돌이 흩어져 있다.'
        };

        // D-124 (요한 지시): 메시지 인-라인 색상 강조.
        //   - TTD_DATA.ITEMS 한글 이름(돌맹이/생고기/...) → 청록 #8bd17c (득템 강조)
        //   매칭 외 부분은 그대로 본문 색.
        //   D-125: 대괄호 [지역] 라벨식 표기는 메시지에서 제거됐다 — 패턴 매칭도 제외.
        function MessageText({ text }) {
            if (!text) return '\u00A0';
            const TTD = (typeof window !== 'undefined' && window.TTD_DATA) ? window.TTD_DATA : {};
            const items = Array.isArray(TTD.ITEMS) ? TTD.ITEMS : [];
            const itemNames = items
                .map(it => it && (it['이름'] || it.name))
                .filter(Boolean);
            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            if (itemNames.length === 0) return text;
            const re = new RegExp(`(${itemNames.map(escape).join('|')})`, 'g');
            const parts = text.split(re);
            const itemSet = new Set(itemNames);
            return (
                <>
                    {parts.map((p, i) => {
                        if (!p) return null;
                        if (itemSet.has(p)) {
                            return <span key={i} style={{ color: '#8bd17c' }}>{p}</span>;
                        }
                        return p;
                    })}
                </>
            );
        }

        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            const MAX_HEALTH = 8;
            const MAX_HUNGER = 12;
            const healthPct = Math.max(0, Math.min(100, (health / MAX_HEALTH) * 100));
            const hungerPct = Math.max(0, Math.min(100, (hunger / MAX_HUNGER) * 100));

            // 채도 낮춘 경고색 (다크톤 조화). 기본은 기존 팔레트 유지.
            const healthColor = health <= 0
                ? '#8a2b3a'
                : health <= 2 ? '#c04a5e' : '#b24656';
            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // 컴팩트 stat-box 스타일 — 2줄 HUD에서 높이를 낮추기 위해 padding 축소.
            const compactBox = { padding: '5px 7px' };

            return (
                <div>
                    {/* 1줄: 생명력 · 배고픔 · 시간 (3개 한 줄) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>
                        <StatGauge
                            icon="❤️"
                            value={health}
                            max={MAX_HEALTH}
                            pct={healthPct}
                            color={healthColor}
                            valueColor="#eee"
                            flex={1}
                            warning={health <= 2}
                        />
                        <StatGauge
                            icon="🍖"
                            value={hunger}
                            max={MAX_HUNGER}
                            pct={hungerPct}
                            color={hungerColor}
                            valueColor={hungerLow ? '#d4b84a' : '#eee'}
                            flex={1}
                            warning={hunger <= 3}
                        />
                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): 남은 회수 표시로 반전.
                                    - 밝은 아이콘 = 아직 쓸 수 있는 회수, 어두운 아이콘 = 소모됨.
                                    - 시작 3/3 → 전부 소모 시 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // i가 작을수록 먼저 소모됨. 남은 개수는 (maxTime - time).
                                    const remaining = i < (maxTime - time);
                                    return (
                                        <span
                                            key={i}
                                            style={{
                                                fontSize: '14px',
                                                lineHeight: 1,
                                                opacity: remaining ? 1 : 0.25,
                                                filter: timeEmpty
                                                    ? 'grayscale(1) brightness(0.9)'
                                                    : remaining ? 'none' : 'grayscale(1) brightness(0.7)',
                                                color: timeEmpty ? '#c04a5e' : undefined,
                                                transition: 'all 0.2s'
                                            }}
                                        >
                                            🕰️
                                        </span>
                                    );
                                })}
                            </div>
                            <span style={{
                                fontSize: '11px',
                                fontWeight: '600',
                                color: timeTextColor,
                            }}>
                                {maxTime - time}/{maxTime}
                            </span>
                        </div>
                    </div>

                    {/* 2줄: 보스 상태 · 발각률 바 (발각 바가 남은 폭 차지) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',
                                fontSize: '12px',
                                fontWeight: '600',
                                flexShrink: 0,
                                color: boss?.chaseMode ? '#e94560' : '#eee'
                            }}
                            title={boss?.chaseMode ? '추격 중' : '순찰 중'}
                        >
                            {boss?.chaseMode ? '🔴 추격' : '🟢 순찰'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>🚨</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',
                                position: 'relative'
                            }}>
                                <div style={{
                                    width: `${detection}%`,
                                    height: '100%',
                                    background: detectionColor,
                                    transition: 'all 0.3s'
                                }} />
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '10px',
                                    fontWeight: '600',
                                    color: '#fff',
                                    textShadow: '0 0 2px rgba(0,0,0,0.6)'
                                }}>
                                    {detection}%
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* D-120 (요한 지시): 메시지 카드는 ui-panel에서 분리.
                        StatPanel은 체력·배고픔·시간·순찰·발각률만. 메시지는 GameMap 영역 위에
                        absolute float (한 뎁스 위에 떠 있는 느낌). 아래 GameMap에 message prop 전달. */}
                </div>
            );
        }

        // 스탯 게이지 — 발각률 바와 동일 구조. 아이콘 + 게이지 + 숫자.
        // D-37: 라벨 제거·컴팩트 padding. `flex` prop으로 외부에서 너비 배분 제어.
        // D-55 (2026-04-24 요한 지시): `warning` prop true면 채움 부분에만 빨간 점멸.
        //   StatPanel이 health<=2 / hunger<=3 에서 주입. 라벨/숫자/아이콘은 정상.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex, warning }) {
            return (
                <div className={`stat-box ${warning ? 'stat-warning' : ''}`} style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                        <span style={{ fontSize: '13px', lineHeight: 1 }}>{icon}</span>
                        <div style={{
                            flex: 1,
                            background: '#0f3460',
                            height: '10px',
                            borderRadius: '5px',
                            overflow: 'hidden',
                            minWidth: 0
                        }}>
                            <div
                                className={warning ? 'gauge-warning' : undefined}
                                style={{
                                    width: `${pct}%`,
                                    height: '100%',
                                    background: color,
                                    transition: 'all 0.3s'
                                }}
                            />
                        </div>
                        <span style={{
                            fontSize: '11px',
                            fontWeight: '600',
                            color: valueColor,
                            minWidth: '28px',
                            textAlign: 'right',
                            flexShrink: 0
                        }}>
                            {value}/{max}
                        </span>
                    </div>
                </div>
            );
        }

        // 손패 카드 컴포넌트
        // 손패 상한 5장(HAND_SIZE) — 5열 그리드로 한 줄에 표시한다.
        // 한 줄에 모든 카드가 들어가야 상단 UI가 스크롤 없이 유지됨(기획 원칙: 하단 맵 스크롤만 허용).
        // 좁은 폭에서는 폰트/패딩이 이미 10~13px이라 5열도 안정.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            // D-48: 타일 이동마다 hand이 전부 교체되므로 각 카드 uid가 새 값.
            //   새로 마운트된 카드에 card-draw 클래스 + stagger delay로 순차 페이드인.
            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map((card, i) => (
                        <div
                            key={card.uid}
                            className="card card-draw"
                            style={{ animationDelay: `${i * 60}ms` }}
                            onClick={() => useCard(card)}
                        >
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                발각 {card.detection > 0 ? '+' : ''}{card.detection}% · ⏰{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // 지역 한글 라벨 (기획상 region은 이미 한글이라 매핑 불필요하지만,
        // 추후 영어 코드로 바꿀 여지가 있어 맵을 둔다. 일치하면 그대로 노출).
        const REGION_LABEL = {
            '숲': '숲', '덤불': '덤불', '평원': '평원', '시냇물': '시냇물', '동굴': '동굴',
            forest: '숲', thicket: '덤불', plain: '평원', stream: '시냇물', cave: '동굴'
        };

        // D-89 (2026-04-25 요한 지시): 타일 아이콘 통합 중앙 스택.
        //   이전엔 sound trace(👣)가 우상단, prey가 중앙, ♟/🦖가 별도 SVG text 오버레이로
        //   분산됐다. 요한: "전부 중앙쪽에 표시되잖아 … 스택되게 해서 두개일땐 ㅇㅇ,
        //   세개부터는 ㅇㅇ/ㅇ, 네개일땐 ㅇㅇ/ㅇㅇ".
        //   단순 슬롯 좌표표(타일 중심에 대한 dx/dy). 폰트 24 기준 가로 ±15, 세로 행간 ~30.
        const TILE_STACK_LAYOUTS = {
            1: [{ dx: 0,   dy: 8 }],
            2: [{ dx: -16, dy: 8 }, { dx: 16, dy: 8 }],
            3: [{ dx: -16, dy: -6 }, { dx: 16, dy: -6 }, { dx: 0, dy: 24 }],
            4: [{ dx: -16, dy: -7 }, { dx: 16, dy: -7 }, { dx: -16, dy: 23 }, { dx: 16, dy: 23 }]
        };
        const TILE_STACK_MAX = 4;

        // 타일 위에 표시할 아이콘 후보 산출. 호출처가 같은 입력으로 동일 결과를 받도록 순수 함수.
        //   요한: "흔적은 정체가 밝혀지면 흔적 아이콘이 없어지고 사냥감 아이콘으로 대체"
        //   → trace는 prey나 carcass가 같은 타일에 보이면 자동 생략.
        //   isPlayer/isBoss 플래그는 HexTile에서 본체 렌더 시 skip(GameMap이 별도 SVG text로
        //   transition 슬라이드를 위해 단일 인스턴스 유지) 하는데 쓰인다.
        function computeTileIcons(tile, ctx) {
            const isRevealed = tile.revealed || tile.visited;
            if (!isRevealed) return [];
            const list = [];
            if (tile.type === 'exit') {
                list.push({ kind: 'exit', text: '탈출구', fontSize: 14, fill: '#fff' });
            } else {
                if (tile.type === 'good') list.push({ kind: 'good', emoji: '🌾' });
                else if (tile.type === 'trap') list.push({ kind: 'trap', emoji: '⚠️' });
                if (tile.visited && ctx.hasCarcass) list.push({ kind: 'carcass', emoji: '🦴' });
                if (ctx.showPrey) list.push({ kind: 'prey', emoji: ctx.preyEmoji });
                // D-94: 유저가 놓아둔 거대한 먹이 — visited와 무관(카드 효과로 자기 타일에 놓아도
                //   visited는 이미 true임). carcass와 동시에 있을 수 없음(보스가 먹으면 carcass로 전환).
                if (ctx.hasBait && !(tile.visited && ctx.hasCarcass)) {
                    list.push({ kind: 'bait', emoji: '🍖' });
                }
                const traceVisible = (ctx.hasTrace || ctx.hasCarcassTrace)
                    && !ctx.showPrey
                    && !(tile.visited && ctx.hasCarcass)
                    && !ctx.hasBait;
                if (traceVisible) {
                    list.push({ kind: 'trace', emoji: ctx.hasCarcassTrace ? '🦴' : '👣' });
                }
            }
            if (ctx.isCurrent) list.push({ kind: 'player', emoji: '♟', isPlayer: true });
            if (ctx.isBoss) list.push({ kind: 'boss', emoji: '🦖', isBoss: true });
            // 4개 초과 시 priority 낮은 trace/지형 표지부터 잘림(현재 list는 push 순서가
            // 우선순위 역순이라 맨 앞부터 잘라야 player/boss가 살아남음).
            if (list.length > TILE_STACK_MAX) {
                return list.slice(list.length - TILE_STACK_MAX);
            }
            return list;
        }

        // 육각형 타일 컴포넌트
        //
        // D-42 (2026-04-23 요한 지시): 보스 아이콘 노출 조건이 "tile.revealed"에서
        // "bossVisible"로 분리됨. 지형 revealed와 무관하게 bossVisible=true 일 때만
        // 보스가 있는 타일에 🦖 아이콘이 뜬다. 이동하면 setBossVisible(false).
        //
        // D-50 (2026-04-23 요한 지시): 플레이어·보스를 타일 배경/라벨로 섞어
        // 표현하던 방식을 폐기하고 SVG 오버레이 "말"(piece)로 분리. 타일은
        // 지형 속성만 표현. 말 렌더링은 GameMap에서 HexTile 위에 SVG text로 수행.
        //
        // D-46/D-48: 사냥감 오버레이.
        //   - prey 아이콘: visited 타일 + preys에 이 tileId 있을 때. (보스가 있으면 보스 우선)
        //   - 흔적(👣 우상단): preyTraceTiles.has(tile.id) — visited 무관 (청각 단서).
        //   - D-48: 발자국 방향 화살표 제거 — 흔적(👣)만으로 단서 제공.
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo, requestWait, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            const preyOnTile = (preys || []).find(p => p.tileId === tile.id);
            const showPrey = tile.visited && preyOnTile && !isBoss;
            const preyEmoji = showPrey ? (PREY_EMOJI[preyOnTile.preyType] || '❓') : null;
            const hasTrace = preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tile.id);
            // D-78: 사체 타일. visited && carcassTiles.has(tile.id)면 🦴 오버레이.
            //   listen으로 감지된 인접 사체는 carcassTraceTiles에 들어가 trace 위치에 🦴 표시(visited 무관).
            const hasCarcass = carcassTiles && carcassTiles.has && carcassTiles.has(tile.id);
            const hasCarcassTrace = carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tile.id);
            // D-94: 거대한 먹이 — 유저가 놓아둔 타일.
            const hasBait = baitTiles && baitTiles.has && baitTiles.has(tile.id);

            // D-53: [맵 보기] 모드에서 미방문 타일은 반투명 회색 윤곽만 공개.
            // 지역 이름/마커/prey/흔적은 숨긴다(스포일러 방지 — 방문 안 한 곳은 지형만 감).
            const pathUnvisited = showPathView && !tile.visited;
            // D-80 (2026-04-24 요한 지시): listen 실루엣 — 정보가 밝혀진 타일에
            // 인접하여 길이 연결된 그 다음 1칸 타일을 맵보기와 동일한 dim 색상으로 노출.
            // 길찾기 난이도 하향 목적. 게임 중에도 이동은 가능(canMove면 클릭 허용).
            const silhouetteOnly = !showPathView && tile.silhouette && !tile.revealed && !tile.visited;
            const dimmed = pathUnvisited || silhouetteOnly;

            // 길이 없는 타일 (connections 없음) 판별
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                return '#2d3561';
            };

            // D-89: getTileLabel 폐기 — 모든 아이콘이 computeTileIcons + 스택 슬롯 위치로 통합.
            //   미공개 타일에만 단독 '?' 라벨 사용.
            const tileIcons = computeTileIcons(tile, {
                isCurrent, isBoss, showPrey, preyEmoji, hasCarcass, hasTrace, hasCarcassTrace, hasBait
            });
            const visibleIcons = dimmed ? [] : tileIcons;
            // 플레이어/보스는 GameMap이 단일 SVG text로 그려 transition 슬라이드 보존.
            // HexTile은 그 외 아이콘만 렌더하되, 스택 슬롯 인덱스는 player/boss 자리도
            // 차지한 상태로 계산 → GameMap의 계산과 동일하게 일치.
            const stackLayout = TILE_STACK_LAYOUTS[Math.min(visibleIcons.length, TILE_STACK_MAX)] || [];

            // 지역 이름 오버레이.
            // D-51 (2026-04-23 요한 지시): revealed(귀기울이기 등)도 지형 이름 노출.
            // 이전(D-27~): visited만 표시. 이제 listen으로 주변 지형 파악이 가능해짐.
            // 방문(visited)과 정찰(revealed only) 구분:
            // - visited: 초록 동그란 마커 + 지형 이름, 타일 밝음(opacity 1)
            // - revealed only: 지형 이름만 (마커 없음), 타일 약간 어두움(opacity 0.7)
            // - 미공개: 아무것도 없음, 타일 매우 어두움(opacity 0.55)
            const regionLabel = !dimmed && (tile.visited || tile.revealed) && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;
            // D-80 보강 (2026-04-24 요한 지시): revealed-only(밝혀졌지만 안 가본) 타일은
            // 색상만 실루엣과 동일(#444)로 낮추고, opacity·stroke·마커·지역명은 유지.
            // visited(색 있음, opacity 1)와 한눈에 구분하기 위해.
            // D-80 보강 3: fill/stroke opacity 분리 — 타일 내부는 "가본 곳 vs 안 가본 곳"의
            // 구분을 위해 흐릴 수 있지만, 이동 가능(canMove) 녹색 테두리는 항상 선명해야
            // 길찾기가 쉽다. polygon opacity 한 방으로는 둘을 분리할 수 없어 fillOpacity와
            // strokeOpacity를 따로 둔다.
            // D-85 (2026-04-24 요한 지시): 현재 타일의 connections에 속하는 타일은
            // silhouette/dim 상태여도 항상 녹색 canMove 테두리를 띄워야 한다. 이전에는
            // dimmed일 때 stroke=#555/width=1로 덮어써서, listen으로 silhouette 플래그가
            // 붙은 "갈 수 있는" 타일이 "못 가는 타일"처럼 보이는 버그가 있었다.
            // → canMove가 최우선, 그 다음에 dimmed, 그 다음 기본 테두리.
            // 단, [맵 보기](showPathView)에서 pathUnvisited이면 실제 클릭이 막히므로
            // 녹색 승격도 생략해서 "녹색인데 안 눌림" 모순을 피한다.
            const showCanMove = canMove && !pathUnvisited;
            const revealedOnly = !tile.visited && tile.revealed;
            const tileFillOpacity = dimmed ? 0.22 : (tile.visited ? 1 : tile.revealed ? 0.7 : 0.55);
            const tileStrokeOpacity = (dimmed && !showCanMove) ? 0.4 : 1;
            const tileFill = (dimmed || revealedOnly) ? '#444' : getTileColor(tile);
            const tileStroke = showCanMove ? '#4CAF50' : (dimmed ? '#555' : '#0f3460');
            const tileStrokeWidth = showCanMove ? '3' : (dimmed ? '1' : '2');

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className={`hex-tile${dimmed ? ' path-unvisited' : ''}`}
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={tileFill}
                        stroke={tileStroke}
                        strokeWidth={tileStrokeWidth}
                        fillOpacity={tileFillOpacity}
                        strokeOpacity={tileStrokeOpacity}
                        onClick={() => {
                            if (gameOver || victory || pathUnvisited || showPathView) return;
                            // D-90: 자기 타일 클릭 → 시간 보내기 확인 모달.
                            if (isCurrent) {
                                if (typeof requestWait === 'function') requestWait();
                                return;
                            }
                            if (canMove) moveTo(tile.id);
                        }}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            {tile.visited && (
                                <circle cx={x - 22} cy={y - 36} r="3" fill="#4CAF50" />
                            )}
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    {/* 미공개 타일 — '?' 단독 라벨. */}
                    {!dimmed && !isRevealed && (
                        <text x={x} y={y + 5} textAnchor="middle" fill="#666" fontSize="24" fontWeight="bold">?</text>
                    )}
                    {/* D-89: 통합 중앙 스택. player/boss는 GameMap 단일 SVG text(transition 보존)
                        가 그리므로 여기선 skip. 스택 슬롯 인덱스는 일치한다. */}
                    {visibleIcons.map((icon, idx) => {
                        if (icon.isPlayer || icon.isBoss) return null;
                        const slot = stackLayout[idx];
                        if (!slot) return null;
                        if (icon.text) {
                            return (
                                <text
                                    key={icon.kind}
                                    x={x + slot.dx}
                                    y={y + slot.dy}
                                    textAnchor="middle"
                                    fill={icon.fill || '#fff'}
                                    fontSize={icon.fontSize || 14}
                                    fontWeight="700"
                                    pointerEvents="none"
                                >
                                    {icon.text}
                                </text>
                            );
                        }
                        return (
                            <text
                                key={icon.kind}
                                x={x + slot.dx}
                                y={y + slot.dy}
                                textAnchor="middle"
                                dominantBaseline="middle"
                                fontSize="22"
                                pointerEvents="none"
                                stroke="#0a1020"
                                strokeWidth="3"
                                paintOrder="stroke"
                            >
                                {icon.emoji}
                            </text>
                        );
                    })}
                    {/* 맵 보기 모드 — 플레이어가 방문한 순서 번호. 첫 방문 기준(indexOf). */}
                    {showPathView && moveHistory && (() => {
                        const pathIdx = moveHistory.indexOf(tile.id);
                        if (pathIdx < 0) return null;
                        return (
                            <g pointerEvents="none">
                                <circle cx={x - 28} cy={y - 2} r="11" fill="#d4b84a" stroke="#000" strokeWidth="0.8" />
                                <text
                                    x={x - 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#1a1a2e"
                                    fontSize="12"
                                    fontWeight="800"
                                >
                                    {pathIdx + 1}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-53: 맵 보기 모드 — 보스 이동 경로. 빨간 동그라미 + B{idx+1} 라벨. */}
                    {showPathView && bossMoveHistory && (() => {
                        const bIdx = bossMoveHistory.indexOf(tile.id);
                        if (bIdx < 0) return null;
                        return (
                            <g className="boss-path-dot" pointerEvents="none">
                                <circle cx={x + 28} cy={y - 2} r="12" fill="#e94560" stroke="#1a1a2e" strokeWidth="1" />
                                <text
                                    x={x + 28}
                                    y={y + 3}
                                    textAnchor="middle"
                                    fill="#fff"
                                    fontSize="10"
                                    fontWeight="800"
                                >
                                    {`B${bIdx + 1}`}
                                </text>
                            </g>
                        );
                    })()}
                    {/* D-70 (2026-04-24 요한 지시): 실패 시 탈출구 위치 공개.
                        showPathView 모드에서 tile.type==='exit'이면 항상 🚪 마커 노출.
                        유저가 '저기가 탈출구였구나' 복기 가능. */}
                    {showPathView && tile.type === 'exit' && (
                        <g className="exit-marker" pointerEvents="none">
                            <circle cx={x - 28} cy={y - 2} r="14" fill="#2196F3" stroke="#1a1a2e" strokeWidth="1.5" opacity="0.95" />
                            <text
                                x={x - 28}
                                y={y + 4}
                                textAnchor="middle"
                                fontSize="14"
                            >
                                🚪
                            </text>
                        </g>
                    )}
                </g>
            );
        }

        // 게임 맵 컴포넌트
        //
        // D-46 (2026-04-22 요한 지시): LootToast를 .map-container(스크롤 영역)
        // 밖으로 빼고 .map-area 래퍼의 형제로 둔다. 이전(D-39)에는 맵 안에 넣어
        // "맵에서 획득" 공간감을 살렸지만, 모바일에서 맵을 스크롤하면 absolute
        // 자식이 콘텐츠와 함께 밀려 시야에서 사라지는 문제가 있었음.
        // .map-area는 HUD 바로 아래 영역이라, 토스트는 스크롤과 무관하게
        // 그 상단에 고정으로 뜨고 HUD/카드와도 겹치지 않는다.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, requestWait, lootToast, onLootToastDone, tileEventToast, onTileEventToastDone, preys, preyTraceTiles, carcassTiles, carcassTraceTiles, baitTiles, moveHistory, bossMoveHistory, showPathView, message }) {
            // D-53: [맵 보기] 모드에서는 방문/발견 여부와 무관하게 모든 비어있지 않은 타일 공개.
            // 미방문 타일은 HexTile 내부에서 반투명 회색으로 그린다.
            // D-80 보강(2026-04-24): silhouette 플래그도 렌더 대상 — listen 시점에 즉시 노출.
            //   (이전엔 discovered=false면 filter에서 걸려 이동 후에야 뒤늦게 나타나는 버그가 있었음.)
            const visibleTiles = showPathView
                ? tiles.filter(t => !t.isEmpty)
                : tiles.filter(t => t.visited || t.discovered || t.revealed || t.silhouette);
            const containerRef = React.useRef(null);

            // D-54: 플레이 그리드 주변에 넉넉한 빈 패딩을 두어 스크롤해도 "끝"이
            // 안 보이게 한다. SVG 총 크기는 mapGenerator가 PADDING_HEXES 반영해 산출.
            const mapExtent = React.useMemo(() => {
                const gen = new MapGenerator(MAP_SIZE);
                return gen.getMapExtent();
            }, []);

            // D-82 (2026-04-24 요한 지시): 맵 조작 개선.
            //   - 꾹 누른 채 드래그 → 맵 pan (PC 마우스 + 모바일 1 finger).
            //   - 마우스 휠 → 확대/축소 (PC).
            //   - 두 손가락 핀치 → 확대/축소 (모바일).
            //   - 드래그 임계값 4px 넘으면 같은 제스처의 click(=hex tap) 이벤트를 capture 단계에서 차단.
            const [zoom, setZoom] = React.useState(1);
            const zoomRef = React.useRef(1);
            React.useEffect(() => { zoomRef.current = zoom; }, [zoom]);
            const ZOOM_MIN = 0.5;
            const ZOOM_MAX = 2.5;

            // D-47 (2026-04-22 요한 지시): 게임 시작 시 현재 위치 타일이 스크롤
            // 뷰포트 중앙에 오도록 1회 정렬. 이전엔 항상 (0,0)에서 시작해 매번
            // 시작 위치를 찾아야 했음.
            // useLayoutEffect로 paint 전에 스크롤을 잡아 깜빡임 없음.
            // 마운트 시 1회만 — 이후 이동 자유, 자동 추적은 D-135로 별도.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-135: currentTile 변경 시 1초 동안 ease로 viewport 중앙 추적.
            //   - 첫 mount는 D-47 useLayoutEffect가 instant 처리 → skip.
            //   - tiles만 바뀌고 currentTile 동일하면 skip(휴식·사냥 등 상태 변경 케이스).
            //   - 사용자 드래그/줌 시작 시 즉시 cancel — 자유 조작 우선.
            //   - zoom은 zoomRef.current로 동기 참조(현재 화면 좌표계).
            const centerAnimRef = React.useRef({ cancel: () => {} });
            const isFirstCenterRef = React.useRef(true);
            const prevTileIdRef = React.useRef(null);
            React.useEffect(() => {
                if (isFirstCenterRef.current) {
                    isFirstCenterRef.current = false;
                    prevTileIdRef.current = currentTile;
                    return;
                }
                if (prevTileIdRef.current === currentTile) return;
                prevTileIdRef.current = currentTile;

                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;

                centerAnimRef.current.cancel();

                const z = zoomRef.current;
                const targetLeft = cur.position.x * z - el.clientWidth / 2;
                const targetTop = cur.position.y * z - el.clientHeight / 2;
                const startLeft = el.scrollLeft;
                const startTop = el.scrollTop;
                if (Math.abs(targetLeft - startLeft) < 1 && Math.abs(targetTop - startTop) < 1) return;

                const duration = 1000;
                const startTime = performance.now();
                let cancelled = false;
                let rafId = 0;
                const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                const step = (now) => {
                    if (cancelled) return;
                    const elapsed = now - startTime;
                    const t = Math.min(1, elapsed / duration);
                    const eased = ease(t);
                    el.scrollLeft = startLeft + (targetLeft - startLeft) * eased;
                    el.scrollTop = startTop + (targetTop - startTop) * eased;
                    if (t < 1) rafId = requestAnimationFrame(step);
                };
                rafId = requestAnimationFrame(step);

                centerAnimRef.current = {
                    cancel: () => {
                        cancelled = true;
                        cancelAnimationFrame(rafId);
                    },
                };

                return () => {
                    cancelled = true;
                    cancelAnimationFrame(rafId);
                };
            }, [currentTile, tiles]);

            // D-82: 드래그/줌 이벤트 바인딩. 네이티브 리스너로 붙여 wheel에서 preventDefault 가능.
            React.useEffect(() => {
                const el = containerRef.current;
                if (!el) return;

                const drag = { active: false, startX: 0, startY: 0, sL: 0, sT: 0, moved: false };
                const pinch = { active: false, dist: 0, zoomStart: 1 };
                let blockNextClick = false;

                // D-88 (2026-04-25): pinch 중심점 드리프트 수정.
                // 한 프레임에 setZoom + rAF로 scrollLeft을 적용하는 구조에서, touchmove가
                // rAF보다 빠르게 연속 발생하면 다음 프레임 계산이 "새 zoom + DOM의 옛 scrollLeft"
                // 를 섞어 cx 계산이 어긋남(중심점이 손가락에서 점점 멀어짐). 의도된 스크롤
                // 위치를 ref에 동기로 기록하고 줌 계산은 전부 이 ref만 보게 한다.
                const scrollRef = { x: el.scrollLeft, y: el.scrollTop };
                const syncScrollFromDOM = () => {
                    scrollRef.x = el.scrollLeft;
                    scrollRef.y = el.scrollTop;
                };

                const getDist = (a, b) => Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);

                const beginPan = (x, y) => {
                    // D-135: 사용자 직접 조작 우선 — 진행 중인 카메라 추적 취소.
                    centerAnimRef.current.cancel();
                    syncScrollFromDOM();
                    drag.active = true;
                    drag.startX = x;
                    drag.startY = y;
                    drag.sL = scrollRef.x;
                    drag.sT = scrollRef.y;
                    drag.moved = false;
                    el.classList.add('dragging');
                };
                const continuePan = (x, y) => {
                    if (!drag.active) return;
                    const dx = x - drag.startX;
                    const dy = y - drag.startY;
                    if (!drag.moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
                        drag.moved = true;
                    }
                    el.scrollLeft = drag.sL - dx;
                    el.scrollTop = drag.sT - dy;
                    syncScrollFromDOM();
                };
                const endPan = () => {
                    if (drag.moved) blockNextClick = true;
                    drag.active = false;
                    el.classList.remove('dragging');
                };

                // 핵심: focusOffset(viewport 내 픽셀) 기준으로 콘텐츠 좌표를 계산.
                // scrollRef.x는 마지막으로 "의도한" 스크롤이라 rAF 대기 중에도 일관됨.
                const applyZoomAt = (ratio, focusClientX, focusClientY) => {
                    const prev = zoomRef.current;
                    const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, prev * ratio));
                    if (Math.abs(next - prev) < 0.001) return;
                    const rect = el.getBoundingClientRect();
                    const focusOffsetX = focusClientX - rect.left;
                    const focusOffsetY = focusClientY - rect.top;
                    const factor = next / prev;
                    const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                    const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                    zoomRef.current = next;
                    scrollRef.x = newScrollL;
                    scrollRef.y = newScrollT;
                    setZoom(next);
                    requestAnimationFrame(() => {
                        el.scrollLeft = newScrollL;
                        el.scrollTop = newScrollT;
                    });
                };

                // ── Mouse ──────────────────────────────────────────────
                const onMouseDown = (e) => {
                    if (e.button !== 0) return; // 좌클릭만
                    beginPan(e.clientX, e.clientY);
                };
                const onMouseMove = (e) => { continuePan(e.clientX, e.clientY); };
                const onMouseUp = () => { endPan(); };
                const onWheel = (e) => {
                    e.preventDefault();
                    centerAnimRef.current.cancel();
                    const ratio = e.deltaY > 0 ? 0.9 : 1.1;
                    applyZoomAt(ratio, e.clientX, e.clientY);
                };

                // ── Touch ──────────────────────────────────────────────
                const onTouchStart = (e) => {
                    centerAnimRef.current.cancel();
                    if (e.touches.length === 2) {
                        // 핀치 시작 — pan 중단.
                        if (drag.active) { drag.active = false; el.classList.remove('dragging'); }
                        pinch.active = true;
                        pinch.dist = getDist(e.touches[0], e.touches[1]);
                        pinch.zoomStart = zoomRef.current;
                    } else if (e.touches.length === 1) {
                        pinch.active = false;
                        beginPan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchMove = (e) => {
                    if (pinch.active && e.touches.length === 2) {
                        e.preventDefault();
                        const d = getDist(e.touches[0], e.touches[1]);
                        if (pinch.dist === 0) return;
                        const ratio = d / pinch.dist;
                        const next = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pinch.zoomStart * ratio));
                        if (Math.abs(next - zoomRef.current) < 0.001) return;
                        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                        const factor = next / zoomRef.current;
                        const rect = el.getBoundingClientRect();
                        const focusOffsetX = midX - rect.left;
                        const focusOffsetY = midY - rect.top;
                        const newScrollL = (focusOffsetX + scrollRef.x) * factor - focusOffsetX;
                        const newScrollT = (focusOffsetY + scrollRef.y) * factor - focusOffsetY;
                        zoomRef.current = next;
                        scrollRef.x = newScrollL;
                        scrollRef.y = newScrollT;
                        setZoom(next);
                        requestAnimationFrame(() => {
                            el.scrollLeft = newScrollL;
                            el.scrollTop = newScrollT;
                        });
                    } else if (drag.active && e.touches.length === 1) {
                        e.preventDefault();
                        continuePan(e.touches[0].clientX, e.touches[0].clientY);
                    }
                };
                const onTouchEnd = (e) => {
                    if (e.touches.length < 2) pinch.active = false;
                    if (e.touches.length === 0) endPan();
                };

                // ── Click capture — 드래그 후 발생한 click 억제 ─────
                const onClickCapture = (e) => {
                    if (blockNextClick) {
                        e.stopPropagation();
                        e.preventDefault();
                        blockNextClick = false;
                    }
                };

                el.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                el.addEventListener('wheel', onWheel, { passive: false });
                el.addEventListener('touchstart', onTouchStart, { passive: false });
                el.addEventListener('touchmove', onTouchMove, { passive: false });
                el.addEventListener('touchend', onTouchEnd);
                el.addEventListener('touchcancel', onTouchEnd);
                el.addEventListener('click', onClickCapture, true);

                return () => {
                    el.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    el.removeEventListener('wheel', onWheel);
                    el.removeEventListener('touchstart', onTouchStart);
                    el.removeEventListener('touchmove', onTouchMove);
                    el.removeEventListener('touchend', onTouchEnd);
                    el.removeEventListener('touchcancel', onTouchEnd);
                    el.removeEventListener('click', onClickCapture, true);
                };
            }, []);

            // D-50/D-89: 엔티티 말(piece) — 타일 위에 얹히는 SVG text 오버레이.
            //   transition 슬라이드 보존을 위해 단일 SVG text 인스턴스를 유지.
            //   D-89: 타일 중앙 통합 스택 도입 → player/boss도 그 스택의 한 슬롯을 차지.
            //   HexTile/GameMap 둘 다 computeTileIcons로 같은 입력→같은 결과를 받아
            //   슬롯 인덱스가 자동 일치한다.
            const computeStackOffset = (tileObj, isPlayerTile, isBossTile) => {
                if (!tileObj) return null;
                const ctx = {
                    isCurrent: isPlayerTile,
                    isBoss: isBossTile,
                    showPrey: tileObj.visited && (preys || []).some(p => p.tileId === tileObj.id) && !isBossTile,
                    preyEmoji: (() => {
                        const p = (preys || []).find(pp => pp.tileId === tileObj.id);
                        return p ? (PREY_EMOJI[p.preyType] || '❓') : null;
                    })(),
                    hasCarcass: carcassTiles && carcassTiles.has && carcassTiles.has(tileObj.id),
                    hasTrace: preyTraceTiles && preyTraceTiles.has && preyTraceTiles.has(tileObj.id),
                    hasCarcassTrace: carcassTraceTiles && carcassTraceTiles.has && carcassTraceTiles.has(tileObj.id),
                    hasBait: baitTiles && baitTiles.has && baitTiles.has(tileObj.id)
                };
                const icons = computeTileIcons(tileObj, ctx);
                const layout = TILE_STACK_LAYOUTS[Math.min(icons.length, TILE_STACK_MAX)] || [];
                const idx = icons.findIndex(i => isPlayerTile ? i.isPlayer : i.isBoss);
                return (idx >= 0 && layout[idx]) ? layout[idx] : { dx: 0, dy: 8 };
            };
            const playerTile = tiles[currentTile];
            const playerPos = playerTile && playerTile.position;
            const playerStackOff = playerPos
                ? computeStackOffset(playerTile, true, !!(boss && bossVisible && boss.position === currentTile))
                : null;
            const bossTile = (boss && bossVisible && tiles[boss.position]) ? tiles[boss.position] : null;
            const bossPiecePos = bossTile ? bossTile.position : null;
            const bossStackOff = bossPiecePos
                ? computeStackOffset(bossTile, currentTile === boss.position, true)
                : null;

            return (
                <div className="map-area">
                    {/* D-120 → D-121 (요한 지시): 메시지 카드 위치 변경.
                        하단 ui-panel 바로 위로 띄움 (bottom 10px), 좌우 10px 마진 풀스트레치.
                        한 뎁스 위에 떠 있는 느낌 + 카드 영역과 가까이.
                        rgba(0,0,0,0.95) + 작은따옴표 인용 + 그림자. */}
                    <div style={{
                        position: 'absolute',
                        bottom: '10px',
                        left: '10px',
                        right: '10px',
                        // D-122: z-index 제거 — modal(.modal z-index:100, fixed) 아래로 자연 스택.
                        //   .map-area 내부 absolute라 같은 컨텍스트의 형제만 위에 있음.
                        zIndex: 1,
                        pointerEvents: 'none',
                        // D-123: 배경색 #222134 투명도 95%.
                        background: 'rgba(34, 33, 52, 0.95)',
                        border: '1px solid #2a2f4a',
                        borderRadius: '8px',
                        padding: '10px 16px',
                        minHeight: '48px',
                        boxShadow: '0 6px 18px rgba(0,0,0,0.55)',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        textAlign: 'center',
                        fontSize: '13px',
                        lineHeight: 1.45,
                        color: '#e7e1c8',
                        letterSpacing: '0.2px',
                        whiteSpace: 'pre-wrap'
                    }}>
                        {message ? (
                            <span>‘<MessageText text={message} />’</span>
                        ) : '\u00A0'}
                    </div>
                    <div className="map-container" ref={containerRef}>
                        <svg
                            className="map-svg"
                            width={mapExtent.totalWidth * zoom}
                            height={mapExtent.totalHeight * zoom}
                            viewBox={`0 0 ${mapExtent.totalWidth} ${mapExtent.totalHeight}`}
                        >
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                    requestWait={requestWait}
                                    preys={preys}
                                    preyTraceTiles={preyTraceTiles}
                                    carcassTiles={carcassTiles}
                                    carcassTraceTiles={carcassTraceTiles}
                                    baitTiles={baitTiles}
                                    moveHistory={moveHistory}
                                    bossMoveHistory={bossMoveHistory}
                                    showPathView={showPathView}
                                />
                            ))}
                            {playerPos && playerStackOff && (
                                <text
                                    className="piece piece-player"
                                    x={playerPos.x + playerStackOff.dx}
                                    y={playerPos.y + playerStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                    fontWeight="700"
                                    fill="#fff"
                                    stroke="#1a1a2e"
                                    strokeWidth="1.5"
                                    paintOrder="stroke"
                                >
                                    ♟
                                </text>
                            )}
                            {bossPiecePos && bossStackOff && (
                                <text
                                    className="piece piece-boss"
                                    x={bossPiecePos.x + bossStackOff.dx}
                                    y={bossPiecePos.y + bossStackOff.dy}
                                    textAnchor="middle"
                                    dominantBaseline="middle"
                                    fontSize="22"
                                >
                                    🦖
                                </text>
                            )}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                    <TileEventToast toast={tileEventToast} onDone={onTileEventToastDone} />
                </div>
            );
        }

        // 타일 이벤트 모달 컴포넌트 — 함정만 사용.
        // D-52 (2026-04-23 요한 지시): '풍족한 땅(구 좋은 곳)'은 모달 → 토스트로 이관.
        // 함정은 피해 정보가 있어 명시적 확인이 필요하므로 모달 유지.
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;

            const getEventInfo = () => {
                switch(tile.type) {
                    case 'trap':

            const eventInfo = getEventInfo();

            return (
                <div className="modal">
                    <div style={{

                        color: 'white',
                        padding: '30px',

                        textAlign: 'center',

                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
