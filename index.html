                </div>
            );
        }

        // лҚ°мқҙн„° мҙҲкё°нҷ” кІҪкі .
        function ResetConfirmModal({ onConfirm, onCancel }) {
            return (
                <div className="modal" style={{ zIndex: 3600 }}>
                    <div style={{
                        background: '#2a1a1e',
                        color: '#fff',
                        padding: '24px 22px',
                        borderRadius: '10px',
                        border: '1px solid #8B0000',
                        maxWidth: '340px',
                        width: '90vw',
                        textAlign: 'center'
                    }}>
                        <div style={{ fontSize: '16px', fontWeight: 700, marginBottom: '12px', color: '#ff8a8a' }}>
                            лҚ°мқҙн„° мҙҲкё°нҷ”
                        </div>
                        <div style={{ fontSize: '13px', lineHeight: 1.6, marginBottom: '20px', color: '#ddd' }}>
                            м •л§җ лӘЁл“  м§„н–үмқ„ мҙҲкё°нҷ”? лҗҳлҸҢлҰҙ мҲҳ м—ҶлӢӨ.
                        </div>
                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'center' }}>
                            <button
                                onClick={onCancel}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '8px 18px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px'
                                }}
                            >
                                м·ЁмҶҢ
                            </button>
                            <button
                                onClick={onConfirm}
                                style={{
                                    background: '#8B0000',
                                    color: '#fff',
                                    border: 'none',
                                    padding: '8px 22px',
                                    borderRadius: '6px',
                                    cursor: 'pointer',
                                    fontSize: '13px',
                                    fontWeight: 700
                                }}
                            >
                                нҷ•мқё
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // мә н”„ мқёлІӨ к·ёлҰ¬л“ң (12x8 л“ұ). InventoryModalкіј лҸҷмқј лЈ©.
        //   D-113: cellSizeВ·onItemClickВ·selectedIdsВ·onCellLongPress мҳөм…ҳ м¶”к°Җ.
        //     - м…Җ нҒ¬кё°лҘј нҳём¶ңл¶Җм—җм„ң мЎ°м Ҳ(мһ‘мқҖ лҜёлҰ¬ліҙкё° / PackTransferModalм—җм„ң лҚ” мһ‘кІҢ).
        //     - selectedIds: Set лҳҗлҠ” л°°м—ҙ. нҸ¬н•Ёлҗң item.idлҠ” 'selected' нҒҙлһҳмҠӨ л¶Җм—¬.
        //     - onItemClick(item): м•„мқҙн…ң мҳҒм—ӯ нғӯ вҖ” лӢӨмӨ‘м„ нғқ нҶ кёҖ л“ұм—җ мӮ¬мҡ©.
        //     - onItemLongPress(item): кёёкІҢ лҲ„лҘҙл©ҙ ItemInfoModal м—ҙкё° л“ұ.
        //   кё°ліёмқҖ м •м Ғ н‘ңмӢң(нҒҙлҰӯ н•ёл“Өлҹ¬ м—ҶмқҢ).
        function CampInventoryGrid({ inventory, cellSize, selectedIds, onItemClick, onItemLongPress }) {
            if (!inventory) return null;
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = Number(cellSize) > 0 ? Number(cellSize) : 36;
            const PAD = 3;
            const selSet = selectedIds instanceof Set
                ? selectedIds
                : (Array.isArray(selectedIds) ? new Set(selectedIds) : null);

            // кёёкІҢ лҲ„лҘҙкё°(лЎұн”„л ҲмҠӨ) к°җм§Җ вҖ” 500ms.
            const pressTimerRef = React.useRef(null);
            const longFiredRef = React.useRef(false);
            const startPress = (item) => {
                longFiredRef.current = false;
                if (typeof onItemLongPress !== 'function') return;
                pressTimerRef.current = setTimeout(() => {
                    longFiredRef.current = true;
                    onItemLongPress(item);
                }, 500);
            };
            const cancelPress = () => {
                if (pressTimerRef.current) {
                    clearTimeout(pressTimerRef.current);
                    pressTimerRef.current = null;
                }
            };
            const handleClick = (item) => {
                if (longFiredRef.current) return;
                if (typeof onItemClick === 'function') onItemClick(item);
            };

            return (
                <div style={{ position: 'relative', display: 'inline-block' }}>
                    <div style={{
                        display: 'grid',
                        gridTemplateColumns: `repeat(${COLS}, ${CELL - 2}px)`,
                        gridTemplateRows: `repeat(${ROWS}, ${CELL - 2}px)`,
                        gap: '2px',
                        background: '#0f3460',
                        padding: `${PAD}px`,
                        borderRadius: '8px'
                    }}>
                        {Array(ROWS).fill(null).map((_, row) =>
                            Array(COLS).fill(null).map((_, col) => {
                                const occupied = !!inventory.grid[row][col];
                                const disabled = inventory.isDisabled && inventory.isDisabled(col, row);
                                return (
                                    <div
                                        key={`${row}-${col}`}
                                        className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                        style={disabled ? { background: '#0a1a2a', opacity: 0.35 } : undefined}
                                    />
                                );
                            })
                        )}
                    </div>
                    {inventory.items.map(item => {
                        const w = item.shape[0].length;
                        const h = item.shape.length;
                        const emoji = itemEmoji(item.type);
                        const selected = selSet && selSet.has(item.id);
                        const interactive = typeof onItemClick === 'function' || typeof onItemLongPress === 'function';
                        return (
                            <div
                                key={item.id}
                                className={`inventory-item${selected ? ' selected' : ''}`}
                                style={{
                                    left: `${item.x * CELL + PAD}px`,
                                    top: `${item.y * CELL + PAD}px`,
                                    width: `${w * CELL - PAD}px`,
                                    height: `${h * CELL - PAD}px`,
                                    fontSize: '9px',
                                    cursor: interactive ? 'pointer' : 'default',
                                    pointerEvents: interactive ? 'auto' : 'none',
                                    outline: selected ? '2px solid #4dd0e1' : undefined,
                                    boxShadow: selected ? '0 0 8px rgba(77,208,225,0.55)' : undefined,
                                    zIndex: selected ? 2 : 1
                                }}
                                onClick={() => handleClick(item)}
                                onMouseDown={() => startPress(item)}
                                onMouseUp={cancelPress}
                                onMouseLeave={cancelPress}
                                onTouchStart={() => startPress(item)}
                                onTouchEnd={cancelPress}
                                onTouchCancel={cancelPress}
                            >
                                {emoji
                                    ? <span style={{ fontSize: Math.round(CELL * 0.55) + 'px', lineHeight: 1 }}>{emoji}</span>
                                    : item.name}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // D-113: ліҙкҙҖн•Ё лӢЁлҸ… н’ҖмҠӨнҒ¬лҰ° нҢқм—….
        //   мә н”„ [ліҙкҙҖн•Ё] лІ„нҠјм—җм„ң м—ҙлҰј. 12x8 к·ёлҰ¬л“ңлҘј н•ңлҲҲм—җ.
        //   м•„мқҙн…ң кёёкІҢ лҲ„лҘҙл©ҙ ItemInfoModalлЎң м •ліҙ н‘ңмӢң.
        function StorageModal({ inventory, onClose }) {
            const [infoItem, setInfoItem] = React.useState(null);
            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '20px 18px 24px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(94vw, 460px)',
                        margin: '24px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>рҹ“Ұ ліҙкҙҖн•Ё</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >лӢ«кё°</button>
                        </div>
                        <div style={{ display: 'flex', justifyContent: 'center' }}>
                            <CampInventoryGrid
                                inventory={inventory}
                                cellSize={40}
                                onItemLongPress={(it) => setInfoItem(it)}
                            />
                        </div>
                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', marginTop: '10px' }}>
                            м•„мқҙн…ңмқ„ кёёкІҢ лҲ„лҘҙл©ҙ м •ліҙлҘј ліј мҲҳ мһҲлӢӨ.
                        </div>
                    </div>
                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={() => setInfoItem(null)}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // D-113: мқёлІӨ к°„ м•„мқҙн…ң мқҙм „ вҖ” мқёмҠӨн„ҙмҠӨ м§Ғм ‘ placement (durability/rotation ліҙмЎҙ).
        //   selectedIds: мҳ®кёё source м•„мқҙн…ң id л°°м—ҙ.
        //   src/dst: InventorySystem мқёмҠӨн„ҙмҠӨ. dstм—җ л№Ҳ мһҗлҰ¬ м—Ҷмңјл©ҙ л¶Җл¶„ мқҙм „(л“Өм–ҙк°„ л§ҢнҒјл§Ң).
        //   л°ҳнҷҳ: { moved: [item...], failed: [item...] } вҖ” нҳём¶ңл¶Җ нҶ мҠӨнҠё л©”мӢңм§Җм—җ мӮ¬мҡ©.
        //   srcм—җм„ң м ңкұ° + dstм—җ мғҲ мўҢн‘ңлЎң placeItem. idлҠ” dst мёЎм—җм„ң мғҲлЎң л°ңкёү(к°ҷмқҖ id м¶©лҸҢ л°©м§Җ).
        function transferItems(src, dst, selectedIds) {
            const idSet = new Set(selectedIds || []);
            const moved = [];
            const failed = [];
            // src.itemsлҘј ліөмӮ¬ нӣ„ мҲңнҡҢ вҖ” removeItem мӢң src.itemsлҸ„ к°ұмӢ лҗҳлҜҖлЎң лҜёлҰ¬ л– л‘җкё°.
            const targets = src.items.filter(it => idSet.has(it.id));
            for (const it of targets) {
                const shape = it.shape;
                const pos = dst.findEmptySpace(shape);
                if (!pos) { failed.push(it); continue; }
                const placed = {
                    ...it,
                    id: Date.now() + Math.random(),
                    x: pos.x,
                    y: pos.y
                };
                // srcм—җм„ң к·ёлҰ¬л“ң л№„мҡ°кі  itemsм—җм„ң м ңкұ°.
                src.removeItem(it);
                src.items = src.items.filter(x => x.id !== it.id);
                // dstм—җ л°°м№ҳ.
                dst.placeItem(placed);
                dst.items.push(placed);
                moved.push(placed);
            }
            return { moved, failed };
        }

        // D-113: ліҙкҙҖн•Ё вҶ” к°Җл°© лӢӨмӨ‘м„ нғқВ·мҳ®кё°кё°В·м„ңлЎң л°”кҫёкё° н’ҖмҠӨнҒ¬лҰ° лӘЁлӢ¬.
        //   props.storage / props.pack вҖ” InventorySystem мқёмҠӨн„ҙмҠӨ.
        //   props.onChange() вҖ” ліҖкІҪ нӣ„ л¶ҖлӘЁм—җ мһ¬л ҢлҚ” нҠёлҰ¬кұ° м•ҢлҰј (campState к°қмІҙ мғҲлЎң л§Ңл“Өкё°).
        //   props.onClose вҖ” лӢ«кё°.
        //   мғҒнғң: selectedFromStorage / selectedFromPack (к°Ғк°Ғ Set<itemId>).
        //   лІ„нҠј нҷңм„ұ:
        //     - storageл§Ң м„ нғқ вҶ’ [к°Җл°©мңјлЎң]
        //     - packл§Ң м„ нғқ вҶ’ [ліҙкҙҖн•ЁмңјлЎң]
        //     - м–‘мӘҪ м„ нғқ вҶ’ [м„ңлЎң л°”кҫёкё°]
        function PackTransferModal({ storage, pack, onChange, onClose }) {
            const [selStorage, setSelStorage] = React.useState(() => new Set());
            const [selPack, setSelPack] = React.useState(() => new Set());
            const [toast, setToast] = React.useState(null);

            const toggle = (which, id) => {
                const setter = which === 'storage' ? setSelStorage : setSelPack;
                setter(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id); else next.add(id);
                    return next;
                });
            };

            const showToast = (text) => {
                setToast(text);
                setTimeout(() => setToast(null), 1800);
            };

            const onlyStorage = selStorage.size > 0 && selPack.size === 0;
            const onlyPack = selPack.size > 0 && selStorage.size === 0;
            const both = selStorage.size > 0 && selPack.size > 0;

            // [к°Җл°©мңјлЎң мҳ®кё°кё°]
            const moveToPack = () => {
                const ids = Array.from(selStorage);
                const r = transferItems(storage, pack, ids);
                if (r.failed.length > 0) {
                    showToast(`к°Җл°©мқҙ к°Җл“қ вҖ” ${r.moved.length}к°ңл§Ң мҳ®к№Җ`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}к°ңлҘј к°Җл°©мңјлЎң`);
                }
                setSelStorage(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [ліҙкҙҖн•ЁмңјлЎң мҳ®кё°кё°]
            const moveToStorage = () => {
                const ids = Array.from(selPack);
                const r = transferItems(pack, storage, ids);
                if (r.failed.length > 0) {
                    showToast(`ліҙкҙҖн•Ёмқҙ к°Җл“қ вҖ” ${r.moved.length}к°ңл§Ң мҳ®к№Җ`);
                } else if (r.moved.length > 0) {
                    showToast(`${r.moved.length}к°ңлҘј ліҙкҙҖн•ЁмңјлЎң`);
                }
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };
            // [м„ңлЎң л°”кҫёкё°] вҖ” лҸҷмӢңм—җ м–‘мӘҪмңјлЎң ліҙлӮёлӢӨ.
            //   лЁјм Җ м–‘мӘҪм—җм„ң м„ нғқ м•„мқҙн…ңмқ„ src.itemsм—җм„ң л–јм–ҙлӮҙкі (gridлҸ„ л№„мӣҖ),
            //   к°Ғк°Ғ мғҒлҢҖнҺё dstм—җ л№Ҳ мһҗлҰ¬м—җ л°°м№ҳ. кіөк°„ л¶ҖмЎұ мӢң л¶Җл¶„л§Ң м„ұкіө.
            //   л¶Җл¶„ м„ұкіө мӢң мӢӨнҢЁн•ң мӘҪмқҖ мӣҗлһҳ мқёлІӨм—җ лӢӨмӢң л№Ҳ мһҗлҰ¬лЎң нҸҙл°ұ.
            const swapBoth = () => {
                const sIds = Array.from(selStorage);
                const pIds = Array.from(selPack);
                const sItems = storage.items.filter(it => selStorage.has(it.id));
                const pItems = pack.items.filter(it => selPack.has(it.id));
                // 1) srcм—җм„ң л¶„лҰ¬ (м–‘мӘҪ лӘЁл‘җ).
                for (const it of sItems) {
                    storage.removeItem(it);
                    storage.items = storage.items.filter(x => x.id !== it.id);
                }
                for (const it of pItems) {
                    pack.removeItem(it);
                    pack.items = pack.items.filter(x => x.id !== it.id);
                }
                // 2) мғҒлҢҖнҺё dstм—җ л°°м№ҳ мӢңлҸ„. мӢӨнҢЁ мӢң мӣҗлһҳ мқёлІӨмңјлЎң ліөмӣҗ.
                let movedToPack = 0, movedToStorage = 0, failedBack = 0;
                const place = (item, dst) => {
                    const pos = dst.findEmptySpace(item.shape);
                    if (!pos) return false;
                    const placed = { ...item, id: Date.now() + Math.random(), x: pos.x, y: pos.y };
                    dst.placeItem(placed);
                    dst.items.push(placed);
                    return true;
                };
                for (const it of sItems) {
                    if (place(it, pack)) movedToPack += 1;
                    else {
                        // мӣҗлһҳ storageлЎң нҸҙл°ұ.
                        if (!place(it, storage)) failedBack += 1;
                    }
                }
                for (const it of pItems) {
                    if (place(it, storage)) movedToStorage += 1;
                    else {
                        if (!place(it, pack)) failedBack += 1;
                    }
                }
                if (movedToPack + movedToStorage === 0) {
                    showToast('кіөк°„мқҙ л¶ҖмЎұн•ҙ л°”кҫём§Җ лӘ»н•Ё');
                } else if (sItems.length + pItems.length > movedToPack + movedToStorage) {
                    showToast(`мқјл¶Җл§Ң көҗнҷҳ (к°Җл°© ${movedToPack} / ліҙкҙҖн•Ё ${movedToStorage})`);
                } else {
                    showToast(`көҗнҷҳ мҷ„лЈҢ (к°Җл°© ${movedToPack} / ліҙкҙҖн•Ё ${movedToStorage})`);
                }
                setSelStorage(new Set());
                setSelPack(new Set());
                if (typeof onChange === 'function') onChange();
            };

            const btnStyle = (active) => ({
                background: active ? '#d4b84a' : '#2a2a3e',
                color: active ? '#1a1a2e' : '#666',
                border: 'none',
                padding: '10px 14px',
                borderRadius: '6px',
                cursor: active ? 'pointer' : 'not-allowed',
                fontSize: '12px',
                fontWeight: 700,
                flex: 1,
                minWidth: 0
            });

            return (
                <div className="modal" style={{ zIndex: 3300, alignItems: 'flex-start', overflowY: 'auto' }}>
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',
                        padding: '18px 14px 22px',
                        borderRadius: '10px',
                        border: '1px solid #2a3a5e',
                        width: 'min(96vw, 540px)',
                        margin: '16px auto',
                        boxShadow: '0 10px 30px rgba(0,0,0,0.55)'
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
                            <div style={{ fontSize: '16px', fontWeight: 700, color: '#d4b84a' }}>рҹҺ’ л¬јкұҙ мұҷкё°кё°</div>
                            <button
                                onClick={onClose}
                                style={{
                                    background: 'transparent',
                                    color: '#bbb',
                                    border: '1px solid #4a4a6e',
                                    padding: '5px 14px',
                                    borderRadius: '5px',
                                    cursor: 'pointer',
                                    fontSize: '12px'
                                }}
                            >лӢ«кё°</button>
                        </div>

                        <div style={{
                            display: 'flex',
                            flexDirection: 'column',
                            gap: '14px',
                            alignItems: 'center'
                        }}>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    рҹ“Ұ ліҙкҙҖн•Ё ({storage.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={storage}
                                        cellSize={32}
                                        selectedIds={selStorage}
                                        onItemClick={(it) => toggle('storage', it.id)}
                                    />
                                </div>
                            </div>
                            <div style={{ width: '100%' }}>
                                <div style={{ fontSize: '12px', color: '#bbb', marginBottom: '6px', textAlign: 'center' }}>
                                    рҹҺ’ к°Җл°© ({pack.items.length})
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'center' }}>
                                    <CampInventoryGrid
                                        inventory={pack}
                                        cellSize={36}
                                        selectedIds={selPack}
                                        onItemClick={(it) => toggle('pack', it.id)}
                                    />
                                </div>
                            </div>
                        </div>

                        <div style={{ fontSize: '11px', color: '#888', textAlign: 'center', margin: '12px 0' }}>
                            м•„мқҙн…ңмқ„ нғӯн•ҙм„ң м„ нғқ. м–‘мӘҪм—җм„ң м„ нғқн•ҳл©ҙ [м„ңлЎң л°”кҫёкё°].
                        </div>

                        <div style={{ display: 'flex', gap: '6px' }}>
                            <button
                                onClick={moveToPack}
                                disabled={!onlyStorage}
                                style={btnStyle(onlyStorage)}
                            >
                                к°Җл°©мңјлЎң
                            </button>
                            <button
                                onClick={moveToStorage}
                                disabled={!onlyPack}
                                style={btnStyle(onlyPack)}
                            >
                                ліҙкҙҖн•ЁмңјлЎң
                            </button>
                            <button
                                onClick={swapBoth}
                                disabled={!both}
                                style={btnStyle(both)}
                            >
                                м„ңлЎң л°”кҫёкё°
                            </button>
                        </div>

                        {toast && (
                            <div style={{
                                position: 'fixed',
                                left: '50%',
                                bottom: '40px',
                                transform: 'translateX(-50%)',
                                background: 'rgba(0,0,0,0.8)',
                                color: '#fff',
                                padding: '10px 18px',
                                borderRadius: '6px',
                                fontSize: '12px',
                                zIndex: 3401
                            }}>
                                {toast}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-168 (2026-04-29 мҡ”н•ң): лІ мқҙмҠӨмә н”„ л№Ңл”© к·ёлҰ¬л“ң вҖ” 3x3.
        //   мІ« мҠ¬лЎҜмқҖ н…җнҠё(нҷңм„ұ). лӮҳлЁём§Җ 8к°ңлҠ” placeholder(м¶”нӣ„ кіөк°ң). м№ҙл“ң нҒҙлҰӯ вҶ’ лӘЁлӢ¬.
        //   н…җнҠёлҠ” tentLevelм—җ л”°лқј 30%/100% нҲ¬лӘ…лҸ„, Lv.N лқјлІЁ н‘ңмӢң.
        // D-174 (2026-04-30): мӢңнҠё SSOT нҶөн•© вҖ” л№Ңл”© 6мў… + н…җнҠё + мһ кёҲ 2м№ё = 9м№ё.
        //   slots: { id, kind } вҖ” kind: 'tent' | 'sheet' | 'locked'.
        //   лқјлІЁ нҶөмқј вҖ” Lv.{stage}/{maxStage}. stage=0мқҙл©ҙ 30% нҲ¬лӘ…лҸ„.
        const BUILDING_SLOTS = [
            { id: 'tent',       kind: 'tent' },
            { id: 'clinic',     kind: 'sheet' },
            { id: 'kitchen',    kind: 'sheet' },
            { id: 'workshop',   kind: 'sheet' },
            { id: 'storage',    kind: 'sheet' },
            { id: 'training',   kind: 'sheet' },

        // D-174: л№Ңл”© м№ҙл“ң нҒҙлҰӯ мӢң лқ„мҡ°лҠ” мғҒм„ё лӘЁлӢ¬.

            if (building.kind === 'sheet') {
                const buildingLevels = (campState && campState.buildingLevels) || {};
                const curStage = Number(buildingLevels[building.id]) || 0;
                const maxStage = getMaxStage(building.id) || 3;
                const def0 = getBuildingDef(building.id, Math.max(1, curStage));

                const inv = campState && campState.inventory;

                const costRows = nextDef ? (nextDef.cost || []).map(c => {

                    const have = idEn ? countOfId(idEn) : 0;

                    return { koName: c.material, idEn, have, need, ok: !!idEn && have >= need };
                }) : [];
                const canComplete = !!nextDef && costRows.length > 0 && costRows.every(r => r.ok);
                const passive = nextDef ? parsePassive(nextDef.reward_passive || '') : [];
                const runStart = nextDef ? parseRewardItems(nextDef.reward_run_start || '') : [];
                const items = nextDef ? parseRewardItems(nextDef.reward_items || '') : [];

                const renderItemList = (entries) => entries.map(e => {

                return (

            const lv = Number((campState && campState.tentLevel) || 0);
            const nextDef = getNextTentQuest(lv);
            const inActive = nextDef && (activeQuests || []).find(q => q.id === nextDef.id);

            const reqRows = nextDef

                    const have = countOf(type);
                    const dispDef = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                        ? (InventorySystem.resolveDef(type) || {}) : {};
                    return { type, name: dispDef.name || type, have, need, ok: have >= need };

            const canComplete = nextDef && reqRows.every(r => r.ok);
            return (

                        {!nextDef ? (

        // мә н”„ л©”мқё нҷ”л©ҙ.

        //   props.onDepart вҖ” [нғҗн—ҳ л– лӮҳкё°] нҒҙлҰӯ.

        //   props.onInventoryChange вҖ” ліҙкҙҖн•Ё/к°Җл°© ліҖкІҪ нӣ„ л¶ҖлӘЁ мһ¬л ҢлҚ” нҠёлҰ¬кұ° (campState к°қмІҙ мғҲлЎң л§Ңл“Өкё°).
        // D-113: л Ҳмқҙм•„мӣғ мһ¬кө¬м„ұ.
        //   мғҒлӢЁ: м җмҲҳ вҶ’ [ліҙкҙҖн•Ё] лІ„нҠј вҶ’ [нҖҳмҠӨнҠё лӘ©лЎқ] вҶ’ [нҳ„мһ¬ м§„н–ү мӨ‘ нҖҳмҠӨнҠё] вҶ’ кұҙм„Ө.
        //   н•ҳлӢЁ: [л¬јкұҙ мұҷкё°кё°] [нғҗн—ҳ л– лӮҳкё°] л‘җ лІ„нҠј.
        // D-168: л№Ңл”© к·ёлҰ¬л“ң м¶”к°Җ вҖ” ліҙкҙҖн•Ё лІ„нҠј м•„лһҳ.
        function CampScreen({ campState, onDepart, onCompleteQuest, onTakeQuest, onResetData, onInventoryChange }) {

            const [storageSelectedItem, setStorageSelectedItem] = React.useState(null);
            // D-151: нҖҳмҠӨнҠё [л°ӣкё°] нҒҙлҰӯ мӢң мҠӨнҶ лҰ¬В·м •ліҙ лӘЁлӢ¬ вҶ’ [мҲҳлқҪ]м—җм„ң active push.
            const [offerQuestId, setOfferQuestId] = React.useState(null);
            // D-168: л№Ңл”© к·ёлҰ¬л“ң м№ҙл“ң нҒҙлҰӯ мӢң лқ„мҡё мғҒм„ё лӘЁлӢ¬ вҖ” м„ нғқлҗң л№Ңл”© к°қмІҙ.
            const [selectedBuilding, setSelectedBuilding] = React.useState(null);
            // D-154: нҖҳмҠӨнҠё лӘ©лЎқ лӘЁлӢ¬ + м§„н–ү мӨ‘ мғҒм„ё лӘЁлӢ¬ нҶ кёҖ.
            const [questListOpen, setQuestListOpen] = React.useState(false);
            const [activeDetailQuestId, setActiveDetailQuestId] = React.useState(null);
            const inv = campState && campState.inventory;

            // мқёлІӨм—җм„ң typeлі„ ліҙмң лҹү кі„мӮ° (мӢӨмӢңк°„). м ҖмһҘлҗң progressліҙлӢӨ м •нҷ•.

                }}>
                    <div style={{ maxWidth: '720px', margin: '0 auto' }}>
                        <div style={{

                        {/* D-110: м җмҲҳ нҶөкі„ вҖ” мөңкі /лҲ„м Ғ/нҸүк·  + л§Ҳм§Җл§ү лҹ°. */}

        function ScoreBadge({ score, breakdown }) {

        //   selectedListк°Җ nullмқҙл©ҙ items м „мІҙ кё°мӨҖ.
        function buildScoreBreakdown({ victory, uniqueTilesVisited, detection, items, runStats, selectedItems }) {
            if (!victory) return [];
            const rows = [];
            rows.push({ label: 'мғқмЎҙ', value: 100 });
            const tiles = Math.max(0, Number(uniqueTilesVisited) || 0);
            if (tiles > 0) rows.push({ label: `мқҙлҸҷкұ°лҰ¬(${tiles})`, value: tiles * 3 });
            if ((Number(detection) || 0) < 80) rows.push({ label: 'мқҖл°Җ(л°ңк°Ғ<80)', value: 30 });

            const stats = runStats || {};
            const l1 = Number(stats.l1PreyKills) || 0;
            const l2 = Number(stats.l2PreyKills) || 0;
            const bd = Number(stats.bossDangerEntered) || 0;
            if (l1) rows.push({ label: `мӮ¬лғҘ L1 Г—${l1}`, value: l1 * 5 });
            if (l2) rows.push({ label: `мӮ¬лғҘ L2 Г—${l2}`, value: l2 * 20 });
            if (bd) rows.push({ label: `ліҙмҠӨ мң„нҳ‘к¶Ң Г—${bd}`, value: bd * 15 });

            // мһҗмӣҗ вҖ” gradeлі„ н•©мӮ°.
            const list = Array.isArray(selectedItems) ? selectedItems : (Array.isArray(items) ? items : []);
            let weapons = 0, armorShield = 0, g1 = 0, g2 = 0, g3 = 0;
            for (const it of list) {
                if (!it || !it.type) continue;
                const def = (typeof InventorySystem !== 'undefined' && InventorySystem.resolveDef)
                    ? (InventorySystem.resolveDef(it.type) || {})
                    : {};
                const cat = def.category;
                if (cat === 'л¬ҙкё°') { weapons += 1; continue; }
                if (cat === 'shield' || cat === 'armor') { armorShield += 1; continue; }
                const grade = Number(def.grade) || 0;
                if (grade === 1) g1 += 1;
                else if (grade === 2) g2 += 1;
                else if (grade === 3) g3 += 1;
            }
            if (weapons) rows.push({ label: `л¬ҙкё° Г—${weapons}`, value: weapons * 5 });
            if (armorShield) rows.push({ label: `л°©м–ҙкө¬ Г—${armorShield}`, value: armorShield * 8 });

            return rows;
        }

        // ============================================
        // D-110 (2026-04-24): м „лҰ¬н’Ҳ кІ°кіјм°Ҫ.

                        {/* мқёлІӨ к·ёлҰ¬л“ң */}

        function GameEndModal({ gameOver, victory, deathReason, showPathView, onViewPath, onReturnCamp, onShowLoot, runFinal }) {
            // мҠ№лҰ¬ нӣ„ 'л§ө ліҙкё°' лӘЁл“ңмқј л•Ң лӘЁлӢ¬ мҲЁк№Җ вҖ” кІҪлЎңлҘј ліј мҲҳ мһҲкІҢ.

            //   нғҖмқҙнӢҖ(мҠ№лҰ¬/кІҢмһ„мҳӨлІ„)м—җл§Ң мғү м°ЁмқҙлҘј мЈјкі , лӘЁлӢ¬ л°°кІҪмқҖ н‘ңмӨҖ лӢӨнҒ¬.

                        {/* D-110: мҠ№лҰ¬ мӢң м җмҲҳ л°°м§Җ н‘ңмӢң вҖ” м „мІҙ мқёмһ… кё°мӨҖ. */}

                                defeatм—җм„ңлҸ„ ліҙмҠӨ кІҪлЎңВ·н”Ңл Ҳмқҙм–ҙ лҸҷм„ мқ„ ліөкё°н•  мҲҳ мһҲлҸ„лЎқ. */}

                                        fontSize: '15px',
                                        fontWeight: '600',
                                        borderRadius: '6px',
                                        cursor: 'pointer'

                                >
                                    рҹ“Ұ м „лҰ¬н’Ҳ нҷ•мқё

                            <button

        // ============================================
        // мӮ¬лғҘ м „нҲ¬ лӘЁлӢ¬ (D-46, 2026-04-23)
        // ============================================
        //
        // кө¬мЎ°:
        //   - мғҒлӢЁ: prey мқҙлҰ„ + HP л°” + meat н‘ңмӢң
        //   - м Ғ нҢЁн„ҙ 3мҠ¬лЎҜ(readonly): нҡҢн”ј / нҡҢн”ј / л№ лҘҙкІҢ лҸ„л§қ
        //   - лӮҙ мҠ¬лЎҜ 3м№ё: л№„м—Ҳмңјл©ҙ "л№„м—ҲмқҢ", м№ҙл“ң мһҲмңјл©ҙ м№ҙл“ң л ҢлҚ”(нғӯвҶ’мҶҗнҢЁ ліөк·Җ)
        //   - нҷ•м • лІ„нҠј: 3мҠ¬лЎҜ лӘЁл‘җ м°Ём•ј нҷңм„ұ
        //   - лӮҙ мҶҗнҢЁ: buildHuntDeck кІ°кіј. нғӯ мӢң к°ҖмһҘ мҷјмӘҪ л№Ҳ мҠ¬лЎҜм—җ л°°м№ҳ.
        //
        // мҠ¬лЎҜвҶ”мҶҗнҢЁ мқҙлҸҷмқҖ uid кё°мӨҖ. "л’Ө мҠ¬лЎҜ кі м •" мӣҗм№ҷ вҖ” мҠ¬лЎҜвҶ’мҶҗнҢЁ ліөк·Җ мӢң лӢӨлҘё мҠ¬лЎҜ мң„м№ҳ мң м§Җ.
        // нҷ•м • мӢң resolveHunt(prey, slots) вҶ’ н„ҙ лЎңк·ё мҲңм°Ё н‘ңмӢң(500ms) вҶ’ onResolve(result) мҪңл°ұ.
        // D-58/D-74: HuntCombatModal мҲҳм№ҳ л°°м§Җ нҶөмқј.
        //   - рҹ—ЎпёҸ+N / N% / рҹҸ№+N / рҹӣЎпёҸ+N мҲңм„ң кі м •, мӨ„л°”кҝҲ м—ҶмқҢ.
        //   - damage=0 && defense>0 вҶ’ рҹ—ЎпёҸ мҲЁкё°кі  рҹӣЎпёҸ н‘ңмӢң (нҒ¬м•„ мӣ…нҒ¬лҰ¬кё°/л°©нҢЁ л§үкё°).
        //   - damage=0 && defense=0 (dodge/run_away) вҶ’ рҹ—ЎпёҸВ·рҹҸ№ мғқлһө, N%л§Ң.
        //   - лқјлІЁ н…ҚмҠӨнҠё м „л¶Җ м ңкұ° вҖ” м•„мқҙмҪҳ + мҲ«мһҗлЎң нҶөмқј.
        const STAT_ICONS = { damage: 'рҹ—ЎпёҸ', accuracy: 'рҹҸ№', defense: 'рҹӣЎпёҸ', evade: 'рҹ’Ё' };
        const STAT_COLORS = { damage: '#e06666', accuracy: '#8bd17c', defense: '#4db8ff', evade: '#d4b84a' };
        function StatBadges({ card }) {
            const dmg = Number(card.damage) || 0;
            const acc = Number(card.accuracy) || 0;
            const def = Number(card.defense) || 0;
            const eva = Number(card.evade) || 0;
            const sr = card.success_rate;
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap' }}>
                    {dmg > 0 && (
                        <span style={{ color: STAT_COLORS.damage }}>{STAT_ICONS.damage}+{dmg}</span>
                    )}
                    {/* D-113: success_rate=100мқҖ лӘЁл“  кіөкІ©/нҡҢн”ј м№ҙл“ңмқҳ кё°ліёк°’ вҖ” м •ліҙ к°Җм№ҳ м—Ҷм–ҙ мҲЁк№Җ.
                        run_away л“ұ 100 лҜёл§Ң м№ҙл“ңл§Ң % н‘ңмӢң. */}
                    {(sr !== undefined && sr !== null && Number(sr) !== 100) && (
                        <span style={{ color: '#aaa' }}>{sr}%</span>
                    )}
                    {dmg > 0 && acc > 0 && (
                        <span style={{ color: STAT_COLORS.accuracy }}>{STAT_ICONS.accuracy}+{acc}</span>
                    )}
                    {def > 0 && (
                        <span style={{ color: STAT_COLORS.defense }}>{STAT_ICONS.defense}+{def}</span>
                    )}
                    {eva > 0 && (
                        <span style={{ color: STAT_COLORS.evade }}>{STAT_ICONS.evade}+{eva}</span>
                    )}
                </span>
            );
        }

        // D-58: м Ғ мҠ¬лЎҜ мөңмў… нҡҢн”јмңЁ л°°м§Җ.
        //   - damage>0 м№ҙл“ң л°°м№ҳ + finalEvade < baseEvade вҶ’ мҙҲлЎқ + bold.
        //   - к·ё мҷё(л№Ҳ мҠ¬лЎҜ / damage=0 м№ҙл“ң / к°җмҶҢ м—ҶмқҢ) вҶ’ кё°ліёмғү.
        // D-167 (2026-04-29 мҡ”н•ң): нҡҢн”ј л©”нғҖнҸ¬ мқјкҙҖ вҖ” м№ҙл“ң StatBadgesмҷҖ лҸҷмқјн•ң 'рҹ’Ё+N' н‘ңкё°.
        //   "нҡҢн”ј N" н…ҚмҠӨнҠё вҶ’ рҹ’Ё+N. нҡҢн”јн•ҳкё° м№ҙл“ң(evade) мҲҳм№ҳлҸ„ мқҙ нҢЁн„ҙмқҙлқј м Ғ/лӮҳ м–‘мӘҪ л©”нғҖнҸ¬ нҶөмқј.
        function EvadeBadge({ baseEvade, finalEvade, consumed }) {
            const reduced = finalEvade < baseEvade;
            return (
                <span
                    className={reduced ? 'evade-changed' : undefined}
                    style={{
                        color: reduced ? '#8bd17c' : '#d4b84a',
                        fontWeight: reduced ? 700 : 400,
                        opacity: consumed ? 0.5 : 1,
                        transition: 'color 0.2s, opacity 0.2s'
                    }}>
                    рҹ’Ё+{finalEvade}
                </span>
            );
        }

        // D-176 Phase A (2026-04-30 мҡ”н•ң м§ҖмӢң): нҸ¬мј“лӘ¬мӢқ лҢҖкІ° кө¬лҸ„ нҢЁл„җ.
        //   мғҒлӢЁ мўҢн•ҳм—җ лӮҙ мәҗлҰӯн„° л’·лӘЁмҠө, мҡ°мғҒм—җ мӮ¬лғҘк°җмқ„ л°°м№ҳ вҖ” "л§ҲмЈј ліҙлҠ”" кө¬лҸ„.
        //   - мӮ¬лғҘк°җ imageUrl л№„м–ҙмһҲмңјл©ҙ нҒ° мқҙлӘЁм§Җ(72px) fallback.
        //   - мӮ¬лғҘк°җ мң„ HP л°”(л№Ёк°•) + рҹ—ЎпёҸ/рҹӣЎпёҸ/нҡҢн”ј л°°м§Җ.
        //   - лӮҙ мәҗлҰӯн„° мң„ health(л№Ёк°•) + hunger(мЈјнҷ©) л°”.
        //   - мһ”м—¬ н–үлҸҷ(slotActions)мқ„ мӮ¬лғҘк°җ мҳҶм—җ мһ‘мқҖ dotмңјлЎң лҜёлҰ¬ л…ём¶ң вҖ” мҶҢл№„лҗң н„ҙмқҖ нқҗлҰј.
        //   - н–Ҙнӣ„ Phase Bм—җм„ң м№ҙл“ң мӮ¬мҡ© мӢң нҠёлһңм§Җм…ҳ(нқ”л“ӨлҰј/л°Җкё°)мқ„ мқҙ м»ҙнҸ¬л„ҢнҠём—җ м¶”к°Җ.
        function BattleStage({
            preyName, preyEmoji, preyImageUrl, preyMeat,
            hpCurrent, hpMax, hpDisplayPct, preyAttack, preyDefense,
            slotActions, computedEvades, slotsConsumed,
            playerHealth, playerHunger, maxHealth, maxHunger,
            playerImageUrl,
        }) {
            const healthPct = Math.max(0, Math.min(100, (playerHealth / Math.max(1, maxHealth)) * 100));
            const hungerPct = Math.max(0, Math.min(100, (playerHunger / Math.max(1, maxHunger)) * 100));
            const actionTypeIcon = { peek: 'рҹ‘ҒпёҸ', attack: 'рҹ—ЎпёҸ', defend: 'рҹӣЎпёҸ', evade: 'рҹ’Ё' };
            return (
                <div style={{
                    position: 'relative',
                    height: '230px',
                    marginBottom: '14px',
                    background: 'linear-gradient(180deg, #1f2a3a 0%, #2a2a3e 60%, #3a2f2a 100%)',
                    borderRadius: '10px',
                    border: '1px solid #444',
                    overflow: 'hidden'
                }}>
                    {/* мҡ°мғҒ вҖ” мӮ¬лғҘк°җ м •ліҙ л°•мҠӨ */}
                    <div style={{
                        position: 'absolute', top: 8, right: 8, maxWidth: '52%',
                        background: 'rgba(0,0,0,0.6)', padding: '6px 10px',
                        borderRadius: '8px', boxSizing: 'border-box', zIndex: 2
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3, gap: 8 }}>
                            <span style={{ fontSize: 13, fontWeight: 600 }}>{preyName}</span>
                            <span style={{ fontSize: 11, color: '#ffd58a' }}>рҹҘ©Г—{preyMeat}</span>
                        </div>
                        <div style={{ height: 8, background: '#222', borderRadius: 4, overflow: 'hidden' }}>
                            <div style={{
                                width: `${hpDisplayPct}%`, height: '100%',
                                background: 'linear-gradient(90deg, #b24656 0%, #e2718a 100%)',
                                transition: 'width 0.3s ease'
                            }} />
                        </div>
                        <div style={{ display: 'flex', gap: 8, marginTop: 3, fontSize: 10, color: '#ccc', flexWrap: 'wrap' }}>
                            <span>HP {hpCurrent}/{hpMax}</span>
                            {preyAttack > 0 && <span style={{ color: '#ff9999' }}>рҹ—ЎпёҸ{preyAttack}</span>}
                            {preyDefense > 0 && <span style={{ color: '#9bd6ff' }}>рҹӣЎпёҸ{preyDefense}</span>}
                        </div>
                        {/* мһ”м—¬ н–үлҸҷ dot вҖ” нҢЁн„ҙ лҜёлҰ¬ л…ём¶ң(кё°нҡҚм„ң лӘ…мӢң) */}
                        <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                            {(slotActions || []).map((a, i) => {
                                const t = (a && a.type) || 'peek';
                                const dim = !!(slotsConsumed && slotsConsumed[i]);
                                return (
                                    <div key={i} title={`T${i+1} ${a && a.name || '?'}`} style={{
                                        width: 22, height: 22, borderRadius: '50%',
                                        background: dim ? '#222' : '#3a3a5e',
                                        border: `1px solid ${dim ? '#333' : '#6a6aaa'}`,
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        fontSize: 11, opacity: dim ? 0.4 : 1
                                    }}>
                                        {actionTypeIcon[t] || '?'}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* мҡ°мӨ‘ вҖ” мӮ¬лғҘк°җ л№„мЈјм–ј (м •ліҙ л°•мҠӨ м•„лһҳм—җ нҒ° мқҙлҜём§Җ/мқҙлӘЁм§Җ) */}
                    <div style={{
                        position: 'absolute', top: 14, right: 14,
                        width: 120, height: 120, marginTop: 0,
                        display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end',
                        filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))',
                        zIndex: 1, pointerEvents: 'none'
                    }}>
                        {preyImageUrl ? (
                            <img src={preyImageUrl} alt={preyName}
                                style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        ) : (
                            <span style={{ fontSize: 96, lineHeight: 1, marginTop: 24 }}>{preyEmoji}</span>
                        )}
                    </div>

                    {/* мўҢн•ҳ вҖ” мәҗлҰӯн„° л№„мЈјм–ј (нҒ° мқҙлҜём§Җ) */}
                    <div style={{
                        position: 'absolute', bottom: 0, left: 6,
                        width: 130, height: 170,
                        display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
                        filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))',
                        zIndex: 1, pointerEvents: 'none'
                    }}>
                        {playerImageUrl ? (
                            <img src={playerImageUrl} alt="лӮҳ"
                                style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        ) : (
                            <span style={{ fontSize: 96, lineHeight: 1 }}>рҹ§Қ</span>
                        )}
                    </div>

                    {/* мўҢн•ҳ вҖ” лӮҙ мҠӨнғҜ л°” (мәҗлҰӯн„° мҡ°мёЎ мҳҶм—җ м •л ¬) */}
                    <div style={{
                        position: 'absolute', bottom: 8, left: 142, right: 8,
                        background: 'rgba(0,0,0,0.6)', padding: '6px 10px',
                        borderRadius: '8px', zIndex: 2
                    }}>
                        <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 3 }}>лӮҳ</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 3 }}>
                            <span style={{ fontSize: 10, width: 14 }}>вқӨпёҸ</span>
                            <div style={{ flex: 1, height: 7, background: '#222', borderRadius: 4, overflow: 'hidden' }}>
                                <div style={{
                                    width: `${healthPct}%`, height: '100%',
                                    background: 'linear-gradient(90deg, #c73e4f 0%, #ff7a8a 100%)',
                                    transition: 'width 0.3s ease'
                                }} />
                            </div>
                            <span style={{ fontSize: 10, color: '#ccc', width: 30, textAlign: 'right' }}>{playerHealth}/{maxHealth}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                            <span style={{ fontSize: 10, width: 14 }}>рҹҚ–</span>
                            <div style={{ flex: 1, height: 7, background: '#222', borderRadius: 4, overflow: 'hidden' }}>
                                <div style={{
                                    width: `${hungerPct}%`, height: '100%',
                                    background: 'linear-gradient(90deg, #d2933a 0%, #f5c46d 100%)',
                                    transition: 'width 0.3s ease'
                                }} />
                            </div>
                            <span style={{ fontSize: 10, color: '#ccc', width: 30, textAlign: 'right' }}>{playerHunger}/{maxHunger}</span>
                        </div>
                    </div>
                </div>
            );
        }

        // D-176 Phase A (2026-04-30 мҡ”н•ң м§ҖмӢң): м „нҲ¬ лӘЁлӢ¬мқ„ нҸ¬мј“лӘ¬мӢқ лҢҖкІ° кө¬лҸ„лЎң к°ңнҺё.
        //   - playerHealth / playerHunger / maxHealth / maxHunger м¶”к°Җ propмңјлЎң л°ӣм•„ BattleStageм—җ н‘ңмӢң.
        //   - мӮ¬лғҘк°җмқҖ emoji лҳҗлҠ” imageUrl(prey.imageUrl, н–Ҙнӣ„ мӢңнҠё м»¬лҹј) л¶„кё°.
        //   - playerImageUrl кё°ліёк°’: data/Assets/character/Player.png (л’·лӘЁмҠө мҠӨмјҖм№ҳ).
        function HuntCombatModal({ prey, inventory, combatCards, onResolve, onCancel,
                                   playerHealth, playerHunger, maxHealth, maxHunger,
                                   playerImageUrl }) {
            // D-75: Level 2 preyлҠ” 4н„ҙ. Level 1мқҖ кё°мЎҙ 3н„ҙ.
            const SLOT_COUNT = Number(prey && prey.level) === 2 ? 4 : 3;
            const [slots, setSlots] = useState(() => Array(SLOT_COUNT).fill(null));
            const [hand, setHand] = useState(() => CombatDeck.buildHuntDeck(combatCards, inventory));
            const [phase, setPhase] = useState('select');     // 'select' | 'resolve' | 'done'
            const [logs, setLogs] = useState([]);             // н‘ңмӢңлҗң н„ҙ лЎңк·ё
            const [result, setResult] = useState(null);

            // D-58/D-60/D-96: мҠ¬лЎҜлі„ мөңмў… нҡҢн”ј кі„мӮ° (н„ҙлі„ base л°ҳмҳҒ).
            //   SSOT: combatDeck.js::resolveHunt кіөмӢқкіј лҸҷмқј.
            //     baseEvadeT = max(0, evadesByTurn[t] - fleeCount)
            //     finalEvade = baseEvadeT (лӘ…мӨ‘ vs нҡҢн”јлҠ” кІ°м •лЎ  л№„көҗ вҖ” UIм—җм„  base н‘ңмӢң).
            //   damage=0 м№ҙл“ң / л№Ҳ мҠ¬лЎҜ вҶ’ base(н„ҙлі„) к·ёлҢҖлЎң.
            //   card.accuracy(лӘ…мӨ‘)лҠ” buildHuntDeck мқҙ мқҙлҜё м№ҙл“ң+л¬ҙкё° н•©мӮ°(D-50).
            // D-75/D-98/D-108: actions_per_turn CSV нҢҢмӢұ вҶ’ н„ҙлі„ actionDef л°°м—ҙ.
            //   SSOTлҠ” combatDeck.js::parsePreyActions + findPreyAction.
            //   slotActions[i] = { id, name, type, damage, accuracy, defense } вҖ” UI л°°м§Җм—җ м§Ғм ‘ мӮ¬мҡ©.
            const slotActions = React.useMemo(() => {
                const ids = CombatDeck.parsePreyActions(prey, SLOT_COUNT);
                return ids.map(id => CombatDeck.findPreyAction(id));
            }, [prey.actions_per_turn, prey.level, SLOT_COUNT]);

            const computedEvades = React.useMemo(() => {
                const byTurn = CombatDeck.parseEvadesByTurn(prey);
                const fleeCount = Math.max(0, Number(prey.fleeCount) || 0);
                return slots.map((card, i) => {
                    // D-96: % вҶ’ м •мҲҳ. лҸ„мЈј лҲ„м Ғ нҢЁл„җнӢ°лҠ” 1лӢ№ нҡҢн”ј -1.
                    const base = Math.max(0, (byTurn[i] ?? 1) - fleeCount);
                    if (!card || !((Number(card.damage) || 0) > 0)) {
                        return { base, final: base };
                    }
                    // D-96: кІ°м •лЎ  вҖ” лӘ…мӨ‘ вүҘ нҡҢн”ј вҶ’ л¬ҙмЎ°кұҙ лӘ…мӨ‘(final=0). нҡҢн”ј > лӘ…мӨ‘ вҶ’ л¬ҙнҡЁ(final=base).
                    const acc = Number(card.accuracy) || 0;
                    const final = (acc >= base) ? 0 : base;
                    return { base, final };
                });
            }, [slots, prey.evade_rate, prey.evade_per_turn, prey.fleeCount]);

            const hpPct = Math.max(0, Math.min(100, ((prey.hp - (prey.hp - (prey.hpCurrent ?? prey.hp))) / prey.hp) * 100));
            // м „нҲ¬ мӢңмһ‘ мӢң hpCurrent = prey.hp. мқҙнӣ„ н‘ңмӢңмҡ©мңјлЎңл§Ң мӮ¬мҡ©.
            const [hpCurrent, setHpCurrent] = useState(prey.hp);

            const allFilled = slots.every(s => s !== null);

            // D-64 (2026-04-24): мҠ¬лЎҜ л°°м№ҳ мӢӨмӢңк°„ мһ¬кі  л°ҳмҳҒ.
            //   buildHuntDeckмқҳ slotLimitмқҖ м „нҲ¬ мӢңмһ‘ мӢңм җ 1нҡҢ кі„мӮ°мқҙлқј л°°м№ҳлЎң м°Ёк°җ м•Ҳ лҗЁ.
            //   requirement мқҙлҰ„ кё°л°ҳ capacityлҘј мӢӨмӢңк°„мңјлЎң кі„мӮ°н•ҙ мҶҗнҢЁ л№„нҷңм„ұВ·мҠ¬лЎҜ лӮҙкө¬лҸ„ н‘ңмӢң.
            //   л¬ҙкё°(category='л¬ҙкё°')лҠ” durabilityLeft н•©мқҙ capacity, мқјл°ҳ мһ¬лЈҢлҠ” мқёмҠӨн„ҙмҠӨ мҲҳ.
            const reqCapacityByName = React.useMemo(() => {
                const cap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    const name = def.name || it.name;
                    if (!name) continue;
                    const isWeapon = def.category === 'л¬ҙкё°';
                    const contribute = isWeapon
                        ? (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0)
                        : 1;
                    cap[name] = (cap[name] || 0) + contribute;
                }
                return cap;
            }, [inventory]);

            // мҠ¬лЎҜм—җ мқҙлҜё л°°м№ҳлҗң м№ҙл“ңмқҳ requirementsл§ҢнҒј м°Ёк°җн•ң мһ”лҹү.
            const remainingByReq = React.useMemo(() => {
                const rem = { ...reqCapacityByName };
                for (const c of slots) {
                    if (!c || !Array.isArray(c.requirements)) continue;
                    for (const r of c.requirements) {
                        rem[r] = (rem[r] || 0) - 1;
                    }
                }
                return rem;
            }, [slots, reqCapacityByName]);

            const canPlaceCard = (card) => {
                if (!Array.isArray(card.requirements) || card.requirements.length === 0) return true;
                for (const r of card.requirements) {
                    if ((remainingByReq[r] || 0) <= 0) return false;
                }
                return true;
            };

            // мҠ¬лЎҜлі„ л¬ҙкё° лӮҙкө¬лҸ„ кі„мӮ° (weaponIdлі„ мҲңм°Ё м°Ёк°җ).
            //   before: мқҙ мҠ¬лЎҜ мӮ¬мҡ© м§Ғм „ лӮҙкө¬, after: мӮ¬мҡ© м§Ғнӣ„ лӮҙкө¬.
            //   л¬ҙкё° м•„лӢҢ м№ҙл“ң(лҸҢ лҚҳм§Җкё° л“ұ)мҷҖ л№Ҳ мҠ¬лЎҜмқҖ null.
            const slotWeaponDur = React.useMemo(() => {
                const weaponCap = {};
                const items = (inventory && inventory.items) || [];
                for (const it of items) {
                    const def = InventorySystem.resolveDef(it.type) || {};
                    if (def.category !== 'л¬ҙкё°') continue;
                    weaponCap[it.type] = (weaponCap[it.type] || 0)
                        + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0);
                }
                const remain = { ...weaponCap };
                return slots.map(card => {
                    if (!card || !card.weaponId) return null;
                    const before = remain[card.weaponId] || 0;
                    const loss = (card.full_loss === 'Y' || card.fullLoss === true) ? before : 1;
                    const after = Math.max(0, before - loss);
                    remain[card.weaponId] = after;
                    return { before, after };
                });
            }, [slots, inventory]);

            // D-153: л°©м–ҙкө¬ лӮҙкө¬лҸ„. м№ҙл“ң cardDefense > 0мқҙл©ҙ лӘЁл“  мһ”м—¬ л°©м–ҙкө¬ 1м”© м°Ёк°җ.
            //   armorInstancesInitial: мӮ¬лғҘ мӢңмһ‘ мӢң мқёлІӨ ліҙмң  л°©м–ҙкө¬ мқёмҠӨн„ҙмҠӨлі„ мһ”м—¬/мқҙлҰ„.
            //   slotArmorBefore[i]: iлІҲм§ё мҠ¬лЎҜ мӮ¬мҡ© м§Ғм „ мқёмҠӨн„ҙмҠӨлі„ мһ”м—¬ л°°м—ҙ.
            const armorInstancesInitial = React.useMemo(() => {
                const items = (inventory && inventory.items) || [];
                return items
                    .map(it => {
                        const d = InventorySystem.resolveDef(it.type) || {};
                        if (d.category !== 'shield' && d.category !== 'armor') return null;
                        const max = Number(d.durability) || 0;
                        const left = (typeof it.durabilityLeft === 'number')
                            ? it.durabilityLeft : max;
                        if (max <= 0) return null;
                        return { id: it.id, name: d.name || it.type, max, left };
                    })
                    .filter(Boolean);
            }, [inventory]);

            const slotArmorBefore = React.useMemo(() => {
                const states = [];
                let cur = armorInstancesInitial.map(a => ({ ...a }));
                for (const card of slots) {
                    states.push(cur.map(a => ({ ...a }))); // before = мӮ¬мҡ© м§Ғм „
                    const def = Number(card && card.defense) || 0;
                    if (def > 0) {
                        cur = cur.map(a => ({ ...a, left: Math.max(0, a.left - 1) }));
                    }
                }
                return states;
            }, [slots, armorInstancesInitial]);

            // D-46/D-47: м№ҙл“ң мһ¬мӮ¬мҡ© к·ңм№ҷ.
            //   - infinite м№ҙл“ң(мЈјлЁ№/нҡҢн”ј/лҸ„л§қ): мҶҗнҢЁ 1мһҘ, мҠ¬лЎҜ л¬ҙм ңн•ң л°°м№ҳ.
            //   - slotLimit м№ҙл“ң(лҸҢ лҚҳм§Җкё°/м°Ҫ л“ұ): мҶҗнҢЁ 1мһҘ, мҠ¬лЎҜ л°°м№ҳлҠ” к°Җл°© лӮҙ м•„мқҙн…ң к°ңмҲҳл§ҢнҒј.
            //   - D-64: мӢӨмӢңк°„ мһ¬кі  мІҙнҒ¬лЎң нҶөн•© вҖ” canPlaceCardлЎң нҢҗм •.
            const handleHandClick = (card) => {
                if (phase !== 'select') return;
                const emptyIdx = slots.findIndex(s => s === null);
                if (emptyIdx < 0) return;
                if (!canPlaceCard(card)) return;
                const isReusable = !!(card.infinite || card.slotLimit);
                const newSlots = [...slots];
                newSlots[emptyIdx] = isReusable
                    ? { ...card, uid: `${card.uid}:slot:${emptyIdx}:${Date.now()}` }
                    : card;
                setSlots(newSlots);
                if (!isReusable) {
                    setHand(hand.filter(c => c.uid !== card.uid));
                }
            };

            const handleSlotClick = (slotIdx) => {
                if (phase !== 'select') return;
                const card = slots[slotIdx];
                if (!card) return;
                const newSlots = [...slots];
                newSlots[slotIdx] = null;
                setSlots(newSlots);
                const isReusable = !!(card.infinite || card.slotLimit);
                if (!isReusable) {
                    setHand([...hand, card]);
                }
            };

            const handleConfirm = () => {
                if (!allFilled || phase !== 'select') return;
                // D-51: weaponState кө¬м„ұ вҖ” мҠ¬лЎҜм—җ л°°м№ҳлҗң л¬ҙкё° мҡ”кө¬ м№ҙл“ңмқҳ owning weapon
                //   мқёмҠӨн„ҙмҠӨ 1мһҗлЈЁ(к°ҖмһҘ лӮҙкө¬ лҶ’мқҖ мҲң)мқҳ durabilityLeftлҘј м¶”м Ғ.
                //   лҸҷмқј weaponIdм—җ лҢҖн•ҙ м—¬лҹ¬ мһҗлЈЁлҘј лҸҷмӢң м¶”м Ғн•ҳм§„ м•ҠмқҢ(нҳ„мһ¬ 1мһҗлЈЁ м „м ң).
                const weaponState = {};
                const seenWeaponIds = new Set();
                for (const c of slots) {
                    if (!c || !c.weaponId || seenWeaponIds.has(c.weaponId)) continue;
                    seenWeaponIds.add(c.weaponId);
                    // inventoryм—җм„ң н•ҙлӢ№ typeмқҳ м•„мқҙн…ң мӨ‘ durabilityLeft мөңлҢ“к°’ мӮ¬мҡ©.
                    const items = (inventory && inventory.items) || [];
                    const instances = items.filter(it => it.type === c.weaponId);
                    const total = instances.reduce((s, it) =>
                        s + (typeof it.durabilityLeft === 'number' ? it.durabilityLeft : 0), 0);
                    weaponState[c.weaponId] = { durabilityLeft: total };
                }
                // D-150: armorState вҖ” мқёлІӨ лӘЁл“  л°©м–ҙкө¬(shield/armor) мқёмҠӨн„ҙмҠӨлі„ мһ”м—¬ durability.
                //   item.idлҘј нӮӨлЎң мқёмҠӨн„ҙмҠӨ лӢЁмң„ м¶”м Ғ(лҸҷмқј type м—¬лҹ¬ к°ң ліҙмң  к°ҖлҠҘ).
                const armorState = {};
                {
                    const items = (inventory && inventory.items) || [];
                    for (const it of items) {
                        const def = InventorySystem.resolveDef(it.type) || {};
                        const cat = def.category;
                        if (cat !== 'shield' && cat !== 'armor') continue;
                        const dur = (typeof it.durabilityLeft === 'number')
                            ? it.durabilityLeft
                            : (typeof def.durability === 'number' ? def.durability : 0);
                        if (dur <= 0) continue;
                        armorState[it.id] = { durabilityLeft: dur };
                    }
                }
                const res = CombatDeck.resolveHunt(prey, slots, { weaponState, armorState });
                setResult(res);
                setPhase('resolve');

                // н„ҙ лЎңк·ё 500ms к°„кІ© мҲңм°Ё н‘ңмӢң.
                res.turns.forEach((turn, idx) => {
                    setTimeout(() => {
                        setLogs(prev => [...prev, turn]);

                    }, 500 * (idx + 1));
                });
                // л§Ҳм§Җл§ү лЎңк·ё нӣ„ кІ°кіј нҺҳмқҙмҰҲ м „нҷҳ. onResolveлҠ” 'кІ°кіј нҷ•мқё' лІ„нҠјм—җм„ң нҳём¶ң.
                setTimeout(() => {
                    setPhase('done');
                }, 500 * (res.turns.length + 1));
            };

            // D-48: 'кІ°кіј нҷ•мқё' лІ„нҠј вҖ” мң м Җк°Җ кІ°кіјлҘј мқҪкі  мҲҳлҸҷмңјлЎң лӢ«мқ„ л•Ң onResolve нҳём¶ң.
            const handleCloseResult = () => {
                if (phase !== 'done' || !result) return;
                onResolve(result);
            };

            const hpDisplayPct = Math.max(0, Math.min(100, (hpCurrent / prey.hp) * 100));
            const preyName = prey.name || prey.preyType;

            // D-48: кІ°кіј л©”мӢңм§Җ вҖ” н•ңкёҖ мЎ°мӮ¬(мқ„/лҘј, мқҙ/к°Җ) л°ӣм№Ё мң л¬ҙлЎң мһҗлҸҷ м„ нғқ.
            const hasBatchim = (word) => {
                if (!word) return false;
                const code = word.charCodeAt(word.length - 1);
                if (code < 0xAC00 || code > 0xD7A3) return false;
                return (code - 0xAC00) % 28 !== 0;
            };
            const particleEul = hasBatchim(preyName) ? 'мқ„' : 'лҘј';
            const particleI = hasBatchim(preyName) ? 'мқҙ' : 'к°Җ';
            const resultMessage = result ? (
                result.outcome === 'victory' ? `${preyName}${particleEul} мһЎм•ҳлӢӨ!`

                : result.outcome === 'player_fled' ? 'мӮ¬лғҘмқ„ нҸ¬кё°н•ҳкі  л¬јлҹ¬м„°лӢӨ.'
                : ''
            ) : '';
            const resultTone = result && result.outcome === 'victory' ? 'victory' : 'fail';

            return (
                <div className="modal">
                    <div style={{
                        background: '#1a1a2e',
                        color: '#eee',

                        borderRadius: '12px',

                        maxHeight: '92vh',

                            - мўҢн•ҳ: лӮҙ мәҗлҰӯн„°(л’·лӘЁмҠө PNG) + health/hunger л°”.

                            - мӮ¬лғҘк°җ imageUrlмқҙ л№„м–ҙмһҲмңјл©ҙ нҒ° мқҙлӘЁм§ҖлЎң fallback (мӢңнҠём—җ imageUrl м»¬лҹј м¶”к°Җ мӢң мҰүмӢң PNG көҗмІҙ).
                            - м№ҙл“ң мҶҗнҢЁВ·мҠ¬лЎҜ мҳҒм—ӯмқҖ к·ё м•„лһҳ к·ёлҢҖлЎң мң м§Җ(Phase A лІ”мң„). */}

                        />

                        {phase === 'done' && resultMessage && (

                        <div style={{ marginBottom: '10px' }}>

                                                {(() => {

                                                {type === 'defend' && def > 0 && (

                                                    мқҙм „ к°Җл“ң ev.final > 0мқҖ player м№ҙл“ң accвүҘbaseлЎң final=0 лҗң кІҪмҡ°
                                                    нҡҢн”ј 0мқҙ мҲЁм–ҙ "нҡҢн”ј кё°мҲ мқёлҚ° мҲҳм№ҳк°Җ м•Ҳ ліҙмқёлӢӨ" л¬ём ң л°ңмғқ.

                                                {type === 'evade' && (

                                                )}

                                        </div>

                        <button

                        {/* D-91 (2026-04-25 мҡ”н•ң м§ҖмӢң): н„ҙ лЎңк·ё м§ҒкҙҖм Ғ мһ¬м„Өкі„.

                            кІ°кіјлі„ мғүмғҒ л¶„кё°лЎң лӘ…мӨ‘/нҡҢн”ј/л°©м–ҙ/н”јн•ҙлҘј н•ңлҲҲм—җ мӢқлі„. */}

                                {logs.map((log, i) => {

                                    const preyEmoji = PREY_EMOJI[prey.preyType] || 'рҹҗҫ';

                                    // лӮҙ лқјмқё вҖ” мғүмғҒ + н…ҚмҠӨнҠё кІ°м •
                                    let playerColor = '#ddd';
                                    let playerText;
                                    if (log.outcome === 'flee_signal') {

                                        playerColor = '#d4b84a';

            useEffect(() => {

            // D-46 (2026-04-23) вҖ” м „нҲ¬ кІ°кіј нӣ„мІҳлҰ¬.

            //              preyTraceTilesм—җм„ң мӣҗ нғҖмқј м ңкұ°. л©”мӢңм§Җ: "мӮ¬лғҘк°җмқҙ лҸ„л§қміӨлӢӨ. л°ңмһҗкөӯмқҙ лӮЁм•„мһҲлӢӨ."
            //   player_fled: prey м ңмһҗлҰ¬. л©”мӢңм§Җ: "мӮ¬лғҘмқ„ нҸ¬кё°н•ҳкі  л¬јлҹ¬м„°лӢӨ."
            const handleHuntResolve = (result) => {
                if (!activeHunt || !activeHunt.prey) {

                //   - мқјл°ҳ мһ¬лЈҢ(лҸҢл§№мқҙ л“ұ): 1к°ңм”© removeItem.
                //   - л¬ҙкё° мһ¬лЈҢ: result.weaponUsageм—җм„ң мқҙлҜё кі„мӮ°лҗң used/fullLossCountлЎң м°Ёк°җ

                //   autoFail н„ҙмқҖ мӢӨм ң мӮ¬мҡ©мқҙ м—Ҷм—ҲмңјлҜҖлЎң м ңмҷё.
                //   consumedSummaryлҠ” victory л©”мӢңм§Җм—җ "мҶҢлӘЁ: лҸҢл§№мқҙ 2к°ң" нҳ•нғңлЎң лҚ§л¶ҷмһ„.
                const consumedSummary = [];
                if (inventory && Array.isArray(result && result.turns)) {
                    // 1) л№„л¬ҙкё° мһ¬лЈҢ м§‘кі„ вҖ” requirement мқҙлҰ„ мӨ‘ weaponмқҙ м•„лӢҢ кІғл§Ң.
                    const TTD = window.TTD_DATA || {};
                    const WEAPONS = Array.isArray(TTD.WEAPONS) ? TTD.WEAPONS : [];
                    const weaponNameSet = new Set(WEAPONS.map(w => w && w.name).filter(Boolean));

                    const consumeByName = {};
                    for (const turn of result.turns) {
                        if (turn && turn.autoFail) continue; // л¬ҙкё° м—Ҷм–ҙм„ң мӢӨнҢЁн•ң н„ҙмқҖ мҶҢлӘЁ м—ҶмқҢ
                        const uc = turn && turn.userCard;
                        if (!uc) continue;
                        const reqs = CombatDeck.parseRequirement(uc.requirement);
                        for (const rName of reqs) {
                            if (weaponNameSet.has(rName)) continue; // л¬ҙкё°лҠ” weaponUsage кІҪлЎңлЎң
                            // D-73: м№ҙн…Ңкі лҰ¬ нҶ нҒ°(shield/armor)мқҖ мҶҢл№„ лҢҖмғҒ м•„лӢҳ вҖ” л°©м–ҙкө¬лҠ” лӮҙкө¬ к°ңл…җ м—ҶмқҢ.
                            if (CombatDeck.CATEGORY_REQ_TOKENS && CombatDeck.CATEGORY_REQ_TOKENS.has(rName)) continue;
                            consumeByName[rName] = (consumeByName[rName] || 0) + 1;
                        }
                    }
                    for (const [reqName, count] of Object.entries(consumeByName)) {
                        let remaining = count;
                        const keep = [];
                        for (const it of inventory.items) {
                            if (remaining > 0) {
                                const def = InventorySystem.resolveDef(it.type) || {};
                                if ((def.name || '') === reqName) {
                                    inventory.removeItem(it);
                                    remaining -= 1;
                                    continue;
                                }
                            }
                            keep.push(it);
                        }
                        inventory.items = keep;
                        const actuallyConsumed = count - remaining;
                        if (actuallyConsumed > 0) {
                            consumedSummary.push(`${reqName} ${actuallyConsumed}к°ң`);
                        }
                    }

                    // 2) л¬ҙкё° м°Ёк°җ вҖ” weaponUsage {weaponId: {used, fullLossCount}}.
                    //   usedлҠ” лӮҙкө¬лҸ„ мҙқ м°Ёк°җлҹү. лҸҷмқј weaponId мқёмҠӨн„ҙмҠӨл“Өмқ„ мҲңнҡҢн•ҳл©°
                    //   durabilityLeftк°Җ л§ҺмқҖ мҲңмңјлЎң м°Ёк°җ(н•ң мһҗлЈЁ кё°мӨҖ м„Өкі„м§Җл§Ң м—¬лҹ¬ мһҗлЈЁлҸ„ м•Ҳм „).
                    //   fullLoss н„ҙмқҖ н•ң мһҗлЈЁлҘј нҶөм§ёлЎң лӮ лҰј вҖ” мқёмҠӨн„ҙмҠӨ 1мһҗлЈЁлҘј 0мңјлЎң.
                    const usage = (result && result.weaponUsage) || {};
                    for (const [weaponId, info] of Object.entries(usage)) {
                        const def = InventorySystem.resolveDef(weaponId) || {};
                        const displayName = def.name || weaponId;
                        const instances = inventory.items
                            .filter(it => it.type === weaponId)
                            .sort((a, b) => (b.durabilityLeft || 0) - (a.durabilityLeft || 0));

                        let fullLossLeft = Number(info.fullLossCount) || 0;
                        // мҡ°м„  full_loss м№ҙмҡҙнҠёл§ҢнҒј мһҗлЈЁлҘј нҶөм§ёлЎң мҶҢл©ё.
                        for (let i = 0; i < fullLossLeft && instances.length > 0; i++) {
                            const inst = instances[0];
                            inventory.consumeWeaponUse(inst, 0, true);
                            // instances л°°м—ҙ лҸҷкё°нҷ” (м ңкұ°лҗҗмңјлҜҖлЎң pop)
                            instances.shift();
                        }
                        // лӮЁмқҖ мқјл°ҳ м°Ёк°җлҹү = used - (full_lossлЎң лӮ лҰ° durability н•©кі„) кі„мӮ°мқҙ ліөмһЎн•ҳлӢҲ,
                        // weaponUsage.usedлҠ” мқҙлҜё fullLossлҘј нҸ¬н•Ён•ң мҙқлҹүмқҙлҜҖлЎң мқјл°ҳ м°Ёк°җл¶„л§Ң л¶„лҰ¬.
                        //   мқјл°ҳ = used - (fullLossCount лҸҷм•Ҳ мҶҢл©ён•ң durabilityмқҳ н•©).
                        //   fullLossм—җм„ң мҶҢл©ён•ң durabilityлҠ” к·ё мһҗлЈЁмқҳ durabilityLeftмҳҖмқҢ вҖ” м¶”м Ғмқҙ лІҲкұ°лЎӯлӢӨ.
                        //   к°„лӢЁнҷ”: combatмқҳ weaponStateлҘј к·ёлҢҖлЎң лҜҝкі , fullLossCountл§ҢнҒј мһҗлЈЁлҘј мҶҢл©ён•ҳлҠ”
                        //   кІғмңјлЎң лҒқлӮңлӢӨл©ҙ(мқёмҠӨн„ҙмҠӨ 1мһҗлЈЁлқјлҠ” кіөнҶө мјҖмқҙмҠӨм—җм„ң м •нҷ•), лӮЁмқҖ мқјл°ҳ м°Ёк°җмқҖ
                        //   "used - fullLossлЎң лӮ лҰ° durability"лҘј мҲҳлҸҷ кі„мӮ°. н•ҳм§Җл§Ң combat мӘҪмқҙ лӢЁмқј
                        //   weaponState лҚ©м–ҙлҰ¬лЎң мІҳлҰ¬н•ҳлҜҖлЎң, м—¬кё°м„  'fullLossCount'к°Җ 1мқҙл©ҙ к·ё мһҗлЈЁлҘј нғңмҡҙ кІғмңјлЎң
                        //   мў…лЈҢ. лӮҳлЁём§Җ н„ҙмқҖ мқјл°ҳ м°Ёк°җ.
                        //   вҶ’ лҚ” лӢЁмҲңн•ң н•ҙм„қ: usedм—җм„ң fullLossлЎң мқҙлҜё мҶҢлӘЁлҗң durability(instances[0]мқҳ мӣҗлһҳ к°’)лҘј
                        //     л№јкі  лӮЁмқҖ л§ҢнҒј мқјл°ҳ м°Ёк°җ. к·ёлҹ¬лӮҳ нҳ„ лӘЁлҚёмқҖ 'л¬ҙкё° 1мһҗлЈЁ' кё°мӨҖмқҙлҜҖлЎң
                        //     fullLossCountвүҘ1мқҙл©ҙ к·ё мһҗлЈЁ мҶҢл©ёлЎң лҒқлӮҳкі  лӮҳлЁём§Җ н„ҙмқҖ auto-failмқҙ лҗҗмқ„ кІғмқҙлӢӨ.
                        //   кІ°лЎ : fullLossCountвүҘ1мқҙл©ҙ мқјл°ҳ м°Ёк°җмқҖ кұҙл„ҲлңҖ.
                        if ((Number(info.fullLossCount) || 0) === 0) {
                            let decLeft = Number(info.used) || 0;
                            for (const inst of instances) {
                                if (decLeft <= 0) break;
                                const canDec = Math.min(decLeft, (inst.durabilityLeft || 0));
                                if (canDec > 0) {
                                    inventory.consumeWeaponUse(inst, canDec, false);
                                    decLeft -= canDec;
                                }
                            }
                        }
                        const usedTotal = Number(info.used) || 0;
                        if (usedTotal > 0) {
                            consumedSummary.push(`${displayName} лӮҙкө¬ ${usedTotal}`);
                        }
                        if (info.broken) {
                            consumedSummary.push(`${displayName} нҢҢмҶҗ`);
                        }
                    }

                    // D-150: л°©м–ҙкө¬ м°Ёк°җ вҖ” armorUsage {armorItemId: {used, broken, durabilityFinal}}.
                    //   мқёмҠӨн„ҙмҠӨ лӢЁмң„ м¶”м Ғ. broken=trueл©ҙ мқёлІӨм—җм„ң м ңкұ°.
                    const armorUsage = (result && result.armorUsage) || {};
                    for (const [armorItemId, info] of Object.entries(armorUsage)) {
                        const itemId = (typeof armorItemId === 'string' && /^\d/.test(armorItemId))
                            ? Number(armorItemId) : armorItemId;
                        const inst = inventory.items.find(it =>
                            it.id === itemId || String(it.id) === String(armorItemId));
                        if (!inst) continue;
                        const def = InventorySystem.resolveDef(inst.type) || {};
                        const displayName = def.name || inst.type;
                        if (info.broken) {
                            inventory.removeItem(inst);
                            inventory.items = inventory.items.filter(x => x.id !== inst.id);
                            consumedSummary.push(`${displayName} нҢҢмҶҗ`);
                        } else {
                            inst.durabilityLeft = Number(info.durabilityFinal) || 0;
                            const used = Number(info.used) || 0;
                            if (used > 0) consumedSummary.push(`${displayName} лӮҙкө¬ ${used}`);
                        }
                    }
                }
                // D-124 (мҡ”н•ң м§ҖмӢң): мӢңмҠӨн…ңмҠӨлҹ¬мҡҙ (мҶҢлӘЁ: ...) л¶Җк°Җ н…ҚмҠӨнҠё м ңкұ° вҖ” л©”мӢңм§Җм—”
                //   1мқём№ӯ мһҗм—°м–ҙл§Ң. мһғм–ҙлІ„лҰ° мһҗмӣҗмқҖ мқёлІӨВ·лӮҙкө¬лҸ„ н‘ңмӢңлЎң мқём§Җ к°ҖлҠҘ.
                const withConsumed = (msg) => msg;

                // D-74: н”Ңл Ҳмқҙм–ҙ HP м°Ёк°җ вҖ” prey.attackкіј мң м Җ м№ҙл“ң defense лҢҖкІ° кІ°кіј лҲ„м Ғ лҢҖлҜём§Җ.
                //   HP 0мқҙл©ҙ кІҢмһ„мҳӨлІ„('health'). кё°мЎҙ мІҙл Ҙ мӮ¬л§қ кІҪлЎң мһ¬мӮ¬мҡ©.
                //   мӮ¬л§қ мІҙнҒ¬лҠ” victory ліҙмғҒ л“ұкіј лҸ…лҰҪм ҒмңјлЎң м Ғмҡ©(м „нҲ¬м—җм„ң мһЎм•ҳм–ҙлҸ„ 0 HPл©ҙ мӮ¬л§қ).
                const dmgTaken = Math.max(0, Number(result && result.playerDamageTaken) || 0);
                if (dmgTaken > 0) {
                    setHealth(h => {
                        const nh = Math.max(0, h - dmgTaken);
                        if (nh <= 0) {
                            setGameOver(true);
                            setDeathReason('health');
                        }
                        return nh;
                    });
                }

                if (outcome === 'victory') {
                    // preys м ңкұ°
                    setPreys(prev => prev.filter(p => p.id !== prey.id));
                    // trace м ңкұ°
                    setPreyTraceTiles(prev => {
                        const next = new Set(prev);
                        next.delete(prey.tileId);
                        return next;
                    });
                    // D-110: мӮ¬лғҘ мІҳм№ҳ м№ҙмҡҙнҠё лҲ„м Ғ. prey м •мқҳмқҳ levelлЎң л¶„кё°.
                    const preyDataArrKill = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const killDef = preyDataArrKill.find(p => p && p.id === prey.preyType) || {};
                    const lvl = Number(killDef.level) || 1;
                    setRunStats(s => ({
                        ...s,
                        l1PreyKills: s.l1PreyKills + (lvl === 1 ? 1 : 0),
                        l2PreyKills: s.l2PreyKills + (lvl === 2 ? 1 : 0)
                    }));
                    // D-71: prey.drop_item мҡ°м„ , м—Ҷмңјл©ҙ 'meat' нҸҙл°ұ. мқҙлҰ„В·л“ұкёүмқҖ resolveDefлЎң лҸҷм Ғ мЎ°нҡҢ.
                    const dropId = (prey.drop_item && String(prey.drop_item).trim()) || 'meat';
                    const dropDef = InventorySystem.resolveDef(dropId) || {};
                    const dropName = dropDef.name || dropId;
                    const dropGrade = Number(dropDef.grade) || 1;
                    const dropCount = prey.meat || 0;
                    let added = 0;
                    let overflow = 0;
                    for (let i = 0; i < dropCount; i++) {
                        const ok = inventory.addItem(dropId);
                        if (ok) added += 1;
                        else overflow += 1;
                    }
                    // D-161: LootToast нҸҗкё° вҖ” нҡҚл“қмқҖ л©”мӢңм§Җм—җ мқёлқјмқё мқҙлӘЁм§Җ + мқҙлҰ„мңјлЎң нқЎмҲҳ.
                    const itemEmojiLocal = (typeof itemEmoji === 'function') ? itemEmoji(dropId) : '';
                    let msg = `мӮ¬лғҘм—җ м„ұкіөн–ҲлӢӨ. ${itemEmojiLocal ? itemEmojiLocal + ' ' : ''}${dropName} ${added}мқ„(лҘј) м–»м—ҲлӢӨ.`;
                    if (overflow > 0) msg += ` (к°Җл°©мқҙ к°Җл“қ м°Ё ${overflow}к°ңлҠ” л‘җкі  мҷ”лӢӨ.)`;
                    setMessage(withConsumed(msg));
                    setActiveHunt(null);
                } else if (outcome === 'prey_fled') {
                    // D-47: л°ҳл“ңмӢң лӢӨлҘё нғҖмқјлЎң мқҙлҸҷ вҖ” 3лӢЁкі„ fallback.
                    //   1м°Ё: habitat л§Өм№ӯ + мқём ‘ + reserved(л№Ҳ/ліҙмҠӨ/нғҲм¶ңкө¬/лӢӨлҘёprey) м ңмҷё
                    //   2м°Ё: habitat л¬ҙкҙҖ мқём ‘ + reserved м ңмҷё
                    //   3м°Ё: мқём ‘ л¬ҙкҙҖ (л§ө м „мІҙ non-reserved) вҖ” "л©ҖлҰ¬ лҶ“м№ң кІғмІҳлҹј" мқҙлҸҷ
                    // к·ёлҰ¬кі  лҸ„л§қк°„ мғҲ нғҖмқјм—җ trace(рҹ‘Ј) м¶”к°Җ вҖ” н”Ңл Ҳмқҙм–ҙм—җкІҢ лӢЁм„ң м ңкіө.
                    const preyData = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                    const preyDef = preyData.find(p => p.id === prey.preyType) || {};
                    const habitat = (Array.isArray(preyDef.habitat) && preyDef.habitat.length > 0)
                        ? preyDef.habitat
                        : (PREY_HABITAT[prey.preyType] || []);
                    const bossPos = boss ? boss.getPosition() : -1;
                    const occupiedByOther = new Set(
                        (preys || []).filter(p => p.id !== prey.id).map(p => p.tileId)
                    );
                    const notReserved = (nid) => {
                        if (nid === prey.tileId) return false;
                        const t = tiles[nid];
                        if (!t || t.isEmpty) return false;
                        if (nid === bossPos) return false;
                        if (t.type === 'exit') return false;
                        if (occupiedByOther.has(nid)) return false;
                        return true;
                    };
                    const currentPreyTile = tiles[prey.tileId];
                    const neighborIds = (currentPreyTile && currentPreyTile.connections) || [];
                    let candidates = neighborIds.filter(nid => {
                        if (!notReserved(nid)) return false;
                        if (habitat.length > 0 && !habitat.includes(tiles[nid].region)) return false;
                        return true;
                    });
                    if (candidates.length === 0) {
                        candidates = neighborIds.filter(notReserved);
                    }
                    if (candidates.length === 0) {
                        candidates = tiles.map((_, i) => i).filter(notReserved);
                    }

                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    // D-60: мқҙ prey к°ңмІҙмқҳ лҸ„мЈј нҡҹмҲҳ лҲ„м Ғ. лӢӨмқҢ мһ¬мЎ°мҡ° мӢң н„ҙлі„ нҡҢн”јмңЁм—җм„ң *10 м°Ёк°җ.
                    if (candidates.length > 0) {
                        const dest = candidates[Math.floor(Math.random() * candidates.length)];
                        const fromTile = prey.tileId;
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, tileId: dest, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                        // мӣҗ нғҖмқј trace м ңкұ° + лҸ„л§қк°„ мғҲ нғҖмқјм—җ trace м¶”к°Җ.
                        setPreyTraceTiles(prev => {
                            const next = new Set(prev);
                            next.delete(fromTile);
                            next.add(dest);
                            return next;
                        });
                    } else {
                        // мқҙлЎ мғҒ лҸ„лӢ¬ л¶Ҳк°Җ (л§ө м „мІҙм—җ non-reserved нғҖмқјмқҙ н•ҳлӮҳлҸ„ м—ҶлҠ” кІҪмҡ°). м•Ҳм „л§қ.
                        setPreys(prev => prev.map(p =>
                            p.id === prey.id
                                ? { ...p, hpCurrent: hpFinal, fleeCount: (p.fleeCount || 0) + 1 }
                                : p
                        ));
                    }
                    setMessage(withConsumed('мӮ¬лғҘк°җмқҙ лҸ„л§қміӨлӢӨ. л°ңмһҗкөӯмқҙ лӮЁм•„мһҲлӢӨ.'));
                    setActiveHunt(null);
                } else if (outcome === 'player_fled') {
                    // н”Ңл Ҳмқҙм–ҙ лҸ„мЈј вҖ” preyлҠ” м ңмһҗлҰ¬м§Җл§Ң мӨҖ лҚ°лҜём§ҖлҠ” мң м§Җ.
                    const hpFinal = (typeof result.preyHpFinal === 'number') ? result.preyHpFinal : prey.hp;
                    setPreys(prev => prev.map(p =>
                        p.id === prey.id ? { ...p, hpCurrent: hpFinal } : p
                    ));
                    setMessage(withConsumed('мӮ¬лғҘмқ„ нҸ¬кё°н•ҳкі  л¬јлҹ¬м„°лӢӨ.'));
                    setActiveHunt(null);
                } else {
                    setActiveHunt(null);
                }
            };

            // кІҢмһ„ мҙҲкё°нҷ”
            useEffect(() => {
                initializeGame();
            }, []);

            function initializeGame() {
                const mapGen = new MapGenerator(MAP_SIZE);
                const { tiles: newTiles, playerStart, bossPos, exitPos } = mapGen.generate();
                
                // getHexNeighborsлҘј мӮ¬мҡ©н•ҳм—¬ л¬јлҰ¬м ҒмңјлЎң мқём ‘н•ң лӘЁл“  нғҖмқјмқ„ discoveredлЎң м„Өм •
                const positions = mapGen.generateHexPositions();
                const allNeighbors = mapGen.getHexNeighbors(playerStart, positions);
                allNeighbors.forEach(neighborId => {
                    newTiles[neighborId].discovered = true;
                });
                
                setTiles(newTiles);
                setCurrentTile(playerStart);
                setExitTileId(typeof exitPos === 'number' ? exitPos : -1);
                // кІҪлЎң кё°лЎқ мҙҲкё°нҷ” вҖ” мӢңмһ‘ нғҖмқјмқҙ мІ« л°©л¬ём§Җ.
                setMoveHistory([playerStart]);

                // D-126: мқҙлІӨнҠё мҠ¬лЎҜ вҶҗ н’Җ л№„ліөмӣҗ м¶”мІЁ.
                //   events.events л°°м—ҙмқ„ м…”н”Ңн•ҙм„ң event нғҖмқј мқёлҚұмҠӨм—җ 1:1лЎң л°°м •.
                //   н’Җ < мҠ¬лЎҜмқҙл©ҙ лӮЁлҠ” мҠ¬лЎҜмқҖ лҜёл°°м • вҶ’ лҸ„м°© мӢң normal л¶„кё°лЎң нҸҙл°ұ.
                {
                    const eventBundle = (window.TTD_DATA && window.TTD_DATA.EVENTS) || { events: [], pool: {} };
                    const eventSlots = newTiles.filter(t => t.type === 'event').map(t => t.id);
                    const eventDefs = Array.isArray(eventBundle.events) ? eventBundle.events.slice() : [];
                    // м…”н”Ң (Fisher-Yates).
                    for (let i = eventDefs.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [eventDefs[i], eventDefs[j]] = [eventDefs[j], eventDefs[i]];
                    }
                    const assignments = {};
                    const max = Math.min(eventSlots.length, eventDefs.length);
                    for (let i = 0; i < max; i++) {
                        assignments[eventSlots[i]] = eventDefs[i].id;
                    }
