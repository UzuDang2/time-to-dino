                //   HAND_SIZE(5)장 새로 드로우. 덱 소진 시 무덤 셔플해서 덱 재구성.
                //   이전 '미사용 카드 유지' 규칙 폐기. hunt_start 카드도 자연 소멸 (손패에
                //   있던 hunt_start가 무덤행 — 재조우 시 새로 생성되므로 무덤 쪽에서 빼둘 필요 없음).
                //   단, hunt_start는 overflow로 HAND_SIZE 카운트에서 제외.
                const preyHere = (preys || []).find(p => p.tileId === targetId);

                // 1) 손패 전부 무덤으로. 단, hunt_start(overflow)는 아예 소멸 — 무덤/덱 풀에
                //    포함되면 안 됨 (D-65 요한 원문). 기존 graveyard에 섞여 있던 hunt_start도 청소.
                let newGraveyard = [...graveyard, ...hand]
                    .filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newDeck = [...deck].filter(c => c && c.id !== 'hunt_start' && !c.overflow);
                let newHand = [];

                // 2) 덱에서 HAND_SIZE 드로우. 덱 소진 시 무덤 셔플.
                while (newHand.length < HAND_SIZE) {
                    if (newDeck.length === 0) {
                        if (newGraveyard.length === 0) break;
                        newDeck = shuffleDeck(newGraveyard);
                        newGraveyard = [];
                    }
                    newHand.push(newDeck.shift());
                }

                // 3) hunt_start 카드 push는 보스 이동 이후로 미룬다 (D-93).
                //    이유: 같은 턴에 보스가 같은 타일 prey를 포식 시작하면 prey가 즉시 사라지므로
                //    hunt_start를 손패에 넣어도 더 이상 유효한 대상이 없다(유저가 카드 못 씀).
                //    setHand/Deck/Graveyard도 보스 이동 후로 이관 — 동일 프레임이라 시각 차이 없음.
                setDeck(newDeck);
                setGraveyard(newGraveyard);
                setGraveyardFlashKey(k => k + 1);
                
                // 보스 이동 로직
                // D-62: 일반 모드 랜덤 이동을 boss.moveRandom() 위임 —
                //   미방문 타일 우선 로직이 자연히 적용된다(전맵 순회 강화).
                //   boss.tiles 참조는 초기화 시 주입된 tiles — moveTo에서 만든 newTiles와
                //   동일 객체(참조 공유). 안전을 위해 호출 전 최신 tiles 반영.
                // D-77: 포식 이동 우선권 — boss.onPlayerMove에 L2 preys를 넘기면
                //   타일거리 2 이내 L2 prey가 있으면 포식 경로가 우선 실행된다.
                //   포식 중이 아니면 chase/일반 기존 경로 그대로.
                boss.tiles = newTiles;
                const bossStartPos = boss.position;
                let newBossPos = boss.position;

                if (movedDetection >= 80 && !boss.chaseMode) {
                    boss.chaseMode = true;
                }

                // D-77: L2 prey만 추려서 보스에 전달 (포식 후보).
                const preyDataArrBossMove = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                const l2Preys = (preys || []).filter(p => {
                    const def = preyDataArrBossMove.find(pd => pd && pd.id === p.preyType);
                    return def && def.level === 2;
                });
                // D-94 (2026-04-25): 거대한 먹이가 놓인 타일을 synthetic prey로 변환해 동일 경로로 처리.
                //   level=2 + isBait 플래그. boss는 prey와 구분 없이 BFS 추격→포식 시작.
                //   onPredationStart 콜백에서 prey.isBait 분기로 baitTiles 제거.
                const baitAsPreys = Array.from(baitTiles).map(tid => ({
                    id: 'bait:' + tid,
                    tileId: tid,
                    level: 2,
                    preyType: '__bait__',
                    isBait: true
                }));
                const allTargets = [...l2Preys, ...baitAsPreys];

                // D-86 (2026-04-24 요한 지시): 플레이어 1이동 = 보스 1이동.
                // 기존 caller 게이트(`chaseMode || newMoveCount % 2 === 0`)를 제거.
                // 보스 클래스 내부도 1턴=1칸 고정이므로(이전 D-86 boss.js) 매 호출마다
                // 정확히 1칸. 일반/추격 무관하게 동기화된 템포 유지.
                boss.onPlayerMove(targetId, movedDetection, allTargets);
                newBossPos = boss.position;

                // D-165: 포식 보스 흔적 클리어 — 보스가 그 타일을 떠났으면 흔적 해제.
                //   유지 조건: feedingBossTraceTile === newBossPos (그 자리에 아직 있음).
                if (feedingBossTraceTile != null && feedingBossTraceTile !== newBossPos) {
                    setFeedingBossTraceTile(null);
                }

                // D-157: 설치된 덫 발동 체크. 보스가 placedTrap이 있는 타일에 들어오면
                //   1턴 정지(predationStay 재활용) + 덫 마커 제거 + 시네마틱 패닝 + 보스 가시화.
                //   포식 중(predationStay>0)은 이미 정지 상태이므로 덧대지 않는다.
                {
                    const bossTile = newTiles[newBossPos];
                    const tileMoved = newBossPos !== bossStartPos;
                    if (bossTile && bossTile.placedTrap && bossTile.placedTrap.type === 'snare' && tileMoved && boss.predationStay <= 0) {
                        // 1) 덫 발동 — 보스 1턴 정지(predationStay=1로 다음 onPlayerMove에서 -=1 후 0이 되어 자동 해제).
                        //    predationStay는 본래 포식용이지만 predationTarget이 null이면 단순 정지로 동작한다(onPlayerMove 분기 참조).
                        //    포식 콜백을 임시로 떼두지 않으면 onPredationComplete가 호출되어 사체 타일이 잘못 만들어지므로,
                        //    predationStay 1턴 + predationTarget=null 상태이면 onPlayerMove의 if(predationStay>0) 블록 안에서
                        //    completedAt callback은 호출되지만 콜백 본문은 prey가 없을 때 안전. 그래도 사이드 이펙 방지를 위해
                        //    onPredationComplete 가드에서 targetId가 null이면 사체 생성 skip하도록 따로 분기.
                        boss.predationStay = 1;
                        boss.predationTarget = null;
                        boss.predationPreyType = null;

                        // 2) 덫 마커 제거.
                        const trapTileId = newBossPos;
                        setTiles(prev => prev.map(t => t.id === trapTileId ? { ...t, placedTrap: null } : t));

                        // 3) D-161: 토스트 폐기 — 메시지에 합성. carcassNarration 자리와 같은 합성 사이클이지만,
                        //    덫 발동은 보스 이동 후 즉시 알려야 함 → 메시지에 직접 prepend.
                        setMessage(prev => composeNarration([prev, '🪤 저 멀리서 덫에 걸린 짐승의 울부짖음이 들려온다.']));

                        // 4) 시네마틱 — 보스 위치로 패닝 → 1.2초 정지 → 원위치 복귀.
                        //    중간에 보스 가시화. 시네마틱 모듈 미로드 시 fallback(즉시 가시화).
                        const trapTile = newTiles[trapTileId];
                        const tilePixel = trapTile && trapTile.position ? { x: trapTile.position.x, y: trapTile.position.y } : null;
                        const scrollEl = document.querySelector('.map-container');
                        if (window.CameraCinematic && tilePixel && scrollEl) {
                            window.CameraCinematic.panToTile({
                                scrollEl,
                                tilePixelXY: tilePixel,
                                panMs: 800,
                                holdMs: 1200,
                                returnMs: 600,
                                onMidway: () => { setBossVisible(true); },
                                onDone: () => { /* 시네마틱 종료 — 보스 가시화는 다음 이동까지 유지. */ }
                            });
                        } else {
                            setBossVisible(true);
                        }
                    }
                }

                // D-110: 보스 근접(거리 ≤2) 진입 카운트. 같은 플레이어 타일에서 재진입은 dedup.
                //   bossDangerSeenTilesRef는 useRef Set — 첫 진입 시 add + score+1.
                //   조우 자체(거리 0)는 게임오버라 별도 처리 안 해도 됨(dist≤2 카운트엔 포함).
                if (typeof boss.calculateDistance === 'function') {
                    const dist = boss.calculateDistance(targetId, newBossPos);
                    if (dist <= 2 && !bossDangerSeenTilesRef.current.has(targetId)) {
                        bossDangerSeenTilesRef.current.add(targetId);
                        setRunStats(s => ({ ...s, bossDangerEntered: s.bossDangerEntered + 1 }));
                    }
                }

                // D-53: 보스가 실제로 이동한 경우에만 history에 push. 같은 자리 유지면 skip.
                if (newBossPos !== bossStartPos) {
                    setBossMoveHistory(prev => (
                        prev.length > 0 && prev[prev.length - 1] === newBossPos
                            ? prev
                            : [...prev, newBossPos]
                    ));
                }
                
                const encounter = newBossPos === targetId;
                const tile = newTiles[targetId];
                let msg = '';

                // D-93 (2026-04-25 요한 지시): 보스가 포식 중인 타일에 유저가 도착하면
                //   게임 오버 대신 "정신없이 식사 중" 안내. D-90 모달 톤과 일관 — 보스는
                //   먹이에 정신 팔려 플레이어를 알아차리지 못함. 식사가 끝나는 다음 턴부터는
                //   다시 위협이라 빠져나가야 함(별도 분기 없이 일반 onPlayerMove 흐름이 처리).
                const inPredationSafe = encounter && boss.predationStay > 0;

                // D-161: 합성 조각 — 사냥감 발견. 이모지 + 이름 + (HP 부분 노출) 인라인.
                let preyNarration = '';
                if (preyHere && !inPredationSafe) {
                    newHand.push({
                        ...HUNT_START_CARD,
                        uid: `hunt_start_${preyHere.id}_${Date.now()}`,
                        target: {
                            tileId: targetId,
                            preyId: preyHere.id,
                            preyType: preyHere.preyType
                        }
                    });
                    if (!isWaitInPlace) {
                        const preyDataArr = (window.TTD_DATA && window.TTD_DATA.PREY) || [];
                        const foundDef = preyDataArr.find(p => p.id === preyHere.preyType) || {};
                        const hpNote = (typeof preyHere.hpCurrent === 'number' && preyHere.hpCurrent < (foundDef.hp || 0))
                            ? ` (HP ${preyHere.hpCurrent}/${foundDef.hp})`
                            : '';
                        const emj = PREY_EMOJI[preyHere.preyType] || '❓';
                        preyNarration = `${emj} ${foundDef.name || preyHere.preyType}을(를) 발견했다${hpNote}.`;
                    }
                }
                setHand(newHand);

                // D-161: 타일 type / 보스 조우·포식 / 함정 분기 — 모두 내레이션 조각으로 합성.
                //   tileNarration : 타일 이벤트(풍족한 땅/함정 회피/이벤트 진입/탈출구) 1줄.
                //   bossEncounterNarration : 보스 조우/포식 1줄(있으면 다른 조각 덮어쓰기 우선순위).
                let tileNarration = '';
                let bossEncounterNarration = '';

                if (encounter && !inPredationSafe) {
                    // D-56: 보스 조우 시 점프스케어 선재생 → 0.55s 뒤 게임오버.
                    setBossJumpscare(true);
                    setTimeout(() => {
                        setBossJumpscare(false);
                        setGameOver(true);
                        setDeathReason('boss');
                    }, 550);
                    bossEncounterNarration = '🦖 거대한 짐승과 정면으로 마주쳤다… 발이 얼어붙는다.';
                } else if (inPredationSafe) {
                    // 같은 타일이지만 보스가 식사에 정신없음 — 사체 + 보스 + 유저 한 칸에 공존.
                    setBossVisible(true);
                    // D-165: 이 타일에 포식 중 보스가 있었음을 기록.
                    //   유저가 도망쳐 다음 턴에 떠나도 흔적 마커가 유지된다.
                    //   보스가 그 타일을 떠나면 아래 클리어 로직에서 자동 해제.
                    setFeedingBossTraceTile(targetId);
                    bossEncounterNarration = '🦖 거대한 짐승이 식사에 정신이 팔려있다. 들키기 전에 빠져나가자!';
                } else if (tile.type === 'normal') {
                    // 평범한 타일은 별도 멘트 없음 — 인트로/재방문 + 사냥감/사체 조각만으로 충분.
                    tileNarration = '';
                } else if (tile.type === 'good') {
                    // D-52: '풍족한 땅'.
                    tileNarration = '🌾 자원과 먹거리가 풍부한 곳이다. 풍족한 땅을 발견했다!';
                } else if (tile.type === 'trap') {
                    // D-156: wood_shard 자동 차단 가드.
                    let shardItem = null;
                    if (inventory && Array.isArray(inventory.items)) {
                        shardItem = inventory.items.find(it => it && it.type === 'wood_shard');
                    }
                    if (shardItem) {
                        inventory.removeItem(shardItem);
                        inventory.items = inventory.items.filter(i => i.id !== shardItem.id);
                        setInventory(Object.create(Object.getPrototypeOf(inventory), Object.getOwnPropertyDescriptors(inventory)));
                        tileNarration = '🪵 나무 조각이 부러지며 발 밑의 쇠덫이 튕겨 올라갔다.';
                        // 함정 타일은 normal로 강등.
                        setTiles(prev => prev.map(t => t.id === targetId ? { ...t, type: 'normal' } : t));
                    } else {
                        const damage = Math.floor(Math.random() * 2) + 1;
                        setHealth(health - damage);
                        tileNarration = `⚠️ 함정! 생명력 -${damage}.`;
                        // 이벤트 모달 표시 (데미지 정보 포함)
                        setEventTile({ ...tile, damage });
                    }
                } else if (tile.type === 'event') {
                    // D-126: 이벤트 타일 — 모달 트리거. 모달이 직접 텍스트를 보여주므로
                    //   여기 메시지는 짧은 도입 한 줄.
                    const eventId = eventTileAssignments[tile.id];
                    if (eventId) {
                        tileNarration = '낯선 풍경이 발걸음을 붙잡는다.';
                        setEventChoice({ tileId: tile.id, eventId });
                    }
                } else if (tile.type === 'exit') {
                    tileNarration = '🚪 탈출구다!';
                }

                // D-161: 보스 추격 모드 인라인 강조.
                let chaseNarration = '';
                if (boss.chaseMode && !encounter) {
                    chaseNarration = '⚠️ 거대한 짐승의 발소리가 등 뒤로 쫓아온다.';
                }

                // D-126: 상태이상 tick — 매 이동 후 1회. tick_effect + 라인 누적.
                let statusLines = [];
                if (window.StatusEffects && playerStatuses.length > 0) {
                    const tickCtx = {
                        applyStat: (stat, delta) => {
                            if (stat === 'hunger') setHunger(p => Math.max(0, Math.min(MAX_HUNGER, p + delta)));
                            else if (stat === 'health') setHealth(p => Math.max(0, Math.min(MAX_HEALTH, p + delta)));
                        },
                        addLogLine: (l) => { if (l) statusLines.push(l); }
                    };
                    const { list, lines } = window.StatusEffects.tick(playerStatuses, tickCtx);
                    setPlayerStatuses(list);
                    if (lines.length > 0) statusLines.push(...lines);
                }

                // D-161: HP/배고픔 임계치 — HUD 게이지바 warning과 동일한 임계.
                //   진입 1회 강한 한 줄 + 임계치 안에서는 N(STAT_WARN_REMIND_TURNS)턴마다 리마인드.
                //   예측 값(이 이동에서 차감 후 값)으로 판정 — 이번 이동의 hunger/health 적용 후 상태.
                //   현재 시점에서 hunger는 hunger-1 처리됐고, health는 함정·tick으로 변동 가능.
                //   여기서는 setter 직후 동기 값을 모르므로 "이전 턴까지의 임계 진입"을 기준으로 ref만 유지하고,
                //   다음 turn(다음 moveTo)에서 진입 검사. 현재 턴의 enter 검출만은 health/hunger 마지막 set 결과를 기다려야 하지만,
                //   useEffect 없이도 신뢰 가능한 시점은 이 함수의 직전 state. → useEffect로 별도 처리.
                //   여기 moveTo 합성에서는 statWarnRef의 "현재 사이클 라인"만 끌어와 합성.
                const warnLines = [];
                {
                    const sw = statWarnRef.current;
                    if (sw.inHealth) {
                        sw.sinceHealth += 1;
                        if (sw.sinceHealth % STAT_WARN_REMIND_TURNS === 0) warnLines.push(STAT_WARN_LINES.healthRemind);
                    }
                    if (sw.inHunger) {
                        sw.sinceHunger += 1;
                        if (sw.sinceHunger % STAT_WARN_REMIND_TURNS === 0) warnLines.push(STAT_WARN_LINES.hungerRemind);
                    }
                }

                // 합성: [지역 인트로] [사체] [사냥감 발견] [타일/보스] [추격] [상태이상 라인…] [임계치 리마인드…].
                //   bossEncounterNarration이 있으면 tileNarration 무시 (조우가 우선).
                const finalMsg = composeNarration([
                    narrationIntro,
                    carcassNarration,
                    preyNarration,
                    bossEncounterNarration || tileNarration,
                    chaseNarration,
                    ...statusLines,
                    ...warnLines
                ]);

                setMessage(finalMsg);
            };

            // D-109: 베이스캠프 귀환 — GameEndModal/맵 보기 footer에서 호출.
            //   payload는 App.handleRunEnd가 인벤 자원 인입(승리만)·runs 카운팅에 사용.
            //   호출 후 App이 view='camp'로 전환 → Game은 자동 unmount(다음 탐험 시 fresh state).
            // D-110: selectedItems(LootResult에서 선택한 itemId 배열)도 함께 전달.
            //   미지정이면 기존처럼 전체 인입(GameEndModal에서 [전리품 확인] 안 누르고 직접 귀환).
            //   요한 지시 (2026-04-24): 시간 잔여 점수 → 이동거리(고유 타일) 점수로 교체.
            //   uniqueTilesVisited는 moveHistory(플레이어가 실제 위치한 타일 id 누적)의 Set 크기.
            const returnToCamp = (selectedIds = null) => {
                const outcome = victory ? 'victory' : 'death';
                if (typeof onRunEnd === 'function') {
                    const uniqueTilesVisited = new Set(moveHistory).size;
                    onRunEnd({
                        outcome,
                        runInventory: inventory,  // 승리 시 App에서 인입 처리(selectedIds 반영), 사망 시 폐기.
                        selectedIds,
                        runStats,
                        runFinal: {
                            health, hunger, time, maxTime, detection, uniqueTilesVisited
                        }
                    });
                }
            };

            // D-110: 전리품 결과창 토글. GameEndModal [📦 전리품 확인]에서 setShowLoot(true).
            //   LootResultScreen confirm → returnToCamp(selectedIds) → App이 인입 + view 전환.
            //   cancel → setShowLoot(false) → GameEndModal 복귀.
            const [showLoot, setShowLoot] = useState(false);
            // GameEndModal·LootResultScreen 양쪽이 참조하는 런 스냅샷.

                    {lootPickup && inventory && (

                            drops={lootPickup.drops}

                            onConfirm={(selectedIndices) => {
                                const drops = lootPickup.drops || [];
                                const counter = new Map();
                                let overflow = 0;
                                for (const idx of selectedIndices) {
                                    const t = drops[idx];
                                    if (!t) continue;
                                    const ok = inventory.addItem(t);
                                    if (ok) counter.set(t, (counter.get(t) || 0) + 1);
                                    else overflow += 1;
                                }
                                // D-161: LootToast 폐기 — 메시지에 이모지 + 이름 인라인 합성.
                                const nameParts = [];
                                counter.forEach((count, item) => {

                                    const displayName = def.name || item;
                                    const emj = (typeof itemEmoji === 'function') ? itemEmoji(item) : '';
                                    const namePart = `${emj ? emj + ' ' : ''}${displayName}`;

                                let pickupMsg = '';
                                if (nameParts.length > 0) pickupMsg += `${nameParts.join(', ')}을(를) 챙겼다.`;

        // ============================================
        // D-109 (2026-04-24): App — 게임 흐름 컨트롤러.
        //   view: 'intro' | 'play' | 'camp'
        //   campState 영속화(localStorage 'ttd:campState:v1') — load on mount, save on change.
        //   첫 마운트:
        //     - localStorage 없음 → view='intro'
        //     - localStorage 있음 → view='camp' (시나리오 스킵, 새로고침은 항상 캠프)
        //   진행 중 런(view='play')은 새로고침 시 폐기됨 (의도된 동작).
        // ============================================

        const CAMP_STATE_KEY = 'ttd:campState:v1';
        // D-163 (2026-04-29 요한): 메인 슬롯 직전값 1단 백업.
        //   저장 시 직전 정상값을 backup 슬롯으로 회전 → 메인 파싱 실패 시 fallback.
        //   "데이터 초기화"에서만 둘 다 지움.
        const CAMP_STATE_BACKUP_KEY = 'ttd:campState:v1:backup';

        // D-148: 가방(pack) 생성 헬퍼 — bonusSlots 만큼 disabled 줄임.
        //   기본 disabled: (0,0), (4,0), (0,1), (4,1) — 좌우 위 구석 4칸.
        //   bonusSlots=1이면 (0,0) 풀어 좌측 위 1칸 활성. 텐트 완수 보상.
        function makePackInventory(bonusSlots) {
            const n = Math.max(0, Math.min(4, Number(bonusSlots) || 0));
            const fullDisabled = [
                { x: 0, y: 0 }, { x: 4, y: 0 },
                { x: 0, y: 1 }, { x: 4, y: 1 }
            ];
            return new InventorySystem(5, 5, { disabled: fullDisabled.slice(n) });
        }

        // 빈 상태(첫 신규 유저).
        // D-113: 보관함은 12x8(rows=12, cols=8 — 세로로 김). 탐험용 가방(pack)은 5x5(D-47 모양).
        // D-147 (2026-04-27 요한): 보관함 12x6로 좁힘 — 세로 모바일에서 더 깔끔.
        // D-148 (2026-04-27 요한): tentBuilt 플래그 — true면 가방 좌측 위 1칸 추가 활성(텐트 보상).
        // D-174 v3 (2026-04-30 요한): 보관함 7x20 — row 0-9 BASE 활성(70칸) + row 10-19 텐트 슬롯(단계마다 row 1줄=7칸 풀림). 모바일 가로 7칸 적합 + 헤더 sticky.
        //   buildingLevels — { [id]: stage } 빌딩 6종 + tent 진행도. 텐트는 tentLevel과 동기.
        //   oneShotInventory — { [key]: count } heal_on_return 등 누적 일회성 효과(D-176+ 사용).
        function makeInitialCampState() {
            return {
                version: 1,
                seenIntro: false,
                firstReturnDone: false,
                tentLevel: 0,
                buildingLevels: {},        // D-174
                oneShotInventory: {},      // D-174
                inventory: makeCampStorageInventory(0),  // D-174 v3: 7x20 + row 10-19 disabled.
                pack: makePackInventory(0),
                quests: { active: [], completed: [] },
                runs: { total: 0, victories: 0, deaths: 0, bestScore: 0, totalScore: 0, lastScore: 0 }
            };
        }

        // D-174 v3 (2026-04-30 요한): 캠프 보관함 7x20 그리드 — 모바일 세로 폭 7 적합 + 아래로 확장.
        //   row 0-9 BASE 활성(70칸). row 10-19(텐트 슬롯) 전체 disabled로 시작, 단계마다 row 1줄(=7칸) 풀림.
        //   풀 텐트(Lv.10): 활성 70(BASE) + 70(텐트 row 10줄) = 140. 영구 disabled 0.
        function makeCampStorageInventory(tentLevel) {
            const ROWS = 20, COLS = 7;
            const TENT_ROW_START = 10;
            const tentDisabled = [];
            for (let y = TENT_ROW_START; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    tentDisabled.push({ x, y });
                }
            }
            const inv = new InventorySystem(ROWS, COLS, { disabled: tentDisabled });
            const lv = Math.max(0, Math.min(TENT_MAX_LEVEL, Number(tentLevel) || 0));
            if (lv > 0) inv.expandStorage(lv * 7);
            return inv;
        }

        // 직렬화 — InventorySystem.items만 {type,x,y,rotation,durabilityLeft} 배열로 보존.
        //   InventorySystem 인스턴스 자체를 JSON.stringify하면 grid 2D배열·class 메타가 따라가
        //   복원 시 메서드가 없어진다. items만 저장 → 로드 시 새 인스턴스 + placeItem 복원.
        // D-113: 무기 durabilityLeft 포함. pack(가방) 인벤도 함께 직렬화.
        function serializeInvItems(inv) {
            if (!inv || !Array.isArray(inv.items)) return [];
            return inv.items.map(it => ({
                type: it.type,
                x: it.x,
                y: it.y,
                rotation: it.rotation || 0,
                ...(typeof it.durabilityLeft === 'number' ? { durabilityLeft: it.durabilityLeft } : {})
            }));
        }
        function serializeCampState(state) {
            if (!state) return null;
            // D-168: tentLevel 우선, 폴백으로 tentBuilt(boolean) 변환. 양쪽 동시 저장으로 다운그레이드 호환.
            const tentLevel = (typeof state.tentLevel === 'number')
                ? Math.max(0, Math.min(TENT_MAX_LEVEL, state.tentLevel))
                : (state.tentBuilt ? 1 : 0);
            // D-174: buildingLevels { [id]: stage } + oneShotInventory { [key]: count }.
            const buildingLevels = (state.buildingLevels && typeof state.buildingLevels === 'object')
                ? { ...state.buildingLevels } : {};
            const oneShotInventory = (state.oneShotInventory && typeof state.oneShotInventory === 'object')
                ? { ...state.oneShotInventory } : {};
            return {
                version: 4,
                seenIntro: !!state.seenIntro,
                firstReturnDone: !!state.firstReturnDone,
                tentLevel,
                tentBuilt: tentLevel >= 1,
                buildingLevels,         // D-174
                oneShotInventory,       // D-174
                inventory: serializeInvItems(state.inventory),
                pack: serializeInvItems(state.pack),
                quests: {
                    active: (state.quests && state.quests.active) || [],
                    completed: (state.quests && state.quests.completed) || []
                },
                runs: {
                    total: Number((state.runs && state.runs.total) || 0),
                    victories: Number((state.runs && state.runs.victories) || 0),
                    deaths: Number((state.runs && state.runs.deaths) || 0),
                    bestScore: Number((state.runs && state.runs.bestScore) || 0),
                    totalScore: Number((state.runs && state.runs.totalScore) || 0),
                    lastScore: Number((state.runs && state.runs.lastScore) || 0)
                }
            };
        }

        // 아이템 항목을 InventorySystem 인스턴스에 복원.
        //   좌표가 유효하면 placeItem으로, 아니면 addItem(type)으로 폴백.
        //   D-113: durabilityLeft 보존. 인스턴스 직접 placement (rotation·durability 모두 유지).
        function restoreItemEntry(inv, entry) {
            if (!entry || !entry.type) return;
            const def = InventorySystem.resolveDef(entry.type) || InventorySystem.ITEMS[entry.type];
            if (!def || !def.shape) return;
            let shape = def.shape;
            const rot = Number(entry.rotation) || 0;
            for (let r = 0; r < (rot / 90) % 4; r++) {
                shape = inv.rotate90(shape);
            }
            const item = {
                id: Date.now() + Math.random(),
                type: entry.type,
                ...InventorySystem.ITEMS[entry.type],
                shape,
                rotation: rot,
                x: Number(entry.x) || 0,
                y: Number(entry.y) || 0
            };
            const resolved = InventorySystem.resolveDef(entry.type) || {};
            const maxDur = (typeof resolved.durability === 'number' && resolved.durability > 0)
                ? resolved.durability : null;
            if (maxDur != null) {
                item.durabilityLeft = (typeof entry.durabilityLeft === 'number')
                    ? Math.max(0, Math.min(maxDur, entry.durabilityLeft))
                    : maxDur;
            }
            if (inv.canPlace(shape, item.x, item.y)) {
                inv.placeItem(item);
                inv.items.push(item);
            } else {
                // 좌표 충돌·범위 초과(예: 8x12→12x8 마이그레이션) → 빈 자리로 재배치.
                const pos = inv.findEmptySpace(shape);
                if (pos) {
                    item.x = pos.x;
                    item.y = pos.y;
                    inv.placeItem(item);
                    inv.items.push(item);
                }
            }
        }

        // 역직렬화 — items 배열을 새 12x6 InventorySystem에 복원.
        //   D-113: 기존 8x12 → 12x8 마이그레이션. 좌표 충돌 시 빈 자리로 자동 재배치.
        //   D-147: 12x8 → 12x6. 기존 저장본의 cols=7 이상 아이템은 좌표 부적합 → restoreItemEntry가
        //     placeItem 실패 시 빈자리로 재배치 fallback (있다면).
        function deserializeCampState(raw) {
            if (!raw || typeof raw !== 'object') return null;
            // D-168: tentLevel 우선 복원, 없으면 tentBuilt(boolean) 폴백.
            const tentLevelRestored = (typeof raw.tentLevel === 'number')
                ? Math.max(0, Math.min(TENT_MAX_LEVEL, raw.tentLevel))
                : (raw.tentBuilt ? 1 : 0);
            // D-174: buildingLevels / oneShotInventory 복원 — v3 이하 폴백 {}.
            const buildingLevels = (raw.buildingLevels && typeof raw.buildingLevels === 'object')
                ? { ...raw.buildingLevels } : {};
            const oneShotInventory = (raw.oneShotInventory && typeof raw.oneShotInventory === 'object')
                ? { ...raw.oneShotInventory } : {};

            // D-174: 캠프 보관함 12x7 + 마지막 row가 텐트 슬롯.
            //   기존 v3 12x6 세이브 → 12x7로 마이그레이션. 좌표 그대로 복원 가능
            //   (cols=12 동일, rows만 6→7로 늘어남, 0~5 row는 그대로 유효).
            const inv = makeCampStorageInventory(tentLevelRestored);
            const itemsRaw = Array.isArray(raw.inventory) ? raw.inventory : [];
            for (const entry of itemsRaw) restoreItemEntry(inv, entry);

            // pack — 빌딩 보너스 반영(allCampBonuses).
            const stateForPack = { tentLevel: tentLevelRestored, buildingLevels };
            const pack = makePackInventory(getPackBonusSlots(stateForPack));
            const packRaw = Array.isArray(raw.pack) ? raw.pack : [];
            for (const entry of packRaw) restoreItemEntry(pack, entry);

            return {
                version: 4,
                seenIntro: !!raw.seenIntro,
                firstReturnDone: !!raw.firstReturnDone,
                tentLevel: tentLevelRestored,
                tentBuilt: tentLevelRestored >= 1,
                buildingLevels,
                oneShotInventory,
                inventory: inv,
                pack,
                quests: {
                    active: (raw.quests && Array.isArray(raw.quests.active)) ? raw.quests.active : [],
                    completed: (raw.quests && Array.isArray(raw.quests.completed)) ? raw.quests.completed : []
                },
                runs: {
                    total: Number((raw.runs && raw.runs.total) || 0),
                    victories: Number((raw.runs && raw.runs.victories) || 0),
                    deaths: Number((raw.runs && raw.runs.deaths) || 0),
                    bestScore: Number((raw.runs && raw.runs.bestScore) || 0),
                    totalScore: Number((raw.runs && raw.runs.totalScore) || 0),
                    lastScore: Number((raw.runs && raw.runs.lastScore) || 0)
                }
            };
        }

        // localStorage I/O — 실패해도 게임은 굴러가야 함(시크릿 모드 등).
        // D-163: 메인 → 백업 순으로 시도. 메인이 깨져도 직전 정상값으로 복구.
        function loadCampStateFromStorage() {
            try {
                const raw = localStorage.getItem(CAMP_STATE_KEY);
                if (raw) {
                    const result = deserializeCampState(JSON.parse(raw));
                    if (result) return result;
                }
            } catch (e) {
                console.warn('campState main load failed', e);
            }
            try {
                const rawBackup = localStorage.getItem(CAMP_STATE_BACKUP_KEY);
                if (rawBackup) {
                    const result = deserializeCampState(JSON.parse(rawBackup));
                    if (result) {
                        console.warn('campState restored from backup');
                        return result;
                    }
                }
            } catch (e) {
                console.warn('campState backup load failed', e);
            }
            return null;
        }
        function saveCampStateToStorage(state) {
            try {
                const next = JSON.stringify(serializeCampState(state));
                // 직전 메인 값을 백업으로 회전(같은 값이면 패스).
                const prev = localStorage.getItem(CAMP_STATE_KEY);
                if (prev && prev !== next) {
                    try { localStorage.setItem(CAMP_STATE_BACKUP_KEY, prev); } catch {}
                }
                localStorage.setItem(CAMP_STATE_KEY, next);
            } catch (e) {
                console.warn('campState save failed', e);
            }
        }

        function App() {
            // 첫 마운트: localStorage 있으면 캠프, 없으면 인트로.
            //   loaded는 useRef-like 한 번만 평가 — 두 useState lazy initializer가 동일 값을 참조.
            const initialLoadedRef = useRef(undefined);
            const getInitialLoaded = () => {
                if (initialLoadedRef.current === undefined) {
                    initialLoadedRef.current = loadCampStateFromStorage();
                }
                return initialLoadedRef.current;
            };
            const [campState, setCampState] = useState(() => getInitialLoaded() || makeInitialCampState());
            const [view, setView] = useState(() => (getInitialLoaded() ? 'camp' : 'intro'));
            // 첫 캠프 도착 모달용 outcome ('victory'|'death'|null).
            const [pendingTentModal, setPendingTentModal] = useState(null);

            // campState 변화 시마다 저장.
            useEffect(() => {
                saveCampStateToStorage(campState);
            }, [campState]);

            // [정신을 차린다] — 시나리오 → 첫 탐험.
            const handleIntroDismiss = () => {
                setCampState(prev => ({ ...prev, seenIntro: true }));
                setView('play');
            };

            // 탐험 결과 처리 — Game이 returnToCamp에서 호출.
            //   payload: { outcome, runInventory, selectedIds?, runStats?, runFinal? }.
            //   - 승리: runInventory.items 중 selectedIds(있으면)만 캠프 인벤에 addItem, 없으면 전체.
            //   - 사망: 인벤 0 인입.
            //   - 첫 캠프 복귀(firstReturnDone=false)면 텐트 퀘스트 부여 + TentQuestModal.
            //   D-110: runStats + runFinal로 calculateRunScore → bestScore/totalScore/lastScore 갱신.
            const handleRunEnd = (payload) => {
                const outcome = (payload && payload.outcome) || 'death';
                const runInv = payload && payload.runInventory;
                const selectedIds = payload && payload.selectedIds;  // null|undefined → 전체
                const runStats = (payload && payload.runStats) || { l1PreyKills: 0, l2PreyKills: 0, bossDangerEntered: 0 };
                const runFinal = (payload && payload.runFinal) || {};
                const isFirstReturn = !campState.firstReturnDone;

                // D-110: 인입할 아이템 목록 결정. selectedIds가 배열이면 필터링, 그 외엔 전체.
                const itemsAll = (runInv && Array.isArray(runInv.items)) ? runInv.items : [];
                const itemsToTransfer = (outcome === 'victory')
                    ? (Array.isArray(selectedIds)
                        ? itemsAll.filter(it => it && selectedIds.includes(it.id))
                        : itemsAll)
                    : [];

                // 점수 계산 — 인입한 아이템 기준.
                const score = calculateRunScore({
                    victory: outcome === 'victory',
                    uniqueTilesVisited: runFinal.uniqueTilesVisited,
                    detection: runFinal.detection,
                    items: itemsAll,
                    runStats,
                    selectedItems: itemsToTransfer
                });

                setCampState(prev => {
                    // 캠프 인벤 인스턴스 직접 변형(같은 참조 유지). React 재렌더는 ...prev 객체 새로 만들어서 트리거.
                    // D-113: 인스턴스 직접 placement — durabilityLeft / rotation 보존.
                    //   캠프 인벤은 disabled 셀 없음 → 빈 자리 찾아 새 좌표로 재배치.
                    const camp = prev.inventory;
                    for (const it of itemsToTransfer) {
                        if (!it || !it.type) continue;
                        const def = InventorySystem.resolveDef(it.type) || InventorySystem.ITEMS[it.type] || {};
                        const shape = it.shape || (def.shape ? def.shape : null);
                        if (!shape) { camp.addItem(it.type); continue; }
                        const pos = camp.findEmptySpace(shape);
                        if (!pos) continue; // 캠프 인벤 가득 — 무시(추후: 안내).
                        const placed = {
                            ...it,
                            id: Date.now() + Math.random(), // 캠프 측 새 id로(전 런과 충돌 방지).
                            x: pos.x,
                            y: pos.y
                        };
                        camp.placeItem(placed);
                        camp.items.push(placed);
                    }
                    const next = {
                        ...prev,
                        runs: {
                            total: prev.runs.total + 1,
                            victories: prev.runs.victories + (outcome === 'victory' ? 1 : 0),
                            deaths: prev.runs.deaths + (outcome === 'death' ? 1 : 0),
                            bestScore: Math.max(Number(prev.runs.bestScore) || 0, score),
                            totalScore: (Number(prev.runs.totalScore) || 0) + score,
                            lastScore: score
                        }
                    };
                    if (isFirstReturn) {
                        // D-148: 자동 퀘스트 부여 제거. 캠프에서 [받기] 버튼으로 명시 수령.
                        next.firstReturnDone = true;
                    }
                    return next;
                });
                setView('camp');
            };

            // [탐험 떠나기]
            // D-113: 캠프 pack(가방) → 탐험 인벤 인계.
            //   pack의 InventorySystem 인스턴스를 그대로 Game에 넘긴다(아이템 객체 전체 보존 = durabilityLeft/rotation 유지).
            //   campState.pack은 새 빈 인벤으로 교체 — 들고 갔으니 캠프엔 비움.
            //   탐험 중 인벤이 곧 가방의 후속(탐험에서 획득한 아이템들이 추가됨).
            //   handleRunEnd가 승리 시 그 인벤을 보관함으로 인입. 사망 시 폐기.
            const [departInv, setDepartInv] = useState(null);
            const handleDepart = () => {
                const carried = campState.pack;
                // D-174: reward_run_start — 완성된 빌딩들의 매-탐험 시작 자동 인입 아이템.
                //   각 빌딩의 현재 stage reward_run_start를 합산해 가방 빈자리에 인입.
                //   가득이면 들어갈 만큼만(나머지는 무시 — 사용자 손실 메시지는 토스트 X, D-176+에서 보강).
                if (carried) {
                    const runStart = collectRunStartItems(campState.buildingLevels || {});
                    for (const { type, count } of runStart) {
                        for (let i = 0; i < count; i++) {
                            const ok = carried.addItem(type);
                            if (!ok) break;
                        }
                    }
                }
                setDepartInv(carried || null);
                // D-148/D-168/D-174: 새 빈 pack은 buildingLevels+tentLevel 합산 보너스 반영.
                setCampState(prev => ({ ...prev, pack: makePackInventory(getPackBonusSlots(prev)) }));
                setView('play');
            };

            // 텐트 퀘스트 완료 알림 메시지 — App 레벨 토스트 대신 가벼운 모달.
            const [questCompleteMsg, setQuestCompleteMsg] = useState(null);

            // [완수] — 재료 차감 + completed 이동 + 알림.
            //   재료 보유량 재확인(레이스 가드). 부족하면 무시(버튼은 disabled여야 함).
            // D-174: 빌딩 6종 'bld_<id>_<stage>' 분기 — 시트 cost(한글) 차감 + buildingLevels 갱신
            //        + reward_items(보관함 인입) + reward_one_shot(누적). reward_passive/run_start는 동적 산출.
            const handleCompleteQuest = (questId) => {
                if (typeof questId !== 'string') return;
                const inv = campState.inventory;
                if (!inv) return;

                // 빌딩 분기 ── 'bld_<id>_<stage>'
                if (questId.startsWith('bld_')) {
                    const m = questId.match(/^bld_([a-z_]+)_(\d+)$/);
                    if (!m) return;
                    const bId = m[1];
                    const bStage = Number(m[2]) || 0;
                    const bDef = getBuildingDef(bId, bStage);
                    if (!bDef) return;

                    // 시트 cost(한글) → 영문 id 변환 + 차감 가드.
                    const costEntries = []; // [{id, count, koName}]
                    for (const c of (bDef.cost || [])) {
                        const koName = c && c.material;
                        const cnt = Number(c && c.count) || 0;
                        if (!koName || cnt <= 0) continue;
                        const idEn = InventorySystem.findIdByKoreanName(koName);
                        if (!idEn) {
                            console.warn(`[handleCompleteQuest] 빌딩 cost 미매칭: "${koName}" (${questId})`);
                            return; // 매핑 실패면 진행 거부 — 게임 크래시 회피.
                        }
                        costEntries.push({ id: idEn, count: cnt, koName });
                    }
                    // 보유량 가드 (레이스).
                    for (const e of costEntries) {
                        const have = inv.items.filter(it => it.type === e.id).length;
                        if (have < e.count) return;
                    }
                    // 차감.
                    for (const e of costEntries) {
                        let remaining = e.count;
                        const keep = [];
                        for (const it of inv.items) {
                            if (remaining > 0 && it.type === e.id) {
                                inv.removeItem(it);
                                remaining -= 1;
                                continue;
                            }
                            keep.push(it);
                        }
                        inv.items = keep;
                    }
                    // reward_items — 보관함에 인입(가득이면 토스트로만 알림).
                    let overflowed = 0;
                    for (const { type, count } of parseRewardItems(bDef.reward_items || '')) {
                        for (let i = 0; i < count; i++) {
                            const ok = inv.addItem(type);
                            if (!ok) overflowed += 1;
                        }
                    }

                    setCampState(prev => {
                        const next = { ...prev };
                        next.buildingLevels = { ...(prev.buildingLevels || {}), [bId]: bStage };
                        // reward_one_shot — 누적 저장만 (사용 시점은 D-176+).
                        const oneShotAdds = parseOneShot(bDef.reward_one_shot || '');
                        if (oneShotAdds.length > 0) {
                            const merged = { ...(prev.oneShotInventory || {}) };
                            for (const { key, count } of oneShotAdds) {
                                merged[key] = (Number(merged[key]) || 0) + count;
                            }
                            next.oneShotInventory = merged;
                        }
                        // pack 보너스 변경 가능성 — pack+ 효과 즉시 반영.
                        const newBonus = getPackBonusSlots(next);
                        const prevBonus = getPackBonusSlots(prev);
                        if (newBonus !== prevBonus) {
                            const newPack = makePackInventory(newBonus);
                            const oldItems = (prev.pack && Array.isArray(prev.pack.items)) ? prev.pack.items.slice() : [];
                            for (const it of oldItems) {
                                if (newPack.canPlace(it.shape, it.x, it.y)) {
                                    newPack.placeItem(it);
                                    newPack.items.push(it);
                                } else {
                                    const pos = newPack.findEmptySpace(it.shape);
                                    if (pos) {
                                        it.x = pos.x; it.y = pos.y;
                                        newPack.placeItem(it);
                                        newPack.items.push(it);
                                    }
                                }
                            }
                            next.pack = newPack;
                        }
                        // 빌딩 분기는 quests.active에 안 들어가는 단발 액션(현재 흐름) — moved 처리 없음.
                        // 단, 향후 quests에 등록된 경우 호환을 위해 active/completed 이동 시도.
                        const active = (prev.quests && prev.quests.active || []).filter(q => q.id !== questId);
                        const moved = (prev.quests && prev.quests.active || []).find(q => q.id === questId);
                        next.quests = {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : (prev.quests && prev.quests.completed) || []
                        };
                        return next;
                    });

                    const baseMsg = `${bDef.icon || ''} ${bDef.name} Lv.${bStage} 완성.`;
                    setQuestCompleteMsg(overflowed > 0 ? `${baseMsg} (보관함이 가득 차 ${overflowed}개 분실)` : baseMsg);
                    return;
                }

                // 텐트 분기 ── 'tent_N' (D-168 호환).
                const def = getTentQuestDef(questId);
                if (!def) return;
                const reqs = def.requirements || {};
                for (const [type, need] of Object.entries(reqs)) {
                    const have = inv.items.filter(it => it.type === type).length;
                    if (have < need) return;
                }
                for (const [type, need] of Object.entries(reqs)) {
                    let remaining = need;
                    const keep = [];
                    for (const it of inv.items) {
                        if (remaining > 0 && it.type === type) {
                            inv.removeItem(it);
                            remaining -= 1;
                            continue;
                        }
                        keep.push(it);
                    }
                    inv.items = keep;
                }
                // D-174 v3: 텐트 단계 → 보관함 row 1줄(7칸) 풀기.
                inv.expandStorage(7);
                setCampState(prev => {
                    const active = prev.quests.active.filter(q => q.id !== questId);
                    const moved = prev.quests.active.find(q => q.id === questId);
                    const next = {
                        ...prev,
                        quests: {
                            active,
                            completed: moved ? [...(prev.quests.completed || []), moved] : prev.quests.completed
                        }
                    };
                    next.tentLevel = Math.max(prev.tentLevel || 0, def.level);
                    next.tentBuilt = next.tentLevel >= 1;
                    // D-174: 텐트는 buildingLevels에도 동기 반영(allCampBonuses에서 읽지 않지만 통일성).
                    next.buildingLevels = { ...(prev.buildingLevels || {}), tent: next.tentLevel };
                    return next;
                });
                // D-174 v3: 텐트 보상은 보관함 한 줄(7칸)로 단일화.
                let msg = `텐트 Lv.${def.level} 완성. ${def.rewardLabel}.`;
                if (def.level === 1) msg = '텐트 자리를 잡았다. 보관함이 한 줄 더 깊어졌다.';
                setQuestCompleteMsg(msg);
            };

            // [데이터 초기화] — localStorage 메인+백업 삭제 + 초기 상태 + 시나리오부터.
            const handleResetData = () => {
                try {
                    localStorage.removeItem(CAMP_STATE_KEY);
                    localStorage.removeItem(CAMP_STATE_BACKUP_KEY);
                } catch {}
                setCampState(makeInitialCampState());
                setPendingTentModal(null);
                setQuestCompleteMsg(null);
                setDepartInv(null);
                setView('intro');
            };

            if (view === 'intro') {
                return <IntroScenarioScreen onDismiss={handleIntroDismiss} />;
            }
            if (view === 'play') {
                return (
                    <Game
                        onRunEnd={handleRunEnd}
                        initialInventory={departInv}
                        activeQuests={(campState && campState.quests && campState.quests.active) || []}
                        campState={campState}
                    />
                );
            }
            // camp
            return (
                <>
                    <CampScreen
                        campState={campState}
                        onDepart={handleDepart}
                        onCompleteQuest={handleCompleteQuest}
                        onTakeQuest={(questId) => {
                            // D-148: [받기] — quests.active에 추가. 이미 active/completed면 무시.
                            setCampState(prev => {
                                const taken = new Set([
                                    ...((prev.quests && prev.quests.active) || []).map(q => q.id),
                                    ...((prev.quests && prev.quests.completed) || []).map(q => q.id)
                                ]);
                                if (taken.has(questId)) return prev;
                                return {
                                    ...prev,
                                    quests: {
                                        active: [...(prev.quests.active || []), { id: questId, progress: {} }],
                                        completed: prev.quests.completed || []
                                    }
                                };
                            });
                        }}
                        onResetData={handleResetData}
                        onInventoryChange={() => setCampState(prev => ({ ...prev }))}
                    />
                    {pendingTentModal && (
                        <TentQuestModal
                            outcome={pendingTentModal}
                            onDismiss={() => setPendingTentModal(null)}
                        />
                    )}
                    {questCompleteMsg && (
                        <div className="modal" style={{ zIndex: 3400 }}>
                            <div style={{
                                background: '#1a1a2e',
                                color: '#eee',
                                padding: '24px 22px',
                                borderRadius: '10px',
                                border: '1px solid #d4b84a',
                                maxWidth: '360px',
                                width: '90vw',
                                textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', marginBottom: '10px' }}>🏕️</div>
                                <div style={{ fontSize: '14px', lineHeight: 1.6, marginBottom: '18px' }}>
                                    {questCompleteMsg}
                                </div>
                                <button
                                    onClick={() => setQuestCompleteMsg(null)}
                                    style={{
                                        background: '#d4b84a',
                                        color: '#1a1a2e',
                                        border: 'none',
                                        padding: '8px 22px',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontSize: '13px',
                                        fontWeight: 700
                                    }}
                                >
                                    확인
                                </button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));

        // D-41 (2026-04-23 요한 지시): 게임 영역 내부의 contextmenu(우클릭/롱프레스)
        // 기본 동작 차단. CSS user-select:none만으로는 iOS Safari 롱프레스 복사 메뉴가
        // 뜨는 경우가 있어 JS 레벨에서도 막는다.
        // input/textarea/contentEditable은 제외 — 텍스트 선택·붙여넣기 컨텍스트가 필요.
        document.getElementById('root').addEventListener('contextmenu', (e) => {
            const tag = e.target.tagName;
            const editable = e.target.isContentEditable;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
            e.preventDefault();
        });
    </script>
</body>
</html>
