                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? '사용하기' : '사용 불가'}
                            </button>
                            {/* D-94 (2026-04-25 요한 지시): is_bait 플래그 아이템 — [먹이로 유인하기] 버튼.
                                현재 타일에 먹이를 놓아 보스를 유도. 인벤에서 1개 차감. */}
                            {(resolved.is_bait || (notionItem && notionItem.is_bait)) && typeof onLureBait === 'function' && (
                                <button
                                    onClick={onLureBait}
                                    style={{
                                        padding: '10px',
                                        background: '#7a3a1f',
                                        color: '#ffd79e',
                                        border: '1px solid #d4883a',
                                        borderRadius: '4px',
                                        cursor: 'pointer',
                                        fontWeight: 600
                                    }}
                                >
                                    🍖 먹이로 유인하기
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // 인벤토리 모달 컴포넌트
        //
        // 아이템 인터랙션 분기:
        //   - 짧은 탭 (< 400ms 내에 떼면) → 정보창 모달
        //   - 긴 누름 (≥ 400ms 유지) → 기존 동작(선택/이동/머지/회전)
        // 임계값 400ms 채택 근거: Android 표준 long-press(500ms)보다 살짝 빠르게, iOS 기본(≈300ms)보다는 여유롭게.
        // 게임은 연타/드래그가 잦아 짧은 의도를 놓치면 답답하고, 반대로 너무 짧으면 스와이프가 잘못 인식된다.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onLureBait, onFlashMessage, title, mode, activeQuests }) {
            // D-171 (요한): 진행 중 퀘스트가 요구하는 type 집합 → 아이템 우상단 노란 ✓ 마커.
            //   퀘스트 정의는 getTentQuestDef 사용. 이미 충족된 type은 마커 생략(소지가 의미 없을 때 시각 잡음 방지).
            const questRequiredTypes = React.useMemo(() => {
                const set = new Set();
                if (!Array.isArray(activeQuests) || activeQuests.length === 0) return set;
                for (const q of activeQuests) {
                    const def = (typeof getTentQuestDef === 'function') ? getTentQuestDef(q.id) : null;
                    if (!def || !def.requirements) continue;
                    const items = (inventory && Array.isArray(inventory.items)) ? inventory.items : [];
                    for (const [type, need] of Object.entries(def.requirements)) {
                        const have = items.filter(it => it.type === type).length;
                        if (have < Number(need)) set.add(type);
                    }
                }
                return set;
            }, [activeQuests, inventory && inventory.items && inventory.items.length]);
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // 확정 대기 위치 (그리드 셀을 눌러 지정)
            const [pendingPos, setPendingPos] = React.useState(null);
            // 정보창으로 띄울 아이템 (null이면 정보창 닫힘)
            const [infoItem, setInfoItem] = React.useState(null);

            // D-104 (2026-04-27 요한 지시): 합성 패널 항상 렌더 + 카테고리 탭.
            //   비선택 상태에서도 모든 레시피를 카테고리별로 필터링해 노출.
            //   유저가 마지막으로 고른 카테고리는 localStorage에 보존.
            const [recipeCategory, setRecipeCategory] = React.useState(() => {
                try {
                    const v = localStorage.getItem('ttd:invRecipeCategory');
                    return v && ['all', 'food', 'weapon', 'armor', 'material'].includes(v) ? v : 'all';
                } catch { return 'all'; }
            });
            const updateRecipeCategory = (cat) => {
                setRecipeCategory(cat);
                try { localStorage.setItem('ttd:invRecipeCategory', cat); } catch {}
            };

            // 가방 닫기 — 선택 모드도 함께 취소(D-104 요한 지시: 닫고 다시 열어도 선택모드 유지되면 안 됨).
            const handleClose = () => {
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                closeInventory();
            };

            // D-47: 가방 크기는 inventory 인스턴스 기준. disabled 셀은 inventory.isDisabled로.
            // D-174 v4 (요한): 보관함(storage)은 7열 모바일 fit을 위해 셀 40px로 축소.
            // D-174 v6 (요한): CELL은 "셀폭 + gap"(=다음 셀 시작 간격), PAD는 그리드 자체 padding.
            //   - 게임 인벤: 셀 45 + gap 2 → CELL=47, grid padding 4 → PAD=4.
            //   - 보관함:   셀 40 + gap 2 → CELL=42, grid padding 4 → PAD=4.
            //   v4의 CELL=40/PAD=3은 셀폭만 본 오류 — 아이템·미리보기·floating 좌표가
            //   하단으로 갈수록 누적 5~10px 어긋났음. 이번에 정정.
            const ROWS = inventory.rows, COLS = inventory.cols;
            const CELL = mode === 'storage' ? 42 : 47;
            const PAD = 4;
            const LONG_PRESS_MS = 400;

            // 프레스 상태를 ref로 관리해 재렌더 없이 타이머/가드 갱신.
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // D-83 (2026-04-24 요한 지시): 탭 ↔ 롱프레스 역할 스왑.
            //   신규 UX:
            //     - 짧은 탭  = 선택 모드 진입/토글/머지/swap (주 조작)
            //     - 롱프레스 = 아이템 정보창
            //     - 조합은 하단 합성 패널의 [만들기] 버튼 전용 — 다른 재료 탭은 swap만 수행.
            //   이전 UX(D-32)는 롱프레스=선택, 탭=정보창+자동 조합이었으나,
            //   "위치 교체하려다 의도치 않게 조합이 발동"되는 케이스가 있어 주 조작을 탭으로
            //   넘기고 조합은 명시적 버튼으로만 분리.
            const onShortTap = (item) => {
                // 선택 없음 → 선택 진입(들어올림)
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                // 같은 아이템 탭 → 선택 해제(토글)
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                    return;
                }
                // 다른 아이템 탭 → confirmPlacement로 일임:
                //   · 같은 재료(canMerge) → 즉시 머지
                //   · 다른 재료 → swap (조합은 합성 패널 전용, 자동 발동 안 함)
                const res = inventory.confirmPlacement(item.x, item.y);
                applyDropResult(res);
                bump();
            };

            // 롱프레스: 아이템 정보창.
            const onLongPressInfo = (item) => {
                setInfoItem(item);
            };

            // D-48: confirmPlacement 결과 반영 공통 헬퍼.
            //   - merge: 즉시 실행 (기존 동작).
            //   - swap: 새 아이템으로 선택 전환.
            //   - place: 배치 후 선택 해제.
            //   합성 패널은 '선택된 아이템 기준'으로 자동 노출되므로 craft_prompt 경로 없음.
            const applyDropResult = (res) => {
                if (!res || !res.ok) return false;
                if (res.action === 'swap') {
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                    return true;
                }
                setSelectedItem(null);
                setPendingPos(null);
                if (onFlashMessage && res.resultType && res.action === 'merge') {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    onFlashMessage(`두 재료를 합쳐 ${resultName}을(를) 얻었다.`);
                }
                return true;
            };

            // D-47 [만들기] 버튼 핸들러 — 실제 재료 소비·결과 배치는 inventory.craftRecipe.
            // D-48: 성공 시 선택 해제 (재료가 선택된 아이템이었을 수 있음). 패널은 selectedItem
            //   기반이라 해제만 해도 자동으로 닫힘.
            const handleCraft = (recipe) => {
                const res = inventory.craftRecipe(recipe);
                if (res.ok) {
                    if (onFlashMessage) {
                        const resultDef = InventorySystem.ITEMS[res.resultType] || {};
                        const name = resultDef.name || res.resultType;
                        // D-71: count>1 레시피 — produced/overflow 안내.
                        const produced = Number(res.produced || 1);
                        let msg = produced > 1
                            ? `재료를 조합해 ${name} ${produced}개를 만들었다.`
                            : `재료를 조합해 ${name}을(를) 만들었다.`;
                        if (res.overflow > 0) msg += ` (가방이 가득 차 ${res.overflow}개는 두고 왔다.)`;
                        onFlashMessage(msg);
                    }
                    inventory.selectedItem = null;
                    setSelectedItem(null);
                    setPendingPos(null);
                } else if (res.reason === 'no_space') {
                    if (onFlashMessage) onFlashMessage('가방이 가득 차 만들 수 없다.');
                } else if (res.reason === 'short_ingredients') {
                    if (onFlashMessage) onFlashMessage('재료가 부족하다.');
                }
                bump();
            };

            // D-83: 포인터 핸들러 — 짧은 탭=onShortTap, 롱프레스=onLongPressInfo.
            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // 마우스 우클릭/중간클릭 무시
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    onLongPressInfo(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) onShortTap(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // 레거시: 기존 onClick 경로 유지 (키보드 접근성/기존 테스트 호환).
            // 포인터 기반 분기가 발동하면 longFired가 true가 되어 중복 호출되지 않도록 가드.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // 포인터 이벤트가 쓰이지 않는 환경에서의 폴백
                onShortTap(item);
            };

            // 사용 버튼 — 효과 적용 후 일회용이면 인벤에서 제거, 정보창 닫기
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // 아이템 제거
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                applyDropResult(res);
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // D-45 (2026-04-23): 선택한 아이템을 인벤토리에서 영구 제거.
            // - 1회 확정. 롱프레스로 이미 선택된 상태라 오조작 확률이 낮아 별도 확인창 없음.
            // - 공간이 꽉 찼을 때 탈출 수단이자 불필요한 1단계 부산물 정리용.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();
                setSelectedItem(null);
                setPendingPos(null);
                if (discarded && onFlashMessage) {
                    onFlashMessage(`${discarded.name}을(를) 버렸다.`);
                }
                bump();
            };

            // 미리보기 가능 여부 (현재 pendingPos에 selectedItem이 들어갈 수 있는가)
            //   D-47: 'combine' kind 폐기 — 조합은 이제 합성 패널 경유. 다른 재료 +
            //         관련 레시피 있음 = 'craft' kind, 아니면 'swap'.
            //   disabled 셀(가방 구석 비활성)을 하나라도 침범하면 'blocked'.
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                for (let dy = 0; dy < shape.length; dy++) {
                    for (let dx = 0; dx < shape[0].length; dx++) {
                        if (shape[dy][dx] === 1 && inventory.isDisabled(x + dx, y + dy)) {
                            return { ok: false, kind: 'blocked' };
                        }
                    }
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    const t = overlap[0];
                    if (inventory.canMerge(selectedItem, t)) return { ok: true, kind: 'merge' };
                    return { ok: true, kind: 'swap' };
                }
                return { ok: false, kind: 'blocked' };
            })();

            // D-48: 선택된 아이템의 type이 포함된 모든 레시피 → 하단 CraftPanel에 노출.
            //   선택 해제 시 null이 되어 패널도 자동으로 닫힘.
            //   매 렌더마다 계산 (combos 수가 적어 비용 무시 가능).
            const pendingCraft = (() => {
                if (!selectedItem) return null;
                const candidates = InventorySystem.findRecipesContainingAny(selectedItem.type, selectedItem.type);
                if (!candidates || candidates.length === 0) return null;
                return {
                    pair: [selectedItem.type],
                    pairItemIds: [selectedItem.id],
                    candidates
                };
            })();

            // D-104: 합성 패널 항상 렌더 — 표시할 레시피 결정.
            //   선택 상태: 해당 아이템 포함 레시피만 (기존 동작 유지).
            //   비선택 상태: 전체 COMBOS 중 카테고리 필터 통과분.
            //   카테고리 분류는 결과물(result)의 category 필드 기반.
            const allRecipes = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                ? window.TTD_DATA.COMBOS
                : [];
            const recipeCategoryOf = (recipe) => {
                if (!recipe || !recipe.result) return 'material';
                const def = InventorySystem.resolveDef(recipe.result) || {};
                const cat = def.category;
                // D-159: 시트 SSOT 카테고리 영문 통일(food). 구버전 '음식' 폴백 호환.
                if (cat === 'food' || cat === '음식') return 'food';
                if (cat === '무기') return 'weapon';
                if (cat === 'shield' || cat === 'armor' || cat === '방어구') return 'armor';
                return 'material'; // 재료·소모품 등 나머지 전부
            };
            const filteredAllRecipes = recipeCategory === 'all'
                ? allRecipes
                : allRecipes.filter(r => recipeCategoryOf(r) === recipeCategory);
            const displayedRecipes = pendingCraft ? pendingCraft.candidates : filteredAllRecipes;
            const showCategoryTabs = !pendingCraft;
            const panelOnClose = pendingCraft
                ? () => {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                }
                : null; // 비선택 시 패널 닫기 버튼 숨김 (가방 자체를 닫아야 함)

            return (
                // D-171 (요한): ActiveQuestHUDPanel(z=1400)이 인벤토리 모달 위로 떠
                //   가방 일부를 가렸음. 모달을 z=1500으로 띄워 HUD 위에 둔다.
                <div className="modal" style={{ zIndex: 1500 }}>
                    <div className="inventory-stage">
                    <div className={`modal-content inventory-modal${mode === 'storage' ? ' is-storage' : ''}`}>
                        {/* D-174 v4 (요한 지시):
                            보관함(mode==='storage'): 모달을 [헤더 / 슬롯 패널(자체 스크롤) / helper] 세로
                              분할 — 헤더는 자연 고정(sticky 불필요), 슬롯 그리드만 안에서 스크롤. 마커가
                              헤더 영역에 침범하던 z-index 통과 문제도 같이 해소. 가로 스크롤 차단은 셀 크기
                              축소(45→40)로 처리.
                            게임 인벤(그 외 모드): D-174 v3 sticky 헤더 유지 — 모달 자체 스크롤이라 헤더가
                              스크롤로 사라지지 않게. */}
                        <div style={mode === 'storage' ? {
                            display: 'flex',
                            justifyContent: 'space-between',
                            alignItems: 'center',
                            marginBottom: '10px',
                            flexShrink: 0
                        } : {
                            display: 'flex',
                            justifyContent: 'space-between',
                            position: 'sticky',
                            top: '-20px',
                            background: '#16213e',
                            margin: '-20px -20px 10px -20px',
                            padding: '14px 20px 10px',
                            zIndex: 3,
                            alignItems: 'center'
                        }}>
                            <h3 style={{ margin: 0 }}>{title || '가방'}</h3>
                            <button onClick={handleClose}>닫기</button>
                        </div>
                        {/* D-174 v4: 슬롯 그리드만 자체 스크롤 영역 — 한 겹 배경(.inventory-slot-panel). */}
                        <div className="inventory-slot-panel">
                                <div className="inventory-slot-panel-inner">
                            {/* D-145: 그리드 cols/rows 인라인 동적 — 보관함(7x20) 등 가변 사이즈 지원.
                                D-174 v4: 보관함(mode==='storage')은 40px, 그 외는 45px — 모바일 375vw에서
                                7열이 modal 컨텐츠 영역에 fit (가로 스크롤 차단). */}
                            <div className="inventory-grid" style={{
                                gridTemplateColumns: `repeat(${COLS}, ${mode === 'storage' ? 40 : 45}px)`,
                                gridTemplateRows: `repeat(${ROWS}, ${mode === 'storage' ? 40 : 45}px)`
                            }}>
                                {Array(ROWS).fill(null).map((_, row) =>
                                    Array(COLS).fill(null).map((_, col) => {
                                        const disabled = inventory.isDisabled(col, row);
                                        const occupied = !disabled && inventory.grid[row][col];
                                        return (
                                            <div
                                                key={`${row}-${col}`}
                                                className={`inventory-cell ${occupied ? 'occupied' : ''} ${disabled ? 'disabled' : ''}`}
                                                onClick={() => {
                                                    if (disabled) return;
                                                    handleCellClick(row, col);
                                                }}
                                            />
                                        );
                                    })
                                )}
                            </div>

                            {/* 확정 대기 미리보기 */}
                            {selectedItem && pendingPos && previewInfo && (
                                <div
                                    className={`inventory-preview ${previewInfo.ok ? 'ok' : 'bad'} ${previewInfo.kind}`}
                                    style={{
                                        position: 'absolute',
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                        pointerEvents: 'none'
                                    }}
                                />
                            )}

                            {/* 그리드에 배치된 아이템들.
                                D-47: 머지 가능(같은 type 2개 이상 + mergeable) 시 좌상단 작은 점.
                                D-171: 진행 중 퀘스트가 요구하는 type이면 우상단 노란 ✓. */}
                            {inventory.items.filter(i => !selectedItem || i.id !== selectedItem.id).map(item => {
                                const def = InventorySystem.resolveDef(item.type) || {};
                                const sameTypeCount = inventory.items.filter(i => i.type === item.type).length;
                                const canAutoMerge = !!def.mergeable && !!def.merge_result && sameTypeCount >= 2;
                                const isQuestItem = questRequiredTypes.has(item.type);
                                return (
                                    <div
                                        key={item.id}
                                        className="inventory-item"
                                        style={{
                                            left: `${item.x * CELL + PAD}px`,
                                            top: `${item.y * CELL + PAD}px`,
                                            width: `${item.shape[0].length * CELL - PAD}px`,
                                            height: `${item.shape.length * CELL - PAD}px`
                                        }}
                                        onPointerDown={(e) => onItemPointerDown(e, item)}
                                        onPointerUp={(e) => onItemPointerUp(e, item)}
                                        onPointerCancel={onItemPointerCancel}
                                        onPointerLeave={onItemPointerCancel}
                                        onContextMenu={(e) => e.preventDefault()}
                                    >
                                        {/* D-92: 1단계 재료는 이모지 아이콘으로 표시. 2단계 이상은 텍스트. */}
                                        {(() => {
                                            const emoji = itemEmoji(item.type);
                                            if (emoji) return (
                                                <span style={{ fontSize: '26px', lineHeight: 1, display: 'block', textAlign: 'center' }}>{emoji}</span>
                                            );
                                            return item.name;
                                        })()}
                                        {canAutoMerge && (
                                            <span className="inventory-merge-check" title="같은 재료가 있어 머지 가능" />
                                        )}
                                        {isQuestItem && (
                                            <span className="inventory-quest-check" title="진행 중 퀘스트 요구 아이템">
                                                !
                                            </span>
                                        )}
                                    </div>
                                );
                            })}

                            {/* 공중에 뜬 선택 아이템 (pendingPos를 따라감) */}
                            {selectedItem && pendingPos && (
                                <div
                                    className="inventory-item floating selected"
                                    style={{
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(selectedItem); }}
                                >
                                    {selectedItem.name}
                                </div>
                            )}

                            {/* D-147/D-149/D-150: 보관함 합성 popover.
                               D-150 (요한 지시): viewport 하단 fixed → 그리드 wrapper 기준 absolute,
                               선택 슬롯 바로 아래에. 가로는 wrapper 50% + translateX로 그리드 중앙.
                               우측 가로 스크롤 없이 가운데 + 슬롯 가까이 두 마리 토끼. */}
                            {mode === 'storage' && pendingCraft && selectedItem && pendingPos && (
                                <div style={{
                                    position: 'absolute',
                                    top: `${(pendingPos.y + selectedItem.shape.length) * CELL + PAD + 8}px`,
                                    left: '50%',
                                    transform: 'translateX(-50%)',
                                    width: 'min(300px, calc(100vw - 32px))',
                                    zIndex: 50
                                }}>
                                    <CraftPanel
                                        recipes={displayedRecipes}
                                        inventory={inventory}
                                        onCraft={handleCraft}
                                        onClose={panelOnClose}
                                        showCategoryTabs={false}
                                        floating={true}
                                    />
                                </div>
                            )}
                                </div>
                        </div>

                        {selectedItem ? (
                            <div style={{ marginTop: '10px', display: 'flex', gap: '8px', flexWrap: 'wrap', flexShrink: 0 }}>
                                <button onClick={handleRotate}>회전</button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={!previewInfo || !previewInfo.ok}
                                >
                                    확정{previewInfo && previewInfo.ok && previewInfo.kind !== 'place'
                                        ? ` (${previewInfo.kind === 'merge' ? '머지' : '교체'})`
                                        : ''}
                                </button>
                                <button onClick={handleCancel}>취소</button>
                                {/* D-45 (2026-04-23): 버리기 — 빨강 톤, 1회 확정.
                                    - 파밍으로 공간이 꽉 찼을 때 탈출 수단.
                                    - 머지/조합 대상이 없는 부산물(낡은 재료 등) 정리용. */}
                                <button
                                    onClick={handleDiscard}
                                    style={{
                                        marginLeft: 'auto',
                                        background: '#6b2a2f',
                                        color: '#f4d4d8',
                                        border: '1px solid #8a3a42',
                                    }}
                                >
                                    버리기
                                </button>
                            </div>
                        ) : (
                            <div style={{ marginTop: '10px', fontSize: '11px', color: '#aaa', flexShrink: 0 }}>
                                짧게 탭 = 선택모드 · 길게 누르면 = 아이템정보
                            </div>
                        )}
                        {/* D-48 합성 패널 — 선택된 아이템 기준으로 관련 레시피 자동 노출.
                            닫기 = 선택 해제 (패널은 selectedItem이 null이면 자동으로 닫힘).
                            D-84b (2026-04-24 요한 지시): portrait에서는 이 인라인 인스턴스가,
                            landscape에서는 아래 .inventory-craft-side 인스턴스가 노출된다 (CSS로 택일).
                            두 인스턴스는 동일 props이며 CraftPanel은 내부 state가 없어 중복 렌더 안전.
                            D-147: mode='storage'면 인라인/사이드 둘 다 미렌더 — 보관함은 floating popover.
                            D-174 v4: modal-content가 flex column + overflow:hidden이므로 craft-inline은
                            flexShrink:0으로 줄어들지 않게 — 슬롯 패널만 flex:1로 가용 영역을 흡수. */}
                        {mode !== 'storage' && (
                            <div className="inventory-craft-inline" style={{ flexShrink: 0 }}>
                                <CraftPanel
                                    recipes={displayedRecipes}
                                    inventory={inventory}
                                    onCraft={handleCraft}
                                    onClose={panelOnClose}
                                    showCategoryTabs={showCategoryTabs}
                                    category={recipeCategory}
                                    onCategoryChange={updateRecipeCategory}
                                />
                            </div>
                        )}
                    </div>
                    {mode !== 'storage' && (
                        <div className="inventory-craft-side">
                            <CraftPanel
                                recipes={displayedRecipes}
                                inventory={inventory}
                                onCraft={handleCraft}
                                onClose={panelOnClose}
                                showCategoryTabs={showCategoryTabs}
                                category={recipeCategory}
                                onCategoryChange={updateRecipeCategory}
                            />
                        </div>
                    )}
                    </div>

                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={handleUseFromInfo}
                            onLureBait={typeof onLureBait === 'function' ? () => {
                                const item = infoItem;
                                setInfoItem(null);
                                onLureBait(item);
                            } : null}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // 카드로 아이템 사용 — 공통 모달 (프레임워크 D-23의 첫 구현체).
        //
        // 역할:
        //   카드 사용 시 consume 스펙이 있으면, 인벤토리에서 필터를 통과하는 아이템 목록을
        //   간략히 보여주고, 유저가 하나를 고르면 onSelect(item) 콜백.
        //
        // 왜 InventoryModal을 재사용하지 않는가:
        //   - 인벤 본 UI는 테트리스식 배치/머지/회전/롱프레스까지 복잡. 카드 사용 맥락에서는
        //     오로지 "필터 통과 아이템 선택"만 필요하므로 경량 리스트 UI가 판단 비용이 적다.
        //   - 향후 대상 수가 많아지면 이 모달을 grid/sprite로 확장하거나, 공유 셀렉터 컴포넌트로 추출.
        //
        // props:
        //   inventory:      InventorySystem 인스턴스
        //   filter:         (invItem, notionItem) => bool
        //   titleText:      상단 라벨 (예: "휴식할 음식 고르기")
        //   emptyText:      필터 통과 아이템 0개일 때 메시지
        //   onSelect(item): 확정
        //   onClose():      취소
        // D-36 (2026-04-22, 요한 지시):
        //   scales({recover: N})이 있으면 "효과가 N배" 임을 시각적으로 강조한다.
        //   - 제목 아래 안내 문구 (노란색)
        //   - 각 음식 효과 요약의 "배고픔 +1"을 "배고픔 +1 +1"로 변형하고
        //     증분 "+1" 만 노란색(#d4b84a)으로 띄운다. 효과가 2개 이상인 아이템은
        //     각 증분을 같은 방식으로 처리. scale이 걸릴 수 있는 건 양수 delta stat뿐.
        //   - scale이 없거나 1이면 기존 UI와 동일.
        //   이 표현은 휴식 외 향후 consume 카드에도 재사용 가능하도록 일반화.
        // D-57 (2026-04-24 요한 지시): 바베큐 경로 제거, 요리 시스템으로 전면 교체.
        //   - extraOptions/onExtraSelect 제거.
        //   - onCookClick + canCook prop 추가: 휴식 카드에서만 [🔥 요리] 버튼 노출.
        //     hintText 아래에 항상 표시, canCook=false면 회색 비활성.
        //   - 클릭 시 이 모달 닫지 않고 부모가 별도 CookingModal을 띄워 덮는다.
        function CardItemConsumeModal({ inventory, filter, scales, bonuses, hintText, titleText, emptyText, onSelect, onClose, onCookClick, canCook }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['이름'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const recoverBonus = (bonuses && typeof bonuses.recover === 'number') ? bonuses.recover : 0;
            const hasRecoverBoost = recoverScale !== 1 || recoverBonus !== 0;

            // D-81 (2026-04-24): 가방 그리드에 없는 아이템(선택으로 공중에 뜬 상태 등)은
            //   리스트에서 제외. inventory.items는 selectedItem도 포함하므로, selected는 사용 불가로 간주.
            //   가방 "닫기" 경로에서 cancelSelection 보장이 주 방어선, 이것은 엣지 케이스 이중 방어.
            const selectedId = inventory?.selectedItem?.id;
            // D-91 (2026-04-25 요한 지시): 효과 수치 높은 순 내림차순 정렬.
            //   휴식 카드 회복 컨텍스트(recoverScale 반영) 후 stat delta 합산.
            //   페널티(health-N)도 합에 포함 — "안전한 음식이 위" 의도와 일치.
            //   생고기 hunger+1/health-1 합=0보다 산딸기 hunger+1 합=1이 위로.
            const scoreItem = (notionItem) => {
                const parsed = notionItem && notionItem.effect;
                if (!parsed || !Array.isArray(parsed.actions)) return -Infinity;
                let s = 0;
                for (const a of parsed.actions) {
                    if (a.type !== 'stat') continue;
                    const d = Number(a.delta) || 0;
                    const scaled = d > 0 ? d * recoverScale + recoverBonus : d * recoverScale;
                    s += scaled;
                }
                return s;
            };
            const candidates = (inventory?.items || []).filter(invItem => {
                if (selectedId && invItem.id === selectedId) return false;
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            }).slice().sort((a, b) => {
                const aDef = InventorySystem.ITEMS[a.type] || {};
                const bDef = InventorySystem.ITEMS[b.type] || {};
                const aNotion = byName(aDef.name || a.name);
                const bNotion = byName(bDef.name || b.name);
                const sb = scoreItem(bNotion);
                const sa = scoreItem(aNotion);
                if (sb !== sa) return sb - sa;
                // 동점 → 이름순(가독성)
                return String(aDef.name || a.name || '').localeCompare(String(bDef.name || b.name || ''));
            });
            const hasAny = candidates.length > 0;
            const showCookBtn = typeof onCookClick === 'function';

            // 아이템 효과 요약 표시 — scale이 있으면 원본 delta + 증분을 나란히 보여준다.
            // 반환: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['효과 요약'];
                const canScale = hasRecoverBoost && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // 폴백: 원본 효과 요약만 표시 (기존 동작)
                    return summary
                        ? (
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                                {summary}
                            </div>
                        )
                        : null;
                }

                // 각 action을 "기본 라벨 + (노란색 증분)" 형태로 렌더.
                // 예: action {stat:'hunger', delta:1}, recoverScale=2 → '배고픔 +1 +1'
                //     배고픔(회색) / '+1'(회색) / '+1'(노란색 = 증분)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scale이 안 걸리는 action(감소/spawn_card 등)은 기본 describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? '배고픔'
                                : a.stat === 'health' ? '생명력'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    // scale(곱) → bonus(합) 순서로 적용한 최종 delta - 원본 delta
                    const scaledDelta = a.delta * recoverScale + recoverBonus;
                    const bonus = Math.round(scaledDelta - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || '아이템 선택'}</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {/* D-57 요리 버튼 — 휴식 카드에서만 onCookClick 주입. canCook=false면 회색.
                            위치: hintText 바로 아래, 아이템 목록 위. */}
                        {showCookBtn && (
                            <button
                                onClick={() => { if (canCook) onCookClick(); }}
                                disabled={!canCook}
                                style={{
                                    width: '100%',
                                    textAlign: 'center',
                                    padding: '10px 12px',
                                    marginBottom: '10px',
                                    background: canCook ? '#5a3a1f' : '#2a2a2e',
                                    border: `1px solid ${canCook ? '#d4883a' : '#444'}`,
                                    color: canCook ? '#ffd79e' : '#888',
                                    fontWeight: 600,
                                    fontSize: '14px',
                                    cursor: canCook ? 'pointer' : 'not-allowed'
                                }}
                            >
                                🔥 요리하기
                            </button>
                        )}
                        {!hasAny ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || '쓸 만한 아이템이 없다.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {
                                    const def = InventorySystem.ITEMS[invItem.type] || {};
                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}
                                            style={{
                                                textAlign: 'left',
                                                padding: '10px 12px',
                                                background: '#0f3460',
                                                border: '1px solid #16213e'
                                            }}
                                        >
                                            <div style={{ fontWeight: 600, fontSize: '14px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                {/* D-92: 1단계 재료(음식)는 emoji prefix + 이름. */}
                                                {(() => {
                                                    const e = itemEmoji(invItem.type);
                                                    return e
                                                        ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                        : null;
                                                })()}
                                                <span>{def.name || invItem.name}</span>
                                            </div>
                                            {renderEffectRow(notionItem)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-57 (2026-04-24 요한 지시): 요리 모달.
        //   - 휴식 카드의 [🔥 요리하기] 버튼에서만 호출.
        //   - 1재료 요리 레시피(ingredients.length===1 && result.startsWith('grilled_'))만 노출.
        //   - 각 레시피 카드: 재료 → 결과물 미리보기 + [🔥 요리하기] 버튼.
        //     재료 보유 시만 활성. 클릭 시 inventory.craftRecipe 호출 → 결과물 생성.
        //   - 휴식 모달은 백그라운드에 유지 — 완성된 구이를 바로 식사 후보로 선택 가능.
        function CookingModal({ inventory, onCook, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byId = (id) => notionItems.find(it => it && it.id === id);
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => {
                const nDef = byId(type);
                if (nDef && nDef['이름']) return nDef['이름'];
                return defOf(type).name || type;
            };

            const combos = (window.TTD_DATA && Array.isArray(window.TTD_DATA.COMBOS))
                ? window.TTD_DATA.COMBOS : [];
            const recipes = combos.filter(r =>
                r && Array.isArray(r.ingredients)
                && r.ingredients.length === 1
                && typeof r.result === 'string'
                && r.result.startsWith('grilled_')
            );

            const items = (inventory && inventory.items) || [];
            const countOf = (type) => items.filter(i => i.type === type).length;

            return (
                <div className="modal" style={{ zIndex: 1200 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>🔥 요리</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        <div style={{ fontSize: '12px', color: '#d4b84a', marginBottom: '10px' }}>
                            불에 익히면 훨씬 든든하다.
                        </div>
                        {recipes.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                요리할 수 있는 레시피가 없다.
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                                {recipes.map((recipe, idx) => {
                                    const ingType = recipe.ingredients[0];
                                    const has = countOf(ingType);
                                    const canDo = has >= 1;
                                    const ingName = nameOf(ingType);
                                    const resultName = nameOf(recipe.result);
                                    const resultMeta = byId(recipe.result);
                                    const summary = resultMeta && resultMeta['효과 요약'];
                                    return (
                                        <div
                                            key={`cook:${idx}:${recipe.result}`}
                                            style={{
                                                padding: '10px 12px',
                                                background: canDo ? '#2a1f14' : '#1a1f2e',
                                                border: `1px solid ${canDo ? '#5a3a1f' : '#333'}`,
                                                borderRadius: '6px'
                                            }}
                                        >
                                            <div style={{ fontSize: '13px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                {/* D-92: 1단계 재료는 emoji로. 결과(2단계+)는 이름 그대로. */}
                                                <span style={{ color: canDo ? '#ffd79e' : '#888', display: 'inline-flex', alignItems: 'center' }}>
                                                    {(() => {
                                                        const e = itemEmoji(ingType);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : ingName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#666', margin: '0 4px' }}>→</span>
                                                <span style={{ color: canDo ? '#fff' : '#888', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
                                                    {(() => {
                                                        const e = itemEmoji(recipe.result);
                                                        return e
                                                            ? <span style={{ fontSize: '20px', lineHeight: 1 }}>{e}</span>
                                                            : resultName;
                                                    })()}
                                                </span>
                                                <span style={{ color: '#888', marginLeft: 'auto', fontSize: '11px' }}>
                                                    (보유 {has})
                                                </span>
                                            </div>
                                            {summary && (
                                                <div style={{ fontSize: '11px', color: '#aaa', marginBottom: '6px' }}>
                                                    {summary}
                                                </div>
                                            )}
                                            <button
                                                onClick={() => canDo && onCook(recipe)}
                                                disabled={!canDo}
                                                style={{
                                                    width: '100%',
                                                    padding: '8px',
                                                    background: canDo ? '#5a3a1f' : '#2a2a2e',
                                                    border: `1px solid ${canDo ? '#d4883a' : '#444'}`,
                                                    color: canDo ? '#ffd79e' : '#888',
                                                    fontSize: '12px',
                                                    fontWeight: 600,
                                                    cursor: canDo ? 'pointer' : 'not-allowed'
                                                }}
                                            >
                                                {canDo ? '🔥 요리하기' : '재료부족'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // D-47 합성 패널 — 인벤 모달 하단에 고정된 바 형태.
        //   - 드롭된 두 재료(pair) 중 하나 이상 포함된 모든 레시피 카드 노출.
        //   - 각 카드: 재료(필요 수량) + 결과, 보유량으로 완성 가능 여부·부족 재료 표기.
        //   - [만들기] 버튼: 재료 충분 + 결과물 놓을 빈 슬롯 있을 때만 활성.
        //   - 같은 재료 머지는 이 패널에 안 뜸 (즉시 실행 경로).
        //   D-104 (2026-04-27 요한 지시): 항상 렌더. 비선택 시 카테고리 탭 5종 노출.
        //     showCategoryTabs=true면 [전체][음식][무기][방어구][재료] 탭, onCategoryChange로 변경.
        //     onClose가 null이면 헤더 닫기 버튼 숨김(비선택 상태 = 가방 닫기로만 종료).
        function CraftPanel({ recipes, inventory, onCraft, onClose, showCategoryTabs, category, onCategoryChange, allowCooking, floating }) {
            const items = (inventory && inventory.items) || [];
            const defOf = (type) => InventorySystem.ITEMS[type] || {};
            const nameOf = (type) => defOf(type).name || type;

            // D-137: '구운' 음식(result가 grilled_로 시작)은 휴식 카드 → 요리 모달에서만 제작.
            //   가방의 일반 합성 패널에서는 카드 노출은 하되 만들기 버튼은 비활성("🔥 휴식 필요").
            //   allowCooking=true면 휴식 컨텍스트(현재는 사용 없음, 미래 확장 여지) — grilled도 활성.
            const isCookOnly = (recipe) => typeof recipe.result === 'string' && recipe.result.startsWith('grilled_');

            // 각 레시피 상태 계산: 재료 충분 + 결과 배치 공간 여부.
            const cards = recipes.map(recipe => {
                const evalR = InventorySystem.evaluateRecipe(recipe, items);
                const resultDef = defOf(recipe.result);
                const hasSpace = !!inventory.findEmptySpace(resultDef.shape || [[1]]);
                let disabledReason = null;
                if (!evalR.canCraft) disabledReason = 'short';
                else if (!hasSpace) disabledReason = 'no_space';
                else if (isCookOnly(recipe) && !allowCooking) disabledReason = 'rest_required';
                return { recipe, evalR, hasSpace, disabledReason };
            });
            // 만들 수 있는 것 먼저, 휴식필요, 공간부족, 재료부족 순.
            cards.sort((a, b) => {
                const rank = { null: 0, 'rest_required': 1, 'no_space': 2, 'short': 3 };
                return (rank[a.disabledReason] ?? 0) - (rank[b.disabledReason] ?? 0);
            });

            const CATEGORY_TABS = [
                { id: 'all', label: '전체' },
                { id: 'food', label: '음식' },
                { id: 'weapon', label: '무기' },
                { id: 'armor', label: '방어구' },
                { id: 'material', label: '재료' },
            ];

            return (
                <div style={{
                    position: floating ? 'static' : 'sticky',
                    bottom: floating ? 'auto' : 0,
                    background: '#0f1a2e',
                    border: '1px solid #2a3a5e',
                    borderRadius: '8px',
                    /* D-130: padding-bottom 24px — 스크롤 끝 카드와 panel 하단 사이 여유.
                       카드 리스트 마지막 행이 잘려 보이지 않도록 panel 자체 내부 마진 확보. */
                    padding: '10px 10px 24px',
                    /* D-152: floating(보관함 popover) 모드면 외곽 margin 0 + boxShadow 직접 적용.
                       margin 24px이 wrapper와 panel 사이 격차를 만들어 그림자가 panel 밖에 그려지던 문제. */
                    marginTop: floating ? 0 : '8px',
                    marginBottom: floating ? 0 : '16px',
                    boxShadow: floating ? '0 8px 24px rgba(0,0,0,0.6)' : 'none',
                    /* D-134: 40dvh → 50dvh. inventory-modal 자체 스크롤 허용으로 자식 자연
                       크기 stage 초과 시 모달이 스크롤 흡수 → panel 자체도 더 길게 가능. */
                    maxHeight: '50dvh',
                    overflowY: 'auto',
                    WebkitOverflowScrolling: 'touch'
                }}>
                    {/* D-127: 헤더 + 카테고리 탭은 sticky wrapper로 묶어 카드 리스트 스크롤
                       시에도 상단 고정. top:-10px와 negative margin으로 패널 padding 영역까지
                       배경 덮어 카드가 스크롤되어 들어와도 가려지게 함. */}
                    <div style={{
                        position: 'sticky',
                        top: '-10px',
                        background: '#0f1a2e',
                        margin: '-10px -10px 0 -10px',
                        padding: '10px 10px 8px 10px',
                        zIndex: 2,
                    }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: showCategoryTabs ? '8px' : 0 }}>
                            <div style={{ fontSize: '13px', fontWeight: 600, color: '#d4b84a' }}>
                                🔨 만들 수 있는 조합
                            </div>
                            {onClose && (
                                <button
                                    onClick={onClose}
                                    style={{ padding: '3px 8px', fontSize: '11px' }}
                                >
                                    닫기
                                </button>
                            )}
                        </div>
                        {showCategoryTabs && (
                            <div style={{
                                display: 'flex',
                                gap: '4px',
                                flexWrap: 'wrap'
                            }}>
                                {CATEGORY_TABS.map(tab => {
                                    const active = category === tab.id;
                                    return (
                                        <button
                                            key={tab.id}
                                            onClick={() => onCategoryChange && onCategoryChange(tab.id)}
                                            style={{
                                                padding: '4px 10px',
                                                fontSize: '11px',
                                                background: active ? '#d4b84a' : '#1a2f3e',
                                                color: active ? '#1a1a2e' : '#aaa',
                                                border: `1px solid ${active ? '#d4b84a' : '#2e5a6e'}`,
                                                fontWeight: active ? 700 : 500,
                                            }}
                                        >
                                            {tab.label}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                    {(!recipes || recipes.length === 0) && (
                        <div style={{ fontSize: '11px', color: '#666', padding: '12px 4px', textAlign: 'center' }}>
                            이 카테고리에 만들 수 있는 조합이 없다.
                        </div>
                    )}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                        {cards.map(({ recipe, evalR, disabledReason }, idx) => {
                            const need = evalR.need;
                            const shortage = evalR.shortage;
                            const buttonDisabled = disabledReason !== null;
                            const buttonLabel = disabledReason === 'no_space'
                                ? '공간부족'
                                : disabledReason === 'short'
                                    ? '재료부족'
                                    : disabledReason === 'rest_required'
                                        ? '🔥 휴식 필요'
                                        : '만들기';
                            return (
                                <div
                                    key={`recipe:${idx}:${recipe.result}`}
                                    style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '6px',
                                        padding: '8px',
                                        background: buttonDisabled ? '#1a1f2e' : '#1a2f3e',
                                        borderRadius: '6px',
                                        border: `1px solid ${buttonDisabled ? '#333' : '#2e5a6e'}`
                                    }}
                                >
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flex: 1, flexWrap: 'wrap' }}>
                                        {Object.entries(need).map(([type, count], i) => {
                                            const short = shortage[type] || 0;
                                            const has = (evalR.have[type] || 0);
                                            // D-92: 1단계 재료는 emoji로 노출.
                                            const emoji = itemEmoji(type);
                                            return (
                                                <React.Fragment key={`${type}:${i}`}>
                                                    {i > 0 && <span style={{ color: '#666' }}>+</span>}
                                                    <span style={{
                                                        fontSize: '12px',
                                                        color: short > 0 ? '#ff7777' : '#fff',
                                                        fontWeight: 500,
                                                        display: 'inline-flex',
                                                        alignItems: 'center',
                                                        gap: '2px'
                                                    }}>
                                                        {emoji
                                                            ? <span style={{ fontSize: '18px', lineHeight: 1 }}>{emoji}</span>
                                                            : nameOf(type)}
                                                        <span style={{ fontSize: '10px', color: short > 0 ? '#ff9999' : '#aaa', marginLeft: '2px' }}>
                                                            {has}/{count}
                                                        </span>
                                                    </span>
                                                </React.Fragment>
                                            );
                                        })}
                                        <span style={{ color: '#666', margin: '0 4px' }}>=</span>
                                        <span style={{ fontSize: '12px', fontWeight: 600, color: '#d4b84a', display: 'inline-flex', alignItems: 'center', gap: '3px' }}>
                                            {(() => {
                                                const e = itemEmoji(recipe.result);
                                                return e
                                                    ? <span style={{ fontSize: '18px', lineHeight: 1 }}>{e}</span>
                                                    : nameOf(recipe.result);
                                            })()}
                                        </span>
                                    </div>
                                    <button
                                        onClick={() => onCraft(recipe)}
                                        disabled={buttonDisabled}
                                        style={{
                                            padding: '6px 10px',
                                            fontSize: '12px',
                                            fontWeight: 600,
                                            background: buttonDisabled ? '#333' : '#4CAF50',
                                            color: '#fff',
                                            border: 'none',
                                            borderRadius: '4px',
                                            cursor: buttonDisabled ? 'not-allowed' : 'pointer'
                                        }}
                                    >
                                        {buttonLabel}
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // D-161 (2026-04-29 요한 지시): LootToast / TileEventToast 폐기.
        //   메시지 UI 개편 — 모든 발견·획득·이벤트 결과를 하단 "내레이션 바"(state: message)에 합성.
        //   토스트가 화면 위에 떠서 정보가 분산되던 문제 해결. 이모지·색상은 메시지 안에 인라인.
        //   필요시 git log에서 D-160 이전 버전(LootToast/TileEventToast) 참고.

        // 보스 점프스케어 — listen 거리=1 감지 시 화면 전체 공룡 아이콘이 빠르게 확대/소실.
        // 의도: 공포 원칙 강화. 테두리 색(빨강) 토스트만으로는 인접 경고가 약하다는 판단.
        // CSS animation 0.55s 단일 재생. active=false로 내려주면 즉시 제거.
        function BossJumpscare({ active, onDone }) {
            React.useEffect(() => {
                if (!active) return;
                const t = setTimeout(() => { onDone && onDone(); }, 550);
                return () => clearTimeout(t);
            }, [active]);
            if (!active) return null;
            return (
                <div className="boss-jumpscare-overlay">
                    <div className="boss-jumpscare-icon">🦖</div>
                </div>
            );
        }

        // 플레이 가이드 모달 — 인게임 [플레이방법] 버튼으로 호출.
        // D-53 (2026-04-23 요한 지시): 게임을 처음 만나는 사람도 바로 이해할 수 있는
        // 간소화 가이드. GUIDE.md(외부 공유용 상세본)와 별도로, 인게임에서는 핵심만.
        function HelpModal({ onClose }) {
            const sectionTitle = {
                fontSize: '14px',
                fontWeight: 700,
                color: '#d4b84a',
                marginTop: '14px',
                marginBottom: '6px',

            };

            return (
                <div className="modal" onClick={onClose}>

                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                            <div style={{ fontSize: '18px', fontWeight: 700 }}>타임 투 다이노</div>

                        </div>

                        <div style={para}>

                        </div>
                        <div style={para}>
                            <a href="https://uzudang2.github.io/time-to-dino/" target="_blank" rel="noopener" style={link}>
                                플레이하기 ↗
                            </a>
                        </div>

                        <div style={sectionTitle}>🎯 목표</div>
                        <div style={para}>
                            지도 어딘가의 <b style={{ color: '#2196F3' }}>파란 탈출구 타일</b>에 도착하면 승리.
                        </div>

                            <li>체력이 0이 되거나</li>

                        <div style={sectionTitle}>🃏 기본 흐름</div>

                        <div style={para}>주로 하는 일은 세 가지:</div>
                        <ul style={list}>
                            <li>이동하기</li>
                            <li>아이템 모으기</li>
                            <li>보스에게 들키지 않기</li>
                        </ul>

                        <div style={sectionTitle}>⚠️ 꼭 알아야 할 3가지</div>
                        <ul style={list}>
                            <li><b>배고픔</b>은 이동할 때마다 줄어듭니다.</li>
                            <li><b>발각률 80% 이상</b>이 되면 보스가 추격합니다.</li>
                            <li>귀 기울이기 / 숨기 / 휴식으로 위험을 낮출 수 있습니다.</li>
                        </ul>

                        <div style={sectionTitle}>🎴 카드 설명</div>
                        <ul style={list}>

                            <li><b>귀 기울이기</b>: 주변 타일 확인, 보스 거리 파악, 발각률 감소</li>
                            <li><b>음식 찾기</b>: 음식 획득 시도</li>
                            <li><b>숨기</b>: 발각률 크게 감소</li>
                            <li><b>휴식</b>: 음식 소비 후 체력·배고픔 회복</li>
                        </ul>

                        <div style={sectionTitle}>🎒 아이템</div>
                        <div style={para}>

                        </div>
                        <ul style={list}>

                        <div style={sectionTitle}>💡 생존 팁</div>
                        <ul style={list}>
                            <li>이동 전에 <b>귀 기울이기</b>를 먼저 쓰세요.</li>
                            <li><b>풍족한 땅</b>에서는 아이템이 잘 나옵니다.</li>
                            <li>배고픔이 바닥나기 전에 음식을 챙기세요.</li>
                            <li>발각률이 높아지면 숨기나 휴식으로 조절하세요.</li>
                        </ul>

                        <ul style={list}>
                            <li><b>전투 시스템</b> — 몬스터와 카드 전투</li>
                            <li><b>사냥감 시스템</b> — 지도에 동물이 나타남</li>
                            <li><b>재료 아이템 용도</b> — 돌멩이·나뭇가지 등으로 무기·덫·거처 제작</li>
                            <li><b>빌딩/거점</b> — 임시 거처로 회복 거점 운영</li>

                        <div style={{ marginTop: '14px', textAlign: 'center' }}>

                    </div>
                </div>
            );

        // 카드 더미(덱/무덤) 목록 모달
        //
        // D-27 HUD 리뉴얼 (요한 지시 2026-04-22):
        // - 덱/무덤을 버튼으로 만들고, 클릭 시 남은 카드 목록을 이 모달로 보여준다.
        // - CardItemConsumeModal과 UI 구조를 공유하는 "쌍둥이" 모달.
        // - 읽기 전용: 카드 선택으로 소비되지 않는다(목록 확인용).
        function CardListModal({ title, cards, emptyText, onClose }) {
            // 이름별로 묶어서 카운트 — 같은 카드가 여러 장일 때 가독성 향상.
            const grouped = cards.reduce((acc, c) => {
                const key = c.name;
                if (!acc[key]) acc[key] = { name: c.name, effect: c.effect, detection: c.detection, time: c.time, count: 0 };
                acc[key].count += 1;
                return acc;
            }, {});
            const list = Object.values(grouped);

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{title} ({cards.length})</h3>
                            <button onClick={onClose}>닫기</button>
                        </div>
                        {list.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || '카드가 없습니다.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {list.map((entry, i) => (
                                    <div
                                        key={i}
                                        style={{
                                            padding: '10px 12px',
                                            background: '#0f3460',
                                            border: '1px solid #16213e',
                                            borderRadius: '6px'
                                        }}
                                    >
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{entry.name}</div>
                                            {entry.count > 1 && (
                                                <div style={{ fontSize: '12px', color: '#aaa' }}>×{entry.count}</div>
                                            )}
                                        </div>
                                        <div style={{ fontSize: '11px', color: '#aaa', marginTop: '3px' }}>
                                            {entry.effect}
                                        </div>
                                        <div style={{
                                            fontSize: '10px',
                                            color: entry.detection > 0 ? '#c04a5e' : '#4CAF50',
                                            marginTop: '2px'
                                        }}>
                                            발각 {entry.detection > 0 ? '+' : ''}{entry.detection}% · ⏰{entry.time}h
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 게임 오버/승리 모달
        // D-54 (2026-04-23 요한 지시): 게임오버 팝업에 사망 사유별 감성 문구 + 가이드.
        // 사유: 'starvation' | 'health' | 'boss' | null(승리·미지정)
        const DEATH_NARRATIVE = {
            starvation: {
                subtitle: '배고픔에 지쳐 쓰러지고 말았다...',
                guide: '음식을 꾸준히 섭취하세요. 더 높은 등급의 음식과 휴식을 함께 사용하면 배고픔을 이겨내기 쉽습니다.'
            },
            health: {
                subtitle: '상처가 깊어, 더는 일어설 수 없었다...',
                guide: '함정을 피하고, 위험한 타일 앞에서는 귀 기울이기로 상황을 먼저 살피세요. 풍족한 땅에서 회복에 쓸 재료를 꾸준히 모아두는 것도 좋습니다.'
            },
            boss: {
                subtitle: '보스가 당신을 삼켰습니다',
                guide: '발각률이 80%를 넘으면 보스가 추격해 옵니다. 귀 기울이기로 거리를 파악하고, 숨기·휴식으로 발각률을 낮추세요. 보스 위치가 드러나면 반대 방향으로 우회하는 편이 안전합니다.'
            }
        };

        // D-90 (2026-04-25 요한 지시): 제자리 클릭 시간 보내기 확인 모달.
        //   타일을 자기 자신에게 클릭하면 다른 타일 이동과 동일한 규칙(시간/배고픔/발각률/
        //   보스 이동/손패 사이클)이 적용된다. 의도치 않은 자가 클릭에 시간이 흘러가는 걸

        // D-90 (2026-04-25 요한 지시): 포식중인 보스 인접 1칸에서 귀기울이기 시
        //   점프스케어 직후 띄우는 정보 모달. "지금이 몰래 통과할 기회다" 알림.

        // ============================================
        // D-109 (2026-04-24): 베이스캠프 1단계 — 시나리오·캠프 화면·퀘스트.
        //   게임 흐름: intro → play → camp → play → camp ...
        //   App 컴포넌트가 view state로 분기, Game은 한 번의 탐험 루프.
        // ============================================

        // 시나리오 텍스트 — 디렉터 작성, 변경 금지.
        const INTRO_SCENARIO_TEXT = `정신이 든다.

흙냄새가 코에 닿는다. 차갑고 축축하다.
풀뿌리를 움켜쥔 손가락이 차게 식어 있다.

빽빽한 잎사귀가 하늘을 가린 채,
새벽인지 황혼인지 모를 빛이 새어든다.

…저런 소리를 내는 것을 본 적은 없다.
