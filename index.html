<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>рҹҰ– нғҖмһ„нҲ¬лӢӨмқҙл…ё</title>
    
    <!-- мҠӨнғҖмқј -->
    <link rel="stylesheet" href="gameStyles.css">
    
    <!-- мҷёл¶Җ лқјмқҙлёҢлҹ¬лҰ¬ -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- лҚ°мқҙн„° лІҲл“Ө (мӢңнҠё + Notion м•„мқҙн…ң SSOT мҠӨлғ…мғ·, scripts/fetch_data.pyлЎң мһ¬мғқм„ұ) -->
    <script src="data/data.js"></script>

    <!-- кІҢмһ„ лӘЁл“Ҳ -->
    <script src="mapGenerator.js"></script>
    <script src="inventory.js"></script>
    <script src="boss.js"></script>
    <script src="dropTable.js"></script>
    <script src="effectParser.js"></script>
    <script src="combatDeck.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // React м»ҙнҸ¬л„ҢнҠёл“Ө
        // ============================================

        // мғҒлӢЁ мҠӨнғҜ нҢЁл„җ м»ҙнҸ¬л„ҢнҠё
        //
        // D-27 HUD лҰ¬лүҙм–ј (мҡ”н•ң м§ҖмӢң 2026-04-22):
        // - мғқлӘ…л Ҙ/л°°кі мӣҖмқҖ кІҢмқҙм§Җ(л°”) вҖ” л°ңк°ҒлҘ  л°” мҠӨнғҖмқј лӢөмҠө, кІҢмһ„ лӢӨнҒ¬нҶӨ мң м§Җ.
        // - л°°кі н”” <= 3мқј л•Ң л…ёлһҖмғү(#d4b84a, мұ„лҸ„ лӮ®м¶Ө)мңјлЎң кІҪкі .
        // - мӢңк°„мқҖ мҲ«мһҗк°Җ м•„лӢҢ 'мӢңкі„ м•„мқҙмҪҳ'. maxTimeл§ҢнҒј н‘ңмӢңн•ҳкі  мҶҢлӘЁлҗң л§ҢнҒј м–ҙл‘ЎкІҢ.
        // - мӢңк°„ м „л¶Җ мҶҢлӘЁ(time >= maxTime) мӢң мҲ«мһҗ/м•„мқҙмҪҳ лӘЁл‘җ л№Ёк°•мңјлЎң кІҪкі .
        // - кІҢмһ„ лӢӨнҒ¬ л¶„мң„кё°мҷҖ мЎ°нҷ”лҘј мң„н•ҙ л№Ёк°•/л…ёлһ‘ мұ„лҸ„лҠ” лӮ®кІҢ мң м§Җ.
        //
        // D-37 HUD 2мӨ„ м••м¶• (мҡ”н•ң м§ҖмӢң 2026-04-22, 7м°Ё м„ём…ҳ):
        // - мғҒлӢЁ HUD м„ёлЎң кёёмқҙлҘј мӨ„м—¬ лӘЁл°”мқјм—җм„ң л§ө к°ҖмӢң мҳҒм—ӯ нҷ•ліҙ.
        // - 1мӨ„: [мғқлӘ…л Ҙ кІҢмқҙм§Җ][л°°кі н”” кІҢмқҙм§Җ][мӢңк°„ мӢңкі„]  (3к°ң н•ң мӨ„)
        // - 2мӨ„: [ліҙмҠӨ мҲңм°°/м¶”кІ©][л°ңк°ҒлҘ  л°”]             (2к°ң н•ң мӨ„, л°ңк°Ғ л°”лҠ” flex-grow)
        // - лқјлІЁ м ңкұ°, м•„мқҙмҪҳл§Ң н‘ңмӢң. мҲ«мһҗ нҸ°нҠё нҒ¬кё° м¶•мҶҢ.
        // - кІҢмқҙм§Җ лҶ’мқҙ 12 вҶ’ 10, л°ңк°Ғ л°” 20 вҶ’ 14.
        // - кё°мЎҙ stat-box padding м¶•мҶҢ н•„мҡ” мӢң мқёлқјмқёмңјлЎңл§Ң мҳӨлІ„лқјмқҙл“ң(м „м—ӯ .stat-boxлҠ” лӢӨлҘё кіім—җм„ң мһ¬мӮ¬мҡ©).
        function StatPanel({ health, hunger, time, maxTime, boss, detection, message }) {
            const detectionColor = detection < 30 ? '#4CAF50' :
                                  detection < 60 ? '#FFC107' : '#e94560';

            const MAX_HEALTH = 6;
            const MAX_HUNGER = 12;
            const healthPct = Math.max(0, Math.min(100, (health / MAX_HEALTH) * 100));
            const hungerPct = Math.max(0, Math.min(100, (hunger / MAX_HUNGER) * 100));

            // мұ„лҸ„ лӮ®м¶ҳ кІҪкі мғү (лӢӨнҒ¬нҶӨ мЎ°нҷ”). кё°ліёмқҖ кё°мЎҙ нҢ”л ҲнҠё мң м§Җ.
            const healthColor = health <= 0
                ? '#8a2b3a'
                : health <= 2 ? '#c04a5e' : '#b24656';
            const hungerLow = hunger <= 3;
            const hungerColor = hungerLow ? '#d4b84a' : '#c08a3e';
            const timeEmpty = time >= maxTime;
            const timeTextColor = timeEmpty ? '#c04a5e' : '#eee';

            // м»ҙнҢ©нҠё stat-box мҠӨнғҖмқј вҖ” 2мӨ„ HUDм—җм„ң лҶ’мқҙлҘј лӮ®м¶”кё° мң„н•ҙ padding м¶•мҶҢ.
            const compactBox = { padding: '5px 7px' };

            return (
                <div>
                    {/* 1мӨ„: мғқлӘ…л Ҙ В· л°°кі н”” В· мӢңк°„ (3к°ң н•ң мӨ„) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '5px', alignItems: 'stretch' }}>
                        <StatGauge
                            icon="вқӨпёҸ"
                            value={health}
                            max={MAX_HEALTH}
                            pct={healthPct}
                            color={healthColor}
                            valueColor="#eee"
                            flex={1}
                        />
                        <StatGauge
                            icon="рҹҚ–"
                            value={hunger}
                            max={MAX_HUNGER}
                            pct={hungerPct}
                            color={hungerColor}
                            valueColor={hungerLow ? '#d4b84a' : '#eee'}
                            flex={1}
                        />
                        <div className="stat-box" style={{ ...compactBox, display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', gap: '2px' }}>
                                {/* D-43 (2026-04-23): лӮЁмқҖ нҡҢмҲҳ н‘ңмӢңлЎң л°ҳм „.
                                    - л°қмқҖ м•„мқҙмҪҳ = м•„м§Ғ м“ё мҲҳ мһҲлҠ” нҡҢмҲҳ, м–ҙл‘җмҡҙ м•„мқҙмҪҳ = мҶҢлӘЁлҗЁ.
                                    - мӢңмһ‘ 3/3 вҶ’ м „л¶Җ мҶҢлӘЁ мӢң 0/3. */}
                                {Array.from({ length: maxTime }).map((_, i) => {
                                    // iк°Җ мһ‘мқ„мҲҳлЎқ лЁјм Җ мҶҢлӘЁлҗЁ. лӮЁмқҖ к°ңмҲҳлҠ” (maxTime - time).
                                    const remaining = i < (maxTime - time);
                                    return (
                                        <span
                                            key={i}
                                            style={{
                                                fontSize: '14px',
                                                lineHeight: 1,
                                                opacity: remaining ? 1 : 0.25,
                                                filter: timeEmpty
                                                    ? 'grayscale(1) brightness(0.9)'
                                                    : remaining ? 'none' : 'grayscale(1) brightness(0.7)',
                                                color: timeEmpty ? '#c04a5e' : undefined,
                                                transition: 'all 0.2s'
                                            }}
                                        >
                                            рҹ•°пёҸ
                                        </span>
                                    );
                                })}
                            </div>
                            <span style={{
                                fontSize: '11px',
                                fontWeight: '600',
                                color: timeTextColor,
                            }}>
                                {maxTime - time}/{maxTime}
                            </span>
                        </div>
                    </div>

                    {/* 2мӨ„: ліҙмҠӨ мғҒнғң В· л°ңк°ҒлҘ  л°” (л°ңк°Ғ л°”к°Җ лӮЁмқҖ нҸӯ м°Ём§Җ) */}
                    <div style={{ display: 'flex', gap: '5px', marginBottom: '6px', alignItems: 'stretch' }}>
                        <div
                            className="stat-box"
                            style={{
                                ...compactBox,
                                display: 'flex',
                                alignItems: 'center',
                                fontSize: '12px',
                                fontWeight: '600',
                                flexShrink: 0,
                                color: boss?.chaseMode ? '#e94560' : '#eee'
                            }}
                            title={boss?.chaseMode ? 'м¶”кІ© мӨ‘' : 'мҲңм°° мӨ‘'}
                        >
                            {boss?.chaseMode ? 'рҹ”ҙ м¶”кІ©' : 'рҹҹў мҲңм°°'}
                        </div>
                        <div
                            className="stat-box"
                            style={{ ...compactBox, flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}
                        >
                            <span style={{ fontSize: '12px', lineHeight: 1 }}>рҹҡЁ</span>
                            <div style={{
                                flex: 1,
                                background: '#0f3460',
                                height: '14px',
                                borderRadius: '7px',
                                overflow: 'hidden',
                                position: 'relative'
                            }}>
                                <div style={{
                                    width: `${detection}%`,
                                    height: '100%',
                                    background: detectionColor,
                                    transition: 'all 0.3s'
                                }} />
                                <div style={{
                                    position: 'absolute',
                                    inset: 0,
                                    display: 'flex',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    fontSize: '10px',
                                    fontWeight: '600',
                                    color: '#fff',
                                    textShadow: '0 0 2px rgba(0,0,0,0.6)'
                                }}>
                                    {detection}%
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="stat-box" style={{ fontSize: '13px', marginBottom: '8px', padding: '6px 8px' }}>
                        {message}
                    </div>
                </div>
            );
        }

        // мҠӨнғҜ кІҢмқҙм§Җ вҖ” л°ңк°ҒлҘ  л°”мҷҖ лҸҷмқј кө¬мЎ°. м•„мқҙмҪҳ + кІҢмқҙм§Җ + мҲ«мһҗ.
        // D-37: лқјлІЁ м ңкұ°В·м»ҙнҢ©нҠё padding. `flex` propмңјлЎң мҷёл¶Җм—җм„ң л„Ҳл№„ л°°л¶„ м ңм–ҙ.
        function StatGauge({ icon, value, max, pct, color, valueColor, flex }) {
            return (
                <div className="stat-box" style={{ padding: '5px 7px', flex: flex, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                        <span style={{ fontSize: '13px', lineHeight: 1 }}>{icon}</span>
                        <div style={{
                            flex: 1,
                            background: '#0f3460',
                            height: '10px',
                            borderRadius: '5px',
                            overflow: 'hidden',
                            minWidth: 0
                        }}>
                            <div style={{
                                width: `${pct}%`,
                                height: '100%',
                                background: color,
                                transition: 'all 0.3s'
                            }} />
                        </div>
                        <span style={{
                            fontSize: '11px',
                            fontWeight: '600',
                            color: valueColor,
                            minWidth: '28px',
                            textAlign: 'right',
                            flexShrink: 0
                        }}>
                            {value}/{max}
                        </span>
                    </div>
                </div>
            );
        }

        // мҶҗнҢЁ м№ҙл“ң м»ҙнҸ¬л„ҢнҠё
        // мҶҗнҢЁ мғҒн•ң 5мһҘ(HAND_SIZE) вҖ” 5м—ҙ к·ёлҰ¬л“ңлЎң н•ң мӨ„м—җ н‘ңмӢңн•ңлӢӨ.
        // н•ң мӨ„м—җ лӘЁл“  м№ҙл“ңк°Җ л“Өм–ҙк°Җм•ј мғҒлӢЁ UIк°Җ мҠӨнҒ¬лЎӨ м—Ҷмқҙ мң м§ҖлҗЁ(кё°нҡҚ мӣҗм№ҷ: н•ҳлӢЁ л§ө мҠӨнҒ¬лЎӨл§Ң н—Ҳмҡ©).
        // мўҒмқҖ нҸӯм—җм„ңлҠ” нҸ°нҠё/нҢЁл”©мқҙ мқҙлҜё 10~13pxмқҙлқј 5м—ҙлҸ„ м•Ҳм •.
        function HandCards({ hand, gameOver, victory, useCard }) {
            if (gameOver || victory || hand.length === 0) return null;

            return (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '6px' }}>
                    {hand.map(card => (
                        <div key={card.uid} className="card" onClick={() => useCard(card)}>
                            <div style={{ fontSize: '13px', fontWeight: '600', marginBottom: '3px' }}>
                                {card.name}
                            </div>
                            <div style={{ fontSize: '10px', color: '#aaa' }}>
                                {card.effect}
                            </div>
                            <div style={{ fontSize: '10px', color: card.detection > 0 ? '#e94560' : '#4CAF50' }}>
                                л°ңк°Ғ {card.detection > 0 ? '+' : ''}{card.detection}% В· вҸ°{card.time}h
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // м§Җм—ӯ н•ңкёҖ лқјлІЁ (кё°нҡҚмғҒ regionмқҖ мқҙлҜё н•ңкёҖмқҙлқј л§Өн•‘ л¶Ҳн•„мҡ”н•ҳм§Җл§Ң,
        // м¶”нӣ„ мҳҒм–ҙ мҪ”л“ңлЎң л°”кҝҖ м—¬м§Җк°Җ мһҲм–ҙ л§өмқ„ л‘”лӢӨ. мқјм№ҳн•ҳл©ҙ к·ёлҢҖлЎң л…ём¶ң).
        const REGION_LABEL = {
            'мҲІ': 'мҲІ', 'лҚӨл¶Ҳ': 'лҚӨл¶Ҳ', 'нҸүмӣҗ': 'нҸүмӣҗ', 'мӢңлғҮл¬ј': 'мӢңлғҮл¬ј', 'лҸҷкөҙ': 'лҸҷкөҙ',
            forest: 'мҲІ', thicket: 'лҚӨл¶Ҳ', plain: 'нҸүмӣҗ', stream: 'мӢңлғҮл¬ј', cave: 'лҸҷкөҙ'
        };

        // мңЎк°Ғнҳ• нғҖмқј м»ҙнҸ¬л„ҢнҠё
        //
        // D-50 (2026-04-23 мҡ”н•ң м§ҖмӢң): м—”нӢ°нӢ°(н”Ңл Ҳмқҙм–ҙВ·ліҙмҠӨВ·мӮ¬лғҘк°җ)лҘј
        // нғҖмқј л°°кІҪ/лқјлІЁлЎң м„һм–ҙ н‘ңнҳ„н•ҳлҚҳ л°©мӢқмқ„ нҸҗкё°н•ҳкі ,
        // SVG мҳӨлІ„л Ҳмқҙ "л§җ"(piece)лЎң л¶„лҰ¬. нғҖмқјмқҖ м§Җнҳ• мҶҚм„ұл§Ң н‘ңнҳ„.
        // - getTileColor: boss/isCurrent мЎ°кұҙ м ңкұ°. м§Җнҳ•(good/trap/exit/start/...)л§Ң.
        // - getTileLabel: 'лӮҙмң„м№ҳ'/'рҹҰ–' м ңкұ°. л§җмқҙ мһҲлҠ” нғҖмқјмқҖ мӨ‘м•ҷ лқјлІЁ мҲЁк№Җ(л§җмқҙ лҢҖмӢ  м°Ём§Җ).
        // - л§җ л ҢлҚ”л§ҒмқҖ GameMapм—җм„ң HexTile мң„м—җ SVG textлЎң мҲҳн–ү (мІҙмҠӨл§җ лҠҗлӮҢ).
        function HexTile({ tile, currentTile, tiles, boss, bossVisible, gameOver, victory, moveTo }) {
            const { x, y } = tile.position;
            const isCurrent = tile.id === currentTile;
            const canMove = tiles[currentTile].connections.includes(tile.id);
            const isBoss = boss && tile.id === boss.position && bossVisible;
            const isRevealed = tile.revealed || tile.visited;

            // кёёмқҙ м—ҶлҠ” нғҖмқј (connections м—ҶмқҢ) нҢҗлі„
            const hasNoConnections = tile.connections.length === 0 &&
                                    tile.type !== 'start' &&
                                    tile.type !== 'exit';

            const getTileColor = (tile) => {
                if (!tile.visited && !tile.revealed) return '#1a1f3a';
                if (tile.type === 'start') return '#4CAF50';
                if (tile.type === 'exit' && tile.revealed) return '#2196F3';
                if (tile.type === 'trap' && tile.revealed) return '#e94560';
                if (tile.type === 'good' && tile.revealed) return '#FFC107';
                return '#2d3561';
            };

            const getTileLabel = () => {
                if (!isRevealed) return '?';
                // D-50: л§җмқҙ мҳ¬лқјмҳЁ нғҖмқјмқҖ мӨ‘м•ҷ лқјлІЁ мҲЁк№Җ вҖ” л§җ м•„мқҙмҪҳмқҙ к·ё мһҗлҰ¬лҘј м°Ём§Җ.
                // нғҖмқј мҶҚм„ұмқҖ л°°кІҪмғүмңјлЎң кі„мҶҚ ліҙмқҙлҜҖлЎң м§Җнҳ• м •ліҙ мҶҗмӢӨ м—ҶмқҢ.
                if (isCurrent || isBoss) return '';
                if (tile.type === 'exit') return 'нғҲм¶ңкө¬';
                if (tile.type === 'good') return 'рҹҢҫ';
                if (tile.type === 'trap') return 'вҡ пёҸ';
                return '';
            };

            // м§Җм—ӯ мқҙлҰ„ мҳӨлІ„л Ҳмқҙ.
            // D-51 (2026-04-23 мҡ”н•ң м§ҖмӢң): revealed(к·Җкё°мҡёмқҙкё° л“ұ)лҸ„ м§Җнҳ• мқҙлҰ„ л…ём¶ң.
            // мқҙм „(D-27~): visitedл§Ң н‘ңмӢң. мқҙм ң listenмңјлЎң мЈјліҖ м§Җнҳ• нҢҢм•…мқҙ к°ҖлҠҘн•ҙм§җ.
            // л°©л¬ё(visited)кіј м •м°°(revealed only) кө¬л¶„:
            // - visited: мҙҲлЎқ лҸҷк·ёлһҖ л§Ҳм»Ө + м§Җнҳ• мқҙлҰ„, нғҖмқј л°қмқҢ(opacity 1)
            // - revealed only: м§Җнҳ• мқҙлҰ„л§Ң (л§Ҳм»Ө м—ҶмқҢ), нғҖмқј м•Ҫк°„ м–ҙл‘җмӣҖ(opacity 0.7)
            // - лҜёкіөк°ң: м•„л¬ҙкІғлҸ„ м—ҶмқҢ, нғҖмқј л§Өмҡ° м–ҙл‘җмӣҖ(opacity 0.55)
            const regionLabel = (tile.visited || tile.revealed) && tile.region
                ? (REGION_LABEL[tile.region] || tile.region)
                : null;
            const tileOpacity = tile.visited ? 1 : tile.revealed ? 0.7 : 0.55;

            return (
                <g key={tile.id} opacity={hasNoConnections ? 0 : 1}>
                    <polygon
                        className="hex-tile"
                        points={`${x},${y-50} ${x+43},${y-25} ${x+43},${y+25} ${x},${y+50} ${x-43},${y+25} ${x-43},${y-25}`}
                        fill={getTileColor(tile)}
                        stroke={canMove ? '#4CAF50' : '#0f3460'}
                        strokeWidth={canMove ? '3' : '2'}
                        opacity={tileOpacity}
                        onClick={() => !gameOver && !victory && canMove && moveTo(tile.id)}
                    />
                    {regionLabel && (
                        <g className="hex-region-label" pointerEvents="none">
                            <rect
                                x={x - 32}
                                y={y - 44}
                                width="64"
                                height="16"
                                rx="3"
                                fill="rgba(0,0,0,0.55)"
                            />
                            {tile.visited && (
                                <circle cx={x - 22} cy={y - 36} r="3" fill="#4CAF50" />
                            )}
                            <text
                                x={x}
                                y={y - 32}
                                textAnchor="middle"
                                fill="#f5f5f5"
                                fontSize="11"
                                fontWeight="600"
                            >
                                {regionLabel}
                            </text>
                        </g>
                    )}
                    <text
                        x={x}
                        y={y + 5}
                        textAnchor="middle"
                        fill={isRevealed ? '#fff' : '#666'}
                        fontSize={isRevealed ? '14' : '24'}
                        fontWeight={isRevealed ? '700' : 'bold'}
                    >
                        {getTileLabel()}
                    </text>
                </g>
            );
        }

        // кІҢмһ„ л§ө м»ҙнҸ¬л„ҢнҠё
        //
        // D-46 (2026-04-22 мҡ”н•ң м§ҖмӢң): LootToastлҘј .map-container(мҠӨнҒ¬лЎӨ мҳҒм—ӯ)
        // л°–мңјлЎң л№јкі  .map-area лһҳнҚјмқҳ нҳ•м ңлЎң л‘”лӢӨ. мқҙм „(D-39)м—җлҠ” л§ө м•Ҳм—җ л„Јм–ҙ
        // "л§өм—җм„ң нҡҚл“қ" кіөк°„к°җмқ„ мӮҙл ём§Җл§Ң, лӘЁл°”мқјм—җм„ң л§өмқ„ мҠӨнҒ¬лЎӨн•ҳл©ҙ absolute
        // мһҗмӢқмқҙ мҪҳн…җмё мҷҖ н•Ёк»ҳ л°Җл Ө мӢңм•јм—җм„ң мӮ¬лқјм§ҖлҠ” л¬ём ңк°Җ мһҲм—ҲмқҢ.
        // .map-areaлҠ” HUD л°”лЎң м•„лһҳ мҳҒм—ӯмқҙлқј, нҶ мҠӨнҠёлҠ” мҠӨнҒ¬лЎӨкіј л¬ҙкҙҖн•ҳкІҢ
        // к·ё мғҒлӢЁм—җ кі м •мңјлЎң лңЁкі  HUD/м№ҙл“ңмҷҖлҸ„ кІ№м№ҳм§Җ м•ҠлҠ”лӢӨ.
        function GameMap({ tiles, currentTile, boss, bossVisible, gameOver, victory, moveTo, lootToast, onLootToastDone, tileEventToast, onTileEventToastDone }) {
            const visibleTiles = tiles.filter(t => t.visited || t.discovered || t.revealed);
            const containerRef = React.useRef(null);

            // D-47 (2026-04-22 мҡ”н•ң м§ҖмӢң): кІҢмһ„ мӢңмһ‘ мӢң нҳ„мһ¬ мң„м№ҳ нғҖмқјмқҙ мҠӨнҒ¬лЎӨ
            // л·°нҸ¬нҠё мӨ‘м•ҷм—җ мҳӨлҸ„лЎқ 1нҡҢ м •л ¬. мқҙм „м—” н•ӯмғҒ (0,0)м—җм„ң мӢңмһ‘н•ҙ л§ӨлІҲ
            // мӢңмһ‘ мң„м№ҳлҘј м°ҫм•„м•ј н–ҲмқҢ.
            // useLayoutEffectлЎң paint м „м—җ мҠӨнҒ¬лЎӨмқ„ мһЎм•„ к№ңл№Ўмһ„ м—ҶмқҢ.
            // л§ҲмҡҙнҠё мӢң 1нҡҢл§Ң вҖ” мқҙнӣ„ мқҙлҸҷ мһҗмң , мһҗлҸҷ м¶”м ҒмқҖ м•Ҳ н•Ё.
            React.useLayoutEffect(() => {
                const el = containerRef.current;
                if (!el) return;
                const cur = tiles[currentTile];
                if (!cur || !cur.position) return;
                el.scrollLeft = cur.position.x - el.clientWidth / 2;
                el.scrollTop = cur.position.y - el.clientHeight / 2;
            }, []);

            // D-50: м—”нӢ°нӢ° л§җ(piece) вҖ” нғҖмқј мң„м—җ м–№нһҲлҠ” SVG text мҳӨлІ„л Ҳмқҙ.
            // мІҙмҠӨл§җмІҳлҹј нғҖмқј мӮ¬мқҙлҘј мҳ®кІЁлӢӨлӢҲлҠ” "м—”нӢ°нӢ°" н‘ңнҳ„. л°°кІҪ(м§Җнҳ•)мқҖ к·ёлҢҖлЎң.
            // лӮҳмӨ‘м—җ мӮ¬лғҘк°җ(prey) м•„мқҙмҪҳлҸ„ к°ҷмқҖ нҢЁн„ҙмңјлЎң м¶”к°Җлҗ  мҳҲм •.
            const playerPos = tiles[currentTile] && tiles[currentTile].position;
            const bossPiecePos = (boss && bossVisible && tiles[boss.position])
                ? tiles[boss.position].position
                : null;

            return (
                <div className="map-area">
                    <div className="map-container" ref={containerRef}>
                        <svg className="map-svg" width="1100" height="1000">
                            {visibleTiles.map(tile => (
                                <HexTile
                                    key={tile.id}
                                    tile={tile}
                                    currentTile={currentTile}
                                    tiles={tiles}
                                    boss={boss}
                                    bossVisible={bossVisible}
                                    gameOver={gameOver}
                                    victory={victory}
                                    moveTo={moveTo}
                                />
                            ))}
                            {playerPos && (
                                <text
                                    className="piece piece-player"
                                    x={playerPos.x}
                                    y={playerPos.y + 11}
                                    textAnchor="middle"
                                    fontSize="32"
                                    fontWeight="700"
                                    fill="#fff"
                                    stroke="#1a1a2e"
                                    strokeWidth="1.5"
                                    paintOrder="stroke"
                                >
                                    вҷҹ
                                </text>
                            )}
                            {bossPiecePos && (
                                <text
                                    className="piece piece-boss"
                                    x={bossPiecePos.x}
                                    y={bossPiecePos.y + 11}
                                    textAnchor="middle"
                                    fontSize="30"
                                >
                                    рҹҰ–
                                </text>
                            )}
                        </svg>
                    </div>
                    <LootToast toast={lootToast} onDone={onLootToastDone} />
                    <TileEventToast toast={tileEventToast} onDone={onTileEventToastDone} />
                </div>
            );
        }

        // нғҖмқј мқҙлІӨнҠё лӘЁлӢ¬ м»ҙнҸ¬л„ҢнҠё вҖ” н•Ём •л§Ң мӮ¬мҡ©.
        // D-52 (2026-04-23 мҡ”н•ң м§ҖмӢң): 'н’ҚмЎұн•ң л•…(кө¬ мўӢмқҖ кіі)'мқҖ лӘЁлӢ¬ вҶ’ нҶ мҠӨнҠёлЎң мқҙкҙҖ.
        // н•Ём •мқҖ н”јн•ҙ м •ліҙк°Җ мһҲм–ҙ лӘ…мӢңм Ғ нҷ•мқёмқҙ н•„мҡ”н•ҳлҜҖлЎң лӘЁлӢ¬ мң м§Җ.
        function TileEventModal({ tile, onClose }) {
            if (!tile) return null;

            const getEventInfo = () => {
                switch(tile.type) {
                    case 'trap':
                        return {
                            emoji: 'вҡ пёҸ',
                            title: 'н•Ём •!',
                            message: tile.damage ? `мғқлӘ…л Ҙмқҙ ${tile.damage} к°җмҶҢн–ҲмҠөлӢҲлӢӨ!` : 'мң„н—ҳн•ң н•Ём •мқҙ мһҲмҠөлӢҲлӢӨ!',
                            color: '#e94560'
                        };
                    default:
                        return null;
                }
            };
            
            const eventInfo = getEventInfo();
            if (!eventInfo) return null;
            
            return (
                <div className="modal">
                    <div style={{ 
                        background: eventInfo.color, 
                        color: 'white',
                        padding: '30px', 
                        borderRadius: '12px', 
                        textAlign: 'center',
                        minWidth: '300px'
                    }}>
                        <div style={{ fontSize: '48px', marginBottom: '15px' }}>
                            {eventInfo.emoji}
                        </div>
                        <div style={{ fontSize: '24px', fontWeight: '600', marginBottom: '15px' }}>
                            {eventInfo.title}
                        </div>
                        <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                            {eventInfo.message}
                        </div>
                        <button 
                            onClick={onClose}
                            style={{ 
                                background: 'white',
                                color: eventInfo.color,
                                border: 'none',
                                padding: '12px 30px',
                                fontSize: '16px',
                                fontWeight: '600',
                                borderRadius: '6px',
                                cursor: 'pointer'
                            }}
                        >
                            нҷ•мқё
                        </button>
                    </div>
                </div>
            );
        }

        // м•„мқҙн…ң м •ліҙм°Ҫ вҖ” мқҙлҰ„/л“ұкёү/к°Җл°©м№ёмҲҳ/м„ұлҠҘ(effect)/мӮ¬мҡ© лІ„нҠј
        //
        // лҚ°мқҙн„° мҶҢмҠӨ мҡ°м„ мҲңмң„:
        //   1) window.TTD_DATA.ITEMS (Notion SSOT) вҖ” 'мқҙлҰ„'мңјлЎң мЎ°нҡҢ, effect нҸ¬н•Ё
        //   2) InventorySystem.ITEMS[item.type] вҖ” кө¬лІ„м „ нҸҙл°ұ
        function ItemInfoModal({ item, onUse, onClose }) {
            const invDef = InventorySystem.ITEMS[item.type] || {};
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const notionItem = notionItems.find(it => it && it['мқҙлҰ„'] === (invDef.name || item.name));

            const effect = (notionItem && notionItem.effect) || null;
            const usable = !!(effect && effect.usable);
            const effectLabel = window.EffectParser
                ? window.EffectParser.describeEffect(effect)
                : (effect && effect.raw) || 'нҡЁкіј м—ҶмқҢ';

            const grade = (notionItem && notionItem['м•„мқҙн…ң л“ұкёү']) || null;
            const slot = (notionItem && notionItem['к°Җл°©м№ёмҲҳ']) || '1x1';

            return (
                <div
                    className="modal"
                    style={{ zIndex: 1000 }}
                    onClick={onClose}
                >
                    <div
                        className="modal-content"
                        style={{ maxWidth: '320px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                            <h3 style={{ margin: 0 }}>{invDef.name || item.name}</h3>
                            <button onClick={onClose}>лӢ«кё°</button>
                        </div>

                        <div style={{ fontSize: '13px', lineHeight: '1.7', color: '#ddd' }}>
                            {grade && <div>л“ұкёү: <span style={{ color: '#fff' }}>{grade}</span></div>}
                            <div>к°Җл°©м№ёмҲҳ: <span style={{ color: '#fff' }}>{slot}</span></div>
                            <div>м„ұлҠҘ: <span style={{ color: usable ? '#8bd17c' : '#888' }}>{effectLabel}</span></div>
                            {notionItem && notionItem['м„ӨлӘ… н…ҚмҠӨнҠё'] && (
                                <div style={{ marginTop: '8px', fontSize: '11px', color: '#aaa' }}>
                                    {notionItem['м„ӨлӘ… н…ҚмҠӨнҠё']}
                                </div>
                            )}
                        </div>

                        <div style={{ marginTop: '14px', display: 'flex', gap: '8px' }}>
                            <button
                                onClick={onUse}
                                disabled={!usable}
                                style={{
                                    flex: 1,
                                    padding: '10px',
                                    background: usable ? '#4CAF50' : '#555',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '4px',
                                    cursor: usable ? 'pointer' : 'not-allowed',
                                    fontWeight: 600
                                }}
                            >
                                {usable ? 'мӮ¬мҡ©' : 'мӮ¬мҡ© л¶Ҳк°Җ'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // мқёлІӨнҶ лҰ¬ лӘЁлӢ¬ м»ҙнҸ¬л„ҢнҠё
        //
        // м•„мқҙн…ң мқён„°лһҷм…ҳ л¶„кё°:
        //   - м§§мқҖ нғӯ (< 400ms лӮҙм—җ л–јл©ҙ) вҶ’ м •ліҙм°Ҫ лӘЁлӢ¬
        //   - кёҙ лҲ„лҰ„ (вүҘ 400ms мң м§Җ) вҶ’ кё°мЎҙ лҸҷмһ‘(м„ нғқ/мқҙлҸҷ/лЁём§Җ/нҡҢм „)
        // мһ„кі„к°’ 400ms мұ„нғқ к·јкұ°: Android н‘ңмӨҖ long-press(500ms)ліҙлӢӨ мӮҙм§қ л№ лҘҙкІҢ, iOS кё°ліё(вүҲ300ms)ліҙлӢӨлҠ” м—¬мң лЎӯкІҢ.
        // кІҢмһ„мқҖ м—°нғҖ/л“ңлһҳк·ёк°Җ мһҰм•„ м§§мқҖ мқҳлҸ„лҘј лҶ“м№ҳл©ҙ лӢөлӢөн•ҳкі , л°ҳлҢҖлЎң л„Ҳл¬ҙ м§§мңјл©ҙ мҠӨмҷҖмқҙн”„к°Җ мһҳлӘ» мқёмӢқлҗңлӢӨ.
        function InventoryModal({ inventory, selectedItem, setSelectedItem, closeInventory, onUseItem, onFlashMessage }) {
            const [, setTick] = React.useState(0);
            const bump = () => setTick(t => t + 1);
            // нҷ•м • лҢҖкё° мң„м№ҳ (к·ёлҰ¬л“ң м…Җмқ„ лҲҢлҹ¬ м§Җм •)
            const [pendingPos, setPendingPos] = React.useState(null);
            // м •ліҙм°ҪмңјлЎң лқ„мҡё м•„мқҙн…ң (nullмқҙл©ҙ м •ліҙм°Ҫ лӢ«нһҳ)
            const [infoItem, setInfoItem] = React.useState(null);

            const ROWS = 6, COLS = 5, CELL = 47, PAD = 4;
            const LONG_PRESS_MS = 400;

            // н”„л ҲмҠӨ мғҒнғңлҘј refлЎң кҙҖлҰ¬н•ҙ мһ¬л ҢлҚ” м—Ҷмқҙ нғҖмқҙлЁё/к°Җл“ң к°ұмӢ .
            const pressRef = React.useRef({ timer: null, longFired: false, itemId: null });

            // кё°мЎҙ нғӯ(=лЎұн”„л ҲмҠӨ) кІҪлЎң: м„ нғқ/мӣҗліө
            const activateSelect = (item) => {
                if (!selectedItem) {
                    inventory.selectItem(item);
                    setSelectedItem(item);
                    setPendingPos({ x: item.x, y: item.y });
                    bump();
                    return;
                }
                if (selectedItem.id === item.id) {
                    inventory.cancelSelection();
                    setSelectedItem(null);
                    setPendingPos(null);
                    bump();
                }
                // лӢӨлҘё м•„мқҙн…ңмңјлЎң м „нҷҳмқҖ м…Җ нҒҙлҰӯ кІҪлЎңм—җм„ң мІҳлҰ¬ (көҗмІҙ/лЁём§Җ)
            };

            // м§§мқҖ нғӯ: м •ліҙм°Ҫ м—ҙкё°. лӢЁ, мқҙлҜё м„ нғқ лӘЁл“ңлқјл©ҙ "мҰүмӢң лЁём§Җ/мЎ°н•©" л¶„кё°.
            //
            // D-32 (мҡ”н•ң м§ҖмӢң 2026-04-22): лЎұн”„л ҲмҠӨ вҶ’ м§§мқҖ нғӯ мЎ°н•©мңјлЎң л“ңлһҳк·ёВ·нҷ•м • лІ„нҠј м—Ҷмқҙ
            //   н•ң лІҲм—җ лЁём§Җ/мЎ°н•©к№Ңм§Җ к°„лӢӨ. мӮ°л”ёкё°+мӮ°л”ёкё°вҶ’л”ёкё°лӘЁл‘  к°ҷмқҖ нқҗлҰ„мқҙ нғӯ л‘җ лІҲмқҙл©ҙ лҒқ.
            //   - к°ҷмқҖ м•„мқҙн…ңмқ„ лӢӨмӢң нғӯ: м„ нғқ м·ЁмҶҢ(нҶ кёҖ).
            //   - к°ҷмқҖ type & лЁём§Җ к°ҖлҠҘ вҶ’ мҰүмӢң лЁём§Җ.
            //   - лӢӨлҘё type & мЎ°н•© л§Өм№ӯ вҶ’ мҰүмӢң мЎ°н•©.
            //   - к·ё мҷё: кё°мЎҙлҢҖлЎң selectItem кІҪлЎң(м„ нғқ м „нҷҳ) вҖ” л“ңлһҳк·ёлЎң л№Ҳ м№ём—җ мҳ®кё°лҠ” кё°мЎҙ UXлҠ” мӮҙлҰј.
            const openInfo = (item) => {
                if (selectedItem) {
                    if (selectedItem.id === item.id) {
                        // нҶ кёҖ: лҸҷмқј м•„мқҙн…ң нғӯ = м„ нғқ н•ҙм ң
                        inventory.cancelSelection();
                        setSelectedItem(null);
                        setPendingPos(null);
                        bump();
                        return;
                    }

                    const canMerge = inventory.canMerge(selectedItem, item);
                    const canCombine = inventory.canCombine && inventory.canCombine(selectedItem, item);

                    if (canMerge || canCombine) {
                        // нғҖк№ғ м•„мқҙн…ңмқҳ мўҢн‘ңлЎң нҷ•м • л°°м№ҳ вҶ’ confirmPlacement лӮҙл¶Җм—җм„ң
                        // overlap 1к°ң = target вҶ’ merge/combine л¶„кё°к°Җ мһҗлҸҷ м Ғмҡ©.
                        const res = inventory.confirmPlacement(item.x, item.y);
                        if (res.ok) {
                            setSelectedItem(null);
                            setPendingPos(null);
                            if (onFlashMessage && res.resultType) {
                                const resultDef = InventorySystem.ITEMS[res.resultType];
                                const resultName = resultDef ? resultDef.name : res.resultType;
                                if (res.action === 'merge') {
                                    onFlashMessage(`л‘җ мһ¬лЈҢлҘј н•©міҗ ${resultName}мқ„(лҘј) м–»м—ҲлӢӨ.`);
                                } else if (res.action === 'combine') {
                                    onFlashMessage(`мһ¬лЈҢлҘј мЎ°н•©н•ҙ ${resultName}мқ„(лҘј) л§Ңл“Өм—ҲлӢӨ.`);
                                }
                            }
                        }
                        bump();
                        return;
                    }

                    // лЁём§Җ/мЎ°н•© л‘ҳ лӢӨ л¶Ҳк°Җ вҖ” кё°мЎҙлҢҖлЎң м„ нғқ м „нҷҳ(нҷңм„ұнҷ” кІҪлЎң).
                    activateSelect(item);
                    return;
                }
                setInfoItem(item);
            };

            const onItemPointerDown = (e, item) => {
                e.stopPropagation();
                // л§Ҳмҡ°мҠӨ мҡ°нҒҙлҰӯ/мӨ‘к°„нҒҙлҰӯ л¬ҙмӢң
                if (e.button && e.button !== 0) return;
                pressRef.current = { timer: null, longFired: false, itemId: item.id };
                pressRef.current.timer = setTimeout(() => {
                    pressRef.current.longFired = true;
                    activateSelect(item);
                }, LONG_PRESS_MS);
            };

            const onItemPointerUp = (e, item) => {
                e.stopPropagation();
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                if (st.itemId !== item.id) {
                    pressRef.current = { timer: null, longFired: false, itemId: null };
                    return;
                }
                if (!st.longFired) openInfo(item);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            const onItemPointerCancel = () => {
                const st = pressRef.current;
                if (st.timer) clearTimeout(st.timer);
                pressRef.current = { timer: null, longFired: false, itemId: null };
            };

            // л Ҳкұ°мӢң: кё°мЎҙ onClick кІҪлЎң мң м§Җ (нӮӨліҙл“ң м ‘к·јм„ұ/кё°мЎҙ н…ҢмҠӨнҠё нҳёнҷҳ).
            // нҸ¬мқён„° кё°л°ҳ л¶„кё°к°Җ л°ңлҸҷн•ҳл©ҙ longFiredк°Җ trueк°Җ лҗҳм–ҙ мӨ‘ліө нҳём¶ңлҗҳм§Җ м•ҠлҸ„лЎқ к°Җл“ң.
            const handleItemClick = (item) => {
                const st = pressRef.current;
                if (st.longFired) { onItemPointerCancel(); return; }
                // нҸ¬мқён„° мқҙлІӨнҠёк°Җ м“°мқҙм§Җ м•ҠлҠ” нҷҳкІҪм—җм„ңмқҳ нҸҙл°ұ
                openInfo(item);
            };

            // мӮ¬мҡ© лІ„нҠј вҖ” нҡЁкіј м Ғмҡ© нӣ„ мқјнҡҢмҡ©мқҙл©ҙ мқёлІӨм—җм„ң м ңкұ°, м •ліҙм°Ҫ лӢ«кё°
            const handleUseFromInfo = () => {
                if (!infoItem) return;
                const result = onUseItem ? onUseItem(infoItem) : { ok: false };
                if (result && result.ok && result.consumed) {
                    // м•„мқҙн…ң м ңкұ°
                    inventory.removeItem(infoItem);
                    inventory.items = inventory.items.filter(i => i.id !== infoItem.id);
                }
                setInfoItem(null);
                bump();
            };

            const handleCellClick = (row, col) => {
                if (!selectedItem) return;
                setPendingPos({ x: col, y: row });
                bump();
            };

            const handleRotate = () => {
                if (!selectedItem) return;
                inventory.rotateItem(selectedItem);
                bump();
            };

            const handleConfirm = () => {
                if (!selectedItem || !pendingPos) return;
                const res = inventory.confirmPlacement(pendingPos.x, pendingPos.y);
                if (!res.ok) {
                    bump();
                    return;
                }
                if (res.action === 'swap') {
                    // мғҲлЎң кіөмӨ‘м—җ лң¬ м•„мқҙн…ңмңјлЎң м„ нғқ м „нҷҳ
                    setSelectedItem(inventory.selectedItem);
                    setPendingPos(inventory.selectedItem
                        ? { x: inventory.selectedItem.x, y: inventory.selectedItem.y }
                        : null);
                } else {
                    setSelectedItem(null);
                    setPendingPos(null);
                }
                // D-24: лЁём§Җ/мЎ°н•© кІ°кіј л©”мӢңм§Җ. мӢӨнҢЁ мӢң(resultType м—ҶмқҢ)м—” мЎ°мҡ©нһҲ л„ҳм–ҙк°җ.
                if (onFlashMessage && res.resultType) {
                    const resultDef = InventorySystem.ITEMS[res.resultType];
                    const resultName = resultDef ? resultDef.name : res.resultType;
                    if (res.action === 'merge') {
                        onFlashMessage(`л‘җ мһ¬лЈҢлҘј н•©міҗ ${resultName}мқ„(лҘј) м–»м—ҲлӢӨ.`);
                    } else if (res.action === 'combine') {
                        onFlashMessage(`мһ¬лЈҢлҘј мЎ°н•©н•ҙ ${resultName}мқ„(лҘј) л§Ңл“Өм—ҲлӢӨ.`);
                    }
                }
                bump();
            };

            const handleCancel = () => {
                if (!selectedItem) return;
                inventory.cancelSelection();
                setSelectedItem(null);
                setPendingPos(null);
                bump();
            };

            // D-45 (2026-04-23): м„ нғқн•ң м•„мқҙн…ңмқ„ мқёлІӨнҶ лҰ¬м—җм„ң мҳҒкө¬ м ңкұ°.
            // - 1нҡҢ нҷ•м •. лЎұн”„л ҲмҠӨлЎң мқҙлҜё м„ нғқлҗң мғҒнғңлқј мҳӨмЎ°мһ‘ нҷ•лҘ мқҙ лӮ®м•„ лі„лҸ„ нҷ•мқём°Ҫ м—ҶмқҢ.
            // - кіөк°„мқҙ кҪү м°јмқ„ л•Ң нғҲм¶ң мҲҳлӢЁмқҙмһҗ л¶Ҳн•„мҡ”н•ң 1лӢЁкі„ л¶ҖмӮ°л¬ј м •лҰ¬мҡ©.
            const handleDiscard = () => {
                if (!selectedItem) return;
                const discarded = inventory.discardSelected();
                setSelectedItem(null);
                setPendingPos(null);
                if (discarded && onFlashMessage) {
                    onFlashMessage(`${discarded.name}мқ„(лҘј) лІ„л ёлӢӨ.`);
                }
                bump();
            };

            // лҜёлҰ¬ліҙкё° к°ҖлҠҘ м—¬л¶Җ (нҳ„мһ¬ pendingPosм—җ selectedItemмқҙ л“Өм–ҙк°Ҳ мҲҳ мһҲлҠ”к°Җ)
            const previewInfo = (() => {
                if (!selectedItem || !pendingPos) return null;
                const { x, y } = pendingPos;
                const shape = selectedItem.shape;
                if (y + shape.length > ROWS || x + shape[0].length > COLS) {
                    return { ok: false, kind: 'oob' };
                }
                const overlap = inventory.getItemsOverlapping(shape, x, y);
                if (overlap.length === 0) return { ok: true, kind: 'place' };
                if (overlap.length === 1) {
                    if (inventory.canMerge(selectedItem, overlap[0])) return { ok: true, kind: 'merge' };
                    if (inventory.canCombine && inventory.canCombine(selectedItem, overlap[0])) return { ok: true, kind: 'combine' };
                    return { ok: true, kind: 'swap' };
                }
                return { ok: false, kind: 'blocked' };
            })();

            return (
                <div className="modal">
                    <div className="modal-content">
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                            <h3>к°Җл°© (5x6)</h3>
                            <button onClick={closeInventory}>лӢ«кё°</button>
                        </div>
                        <div style={{ position: 'relative' }}>
                            <div className="inventory-grid">
                                {Array(ROWS).fill(null).map((_, row) =>
                                    Array(COLS).fill(null).map((_, col) => (
                                        <div
                                            key={`${row}-${col}`}
                                            className={`inventory-cell ${inventory.grid[row][col] ? 'occupied' : ''}`}
                                            onClick={() => handleCellClick(row, col)}
                                        />
                                    ))
                                )}
                            </div>

                            {/* нҷ•м • лҢҖкё° лҜёлҰ¬ліҙкё° */}
                            {selectedItem && pendingPos && previewInfo && (
                                <div
                                    className={`inventory-preview ${previewInfo.ok ? 'ok' : 'bad'} ${previewInfo.kind}`}
                                    style={{
                                        position: 'absolute',
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                        pointerEvents: 'none'
                                    }}
                                />
                            )}

                            {/* к·ёлҰ¬л“ңм—җ л°°м№ҳлҗң м•„мқҙн…ңл“Ө */}
                            {inventory.items.filter(i => !selectedItem || i.id !== selectedItem.id).map(item => (
                                <div
                                    key={item.id}
                                    className="inventory-item"
                                    style={{
                                        left: `${item.x * CELL + PAD}px`,
                                        top: `${item.y * CELL + PAD}px`,
                                        width: `${item.shape[0].length * CELL - PAD}px`,
                                        height: `${item.shape.length * CELL - PAD}px`
                                    }}
                                    onPointerDown={(e) => onItemPointerDown(e, item)}
                                    onPointerUp={(e) => onItemPointerUp(e, item)}
                                    onPointerCancel={onItemPointerCancel}
                                    onPointerLeave={onItemPointerCancel}
                                    onContextMenu={(e) => e.preventDefault()}
                                >
                                    {item.name}
                                </div>
                            ))}

                            {/* кіөмӨ‘м—җ лң¬ м„ нғқ м•„мқҙн…ң (pendingPosлҘј л”°лқјк°җ) */}
                            {selectedItem && pendingPos && (
                                <div
                                    className="inventory-item floating selected"
                                    style={{
                                        left: `${pendingPos.x * CELL + PAD}px`,
                                        top: `${pendingPos.y * CELL + PAD}px`,
                                        width: `${selectedItem.shape[0].length * CELL - PAD}px`,
                                        height: `${selectedItem.shape.length * CELL - PAD}px`,
                                    }}
                                    onClick={(e) => { e.stopPropagation(); handleItemClick(selectedItem); }}
                                >
                                    {selectedItem.name}
                                </div>
                            )}
                        </div>

                        {selectedItem ? (
                            <div style={{ marginTop: '10px', display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                <button onClick={handleRotate}>нҡҢм „</button>
                                <button
                                    onClick={handleConfirm}
                                    disabled={!previewInfo || !previewInfo.ok}
                                >
                                    нҷ•м •{previewInfo && previewInfo.ok && previewInfo.kind !== 'place'
                                        ? ` (${previewInfo.kind === 'merge' ? 'лЁём§Җ'
                                              : previewInfo.kind === 'combine' ? 'мЎ°н•©'
                                              : 'көҗмІҙ'})`
                                        : ''}
                                </button>
                                <button onClick={handleCancel}>м·ЁмҶҢ</button>
                                {/* D-45 (2026-04-23): лІ„лҰ¬кё° вҖ” л№Ёк°• нҶӨ, 1нҡҢ нҷ•м •.
                                    - нҢҢл°ҚмңјлЎң кіөк°„мқҙ кҪү м°јмқ„ л•Ң нғҲм¶ң мҲҳлӢЁ.
                                    - лЁём§Җ/мЎ°н•© лҢҖмғҒмқҙ м—ҶлҠ” л¶ҖмӮ°л¬ј(лӮЎмқҖ мһ¬лЈҢ л“ұ) м •лҰ¬мҡ©. */}
                                <button
                                    onClick={handleDiscard}
                                    style={{
                                        marginLeft: 'auto',
                                        background: '#6b2a2f',
                                        color: '#f4d4d8',
                                        border: '1px solid #8a3a42',
                                    }}
                                >
                                    лІ„лҰ¬кё°
                                </button>
                            </div>
                        ) : (
                            <div style={{ marginTop: '10px', fontSize: '11px', color: '#aaa' }}>
                                м§§кІҢ нғӯ = м •ліҙ В· кёёкІҢ лҲ„лҘҙл©ҙ м„ нғқн•ҙм„ң мқҙлҸҷ/лЁём§Җ
                            </div>
                        )}
                    </div>

                    {infoItem && (
                        <ItemInfoModal
                            item={infoItem}
                            onUse={handleUseFromInfo}
                            onClose={() => setInfoItem(null)}
                        />
                    )}
                </div>
            );
        }

        // м№ҙл“ңлЎң м•„мқҙн…ң мӮ¬мҡ© вҖ” кіөнҶө лӘЁлӢ¬ (н”„л Ҳмһ„мӣҢнҒ¬ D-23мқҳ мІ« кө¬нҳ„мІҙ).
        //
        // м—ӯн• :
        //   м№ҙл“ң мӮ¬мҡ© мӢң consume мҠӨнҺҷмқҙ мһҲмңјл©ҙ, мқёлІӨнҶ лҰ¬м—җм„ң н•„н„°лҘј нҶөкіјн•ҳлҠ” м•„мқҙн…ң лӘ©лЎқмқ„
        //   к°„лһөнһҲ ліҙм—¬мЈјкі , мң м Җк°Җ н•ҳлӮҳлҘј кі лҘҙл©ҙ onSelect(item) мҪңл°ұ.
        //
        // мҷң InventoryModalмқ„ мһ¬мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ”к°Җ:
        //   - мқёлІӨ ліё UIлҠ” н…ҢнҠёлҰ¬мҠӨмӢқ л°°м№ҳ/лЁём§Җ/нҡҢм „/лЎұн”„л ҲмҠӨк№Ңм§Җ ліөмһЎ. м№ҙл“ң мӮ¬мҡ© л§ҘлқҪм—җм„ңлҠ”
        //     мҳӨлЎңм§Җ "н•„н„° нҶөкіј м•„мқҙн…ң м„ нғқ"л§Ң н•„мҡ”н•ҳлҜҖлЎң кІҪлҹү лҰ¬мҠӨнҠё UIк°Җ нҢҗлӢЁ л№„мҡ©мқҙ м ҒлӢӨ.
        //   - н–Ҙнӣ„ лҢҖмғҒ мҲҳк°Җ л§Һм•„м§Җл©ҙ мқҙ лӘЁлӢ¬мқ„ grid/spriteлЎң нҷ•мһҘн•ҳкұ°лӮҳ, кіөмң  м…Җл үн„° м»ҙнҸ¬л„ҢнҠёлЎң м¶”м¶ң.
        //
        // props:
        //   inventory:      InventorySystem мқёмҠӨн„ҙмҠӨ
        //   filter:         (invItem, notionItem) => bool
        //   titleText:      мғҒлӢЁ лқјлІЁ (мҳҲ: "нңҙмӢқн•  мқҢмӢқ кі лҘҙкё°")
        //   emptyText:      н•„н„° нҶөкіј м•„мқҙн…ң 0к°ңмқј л•Ң л©”мӢңм§Җ
        //   onSelect(item): нҷ•м •
        //   onClose():      м·ЁмҶҢ
        // D-36 (2026-04-22, мҡ”н•ң м§ҖмӢң):
        //   scales({recover: N})мқҙ мһҲмңјл©ҙ "нҡЁкіјк°Җ Nл°°" мһ„мқ„ мӢңк°Ғм ҒмңјлЎң к°•мЎ°н•ңлӢӨ.
        //   - м ңлӘ© м•„лһҳ м•ҲлӮҙ л¬ёкө¬ (л…ёлһҖмғү)
        //   - к°Ғ мқҢмӢқ нҡЁкіј мҡ”м•Ҫмқҳ "л°°кі н”” +1"мқ„ "л°°кі н”” +1 +1"лЎң ліҖнҳ•н•ҳкі 
        //     мҰқл¶„ "+1" л§Ң л…ёлһҖмғү(#d4b84a)мңјлЎң лқ„мҡҙлӢӨ. нҡЁкіјк°Җ 2к°ң мқҙмғҒмқё м•„мқҙн…ңмқҖ
        //     к°Ғ мҰқл¶„мқ„ к°ҷмқҖ л°©мӢқмңјлЎң мІҳлҰ¬. scaleмқҙ кұёлҰҙ мҲҳ мһҲлҠ” кұҙ м–‘мҲҳ delta statлҝҗ.
        //   - scaleмқҙ м—Ҷкұ°лӮҳ 1мқҙл©ҙ кё°мЎҙ UIмҷҖ лҸҷмқј.
        //   мқҙ н‘ңнҳ„мқҖ нңҙмӢқ мҷё н–Ҙнӣ„ consume м№ҙл“ңм—җлҸ„ мһ¬мӮ¬мҡ© к°ҖлҠҘн•ҳлҸ„лЎқ мқјл°ҳнҷ”.
        function CardItemConsumeModal({ inventory, filter, scales, hintText, titleText, emptyText, onSelect, onClose }) {
            const notionItems = (window.TTD_DATA && window.TTD_DATA.ITEMS) || [];
            const byName = (name) => notionItems.find(it => it && it['мқҙлҰ„'] === name);
            const Parser = window.EffectParser;

            const recoverScale = (scales && typeof scales.recover === 'number') ? scales.recover : 1;
            const hasRecoverScale = recoverScale !== 1;

            const candidates = (inventory?.items || []).filter(invItem => {
                const def = InventorySystem.ITEMS[invItem.type] || {};
                const notionItem = byName(def.name || invItem.name);
                return filter ? filter(invItem, notionItem, def) : true;
            });

            // м•„мқҙн…ң нҡЁкіј мҡ”м•Ҫ н‘ңмӢң вҖ” scaleмқҙ мһҲмңјл©ҙ мӣҗліё delta + мҰқл¶„мқ„ лӮҳлһҖнһҲ ліҙм—¬мӨҖлӢӨ.
            // л°ҳнҷҳ: JSX or null
            function renderEffectRow(notionItem) {
                const parsedEffect = notionItem && notionItem.effect;
                const summary = notionItem && notionItem['нҡЁкіј мҡ”м•Ҫ'];
                const canScale = hasRecoverScale && parsedEffect && parsedEffect.usable && Parser;

                if (!canScale) {
                    // нҸҙл°ұ: мӣҗліё нҡЁкіј мҡ”м•Ҫл§Ң н‘ңмӢң (кё°мЎҙ лҸҷмһ‘)
                    return summary
                        ? (
                            <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                                {summary}
                            </div>
                        )
                        : null;
                }

                // к°Ғ actionмқ„ "кё°ліё лқјлІЁ + (л…ёлһҖмғү мҰқл¶„)" нҳ•нғңлЎң л ҢлҚ”.
                // мҳҲ: action {stat:'hunger', delta:1}, recoverScale=2 вҶ’ 'л°°кі н”” +1 +1'
                //     л°°кі н””(нҡҢмғү) / '+1'(нҡҢмғү) / '+1'(л…ёлһҖмғү = мҰқл¶„)
                const parts = parsedEffect.actions.map((a, i) => {
                    if (a.type !== 'stat' || !(a.delta > 0)) {
                        // scaleмқҙ м•Ҳ кұёлҰ¬лҠ” action(к°җмҶҢ/spawn_card л“ұ)мқҖ кё°ліё describe.
                        const baseLabel = Parser.describeEffect({ usable: true, actions: [a], raw: '' });
                        return (
                            <span key={i} style={{ marginRight: '6px' }}>{baseLabel}</span>
                        );
                    }
                    const label = a.stat === 'hunger' ? 'л°°кі н””'
                                : a.stat === 'health' ? 'мғқлӘ…л Ҙ'
                                : a.stat;
                    const baseStr = `${label} +${a.delta}`;
                    const bonus = Math.round(a.delta * recoverScale - a.delta);
                    return (
                        <span key={i} style={{ marginRight: '6px' }}>
                            {baseStr}
                            {bonus > 0 && (
                                <span style={{ color: '#d4b84a', fontWeight: 700, marginLeft: '4px' }}>
                                    +{bonus}
                                </span>
                            )}
                        </span>
                    );
                });

                return (
                    <div style={{ fontSize: '11px', color: '#aaa', marginTop: '2px' }}>
                        {parts}
                    </div>
                );
            }

            return (
                <div className="modal" style={{ zIndex: 1100 }} onClick={onClose}>
                    <div
                        className="modal-content"
                        style={{ maxWidth: '360px', minWidth: '260px' }}
                        onClick={(e) => e.stopPropagation()}
                    >
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '4px' }}>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{titleText || 'м•„мқҙн…ң м„ нғқ'}</h3>
                            <button onClick={onClose}>лӢ«кё°</button>
                        </div>
                        {hintText && (
                            <div style={{
                                fontSize: '12px',
                                color: '#d4b84a',
                                marginBottom: '10px',
                                letterSpacing: '0.3px'
                            }}>
                                {hintText}
                            </div>
                        )}
                        {!hintText && <div style={{ marginBottom: '8px' }} />}
                        {candidates.length === 0 ? (
                            <div style={{ fontSize: '13px', color: '#aaa', padding: '16px 8px', textAlign: 'center' }}>
                                {emptyText || 'м“ё л§Ңн•ң м•„мқҙн…ңмқҙ м—ҶлӢӨ.'}
                            </div>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                                {candidates.map(invItem => {
                                    const def = InventorySystem.ITEMS[invItem.type] || {};
                                    const notionItem = byName(def.name || invItem.name);
                                    return (
                                        <button
                                            key={invItem.id}
                                            onClick={() => onSelect(invItem)}
                                            style={{
                                                textAlign: 'left',
                                                padding: '10px 12px',
                                                background: '#0f3460',
                                                border: '1px solid #16213e'
                                            }}
                                        >
                                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{def.name || invItem.name}</div>
                                            {renderEffectRow(notionItem)}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // нҡҚл“қ м•ҢлҰј нҶ мҠӨнҠё вҖ” л’Өм ёліҙкё° л“ұмңјлЎң м•„мқҙн…ңмқ„ м–»мқ„ л•Ң к°•мЎ°мҡ©мңјлЎң лқ„мҡҙлӢӨ.
        //
        // D-28(2026-04-22, мҡ”н•ң м§ҖмӢң):
        // - нҢқм—…кіј лӢӨлҘҙкІҢ лІ„нҠј м—ҶмқҢ. л°ҳнҲ¬лӘ… л°°кІҪ.
        // - нҺҳмқҙл“ң мқё(л№ лҘҙкІҢ) вҶ’ 1мҙҲ л…ём¶ң вҶ’ 2мҙҲ нҺҳмқҙл“ң м•„мӣғ.
        // - м—¬лҹ¬ м•„мқҙн…ң лҸҷмӢң нҡҚл“қ мӢң н•ҳлӮҳмқҳ нҶ мҠӨнҠём—җ лӘ©лЎқмңјлЎң.
        // - кё°мЎҙ л©”мӢңм§Җ лЎңк·ёлҠ” мң м§Җ (нҶ мҠӨнҠёлҠ” ліҙмЎ° к°•мЎ°).
        // D-46(2026-04-22, мҡ”н•ң м§ҖмӢң): мң„м№ҳлҘј .map-area(HUD л°”лЎң м•„лһҳ мҳҒм—ӯ)
        // мғҒлӢЁ мӨ‘м•ҷм—җ absoluteлЎң кі м •. мқҙм „м—” .map-container(мҠӨнҒ¬лЎӨ мҳҒм—ӯ) м•Ҳмқҙлқј
        // л§өмқ„ мҠӨнҒ¬лЎӨн•ҳл©ҙ нҶ мҠӨнҠёк°Җ мӢңм•ј л°–мңјлЎң л°Җл ёмқҢ.
        // .map-areaлҠ” мҠӨнҒ¬лЎӨн•ҳм§Җ м•ҠмңјлҜҖлЎң нҶ мҠӨнҠёлҠ” н•ӯмғҒ к°ҷмқҖ мң„м№ҳ(HUD м§Ғн•ҳлӢЁ)м—җ л…ём¶ңлҗҳкі ,
        // мўҢВ·мҡ°В·мғҒлӢЁ лӘЁл‘җ лӢӨлҘё мғҒнғң UI(HUD нҢЁл„җ, м№ҙл“ң, мқёлІӨ лІ„нҠј)мҷҖ кІ№м№ҳм§Җ м•ҠлҠ”лӢӨ.
        // z-indexлҠ” кё°мЎҙ modal(.modal=100, ItemInfoModal=1000, CardListModal=1100)ліҙлӢӨ

        // л°°кІҪ л¶ҲнҲ¬лӘ…лҸ„ 0.8 (D-39, мқҙм „ 0.5).
        function LootToast({ toast, onDone }) {
            const [phase, setPhase] = React.useState('in'); // in вҶ’ hold вҶ’ out вҶ’ done
            React.useEffect(() => {
                if (!toast) return;
                setPhase('in');
                const t1 = setTimeout(() => setPhase('hold'), 200);   // нҺҳмқҙл“ң мқё 0.2s

                const t3 = setTimeout(() => {                         // нҺҳмқҙл“ң м•„мӣғ 2s

                    onDone && onDone();
                }, 200 + 1000 + 2000);
                return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };

            if (!toast || phase === 'done') return null;

        function GameEndModal({ gameOver, victory, deathReason }) {
